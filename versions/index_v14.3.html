// ===== HIT DETECTION =====
function handleLanePress(lane) {
  const hitY = getHitY();
  let closest = null, closestDist = Infinity;

  for (const n of nodes) {
    if (n.hit || n.missed) continue;
    if (n.lane !== lane) continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    const dist = Math.abs(sy - hitY);
    if (dist < HIT_WINDOW_PX && dist < closestDist) { closest = n; closestDist = dist; }
  }
  if (!closest) { playEmptyPressSfx(lane); return; }
  closest.hit = true;

  if (closest.type === 'trap') {
    if (usingStemMode) stemDuck(lane); else stemDuckAll();
    playDissonance(); combo = 0; fever = false; feverTimer = 0;
    gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain * 2 : 0.08));
    judgmentText = 'TRAP!'; judgmentTimer = 0.7; judgmentColor = '#ff3333'; judgmentPriority = 2;
    shakeX = (Math.random()-0.5)*18; shakeY = (Math.random()-0.5)*12;
    playerAnim = -0.3;
    spawnParticles(getLaneX(lane), hitY, '#ff3333', 8);
  } else if (closest.type === 'hold') {
    // Start hold — 거리 기반 판정
    let holdGrade;
    if (closestDist < 22) holdGrade = 'perfect';
    else if (closestDist < 42) holdGrade = 'great';
    else holdGrade = 'good';
    if (usingStemMode) stemBoost(lane, holdGrade); else stemBoostAll();
    playHoldStartSfx();
    startHoldSound(closest);
    closest.holding = true;
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + 0.015 * fm);
    let pts, txt, col;
    if (closestDist < 22) { pts=100; txt='HOLD!'; col='#ffd700'; }
    else if (closestDist < 42) { pts=80; txt='HOLD!'; col='#00d4ff'; }
    else { pts=50; txt='HOLD'; col='#44dd66'; }
    score += Math.floor(pts * fm * (1 + combo * 0.02));
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.2;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], 6);
  } else {
    let pts, txt, col;
    let grade;
    if (closestDist < 28) { pts=200; txt='PERFECT'; col='#ffd700'; grade='perfect'; }
    else if (closestDist < 52) { pts=150; txt='GREAT'; col='#00d4ff'; grade='great'; }
    else { pts=100; txt='GOOD'; col='#44dd66'; grade='good'; }
    if (usingStemMode) stemBoost(lane, grade); else stemBoostAll();
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + 0.015 * fm);
    score += Math.floor(pts * fm * (1 + combo * 0.02));
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.3;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], fever ? 15 : 10);
    spawnBurst(getLaneX(lane), hitY, grade);
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, sp = 60+Math.random()*180;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-60,
      life: 0.4+Math.random()*0.3, maxLife: 0.7, color, size: 3+Math.random()*5 });
  }
}

function spawnBurst(x, y, grade) {
  const conf = {
    perfect: { color1: '#ffd700', color2: '#fff7aa', color3: '#ff8800', rings: 5, sparks: 28, size: 2.0 },
    great:   { color1: '#00d4ff', color2: '#aaeeff', color3: '#0088ff', rings: 3, sparks: 18, size: 1.5 },
    good:    { color1: '#44dd66', color2: '#aaffbb', color3: '#22aa44', rings: 2, sparks: 10, size: 1.0 },
  }[grade];
  bursts.push({ x, y, time: 0, maxTime: 0.6, ...conf });
  // Big spark particles
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.PI * 2 * i / conf.sparks + (Math.random() - 0.5) * 0.4;
    const sp = (180 + Math.random() * 280) * conf.size;
    const col = Math.random() > 0.5 ? conf.color2 : conf.color1;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 120,
      life: 0.5 + Math.random()*0.4, maxLife: 0.9, color: col, size: 4 + Math.random()*7 });
  }
  // Extra scattered debris
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (60 + Math.random() * 350) * conf.size;
    particles.push({ x: x + (Math.random()-0.5)*20, y: y + (Math.random()-0.5)*10,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 150,
      life: 0.3 + Math.random()*0.5, maxLife: 0.8, color: conf.color3, size: 2 + Math.random()*5 });
  }
}

// ===== START SONG =====
function startSong(idx) {
  stopTitleBgm(); stopPreview(); stopSongPreview(); stopSongAudio(); resumeAudio();
  recordPlay(idx);
  curSongIdx = idx; curSong = songs[idx];
  curDiff = DIFFICULTIES[selectedDiff];
  const speedMul = selectedSpeed;
  noteSpeed = curSong.bpm * 2.8 * speedMul;
  generateNodes(curSong, curDiff);
  score=0; combo=0; maxCombo=0; collected=0; missed=0;
  keyHeld=Array(laneCount).fill(false); keyFlash=Array(laneCount).fill(0);
  particles=[]; bursts=[]; holdGlows=[]; gameParticles=[]; countdownTime=3.5; gameTime=0;
  nextSixteenth=0; songStartTime=0;
  judgmentText=''; judgmentTimer=0; judgmentPriority=0; playerAnim=0; gauge=1; fever=false; feverTimer=0; feverFlash=0; feverParticles=[];
  // Try loading 7 stem files, fall back to single mp3
  usingStemMode = false;
  stemSyncTime = 0;
  initStemTargets();
  allStemAudios = [];
  const stemNames = curSong.stemNames || [];
  const stemCount = stemNames.length;
  if (curSong.stemDir && stemCount > 0) {
    let loaded = 0, failed = 0;
    for (let i = 0; i < stemCount; i++) {
      const path = assetUrl(curSong.stemDir + curSong.stemPrefix + '_' + stemNames[i] + '.mp3');
      const a = new Audio(path);
      a.volume = 0;
      allStemAudios.push(a);
      a.addEventListener('canplaythrough', () => {
        loaded++;
        if (loaded === stemCount) {
          usingStemMode = true;
          updateSongDurationFromAudio();
          // 메인: 볼륨 0으로 미리 재생
          for (let k = 0; k < allStemAudios.length; k++) {
            allStemAudios[k].volume = 0;
            allStemAudios[k].play().catch(()=>{});
          }
          // 펄스용: 0.5초 앞서 볼륨 0으로 미리 재생
          pulseStemAudios = [];
          const sNames = curSong.stemNames || [];
          for (let k = 0; k < sNames.length; k++) {
            if (ALWAYS_AUDIBLE_STEMS.includes(k)) { pulseStemAudios.push(null); continue; }
            const p = assetUrl(curSong.stemDir + curSong.stemPrefix + '_' + sNames[k] + '.mp3');
            const pa = new Audio(p);
            pa.currentTime = PULSE_LEAD;
            pa.volume = 0;
            pa.play().catch(()=>{});
            pulseStemAudios.push(pa);
          }
        }
      }, { once: true });
      a.addEventListener('error', () => {
        failed++;
        if (failed === 1) {
          for (let j = 0; j < allStemAudios.length; j++) {
            if (allStemAudios[j]) { allStemAudios[j].pause(); }
          }
          allStemAudios = [];
          songAudio = new Audio(assetUrl(curSong.file));
          songAudio.volume = 0.8 * volBgm;
          songAudio.addEventListener('canplaythrough', () => updateSongDurationFromAudio(), { once: true });
          songAudio.load();
        }
      }, { once: true });
      a.load();
    }
  } else {
    songAudio = new Audio(assetUrl(curSong.file));
    songAudio.volume = 0.8 * volBgm;
    songAudio.addEventListener('canplaythrough', () => updateSongDurationFromAudio(), { once: true });
    songAudio.load();
  }
}

// ===== UPDATE =====
function update(dt) {
  updateSelectScroll(dt);
  // Preview: start/switch when song selection changes in select state
  if (state === 'select' && actx) {
    if (previewSongIdx !== selectedSong) { startPreview(selectedSong); }
    schedulePreview();
  } else if (previewActive) {
    stopPreview();
  }
  shakeX *= 0.82; shakeY *= 0.82;
  for (let i=0;i<laneCount;i++) keyFlash[i] = Math.max(0, keyFlash[i]-dt*2);
  if (judgmentTimer > 0) { judgmentTimer -= dt; if (judgmentTimer <= 0) judgmentPriority = 0; }
  if (fever) {
    // Spawn side fire particles during fever
    for (let i = 0; i < 2; i++) {
      const side = Math.random() > 0.5 ? 0 : W;
      const col = `hsl(${Math.random()*60+20},100%,${55+Math.random()*35}%)`;
      feverParticles.push({ x: side + (Math.random()-0.5)*30, y: H * (0.3 + Math.random()*0.6),
        vx: (side === 0 ? 1 : -1) * (20+Math.random()*40), vy: -40-Math.random()*80,
        life: 0.5+Math.random()*0.5, maxLife: 1.0, color: col, size: 4+Math.random()*8 });
    }
  }
  if (feverFlash > 0) feverFlash -= dt * 1.5;
  // Update fever particles
  for (let i = feverParticles.length-1; i >= 0; i--) {
    const p = feverParticles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 60*dt; p.life -= dt;
    if (p.life <= 0) feverParticles.splice(i, 1);
  }
  if (playerAnim > 0) playerAnim = Math.max(0, playerAnim - dt);
  else if (playerAnim < 0) playerAnim = Math.min(0, playerAnim + dt);

  if (state === 'login') {
    // 로그인 input을 화면 중앙에 배치하고 포커스 유지
    loginInputEl.style.top = (H * 0.42) + 'px';
    loginInputEl.style.width = Math.min(260, W * 0.65) + 'px';
    if (document.activeElement !== loginInputEl) loginInputEl.focus();
    // hidden input 값 동기화
    if (loginInputEl.value !== loginInput) loginInput = loginInputEl.value.slice(0, 12);
    for (const inp of inputQueue) {
      if (inp === 'confirm' && loginInput.trim().length > 0) {
        currentUser = loginInput.trim();
        localStorage.setItem('rhythm_currentUser', currentUser);
        loginInputEl.blur(); loginInputEl.value = '';
        loginInputEl.style.top = '-200px';
        // 계정 설정 Firebase에서 동기화
        loadLaneCountFromFirebase();
        loadKeymapFromFirebase();
        loadVolFromFirebase();
        transitionTo('title', () => startTitleBgm());
      }
    }
    inputQueue=[]; return;
  }
  if (state === 'title') {
    for (const inp of inputQueue) {
      if (inp==='confirm') {
        resumeAudio();
        if (!titleBgmUnlocked) {
          // First tap: unlock audio + start BGM, stay on title
          startTitleBgm(); titleBgmUnlocked = true;        } else {
          // Second tap: go to select
          stopTitleBgm(); transitionTo('select');
        }
      }
    }
    inputQueue=[]; return;
  }
  if (state === 'ranking') {
    if (inputQueue.length > 0)    for (const inp of inputQueue) {
      if (inp==='back' || inp==='confirm') { stopRankingBgm(); transitionTo('select'); }
      if (inp==='up') rankingScroll = Math.max(0, rankingScroll - 1);
      if (inp==='down') rankingScroll++;
      if (inp==='left') selectedDiff = Math.max(0, selectedDiff-1);
      if (inp==='right') selectedDiff = Math.min(DIFFICULTIES.length-1, selectedDiff+1);
    }
    inputQueue=[]; return;
  }
  if (state === 'achievement') {
    if (inputQueue.length > 0)    for (const inp of inputQueue) {
      if (inp==='back' || inp==='confirm') { transitionTo('select'); }
      if (inp==='up') achievementScroll = Math.max(0, achievementScroll - 1);
      if (inp==='down') achievementScroll++;
      if (inp==='left') { achievementTab = Math.max(0, achievementTab - 1); achievementScroll = 0; }
      if (inp==='right') { achievementTab = Math.min(ACH_TABS.length - 1, achievementTab + 1); achievementScroll = 0; }
    }
    inputQueue=[]; return;
  }
  if (state === 'select') {
    if (inputQueue.length > 0)    for (const inp of inputQueue) {
      if (inp === 'tab') { selectFocus = (selectFocus + 1) % 3; }
      if (inp === 'ranking') { rankingScroll = 0; stopPreview(); startRankingBgm(); transitionTo('ranking'); searchActive = false; searchText = ''; searchInputEl.value = ''; searchInputEl.blur(); }
      if (inp === 'achievement') { achievementScroll = 0; achievementSongFilter = selectedSong; transitionTo('achievement'); searchActive = false; searchText = ''; searchInputEl.value = ''; searchInputEl.blur(); }
      if (selectFocus === 0) {
        if (inp==='left') { selectedSong = (selectedSong - 1 + songs.length) % songs.length; scrollToSong(selectedSong); }
        if (inp==='right') { selectedSong = (selectedSong + 1) % songs.length; scrollToSong(selectedSong); }
        if (inp==='down') selectFocus = 1;
        if (inp==='up') selectFocus = 2;
      } else if (selectFocus === 1) {
        if (inp==='left') selectedDiff = Math.max(0, selectedDiff-1);
        if (inp==='right') selectedDiff = Math.min(DIFFICULTIES.length-1, selectedDiff+1);
        if (inp==='up') selectFocus = 0;
        if (inp==='down') selectFocus = 2;
      } else if (selectFocus === 2 && !speedInputActive) {
        if (inp==='left') speedDown();
        if (inp==='right') speedUp();
        if (inp==='up') selectFocus = 1;
        if (inp==='down') selectFocus = 0;
      }
      if (inp==='confirm') { speedInputActive=false; speedInputText=''; transitionTo('playing', () => startSong(selectedSong)); }
    }
    inputQueue=[]; return;
  }
  if (state === 'result') {
    for (const inp of inputQueue) { if (inp==='confirm') { transitionTo('select'); } }
    inputQueue=[]; return;
  }
  if (state !== 'playing') { inputQueue=[]; return; }

  for (const inp of inputQueue) {
    if (inp==='back') { stopSongAudio(); transitionTo('select'); nextSixteenth=999999; inputQueue=[]; return; }
  }
  inputQueue = [];

  if (countdownTime > 0) {
    countdownTime -= dt;
    updateStemVolumes(dt); // 카운트다운 중에도 펄스 페이드아웃 처리
    if (countdownTime <= 0) {
      songStartTime = actx.currentTime; countdownTime = 0;
      if (usingStemMode) {
        // 모든 스템 동일 위치에서 시작
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) {
            allStemAudios[i].currentTime = 0;
            allStemAudios[i].volume = STEM_VOL_NORMAL * volBgm;
          }
        }
        // 한 프레임 안에서 모두 play (동기화 보장)
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) allStemAudios[i].play().catch(()=>{});
        }
        stemBoostAll();
        // 펄스용 Audio 생성 (메인보다 0.5초 앞서 재생, 볼륨 0)
        for (const a of pulseStemAudios) { if (a) a.pause(); }
        pulseStemAudios = [];
        const stemNames = curSong.stemNames || [];
        for (let i = 0; i < stemNames.length; i++) {
          if (ALWAYS_AUDIBLE_STEMS.includes(i)) { pulseStemAudios.push(null); continue; }
          const path = assetUrl(curSong.stemDir + curSong.stemPrefix + '_' + stemNames[i] + '.mp3');
          const pa = new Audio(path);
          pa.currentTime = PULSE_LEAD;
          pa.volume = 0;
          pa.play().catch(()=>{});
          pulseStemAudios.push(pa);
        }
      } else if (songAudio) {
        songAudio.currentTime = 0; songAudio.play().catch(()=>{});
      }
    }
    return;
  }

  gameTime += dt;
  updateStemVolumes(dt);
  scheduleNotes();

  // 스템 동기화 보정 + 자동 재개 (2초마다)
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0]) {
    if (gameTime - stemSyncTime > 2) {
      stemSyncTime = gameTime;
      // ended된 스템은 재시작 안 함 (곡 끝난 후 반복 방지)
      if (allStemAudios[0].paused && !gamePaused && !allStemAudios[0].ended) allStemAudios[0].play().catch(()=>{});
      const refTime = allStemAudios[0].currentTime;
      for (let i = 1; i < allStemAudios.length; i++) {
        if (!allStemAudios[i]) continue;
        if (allStemAudios[i].paused && !gamePaused && !allStemAudios[i].ended) allStemAudios[i].play().catch(()=>{});
        if (!allStemAudios[i].ended) {
          const drift = Math.abs(allStemAudios[i].currentTime - refTime);
          if (drift > 0.05) allStemAudios[i].currentTime = refTime;
        }
      }
      // 펄스용 Audio 동기화
      const pulseRef = refTime + PULSE_LEAD;
      for (let i = 0; i < pulseStemAudios.length; i++) {
        if (!pulseStemAudios[i]) continue;
        if (pulseStemAudios[i].paused && !gamePaused && !pulseStemAudios[i].ended) pulseStemAudios[i].play().catch(()=>{});
        if (!pulseStemAudios[i].ended) {
          const drift = Math.abs(pulseStemAudios[i].currentTime - pulseRef);
          if (drift > 0.08) pulseStemAudios[i].currentTime = pulseRef;
        }
      }
    }
  }

  // Hold note tracking
  for (const n of nodes) {
    if (n.type !== 'hold' || !n.holding) continue;
    // Fire burst effect while holding
    if (!n._burstTimer) n._burstTimer = 0;
    n._burstTimer += dt;
    if (n._burstTimer >= 0.025) {
      n._burstTimer = 0;
      const hx = getLaneX(n.lane), hy = getHitY();
      const col = LANE_COLORS[n.lane];
      const hw = (getLaneW() - 8) / 2;
      // Big upward flame columns
      for (let i = 0; i < laneCount; i++) {
        const ox = (Math.random() - 0.5) * hw * 2;
        const spd = -150 - Math.random() * 300;
        particles.push({ x: hx + ox, y: hy, vx: (Math.random()-0.5)*60, vy: spd,
          life: 0.4 + Math.random()*0.4, maxLife: 0.8, color: col, size: 6 + Math.random()*10 });
      }
      // Hot white/yellow core sparks
      for (let i = 0; i < 2; i++) {
        const coreCol = Math.random() > 0.5 ? '#fff' : '#ffd700';
        particles.push({ x: hx + (Math.random()-0.5)*hw*0.8, y: hy, vx: (Math.random()-0.5)*30, vy: -100 - Math.random()*250,
          life: 0.25 + Math.random()*0.25, maxLife: 0.5, color: coreCol, size: 4 + Math.random()*7 });
      }
      // Side fountain sparks
      for (let i = 0; i < 2; i++) {
        const dir = Math.random() > 0.5 ? 1 : -1;
        particles.push({ x: hx + dir*hw, y: hy, vx: dir*(80+Math.random()*160), vy: -60 - Math.random()*120,
          life: 0.25 + Math.random()*0.3, maxLife: 0.55, color: '#ffd700', size: 3 + Math.random()*5 });
      }
      // Rising embers (slow, long-lived)
      if (Math.random() < 0.4) {
        particles.push({ x: hx + (Math.random()-0.5)*hw*2, y: hy - Math.random()*30,
          vx: (Math.random()-0.5)*15, vy: -30 - Math.random()*60,
          life: 0.6 + Math.random()*0.5, maxLife: 1.1, color: '#ff8800', size: 2 + Math.random()*3 });
      }
    }
    // Glow burst at hit line
    if (!n._glowTimer) n._glowTimer = 0;
    n._glowTimer += dt;
    if (n._glowTimer >= 0.08) {
      n._glowTimer = 0;
      holdGlows.push({ x: getLaneX(n.lane), y: getHitY(), time: 0, maxTime: 0.35,
        color: LANE_COLORS[n.lane], w: getLaneW() - 8 });
    }
    // 홀드 중 키음 스템 볼륨 유지 (DJMAX식: 홀드하는 동안 소리 지속)
    if (usingStemMode) stemBoost(n.lane, 'perfect');
    // Combo ticks while holding
    if (!n._comboTimer) n._comboTimer = 0;
    n._comboTimer += dt;
    if (n._comboTimer >= 0.25) {
      n._comboTimer = 0;
      combo++; if (combo > maxCombo) maxCombo = combo;
      checkFeverActivate();
      const fm = fever ? 2 : 1;
      score += Math.floor(20 * fm);
      gauge = Math.min(1, gauge + 0.005 * fm);
    }
    // Key released — judge based on timing to endTime
    if (!keyHeld[n.lane]) {
      n.holding = false;
      n.holdComplete = true;
      stopHoldSound(n);
      const endDist = Math.abs(gameTime - n.endTime) * noteSpeed;
      const fm = fever ? 2 : 1;
      if (endDist < 28) {
        score += Math.floor(200 * fm); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + 0.02 * fm);
        judgmentText = 'PERFECT HOLD!'; judgmentTimer = 0.6; judgmentColor = '#ffd700'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'perfect');
        spawnParticles(getLaneX(n.lane), getHitY(), LANE_COLORS[n.lane], fever ? 20 : 12);
        playerAnim = 0.3;
      } else if (endDist < 52) {
        score += Math.floor(150 * fm); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + 0.015 * fm);
        judgmentText = 'GREAT HOLD!'; judgmentTimer = 0.5; judgmentColor = '#00d4ff'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'great');
        playerAnim = 0.2;
      } else if (endDist < HIT_WINDOW_PX) {
        score += Math.floor(100 * fm);
        judgmentText = 'OK'; judgmentTimer = 0.3; judgmentColor = '#44dd66'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'good');
      } else {
        if (usingStemMode) stemDuck(n.lane); else stemDuckAll();
        collected--; missed++; combo = 0; fever = false; feverTimer = 0;
        judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
      }
    }
    // Still holding when note ended — miss (홀드 유지 실패)
    if (n.holding && gameTime >= n.endTime + HIT_WINDOW_PX / noteSpeed) {
      n.holding = false;
      n.holdComplete = true;
      n.missed = true;
      stopHoldSound(n);
      if (usingStemMode) stemDuck(n.lane); else stemDuckAll();
      collected--; missed++; combo = 0; fever = false; feverTimer = 0;
      judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
    }
  }

  // Miss detection
  const hitY = getHitY();
  for (const n of nodes) {
    if (n.hit || n.missed) continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy > hitY + HIT_WINDOW_PX + 40) {
      n.missed = true;
      if (n.type === 'note' || n.type === 'hold') {
        if (usingStemMode) stemDuck(n.lane); else stemDuckAll();
        combo = 0; missed++; fever = false; feverTimer = 0;
        gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain : 0.04));
        shakeX = (Math.random()-0.5)*8; shakeY = (Math.random()-0.5)*6;
        if (judgmentPriority < 2) { judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1; }
      }
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 250*dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Bursts
  for (let i = bursts.length-1; i >= 0; i--) {
    bursts[i].time += dt;
    if (bursts[i].time >= bursts[i].maxTime) bursts.splice(i, 1);
  }
  // Hold glows
  for (let i = holdGlows.length-1; i >= 0; i--) {
    holdGlows[i].time += dt;
    if (holdGlows[i].time >= holdGlows[i].maxTime) holdGlows.splice(i, 1);
  }

  if ((gauge <= 0 || gameTime >= songDuration) && state === 'playing' && fadeDir === 0) {
    state = 'ending'; // 즉시 상태 변경하여 중복 실행 방지
    // 오디오 페이드아웃 (1초)
    fadeOutSongAudio(1.0);
    saveScore(curSongIdx, selectedDiff, score);
    checkAndAwardAchievements();
    transitionTo('result');
  }
}

// ===== RENDER =====
function render() {
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.save();
  ctx.translate(shakeX, shakeY);
  const song = curSong || songs[0];

  // BG
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, song.bg1); grad.addColorStop(1, song.bg2);
  ctx.fillStyle = grad; ctx.fillRect(-20,-20,W+40,H+40);

  if (state==='login') { renderLogin(); ctx.restore(); return; }
  if (state==='title') { renderTitle(); if (settingsOpen) renderSettingsOverlay(); ctx.restore(); return; }
  if (state==='select') { renderSelect(); if (settingsOpen) renderSettingsOverlay(); ctx.restore(); return; }
  if (state==='ranking') { renderRanking(); ctx.restore(); return; }
  if (state==='achievement') { renderAchievement(); ctx.restore(); return; }
  if (state==='result') { renderResult(); ctx.restore(); return; }

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.b * (0.3 + Math.sin(Date.now()*0.002+s.x)*0.2);
    ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.s, s.s);
  }
  ctx.globalAlpha = 1;

  // In-game ambient particles
  const lsx = getLaneStartX(), totalLW = getLaneW()*laneCount;
  const songCol = curSong ? curSong.color : '#fff';
  // Spawn various types
  if (gameParticles.length < 50) {
    const type = Math.random();
    if (type < 0.5) {
      // Side streaks - shoot up from edges
      const side = Math.random() > 0.5;
      gameParticles.push({
        x: side ? lsx - 15 - Math.random()*30 : lsx + totalLW + 15 + Math.random()*30,
        y: H * (0.5 + Math.random()*0.5),
        vx: (side ? 0.3 : -0.3) * Math.random(), vy: -(1.5 + Math.random()*2.5),
        size: 1.5+Math.random()*2.5, life: 1, decay: 0.008+Math.random()*0.006,
        color: songCol, kind: 'streak'
      });
    } else if (type < 0.8) {
      // Floating orbs - slow drift
      gameParticles.push({
        x: Math.random()*W, y: H+10,
        vx: (Math.random()-0.5)*0.3, vy: -(0.15+Math.random()*0.35),
        size: 3+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
        color: songCol, kind: 'orb'
      });
    } else {
      // Sparkle - tiny fast twinklers
      gameParticles.push({
        x: lsx + Math.random()*totalLW, y: Math.random()*H,
        vx: 0, vy: 0,
        size: 1+Math.random()*1.5, life: 1, decay: 0.02+Math.random()*0.02,
        color: '#fff', kind: 'sparkle'
      });
    }
  }
  for (let i = gameParticles.length-1; i >= 0; i--) {
    const gp = gameParticles[i];
    gp.x += gp.vx; gp.y += gp.vy; gp.life -= gp.decay;
    if (gp.kind === 'orb') gp.vx += (Math.random()-0.5)*0.02;
    if (gp.kind === 'streak') gp.vy *= 0.995;
    if (gp.life <= 0 || gp.y < -20) { gameParticles.splice(i,1); continue; }
    if (gp.kind === 'sparkle') {
      const flicker = Math.sin(Date.now()*0.02+i*7)*0.5+0.5;
      ctx.globalAlpha = gp.life * flicker * 0.7;
      ctx.fillStyle = gp.color;
      ctx.fillRect(gp.x-0.5, gp.y-0.5, gp.size, gp.size);
    } else {
      ctx.globalAlpha = gp.life * (gp.kind === 'streak' ? 0.5 : 0.3);
      ctx.shadowColor = gp.color; ctx.shadowBlur = gp.kind === 'streak' ? 12 : 6;
      ctx.fillStyle = gp.color;
      ctx.beginPath(); ctx.arc(gp.x, gp.y, gp.size*gp.life, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;

  renderLanes();
  renderNotes();
  renderHitLine();
  renderButtons();
  renderCharacter();
  renderParticles();
  renderBursts();
  renderHoldGlows();
  renderJudgment();
  renderUI();

  // Fever overlay
  if (fever) {
    const t = Date.now();
    const lw = getLaneW(), lsx = getLaneStartX(), tw = lw * laneCount;

    // Smooth golden aura along lane edges
    ctx.globalAlpha = 0.15;
    const leftGrd = ctx.createLinearGradient(lsx - 40, 0, lsx + 20, 0);
    leftGrd.addColorStop(0, 'transparent');
    leftGrd.addColorStop(0.5, `hsl(${(t*0.1)%360},100%,60%)`);
    leftGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = leftGrd; ctx.fillRect(lsx - 40, 0, 60, H);
    const rightGrd = ctx.createLinearGradient(lsx + tw - 20, 0, lsx + tw + 40, 0);
    rightGrd.addColorStop(0, 'transparent');
    rightGrd.addColorStop(0.5, `hsl(${(t*0.1+180)%360},100%,60%)`);
    rightGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = rightGrd; ctx.fillRect(lsx + tw - 20, 0, 60, H);
    ctx.globalAlpha = 1;

    // Smooth color-shifting lane tint
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = `hsl(${(t*0.08)%360},100%,55%)`;
    ctx.fillRect(lsx, 0, tw, H);
    ctx.globalAlpha = 1;

    // Rising light streaks inside lanes
    for (let i = 0; i < laneCount; i++) {
      const phase = (t * 0.001 + i * 1.3) % 1;
      const sy = H * (1 - phase);
      const sx = lsx + i * lw + lw / 2;
      const streakAlpha = Math.sin(phase * Math.PI) * 0.12;
      ctx.globalAlpha = streakAlpha;
      const sg = ctx.createLinearGradient(0, sy - 40, 0, sy + 40);
      sg.addColorStop(0, 'transparent');
      sg.addColorStop(0.5, LANE_COLORS[i]);
      sg.addColorStop(1, 'transparent');
      ctx.fillStyle = sg;
      ctx.fillRect(sx - lw * 0.3, sy - 40, lw * 0.6, 80);
    }
    ctx.globalAlpha = 1;

    // Fever side fire particles
    for (const p of feverParticles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife) * 0.7;
      ctx.fillStyle = p.color;
      const s = p.size * (p.life / p.maxLife);
      ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
    }
    ctx.globalAlpha = 1;

    // FEVER text - smooth gradient, no flash
    ctx.save();
    const fs = sz(44);
    const bop = Math.sin(t*0.004) * 3;
    const feverCY = getHitY() * 0.5;
    ctx.translate(lsx + tw/2, feverCY + bop);
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 4;
    ctx.strokeText('FEVER!', 0, 0);
    // Smooth shifting gradient fill
    const txtGrd = ctx.createLinearGradient(-60, 0, 60, 0);
    const hue = (t * 0.06) % 360;
    txtGrd.addColorStop(0, `hsl(${hue},100%,65%)`);
    txtGrd.addColorStop(0.5, `hsl(${(hue+60)%360},100%,70%)`);
    txtGrd.addColorStop(1, `hsl(${(hue+120)%360},100%,65%)`);
    ctx.fillStyle = txtGrd;
    ctx.shadowColor = `hsl(${hue},80%,40%)`; ctx.shadowBlur = 15;
    ctx.fillText('FEVER!', 0, 0);
    ctx.shadowBlur = 0;
    // x2 badge
    ctx.font = `bold ${Math.floor(fs*0.4)}px sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.globalAlpha = 0.9;
    ctx.fillText('x2 SCORE', 0, fs + 2);
    ctx.restore();

    ctx.restore();
  }

  // Low gauge danger vignette
  if (gauge < 0.35) {
    const intensity = (0.35 - gauge) / 0.35;
    const pulse = 0.5 + Math.sin(Date.now() * 0.006) * 0.5;
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.8);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, `rgba(255,0,0,${intensity * 0.25 * pulse})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // Countdown
  if (countdownTime > 0) {
    const num = Math.ceil(countdownTime);
    if (num <= 3) {
      const frac = countdownTime % 1, scale = 1+frac*0.4;
      ctx.save(); ctx.translate(W/2, H*0.4); ctx.scale(scale,scale);
      ctx.globalAlpha = Math.min(1,frac*2);
      ctx.font = `bold ${sz(90)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; ctx.shadowColor=song.color; ctx.shadowBlur=30;
      ctx.fillText(''+num, 0, 0);
      ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }
  }
  ctx.restore();
}

function renderLanes() {
  const lw = getLaneW(), lsx = getLaneStartX(), hitY = getHitY();

  // Lane backgrounds
  for (let i = 0; i < laneCount; i++) {
    const x = lsx + i * lw;
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.025)' : 'rgba(0,0,0,0.08)';
    ctx.fillRect(x, 0, lw, hitY + 10);

    // Vertical lane dividers
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, hitY+10); ctx.stroke();

    // Flash on press
    if (keyFlash[i] > 0) {
      ctx.fillStyle = LANE_COLORS[i] + '15';
      ctx.fillRect(x, 0, lw, hitY+10);
    }
  }
  // Right border
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(lsx + lw*5, 0); ctx.lineTo(lsx + lw*5, hitY+10); ctx.stroke();
}

function renderHitLine() {
  const lsx = getLaneStartX(), tw = getTotalLaneW(), hitY = getHitY();

  // Glow line
  ctx.shadowColor = curSong.color; ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lsx-5, hitY); ctx.lineTo(lsx+tw+5, hitY); ctx.stroke();
  ctx.shadowBlur = 0;
  // Secondary color glow underneath
  ctx.strokeStyle = curSong.color + '44'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(lsx-5, hitY); ctx.lineTo(lsx+tw+5, hitY); ctx.stroke();

  // Subtle gradient above hit line
  const grad = ctx.createLinearGradient(0, hitY-60, 0, hitY);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(255,255,255,0.06)');
  ctx.fillStyle = grad;
  ctx.fillRect(lsx, hitY-60, tw, 60);

  // Receptors
  const lw = getLaneW();
  for (let i = 0; i < laneCount; i++) {
    const cx = getLaneX(i);
    const held = keyHeld[i], flash = keyFlash[i] > 0;

    const rw = lw - 8, rh = 20;
    if (held || flash) {
      ctx.fillStyle = LANE_COLORS[i] + '66';
      ctx.shadowColor = LANE_COLORS[i]; ctx.shadowBlur = 15;
      ctx.fillRect(cx-rw/2, hitY-rh/2, rw, rh); ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = 'rgba(20,20,40,0.7)'; ctx.fillRect(cx-rw/2, hitY-rh/2, rw, rh);
    }
    ctx.strokeStyle = LANE_COLORS[i] + (held ? 'ee' : '55'); ctx.lineWidth = 2.5; ctx.strokeRect(cx-rw/2, hitY-rh/2, rw, rh);
  }
}

function renderNotes() {
  const hitY = getHitY();
  const pulse = Math.sin(Date.now()*0.006)*0.2+0.8;

  // 카운트다운 중에는 노드 안 그림
  if (countdownTime > 0) { /* skip node rendering */ }
  else for (const n of nodes) {
    const sx = getLaneX(n.lane);

    // Draw hold bar (even while holding/complete)
    if (n.type === 'hold' && !n.missed) {
      const headY = hitY - (n.time - gameTime) * noteSpeed;
      const tailY = hitY - (n.endTime - gameTime) * noteSpeed;
      const col = LANE_COLORS[n.lane];
      const barTop = Math.max(-40, tailY);
      const barBot = Math.min(hitY + 80, headY);

      if (barTop < barBot + 10) {
        // Bar body
        const bw = getLaneW() - 8;
        if (n.holding) {
          // Active hold - bright bar with glow
          ctx.shadowColor = col; ctx.shadowBlur = 12;
          ctx.fillStyle = col + 'bb';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
          ctx.shadowBlur = 0;
          // Pulsing particles along bar
          if (Math.random() < 0.3) {
            const py = barTop + Math.random() * (hitY - barTop);
            spawnParticles(sx + (Math.random()-0.5)*10, py, col, 1);
          }
        } else if (n.holdComplete) {
          // Completed - fading
          ctx.fillStyle = col + '33';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
        } else if (!n.hit) {
          // Not yet hit - normal bar
          ctx.fillStyle = col + '55';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
          // Border
          ctx.strokeStyle = col + '88'; ctx.lineWidth = 1.5;
          rrStroke(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
        }

        // Tail end cap
        if (tailY > -30 && tailY < hitY + 60 && !n.holdComplete) {
          const tw = getLaneW() - 6;
          ctx.fillStyle = n.holding ? col : col + 'cc';
          rrFill(sx-tw/2, tailY-7, tw, 14, 4);
          ctx.strokeStyle = col; ctx.lineWidth = 2;
          rrStroke(sx-tw/2, tailY-7, tw, 14, 4);
          if (n.holding) {
            ctx.shadowColor = col; ctx.shadowBlur = 10;
            rrStroke(sx-tw/2, tailY-7, tw, 14, 4);
            ctx.shadowBlur = 0;
          }
        }
      }

      // Head circle (skip if already hit or missed)
      if (!n.hit && !n.missed) {
        const sy = headY;
        if (sy > -30 && sy < hitY + 60) {
          const hw = (getLaneW() - 8) / 2, hh = 10;
          ctx.shadowColor = col; ctx.shadowBlur = 10;
          ctx.fillStyle = col;
          ctx.fillRect(sx-hw, sy-hh, hw*2, hh*2);
          ctx.shadowBlur = 0;
          ctx.fillStyle='#fff'; ctx.globalAlpha=0.5;
          ctx.fillRect(sx-hw+3, sy-hh+3, 8, 6);
          ctx.globalAlpha=1;
          ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('HOLD', sx, sy+1);
        }
      }
      continue;
    }

    if (n.hit || n.missed) continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < -30 || sy > hitY + 60) continue;

    if (n.type === 'trap') {
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(Math.PI/4);
      ctx.fillStyle = 'rgba(255,30,60,0.7)'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
      ctx.fillRect(-11,-11,22,22); ctx.shadowBlur=0; ctx.restore();
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx-5,sy-5); ctx.lineTo(sx+5,sy+5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+5,sy-5); ctx.lineTo(sx-5,sy+5); ctx.stroke();
    } else {
      const col = LANE_COLORS[n.lane];
      const nw = (getLaneW() - 8) / 2, nh = 10;
      ctx.shadowColor=col; ctx.shadowBlur=10;
      ctx.fillStyle=col;
      ctx.fillRect(sx-nw, sy-nh, nw*2, nh*2);
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff'; ctx.globalAlpha=0.5;
      ctx.fillRect(sx-nw+3, sy-nh+3, 8, 6);
      ctx.globalAlpha=1;
      ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('\u266A', sx, sy+1);
    }
  }

  // Missed flash
  for (const n of nodes) {
    if (!n.missed || n.type==='trap') continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < hitY || sy > hitY + 80) continue;
    const sx = getLaneX(n.lane);
    const fade = 1 - (sy - hitY) / 80;
    if (fade > 0) {
      ctx.globalAlpha = fade*0.6; ctx.fillStyle='#ff4444';
      ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
      ctx.fillText('MISS', sx, sy-15); ctx.globalAlpha=1;
    }
  }
}

function renderButtons() {
  const lw = getLaneW(), lsx = getLaneStartX(), by = getBtnY(), bh = getBtnH();

  for (let i = 0; i < laneCount; i++) {
    const bx = lsx + i * lw;
    const held = keyHeld[i];

    // Button bg
    ctx.fillStyle = held ? LANE_COLORS[i]+'44' : 'rgba(255,255,255,0.04)';
    rrFill(bx+3, by+3, lw-6, bh-6, 8);

    // Border
    ctx.strokeStyle = LANE_COLORS[i] + (held ? 'cc' : '33'); ctx.lineWidth = held ? 2.5 : 1.5;
    rrStroke(bx+3, by+3, lw-6, bh-6, 8);
    if (held) { ctx.shadowColor=LANE_COLORS[i]; ctx.shadowBlur=8; rrStroke(bx+3,by+3,lw-6,bh-6,8); ctx.shadowBlur=0; }

    // Label
    ctx.font = `bold ${sz(18)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = LANE_COLORS[i] + (held ? 'ff' : '99');
    ctx.fillText(getLaneLabel(i), bx + lw/2, by + bh/2);
  }
}

function rrFill(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function rrStroke(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function renderCharacter() {}

function renderParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
    ctx.fillStyle = p.color;
    const s = p.size * (p.life/p.maxLife);
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

function renderBursts() {
  for (const b of bursts) {
    const t = b.time / b.maxTime;
    const alpha = 1 - t;
    ctx.save();
    ctx.translate(b.x, b.y);

    // Expanding rings with thickness
    for (let r = 0; r < b.rings; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
      if (rt <= 0 || rt >= 1) continue;
      const radius = (25 + r * 25) * rt * b.size;
      const ringAlpha = (1 - rt) * 0.85;
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = r % 2 === 0 ? b.color1 : b.color2;
      ctx.lineWidth = (5 - r * 0.6) * (1 - rt) * b.size;
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
    }

    // Big center flash / shockwave
    if (t < 0.4) {
      const ft = t / 0.4;
      const flashR = 50 * b.size * ft;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, flashR);
      grd.addColorStop(0, '#ffffff');
      grd.addColorStop(0.3, b.color2);
      grd.addColorStop(1, b.color1 + '00');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0, 0, flashR, 0, Math.PI * 2); ctx.fill();
    }

    // Streaking rays
    const rayCount = Math.floor(b.sparks * 0.5);
    for (let i = 0; i < rayCount; i++) {
      const a = Math.PI * 2 * i / rayCount;
      const dist = (30 + 100 * t) * b.size;
      const len = (15 + 20 * (1 - t)) * b.size;
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = b.color2;
      ctx.lineWidth = 2 * (1 - t) * b.size;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * (dist - len), Math.sin(a) * (dist - len));
      ctx.lineTo(Math.cos(a) * dist, Math.sin(a) * dist);
      ctx.stroke();
    }

    // Diamond sparks radiating outward
    const sparkCount = Math.floor(b.sparks * 0.7);
    for (let i = 0; i < sparkCount; i++) {
      const a = Math.PI * 2 * i / sparkCount + t * 0.5;
      const dist = (20 + 90 * t) * b.size;
      const sx = Math.cos(a) * dist;
      const sy = Math.sin(a) * dist;
      const ss = (4 + Math.random() * 3) * (1 - t) * b.size;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = i % 2 === 0 ? b.color2 : b.color1;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a + t * 3);
      ctx.fillRect(-ss/2, -ss/2, ss, ss);
      ctx.restore();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderHoldGlows() {
  for (const g of holdGlows) {
    const t = g.time / g.maxTime;
    const alpha = (1 - t);
    const hw = g.w / 2;
    ctx.save();
    ctx.translate(g.x, g.y);

    // Large fire glow expanding upward
    const glowH = 90 * (0.4 + t * 0.6);
    ctx.globalAlpha = alpha * 0.7;
    const grd = ctx.createRadialGradient(0, -glowH*0.2, 0, 0, -glowH*0.3, hw * (1.2 + t));
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.2, g.color);
    grd.addColorStop(0.6, g.color + '88');
    grd.addColorStop(1, g.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -glowH * 0.25, hw * (1.3 + t * 0.8), glowH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core
    ctx.globalAlpha = alpha * 0.9;
    const coreGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 0.6);
    coreGrd.addColorStop(0, '#ffffff');
    coreGrd.addColorStop(1, '#ffffff00');
    ctx.fillStyle = coreGrd;
    ctx.beginPath();
    ctx.ellipse(0, -5, hw * 0.6, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Horizontal shockwave line
    const lineW = hw * (1.5 + t * 1.5);
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(-lineW, 0);
    ctx.lineTo(lineW, 0);
    ctx.stroke();

    // Side flare streaks
    ctx.globalAlpha = alpha * 0.5;
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2 * (1 - t);
    for (let s = -1; s <= 1; s += 2) {
      ctx.beginPath();
      ctx.moveTo(s * hw * 0.5, 0);
      ctx.lineTo(s * lineW * 1.2, -20 - 30 * t);
      ctx.stroke();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderJudgment() {
  if (judgmentTimer <= 0) return;
  const scale = Math.max(0.8, 1 + (0.5 - judgmentTimer)*0.3);
  ctx.save();
  ctx.translate(W/2, getHitY() - 40);
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, judgmentTimer*3);
  ctx.font = `bold ${sz(22)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle = judgmentColor;
  ctx.shadowColor=judgmentColor; ctx.shadowBlur=10;
  ctx.fillText(judgmentText, 0, 0);
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
}

function renderUI() {
  const song = curSong;
  // Gauge bar (left side, vertical, thick)
  const gx = getLaneStartX() - 38, gy = 50, gw = 20, gh = getHitY() - 140;
  // BG
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  rrFill(gx-1, gy-1, gw+2, gh+2, 6);
  // Fill (bottom-up)
  const fillH = gh * gauge;
  const gCol = gauge > 0.5 ? '#00ff88' : gauge > 0.25 ? '#ffaa00' : '#ff3333';
  const gGrad = ctx.createLinearGradient(0, gy+gh-fillH, 0, gy+gh);
  gGrad.addColorStop(0, gCol); gGrad.addColorStop(1, gCol+'66');
  ctx.fillStyle = gGrad;
  rrFill(gx, gy + gh - fillH, gw, fillH, 5);
  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rrFill(gx+1, gy + gh - fillH, gw/3, fillH, 3);
  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
  rrStroke(gx-1, gy-1, gw+2, gh+2, 6);
  // Glow when low
  if (gauge < 0.3) {
    ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 10 + Math.sin(Date.now()*0.008)*5;
    rrStroke(gx-1, gy-1, gw+2, gh+2, 6);
    ctx.shadowBlur = 0;
  }
  // Label
  ctx.save();
  ctx.translate(gx + gw/2, gy - 10);
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = gCol;
  ctx.fillText('HP', 0, 0);
  ctx.restore();
  // Percentage text on gauge
  ctx.save();
  ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(Math.round(gauge*100)+'%', gx+gw/2, gy+gh+14);
  ctx.restore();

  // Score top-left
  ctx.textAlign='left';
  ctx.font = `bold ${sz(24)}px sans-serif`; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('SCORE', 12, sz(28));
  ctx.font = `bold ${sz(60)}px sans-serif`; ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(255,255,255,0.3)'; ctx.shadowBlur=10;
  ctx.fillText(score.toLocaleString(), 12, sz(72));
  ctx.shadowBlur=0;

  // Combo display — 노트 영역 상단
  if (combo > 0) {
    const lsx = getLaneStartX(), tw = getLaneW()*laneCount;
    const cx = lsx + tw/2, cy = 55;
    const t = Date.now();

    ctx.save();
    ctx.translate(cx, cy);

    // 콤보 수에 따라 스케일 펄스
    const hitPulse = Math.max(0, playerAnim) * 0.4;
    ctx.scale(1 + hitPulse, 1 + hitPulse);

    // 콤보 숫자
    const numSize = 100 * UI;
    ctx.font = `bold ${numSize}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    // 콤보 색상
    let col;
    if (combo >= 100) col = `hsl(${(t * 0.15) % 360},100%,70%)`;
    else if (combo >= 50) col = '#ffd700';
    else if (combo >= 20) col = '#00d4ff';
    else if (combo >= 10) col = song.color;
    else col = 'rgba(255,255,255,0.7)';

    // 글로우
    if (combo >= 10) {
      ctx.shadowColor = col; ctx.shadowBlur = 12 + Math.sin(t * 0.005) * 6;
    }
    ctx.fillStyle = col;
    ctx.fillText(combo.toString(), 0, 0);
    ctx.shadowBlur = 0;

    // COMBO 라벨
    ctx.font = `bold ${sz(20)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('COMBO', 0, numSize * 0.55);

    ctx.restore();
  }

  // Song name + progress
  if (songDuration > 0 && gameTime > 0) {
    const prog = Math.min(1, gameTime/songDuration);
    const pw = sz(200), ppx = (W-pw)/2;
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(ppx, 8, pw, 3);
    ctx.fillStyle = song.color+'aa'; ctx.fillRect(ppx, 8, pw*prog, 3);
    ctx.font='9px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.fillText(song.name+' \u2014 '+song.sub, W/2, 22);
  }


  // Speed control (below HP bar, vertical stack)
  const spCx = gx + gw/2;
  const spBtn = 34;
  const spGap = 6;
  const spTotalH = spBtn + spGap + spBtn + spGap + spBtn;
  const spBaseY = gy + gh + 28;
  // Container
  const spPad = 5;
  const spContW = spBtn + spPad*2, spContH = spTotalH + spPad*2;
  const spContX = spCx - spContW/2, spContY = spBaseY - spPad;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  rrFill(spContX, spContY, spContW, spContH, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  rrStroke(spContX, spContY, spContW, spContH, 8);
  // Minus button
  const spMinusX = spCx - spBtn/2, spMinusY = spBaseY;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rrFill(spMinusX, spMinusY, spBtn, spBtn, 6);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
  rrStroke(spMinusX, spMinusY, spBtn, spBtn, 6);
  ctx.textAlign = 'center'; ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = selectedSpeed > SPEED_MIN ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
  ctx.textBaseline = 'middle';
  ctx.fillText('−', spCx, spMinusY + spBtn/2);
  ctx.textBaseline = 'alphabetic';
  // Speed label (same size as buttons, centered)
  const spLabelY = spMinusY + spBtn + spGap;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  rrFill(spMinusX, spLabelY, spBtn, spBtn, 6);
  ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 4;
  ctx.textBaseline = 'middle';
  ctx.fillText(selectedSpeed.toFixed(1)+'x', spCx, spLabelY + spBtn/2 - 1);
  ctx.textBaseline = 'alphabetic';
  ctx.shadowBlur = 0;
  // Plus button
  const spPlusY = spLabelY + spBtn + spGap;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rrFill(spMinusX, spPlusY, spBtn, spBtn, 6);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
  rrStroke(spMinusX, spPlusY, spBtn, spBtn, 6);
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = selectedSpeed < SPEED_MAX ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
  ctx.textBaseline = 'middle';
  ctx.fillText('+', spCx, spPlusY + spBtn/2);
  ctx.textBaseline = 'alphabetic';
  // Keyboard hint
  ctx.font = '8px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('[ ]', spCx, spContY + spContH + 8);

  // Pause button (top-right, left of exit)
  const pbW = 44, pbH = 34, pbX = W - 100, pbY = H - pbH - 10;
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  rrFill(pbX, pbY, pbW, pbH, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  rrStroke(pbX, pbY, pbW, pbH, 8);
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
  ctx.textBaseline = 'middle'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('⏸', pbX + pbW/2, pbY + pbH/2);
  ctx.textBaseline = 'alphabetic';

  // Exit button (top-right)
  const exBtnW = 44, exBtnH = 34, exX = W - 50, exY = H - exBtnH - 10;
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  rrFill(exX, exY, exBtnW, exBtnH, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  rrStroke(exX, exY, exBtnW, exBtnH, 8);
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
  ctx.textBaseline = 'middle'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('✕', exX + exBtnW/2, exY + exBtnH/2);
  ctx.textBaseline = 'alphabetic';
}

// ===== SETTINGS OVERLAY (팝업) =====
function renderSettingsOverlay() {
  // 반투명 배경
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  // 팝업 패널
  const popW = Math.min(sz(340), W*0.88), popH = Math.min(H*0.92, 660);
  const popX = (W - popW) / 2, popY = (H - popH) / 2;
  ctx.fillStyle = 'rgba(15,12,30,0.95)'; rrFill(popX, popY, popW, popH, 16);
  ctx.strokeStyle = 'rgba(160,130,255,0.3)'; ctx.lineWidth = 1; rrStroke(popX, popY, popW, popH, 16);

  // 닫기 버튼 (우상단)
  const bbW = 36, bbH = 30, bbX = popX + popW - bbW - 8, bbY = popY + 8;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, 8);
  ctx.textAlign='center'; ctx.font=`bold ${sz(13)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('✕', bbX+bbW/2, bbY+bbH*0.65);

  // 타이틀
  ctx.font=`bold ${sz(22)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillText('설정',W/2,popY+36); ctx.shadowBlur=0;

  // PC 전용 안내
  ctx.font=`${sz(11)}px sans-serif`;
  ctx.fillStyle='rgba(255,180,0,0.7)';
  ctx.fillText('⌨ PC 전용 — 키보드 조작키 설정',W/2,popY+58);

  // 4~8키 모드 토글
  const panelW = Math.min(popW - 30, 320);
  const panelX = (W - panelW) / 2;
  const modeY = popY + 72;
  const modeKeys = [4, 5, 6, 7, 8];
  const modeBtnW = 48, modeBtnH = 30, modeGap = 8;
  const modeTotalW = modeBtnW * modeKeys.length + modeGap * (modeKeys.length - 1);
  const modeX = (W - modeTotalW) / 2;
  modeKeys.forEach((m, mi) => {
    const bx = modeX + mi * (modeBtnW + modeGap);
    const sel = laneCount === m;
    ctx.fillStyle = sel ? '#cc44ff22' : 'rgba(255,255,255,0.03)';
    rrFill(bx, modeY, modeBtnW, modeBtnH, 8);
    ctx.strokeStyle = sel ? '#cc44ff' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = sel ? 2 : 1;
    if (sel) { ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 8; }
    rrStroke(bx, modeY, modeBtnW, modeBtnH, 8); ctx.shadowBlur = 0;
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(13)}px sans-serif`;
    ctx.fillStyle = sel ? '#cc44ff' : 'rgba(255,255,255,0.4)';
    ctx.fillText(m + 'K', bx + modeBtnW/2, modeY + modeBtnH*0.65);
  });

  // 키 바인딩 UI
  const rowH = laneCount >= 7 ? 38 : laneCount >= 6 ? 42 : 52;
  const startY = modeY + modeBtnH + 16;
  const laneNames = Array.from({length: laneCount}, (_, i) => '레인 ' + (i+1));

  for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const isBinding = settingsBindingLane === i;

    // 행 배경
    ctx.fillStyle = isBinding ? LANE_COLORS[i] + '18' : 'rgba(255,255,255,0.03)';
    rrFill(panelX, ry, panelW, rowH - 6, 8);
    if (isBinding) {
      ctx.strokeStyle = LANE_COLORS[i]; ctx.lineWidth = 2;
      rrStroke(panelX, ry, panelW, rowH - 6, 8);
    }

    // 레인 색상 바
    ctx.fillStyle = LANE_COLORS[i] + (isBinding ? 'cc' : '66');
    rrFill(panelX + 6, ry + 6, 4, rowH - 18, 2);

    // 레인 이름
    ctx.textAlign = 'left';
    ctx.font = `bold ${sz(15)}px sans-serif`;
    ctx.fillStyle = isBinding ? '#fff' : 'rgba(255,255,255,0.7)';
    ctx.fillText(laneNames[i], panelX + 20, ry + rowH/2 - 3);

    // 키 버튼
    const kbW = Math.min(100, panelW * 0.3), kbH = 34;
    const kbX = panelX + panelW - kbW - 10, kbY = ry + (rowH - 6 - kbH) / 2;
    ctx.fillStyle = isBinding ? LANE_COLORS[i] + '33' : 'rgba(255,255,255,0.06)';
    rrFill(kbX, kbY, kbW, kbH, 8);
    ctx.strokeStyle = isBinding ? LANE_COLORS[i] : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isBinding ? 2 : 1;
    rrStroke(kbX, kbY, kbW, kbH, 8);
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(16)}px sans-serif`;
    if (isBinding) {
      // 깜빡이는 커서
      const blink = Math.floor(Date.now()/400)%2===0;
      ctx.fillStyle = blink ? '#fff' : LANE_COLORS[i];
      ctx.fillText('키 입력...', kbX + kbW/2, kbY + kbH*0.6);
    } else {
      ctx.fillStyle = LANE_COLORS[i];
      ctx.fillText(getLaneLabel(i), kbX + kbW/2, kbY + kbH*0.6);
    }
  }

  // 초기화 버튼
  const resetY = startY + laneCount * rowH + 16;
  const resetW = Math.min(140, panelW * 0.4), resetH = 38;
  const resetX = (W - resetW) / 2;
  ctx.fillStyle = 'rgba(255,100,100,0.08)'; rrFill(resetX, resetY, resetW, resetH, 8);
  ctx.strokeStyle = 'rgba(255,100,100,0.4)'; ctx.lineWidth = 1; rrStroke(resetX, resetY, resetW, resetH, 8);
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(13)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,100,100,0.8)';
  ctx.fillText('기본값 복원', W/2, resetY + resetH*0.6);

  // ===== 볼륨 설정 =====
  const volY = resetY + resetH + 20;
  const sliderW = Math.min(panelW - 20, 260);
  const sliderX = (W - sliderW) / 2;
  const sliderH = 6, knobR = 10, volRowH = 44;

  // BGM 볼륨
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(13)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('음악 재생', sliderX, volY + 14);
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volBgm * 100) + '%', sliderX + sliderW, volY + 14);
  // 슬라이더 트랙
  const bgmTrackY = volY + 24;
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, bgmTrackY, sliderW, sliderH, 3);
  const bgmFill = sliderW * volBgm;
  ctx.fillStyle = '#cc44ff44'; rrFill(sliderX, bgmTrackY, bgmFill, sliderH, 3);
  // 슬라이더 노브
  const bgmKnobX = sliderX + bgmFill;
  ctx.beginPath(); ctx.arc(bgmKnobX, bgmTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#cc44ff'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // SFX 볼륨
  const sfxY = volY + volRowH;
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(13)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('효과음', sliderX, sfxY + 14);
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volSfx * 100) + '%', sliderX + sliderW, sfxY + 14);
  // 슬라이더 트랙
  const sfxTrackY = sfxY + 24;
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, sfxTrackY, sliderW, sliderH, 3);
  const sfxFill = sliderW * volSfx;
  ctx.fillStyle = '#44dd6644'; rrFill(sliderX, sfxTrackY, sfxFill, sliderH, 3);
  // 슬라이더 노브
  const sfxKnobX = sliderX + sfxFill;
  ctx.beginPath(); ctx.arc(sfxKnobX, sfxTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#44dd66'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // 하단 안내
  ctx.textAlign='center'; ctx.font=`${sz(10)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('키 버튼을 클릭 후 원하는 키를 누르세요  ·  ESC 닫기',W/2,popY+popH-14);
}

function handleSettingsClick(mx, my) {
  const popW = Math.min(sz(340), W*0.88), popH = Math.min(H*0.92, 660);
  const popX = (W - popW) / 2, popY = (H - popH) / 2;
  // 팝업 바깥 클릭 → 닫기
  if (!hitTest(mx, my, popX, popY, popW, popH)) { settingsOpen = false; settingsBindingLane = -1; return; }
  // 닫기 버튼
  const bbW = 36, bbH = 30, bbX = popX + popW - bbW - 8, bbY = popY + 8;
  if (hitTest(mx, my, bbX, bbY, bbW, bbH)) { settingsOpen = false; settingsBindingLane = -1; return; }

  // 4~8키 모드 토글
  const modeY = popY + 72;
  const modeKeys = [4, 5, 6, 7, 8];
  const modeBtnW = 48, modeBtnH = 30, modeGap = 8;
  const modeTotalW = modeBtnW * modeKeys.length + modeGap * (modeKeys.length - 1);
  const modeX = (W - modeTotalW) / 2;
  for (let mi = 0; mi < modeKeys.length; mi++) {
    const bx = modeX + mi * (modeBtnW + modeGap);
    if (hitTest(mx, my, bx, modeY, modeBtnW, modeBtnH) && laneCount !== modeKeys[mi]) {
      setLaneMode(modeKeys[mi]); settingsBindingLane = -1; return;
    }
  }

  const panelW = Math.min(popW - 30, 320);
  const panelX = (W - panelW) / 2;
  const rowH = laneCount >= 7 ? 38 : laneCount >= 6 ? 42 : 52;
  const startY = modeY + modeBtnH + 16;

  // 키 버튼 클릭
  for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const kbW = Math.min(100, panelW * 0.3), kbH = 34;
    const kbX = panelX + panelW - kbW - 10, kbY = ry + (rowH - 6 - kbH) / 2;
    if (hitTest(mx, my, kbX, kbY, kbW, kbH)) {
      settingsBindingLane = (settingsBindingLane === i) ? -1 : i;
      return;
    }
  }

  // 초기화 버튼
  const resetY = startY + laneCount * rowH + 16;
  const resetW = Math.min(140, panelW * 0.4), resetH = 38;
  const resetX = (W - resetW) / 2;
  if (hitTest(mx, my, resetX, resetY, resetW, resetH)) {
    resetKeymap(); settingsBindingLane = -1; return;
  }

  // 볼륨 슬라이더
  const sliderW = Math.min(panelW - 20, 260);
  const sliderX = (W - sliderW) / 2;
  const volY = resetY + resetH + 20;
  const volRowH = 44, sliderHitH = 30;
  const bgmTrackY = volY + 24;
  const sfxTrackY = volY + volRowH + 24;
  if (my >= bgmTrackY - sliderHitH/2 && my <= bgmTrackY + sliderHitH/2 && mx >= sliderX - 10 && mx <= sliderX + sliderW + 10) {
    settingsDragging = 'bgm';
    volBgm = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applyBgmVol(); saveVolSettings(); return;
  }
  if (my >= sfxTrackY - sliderHitH/2 && my <= sfxTrackY + sliderHitH/2 && mx >= sliderX - 10 && mx <= sliderX + sliderW + 10) {
    settingsDragging = 'sfx';
    volSfx = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applySfxVol(); saveVolSettings(); return;
  }
}

// ===== TITLE =====
let titleParticles = [];
function spawnTitleParticles() {
  const now = Date.now();
  // Ambient floating particles
  if (titleParticles.length < 40) {
    const hue = 240 + Math.random() * 80; // blue-purple range
    titleParticles.push({
      x: Math.random() * W, y: H + 10,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.3 + Math.random() * 0.8),
      size: 2 + Math.random() * 4,
      life: 1, decay: 0.002 + Math.random() * 0.003,
      hue, sat: 60 + Math.random() * 40, lit: 60 + Math.random() * 30,
      type: 'float'
    });
  }
  // Sparkle bursts from center
  if (Math.random() < 0.15) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    const hue = 260 + Math.random() * 60;
    titleParticles.push({
      x: W/2 + (Math.random()-0.5) * W * 0.3,
      y: H * 0.35 + (Math.random()-0.5) * 40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 1 + Math.random() * 2.5,
      life: 1, decay: 0.015 + Math.random() * 0.01,
      hue, sat: 80, lit: 70 + Math.random() * 20,
      type: 'spark'
    });
  }
}
function updateTitleParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.type === 'float') { p.vx += (Math.random() - 0.5) * 0.05; }
    if (p.life <= 0 || p.y < -20) { titleParticles.splice(i, 1); }
  }
}

function renderTitle() {
  // Background stars
  for (const s of stars) {
    ctx.globalAlpha = s.b*(0.3+Math.sin(Date.now()*0.002+s.x)*0.3);
    ctx.fillStyle='#fff'; ctx.fillRect(s.x, s.y, s.s, s.s);
  }
  ctx.globalAlpha=1;

  // Title particles
  spawnTitleParticles();
  updateTitleParticles();
  for (const p of titleParticles) {
    ctx.globalAlpha = p.life * (p.type === 'spark' ? 0.8 : 0.35);
    if (p.type === 'spark') {
      ctx.shadowColor = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
      ctx.shadowBlur = 8;
    }
    ctx.fillStyle = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // EQ bars
  const eqCount = 30, eqGap = 4;
  const eqTotalW = W * 0.75;
  const eqBarW = (eqTotalW - (eqCount-1)*eqGap) / eqCount;
  const eqX0 = (W - eqTotalW) / 2;
  const eqCenterY = H * 0.46;
  for (let i=0;i<eqCount;i++) {
    const bx = eqX0 + i * (eqBarW + eqGap);
    const bh = 20 + Math.sin(Date.now()*0.004+i*0.6)*18 + Math.sin(Date.now()*0.007+i*1.1)*10;
    const alpha = 0.08 + Math.sin(Date.now()*0.003+i*0.4)*0.04;
    ctx.fillStyle = `rgba(130,90,255,${alpha})`;
    ctx.fillRect(bx, eqCenterY-bh/2, eqBarW, bh);
  }

  // Logo — 2줄 분리 + 글로우
  const t = Date.now();
  ctx.save(); ctx.translate(W/2, H*0.33);
  const p = 1 + Math.sin(t*0.002)*0.015; ctx.scale(p, p);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // "NANO" — 가볍고 얇은 스타일
  const nanoSize = sz(48);
  ctx.font = `200 ${nanoSize}px sans-serif`;
  ctx.letterSpacing = `${nanoSize * 0.3}px`;
  // 글로우 레이어
  ctx.shadowColor = 'rgba(100,180,255,0.6)'; ctx.shadowBlur = 30;
  ctx.fillStyle = 'rgba(180,210,255,0.9)';
  ctx.fillText('N A N O', 0, -nanoSize * 0.55);
  ctx.shadowBlur = 0;

  // 구분선 — 그라데이션 + 펄스
  const lineW = sz(280);
  const lineAlpha = 0.4 + Math.sin(t*0.003)*0.15;
  const lineGrad = ctx.createLinearGradient(-lineW/2, 0, lineW/2, 0);
  lineGrad.addColorStop(0, `rgba(100,180,255,0)`);
  lineGrad.addColorStop(0.3, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(0.5, `rgba(200,160,255,${lineAlpha + 0.2})`);
  lineGrad.addColorStop(0.7, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(1, `rgba(100,180,255,0)`);
  ctx.fillStyle = lineGrad;
  ctx.fillRect(-lineW/2, -2, lineW, 3);
  // 라인 위 작은 빛 점 이동
  const dotX = (Math.sin(t*0.002) * lineW * 0.4);
  ctx.beginPath(); ctx.arc(dotX, -0.5, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
  ctx.fill(); ctx.shadowBlur = 0;

  // "RHYTHM" — 굵고 강렬한 스타일
  const rhythmSize = sz(62);
  ctx.font = `900 ${rhythmSize}px sans-serif`;
  // 보라→파랑 그라데이션 텍스트
  const txtGrad = ctx.createLinearGradient(-rhythmSize*2, 0, rhythmSize*2, 0);
  txtGrad.addColorStop(0, '#b060ff');
  txtGrad.addColorStop(0.5, '#e0c0ff');
  txtGrad.addColorStop(1, '#60a0ff');
  ctx.fillStyle = txtGrad;
  ctx.shadowColor = 'rgba(160,100,255,0.7)'; ctx.shadowBlur = 40;
  ctx.fillText('RHYTHM', 0, rhythmSize * 0.55);
  ctx.shadowBlur = 0;

  ctx.restore();

  // 하단 안내
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font=`${sz(14)}px sans-serif`;
  const promptAlpha = 0.5 + Math.sin(t*0.003)*0.25;
  ctx.fillStyle=`rgba(180,170,230,${promptAlpha})`;
  const promptText = titleBgmUnlocked ? 'TAP TO START' : 'TOUCH TO BEGIN';
  ctx.fillText(promptText, W/2, H*0.68);

  // 설정 버튼 (우상단)
  const stBtnW = 44, stBtnH = 34, stBtnX = W - stBtnW - 10, stBtnY = H - stBtnH - 10;

  // Coin display (설정 버튼 왼쪽)
  if (currentUser) {
    ctx.font=`bold ${sz(13)}px sans-serif`;
    ctx.textAlign='right'; ctx.fillStyle='#ffd700aa';
    ctx.fillText(getCoins().toLocaleString()+' 코인', stBtnX - 10, H - stBtnH/2 - 3);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(stBtnX, stBtnY, stBtnW, stBtnH, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; rrStroke(stBtnX, stBtnY, stBtnW, stBtnH, 8);
  ctx.font = '18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('⚙', stBtnX + stBtnW/2, stBtnY + stBtnH/2);
  ctx.textBaseline = 'alphabetic';
}

// Select screen layout helper
let selectParticles = [];
function updateSelectParticles() {
  // Spawn
  const spawnCount = selectParticles.length < 50 ? 2 : 0;
  for (let s = 0; s < spawnCount; s++) {
    const sc = songs[selectedSong] ? songs[selectedSong].color : '#fff';
    selectParticles.push({
      x: Math.random() * W, y: H + 5 + Math.random()*20,
      vx: (Math.random()-0.5)*0.5, vy: -(0.3+Math.random()*0.8),
      size: 2.5+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
      color: sc
    });
  }
  for (let i = selectParticles.length-1; i >= 0; i--) {
    const p = selectParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vx += (Math.random()-0.5)*0.03;
    if (p.life <= 0 || p.y < -10) selectParticles.splice(i,1);
  }
}

function getSelectLayout() {

    ctx.strokeStyle = 'rgba(120,100,200,0.2)'; ctx.lineWidth = 1;
    rrStroke(cpX, cpY, chartPanelW, cpH, 10);

    // 탭 버튼
    const tabH = 24, tabGap = 3;
    const tabW = (chartPanelW - 12 - tabGap * 3) / 4;
    for (let ti = 0; ti < 4; ti++) {
      const tx = cpX + 6 + ti * (tabW + tabGap);
      const ty = cpY + 6;
      const sel = ti === chartTab;
      ctx.fillStyle = sel ? 'rgba(120,80,220,0.5)' : 'rgba(255,255,255,0.05)';
      rrFill(tx, ty, tabW, tabH, 5);
      if (sel) { ctx.strokeStyle = 'rgba(160,130,255,0.6)'; ctx.lineWidth = 1; rrStroke(tx, ty, tabW, tabH, 5); }
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${Math.min(9, tabW*0.35)}px sans-serif`;
      ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.4)';
      ctx.fillText(CHART_TABS[ti].label, tx + tabW/2, ty + tabH/2);
    }

    // 차트 리스트
    const listY = cpY + 6 + tabH + 8;
    const listH = cpH - tabH - 20;
    const itemH = 36;
    const maxVisible = Math.floor(listH / itemH);
    ctx.save();
    ctx.beginPath();
    ctx.rect(cpX, listY, chartPanelW, listH);
    ctx.clip();

    if (chartCache.length === 0) {
      ctx.font = `${sz(11)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillText('정보가 없습니다', cpX + chartPanelW/2, listY + 30);
    }
    for (let ci = 0; ci < Math.min(chartCache.length, maxVisible); ci++) {
      const item = chartCache[ci];
      const iy = listY + ci * itemH - chartScroll * itemH;
      if (iy + itemH < listY || iy > listY + listH) continue;
      const s = songs[item.idx];
      const isSel = item.idx === selectedSong;

      // 순위 변동 표시
      const prevRank = chartPrevRanks[item.idx];
      let rankChange = 0;
      if (prevRank !== undefined) rankChange = prevRank - ci; // 양수=상승

      // 배경 (선택된 곡 하이라이트)
      if (isSel) {
        ctx.fillStyle = s.color + '25';
        rrFill(cpX + 4, iy + 1, chartPanelW - 8, itemH - 2, 6);
      }

      // 순위 번호
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${ci < 3 ? 14 : 12}px sans-serif`;
      ctx.fillStyle = ci === 0 ? '#ffd700' : ci === 1 ? '#c0c0c0' : ci === 2 ? '#cd7f32' : 'rgba(255,255,255,0.4)';
      ctx.fillText(ci + 1, cpX + 24, iy + itemH/2);

      // 순위 변동 화살표
      if (rankChange > 0) {
        ctx.fillStyle = '#44dd66'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('▲' + rankChange, cpX + 26, iy + itemH/2);
      } else if (rankChange < 0) {
        ctx.fillStyle = '#ff4466'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('▼' + Math.abs(rankChange), cpX + 26, iy + itemH/2);
      }

      // 곡 이름
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = `${Math.min(11, chartPanelW * 0.06)}px sans-serif`;
      ctx.fillStyle = isSel ? '#fff' : 'rgba(255,255,255,0.65)';
      const nameMaxW = chartPanelW - 70;
      const nameText = s.name.length > 14 ? s.name.slice(0, 13) + '..' : s.name;
      ctx.fillText(nameText, cpX + 42, iy + itemH/2 - 6);

      // 플레이 수
      ctx.font = `${Math.min(9, chartPanelW * 0.045)}px sans-serif`;
      ctx.fillStyle = s.color + (isSel ? 'cc' : '77');
      ctx.fillText(item.count + ' plays', cpX + 42, iy + itemH/2 + 8);

      // HOT 탭이면 실시간 불꽃 이펙트 (1위)
      if (chartTab === 0 && ci === 0 && item.count > 0) {
        ctx.fillStyle = '#ffd700';
        ctx.font = '10px sans-serif';
        ctx.fillText('🔥', cpX + chartPanelW - 22, iy + itemH/2);
      }
    }
    ctx.restore();

    // "CHART" 라벨
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${Math.min(10, chartPanelW*0.055)}px sans-serif`;
    ctx.fillStyle = 'rgba(160,140,255,0.5)';
    ctx.fillText('CHART', cpX + chartPanelW/2, cpY - 8);
    ctx.restore();
  }

  // 설정 버튼 (우상단)
  const selStBtnW = 44, selStBtnH = 34, selStBtnX = W - selStBtnW - 10, selStBtnY = H - selStBtnH - 10;
  ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(selStBtnX, selStBtnY, selStBtnW, selStBtnH, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; rrStroke(selStBtnX, selStBtnY, selStBtnW, selStBtnH, 8);
  ctx.font = '18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('⚙', selStBtnX + selStBtnW/2, selStBtnY + selStBtnH/2);
  ctx.textBaseline = 'alphabetic';

  // Search filter dropdown (drawn last for z-order)
  if (searchActive && searchText) {
    const filterItemH = 38;
    const dropY = searchBarY + searchBarH + 4;
    if (searchFiltered.length > 0) {
      const filterDropdownH = searchFiltered.length * filterItemH + 8;
      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = '#ffd70044'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      searchFiltered.forEach((songIdx, fi) => {
        const iy = dropY + 4 + fi * filterItemH;
        const isHl = fi === searchHighlight;
        if (isHl) {
          ctx.fillStyle = songs[songIdx].color + '33';
          rrFill(cxBase + 4, iy, optW - 8, filterItemH - 2, 6);
        }
        ctx.textAlign = 'left';
        ctx.font = `bold ${sz(14)}px sans-serif`;
        ctx.fillStyle = isHl ? '#fff' : 'rgba(255,255,255,0.6)';
        ctx.fillText(songs[songIdx].name, cxBase + 14, iy + filterItemH * 0.45);
        ctx.font = `${sz(11)}px sans-serif`;
        ctx.fillStyle = songs[songIdx].color + (isHl ? 'cc' : '77');
        ctx.fillText(songs[songIdx].sub + '  ·  ' + songs[songIdx].bpm + ' BPM', cxBase + 14, iy + filterItemH * 0.78);
      });
    } else {
      const filterDropdownH = 36;
      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.textAlign = 'center'; ctx.font = '12px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText('검색 결과 없음', cxBase + optW/2, dropY + filterDropdownH/2 + 4);
    }
  }
}

// ===== ACHIEVEMENT SCREEN =====
function renderAchievement() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;

  // Back button
  const bbW = 70, bbH = 38, bbX = 12, bbY = H - bbH - 10;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, 8);
  ctx.textAlign='center'; ctx.font=`bold ${sz(13)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('← 뒤로', bbX+bbW/2, bbY+bbH*0.65);

  // Title + coin
  ctx.font=`bold ${sz(24)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  const achTitle = achievementSongFilter >= 0 ? songs[achievementSongFilter].name + ' 업적' : '업적';
  ctx.fillText(achTitle,W/2,H*0.06+10); ctx.shadowBlur=0;
  ctx.font=`bold ${sz(13)}px sans-serif`;
  ctx.fillStyle='#ffd700'; ctx.textAlign='right';
  ctx.fillText(getCoins().toLocaleString()+' 코인', W - 54 - 10, H - 27);

  // Type tabs
  const tabW = sz(300);
  const tabBtnW = tabW / ACH_TABS.length;
  const tabX = (W - tabW) / 2, tabY = H*0.12;
  ACH_TABS.forEach((tab, i) => {
    const bx = tabX + i * tabBtnW, sel = i === achievementTab;
    ctx.fillStyle = sel ? '#ffd70033' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, 28);
    if (sel) { ctx.fillStyle='#ffd700'; ctx.fillRect(bx, tabY+25, tabBtnW, 3); }
    ctx.textAlign='center';
    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? '#ffd700' : 'rgba(255,255,255,0.4)';
    ctx.fillText(tab.icon+' '+tab.label, bx+tabBtnW/2, tabY+18);
  });

  // Filter and progress
  const curType = ACH_TABS[achievementTab].key;
  const unlocked = getUnlocked();
  const filtered = ALL_ACHIEVEMENTS.filter(a => a.type === curType && (achievementSongFilter < 0 || a.songIdx === achievementSongFilter));
  const unlockedCount = filtered.filter(a => unlocked[a.id]).length;

  // Progress bar
  const progW = sz(200), progH = 4;
  const progX = (W-progW)/2, progY = tabY + 36;
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(progX, progY, progW, progH);
  ctx.fillStyle='#ffd700'; ctx.fillRect(progX, progY, progW*(unlockedCount/Math.max(1,filtered.length)), progH);
  ctx.font=`${sz(10)}px sans-serif`; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText(unlockedCount+' / '+filtered.length+' 달성', W/2, progY+16);

  // Grouped rows
  const listY = progY + 26, rowH = 34;
  const listW = sz(340);
  const listX = (W - listW) / 2;
  const rows = getAchRows();

  const maxVisible = Math.floor((H - listY - 30) / rowH);
  const maxScroll = Math.max(0, rows.length - maxVisible);
  if (achievementScroll > maxScroll) achievementScroll = maxScroll;
  const end = Math.min(rows.length, achievementScroll + maxVisible);

  for (let i = achievementScroll; i < end; i++) {
    const row = rows[i];
    const ry = listY + (i - achievementScroll) * rowH;

    if (row.type === 'header') {
      // Song header row
      ctx.fillStyle = row.song.color + '18';
      rrFill(listX, ry, listW, rowH - 3, 6);
      ctx.fillStyle = row.song.color + '44'; ctx.fillRect(listX+3, ry+4, 4, rowH-11);
      ctx.textAlign='left';
      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = row.song.color;
      ctx.fillText(row.song.name, listX+14, ry+rowH*0.55);
      ctx.textAlign='right';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(row.songDone+'/'+row.songTotal, listX+listW-10, ry+rowH*0.55);
    } else {
      const a = row.ach, done = row.done;
      // Achievement row
      ctx.fillStyle = done ? '#ffd70008' : 'rgba(255,255,255,0.015)';
      rrFill(listX+8, ry, listW-16, rowH - 3, 5);
      if (done) {
        ctx.strokeStyle='#ffd70022'; ctx.lineWidth=1; rrStroke(listX+8, ry, listW-16, rowH-3, 5);
      }

      // Check / lock
      ctx.textAlign='center';
      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = done ? '#44dd66' : 'rgba(255,255,255,0.15)';
      ctx.fillText(done ? '✓' : '○', listX+24, ry+rowH*0.55);

      // Label (without song name, since it's under the header)
      ctx.textAlign='left';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = done ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      // Strip song name from label for cleaner display
      const shortLabel = a.label.replace(/^.+? — /, '');
      ctx.fillText(shortLabel, listX+40, ry+rowH*0.55);

      // Claim button / coins
      ctx.textAlign='right';
      ctx.font=`bold ${sz(11)}px sans-serif`;
      if (done && !row.claimed) {
        // Claimable - draw button
        const cbW = 52, cbH = 20, cbX = listX+listW-16-cbW, cbY = ry + (rowH-3-cbH)/2;
        ctx.fillStyle = '#ffd70033'; rrFill(cbX, cbY, cbW, cbH, 5);
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1; rrStroke(cbX, cbY, cbW, cbH, 5);
        ctx.textAlign='center';
        ctx.font=`bold ${sz(10)}px sans-serif`;
        ctx.fillStyle = '#ffd700';
        ctx.fillText('+'+a.coins+' 받기', cbX+cbW/2, cbY+cbH*0.65);
      } else if (done && row.claimed) {
        ctx.fillStyle = '#44dd6688';
        ctx.fillText('수령완료', listX+listW-16, ry+rowH*0.55);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillText('+'+a.coins, listX+listW-16, ry+rowH*0.55);
      }
    }
  }

  if (rows.length === 0) {
    ctx.font=`${sz(14)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('업적이 없습니다', W/2, listY+40);
  }

  // Help
  ctx.textAlign='center'; ctx.font='11px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('←→ 카테고리  ·  ↑↓ 스크롤  ·  ESC 돌아가기',W/2,H-16);
}

function renderRanking() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song = songs[selectedSong];

  // Back button
  const bbW = 70, bbH = 38, bbX = 12, bbY = H - bbH - 10;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, 8);
  ctx.textAlign='center'; ctx.font=`bold ${sz(13)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('← 뒤로', bbX+bbW/2, bbY+bbH*0.65);

  ctx.font=`bold ${sz(26)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;

  ctx.font=`bold ${sz(13)}px sans-serif`;
  ctx.fillStyle='#ffd700'; ctx.textAlign='right';
  ctx.fillText(getCoins().toLocaleString()+' 코인', W - 54 - 10, H - 27);

  // Song name
  ctx.font=`${sz(15)}px sans-serif`;
  ctx.fillStyle=song.color;
  ctx.fillText(song.name+' — '+song.sub,W/2,H*0.13);

  const tabW = sz(280);
  const tabBtnW = tabW / DIFFICULTIES.length;
  const tabX = (W - tabW) / 2, tabY = H*0.17;
  DIFFICULTIES.forEach((d, i) => {
    const bx = tabX + i * tabBtnW, sel = i === selectedDiff;
    ctx.fillStyle = sel ? d.color+'33' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, 28);
    if (sel) { ctx.fillStyle = d.color; ctx.fillRect(bx, tabY+25, tabBtnW, 3); }
    ctx.textAlign='center';
    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.4)';
    ctx.fillText(d.name, bx + tabBtnW/2, tabY + 18);

  // Rankings list
  const rankings = getRankings(selectedSong, selectedDiff);
