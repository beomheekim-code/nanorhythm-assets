// ===== AUDIO ENGINE =====
let actx, drumBus, bgBus, masterGain, noiseBuffer;
let songStartTime = 0, nextSixteenth = 0;
// Preview system
let previewGain, previewDrumBus, previewBgBus;
let previewSongIdx = -1, previewStartTime = 0, previewNextSixteenth = 0;
const PREVIEW_DURATION = 30; // seconds
let previewActive = false;

function initAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.6;
  masterGain.connect(actx.destination);
  drumBus = actx.createGain(); drumBus.gain.value = 0.65; drumBus.connect(masterGain);
  bgBus = actx.createGain(); bgBus.gain.value = 0.5; bgBus.connect(masterGain);
  // Preview buses (lower volume)
  previewGain = actx.createGain(); previewGain.gain.value = 0.35;
  previewGain.connect(actx.destination);
  previewDrumBus = actx.createGain(); previewDrumBus.gain.value = 0.5; previewDrumBus.connect(previewGain);
  previewBgBus = actx.createGain(); previewBgBus.gain.value = 0.4; previewBgBus.connect(previewGain);
  const sz = actx.sampleRate;
  noiseBuffer = actx.createBuffer(1, sz, actx.sampleRate);
  const d = noiseBuffer.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
}
function resumeAudio() { if (!actx) initAudio(); if (actx.state === 'suspended') actx.resume(); }

const PREVIEW_FADE_OUT = 3; // last 3 seconds fade out
const PREVIEW_FADE_IN = 1.5; // first 1.5 seconds fade in
const PREVIEW_GAP = 0.5; // 0.5s silence between loops

const clickSfx = new Audio('click.mp3');
clickSfx.volume = 0.5;
function playClickSfx() {
  clickSfx.currentTime = 0;
  clickSfx.play().catch(() => {});
}

function playKick(t) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(30,t+0.15);
  g.gain.setValueAtTime(0.85,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  o.connect(g); g.connect(drumBus); o.start(t); o.stop(t+0.25);
}
function playSnare(t) {
  const src = actx.createBufferSource(); src.buffer = noiseBuffer;
  const f = actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=3500; f.Q.value=0.8;
  const g = actx.createGain(); g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  src.connect(f); f.connect(g); g.connect(drumBus); src.start(t); src.stop(t+0.1);
  const o = actx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(60,t+0.07);
  const g2 = actx.createGain(); g2.gain.setValueAtTime(0.3,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.07);
  o.connect(g2); g2.connect(drumBus); o.start(t); o.stop(t+0.07);
}
function playHat(t) {
  const src = actx.createBufferSource(); src.buffer = noiseBuffer;
  const f = actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000;
  const g = actx.createGain(); g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.035);
  src.connect(f); f.connect(g); g.connect(drumBus); src.start(t); src.stop(t+0.035);
}
function playBass(t, freq, dur, type) {
  const o = actx.createOscillator(); o.type = type||'sawtooth'; o.frequency.setValueAtTime(freq,t);
  const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(450,t); f.frequency.exponentialRampToValueAtTime(100,t+dur);
  const g = actx.createGain(); g.gain.setValueAtTime(0.28,t); g.gain.setValueAtTime(0.28,t+dur*0.7); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(f); f.connect(g); g.connect(bgBus); o.start(t); o.stop(t+dur);
}
function playPad(t, freqs, dur) {
  freqs.forEach(freq => {
    const o = actx.createOscillator(); o.type='sine'; o.frequency.value=freq;
    const g = actx.createGain(); g.gain.setValueAtTime(0.001,t);
    g.gain.linearRampToValueAtTime(0.04,t+Math.min(0.4,dur*0.15));
    g.gain.setValueAtTime(0.04,t+dur-Math.min(0.4,dur*0.15));
    g.gain.linearRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(bgBus); o.start(t); o.stop(t+dur);
  });
}
function playMelodyHit(freq, type) {
  if (!actx) return; const t = actx.currentTime;
  // Punchy percussion tap: short sine click + filtered noise snap
  const click = actx.createOscillator();
  const clickG = actx.createGain();
  click.type = 'sine';
  click.frequency.setValueAtTime(1200, t);
  click.frequency.exponentialRampToValueAtTime(300, t + 0.04);
  clickG.gain.setValueAtTime(0.35, t);
  clickG.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  click.connect(clickG); clickG.connect(masterGain);
  click.start(t); click.stop(t + 0.06);
  // Noise snap for crispness
  const snap = actx.createBufferSource(); snap.buffer = noiseBuffer;
  const snapF = actx.createBiquadFilter(); snapF.type = 'bandpass'; snapF.frequency.value = 4000; snapF.Q.value = 1.5;
  const snapG = actx.createGain();
  snapG.gain.setValueAtTime(0.18, t);
  snapG.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  snap.connect(snapF); snapF.connect(snapG); snapG.connect(masterGain);
  snap.start(t); snap.stop(t + 0.04);
}
function playDissonance() {
  if (!actx) return; const t = actx.currentTime;
  // Tritone + minor 2nd cluster = maximum dissonance
  [82.41, 87.31, 116.54, 123.47, 155.56].forEach(f => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(f, t);
    o.frequency.setValueAtTime(f * (0.98 + Math.random()*0.04), t + 0.05);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.4);
  });
  // Noise burst
  const src = actx.createBufferSource(); src.buffer = noiseBuffer;
  const bf = actx.createBiquadFilter(); bf.type='bandpass'; bf.frequency.value=800; bf.Q.value=2;
  const bg = actx.createGain(); bg.gain.setValueAtTime(0.2, t); bg.gain.exponentialRampToValueAtTime(0.001, t+0.25);
  src.connect(bf); bf.connect(bg); bg.connect(masterGain); src.start(t); src.stop(t+0.25);
}

// Hold note sustained sound — soft filtered noise shimmer
function startHoldSound(node) {
  if (!actx) return;
  if (usingStemMode) {
    // 스템 모드: 해당 레인 스템을 풀 볼륨으로 유지
    stemBoost(node.lane);
    node._holdStemMode = true;
    return;
  }
  const t = actx.currentTime;
  // Sustained filtered noise (shimmering whoosh)
  const src = actx.createBufferSource(); src.buffer = noiseBuffer; src.loop = true;
  const f = actx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2500; f.Q.value = 3;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(0.10, t + 0.05);
  src.connect(f); f.connect(g); g.connect(masterGain);
  src.start(t);
  node._ho1 = src; node._ho2 = f; node._hg = g;
}

function stopHoldSound(node) {
  if (node._holdStemMode) {
    // 스템 모드: 홀드 끝나면 자연스럽게 lerp로 복귀 (별도 처리 불필요)
    node._holdStemMode = false;
    return;
  }
  if (!node._hg) return;
  const t = actx.currentTime;
  try {
    node._hg.gain.cancelScheduledValues(t);
    node._hg.gain.setValueAtTime(node._hg.gain.value, t);
    node._hg.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  } catch(e) {}
  const src = node._ho1;
  setTimeout(() => { try { src.stop(); } catch(e) {} }, 100);
  node._ho1 = null; node._ho2 = null; node._hg = null;
}

// ===== STEM-BASED AUDIO SYSTEM (DJMAX-style) =====
const STEM_VOL_FULL = 0.80;
const STEM_VOL_MUTED = 0;  // 미스 시 완전 뮤트
// 7개 스템 각각의 목표 볼륨
let stemTargetVols = [];

function initStemTargets() {
  stemTargetVols = [];
  stemPulses = [];
  const cnt = curSong && curSong.stemNames ? curSong.stemNames.length : 7;
  for (let i = 0; i < cnt; i++) { stemTargetVols.push(STEM_VOL_FULL); stemPulses.push(null); }
}

function stemBoost(lane) {
  LANE_STEMS[lane].forEach(si => { if (si < stemTargetVols.length) stemTargetVols[si] = STEM_VOL_FULL; });
}
function stemDuck(lane) {
  LANE_STEMS[lane].forEach(si => { if (si < stemTargetVols.length) stemTargetVols[si] = STEM_VOL_MUTED; });
}
function stemBoostAll() {
  for (let i = 0; i < stemTargetVols.length; i++) stemTargetVols[i] = STEM_VOL_FULL;
}
function stemDuckAll() {
  for (let i = 0; i < stemTargetVols.length; i++) stemTargetVols[i] = STEM_VOL_MUTED;
}

// 스템 펄스 시스템 (허공 입력용)
let stemPulses = []; // 인덱스별 { start, peak, dur } 또는 null

function updateStemVolumes(dt) {
  if (usingStemMode) {
    const now = performance.now();
    for (let i = 0; i < allStemAudios.length; i++) {
      if (!allStemAudios[i]) continue;
      // 펄스 활성 중이면 펄스 볼륨 우선
      if (stemPulses[i]) {
        const elapsed = now - stemPulses[i].start;
        if (elapsed >= stemPulses[i].dur) {
          stemPulses[i] = null; // 펄스 끝 → 일반 lerp로 복귀
        } else {
          const pulseVol = stemPulses[i].peak * (1 - elapsed / stemPulses[i].dur);
          const tgt = stemTargetVols[i] !== undefined ? stemTargetVols[i] : STEM_VOL_FULL;
          // 노트 히트(tgt=FULL)면 히트가 우선, 아니면 펄스 볼륨
          allStemAudios[i].volume = Math.max(tgt, pulseVol);
          continue;
        }
      }
      // 일반 lerp — duck은 즉시 반응, boost는 부드럽게
      const cur = allStemAudios[i].volume;
      const tgt = stemTargetVols[i] !== undefined ? stemTargetVols[i] : STEM_VOL_FULL;
      if (tgt < cur) {
        // 뮤트 방향: 즉시 적용 (1프레임 안에 도달)
        allStemAudios[i].volume = tgt;
      } else {
        // 부스트 방향: 부드럽게
        const speed = 20;
        allStemAudios[i].volume = Math.max(0, Math.min(1, cur + (tgt - cur) * Math.min(1, speed * dt)));
      }
    }
  } else if (songAudio) {
    // 폴백: 전체 BGM 볼륨 (스템 타겟 평균)
    const avgTgt = stemTargetVols.length > 0
      ? stemTargetVols.reduce((a,b) => a+b, 0) / stemTargetVols.length
      : STEM_VOL_FULL;
    const cur = songAudio.volume;
    if (avgTgt < cur) {
      songAudio.volume = avgTgt; // 뮤트 방향: 즉시
    } else {
      songAudio.volume = Math.max(0, Math.min(1, cur + (avgTgt - cur) * Math.min(1, 20 * dt)));
    }
  }
}

// 히트 시 경쾌한 피드백 클릭
function playHitSfx() {
  if (!actx) return;
  if (usingStemMode) return; // 스템 모드에서는 스템 부스트가 피드백 역할
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(1000, t);
  o.frequency.exponentialRampToValueAtTime(400, t + 0.02);
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.03);
}

// 홀드 시작 효과음
function playHoldStartSfx() {
  if (!actx) return;
  if (usingStemMode) return; // 스템 모드에서는 스템 부스트가 피드백 역할
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(800, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.04);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t + 0.06);
}

// ===== 허공 입력 =====
// BGM 재생 중: 해당 레인 스템을 순간 펄스 (볼륨 즉시 올리고 lerp가 빠르게 내림)
// BGM 재생 전: 짧은 탭 폴백음
const EMPTY_TAP_FREQS = [200, 300, 500, 700, 900];

function playEmptyPressSfx(lane) {
  if (!actx) return;
  // 스템 모드 → 0.5초 펄스 (자연스러운 페이드아웃)
  if (usingStemMode) {
    const now = performance.now();
    LANE_STEMS[lane].forEach(si => {
      if (!allStemAudios[si]) return;
      allStemAudios[si].volume = 0.5;
      stemPulses[si] = { start: now, peak: 0.5, dur: 500 };
    });
    return;
  }
  // 폴백: 짧은 탭음 (카운트다운 중 또는 비스템 모드)
  const t = actx.currentTime;
  const freq = EMPTY_TAP_FREQS[lane];
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.03);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t + 0.03);
}

// ===== SONG AUDIO =====
let songAudio = null;
let songPreviewAudio = null;
let usingStemMode = false;
let allStemAudios = [];  // 7 Audio elements for all stems

// ===== LEVEL RATING =====
// 곡+난이도별 레벨(1~15) 계산: 노트 밀도, BPM, 홀드, 트랩 고려
function calcLevel(songIdx, diffIdx) {
  const song = songs[songIdx];
  const diff = DIFFICULTIES[diffIdx];
  const pat = song.pattern;
  const patHits = pat.filter(v => v).length; // 16비트 중 노트 있는 수
  const patDensity = patHits / 16; // 0~1
  // 기본 요소들
  const bpmScore = song.bpm / 60;              // 빠를수록 높음 (1.5~2.7)
  const densityScore = patDensity * 5;          // 패턴 밀도 (0~5)
  const diffMul = diff.noteDensity;             // 난이도 밀도 배율 (0.5~1.3)
  const holdScore = diff.holdEvery > 0 ? (20 / diff.holdEvery) : 0;  // 홀드 빈도
  const trapScore = diff.trapInterval > 0 ? (10 / diff.trapInterval) : 0; // 트랩 빈도
  const drainScore = diff.hpDrain * 15;         // HP 감소 (0.3~1.5)
  // 종합 점수
  const raw = (bpmScore + densityScore) * diffMul + holdScore + trapScore + drainScore;
  // 1~15 범위로 매핑 (raw 범위 약 1~15)
  return Math.max(1, Math.min(15, Math.round(raw)));
}

function generateAchievements() {
  const achs = [];

    // Grade achievements

      const minPct = g==='S'?0.98:g==='A'?0.90:g==='B'?0.80:0.60;
      achs.push({ id:`s${si}_grade_${g}`, songIdx:si, type:'grade',
        label:`${s.name} — ${g}등급 이상 클리어`, coins: GRADE_COINS[g],
        check: d => d.songIdx===si && d.gauge>0 && d.pct>=minPct });
    });
    // Score achievements
    SCORE_THRESHOLDS.forEach(t => {
      achs.push({ id:`s${si}_score_${t}`, songIdx:si, type:'score',
        label:`${s.name} — ${t.toLocaleString()}점 이상`, coins: SCORE_COINS[t],
        check: d => d.songIdx===si && d.score>=t });
    });
    // Difficulty achievements
    DIFFICULTIES.forEach((d, di) => {
      achs.push({ id:`s${si}_diff_${di}`, songIdx:si, type:'diff',
        label:`${s.name} — ${d.name} 클리어`, coins: DIFF_COINS[di],
        check: dd => dd.songIdx===si && dd.diffIdx===di && dd.gauge>0 });
    });
    // Speed achievements
    SPEED_OPTIONS.forEach((sp, spi) => {
      achs.push({ id:`s${si}_speed_${spi}`, songIdx:si, type:'speed',
        label:`${s.name} — ${sp.toFixed(1)}x 클리어`, coins: SPEED_COINS[spi] || 100,
        check: d => d.songIdx===si && d.speedIdx===spi && d.gauge>0 });
    });
  });
  return achs;
}

fbDb.ref('plays').on('value', snap => {
  fbPlayData = snap.val() || {};
  fbConnected = true;
  chartLastUpdate = 0; // 차트 즉시 갱신
}, () => { fbConnected = false; });

function recordPlay(songIdx) {
  const key = 'song_' + songIdx;
  const now = Date.now();
  // 로컬에 항상 저장
  saveLocalPlay(songIdx);
  // Firebase에도 시도
  try {
    fbDb.ref('plays/' + key + '/logs').push(now);
    fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + 1);
  } catch(e) {}
}

// Firebase 데이터와 로컬 데이터를 병합하여 반환
function getMergedPlayData(songIdx) {
  const key = 'song_' + songIdx;
  const fbEntry = fbPlayData[key] || {};
  const localEntry = getLocalPlays()[key] || {};
  if (fbConnected && fbEntry.total) return fbEntry;
  // Firebase 미연결 또는 데이터 없으면 로컬 사용
  const localLogs = localEntry.logs || [];
  return {
    total: Math.max(fbEntry.total || 0, localEntry.total || 0),
    logs: fbEntry.logs ? Object.values(fbEntry.logs).concat(localLogs) : localLogs
  };
}

function getChartData(type) {
  const now = Date.now();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const weekStart = new Date(todayStart); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const hourAgo = now - 60*60*1000;

  const list = [];
  for (let i = 0; i < songs.length; i++) {
    const entry = getMergedPlayData(i);
    const total = entry.total || 0;
    const logs = Array.isArray(entry.logs) ? entry.logs : (entry.logs ? Object.values(entry.logs) : []);
    let count = 0;
    if (type === 'top') count = total;
    else if (type === 'daily') count = logs.filter(t => t >= todayStart.getTime()).length;
    else if (type === 'weekly') count = logs.filter(t => t >= weekStart.getTime()).length;
    else if (type === 'hot') count = logs.filter(t => t >= hourAgo).length;
    list.push({ idx: i, count });
  }
  list.sort((a, b) => b.count - a.count || a.idx - b.idx);
  return list;
}

// ===== SCREEN FADE TRANSITION =====
let fadeAlpha = 0;        // 0=투명, 1=검정
let fadeDir = 0;          // 1=페이드아웃(어두워짐), -1=페이드인(밝아짐), 0=없음
let fadeSpeed = 3.5;      // 초당 알파 변화량
let fadePendingState = null;
let fadePendingCallback = null;

function transitionTo(newState, callback) {
  if (fadeDir !== 0) return; // 이미 전환 중
  fadePendingState = newState;
  fadePendingCallback = callback || null;
  fadeDir = 1; // 페이드아웃 시작
}

function updateFade(dt) {
  if (fadeDir === 0) return;
  fadeAlpha += fadeDir * fadeSpeed * dt;
  if (fadeDir === 1 && fadeAlpha >= 1) {
    fadeAlpha = 1;
    // 화면이 완전히 어두워짐 → 상태 전환
    if (fadePendingState) { state = fadePendingState; fadePendingState = null; }
    if (fadePendingCallback) { fadePendingCallback(); fadePendingCallback = null; }
    fadeDir = -1; // 페이드인 시작
  } else if (fadeDir === -1 && fadeAlpha <= 0) {
    fadeAlpha = 0;
    fadeDir = 0; // 전환 완료
  }
}

function renderFade() {
  if (fadeAlpha <= 0) return;
  ctx.globalAlpha = fadeAlpha;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;
}

// ===== SEEDED RNG =====
function seededRng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// ===== NODE GENERATION =====
function generateNodes(song, diff) {
  nodes = [];
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);

  const sixteenthDur = 15 / song.bpm;
  const eighthDur = sixteenthDur * 2;
  const totalSixteenths = song.bars * 16;
  const startDelay = 3;
  let noteIdx = 0;
  const density = diff.noteDensity;
  const pat = song.pattern;

  // Generate notes from rhythm pattern
  for (let i = 0; i < totalSixteenths; i++) {
    const pos = i % 16;
    if (!pat[pos]) continue;
    // Density filtering
    if (density < 1 && rng() > density) continue;
    // For hell mode, sometimes add extra notes on off-beats
    if (density > 1 && pos % 2 === 1 && rng() < (density - 1) * 0.5) {
      const eLane = Math.floor(rng() * 5);
      const eFreq = 440;
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: eLane, freq: eFreq, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
    }
    const lane = LANE_SEQ[noteIdx % LANE_SEQ.length];
    const freq = 440;
    const nd = {
      time: i * sixteenthDur + startDelay,
      lane, freq, type: 'note',
      hit: false, missed: false,
      holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    // Hold notes based on difficulty
    if (diff.holdEvery > 0 && noteIdx > 0 && noteIdx % diff.holdEvery === 0 && i + 6 < totalSixteenths) {
      const holdLen = 2 + Math.floor(rng() * 2);
      nd.type = 'hold';
      nd.endTime = nd.time + holdLen * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;
  }

  // Remove notes that overlap with hold durations in same lane
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  // Traps based on difficulty
  const trapInt = diff.trapInterval;
  if (trapInt > 0) {
    for (let i = 20; i < totalSixteenths; i += trapInt * 2 + Math.floor(rng() * Math.max(1, trapInt * 2))) {
      const t = i * sixteenthDur + startDelay;
      const lane = Math.floor(rng() * 5);
      let conflict = false;
      for (const n of nodes) {
        if (n.lane !== lane) continue;
        if (n.type === 'hold' && t >= n.time - eighthDur*0.5 && t <= n.endTime + eighthDur*0.5) { conflict = true; break; }
        if (Math.abs(n.time - t) < sixteenthDur * 0.8) { conflict = true; break; }
      }
      if (!conflict) nodes.push({ time: t, lane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);

  songDuration = totalSixteenths * sixteenthDur + startDelay + 2;
}

// 오디오 로드 후 실제 길이로 songDuration 갱신
function updateSongDurationFromAudio() {
  let audioDur = 0;
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && allStemAudios[0].duration) {
    audioDur = allStemAudios[0].duration;
  } else if (songAudio && songAudio.duration) {
    audioDur = songAudio.duration;
  }
  if (audioDur > 0 && isFinite(audioDur)) {
    // startDelay(카운트다운)를 더해서 게임 시간과 맞춤
    const startDelay = 3.5 + (60 / (curSong ? curSong.bpm : 120) / 4);
    songDuration = audioDur + startDelay;
  }
}

  }

    shakeX = (Math.random()-0.5)*18; shakeY = (Math.random()-0.5)*12;

  } else if (closest.type === 'hold') {

    if (usingStemMode) stemBoost(lane); else stemBoostAll();
    playHoldStartSfx();
    startHoldSound(closest);
    closest.holding = true;
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + 0.015 * fm);
    let pts, txt, col;
    if (closestDist < 22) { pts=100; txt='HOLD!'; col='#ffd700'; }
    else if (closestDist < 42) { pts=80; txt='HOLD!'; col='#00d4ff'; }
    else { pts=50; txt='HOLD'; col='#44dd66'; }
    score += Math.floor(pts * fm * (1 + combo * 0.02));
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.2;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], 6);
  } else {
    let pts, txt, col;
    let grade;
    if (closestDist < 28) { pts=200; txt='PERFECT'; col='#ffd700'; grade='perfect'; }
    else if (closestDist < 52) { pts=150; txt='GREAT'; col='#00d4ff'; grade='great'; }
    else { pts=100; txt='GOOD'; col='#44dd66'; grade='good'; }
    if (usingStemMode) stemBoost(lane); else stemBoostAll();
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + 0.015 * fm);
    score += Math.floor(pts * fm * (1 + combo * 0.02));
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.3;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], fever ? 15 : 10);
    spawnBurst(getLaneX(lane), hitY, grade);
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, sp = 60+Math.random()*180;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-60,
      life: 0.4+Math.random()*0.3, maxLife: 0.7, color, size: 3+Math.random()*5 });
  }
}

function spawnBurst(x, y, grade) {
  const conf = {
    perfect: { color1: '#ffd700', color2: '#fff7aa', color3: '#ff8800', rings: 5, sparks: 28, size: 2.0 },
    great:   { color1: '#00d4ff', color2: '#aaeeff', color3: '#0088ff', rings: 3, sparks: 18, size: 1.5 },
    good:    { color1: '#44dd66', color2: '#aaffbb', color3: '#22aa44', rings: 2, sparks: 10, size: 1.0 },
  }[grade];
  bursts.push({ x, y, time: 0, maxTime: 0.6, ...conf });
  // Big spark particles
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.PI * 2 * i / conf.sparks + (Math.random() - 0.5) * 0.4;
    const sp = (180 + Math.random() * 280) * conf.size;
    const col = Math.random() > 0.5 ? conf.color2 : conf.color1;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 120,
      life: 0.5 + Math.random()*0.4, maxLife: 0.9, color: col, size: 4 + Math.random()*7 });
  }
  // Extra scattered debris
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (60 + Math.random() * 350) * conf.size;
    particles.push({ x: x + (Math.random()-0.5)*20, y: y + (Math.random()-0.5)*10,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 150,
      life: 0.3 + Math.random()*0.5, maxLife: 0.8, color: conf.color3, size: 2 + Math.random()*5 });
  }
}

// ===== START SONG =====
function startSong(idx) {
  stopTitleBgm(); stopPreview(); stopSongPreview(); stopSongAudio(); resumeAudio();
  recordPlay(idx);
  curSongIdx = idx; curSong = songs[idx];
  curDiff = DIFFICULTIES[selectedDiff];
  const speedMul = selectedSpeed;
  noteSpeed = curSong.bpm * 2.8 * speedMul;
  generateNodes(curSong, curDiff);
  score=0; combo=0; maxCombo=0; collected=0; missed=0;
  keyHeld=[false,false,false,false,false]; keyFlash=[0,0,0,0,0];
  particles=[]; bursts=[]; holdGlows=[]; gameParticles=[]; countdownTime=3.5; gameTime=0;
  nextSixteenth=0; songStartTime=0;
  judgmentText=''; judgmentTimer=0; judgmentPriority=0; playerAnim=0; gauge=1; fever=false; feverTimer=0; feverFlash=0; feverParticles=[];
  // Try loading 7 stem files, fall back to single mp3
  usingStemMode = false;
  stemSyncTime = 0;
  initStemTargets();
  allStemAudios = [];
  const stemNames = curSong.stemNames || [];
  const stemCount = stemNames.length;
  if (curSong.stemDir && stemCount > 0) {
    let loaded = 0, failed = 0;
    for (let i = 0; i < stemCount; i++) {
      const path = curSong.stemDir + curSong.stemPrefix + '_' + stemNames[i] + '.mp3';
      const a = new Audio(path);
      a.volume = STEM_VOL_FULL;
      allStemAudios.push(a);
      a.addEventListener('canplaythrough', () => {
        loaded++;
        if (loaded === stemCount) {
          usingStemMode = true;
          updateSongDurationFromAudio();
          // 뮤트 상태로 재생 시작 (카운트다운 중 펄스 피드백용)
          for (let k = 0; k < allStemAudios.length; k++) {
            allStemAudios[k].volume = 0;
            stemTargetVols[k] = 0;
            allStemAudios[k].play().catch(()=>{});
          }
        }
      }, { once: true });
      a.addEventListener('error', () => {
        failed++;
        if (failed === 1) {
          for (let j = 0; j < allStemAudios.length; j++) {
            if (allStemAudios[j]) { allStemAudios[j].pause(); }
          }
          allStemAudios = [];
          songAudio = new Audio(curSong.file);
          songAudio.volume = 0.8;
          songAudio.addEventListener('canplaythrough', () => updateSongDurationFromAudio(), { once: true });
          songAudio.load();
        }
      }, { once: true });
      a.load();
    }
  } else {
    songAudio = new Audio(curSong.file);
    songAudio.volume = 0.8;
    songAudio.addEventListener('canplaythrough', () => updateSongDurationFromAudio(), { once: true });
    songAudio.load();
  }
}

// ===== UPDATE =====
function update(dt) {
  updateSelectScroll(dt);
  // Preview: start/switch when song selection changes in select state
  if (state === 'select' && actx) {
    if (previewSongIdx !== selectedSong) { startPreview(selectedSong); }
    schedulePreview();
  } else if (previewActive) {
    stopPreview();
  }
  shakeX *= 0.82; shakeY *= 0.82;
  for (let i=0;i<5;i++) keyFlash[i] = Math.max(0, keyFlash[i]-dt*2);
  if (judgmentTimer > 0) { judgmentTimer -= dt; if (judgmentTimer <= 0) judgmentPriority = 0; }
  if (fever) {
    // Spawn side fire particles during fever
    for (let i = 0; i < 2; i++) {
      const side = Math.random() > 0.5 ? 0 : W;
      const col = `hsl(${Math.random()*60+20},100%,${55+Math.random()*35}%)`;
      feverParticles.push({ x: side + (Math.random()-0.5)*30, y: H * (0.3 + Math.random()*0.6),
        vx: (side === 0 ? 1 : -1) * (20+Math.random()*40), vy: -40-Math.random()*80,
        life: 0.5+Math.random()*0.5, maxLife: 1.0, color: col, size: 4+Math.random()*8 });
    }
  }
  if (feverFlash > 0) feverFlash -= dt * 1.5;
  // Update fever particles
  for (let i = feverParticles.length-1; i >= 0; i--) {
    const p = feverParticles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 60*dt; p.life -= dt;
    if (p.life <= 0) feverParticles.splice(i, 1);
  }
  if (playerAnim > 0) playerAnim = Math.max(0, playerAnim - dt);
  else if (playerAnim < 0) playerAnim = Math.min(0, playerAnim + dt);

  if (state === 'login') {
    // hidden input 값 동기화
    if (loginInputEl.value !== loginInput) loginInput = loginInputEl.value.slice(0, 12);
    for (const inp of inputQueue) {
      if (inp === 'confirm' && loginInput.trim().length > 0) {
        currentUser = loginInput.trim();
        localStorage.setItem('rhythm_currentUser', currentUser);
        loginInputEl.blur(); loginInputEl.value = '';
        transitionTo('title', () => startTitleBgm());
      }
    }
    inputQueue=[]; return;
  }
  if (state === 'title') {
    for (const inp of inputQueue) {
      if (inp==='confirm') {
        resumeAudio();
        if (!titleBgmUnlocked) {
          // First tap: unlock audio + start BGM, stay on title
          startTitleBgm(); titleBgmUnlocked = true; playClickSfx();
        } else {
          // Second tap: go to select
          playClickSfx(); stopTitleBgm(); transitionTo('select');
        }
      }
    }
    inputQueue=[]; return;
  }
  if (state === 'ranking') {
    if (inputQueue.length > 0) playClickSfx();
    for (const inp of inputQueue) {
      if (inp==='back' || inp==='confirm') { stopRankingBgm(); transitionTo('select'); }
      if (inp==='up') rankingScroll = Math.max(0, rankingScroll - 1);
      if (inp==='down') rankingScroll++;
      if (inp==='left') selectedDiff = Math.max(0, selectedDiff-1);
      if (inp==='right') selectedDiff = Math.min(DIFFICULTIES.length-1, selectedDiff+1);
    }
    inputQueue=[]; return;
  }
  if (state === 'achievement') {
    if (inputQueue.length > 0) playClickSfx();
    for (const inp of inputQueue) {
      if (inp==='back' || inp==='confirm') { transitionTo('select'); }
      if (inp==='up') achievementScroll = Math.max(0, achievementScroll - 1);
      if (inp==='down') achievementScroll++;
      if (inp==='left') { achievementTab = Math.max(0, achievementTab - 1); achievementScroll = 0; }
      if (inp==='right') { achievementTab = Math.min(ACH_TABS.length - 1, achievementTab + 1); achievementScroll = 0; }
    }
    inputQueue=[]; return;
  }
  if (state === 'select') {
    if (inputQueue.length > 0) playClickSfx();
    for (const inp of inputQueue) {
      if (inp === 'tab') { selectFocus = (selectFocus + 1) % 3; }
      if (inp === 'ranking') { rankingScroll = 0; stopPreview(); startRankingBgm(); transitionTo('ranking'); searchActive = false; searchText = ''; searchInputEl.value = ''; searchInputEl.blur(); }
      if (inp === 'achievement') { achievementScroll = 0; achievementSongFilter = selectedSong; transitionTo('achievement'); searchActive = false; searchText = ''; searchInputEl.value = ''; searchInputEl.blur(); }
      if (selectFocus === 0) {
        if (inp==='left') { selectedSong = (selectedSong - 1 + songs.length) % songs.length; scrollToSong(selectedSong); }
        if (inp==='right') { selectedSong = (selectedSong + 1) % songs.length; scrollToSong(selectedSong); }
        if (inp==='down') selectFocus = 1;
        if (inp==='up') selectFocus = 2;
      } else if (selectFocus === 1) {
        if (inp==='left') selectedDiff = Math.max(0, selectedDiff-1);
        if (inp==='right') selectedDiff = Math.min(DIFFICULTIES.length-1, selectedDiff+1);
        if (inp==='up') selectFocus = 0;
        if (inp==='down') selectFocus = 2;
      } else if (selectFocus === 2 && !speedInputActive) {
        if (inp==='left') speedDown();
        if (inp==='right') speedUp();
        if (inp==='up') selectFocus = 1;
        if (inp==='down') selectFocus = 0;
      }
      if (inp==='confirm') { speedInputActive=false; speedInputText=''; transitionTo('playing', () => startSong(selectedSong)); }
    }
    inputQueue=[]; return;
  }
  if (state === 'result') {
    for (const inp of inputQueue) { if (inp==='confirm') { transitionTo('select'); } }
    inputQueue=[]; return;
  }
  if (state !== 'playing') { inputQueue=[]; return; }

  for (const inp of inputQueue) {
    if (inp==='back') { stopSongAudio(); transitionTo('select'); nextSixteenth=999999; inputQueue=[]; return; }
  }
  inputQueue = [];

  if (countdownTime > 0) {
    countdownTime -= dt;
    updateStemVolumes(dt); // 카운트다운 중에도 펄스 페이드아웃 처리
    if (countdownTime <= 0) {
      songStartTime = actx.currentTime; countdownTime = 0;
      if (usingStemMode) {
        // 모든 스템을 동시에 시작 (동기화 보장)
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) {
            allStemAudios[i].currentTime = 0;
            allStemAudios[i].volume = STEM_VOL_FULL;
          }
        }
        // 한 프레임 안에서 모두 play (최대한 동기화)
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) allStemAudios[i].play().catch(()=>{});
        }
        stemBoostAll();
      } else if (songAudio) {
        songAudio.currentTime = 0; songAudio.play().catch(()=>{});
      }
    }
    return;
  }

  gameTime += dt;
  updateStemVolumes(dt);
  scheduleNotes();

  // 스템 동기화 보정 + 자동 재개 (2초마다)
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0]) {
    if (gameTime - stemSyncTime > 2) {
      stemSyncTime = gameTime;
      // 기준 스템이 멈췄으면 재개
      if (allStemAudios[0].paused && !gamePaused) allStemAudios[0].play().catch(()=>{});
      const refTime = allStemAudios[0].currentTime;
      for (let i = 1; i < allStemAudios.length; i++) {
        if (!allStemAudios[i]) continue;
        // 멈춘 스템 자동 재개
        if (allStemAudios[i].paused && !gamePaused) allStemAudios[i].play().catch(()=>{});
        const drift = Math.abs(allStemAudios[i].currentTime - refTime);
        if (drift > 0.05) allStemAudios[i].currentTime = refTime;
      }
    }
  }

  // Hold note tracking
  for (const n of nodes) {
    if (n.type !== 'hold' || !n.holding) continue;
    // Fire burst effect while holding
    if (!n._burstTimer) n._burstTimer = 0;
    n._burstTimer += dt;
    if (n._burstTimer >= 0.025) {
      n._burstTimer = 0;
      const hx = getLaneX(n.lane), hy = getHitY();
      const col = LANE_COLORS[n.lane];
      const hw = (getLaneW() - 8) / 2;
      // Big upward flame columns
      for (let i = 0; i < 5; i++) {
        const ox = (Math.random() - 0.5) * hw * 2;
        const spd = -150 - Math.random() * 300;
        particles.push({ x: hx + ox, y: hy, vx: (Math.random()-0.5)*60, vy: spd,
          life: 0.4 + Math.random()*0.4, maxLife: 0.8, color: col, size: 6 + Math.random()*10 });
      }
      // Hot white/yellow core sparks
      for (let i = 0; i < 2; i++) {
        const coreCol = Math.random() > 0.5 ? '#fff' : '#ffd700';
        particles.push({ x: hx + (Math.random()-0.5)*hw*0.8, y: hy, vx: (Math.random()-0.5)*30, vy: -100 - Math.random()*250,
          life: 0.25 + Math.random()*0.25, maxLife: 0.5, color: coreCol, size: 4 + Math.random()*7 });
      }
      // Side fountain sparks
      for (let i = 0; i < 2; i++) {
        const dir = Math.random() > 0.5 ? 1 : -1;
        particles.push({ x: hx + dir*hw, y: hy, vx: dir*(80+Math.random()*160), vy: -60 - Math.random()*120,
          life: 0.25 + Math.random()*0.3, maxLife: 0.55, color: '#ffd700', size: 3 + Math.random()*5 });
      }
      // Rising embers (slow, long-lived)
      if (Math.random() < 0.4) {
        particles.push({ x: hx + (Math.random()-0.5)*hw*2, y: hy - Math.random()*30,
          vx: (Math.random()-0.5)*15, vy: -30 - Math.random()*60,
          life: 0.6 + Math.random()*0.5, maxLife: 1.1, color: '#ff8800', size: 2 + Math.random()*3 });
      }
    }
    // Glow burst at hit line
    if (!n._glowTimer) n._glowTimer = 0;
    n._glowTimer += dt;
    if (n._glowTimer >= 0.08) {
      n._glowTimer = 0;
      holdGlows.push({ x: getLaneX(n.lane), y: getHitY(), time: 0, maxTime: 0.35,
        color: LANE_COLORS[n.lane], w: getLaneW() - 8 });
    }
    // Combo ticks while holding
    if (!n._comboTimer) n._comboTimer = 0;
    n._comboTimer += dt;
    if (n._comboTimer >= 0.25) {
      n._comboTimer = 0;
      combo++; if (combo > maxCombo) maxCombo = combo;
      checkFeverActivate();
      const fm = fever ? 2 : 1;
      score += Math.floor(20 * fm);
      gauge = Math.min(1, gauge + 0.005 * fm);
    }
    // Key released — judge based on timing to endTime
    if (!keyHeld[n.lane]) {
      n.holding = false;
      n.holdComplete = true;
      stopHoldSound(n);
      const endDist = Math.abs(gameTime - n.endTime) * noteSpeed;
      const fm = fever ? 2 : 1;
      if (endDist < 28) {
        score += Math.floor(200 * fm); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + 0.02 * fm);
        judgmentText = 'PERFECT HOLD!'; judgmentTimer = 0.6; judgmentColor = '#ffd700'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'perfect');
        spawnParticles(getLaneX(n.lane), getHitY(), LANE_COLORS[n.lane], fever ? 20 : 12);
        playerAnim = 0.3;
      } else if (endDist < 52) {
        score += Math.floor(150 * fm); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + 0.015 * fm);
        judgmentText = 'GREAT HOLD!'; judgmentTimer = 0.5; judgmentColor = '#00d4ff'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'great');
        playerAnim = 0.2;
      } else if (endDist < HIT_WINDOW_PX) {
        score += Math.floor(100 * fm);
        judgmentText = 'OK'; judgmentTimer = 0.3; judgmentColor = '#44dd66'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'good');
      } else {
        if (usingStemMode) stemDuck(n.lane); else stemDuckAll();
        collected--; missed++; combo = 0; fever = false; feverTimer = 0;
        judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
      }
    }
    // Still holding when note ended — miss (홀드 유지 실패)
    if (n.holding && gameTime >= n.endTime + HIT_WINDOW_PX / noteSpeed) {
      n.holding = false;
      n.holdComplete = true;
      n.missed = true;
      stopHoldSound(n);
      if (usingStemMode) stemDuck(n.lane); else stemDuckAll();
      collected--; missed++; combo = 0; fever = false; feverTimer = 0;
      judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
    }
  }

  // Miss detection
  const hitY = getHitY();
  for (const n of nodes) {
    if (n.hit || n.missed) continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy > hitY + HIT_WINDOW_PX + 40) {
      n.missed = true;
      if (n.type === 'note' || n.type === 'hold') {
        if (usingStemMode) stemDuck(n.lane); else stemDuckAll();
        combo = 0; missed++; fever = false; feverTimer = 0;
        gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain : 0.04));
        shakeX = (Math.random()-0.5)*8; shakeY = (Math.random()-0.5)*6;
        if (judgmentPriority < 2) { judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1; }
      }
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 250*dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Bursts
  for (let i = bursts.length-1; i >= 0; i--) {
    bursts[i].time += dt;
    if (bursts[i].time >= bursts[i].maxTime) bursts.splice(i, 1);
  }
  // Hold glows
  for (let i = holdGlows.length-1; i >= 0; i--) {
    holdGlows[i].time += dt;
    if (holdGlows[i].time >= holdGlows[i].maxTime) holdGlows.splice(i, 1);
  }

  if ((gauge <= 0 || gameTime >= songDuration) && state === 'playing' && fadeDir === 0) {
    state = 'ending'; // 즉시 상태 변경하여 중복 실행 방지
    stopSongAudio();
    saveScore(curSongIdx, selectedDiff, score);
    checkAndAwardAchievements();
    transitionTo('result');
  }
}

// ===== RENDER =====
function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);
  const song = curSong || songs[0];

  // BG
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, song.bg1); grad.addColorStop(1, song.bg2);
  ctx.fillStyle = grad; ctx.fillRect(-20,-20,W+40,H+40);

  if (state==='login') { renderLogin(); ctx.restore(); return; }
  if (state==='title') { renderTitle(); ctx.restore(); return; }
  if (state==='select') { renderSelect(); ctx.restore(); return; }
  if (state==='ranking') { renderRanking(); ctx.restore(); return; }
  if (state==='achievement') { renderAchievement(); ctx.restore(); return; }
  if (state==='result') { renderResult(); ctx.restore(); return; }

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.b * (0.3 + Math.sin(Date.now()*0.002+s.x)*0.2);
    ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.s, s.s);
  }
  ctx.globalAlpha = 1;

  // In-game ambient particles
  const lsx = getLaneStartX(), totalLW = getLaneW()*5;
  const songCol = curSong ? curSong.color : '#fff';
  // Spawn various types
  if (gameParticles.length < 50) {
    const type = Math.random();
    if (type < 0.5) {
      // Side streaks - shoot up from edges
      const side = Math.random() > 0.5;
      gameParticles.push({
        x: side ? lsx - 15 - Math.random()*30 : lsx + totalLW + 15 + Math.random()*30,
        y: H * (0.5 + Math.random()*0.5),
        vx: (side ? 0.3 : -0.3) * Math.random(), vy: -(1.5 + Math.random()*2.5),
        size: 1.5+Math.random()*2.5, life: 1, decay: 0.008+Math.random()*0.006,
        color: songCol, kind: 'streak'
      });
    } else if (type < 0.8) {
      // Floating orbs - slow drift
      gameParticles.push({
        x: Math.random()*W, y: H+10,
        vx: (Math.random()-0.5)*0.3, vy: -(0.15+Math.random()*0.35),
        size: 3+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
        color: songCol, kind: 'orb'
      });
    } else {
      // Sparkle - tiny fast twinklers
      gameParticles.push({
        x: lsx + Math.random()*totalLW, y: Math.random()*H,
        vx: 0, vy: 0,
        size: 1+Math.random()*1.5, life: 1, decay: 0.02+Math.random()*0.02,
        color: '#fff', kind: 'sparkle'
      });
    }
  }
  for (let i = gameParticles.length-1; i >= 0; i--) {
    const gp = gameParticles[i];
    gp.x += gp.vx; gp.y += gp.vy; gp.life -= gp.decay;
    if (gp.kind === 'orb') gp.vx += (Math.random()-0.5)*0.02;
    if (gp.kind === 'streak') gp.vy *= 0.995;
    if (gp.life <= 0 || gp.y < -20) { gameParticles.splice(i,1); continue; }
    if (gp.kind === 'sparkle') {
      const flicker = Math.sin(Date.now()*0.02+i*7)*0.5+0.5;
      ctx.globalAlpha = gp.life * flicker * 0.7;
      ctx.fillStyle = gp.color;
      ctx.fillRect(gp.x-0.5, gp.y-0.5, gp.size, gp.size);
    } else {
      ctx.globalAlpha = gp.life * (gp.kind === 'streak' ? 0.5 : 0.3);
      ctx.shadowColor = gp.color; ctx.shadowBlur = gp.kind === 'streak' ? 12 : 6;
      ctx.fillStyle = gp.color;
      ctx.beginPath(); ctx.arc(gp.x, gp.y, gp.size*gp.life, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;

  renderLanes();
  renderNotes();
  renderHitLine();
  renderButtons();
  renderCharacter();
  renderParticles();
  renderBursts();
  renderHoldGlows();
  renderJudgment();
  renderUI();

  // Fever overlay
  if (fever) {
    const t = Date.now();
    const lw = getLaneW(), lsx = getLaneStartX(), tw = lw * 5;

    // Smooth golden aura along lane edges
    ctx.globalAlpha = 0.15;
    const leftGrd = ctx.createLinearGradient(lsx - 40, 0, lsx + 20, 0);
    leftGrd.addColorStop(0, 'transparent');
    leftGrd.addColorStop(0.5, `hsl(${(t*0.1)%360},100%,60%)`);
    leftGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = leftGrd; ctx.fillRect(lsx - 40, 0, 60, H);
    const rightGrd = ctx.createLinearGradient(lsx + tw - 20, 0, lsx + tw + 40, 0);
    rightGrd.addColorStop(0, 'transparent');
    rightGrd.addColorStop(0.5, `hsl(${(t*0.1+180)%360},100%,60%)`);
    rightGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = rightGrd; ctx.fillRect(lsx + tw - 20, 0, 60, H);
    ctx.globalAlpha = 1;

    // Smooth color-shifting lane tint
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = `hsl(${(t*0.08)%360},100%,55%)`;
    ctx.fillRect(lsx, 0, tw, H);
    ctx.globalAlpha = 1;

    // Rising light streaks inside lanes
    for (let i = 0; i < 5; i++) {
      const phase = (t * 0.001 + i * 1.3) % 1;
      const sy = H * (1 - phase);
      const sx = lsx + i * lw + lw / 2;
      const streakAlpha = Math.sin(phase * Math.PI) * 0.12;
      ctx.globalAlpha = streakAlpha;
      const sg = ctx.createLinearGradient(0, sy - 40, 0, sy + 40);
      sg.addColorStop(0, 'transparent');
      sg.addColorStop(0.5, LANE_COLORS[i]);
      sg.addColorStop(1, 'transparent');
      ctx.fillStyle = sg;
      ctx.fillRect(sx - lw * 0.3, sy - 40, lw * 0.6, 80);
    }
    ctx.globalAlpha = 1;

    // Fever side fire particles
    for (const p of feverParticles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife) * 0.7;
      ctx.fillStyle = p.color;
      const s = p.size * (p.life / p.maxLife);
      ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
    }
    ctx.globalAlpha = 1;

    // FEVER text - smooth gradient, no flash
    ctx.save();
    const fs = Math.min(44, W*0.07);
    const bop = Math.sin(t*0.004) * 3;
    const feverCY = getHitY() * 0.5;
    ctx.translate(lsx + tw/2, feverCY + bop);
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 4;
    ctx.strokeText('FEVER!', 0, 0);
    // Smooth shifting gradient fill
    const txtGrd = ctx.createLinearGradient(-60, 0, 60, 0);
    const hue = (t * 0.06) % 360;
    txtGrd.addColorStop(0, `hsl(${hue},100%,65%)`);
    txtGrd.addColorStop(0.5, `hsl(${(hue+60)%360},100%,70%)`);
    txtGrd.addColorStop(1, `hsl(${(hue+120)%360},100%,65%)`);
    ctx.fillStyle = txtGrd;
    ctx.shadowColor = `hsl(${hue},80%,40%)`; ctx.shadowBlur = 15;
    ctx.fillText('FEVER!', 0, 0);
    ctx.shadowBlur = 0;
    // x2 badge
    ctx.font = `bold ${Math.floor(fs*0.4)}px sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.globalAlpha = 0.9;
    ctx.fillText('x2 SCORE', 0, fs + 2);
    ctx.restore();

    ctx.restore();
  }

  // Low gauge danger vignette
  if (gauge < 0.35) {
    const intensity = (0.35 - gauge) / 0.35;
    const pulse = 0.5 + Math.sin(Date.now() * 0.006) * 0.5;
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.8);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, `rgba(255,0,0,${intensity * 0.25 * pulse})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // Countdown
  if (countdownTime > 0) {
    const num = Math.ceil(countdownTime);
    if (num <= 3) {
      const frac = countdownTime % 1, scale = 1+frac*0.4;
      ctx.save(); ctx.translate(W/2, H*0.4); ctx.scale(scale,scale);
      ctx.globalAlpha = Math.min(1,frac*2);
      ctx.font = `bold ${Math.min(90,W*0.15)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; ctx.shadowColor=song.color; ctx.shadowBlur=30;
      ctx.fillText(''+num, 0, 0);
      ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }
  }
  ctx.restore();
}

function renderLanes() {
  const lw = getLaneW(), lsx = getLaneStartX(), hitY = getHitY();

  // Lane backgrounds
  for (let i = 0; i < 5; i++) {
    const x = lsx + i * lw;
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.025)' : 'rgba(0,0,0,0.08)';
    ctx.fillRect(x, 0, lw, hitY + 10);

    // Vertical lane dividers
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, hitY+10); ctx.stroke();

    // Flash on press
    if (keyFlash[i] > 0) {
      ctx.fillStyle = LANE_COLORS[i] + '15';
      ctx.fillRect(x, 0, lw, hitY+10);
    }
  }
  // Right border
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(lsx + lw*5, 0); ctx.lineTo(lsx + lw*5, hitY+10); ctx.stroke();
}

function renderHitLine() {
  const lsx = getLaneStartX(), tw = getTotalLaneW(), hitY = getHitY();

  // Glow line
  ctx.shadowColor = curSong.color; ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lsx-5, hitY); ctx.lineTo(lsx+tw+5, hitY); ctx.stroke();
  ctx.shadowBlur = 0;
  // Secondary color glow underneath
  ctx.strokeStyle = curSong.color + '44'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(lsx-5, hitY); ctx.lineTo(lsx+tw+5, hitY); ctx.stroke();

  // Subtle gradient above hit line
  const grad = ctx.createLinearGradient(0, hitY-60, 0, hitY);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(255,255,255,0.06)');
  ctx.fillStyle = grad;
  ctx.fillRect(lsx, hitY-60, tw, 60);

  // Receptors
  const lw = getLaneW();
  for (let i = 0; i < 5; i++) {
    const cx = getLaneX(i);
    const held = keyHeld[i], flash = keyFlash[i] > 0;

    const rw = lw - 8, rh = 20;
    if (held || flash) {
      ctx.fillStyle = LANE_COLORS[i] + '66';
      ctx.shadowColor = LANE_COLORS[i]; ctx.shadowBlur = 15;
      ctx.fillRect(cx-rw/2, hitY-rh/2, rw, rh); ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = 'rgba(20,20,40,0.7)'; ctx.fillRect(cx-rw/2, hitY-rh/2, rw, rh);
    }
    ctx.strokeStyle = LANE_COLORS[i] + (held ? 'ee' : '55'); ctx.lineWidth = 2.5; ctx.strokeRect(cx-rw/2, hitY-rh/2, rw, rh);
  }
}

function renderNotes() {
  const hitY = getHitY();
  const pulse = Math.sin(Date.now()*0.006)*0.2+0.8;

  for (const n of nodes) {
    const sx = getLaneX(n.lane);

    // Draw hold bar (even while holding/complete)
    if (n.type === 'hold' && !n.missed) {
      const headY = hitY - (n.time - gameTime) * noteSpeed;
      const tailY = hitY - (n.endTime - gameTime) * noteSpeed;
      const col = LANE_COLORS[n.lane];
      const barTop = Math.max(-40, tailY);
      const barBot = Math.min(hitY + 80, headY);

      if (barTop < barBot + 10) {
        // Bar body
        const bw = getLaneW() - 8;
        if (n.holding) {
          // Active hold - bright bar with glow
          ctx.shadowColor = col; ctx.shadowBlur = 12;
          ctx.fillStyle = col + 'bb';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
          ctx.shadowBlur = 0;
          // Pulsing particles along bar
          if (Math.random() < 0.3) {
            const py = barTop + Math.random() * (hitY - barTop);
            spawnParticles(sx + (Math.random()-0.5)*10, py, col, 1);
          }
        } else if (n.holdComplete) {
          // Completed - fading
          ctx.fillStyle = col + '33';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
        } else if (!n.hit) {
          // Not yet hit - normal bar
          ctx.fillStyle = col + '55';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
          // Border
          ctx.strokeStyle = col + '88'; ctx.lineWidth = 1.5;
          rrStroke(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
        }

        // Tail end cap
        if (tailY > -30 && tailY < hitY + 60 && !n.holdComplete) {
          const tw = getLaneW() - 6;
          ctx.fillStyle = n.holding ? col : col + 'cc';
          rrFill(sx-tw/2, tailY-7, tw, 14, 4);
          ctx.strokeStyle = col; ctx.lineWidth = 2;
          rrStroke(sx-tw/2, tailY-7, tw, 14, 4);
          if (n.holding) {
            ctx.shadowColor = col; ctx.shadowBlur = 10;
            rrStroke(sx-tw/2, tailY-7, tw, 14, 4);
            ctx.shadowBlur = 0;
          }
        }
      }

      // Head circle (skip if already hit or missed)
      if (!n.hit && !n.missed) {
        const sy = headY;
        if (sy > -30 && sy < hitY + 60) {
          const hw = (getLaneW() - 8) / 2, hh = 10;
          ctx.shadowColor = col; ctx.shadowBlur = 10;
          ctx.fillStyle = col;
          ctx.fillRect(sx-hw, sy-hh, hw*2, hh*2);
          ctx.shadowBlur = 0;
          ctx.fillStyle='#fff'; ctx.globalAlpha=0.5;
          ctx.fillRect(sx-hw+3, sy-hh+3, 8, 6);
          ctx.globalAlpha=1;
          ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('HOLD', sx, sy+1);
        }
      }
      continue;
    }

    if (n.hit || n.missed) continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < -30 || sy > hitY + 60) continue;

    if (n.type === 'trap') {
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(Math.PI/4);
      ctx.fillStyle = 'rgba(255,30,60,0.7)'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
      ctx.fillRect(-11,-11,22,22); ctx.shadowBlur=0; ctx.restore();
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx-5,sy-5); ctx.lineTo(sx+5,sy+5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+5,sy-5); ctx.lineTo(sx-5,sy+5); ctx.stroke();
    } else {
      const col = LANE_COLORS[n.lane];
      const nw = (getLaneW() - 8) / 2, nh = 10;
      ctx.shadowColor=col; ctx.shadowBlur=10;
      ctx.fillStyle=col;
      ctx.fillRect(sx-nw, sy-nh, nw*2, nh*2);
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff'; ctx.globalAlpha=0.5;
      ctx.fillRect(sx-nw+3, sy-nh+3, 8, 6);
      ctx.globalAlpha=1;
      ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('\u266A', sx, sy+1);
    }
  }

  // Missed flash
  for (const n of nodes) {
    if (!n.missed || n.type==='trap') continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < hitY || sy > hitY + 80) continue;
    const sx = getLaneX(n.lane);
    const fade = 1 - (sy - hitY) / 80;
    if (fade > 0) {
      ctx.globalAlpha = fade*0.6; ctx.fillStyle='#ff4444';
      ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
      ctx.fillText('MISS', sx, sy-15); ctx.globalAlpha=1;
    }
  }
}

function renderButtons() {
  const lw = getLaneW(), lsx = getLaneStartX(), by = getBtnY(), bh = getBtnH();

  for (let i = 0; i < 5; i++) {
    const bx = lsx + i * lw;
    const held = keyHeld[i];

    // Button bg
    ctx.fillStyle = held ? LANE_COLORS[i]+'44' : 'rgba(255,255,255,0.04)';
    rrFill(bx+3, by+3, lw-6, bh-6, 8);

    // Border
    ctx.strokeStyle = LANE_COLORS[i] + (held ? 'cc' : '33'); ctx.lineWidth = held ? 2.5 : 1.5;
    rrStroke(bx+3, by+3, lw-6, bh-6, 8);
    if (held) { ctx.shadowColor=LANE_COLORS[i]; ctx.shadowBlur=8; rrStroke(bx+3,by+3,lw-6,bh-6,8); ctx.shadowBlur=0; }

    // Label
    ctx.font = `bold ${Math.min(18, W*0.035)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = LANE_COLORS[i] + (held ? 'ff' : '99');
    ctx.fillText(LANE_KEYS[i], bx + lw/2, by + bh/2);
  }
}

function rrFill(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function rrStroke(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function renderCharacter() {
  const cx = W / 2, cy = getHitY() + 15;
  const sc = 1.8;
  ctx.save();
  ctx.translate(cx, cy);

  // Bounce
  if (playerAnim > 0) ctx.translate(0, -playerAnim * 30);
  if (playerAnim < 0) ctx.translate(0, playerAnim * 15);

  // Glow on combo
  if (combo > 10) { ctx.shadowColor = curSong.color; ctx.shadowBlur = 6 + combo * 0.3; }

  // Head (face up - circle)
  ctx.fillStyle = '#ffcc5c';
  ctx.beginPath(); ctx.arc(0, 0, 12*sc, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes (looking up)
  ctx.fillStyle = '#333';
  ctx.fillRect(-5*sc, -5*sc, 3*sc, 3*sc);
  ctx.fillRect(2*sc, -5*sc, 3*sc, 3*sc);

  // Pupils (looking up)
  ctx.fillStyle = '#111';
  ctx.fillRect(-4.5*sc, -5*sc, 2*sc, 1.5*sc);
  ctx.fillRect(2.5*sc, -5*sc, 2*sc, 1.5*sc);

  // Mouth (excited when combo high)
  if (combo > 5) {
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.arc(0, 3*sc, 3*sc, 0, Math.PI); ctx.fill();
  } else {
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(-2*sc, 2*sc, 4*sc, 1.5*sc);
  }

  // Blush on combo
  if (combo > 15) {
    ctx.fillStyle = 'rgba(255,100,100,0.3)';
    ctx.beginPath(); ctx.arc(-7*sc, 1*sc, 3*sc, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7*sc, 1*sc, 3*sc, 0, Math.PI*2); ctx.fill();
  }

  // Arms reaching up
  ctx.strokeStyle = '#ffcc5c'; ctx.lineWidth = 3*sc; ctx.lineCap = 'round';
  const armWave = Math.sin(Date.now()*0.008) * 3;
  ctx.beginPath(); ctx.moveTo(-10*sc, 8*sc); ctx.lineTo(-14*sc+armWave, -8*sc); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10*sc, 8*sc); ctx.lineTo(14*sc-armWave, -8*sc); ctx.stroke();

  // Body below
  ctx.fillStyle = '#ff6b6b';
  ctx.fillRect(-8*sc, 10*sc, 16*sc, 10*sc);

  ctx.restore();
}

function renderParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
    ctx.fillStyle = p.color;
    const s = p.size * (p.life/p.maxLife);
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

function renderBursts() {
  for (const b of bursts) {
    const t = b.time / b.maxTime;
    const alpha = 1 - t;
    ctx.save();
    ctx.translate(b.x, b.y);

    // Expanding rings with thickness
    for (let r = 0; r < b.rings; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
      if (rt <= 0 || rt >= 1) continue;
      const radius = (25 + r * 25) * rt * b.size;
      const ringAlpha = (1 - rt) * 0.85;
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = r % 2 === 0 ? b.color1 : b.color2;
      ctx.lineWidth = (5 - r * 0.6) * (1 - rt) * b.size;
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
    }

    // Big center flash / shockwave
    if (t < 0.4) {
      const ft = t / 0.4;
      const flashR = 50 * b.size * ft;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, flashR);
      grd.addColorStop(0, '#ffffff');
      grd.addColorStop(0.3, b.color2);
      grd.addColorStop(1, b.color1 + '00');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0, 0, flashR, 0, Math.PI * 2); ctx.fill();
    }

    // Streaking rays
    const rayCount = Math.floor(b.sparks * 0.5);
    for (let i = 0; i < rayCount; i++) {
      const a = Math.PI * 2 * i / rayCount;
      const dist = (30 + 100 * t) * b.size;
      const len = (15 + 20 * (1 - t)) * b.size;
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = b.color2;
      ctx.lineWidth = 2 * (1 - t) * b.size;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * (dist - len), Math.sin(a) * (dist - len));
      ctx.lineTo(Math.cos(a) * dist, Math.sin(a) * dist);
      ctx.stroke();
    }

    // Diamond sparks radiating outward
    const sparkCount = Math.floor(b.sparks * 0.7);
    for (let i = 0; i < sparkCount; i++) {
      const a = Math.PI * 2 * i / sparkCount + t * 0.5;
      const dist = (20 + 90 * t) * b.size;
      const sx = Math.cos(a) * dist;
      const sy = Math.sin(a) * dist;
      const ss = (4 + Math.random() * 3) * (1 - t) * b.size;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = i % 2 === 0 ? b.color2 : b.color1;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a + t * 3);
      ctx.fillRect(-ss/2, -ss/2, ss, ss);
      ctx.restore();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderHoldGlows() {
  for (const g of holdGlows) {
    const t = g.time / g.maxTime;
    const alpha = (1 - t);
    const hw = g.w / 2;
    ctx.save();
    ctx.translate(g.x, g.y);

    // Large fire glow expanding upward
    const glowH = 90 * (0.4 + t * 0.6);
    ctx.globalAlpha = alpha * 0.7;
    const grd = ctx.createRadialGradient(0, -glowH*0.2, 0, 0, -glowH*0.3, hw * (1.2 + t));
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.2, g.color);
    grd.addColorStop(0.6, g.color + '88');
    grd.addColorStop(1, g.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -glowH * 0.25, hw * (1.3 + t * 0.8), glowH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core
    ctx.globalAlpha = alpha * 0.9;
    const coreGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 0.6);
    coreGrd.addColorStop(0, '#ffffff');
    coreGrd.addColorStop(1, '#ffffff00');
    ctx.fillStyle = coreGrd;
    ctx.beginPath();
    ctx.ellipse(0, -5, hw * 0.6, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Horizontal shockwave line
    const lineW = hw * (1.5 + t * 1.5);
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(-lineW, 0);
    ctx.lineTo(lineW, 0);
    ctx.stroke();

    // Side flare streaks
    ctx.globalAlpha = alpha * 0.5;
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2 * (1 - t);
    for (let s = -1; s <= 1; s += 2) {
      ctx.beginPath();
      ctx.moveTo(s * hw * 0.5, 0);
      ctx.lineTo(s * lineW * 1.2, -20 - 30 * t);
      ctx.stroke();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderJudgment() {
  if (judgmentTimer <= 0) return;
  const scale = Math.max(0.8, 1 + (0.5 - judgmentTimer)*0.3);
  ctx.save();
  ctx.translate(W/2, getHitY() - 40);
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, judgmentTimer*3);
  ctx.font = `bold ${Math.min(24, W*0.042)}px sans-serif`;

  ctx.shadowColor=judgmentColor; ctx.shadowBlur=10;
  ctx.fillText(judgmentText, 0, 0);

}
