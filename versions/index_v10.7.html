// Select screen layout helper
let selectParticles = [];
function updateSelectParticles() {
  // Spawn
  const spawnCount = selectParticles.length < 50 ? 2 : 0;
  for (let s = 0; s < spawnCount; s++) {
    const sc = songs[selectedSong] ? songs[selectedSong].color : '#fff';
    selectParticles.push({
      x: Math.random() * W, y: H + 5 + Math.random()*20,
      vx: (Math.random()-0.5)*0.5, vy: -(0.3+Math.random()*0.8),
      size: 2.5+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
      color: sc
    });
  }
  for (let i = selectParticles.length-1; i >= 0; i--) {
    const p = selectParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vx += (Math.random()-0.5)*0.03;
    if (p.life <= 0 || p.y < -10) selectParticles.splice(i,1);
  }
}

function getSelectLayout() {
  const cardW = Math.min(320, W*0.78), cardH = Math.min(130, H*0.19), gap = 28;
  const songTotalW = songs.length * (cardW + gap) - gap;
  const optW = Math.min(380, W*0.9);
  const optH = Math.min(48, H*0.07);
  const optGap = 34;
  const sectionGap = 22;
  const subBtnH = 34;
  const subBtnGap = 16;
  const searchBarH = 36;
  const titleH = 34;
  const titleGap = 14;
  const searchGap = 12;
  const btnH = Math.min(50, H*0.07);
  const totalH = titleH + titleGap + searchBarH + searchGap + cardH + subBtnGap + subBtnH
    + sectionGap + 18 + optH + optGap + 18 + optH + sectionGap + btnH + 30;
  const topY = Math.max(10, (H - totalH) / 2);
  const songRowY = topY + titleH + titleGap + searchBarH + searchGap;
  return { cardW, cardH, gap, songRowY, optW, optH, optGap, sectionGap, songTotalW, subBtnH, subBtnGap, searchBarH, btnH };
}
let snapAnimStart = 0, snapAnimFrom = 0, snapAnimTo = 0, snapAnimDur = 0;
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function scrollToSong(idx) {
  const lay = getSelectLayout();
  const target = idx * (lay.cardW + lay.gap);
  snapAnimFrom = selectScrollX;
  snapAnimTo = target;
  snapAnimDur = Math.min(0.4, Math.max(0.15, Math.abs(target - selectScrollX) / 800));
  snapAnimStart = performance.now() / 1000;
  selectTargetScrollX = target;
  selectScrollVel = 0;
}
function updateSelectScroll(dt) {
  if (state !== 'select') return;
  // Animated snap to target (easeOut)
  if (selectTargetScrollX !== null) {
    const elapsed = performance.now() / 1000 - snapAnimStart;
    const t = Math.min(1, elapsed / snapAnimDur);
    selectScrollX = snapAnimFrom + (snapAnimTo - snapAnimFrom) * easeOutCubic(t);
    if (t >= 1) { selectScrollX = snapAnimTo; selectTargetScrollX = null; }
    selectScrollVel = 0;
    return;
  }
  // Apply velocity (drag inertia)
  if (selectDragX < 0) {
    selectScrollX += selectScrollVel;
    selectScrollVel *= 0.90;
    if (Math.abs(selectScrollVel) < 0.15) selectScrollVel = 0;
  }
  // Auto-snap after inertia settles
  if (selectDragX < 0 && Math.abs(selectScrollVel) < 0.3) {
    const lay = getSelectLayout();
    const step = lay.cardW + lay.gap;
    const nearest = Math.round(selectScrollX / step);
    const clamped = Math.max(0, Math.min(nearest, songs.length - 1));
    const target = clamped * step;
    if (Math.abs(target - selectScrollX) > 0.5) {
      // Kick off smooth snap animation
      snapAnimFrom = selectScrollX;
      snapAnimTo = target;
      snapAnimDur = Math.min(0.35, Math.max(0.12, Math.abs(target - selectScrollX) / 600));
      snapAnimStart = performance.now() / 1000;
      selectTargetScrollX = target;
      selectScrollVel = 0;
      selectedSong = clamped;
    } else {
      selectScrollX = target;
      selectedSong = clamped;
    }
  }
  // Bounce back at edges
  const lay = getSelectLayout();
  const maxScroll = (songs.length - 1) * (lay.cardW + lay.gap);
  if (selectScrollX < 0) {
    selectScrollX += (0 - selectScrollX) * 0.12;
    if (Math.abs(selectScrollX) < 0.3) selectScrollX = 0;
    selectScrollVel = 0;
  } else if (selectScrollX > maxScroll) {
    selectScrollX += (maxScroll - selectScrollX) * 0.12;
    if (Math.abs(selectScrollX - maxScroll) < 0.3) selectScrollX = maxScroll;
    selectScrollVel = 0;
  }
}

function renderSelect() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.25; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  // Particles
  updateSelectParticles();
  for (const p of selectParticles) {
    ctx.globalAlpha = p.life * 0.6;
    ctx.shadowColor = p.color; ctx.shadowBlur = 10;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha=1;
  const { cardW, cardH, gap, songRowY, optW, optH, optGap, sectionGap, songTotalW, subBtnH, subBtnGap, searchBarH, btnH } = getSelectLayout();
  const cxBase = (W - optW) / 2;

  // Title
  const titleY = songRowY - searchBarH - 10 - 14;
  ctx.font=`bold ${Math.min(30,W*0.055)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=10;
  ctx.fillText('곡 선택',W/2, titleY); ctx.shadowBlur=0;

  // Search bar
  const searchBarY = songRowY - searchBarH - 10;
  ctx.fillStyle = searchActive ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)';
  rrFill(cxBase, searchBarY, optW, searchBarH, 8);
  ctx.strokeStyle = searchActive ? '#ffd700' : 'rgba(255,255,255,0.12)';
  ctx.lineWidth = searchActive ? 1.5 : 1;
  rrStroke(cxBase, searchBarY, optW, searchBarH, 8);
  ctx.textAlign = 'left'; ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('🔍', cxBase + 10, searchBarY + searchBarH/2 + 5);
  if (searchText) {
    ctx.fillStyle = '#fff'; ctx.font = '13px sans-serif';
    ctx.fillText(searchText + (searchActive ? '|' : ''), cxBase + 32, searchBarY + searchBarH/2 + 5);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '12px sans-serif';
    ctx.fillText(searchActive ? '검색어 입력...' : 'F키로 검색', cxBase + 32, searchBarY + searchBarH/2 + 4);
  }
  // Search close button
  if (searchActive) {
    ctx.textAlign = 'center'; ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('✕', cxBase + optW - 16, searchBarY + searchBarH/2 + 5);
  }

  // Song cards (horizontal scroll)
  const centerX = W / 2;
  const step = cardW + gap;
  // Left/right arrows
  ctx.textAlign = 'center'; ctx.font = 'bold 26px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  if (selectedSong > 0) ctx.fillText('◀', centerX - cardW/2 - 30, songRowY + cardH/2 + 8);
  if (selectedSong < songs.length - 1) ctx.fillText('▶', centerX + cardW/2 + 30, songRowY + cardH/2 + 8);

  // Draw non-selected cards first (blurred), then selected card on top
  const cardOrder = [];
  songs.forEach((s,i) => cardOrder.push(i));
  // Sort so selected is drawn last (on top)
  cardOrder.sort((a,b) => (a === selectedSong ? 1 : 0) - (b === selectedSong ? 1 : 0));

  for (const i of cardOrder) {
    const s = songs[i];
    const cardCenterX = centerX + (i * step - selectScrollX);
    const cx = cardCenterX - cardW/2;
    const cy = songRowY;
    if (cx + cardW < -100 || cx > W + 100) continue;
    const sel = i === selectedSong;
    const dist = Math.abs(cardCenterX - centerX);
    const scale = sel ? 1.05 : Math.max(0.88, 1 - dist / (W * 1.2));
    const alpha = sel ? 1 : Math.max(0.35, 1 - dist / (W * 0.5));

    ctx.save();
    ctx.translate(cardCenterX, cy + cardH/2);
    ctx.scale(scale, scale);
    ctx.translate(-cardCenterX, -(cy + cardH/2));
    ctx.globalAlpha = alpha;

    // Card background
    ctx.fillStyle = sel ? s.color+'22' : 'rgba(255,255,255,0.03)';
    rrFill(cx, cy, cardW, cardH, 14);
    ctx.strokeStyle = sel ? s.color : 'rgba(255,255,255,0.06)'; ctx.lineWidth = sel ? 2.5 : 1;
    if (sel) { ctx.shadowColor = s.color; ctx.shadowBlur = 16; }
    rrStroke(cx, cy, cardW, cardH, 14); ctx.shadowBlur = 0;

    // Color accent bar
    ctx.fillStyle = s.color + (sel ? 'bb' : '22'); rrFill(cx+4, cy+4, 5, cardH-8, 3);

    // Song name
    ctx.textAlign = 'left';
    ctx.font = `bold ${Math.min(24, W*0.048)}px sans-serif`;
    ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.3)';
    ctx.fillText(s.name, cx+22, cy+cardH*0.38);

    // Sub info
    ctx.font = `${Math.min(13, W*0.026)}px sans-serif`;
    ctx.fillStyle = s.color + (sel ? 'dd' : '33');
    ctx.fillText(s.sub + '  ·  ' + s.bpm + ' BPM', cx+22, cy+cardH*0.62);

    // Level badge (우측 하단)
    if (sel) {
      const lv = calcLevel(i, selectedDiff);
      const lvText = 'Lv.' + lv;
      const lvFont = Math.min(13, W*0.025);
      ctx.font = `bold ${lvFont}px sans-serif`;
      ctx.textAlign = 'right';
      const lvColor = DIFFICULTIES[selectedDiff].color;
      // 배지 배경
      const lvW = ctx.measureText(lvText).width + 14;
      const lvH = lvFont + 8;
      const lvX = cx + cardW - 10 - lvW;
      const lvY = cy + cardH - 10 - lvH;
      ctx.fillStyle = lvColor + '30';
      rrFill(lvX, lvY, lvW, lvH, 6);
      ctx.strokeStyle = lvColor + '88'; ctx.lineWidth = 1;
      rrStroke(lvX, lvY, lvW, lvH, 6);
      // 레벨 텍스트
      ctx.fillStyle = lvColor;
      ctx.fillText(lvText, lvX + lvW - 7, lvY + lvH/2 + lvFont*0.35);
      ctx.textAlign = 'left';
    }

    // Dim overlay for non-selected cards
    if (!sel) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      rrFill(cx, cy, cardW, cardH, 14);
    }

    ctx.restore();
  }

  // Achievement + Ranking buttons (below song cards, for selected song only)
  const subBtnY = songRowY + cardH + subBtnGap;
  const subBtnW = Math.min(120, cardW * 0.45);
  const subBtnGapX = 14;
  const subBtnTotalW = subBtnW * 2 + subBtnGapX;
  const subBtnX = (W - subBtnTotalW) / 2;
  ctx.fillStyle = '#ffd70015'; rrFill(subBtnX, subBtnY, subBtnW, subBtnH, 8);
  ctx.strokeStyle = '#ffd70044'; ctx.lineWidth = 1; rrStroke(subBtnX, subBtnY, subBtnW, subBtnH, 8);
  ctx.textAlign = 'center'; ctx.font = `bold ${Math.min(13, W*0.026)}px sans-serif`;
  ctx.fillStyle = '#ffd700bb';
  ctx.fillText('업적', subBtnX + subBtnW/2, subBtnY + subBtnH/2 + 5);
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; rrFill(subBtnX + subBtnW + subBtnGapX, subBtnY, subBtnW, subBtnH, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; rrStroke(subBtnX + subBtnW + subBtnGapX, subBtnY, subBtnW, subBtnH, 8);
  ctx.font = `bold ${Math.min(13, W*0.026)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('랭킹', subBtnX + subBtnW + subBtnGapX + subBtnW/2, subBtnY + subBtnH/2 + 5);

  // Difficulty selector
  const optY1 = subBtnY + subBtnH + sectionGap;
  const cx = (W - optW) / 2;
  ctx.textAlign='left'; ctx.font=`bold ${Math.min(15,W*0.03)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText('난이도',cx+4,optY1-8);

  const diffBtnW = (optW - (DIFFICULTIES.length-1)*8) / DIFFICULTIES.length;
  DIFFICULTIES.forEach((d, i) => {
    const bx = cx + i * (diffBtnW + 8), sel = i === selectedDiff;
    ctx.fillStyle = sel ? d.color+'33' : 'rgba(255,255,255,0.03)';
    rrFill(bx, optY1, diffBtnW, optH, 8);
    ctx.strokeStyle = sel ? d.color : 'rgba(255,255,255,0.08)'; ctx.lineWidth = sel ? 2 : 1;
    if (sel) { ctx.shadowColor = d.color; ctx.shadowBlur = 8; }
    rrStroke(bx, optY1, diffBtnW, optH, 8); ctx.shadowBlur = 0;
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.min(15,W*0.03)}px sans-serif`;
    ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.4)';
    ctx.fillText(d.name, bx + diffBtnW/2, optY1 + optH*0.43);
    ctx.font = `${Math.min(10,W*0.02)}px sans-serif`;
    ctx.fillStyle = sel ? d.color+'aa' : 'rgba(255,255,255,0.2)';
    ctx.fillText(d.sub, bx + diffBtnW/2, optY1 + optH*0.76);
  });

  // Speed selector
  const optY2 = optY1 + optH + optGap;
  ctx.textAlign='left'; ctx.font=`bold ${Math.min(15,W*0.03)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText('배속',cx+4,optY2-8);

  // − [slider] + 배속 UI
  const spdBtnW = Math.min(40, optW * 0.15);
  const spdMidW = optW - spdBtnW * 2 - 12;
  const spdMinusX = cx, spdValX = cx + spdBtnW + 6, spdPlusX = cx + optW - spdBtnW;
  const isFocusSpd = selectFocus === 2;
  // − 버튼
  ctx.fillStyle = selectedSpeed > SPEED_MIN ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.02)';
  rrFill(spdMinusX, optY2, spdBtnW, optH, 8);
  ctx.strokeStyle = isFocusSpd ? '#ffd70066' : 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  rrStroke(spdMinusX, optY2, spdBtnW, optH, 8);
  ctx.textAlign = 'center'; ctx.font = `bold ${Math.min(20,W*0.04)}px sans-serif`;
  ctx.fillStyle = selectedSpeed > SPEED_MIN ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.15)';
  ctx.fillText('−', spdMinusX + spdBtnW/2, optY2 + optH*0.6);
  // 값 표시 (중앙) — 입력 모드 분기
  if (speedInputActive) {
    ctx.fillStyle = '#ffd70030'; rrFill(spdValX, optY2, spdMidW, optH, 8);
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
    rrStroke(spdValX, optY2, spdMidW, optH, 8); ctx.shadowBlur = 0;
    ctx.font = `bold ${Math.min(18,W*0.036)}px sans-serif`;
    ctx.fillStyle = '#fff';
    const cursor = Math.floor(Date.now()/500)%2===0 ? '|' : '';
    const dispText = speedInputText.length > 0 ? speedInputText + cursor : cursor;
    ctx.fillText(dispText, spdValX + spdMidW/2, optY2 + optH*0.58);
    // 힌트
    ctx.font = `${Math.min(9,W*0.017)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText(SPEED_MIN+'~'+SPEED_MAX+' 입력 후 Enter', spdValX + spdMidW/2, optY2 + optH + 12);
  } else {
    ctx.fillStyle = '#ffd70018'; rrFill(spdValX, optY2, spdMidW, optH, 8);
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8;
    rrStroke(spdValX, optY2, spdMidW, optH, 8); ctx.shadowBlur = 0;
    ctx.font = `bold ${Math.min(18,W*0.036)}px sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText(selectedSpeed.toFixed(1)+'x', spdValX + spdMidW/2, optY2 + optH*0.58);
  }
  // + 버튼
  ctx.fillStyle = selectedSpeed < SPEED_MAX ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.02)';
  rrFill(spdPlusX, optY2, spdBtnW, optH, 8);
  ctx.strokeStyle = isFocusSpd ? '#ffd70066' : 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  rrStroke(spdPlusX, optY2, spdBtnW, optH, 8);
  ctx.font = `bold ${Math.min(20,W*0.04)}px sans-serif`;
  ctx.fillStyle = selectedSpeed < SPEED_MAX ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.15)';
  ctx.fillText('+', spdPlusX + spdBtnW/2, optY2 + optH*0.6);

  // Start button
  const btnW = Math.min(220, optW*0.55);
  const btnX = (W-btnW)/2, btnY = optY2 + optH + sectionGap + 4;
  const sc = songs[selectedSong].color;
  ctx.fillStyle = sc + '33'; rrFill(btnX, btnY, btnW, btnH, 14);
  ctx.strokeStyle = sc; ctx.lineWidth = 2;
  ctx.shadowColor = sc; ctx.shadowBlur = 14;
  rrStroke(btnX, btnY, btnW, btnH, 14); ctx.shadowBlur = 0;
  ctx.textAlign = 'center';
  ctx.font = `bold ${Math.min(20,W*0.04)}px sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.fillText('▶ 시작', W/2, btnY + btnH*0.6);

  // My best score for selected song+diff
  const myBest = getMyBest(selectedSong, selectedDiff);
  if (myBest > 0) {
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.min(13, W*0.025)}px sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText('MY BEST: ' + myBest.toLocaleString(), W/2, btnY + btnH + 20);
  }

  // Coin display
  ctx.textAlign='center'; ctx.font=`bold ${Math.min(11,W*0.021)}px sans-serif`;
  ctx.fillStyle='#ffd700aa';
  ctx.fillText('🪙 ' + getCoins().toLocaleString() + '¢', W/2, btnY + btnH + (myBest > 0 ? 40 : 24));

  // User name + help
  ctx.textAlign='center'; ctx.font='11px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText(currentUser + '  |  ←→ 곡 선택  ·  ↑↓ 항목 이동  ·  Enter 시작',W/2,H-16);

  // ===== CHART PANEL (좌측) =====
  updateChartCache();
  const chartPanelW = Math.min(200, (cxBase - 10));
  if (chartPanelW > 100) { // 좌측에 충분한 공간 있을 때만
    const cpX = 8, cpY = 50;
    const cpH = H - cpY - 30;
    // 패널 배경
    ctx.fillStyle = 'rgba(10,8,25,0.75)';
    rrFill(cpX, cpY, chartPanelW, cpH, 10);
    ctx.strokeStyle = 'rgba(120,100,200,0.2)'; ctx.lineWidth = 1;
    rrStroke(cpX, cpY, chartPanelW, cpH, 10);

    // 탭 버튼
    const tabH = 24, tabGap = 3;
    const tabW = (chartPanelW - 12 - tabGap * 3) / 4;
    for (let ti = 0; ti < 4; ti++) {
      const tx = cpX + 6 + ti * (tabW + tabGap);
      const ty = cpY + 6;
      const sel = ti === chartTab;
      ctx.fillStyle = sel ? 'rgba(120,80,220,0.5)' : 'rgba(255,255,255,0.05)';
      rrFill(tx, ty, tabW, tabH, 5);
      if (sel) { ctx.strokeStyle = 'rgba(160,130,255,0.6)'; ctx.lineWidth = 1; rrStroke(tx, ty, tabW, tabH, 5); }
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${Math.min(9, tabW*0.35)}px sans-serif`;
      ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.4)';
      ctx.fillText(CHART_TABS[ti].label, tx + tabW/2, ty + tabH/2);
    }

    // 차트 리스트
    const listY = cpY + 6 + tabH + 8;
    const listH = cpH - tabH - 20;
    const itemH = 36;
    const maxVisible = Math.floor(listH / itemH);
    ctx.save();
    ctx.beginPath();
    ctx.rect(cpX, listY, chartPanelW, listH);
    ctx.clip();

    for (let ci = 0; ci < Math.min(chartCache.length, maxVisible); ci++) {
      const item = chartCache[ci];
      const iy = listY + ci * itemH - chartScroll * itemH;
      if (iy + itemH < listY || iy > listY + listH) continue;
      const s = songs[item.idx];
      const isSel = item.idx === selectedSong;

      // 순위 변동 표시
      const prevRank = chartPrevRanks[item.idx];
      let rankChange = 0;
      if (prevRank !== undefined) rankChange = prevRank - ci; // 양수=상승

      // 배경 (선택된 곡 하이라이트)
      if (isSel) {
        ctx.fillStyle = s.color + '25';
        rrFill(cpX + 4, iy + 1, chartPanelW - 8, itemH - 2, 6);
      }

      // 순위 번호
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${ci < 3 ? 14 : 12}px sans-serif`;
      ctx.fillStyle = ci === 0 ? '#ffd700' : ci === 1 ? '#c0c0c0' : ci === 2 ? '#cd7f32' : 'rgba(255,255,255,0.4)';
      ctx.fillText(ci + 1, cpX + 24, iy + itemH/2);

      // 순위 변동 화살표
      if (rankChange > 0) {
        ctx.fillStyle = '#44dd66'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('▲' + rankChange, cpX + 26, iy + itemH/2);
      } else if (rankChange < 0) {
        ctx.fillStyle = '#ff4466'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('▼' + Math.abs(rankChange), cpX + 26, iy + itemH/2);
      }

      // 곡 이름
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = `${Math.min(11, chartPanelW * 0.06)}px sans-serif`;
      ctx.fillStyle = isSel ? '#fff' : 'rgba(255,255,255,0.65)';
      const nameMaxW = chartPanelW - 70;
      const nameText = s.name.length > 14 ? s.name.slice(0, 13) + '..' : s.name;
      ctx.fillText(nameText, cpX + 42, iy + itemH/2 - 6);

      // 플레이 수
      ctx.font = `${Math.min(9, chartPanelW * 0.045)}px sans-serif`;
      ctx.fillStyle = s.color + (isSel ? 'cc' : '77');
      ctx.fillText(item.count + ' plays', cpX + 42, iy + itemH/2 + 8);

      // HOT 탭이면 실시간 불꽃 이펙트 (1위)
      if (chartTab === 0 && ci === 0 && item.count > 0) {
        ctx.fillStyle = '#ffd700';
        ctx.font = '10px sans-serif';
        ctx.fillText('🔥', cpX + chartPanelW - 22, iy + itemH/2);
      }
    }
    ctx.restore();

    // "CHART" 라벨
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${Math.min(10, chartPanelW*0.055)}px sans-serif`;
    ctx.fillStyle = 'rgba(160,140,255,0.5)';
    ctx.fillText('CHART', cpX + chartPanelW/2, cpY - 8);
    ctx.restore();
  }

  // Search filter dropdown (drawn last for z-order)
  if (searchActive && searchText) {
    const filterItemH = 38;
    const dropY = searchBarY + searchBarH + 4;
    if (searchFiltered.length > 0) {
      const filterDropdownH = searchFiltered.length * filterItemH + 8;
      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = '#ffd70044'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      searchFiltered.forEach((songIdx, fi) => {
        const iy = dropY + 4 + fi * filterItemH;
        const isHl = fi === searchHighlight;
        if (isHl) {
          ctx.fillStyle = songs[songIdx].color + '33';
          rrFill(cxBase + 4, iy, optW - 8, filterItemH - 2, 6);
        }
        ctx.textAlign = 'left';
        ctx.font = `bold ${Math.min(14, W*0.03)}px sans-serif`;
        ctx.fillStyle = isHl ? '#fff' : 'rgba(255,255,255,0.6)';
        ctx.fillText(songs[songIdx].name, cxBase + 14, iy + filterItemH * 0.45);
        ctx.font = `${Math.min(11, W*0.02)}px sans-serif`;
        ctx.fillStyle = songs[songIdx].color + (isHl ? 'cc' : '77');
        ctx.fillText(songs[songIdx].sub + '  ·  ' + songs[songIdx].bpm + ' BPM', cxBase + 14, iy + filterItemH * 0.78);
      });
    } else {
      const filterDropdownH = 36;
      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.textAlign = 'center'; ctx.font = '12px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText('검색 결과 없음', cxBase + optW/2, dropY + filterDropdownH/2 + 4);
    }
  }
}

// ===== LOGIN =====
function renderLogin() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.25; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;

  ctx.font=`bold ${Math.min(32,W*0.06)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=10;
  ctx.fillText('리듬 러너',W/2,H*0.22); ctx.shadowBlur=0;

  ctx.font=`${Math.min(15,W*0.028)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('닉네임을 입력하세요',W/2,H*0.35);

  // Input box
  const bw = Math.min(260, W*0.65), bh = 44;
  const bx = (W-bw)/2, by = H*0.42;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bx, by, bw, bh, 10);
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2;
  rrStroke(bx, by, bw, bh, 10);

  ctx.font=`bold ${Math.min(20,W*0.038)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  const cursor = Math.sin(Date.now()*0.005) > 0 ? '|' : '';
  ctx.fillText(loginInput + cursor, W/2, by + bh*0.6);

  // 시작 버튼 (모바일 + 데스크톱)
  if (loginInput.trim().length > 0) {
    const sbW = Math.min(140, W*0.35), sbH = 40;
    const sbX = (W-sbW)/2, sbY = by + bh + 20;
    ctx.fillStyle='#ffd70022'; rrFill(sbX, sbY, sbW, sbH, 10);
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
    rrStroke(sbX, sbY, sbW, sbH, 10); ctx.shadowBlur=0;
    ctx.font=`bold ${Math.min(16,W*0.03)}px sans-serif`;
    ctx.fillStyle='#ffd700'; ctx.textAlign='center';
    ctx.fillText('시작', W/2, sbY + sbH*0.6);
    // 히트 영역 저장 (클릭 핸들러에서 사용)
    loginStartBtn = { x: sbX, y: sbY, w: sbW, h: sbH };
  } else {
    loginStartBtn = null;
    ctx.font=`${Math.min(13,W*0.025)}px sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('화면을 터치하여 입력',W/2,by + bh + 40);
  }
}

// ===== RANKING =====
// ===== ACHIEVEMENT SCREEN =====
function renderAchievement() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;

  // Back button
  const bbW = 70, bbH = 38, bbX = 12, bbY = 10;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, 8);
  ctx.textAlign='center'; ctx.font=`bold ${Math.min(13,W*0.025)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('← 뒤로', bbX+bbW/2, bbY+bbH*0.65);

  // Title + coin
  ctx.font=`bold ${Math.min(24,W*0.042)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  const achTitle = achievementSongFilter >= 0 ? songs[achievementSongFilter].name + ' 업적' : '업적';
  ctx.fillText(achTitle,W/2,H*0.06+10); ctx.shadowBlur=0;
  ctx.font=`bold ${Math.min(13,W*0.025)}px sans-serif`;
  ctx.fillStyle='#ffd700'; ctx.textAlign='right';
  ctx.fillText(getCoins().toLocaleString()+' 코인', W-14, 28);

  // Type tabs
  const tabW = Math.min(300, W*0.75);
  const tabBtnW = tabW / ACH_TABS.length;
  const tabX = (W - tabW) / 2, tabY = H*0.12;
  ACH_TABS.forEach((tab, i) => {
    const bx = tabX + i * tabBtnW, sel = i === achievementTab;
    ctx.fillStyle = sel ? '#ffd70033' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, 28);
    if (sel) { ctx.fillStyle='#ffd700'; ctx.fillRect(bx, tabY+25, tabBtnW, 3); }
    ctx.textAlign='center';
    ctx.font=`bold ${Math.min(12,W*0.023)}px sans-serif`;
    ctx.fillStyle = sel ? '#ffd700' : 'rgba(255,255,255,0.4)';
    ctx.fillText(tab.icon+' '+tab.label, bx+tabBtnW/2, tabY+18);
  });

  // Filter and progress
  const curType = ACH_TABS[achievementTab].key;
  const unlocked = getUnlocked();
  const filtered = ALL_ACHIEVEMENTS.filter(a => a.type === curType && (achievementSongFilter < 0 || a.songIdx === achievementSongFilter));
  const unlockedCount = filtered.filter(a => unlocked[a.id]).length;

  // Progress bar
  const progW = Math.min(200, W*0.5), progH = 4;
  const progX = (W-progW)/2, progY = tabY + 36;
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(progX, progY, progW, progH);
  ctx.fillStyle='#ffd700'; ctx.fillRect(progX, progY, progW*(unlockedCount/Math.max(1,filtered.length)), progH);
  ctx.font=`${Math.min(10,W*0.019)}px sans-serif`; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText(unlockedCount+' / '+filtered.length+' 달성', W/2, progY+16);

  // Grouped rows
  const listY = progY + 26, rowH = 34;
  const listW = Math.min(340, W*0.85);
  const listX = (W - listW) / 2;
  const rows = getAchRows();

  const maxVisible = Math.floor((H - listY - 30) / rowH);
  const maxScroll = Math.max(0, rows.length - maxVisible);
  if (achievementScroll > maxScroll) achievementScroll = maxScroll;
  const end = Math.min(rows.length, achievementScroll + maxVisible);

  for (let i = achievementScroll; i < end; i++) {
    const row = rows[i];
    const ry = listY + (i - achievementScroll) * rowH;

    if (row.type === 'header') {
      // Song header row
      ctx.fillStyle = row.song.color + '18';
      rrFill(listX, ry, listW, rowH - 3, 6);
      ctx.fillStyle = row.song.color + '44'; ctx.fillRect(listX+3, ry+4, 4, rowH-11);
      ctx.textAlign='left';
      ctx.font=`bold ${Math.min(13,W*0.025)}px sans-serif`;
      ctx.fillStyle = row.song.color;
      ctx.fillText(row.song.name, listX+14, ry+rowH*0.55);
      ctx.textAlign='right';
      ctx.font=`${Math.min(11,W*0.021)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(row.songDone+'/'+row.songTotal, listX+listW-10, ry+rowH*0.55);
    } else {
      const a = row.ach, done = row.done;
      // Achievement row
      ctx.fillStyle = done ? '#ffd70008' : 'rgba(255,255,255,0.015)';
      rrFill(listX+8, ry, listW-16, rowH - 3, 5);
      if (done) {
        ctx.strokeStyle='#ffd70022'; ctx.lineWidth=1; rrStroke(listX+8, ry, listW-16, rowH-3, 5);
      }

      // Check / lock
      ctx.textAlign='center';
      ctx.font=`bold ${Math.min(13,W*0.025)}px sans-serif`;
      ctx.fillStyle = done ? '#44dd66' : 'rgba(255,255,255,0.15)';
      ctx.fillText(done ? '✓' : '○', listX+24, ry+rowH*0.55);

      // Label (without song name, since it's under the header)
      ctx.textAlign='left';
      ctx.font=`${Math.min(11,W*0.021)}px sans-serif`;
      ctx.fillStyle = done ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      // Strip song name from label for cleaner display
      const shortLabel = a.label.replace(/^.+? — /, '');
      ctx.fillText(shortLabel, listX+40, ry+rowH*0.55);

      // Claim button / coins
      ctx.textAlign='right';
      ctx.font=`bold ${Math.min(11,W*0.021)}px sans-serif`;
      if (done && !row.claimed) {
        // Claimable - draw button
        const cbW = 52, cbH = 20, cbX = listX+listW-16-cbW, cbY = ry + (rowH-3-cbH)/2;
        ctx.fillStyle = '#ffd70033'; rrFill(cbX, cbY, cbW, cbH, 5);
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1; rrStroke(cbX, cbY, cbW, cbH, 5);
        ctx.textAlign='center';
        ctx.font=`bold ${Math.min(10,W*0.019)}px sans-serif`;
        ctx.fillStyle = '#ffd700';
        ctx.fillText('+'+a.coins+' 받기', cbX+cbW/2, cbY+cbH*0.65);
      } else if (done && row.claimed) {
        ctx.fillStyle = '#44dd6688';
        ctx.fillText('수령완료', listX+listW-16, ry+rowH*0.55);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillText('+'+a.coins, listX+listW-16, ry+rowH*0.55);
      }
    }
  }

  if (rows.length === 0) {
    ctx.font=`${Math.min(14,W*0.027)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('업적이 없습니다', W/2, listY+40);
  }

  // Help
  ctx.textAlign='center'; ctx.font='11px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('←→ 카테고리  ·  ↑↓ 스크롤  ·  ESC 돌아가기',W/2,H-16);
}

function renderRanking() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song = songs[selectedSong];

  // Back button
  const bbW = 70, bbH = 38, bbX = 12, bbY = 10;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, 8);
  ctx.textAlign='center'; ctx.font=`bold ${Math.min(13,W*0.025)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('← 뒤로', bbX+bbW/2, bbY+bbH*0.65);

  ctx.font=`bold ${Math.min(26,W*0.045)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillText('랭킹',W/2,H*0.07+10); ctx.shadowBlur=0;

  // Song name
  ctx.font=`${Math.min(15,W*0.028)}px sans-serif`;
  ctx.fillStyle=song.color;
  ctx.fillText(song.name+' — '+song.sub,W/2,H*0.13);

  // Difficulty tabs
  const tabW = Math.min(280, W*0.7);
  const tabBtnW = tabW / DIFFICULTIES.length;
  const tabX = (W - tabW) / 2, tabY = H*0.17;
  DIFFICULTIES.forEach((d, i) => {
    const bx = tabX + i * tabBtnW, sel = i === selectedDiff;
    ctx.fillStyle = sel ? d.color+'33' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, 28);
    if (sel) { ctx.fillStyle = d.color; ctx.fillRect(bx, tabY+25, tabBtnW, 3); }
    ctx.textAlign='center';
    ctx.font=`bold ${Math.min(12,W*0.023)}px sans-serif`;
    ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.4)';
    ctx.fillText(d.name, bx + tabBtnW/2, tabY + 18);
  });

  // Rankings list
  const rankings = getRankings(selectedSong, selectedDiff);
  const listY = H*0.27, rowH = 32;
  const listW = Math.min(300, W*0.75);
  const listX = (W - listW) / 2;
  const maxVisible = Math.floor((H*0.6) / rowH);

  if (rankings.length === 0) {
    ctx.font=`${Math.min(14,W*0.027)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('기록이 없습니다',W/2,listY + 40);
  } else {
    const end = Math.min(rankings.length, rankingScroll + maxVisible);
    for (let i = rankingScroll; i < end; i++) {
      const r = rankings[i];
      const ry = listY + (i - rankingScroll) * rowH;
      const isMe = r.name === currentUser;

      // Row bg
      ctx.fillStyle = isMe ? song.color+'15' : 'rgba(255,255,255,0.03)';
      rrFill(listX, ry, listW, rowH - 4, 6);
      if (isMe) {
        ctx.strokeStyle = song.color+'44'; ctx.lineWidth = 1;
        rrStroke(listX, ry, listW, rowH - 4, 6);
      }

      // Rank number
      ctx.textAlign='center';
      ctx.font=`bold ${Math.min(16,W*0.03)}px sans-serif`;
      const rankColors = ['#ffd700','#c0c0c0','#cd7f32'];
      ctx.fillStyle = i < 3 ? rankColors[i] : 'rgba(255,255,255,0.4)';
      ctx.fillText(''+(i+1), listX + 22, ry + rowH*0.55);

      // Name
      ctx.textAlign='left';
      ctx.font=`${isMe?'bold ':''}${Math.min(14,W*0.027)}px sans-serif`;
      ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.7)';
      ctx.fillText(r.name, listX + 45, ry + rowH*0.55);

      // Score
      ctx.textAlign='right';
      ctx.font=`bold ${Math.min(14,W*0.027)}px sans-serif`;
      ctx.fillStyle = isMe ? song.color : 'rgba(255,255,255,0.6)';
      ctx.fillText(r.score.toLocaleString(), listX + listW - 10, ry + rowH*0.55);
    }
  }

  // Help text
  ctx.textAlign='center'; ctx.font='11px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('←→ 난이도  ·  ↑↓ 스크롤  ·  ESC 돌아가기',W/2,H-16);
}

// ===== RESULT =====
function renderResult() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song=curSong;
  ctx.font=`bold ${Math.min(34,W*0.06)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillText('RESULT',W/2,H*0.1+12); ctx.shadowBlur=0;
  ctx.font=`${Math.min(15,W*0.028)}px sans-serif`; ctx.fillStyle=song.color;
  const diffLabel = curDiff ? curDiff.name : '';
  const spdLabel = selectedSpeed.toFixed(1)+'x';
  ctx.fillText(song.name+' — '+song.sub+'  ·  '+diffLabel+'  ·  '+spdLabel,W/2,H*0.17);

  const pct=totalNodes>0?collected/totalNodes:0;
  const grade=pct>=0.98?'S':pct>=0.90?'A':pct>=0.80?'B':pct>=0.60?'C':'D';
  const gc={S:'#ffd700',A:'#00ff88',B:'#00d4ff',C:'#ff9500',D:'#ff3333'};

  ctx.beginPath(); ctx.arc(W/2,H*0.33,Math.min(48,W*0.085),0,Math.PI*2);
  ctx.strokeStyle=gc[grade]+'44'; ctx.lineWidth=3; ctx.stroke();
  ctx.font=`bold ${Math.min(68,W*0.12)}px sans-serif`;
  ctx.fillStyle=gc[grade]; ctx.shadowColor=gc[grade]; ctx.shadowBlur=20;
  ctx.textBaseline='middle'; ctx.fillText(grade,W/2,H*0.33);
  ctx.shadowBlur=0; ctx.textBaseline='alphabetic';

  const stats=[['SCORE',score.toLocaleString()],['MAX COMBO',maxCombo+'x'],['HIT',collected+' / '+totalNodes],['MISS',''+missed],['ACCURACY',(pct*100).toFixed(1)+'%']];
  ctx.font=`${Math.min(13,W*0.024)}px sans-serif`;
  const sy0=H*0.48;
  stats.forEach((s,i)=>{
    const sy=sy0+i*26;
    ctx.fillStyle='rgba(255,255,255,0.03)';
    const bw=Math.min(250,W*0.52);
    rrFill((W-bw)/2,sy-10,bw,20,5);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText(s[0],W/2-10,sy+4);
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(s[1],W/2+10,sy+4);
  });

  const msgs={S:'PERFECT!',A:'EXCELLENT!',B:'GREAT!',C:'GOOD',D:'TRY AGAIN'};
  ctx.font=`bold ${Math.min(17,W*0.03)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle=gc[grade]; ctx.fillText(msgs[grade],W/2,H*0.76);

  // Best score / new record
  const myBest = getMyBest(curSongIdx, selectedDiff);
  if (myBest > 0) {
    ctx.font=`bold ${Math.min(14,W*0.026)}px sans-serif`;
    if (score >= myBest) {
      ctx.fillStyle='#ffd700';
      ctx.fillText('NEW RECORD!  ' + myBest.toLocaleString(), W/2, H*0.81);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('BEST: ' + myBest.toLocaleString(), W/2, H*0.81);
    }
  }

  // Newly unlocked achievements
  if (newlyUnlocked.length > 0) {
    const achY = H*0.84;
    const achW = Math.min(280, W*0.6);
    const achX = (W-achW)/2;
    const show = Math.min(newlyUnlocked.length, 3);
    let totalCoins = 0;
    for (const a of newlyUnlocked) totalCoins += a.coins;

    ctx.font=`bold ${Math.min(12,W*0.023)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='#ffd700';
    ctx.fillText('업적 달성! +'+totalCoins.toLocaleString()+' 코인', W/2, achY);

    for (let i = 0; i < show; i++) {
      const a = newlyUnlocked[i];
      const ry = achY + 10 + i * 22;
      ctx.fillStyle='#ffd70015'; rrFill(achX, ry, achW, 18, 4);
      ctx.strokeStyle='#ffd70044'; ctx.lineWidth=1; rrStroke(achX, ry, achW, 18, 4);
      ctx.font=`${Math.min(10,W*0.019)}px sans-serif`;
      ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fillText(a.label, achX+8, ry+13);
      ctx.textAlign='right'; ctx.fillStyle='#ffd700';
      ctx.fillText('+'+a.coins, achX+achW-8, ry+13);
    }
    if (newlyUnlocked.length > 3) {
      ctx.font=`${Math.min(10,W*0.019)}px sans-serif`;
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('+'+(newlyUnlocked.length-3)+'개 더...', W/2, achY+10+show*22+12);
    }
  }

  ctx.font='13px sans-serif';
  ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(Date.now()*0.004)*0.2})`;
  ctx.fillText('\uD0ED\uD558\uC5EC \uB3CC\uC544\uAC00\uAE30',W/2,H*0.94);
}

// ===== PAUSE ON TAB HIDDEN =====
let gamePaused = false;
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'playing' && countdownTime <= 0) {
    gamePaused = true;
    // 스템/BGM 일시정지
    for (let i = 0; i < allStemAudios.length; i++) {
      if (allStemAudios[i]) allStemAudios[i].pause();
    }
    if (songAudio) songAudio.pause();
  }
});

function pauseGame() {
  if (state !== 'playing' || countdownTime > 0 || gamePaused) return;
  gamePaused = true;
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) allStemAudios[i].pause();
  }
  if (songAudio) songAudio.pause();
}

function resumeGame() {
  gamePaused = false;
  if (usingStemMode) {
    for (let i = 0; i < allStemAudios.length; i++) {
      if (allStemAudios[i]) allStemAudios[i].play().catch(()=>{});
    }
  } else if (songAudio) {
    songAudio.play().catch(()=>{});
  }
}

// ===== LOOP =====
let lastTime = 0;
function loop(time) {
  const dt = Math.min((time-lastTime)/1000, 0.05);
  lastTime = time;
  if (!gamePaused) { update(dt); }
  updateFade(dt);
  render();
  // 일시정지 오버레이
  if (gamePaused && state === 'playing') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.min(36,W*0.07)}px sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText('PAUSED', W/2, H/2 - 30);
    // 재개 버튼
    const rbW = Math.min(180, W*0.4), rbH = 48;
    const rbX = (W-rbW)/2, rbY = H/2;
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(rbX, rbY, rbW, rbH, 12);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
    rrStroke(rbX, rbY, rbW, rbH, 12);
    ctx.font = `bold ${Math.min(18,W*0.035)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('▶ 계속하기', W/2, rbY + rbH*0.6);
  }
  renderFade();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
