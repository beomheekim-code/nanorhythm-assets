<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KPLAY Mock Host (로컬 테스트)</title>
  <style>
    html,body{margin:0;height:100%;background:#0b0b16;color:#eee;font-family:system-ui,sans-serif}
    body{display:flex}
    #side{width:240px;padding:12px;background:#13132a;border-right:1px solid #2a2a4a;overflow-y:auto;font-size:12px;flex-shrink:0}
    #side h2{font-size:13px;margin:0 0 6px;color:#ffd700;letter-spacing:.5px}
    #side .hint{font-size:10px;color:#888;margin-bottom:10px;line-height:1.4}
    #side button{display:block;width:100%;margin:4px 0;padding:6px 8px;background:#22224a;color:#fff;border:1px solid #3a3a6a;border-radius:4px;cursor:pointer;font-size:11px;text-align:left}
    #side button:hover{background:#2c2c5e}
    #side button.active{background:#3a5a3a;border-color:#5e8e5e}
    #side .group{margin-bottom:14px}
    #log{font-size:10px;max-height:42vh;overflow-y:auto;background:#000;padding:6px;border-radius:4px;font-family:ui-monospace,monospace}
    #log div{padding:1px 0;line-height:1.3;word-break:break-all}
    #frame{flex:1;position:relative;background:#000}
    iframe{width:100%;height:100%;border:0;display:block}
    #rwOv{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:none;align-items:center;justify-content:center;z-index:9999}
    #rwOv .box{background:#1a1a2e;border:1px solid #ffd70066;padding:28px 36px;border-radius:14px;text-align:center;min-width:280px}
    #rwOv .ttl{font-size:20px;font-weight:bold;color:#ffd700;margin-bottom:8px}
    #rwOv .sub{font-size:12px;color:#999;margin-bottom:18px}
    #rwOv .bar{width:240px;height:6px;background:#222;border-radius:3px;overflow:hidden;margin:0 auto}
    #rwOv .bar>div{height:100%;background:#ffd700;width:0%}
    #rwOv .cd{font-size:13px;color:#ddd;margin-top:14px}
    #rwOv button{margin-top:16px;padding:9px 22px;background:#ffd700;color:#000;border:0;font-weight:bold;border-radius:6px;cursor:pointer;font-size:13px}
  </style>
</head>
<body>
  <div id="side">
    <h2>🎮 KPLAY Mock Host</h2>
    <div class="hint">로컬에서 KPLAY iframe 환경을 흉내 냅니다. 게임이 보내는 postMessage 를 받아 mock 응답을 돌려줘요.</div>

    <div class="group">
      <h2>다음 보상 결과</h2>
      <button id="bSuc" class="active">✅ 성공 (기본)</button>
      <button id="bFail">❌ 실패 (mock_fail)</button>
      <button id="bTo">⏳ Timeout (응답 안 보냄)</button>
    </div>

    <div class="group">
      <h2>도구</h2>
      <button id="bReload">↻ 게임 새로고침</button>
      <button id="bClear">🧹 로그 지우기</button>
    </div>

    <div class="group">
      <h2>메시지 로그</h2>
      <div id="log"></div>
    </div>
  </div>
  <div id="frame">
    <iframe id="game" src="index.html" title="game"></iframe>
  </div>

  <div id="rwOv">
    <div class="box">
      <div class="ttl">📺 Mock 보상 영상</div>
      <div class="sub">5초 시청 후 보상 지급 (시뮬레이션)</div>
      <div class="bar"><div id="rwBar"></div></div>
      <div class="cd" id="rwCd">5초</div>
      <button id="rwClose" style="display:none">닫고 보상 받기</button>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const logEl = $('log');
    function log(msg, color) {
      const d = document.createElement('div');
      d.textContent = '[' + new Date().toTimeString().slice(0,8) + '] ' + msg;
      if (color) d.style.color = color;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }

    let nextBehavior = 'success';
    function setBehavior(b) {
      nextBehavior = b;
      ['bSuc','bFail','bTo'].forEach(id => $(id).classList.remove('active'));
      ({success:'bSuc',fail:'bFail',timeout:'bTo'})[b] && $({success:'bSuc',fail:'bFail',timeout:'bTo'}[b]).classList.add('active');
      log('다음 보상 → ' + b, '#aaccff');
    }
    $('bSuc').onclick = () => setBehavior('success');
    $('bFail').onclick = () => setBehavior('fail');
    $('bTo').onclick = () => setBehavior('timeout');
    $('bReload').onclick = () => { $('game').src = $('game').src; log('게임 reload', '#ffaa66'); };
    $('bClear').onclick = () => { logEl.innerHTML = ''; };

    const frame = $('game');
    function send(msg) {
      try { frame.contentWindow.postMessage(msg, '*'); log('→ ' + msg.type, '#88ccff'); }
      catch(e) { log('send 실패: ' + e.message, '#ff6666'); }
    }

    window.addEventListener('message', (e) => {
      const d = e.data ?? {};
      if (!d.type) return;
      log('← ' + d.type + (d.requestId ? ' #' + d.requestId : ''));
      switch (d.type) {
        case 'show-reward-overlay':
          if (nextBehavior === 'timeout') { log('  (timeout 모드 — 응답 보류)', '#aaa'); return; }
          startRewardOverlay(nextBehavior === 'success');
          break;
        case 'login-required':
          send({ type: 'user-info', userId: 'mock_user_1', name: 'MockUser', credits: 1000 });
          break;
        case 'purchase-item':
          send({ type: 'purchase-result', success: true, balance: 900, itemId: d.itemId });
          break;
        case 'submit-score':
          send({ type: 'score-submitted', success: true });
          break;
        case 'storage-load':
          send({ type: 'storage-load-result', requestId: d.requestId, success: true, data: {} });
          break;
        case 'storage-set':
          send({ type: 'storage-set-result', requestId: d.requestId, success: true });
          break;
        case 'storage-remove':
          send({ type: 'storage-remove-result', requestId: d.requestId, success: true });
          break;
        case 'credit-shop':
        case 'show-leaderboard':
        case 'analytics-event':
          // 무시 (mock)
          break;
      }
    });

    function startRewardOverlay(success) {
      const ov = $('rwOv'), bar = $('rwBar'), cd = $('rwCd'), btn = $('rwClose');
      ov.style.display = 'flex';
      btn.style.display = 'none';
      const total = 5000, start = performance.now();
      function tick() {
        const elap = performance.now() - start;
        const p = Math.min(1, elap / total);
        bar.style.width = (p * 100) + '%';
        cd.textContent = Math.max(0, Math.ceil((total - elap) / 1000)) + '초';
        if (p < 1) requestAnimationFrame(tick);
        else { btn.style.display = 'inline-block'; cd.textContent = '시청 완료'; }
      }
      requestAnimationFrame(tick);
      btn.onclick = () => {
        ov.style.display = 'none';
        if (success) {
          send({ type: 'reward-overlay-result', success: true, points: 10 });
          log('  보상 지급 (success/points=10)', '#66dd66');
        } else {
          send({ type: 'reward-overlay-result', success: false, error: 'mock_fail' });
          log('  보상 실패 (mock_fail)', '#ff7777');
        }
        setBehavior('success'); // 1회용 후 기본 복귀
      };
    }

    log('Mock host 시작 — http://localhost:8000/mock_host.html', '#66dd66');
  </script>
</body>
</html>
