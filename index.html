}
function renderBackplate() {
  if (state !== 'playing') return;
  const lsx = _fLsx || getLaneStartX();
  const lw  = _fLw  || getLaneW();
  const totalLW = lw * laneCount;
  const btnY = getBtnY();
  const btnH = getBtnH();
  const hitY = getHitY();
  const laneTop = -safeTop;

  const pal = _backplatePalette();

  // РўЁ ваѕьЇ╝вЪ░Віц(ВіѕьЇ╝ВіцьЃђ) Рђћ ВЎИЖ│й ВѓгВЮ┤вЊю ваѕВЮ╝/Вџ░ВИА ьїевёљ ВаюЖ▒░.
  //   ваѕВЮИ ьћёваѕВъёвДї В░еВйю ьЁївЉљвдгвАю вўљваиьЋўЖ▓ї + в▓ёьі╝ вњц вЇ▒вЈё в▓ёьі╝ ьЈГВЌљвДї вДъВХ░ Ж│хв░▒ ВЌєВЮ┤ ваївЇћ.
  //   HP в░ћ/в░░ВєЇ в▓ёьі╝ В╗еьЁїВЮ┤вёѕвіћ Ж░ЂВъљВЮў rounded В║АВіљвАю ваївЇћ (renderUI / Speed Вё╣ВЁў).
  ctx.save();

  // === OUTER FRAME Рђћ ваѕВЮИ + ьЃГ в▓ёьі╝вДї Ж░љВїѕ (HP В╗гвЪ╝ВЮђ в│ёЖ░ю ВўЂВЌГ) ===
  //   HP/в░░ВєЇ В╗еьЁїВЮ┤вёѕвіћ renderUI ВЌљВёю вЈЁвдй ваївЇћ. ВЎИЖ│й ьћёваѕВъёВЮђ ваѕВЮИ ВўЂВЌГ ВаёВџЕ.
  //   РўЁ ВбїВИАВЮђ outerR Вфй margin(sz(6)) Ж│╝ вїђВ╣ГВЮ┤ вљўвЈёвАЮ sz(6) в░ћЖ╣ЦВю╝вАю Рєњ A в▓ёьі╝ ВЎ╝ВфйЖ│╝
  //     ' в▓ёьі╝ ВўцвЦИВфй Ж░ёЖ▓Е вЈЎВЮ╝. вЇћ ВЮ┤ВЃЂ HP В╗гвЪ╝ВЮё ьЈгьЋе ВЋѕ ьЋе (HP віћ вЇћ ВЎ╝Вфй).
  const pad = sz(3);
  const outerX = Math.max(pad, lsx - sz(6));
  // ВЃЂвІе Рђћ ьЎћвЕ┤ вЂЮЖ╣їВДђ ьЎЋВъЦ (ВЃЂвІе ьЁївЉљвдг ВЌєВЋаЖ│а ВѓгВЮ┤вЊювДї ВўгвЮ╝Ж░љ)
  const outerY = -safeTop;
  const outerR = Math.min(W - pad, lsx + totalLW + sz(6));
  const outerW = outerR - outerX;
  // ьЋўвІе Рђћ ьЎћвЕ┤ вЂЮЖ╣їВДђ ьЎЋВъЦ (ьЋўвІе ьЁївЉљвдг ВЌєВЋаЖ│а ВѓгВЮ┤вЊювДї вѓ┤вацЖ░љ)
  const outerB = H + safeBottom;
  const outerH = outerB - outerY;

  if (outerW <= sz(40) || outerH <= sz(60)) { ctx.restore(); return; }

  // РўЁ HP В╗еьЁїВЮ┤вёѕ wedge Y в▓ћВюё (renderUI ВЎђ вЈЎВЮ╝ ВцЉВЋЎ ВаЋваг Вѓ░ВІЮ).
  const _spBtnBP = sz(26);
  const _spBlockHBP = _spBtnBP*3 + sz(3)*2 + sz(3)*2;
  const _colTopBP = -safeTop + sz(14);
  const _colBotBP = getHitY() - sz(8);
  const _colHBP = _colBotBP - _colTopBP;
  const _gapBP = sz(6);
  const _ghBP = Math.max(sz(120), Math.min(sz(260), (_colHBP - _spBlockHBP - _gapBP) * 0.75));
  const _stackHBP = _ghBP + _gapBP + _spBlockHBP;
  const _gyBP = _colTopBP + Math.max(0, (_colHBP - _stackHBP) / 2);
  const _spBlockTopBP = _gyBP + _ghBP + _gapBP;
  const _spBlockBottomBP = _spBlockTopBP + _spBlockHBP;
  const _capHBP = sz(10), _wedgeHBP = sz(14);
  const _bodyTopYBP = (playMode === 'normal') ? _gyBP : _spBlockTopBP;
  const _stripTopY = _bodyTopYBP - _capHBP - _wedgeHBP;
  const _stripBotY = _spBlockBottomBP + _capHBP + _wedgeHBP;
  // cutout в▓ћВюё: ВЎИЖ│й ьћёваѕВъё stroke вѓ┤вХђ(ВЋѕВфй edge Ж╣їВДђ)вДї. lsx (ваѕВЮ╝ ВІюВъЉ) вЦ╝ вёўВДђ ВЋіВЮї.
  const _cutX0 = outerX;
  const _cutX1 = outerX + sz(3.5); // stroke ВЋѕВфй edge = ваѕВЮ╝ ьЁївЉљвдг inner вЮ╝ВЮИ

  // 1) ВєћвдгвЊю В░еВйю вфИВ▓┤ Рђћ ВЃЂвІе/ьЋўвІе вфевЉљ ВДЂЖ░Ђ (ьЁївЉљвдг ВЌєВЮї), ВѓгВЮ┤вЊювДї ьЎћвЕ┤ вЂЮ~вЂЮ
  ctx.fillStyle = 'rgba(28,28,34,0.96)';
  ctx.beginPath();
  ctx.moveTo(outerX, outerY);
  ctx.lineTo(outerX + outerW, outerY);
  ctx.lineTo(outerX + outerW, outerB);
  ctx.lineTo(outerX, outerB);
  ctx.closePath();
  // strip cutout (reverse order for evenodd hole) Рђћ HP wedge Y в▓ћВюё ├Ќ outerX~lsx
  if (_stripBotY > _stripTopY && _cutX1 > _cutX0) {
    ctx.moveTo(_cutX0, _stripTopY);
    ctx.lineTo(_cutX0, _stripBotY);
    ctx.lineTo(_cutX1, _stripBotY);
    ctx.lineTo(_cutX1, _stripTopY);
    ctx.closePath();
  }
  ctx.fill('evenodd');

  // 2) ваѕВЮИ В▒ёвёљвДї Ж▓їВъё BG ЖиИвЮ╝вЇ░ВЮ┤ВЁўВю╝вАю вљўВѓ┤вдгЖИ░. РўЁ В▒ёвёљ ьЋўвІеВЮё hitY Ж╣їВДђвАю ВаюьЋю Рєњ
  //    ьїљВаЋВёа ВЋёвъўвіћ вІцВІю outer frame В░еВйю(в│ёвЈё в░▒ьїљ) ВЮ┤ в│┤ВЮ┤Ж▓ї вље.
  const _sg = curSong || songs[0];
  const _bgGrad = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  _bgGrad.addColorStop(0, _sg.bg1 || '#000');
  _bgGrad.addColorStop(1, _sg.bg2 || '#111');
  ctx.fillStyle = _bgGrad;
  for (let i = 0; i < laneCount; i++) {
    const laneX = lsx + i * lw;
    ctx.fillRect(laneX, outerY + sz(4), lw, hitY - outerY - sz(4));
  }

  ctx.restore();
  // ьЁївЉљвдг stroke віћ renderBackplateBorder() ВЌљВёю ьїљВаЋВёа ВюёВЌљ ЖиИвд╝
}

// ьїљВаЋВёа в░Љ В░еВйю ьїљ Рђћ вЁИьіИ ВюёВЌљ вЇДВ╣ављўВќ┤ вЁИьіИЖ░ђ ьїљВаЋВёа ВЋёвъўвАю вќеВќ┤ВДђвЕ┤ Ж░ђвацВДљ.
//   ваївЇћ ВѕюВёю: renderNotes Рєњ renderBackplatePostNotes Рєњ renderHitLine Рєњ renderButtons.
//   ьЃГ в▓ёьі╝ВЮђ ВЮ┤ ьїљ ВюёВЌљ ЖиИвацВДђв»ђвАю в▓ёьі╝вЈё Ж░ђвацВДђВДђ ВЋіВЮї. ВЎИЖ│й ьћёваѕВъё body ВЎђ вЈЎВЮ╝ ВЃЅ.
function renderBackplatePostNotes() {
  if (state !== 'playing') return;
  const lsx = _fLsx || getLaneStartX();
  const lw  = _fLw  || getLaneW();
  const totalLW = lw * laneCount;
  const hitY = getHitY();
  const pad = sz(3);
  const outerX = Math.max(pad, lsx - sz(6));
  const outerR = Math.min(W - pad, lsx + totalLW + sz(6));
  const outerB = H + safeBottom;
  if (hitY + sz(2) < outerB) {
    // sakura_ui PNG Вўцв▓ёвЮ╝ВЮ┤вЊю
    const _uiSk = _getUiPackSkin();
    const _dbPath = _uiSk && _uiSk.imagePaths && _uiSk.imagePaths.deckBase;
    const _dbImg = _dbPath ? skinImages[_dbPath] : null;
    const _dbReady = _dbImg && _dbImg._ok === true;
    if (_dbReady) {
      try {
        ctx.drawImage(_dbImg, outerX, hitY + sz(2), outerR - outerX, outerB - (hitY + sz(2)));
      } catch(e) {}
      // PNG ВЌљ ВёИвАю ВЋАВё╝ьіИ/ВЃЂвІе вЮ╝ВЮИВЮ┤ ВЮ┤в»И ВъѕВю╝в»ђвАю procedural ВЃЮвъх.
      return;
    }
    // Procedural fallback
    // 1) в▓аВЮ┤Віц вХѕьѕгвфЁ В░еВйю
    ctx.fillStyle = 'rgba(28,28,34,0.96)';
    ctx.fillRect(outerX, hitY + sz(2), outerR - outerX, outerB - (hitY + sz(2)));
    // 2) ВЃЂвІеРєњьЋўвІе ВёювИїьІђ ВѕўВДЂ ЖиИвЮ╝вЇ░ВЮ┤ВЁў (ВъЁВ▓┤Ж░љ) Рђћ В║љВІю вХѕЖ░ђВДђвДї Ж▓йвЪЅ.
    const _g = ctx.createLinearGradient(0, hitY + sz(2), 0, outerB);
    _g.addColorStop(0, 'rgba(60,60,72,0.25)');
    _g.addColorStop(0.5, 'rgba(20,20,26,0)');
    _g.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = _g;
    ctx.fillRect(outerX, hitY + sz(2), outerR - outerX, outerB - (hitY + sz(2)));
    // 3) Вбї/Вџ░ ВёИвАю ВЋАВё╝ьіИ в░ћ (UI ьїЕ ВъЦВ░Е ВІю ьїћваѕьіИ, ЖИ░в│ИВЮђ ьЮ░ВЃЅ Рђћ Ж│А ВЃЅ в│ђвЈЎ ВаюЖ▒░)
    const _uiBP = _getUiPack();
    const _sc = _uiBP && _uiBP.deckAccent ? _uiBP.deckAccent : '#ffffff';
    ctx.fillStyle = _sc + '22';
    ctx.fillRect(outerX + sz(2), hitY + sz(4), sz(2), outerB - hitY - sz(8));
    ctx.fillRect(outerR - sz(4), hitY + sz(4), sz(2), outerB - hitY - sz(8));
    // (ВѕўьЈЅ ВіцВ║ћ вЮ╝ВЮИ ВаюЖ▒░ Рђћ вфев░ћВЮ╝/ВађВѓгВќЉ ЖИ░ЖИ░ в▓ёв▓ЁВъё ВЏљВЮИ)
  }
}

// ВЎИЖ│й ьћёваѕВъё ьЁївЉљвдг Рђћ ьїљВаЋВёа/вЁИьіИ/ьъѕьіИ ВЮ┤ьјЎьіИ ВюёВЌљ ваївЇћ. ВбїВИА ВцЉ HP В╗еьЁїВЮ┤вёѕ Y в▓ћВюё
// (=вЉљ ьћёваѕВъё Ж│хВюа ВЌБВДђ) вДї sz(2) ВќЄЖ▓ї, вѓўвеИВДђвіћ sz(7) вЉљЖ╗ЇЖ▓ї.
function renderBackplateBorder() {
  if (state !== 'playing') return;
  const lsx = _fLsx || getLaneStartX();
  const lw  = _fLw  || getLaneW();
  const totalLW = lw * laneCount;
  const btnY = getBtnY();
  const btnH = getBtnH();
  const laneTop = -safeTop;
  const pad = sz(3);
  const outerX = Math.max(pad, lsx - sz(6));
  const outerY = -safeTop;
  const outerR = Math.min(W - pad, lsx + totalLW + sz(6));
  const outerW = outerR - outerX;
  const outerB = H + safeBottom;
  const outerH = outerB - outerY;
  if (outerW <= sz(40) || outerH <= sz(60)) return;
  const pal = _backplatePalette();

  // HP В╗еьЁїВЮ┤вёѕ Y в▓ћВюё Вѓ░ВХю (renderUI ВЎђ вЈЎВЮ╝ Вѓ░ВІЮ).
  const _spBtnC = sz(26), _spGapC = sz(3), _spPadC = sz(3);
  const _spBlockHC = _spBtnC*3 + _spGapC*2 + _spPadC*2;
  const _colTopC = -safeTop + sz(14);
  const _colBotC = getHitY() - sz(8);
  const _colHC = _colBotC - _colTopC;
  const _gapC = sz(6);
  const _ghC = Math.max(sz(120), Math.min(sz(260), (_colHC - _spBlockHC - _gapC) * 0.75));
  const _stackHC = _ghC + _gapC + _spBlockHC;
  const _gyC = _colTopC + Math.max(0, (_colHC - _stackHC) / 2);
  const _spBlockTopC = _gyC + _ghC + _gapC;
  const _spBlockBottomC = _spBlockTopC + _spBlockHC;
  const _capHC = sz(10);
  const _wedgeHC = sz(14);
  const _bodyTopYC = (playMode === 'normal') ? _gyC : _spBlockTopC;
  const _contTopY = Math.max(outerY, _bodyTopYC - _capHC - _wedgeHC);
  const _contBotY = Math.min(outerB, _spBlockBottomC + _capHC + _wedgeHC);
  const _hasOverlap = _contBotY > _contTopY;

  ctx.save();
  ctx.lineCap = 'square';
  ctx.lineJoin = 'miter';

  // UI ьїЕ ьЁївДѕ Рђћ ВЎИЖ│й ьћёваѕВъё ВЮ┤ВцЉ stroke (ВЎђВЮИ вЕћВЮИ + ВЋѕВфй ьЋЉьЂг ьЋўВЮ┤вЮ╝ВЮ┤ьіИ + ВЎИвХђ glow).
  const _ui = _getUiPack();
  const _mainColor = _ui ? (_ui.frameBorder || pal.border) : pal.border;
  const _innerColor = _ui ? (_ui.frameInner || null) : null;
  const _glowColor = _ui ? (_ui.frameGlow || null) : null;

  // ьЌгьЇ╝: ВѕўВДЂ segment ЖиИвдгЖИ░ (вЕћВЮИ stroke + ВЋѕВфй ВќЄВЮђ ьЋўВЮ┤вЮ╝ВЮ┤ьіИ + ВЎИвХђ glow)
  //   UI ьїЕ ВъЦВ░Е ВІю: HP В╗еьЁїВЮ┤вёѕ PNG ВЌБВДђВЎђ ьєц/ЖххЖИ░ ВЮ╝В╣ў (ВќЄЖ▓ї).
  const _uiThin = !!_ui;
  const _mainW  = _uiThin ? sz(9) : sz(7);
  const _glowW  = _uiThin ? sz(12) : sz(13);
  const _innerW = _uiThin ? sz(2) : sz(2);
  const _drawVSeg = (x, y0, y1) => {
    // Outer glow (UI ьїЕ ВаёВџЕ)
    if (_glowColor) {
      ctx.strokeStyle = _glowColor;
      ctx.lineWidth = _glowW;
      ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
    }
    // Main stroke
    ctx.strokeStyle = _mainColor;
    ctx.lineWidth = _mainW;
    ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
    // ВЋѕВфй ВќЄВЮђ ьЋўВЮ┤вЮ╝ВЮ┤ьіИ (UI ьїЕ ВаёВџЕ)
    if (_innerColor) {
      ctx.strokeStyle = _innerColor;
      ctx.lineWidth = _innerW;
      ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
    }
  };

  // Вџ░ВИА ВѕўВДЂ: ьЎћвЕ┤ ВЃЂвІе ~ ьЋўвІе
  _drawVSeg(outerX + outerW, outerY, outerB);

  if (_hasOverlap) {
    // ВбїВИА ВЋёвъў segment (HP В╗еьЁїВЮ┤вёѕ bottom Рєњ ьЎћвЕ┤ bottom)
    _drawVSeg(outerX, _contBotY, outerB);
    // ВбїВИА Вюё segment (ьЎћвЕ┤ top Рєњ HP В╗еьЁїВЮ┤вёѕ top)
    _drawVSeg(outerX, outerY, _contTopY);
    // РўЁ ВцЉЖ░ё Ж│хВюа ЖхгЖ░ё(HP В╗еьЁїВЮ┤вёѕ Y в▓ћВюё) ВЮђ stroke ВаюЖ▒░.
  } else {
    _drawVSeg(outerX, outerY, outerB);
  }

  ctx.restore();
}

function renderLanes() {
  const lw = getLaneW(), lsx = getLaneStartX(), hitY = getHitY();
  const laneTop = -safeTop; // ВЋѕВаёВўЂВЌГ ВюёВфйвХђьё░ ВІюВъЉ

  // Lane backgrounds Рђћ вХѕьѕгвфЁ В░еВйю (Жхљвїђ ВЋйЖ░ё вфЁвЈёВ░е)
  for (let i = 0; i < laneCount; i++) {
    const x = lsx + i * lw;
    ctx.fillStyle = i % 2 === 0 ? '#16161c' : '#1c1c22';
    ctx.fillRect(x, laneTop, lw, hitY + _s10 - laneTop);

    // Vertical lane dividers
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, laneTop); ctx.lineTo(x, hitY+_s10); ctx.stroke();

    // Flash on press
    if (keyFlash[i] > 0) {
      ctx.fillStyle = LANE_COLORS[i] + '15';
      ctx.fillRect(x, laneTop, lw, hitY + _s10 - laneTop);
    }
  }
  // Right border
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(lsx + lw*laneCount, laneTop); ctx.lineTo(lsx + lw*laneCount, hitY+_s10); ctx.stroke();

  // ваѕВЮ╝ Ж░ђвАюВёа (вЁИьіИ ВєЇвЈёВЌљ вДъВХ░ ьЮўвЪгвѓ┤вд╝ Рђћ ВЮ╝ВІюВаЋВДђ ВІю gameTimeЖ│╝ ьЋеЖ╗ў вЕѕВХц)
  if (state === 'playing' && noteSpeed > 0) {
    const railGap = noteSpeed * (60 / (curSong ? curSong.bpm : 120)); // 1в░Ћ Ж░ёЖ▓Е
    const tw = lw * laneCount;
    const offset = (gameTime * noteSpeed) % railGap; // gameTime ЖИ░в░ў (ВЮ╝ВІюВаЋВДђ ВІю ВаЋВДђ)
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    for (let y = laneTop - railGap + offset; y < hitY + railGap; y += railGap) {
      ctx.beginPath();
      ctx.moveTo(lsx, y);
      ctx.lineTo(lsx + tw, y);
      ctx.stroke();
    }
  }
}

function renderHitLine() {
  const lw = getLaneW(), lsx = getLaneStartX(), tw = lw * laneCount, hitY = getHitY();
  // UI ьїЕ ьЁївДѕ Рђћ в▓џЖйЃВЮ┤вЕ┤ ьЋЉьЂг/Вѓ┤Жхг ьїљВаЋВёа.
  const _ui = _getUiPack();
  const _mainCol  = _ui ? (_ui.hitLineMain  || 'rgba(255,255,255,0.8)') : 'rgba(255,255,255,0.8)';
  // ЖИ░в│И Віцьѓе: ьЮ░ВЃЅ Ж│аВаЋ (Ж│АвДѕвІц ВЃЅ в│ђвЈЎ ВаюЖ▒░ Рђћ ВюаВађ ВџћВ▓Г).
  const _glowCol  = _ui ? (_ui.hitLineGlow  || 'rgba(255,255,255,0.25)') : 'rgba(255,255,255,0.25)';
  const _shadowCol = _ui ? (_ui.hitLineGlow || '#ffffff') : '#ffffff';
  const _gradTop  = _ui ? (_ui.hitLineGrad  || 'rgba(255,255,255,0.06)') : 'rgba(255,255,255,0.06)';

  // PNG ьїљВаЋВёа Вўцв▓ёвЮ╝ВЮ┤вЊю Рђћ в░ћ + Вбї/Вџ░ вЇ░Вйћ 3вХёьЋа
  const _uiSkinJL = _getUiPackSkin();
  const _jlBarPath = _uiSkinJL && _uiSkinJL.imagePaths && _uiSkinJL.imagePaths.judgeLineBar;
  const _jlBarImg = _jlBarPath ? skinImages[_jlBarPath] : null;
  const _jlBarReady = _jlBarImg && _jlBarImg._ok === true;
  const _jlLPath = _uiSkinJL && _uiSkinJL.imagePaths && _uiSkinJL.imagePaths.judgeLineDecoLeft;
  const _jlLImg = _jlLPath ? skinImages[_jlLPath] : null;
  const _jlLReady = _jlLImg && _jlLImg._ok === true;
  const _jlRPath = _uiSkinJL && _uiSkinJL.imagePaths && _uiSkinJL.imagePaths.judgeLineDecoRight;
  const _jlRImg = _jlRPath ? skinImages[_jlRPath] : null;
  const _jlRReady = _jlRImg && _jlRImg._ok === true;

  if (_jlBarReady) {
    // в░ћ: ваѕВЮИ ьЈГ ВаёВ▓┤ВЌљ Ж░ђвАю stretch, ВёИвАювіћ sz(8) Ж│аВаЋ (ВќЄВЮђ Вёа).
    try {
      const _jlBarH = sz(8);
      ctx.drawImage(_jlBarImg, lsx, hitY - _jlBarH / 2, tw, _jlBarH);
    } catch(e) {}
  } else {
    // Procedural fallback Рђћ ЖИ░в│И вЮ╝ВЮИ + glow
    if (!isMobile) { ctx.shadowColor = _shadowCol; ctx.shadowBlur = 6; }
    ctx.strokeStyle = _mainCol; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lsx, hitY); ctx.lineTo(lsx+tw, hitY); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = _glowCol.length === 7 ? (_glowCol + '44') : _glowCol;
    ctx.lineWidth = 6;

    // РћђРћђРћђ ВѓгВ╣┤вЮ╝ вфевЊю: key.png + вІеВЮ╝ ВЃЅ tint (ваѕВЮИ ВЃЅ вг┤Ж┤ђ) РћђРћђРћђ
    if (_sakuraMode) {
      const tinted = _getTintedKeyCanvas(_sakuraKeyColor);
      if (tinted) {
        // ваѕВЮИ ьЂгЖИ░ вїђв╣ё 1.2x ВіцВ╝ђВЮ╝ Рђћ PNG вѓ┤вХђ ВъЦВІЮ(Вйћвёѕ вИћвЮ╝ВЇИ/вДївІцвЮ╝)ВЮ┤ outline в░ќВЌљ ВъѕВќ┤
        //   bbox Ж░ђ в▓ёьі╝ outline в│┤вІц ьЂгв»ђвАю, ВЮ┤вЦ╝ в│┤ВаЋьЋ┤ ВІцВаю в▓ёьі╝ВЮё ваѕВЮИ ьЂгЖИ░вАю вДъВХц.
        //   Вѓ┤ВДЮ overflow вљўВДђвДї ВІюЖ░ЂВЃЂ ЖИ░в│И в▓ёьі╝Ж│╝ вЈЎВЮ╝ ВѓгВЮ┤ВдѕвАю в│┤Въё.
        const _sScl = 1.2;
        const _skW = lw * _sScl, _skH = bh * _sScl;
        const _skX = bx - (_skW - lw) / 2;
        const _skY = by - (_skH - bh) / 2;
        ctx.drawImage(tinted, _skX, _skY, _skW, _skH);
        // LED ВбїьЉю Рђћ PNG ВИАВаЋЖ░њ ЖИ░в░ў: bbox ВЮў x=47.6%, y=23.6% (scaled ВўЂВЌГ ЖИ░Вцђ)
        const _dcx = _skX + _skW * 0.476;
        const _dcy = _skY + _skH * 0.236;
        const _glowR = Math.min(_skW, _skH) * 0.22;
        if (held) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          const _glowG = ctx.createRadialGradient(_dcx, _dcy, 0, _dcx, _dcy, _glowR);
          _glowG.addColorStop(0, col + 'ee');
          _glowG.addColorStop(0.4, col + '77');
          _glowG.addColorStop(1, col + '00');
          ctx.fillStyle = _glowG;
          ctx.beginPath(); ctx.arc(_dcx, _dcy, _glowR, 0, Math.PI*2); ctx.fill();
          // ВцЉВІг ьЮ░ highlight
          const _wG = ctx.createRadialGradient(_dcx, _dcy, 0, _dcx, _dcy, _glowR*0.3);
          _wG.addColorStop(0, 'rgba(255,255,255,0.95)');
          _wG.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = _wG;
          ctx.beginPath(); ctx.arc(_dcx, _dcy, _glowR*0.3, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
        // в╣ѕ ВъЁваЦ ьћївъўВІю Рђћ ьњђ ваѕВЮИ ВѓгВЮ┤ВдѕВЌљ вДъВХц
        const _efAgeS = performance.now() - _lastEmptyFlash[i];
        if (_efAgeS < 200) {
          const _efAS = 0.6 * (1 - _efAgeS / 200);
          ctx.fillStyle = `rgba(255,50,50,${_efAS})`;
          rrFill(bx, by, lw, bh, _r);
          ctx.strokeStyle = `rgba(255,80,80,${_efAS})`; ctx.lineWidth = 2;
          rrStroke(bx, by, lw, bh, _r);
        }
        // PC вЮ╝в▓е
        if (!isMobile) {
          ctx.font = `bold ${sz(14)}px sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = held ? '#fff' : 'rgba(255,235,245,0.65)';
          ctx.fillText(getLaneLabel(i), bx + lw/2, by + bh * 0.82);
        }
        continue;
      }
      // tint ВЃЮВё▒ ВІцьїе Рєњ procedural fallback
    }

    if (held) {
      // ===== вѕївд╝ Рђћ ьѓцЖ░ђ Вѓ┤ВДЮ вЊцВќ┤Ж░ё віљвѓї (Вќ┤вЉљВЏїВДђЖ│а ВЃЅ ьЈгьЎћ) =====
      const _pgrad = ctx.createLinearGradient(0, y, 0, y + h);
      _pgrad.addColorStop(0, col + '66');
      _pgrad.addColorStop(0.5, col + '33');
      _pgrad.addColorStop(1, col + '11');
      ctx.fillStyle = _pgrad;
      rrFill(x, y, w, h, _r);
      // ВЃЂвІе В╗гвЪг ВіцьіИвЮ╝ВЮ┤ьћё (вѕїваИВЮё вЋї Ж░ЋьЋўЖ▓ї в╣Џвѓе)
      ctx.fillStyle = col + 'dd';
      ctx.fillRect(x + _r, y, w - _r*2, sz(4));
      // ВЮИВЁІ Вќ┤вЉљВџ┤ ьџеЖ│╝ (вЊцВќ┤Ж░ё віљвѓї)
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(x + sz(2), y + sz(6), w - sz(4), sz(2));
      // ьЁївЉљвдг
      ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 2;
      rrStroke(x, y, w, h, _r);
      // РўЁ вѕївд╝ ВЃЂьЃюВЌљвЈё Вё╝Вёю Ваљ ВюаВДђ (вЇћ в░ЮЖ▓ї в╣Џвѓе)
      const _dcxH = bx + lw/2, _dcyH = by + Math.min(bh * 0.55, sz(44));
      const _drH = sz(4);
      ctx.fillStyle = col + '66';
      ctx.beginPath(); ctx.arc(_dcxH, _dcyH, _drH + sz(3), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(_dcxH, _dcyH, _drH, 0, Math.PI*2); ctx.fill();
    } else {
      // ===== вїђЖИ░ Рђћ ВІавћћВѓгВЮ┤Вађ ьѓцв│┤вЊю віљвѓї =====
      // 1) Key body: ВЃЂвІе в░ЮЖ│а ьЋўвІе Вќ┤вЉљВџ┤ вЕћьЃѕвдГ ЖиИвЮ╝вЇ░ВЮ┤ВЁў
      const _kgrad = ctx.createLinearGradient(0, y, 0, y + h);
      _kgrad.addColorStop(0,    '#3a3a44');
      _kgrad.addColorStop(0.35, '#26262e');
      _kgrad.addColorStop(1,    '#12121a');
      ctx.fillStyle = _kgrad;
      rrFill(x, y, w, h, _r);
      // 2) ВЃЂвІе ВЌБВДђ ьЋўВЮ┤вЮ╝ВЮ┤ьіИ (ЖИѕВєЇ в░ўВѓг)
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(x + _r, y + 1, w - _r*2, sz(2));
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(x + _r, y + sz(3), w - _r*2, 1);
      // 3) В╗гвЪг ВЋАВё╝ьіИ ВіцьіИвЮ╝ВЮ┤ьћё (ьѓцв│┤вЊю ВЃЂвІе ьЉюВІювЊ▒ Ж░ЎВЮђ віљвѓї)
      ctx.fillStyle = col + '99';
      ctx.fillRect(x + _r + sz(2), y + sz(7), w - _r*2 - sz(4), sz(2));
      ctx.fillStyle = col + '44';
      ctx.fillRect(x + _r + sz(2), y + sz(10), w - _r*2 - sz(4), 1);
      // 4) ьЋўвІе ЖиИвд╝Въљ (ьѓцЖ░ђ ВўгвЮ╝ВЎђВъѕвіћ віљвѓї)
      const _sgrad = ctx.createLinearGradient(0, y + h - sz(8), 0, y + h);
      _sgrad.addColorStop(0, 'rgba(0,0,0,0)');
      _sgrad.addColorStop(1, 'rgba(0,0,0,0.45)');
      ctx.fillStyle = _sgrad;
      ctx.fillRect(x + sz(1), y + h - sz(8), w - sz(2), sz(8));
      // 5) ьЁївЉљвдг Рђћ В░еВйю вЕћьЃѕ
      ctx.strokeStyle = 'rgba(85,85,95,0.7)'; ctx.lineWidth = 1;
      rrStroke(x, y, w, h, _r);
      // 6) ВцЉВЋЎ ВЏљьўЋ "ьѓцВ║А Вё╝Вёю" Ваљ Рђћ ваѕВЮИ ВЃЅ
      const _dcx = bx + lw/2, _dcy = by + Math.min(bh * 0.55, sz(44));
      const _dr = sz(4);
      ctx.fillStyle = col + '33';
      ctx.beginPath(); ctx.arc(_dcx, _dcy, _dr + sz(2), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = col + 'bb';
      ctx.beginPath(); ctx.arc(_dcx, _dcy, _dr, 0, Math.PI*2); ctx.fill();
      // ВцЉВІг в░ЮВЮђ ьЋўВЮ┤вЮ╝ВЮ┤ьіИ
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(_dcx - _dr*0.3, _dcy - _dr*0.3, _dr*0.35, 0, Math.PI*2); ctx.fill();
    }

    // в╣ѕ ВъЁваЦ ьћївъўВІю (вЁИьіИ ВЌєВЮ┤ вѕїваИВЮё вЋї в╣еЖ░ё Ж╣юв░Ћ)
    const _efAge = performance.now() - _lastEmptyFlash[i];
    if (_efAge < 200) {
      const _efA = 0.6 * (1 - _efAge / 200);
      ctx.fillStyle = `rgba(255,50,50,${_efA})`;
      rrFill(x, y, w, h, _r);
      ctx.strokeStyle = `rgba(255,80,80,${_efA})`; ctx.lineWidth = 2;
      rrStroke(x, y, w, h, _r);
    }

    // Label Рђћ PC вДї. Вё╝Вёю Ваљ ВЋёвъўВфйВю╝вАю ВЮ┤вЈЎ (Ж▓╣В╣е в░ЕВДђ).
    if (!isMobile) {
      ctx.font = `bold ${sz(14)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = held ? '#fff' : col + '88';
      ctx.fillText(getLaneLabel(i), bx + lw/2, by + bh * 0.82);
    }
  }
}

function rrFill(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function rrStroke(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function renderCharacter() {}

// РўЁ ьъѕьіИ ВЮ┤ьјЎьіИ Віцьѓе ьЎюВё▒ ВЌгвХђ + ьѓцв│ё вАювЊювљю ВЮ┤в»ИВДђ вДх в░ўьЎў.
//   вѓ▒Ж░ю PNG в░ЕВІЮ Рђћ skin.imagePaths ВЮў Ж░Ђ key Ж░ђ Ж│Д ВЮ┤в»ИВДђ ВІЮв│ёВъљ. ьЋўвѓўвЮ╝вЈё вАювЊювљўВДђ
//   ВЋіВЋўВю╝вЕ┤ ЖиИ key віћ undefined вАю в╣аВДљ Рєњ ваївЇћ ВфйВЌљВёю optional chaining Вю╝вАю В▓ўвдг.
function _hitFxData() {
  if (!currentHitFxSkin) return null;
  const s = SKINS[currentHitFxSkin];
  if (!s || !s.imagePaths) return null;
  const imgs = {};
  let anyLoaded = false;
  for (const k in s.imagePaths) {
    const img = skinImages[s.imagePaths[k]];
    if (img && img._ok) { imgs[k] = img; anyLoaded = true; }
  }
  if (!anyLoaded) return null;
  return { skin: s, imgs };
}
// РўЁ вХђвХё ВЮ┤в»ИВДђ ьЌгьЇ╝ Рђћ key В░ЙЖ│а ВъѕВю╝вЕ┤ drawImage ВаёВ▓┤, ВЌєВю╝вЕ┤ false
function _hitFxDraw(fx, key, dx, dy, dw, dh) {
  const img = fx && fx.imgs[key];
  if (!img) return false;
  ctx.drawImage(img, dx, dy, dw, dh);
  return true;
}

function renderParticles() {
  const fx = _hitFxData();
  for (const p of particles) {
    const lifeRatio = Math.max(0, p.life/p.maxLife);
    ctx.globalAlpha = lifeRatio;
    if (p.sprite && fx) {
      const img = fx.imgs[p.spriteKey];
      if (img) {
        const s = p.size * (0.6 + 0.4 * lifeRatio);
        ctx.save();
        ctx.translate(p.x, p.y);
        if (p.rotVel !== undefined) ctx.rotate((p.rot || 0) + p.rotVel * (p.maxLife - p.life));
        ctx.drawImage(img, -s/2, -s/2, s, s);
        ctx.restore();
        continue;
      }
    }
    // РўЁ в░ЕВџИ(drop) Рђћ ВЏљьўЋ, Ж░юв│ё въювЇц ьЂгЖИ░. ьЎђвЊю ВцЉ ьїљВаЋВёа ВЋёвъўвАю ьЮўвЪгвѓ┤вдгвіћ ВЌ░ВХюВџЕ.
    if (p.kind === 'drop') {
      ctx.fillStyle = p.color;
      const s = p.size * (0.6 + 0.4 * lifeRatio);
      ctx.beginPath();
      ctx.arc(p.x, p.y, s, 0, Math.PI*2);
      ctx.fill();
      continue;
    }
    ctx.fillStyle = p.color;
    const s = p.size * lifeRatio;
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

function renderBursts() {
  const fx = _hitFxData();
  for (const b of bursts) {
    const t = b.time / b.maxTime;
    const alpha = 1 - t;
    ctx.save();
    ctx.translate(b.x, b.y);

    if (fx) {
      // РўЁ в▓џЖйЃ sprite в▓ёВіцьіИ Рђћ вДЂ 2Ж░ю(ьЋЉьЂг+ЖИѕ) + ВйћВќ┤ ьћївъўВІю + ВіцьїїьЂ┤ в░ЕВѓг
      //   Ж░Ђ key ВЮ┤в»ИВДђ ВЌєВю╝вЕ┤ ьЋ┤вІ╣ ВџћВєївДї Віцьѓх (ВЮ╝вХђвДї ВўгвЮ╝ВЎђвЈё ВаљВДёВаЂ вЈЎВъЉ).
      // ВѓгВЮ┤Вдѕ ВА░ВаЋ Рђћ PC вЈё ВЋйЖ░ё ВцёВъё, вфев░ћВЮ╝ВЮђ ВХћЖ░ђ ВХЋВєї + ВЋїьїї Ж░љВЄа(В▓┤В╗ц ьЮгВёЮ).
      const _mobHF = isMobile ? 0.55 : 0.85;          // ВЮ╝в░ў (sparkle/petal)
      const _mobRF = isMobile ? 0.40 : 0.75;          // ring/core Рђћ вфев░ћВЮ╝ fill rate вХђвІ┤ ВХЋВєї (вДЂ ьЎЋвїђ ВЮ┤ьЏё)
      const _mobAF = isMobile ? 0.55 : 0.80;          // ring/core ВЋїьїї Ж░љВЄа
      for (let r = 0; r < 2; r++) {
        const delay = r * 0.1;
        const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
        if (rt <= 0 || rt >= 1) continue;
        // РўЁ вДЂ ьЂгЖИ░ ьЎЋвїђ Рђћ ВюаВађ ВџћВ▓ГВю╝вАю вІцВІю ьЂгЖ▓ї (ЖИ░ВА┤ 100 Рєњ ВЋй 180).
        const size = (28 + r * 14 + rt * 58) * b.size * _mobRF;
        const ringImg = r === 0 ? fx.imgs.ringPink : fx.imgs.ringGold;
        if (!ringImg) continue;
        ctx.globalAlpha = (1 - rt) * 0.9 * _mobAF;
        ctx.drawImage(ringImg, -size/2, -size/2, size, size);
      }
      if (t < 0.45 && fx.imgs.coreFlash) {
        const ft = t / 0.45;
        const flashSize = (60 + ft * 120) * b.size * _mobRF;
        ctx.globalAlpha = (1 - ft) * _mobAF;
        ctx.drawImage(fx.imgs.coreFlash, -flashSize/2, -flashSize/2, flashSize, flashSize);
      }
      if (fx.imgs.sparkle) {
        const sparkCount = Math.max(4, Math.floor(b.sparks * 0.5));
        for (let i = 0; i < sparkCount; i++) {
          const a = Math.PI * 2 * i / sparkCount + t * 0.8;
          const dist = (20 + 80 * t) * b.size * _mobHF;
          const sx = Math.cos(a) * dist;
          const sy = Math.sin(a) * dist;
          const ss = (22 + (i * 7) % 14) * (1 - t) * b.size * _mobHF;
          ctx.globalAlpha = alpha * 0.95;
          ctx.drawImage(fx.imgs.sparkle, sx - ss/2, sy - ss/2, ss, ss);
        }
      }
      ctx.restore();
      continue;
    }

    // Expanding rings with thickness
    for (let r = 0; r < b.rings; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
      if (rt <= 0 || rt >= 1) continue;
      const radius = (25 + r * 25) * rt * b.size;
      const ringAlpha = (1 - rt) * 0.85;
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = r % 2 === 0 ? b.color1 : b.color2;
      ctx.lineWidth = (5 - r * 0.6) * (1 - rt) * b.size;
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
    }

    // Big center flash / shockwave
    if (t < 0.4) {
      const ft = t / 0.4;
      const flashR = 50 * b.size * ft;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, flashR);
      grd.addColorStop(0, '#ffffff');
      grd.addColorStop(0.3, b.color2);
      grd.addColorStop(1, b.color1 + '00');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0, 0, flashR, 0, Math.PI * 2); ctx.fill();
    }

    // Streaking rays
    const rayCount = Math.floor(b.sparks * 0.5);
    for (let i = 0; i < rayCount; i++) {
      const a = Math.PI * 2 * i / rayCount;
      const dist = (30 + 100 * t) * b.size;
      const len = (15 + 20 * (1 - t)) * b.size;
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = b.color2;
      ctx.lineWidth = 2 * (1 - t) * b.size;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * (dist - len), Math.sin(a) * (dist - len));
      ctx.lineTo(Math.cos(a) * dist, Math.sin(a) * dist);
      ctx.stroke();
    }

    // Diamond sparks radiating outward
    const sparkCount = Math.floor(b.sparks * 0.7);
    for (let i = 0; i < sparkCount; i++) {
      const a = Math.PI * 2 * i / sparkCount + t * 0.5;
      const dist = (20 + 90 * t) * b.size;
      const sx = Math.cos(a) * dist;
      const sy = Math.sin(a) * dist;
      const ss = (4 + Math.random() * 3) * (1 - t) * b.size;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = i % 2 === 0 ? b.color2 : b.color1;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a + t * 3);
      ctx.fillRect(-ss/2, -ss/2, ss, ss);
      ctx.restore();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderHoldGlows() {
  const fx = _hitFxData();
  for (const g of holdGlows) {
    const t = g.time / g.maxTime;
    const alpha = (1 - t);
    const hw = g.w / 2;
    ctx.save();
    ctx.translate(g.x, g.y);

    if (fx && fx.imgs.holdLineGlow) {
      // РўЁ в▓џЖйЃ вЮ╝ВЮИ ЖИђвАюВџ░ Рђћ ьїљВаЋВёа ВцЉВЋЎ sprite 1ВъЦвДї.
      //   ВЋёвъў ВўЂВЌГВЮў "ьЮўвЪгвѓ┤вд╝" ВЮђ spawnHoldParticles ВЮў petal ВъЁВъљЖ░ђ вІ┤вІ╣ (ВъљВЌ░ВіцвЪгВЏђ).
      const _mobG = isMobile ? 0.65 : 0.85;
      const w = hw * 2 * (1.6 + t * 1.0) * _mobG;
      const h = _s40 * (1 - t * 0.2) * _mobG;
      ctx.globalAlpha = alpha * 0.95;
      ctx.drawImage(fx.imgs.holdLineGlow, -w/2, -h/2, w, h);
      ctx.restore();
      continue;
    }

    // Large fire glow expanding upward
    const glowH = _s90 * (0.4 + t * 0.6);
    ctx.globalAlpha = alpha * 0.7;
    const grd = ctx.createRadialGradient(0, -glowH*0.2, 0, 0, -glowH*0.3, hw * (1.2 + t));
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.2, g.color);
    grd.addColorStop(0.6, g.color + '88');
    grd.addColorStop(1, g.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -glowH * 0.25, hw * (1.3 + t * 0.8), glowH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core Рђћ вфев░ћВЮ╝ skip (createRadialGradient 2ьџїВДИ ВаюЖ▒░)
    if (!isMobile) {
      ctx.globalAlpha = alpha * 0.9;
      const coreGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 0.6);
      coreGrd.addColorStop(0, '#ffffff');
      coreGrd.addColorStop(1, '#ffffff00');
      ctx.fillStyle = coreGrd;
      ctx.beginPath();
      ctx.ellipse(0, -5, hw * 0.6, 15, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Horizontal shockwave line
    const lineW = hw * (1.5 + t * 1.5);
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(-lineW, 0);
    ctx.lineTo(lineW, 0);
    ctx.stroke();

    // Side flare streaks Рђћ вфев░ћВЮ╝ skip (beginPath/stroke 2ьџї ВаѕВЋй)
    if (!isMobile) {
      ctx.globalAlpha = alpha * 0.5;
      ctx.strokeStyle = g.color;
      ctx.lineWidth = 2 * (1 - t);
      for (let s = -1; s <= 1; s += 2) {
        ctx.beginPath();
        ctx.moveTo(s * hw * 0.5, 0);
        ctx.lineTo(s * lineW * 1.2, -20 - 30 * t);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderJudgment() {
  if (judgmentTimer <= 0) return;
  const scale = Math.max(0.8, 1 + (0.5 - judgmentTimer)*0.3);
  ctx.save();
  ctx.translate(W/2, getHitY() - _s40);
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, judgmentTimer*3);
  ctx.font = `bold ${sz(22)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle = judgmentColor;
  if (!isMobile) { ctx.shadowColor=judgmentColor; ctx.shadowBlur=10; }
  ctx.fillText(judgmentText, 0, 0);
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
}

function renderUI() {
  const song = curSong;
  // HP в░ћ / ВєЇвЈё В╗еьіИвАц ЖИ░Вцђ ВбїьЉю (ьћёвдгВіцьЃђВЮ╝ВЌљВёювЈё ВєЇвЈё В╗еьіИвАц ВѓгВџЕ)
  // HPв░ћ/ВєЇвЈё В╗еьіИвАц: ваѕВЮИ ВЎ╝Вфй В╗гвЪ╝ВЌљ stack в░░В╣ў (HP Вюё, в░░ВєЇ в░ћвАю в░Љ). ВёИвАю ВцЉВЋЎ ВаЋваг.
  const gw = sz(12);
  const _spBtnSz = sz(26), _spGapSz = sz(3), _spPadSz = sz(3);
  const _spTotalH = _spBtnSz*3 + _spGapSz*2;
  const _spBlockH = _spTotalH + _spPadSz*2;
  // UI ьїЕ: offset ВцёВЌгВёю В╗еьЁїВЮ┤вёѕ ВўцвЦИВфйВю╝вАю вХЎВъё (clip ВЮ┤ ваѕВЮ╝ ВЌБВДђВЌљВёю ВъўвЮ╝Вцї).
  const _gcxUiShift = _getUiPack() ? sz(5) : sz(9);
  const _gcx = Math.max(sz(2) + _spBtnSz/2, getLaneStartX() - _gcxUiShift - _spBtnSz/2);
  const gx = _gcx - gw/2;
  // ВёИвАю ВцЉВЋЎ ВаЋваг stack (HP Вюё, в░░ВєЇ ВЋёвъў Рђћ ВЏљвъў ваѕВЮ┤ВЋёВЏЃ).
  const _colTop = -safeTop + sz(14);
  const _colBot = getHitY() - sz(8);
  const _colH = _colBot - _colTop;
  const _gapHpSp = sz(6);
  const gh = Math.max(sz(120), Math.min(sz(260), (_colH - _spBlockH - _gapHpSp) * 0.75));
  const _stackH = gh + _gapHpSp + _spBlockH;
  const gy = _colTop + Math.max(0, (_colH - _stackH) / 2);
  const _spBlockTop = gy + gh + _gapHpSp;
  const _spBlockBottom = _spBlockTop + _spBlockH;
  // === HP(ВёаьЃЮ) + в░░ВєЇ Ж│хВюа В╗еьЁїВЮ┤вёѕ Рђћ ВЎ╝ВфйвДї ВѓгвІцвдгЖ╝┤ В║А, ВўцвЦИВфйВЮђ ВЎИЖ│й ьћёваѕВъё ВбїВИА ВёаЖ│╝ Ж│хВюа ===
  //   ьћёвдгВіцьЃђВЮ╝: HP ВЌєВЮї Рєњ В╗еьЁїВЮ┤вёѕвіћ в░░ВєЇ вИћвАЮвДї Ж░љВїѕ. ВЎИЖ│й ьћёваѕВъёЖ│╝ вЈЎВЮ╝ьЋю sz(7) ьЁївЉљвдг.
  //   РўЁ Вџ░ВИА path вЦ╝ outerX ВЌљ вфЁВІю Ж│аВаЋ Рєњ _gcx Ж░ђ вфев░ћВЮ╝ВЌљВёю ВЎ╝Вфй clamp ВЌљ Ж▒ИвацвЈё ваѕВЮ╝Ж│╝ ьЋГВЃЂ flush.
  {
    const _bpPal = _backplatePalette();
    // РўЁ _contPadX = sz(10): В╗еьЁїВЮ┤вёѕ body ВбїВИА ВЌБВДђвЦ╝ button ВЎ╝ВфйВЌљВёю sz(10) вќеВќ┤ВДђЖ▓ї в░░В╣ў.
    //   button ВЮ┤ container ВЮў Вбї/Вџ░ stroke ВЎђ вЈЎВЮ╝ьЋю sz(6.5) gap Вю╝вАю ВцЉВЋЎ ВаЋвагвље.
    const _contPadX = sz(10);
    const _capH = sz(10);
    const _contCx = _gcx;
    const _bodyHalf = Math.max(gw, _spBtnSz) / 2 + _contPadX;
    const _capHalfL = _bodyHalf - sz(5);
    // ВЎИЖ│й ьћёваѕВъё ВбїВИА path x Рђћ renderBackplate ВЎђ вЈЎВЮ╝ Вѓ░ВІЮ (ВЎёВаё ВЮ╝В╣ў ьЋёВѕў).
    const _rightEdgeX = Math.max(sz(3), getLaneStartX() - sz(6));
    // вфевЊюв│ё body в▓ћВюё: normal=HP ВЃЂвІе~в░░ВєЇ ьЋўвІе / freestyle=в░░ВєЇ ВЃЂвІе~в░░ВєЇ ьЋўвІе.
    const _bodyTopY = (playMode === 'normal') ? gy : _spBlockTop;
    const _bodyBotY = _spBlockBottom;
    const _contTopY = _bodyTopY - _capH;
    const _contBotY = _bodyBotY + _capH;
    // РўЁ ВЃЂ/ьЋўвІе Ж╝ГВДђВаљВЌљВёю ваѕВЮ╝ ьЁївЉљвдгЖ╣їВДђ вїђЖ░ЂВёа wedge Рђћ cap vertex ВЌљВёю outerX ВЮў
    //   _contTopY - wedgeH (ВюёВфй) / _contBotY + wedgeH (ВЋёвъўВфй) Ж╣їВДђ в╣ёВіцвЊгьъѕ ВЌ░Ж▓░.
    //   HP body ВЃЅВЮ┤ ВЋёвІї ВЎИЖ│й ьћёваѕВъёЖ│╝ вЈЎВЮ╝ьЋю В░еВйювАю fill вљўВќ┤ ВъљВЌ░ВіцвЪгВџ┤ ВаёьЎў.
    const _wedgeH = sz(14);
    const _topWedgeY = _contTopY - _wedgeH;
    const _botWedgeY = _contBotY + _wedgeH;
    // UI ьїЕ ьЁївДѕ Рђћ В╗еьЁїВЮ┤вёѕ body / ьЁївЉљвдг ВЃЅ Вўцв▓ёвЮ╝ВЮ┤вЊю
    const _ui = _getUiPack();
    const _contFill = _ui ? (_ui.containerFill || 'rgba(12,12,16,0.85)') : 'rgba(12,12,16,0.85)';
    const _contBorder = _ui ? (_ui.containerBorder || _bpPal.border) : _bpPal.border;
    // РўЁ UI ьїЕ ВъЦВ░Е + container_body PNG вАювЊю ВІю Рєњ PNG drawImage вАю ЖхљВ▓┤
    const _uiSkin = _getUiPackSkin();
    const _contBodyPath = _uiSkin && _uiSkin.imagePaths && _uiSkin.imagePaths.containerBody;
    const _contBodyImg = _contBodyPath ? skinImages[_contBodyPath] : null;
    const _contBodyReady = _contBodyImg && _contBodyImg.complete && _contBodyImg.naturalWidth > 0;
    if (_contBodyReady) {
      // PNG вфевЊю Рђћ wedge/strip/filler вфевЉљ ВаюЖ▒░. PNG Ж░ђ backplate cutout ВаёВ▓┤ вЇ«ВЮї.
      //   Y в▓ћВюё: _topWedgeY ~ _botWedgeY (cutout вЂЮЖ╣їВДђ)
      //   X в▓ћВюё: _contCx - _bodyHalf ~ _contCx + _bodyHalf (вїђВ╣Г stretch)
      //   РўЁ Вџ░ВИА clip ВЮё ваѕВЮ╝ outer left edge (outerX - sz(main/2)) Ж╣їВДђвАю ВХЋВєї
      //     Рєњ container Вџ░ВИА ВЌБВДђ ВЋёВўѕ ВЋѕ в│┤ВЮ┤Ж▓ї ьЋўЖ│а ваѕВЮ╝ ВъљВ▓┤Ж░ђ Ж▓йЖ│ёВёа ВЌГьЋа.
      const _railMainW = _getUiPack() ? sz(9) : sz(7);
      const _railLeftOuter = _rightEdgeX - _railMainW / 2;
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, -safeTop, _railLeftOuter, H + safeTop + safeBottom);
      ctx.clip();
      // РўЁ source-crop Рђћ PNG Вбї/ВЃЂ/ьЋў pink ВЌБВДђ вфевЉљ ВаюВЎИ (container ьЁївЉљвдг ВаюЖ▒░).
      //   Вџ░ВИА pink ВЌБВДђвіћ Вюё clip ВЮ┤ Вќ┤В░еьћ╝ ВъўвЮ╝вЃё.
      const _pngW = _contBodyImg.naturalWidth;
      const _pngH = _contBodyImg.naturalHeight;
      const _cropL = _pngW * 0.04;
      const _cropT = _pngH * 0.015;
      const _cropB = _pngH * 0.015;
      ctx.drawImage(_contBodyImg,
        _cropL, _cropT, _pngW - _cropL, _pngH - _cropT - _cropB,
        _contCx - _bodyHalf, _topWedgeY,
        _bodyHalf * 2, _botWedgeY - _topWedgeY);
      ctx.restore();
      // РўЁ rail Ж░Г ЖхгЖ░ё pink вАю вЕћВџ░ЖИ░ Рђћ rail Ж│╝ вЈЎВЮ╝ color вАю seamless.
      ctx.fillStyle = '#fa5a81';
      ctx.fillRect(
        _railLeftOuter,
        _topWedgeY - 1,
        (_rightEdgeX + _railMainW / 2) - _railLeftOuter,
        (_botWedgeY + 1) - (_topWedgeY - 1)
      );
    } else {
      // Procedural path (fallback) Рђћ wedge fill + strip + 6Ваљ ьЈ┤вдгЖ│ц body + ВЎИЖ│й stroke
      ctx.fillStyle = _contFill;
      ctx.beginPath();
      ctx.moveTo(_contCx - _capHalfL, _contTopY);
      ctx.lineTo(_rightEdgeX, _topWedgeY);
      ctx.lineTo(_rightEdgeX, _contTopY);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(_contCx - _capHalfL, _contBotY);
      ctx.lineTo(_rightEdgeX, _botWedgeY);
      ctx.lineTo(_rightEdgeX, _contBotY);
      ctx.closePath();
      ctx.fill();
      const _stripR = _rightEdgeX + sz(3.5);
      if (_stripR > _rightEdgeX) {
        ctx.fillStyle = 'rgba(12,12,16,0.85)';
        ctx.fillRect(_rightEdgeX, _topWedgeY, _stripR - _rightEdgeX, _botWedgeY - _topWedgeY);
      }
      ctx.beginPath();
      ctx.moveTo(_contCx - _capHalfL, _contTopY);
      ctx.lineTo(_rightEdgeX, _contTopY);
      ctx.lineTo(_rightEdgeX, _contBotY);
      ctx.lineTo(_contCx - _capHalfL, _contBotY);
      ctx.lineTo(_contCx - _bodyHalf, _bodyBotY);
      ctx.lineTo(_contCx - _bodyHalf, _bodyTopY);
      ctx.closePath();
      ctx.fillStyle = _contFill;
      ctx.fill();
      ctx.save();
      ctx.lineCap = 'square';
      ctx.lineJoin = 'miter';
      ctx.strokeStyle = _bpPal.border || 'rgba(85,85,95,0.98)';
      ctx.lineWidth = sz(7);
      ctx.beginPath();
      ctx.moveTo(_rightEdgeX, _botWedgeY);
      ctx.lineTo(_contCx - _capHalfL, _contBotY);
      ctx.lineTo(_contCx - _bodyHalf, _bodyBotY);
      ctx.lineTo(_contCx - _bodyHalf, _bodyTopY);
      ctx.lineTo(_contCx - _capHalfL, _contTopY);
      ctx.lineTo(_rightEdgeX, _topWedgeY);
      ctx.stroke();
      ctx.restore();
    }
  }

  // === HP В║АВіљ (normal вфевЊю only) Рђћ В╗еьЁїВЮ┤вёѕ вѓ┤вХђ, В┤ѕвАЮ вІеВЃЅ fill ===
  //   РўЁ в╣ѕ ВўЂВЌГВЮђ ЖиИвдгВДђ ВЋіВЋёВёю HP В╗еьЁїВЮ┤вёѕ body ВЃЅ (HP в░ћ Ж░љВІИвіћ ВДёьЋю ВЃЅ) ВЮ┤ ЖиИвїђвАю вЁИВХювље.
  //   clip() Вю╝вАю В║АВіљ вфеВќЉ ВЋѕВфйвДї ВаюьЋюьЋю ьЏё gauge в╣ёВюевДїьЂ╝ ВЋёвъўВЌљВёю ВюёвАю В┤ѕвАЮ fill.
  if (playMode === 'normal') {
    const _fillH = gh * gauge;
    if (_fillH > 0) {
      ctx.save();
      // В║АВіљ clip path
      const _r = gw/2;
      ctx.beginPath();
      ctx.moveTo(gx + _r, gy);
      ctx.lineTo(gx + gw - _r, gy);
      ctx.quadraticCurveTo(gx + gw, gy, gx + gw, gy + _r);
      ctx.lineTo(gx + gw, gy + gh - _r);
      ctx.quadraticCurveTo(gx + gw, gy + gh, gx + gw - _r, gy + gh);
      ctx.lineTo(gx + _r, gy + gh);
      ctx.quadraticCurveTo(gx, gy + gh, gx, gy + gh - _r);
      ctx.lineTo(gx, gy + _r);
      ctx.quadraticCurveTo(gx, gy, gx + _r, gy);
      ctx.closePath();
      ctx.clip();
      // UI ьїЕ ьЁївДѕ ВаЂВџЕ Рђћ в▓џЖйЃВЮ┤вЕ┤ ьЋЉьЂг ЖиИвЮ╝вЇ░ВЮ┤ВЁў, ЖИ░в│ИВЮ┤вЕ┤ В┤ѕвАЮ ЖиИвЮ╝вЇ░ВЮ┤ВЁў.
      const _ui = _getUiPack();
      const _hpg = ctx.createLinearGradient(0, gy + gh, 0, gy);
      if (_ui) {
        _hpg.addColorStop(0, _ui.hpFill0 || '#ff4d8e');
        _hpg.addColorStop(0.55, _ui.hpFill1 || '#ffa0c4');
        _hpg.addColorStop(1, _ui.hpFill2 || '#ffd9e3');

        // ЖИ░в│И В┤ѕвАЮ gradient Рђћ ВЋёвъў(ВДёьЋю В┤ѕвАЮ) Рєњ Вюё(в░ЮВЮђ вёцВўе В┤ѕвАЮ)
        _hpg.addColorStop(0, '#00aa4f');
        _hpg.addColorStop(0.55, '#1fdd77');
        _hpg.addColorStop(1, '#7cffae');

      ctx.fillRect(gx, gy + gh - _fillH, gw, _fillH);

    }
    // РўЁ HP в░ћ ВЃЂвІе(ВюёВфй) ВЌљ hp_bar.png ВъЦВІЮ PNG вХЎВъё Рђћ HP в░ћ в│ИВ▓┤ВЎђ в│ёЖ░ю ВўЂВЌГ.
    //   Y в▓ћВюё: _topWedgeY ~ gy (top cap + wedge ВўЂВЌГ).
    //   ВъљВЌ░ в╣ёВюе ВюаВДђ, HP в░ћ X ВцЉВІг ВаЋваг.
    const _hpSk = _getUiPackSkin();
    const _hpDecoPath = _hpSk && _hpSk.imagePaths && _hpSk.imagePaths.hpBar;
    const _hpDecoImg = _hpDecoPath ? skinImages[_hpDecoPath] : null;
    if (_hpDecoImg && _hpDecoImg._ok === true) {
      try {
        const _hpAsp = _hpDecoImg.naturalWidth / _hpDecoImg.naturalHeight;
        const _decoH = gy - _topWedgeY;  // HP в░ћ ВюёВфй Ж│хЖ░ё вєњВЮ┤

    }
    // РўЁ В║АВіљ ВЎИЖ│йВёа ВаюЖ▒░ Рђћ в╣ѕ ВўЂВЌГВЮ┤ HP В╗еьЁїВЮ┤вёѕ body ВЎђ ВЎёВаёьъѕ seamless вАю в│┤ВЮ┤вЈёвАЮ.
    //   Вађ HP ВюёЖИЅ в╣еЖ░ё ЖИђвАюВџ░вДї ВюаВДђ (ВЎИЖ│йВёа ВЌєВЮ┤ shadow вАю).
    if (gauge < 0.3) {
      if (!isMobile) {
        ctx.save();
        ctx.shadowColor = '#ff3333';
        ctx.shadowBlur = 10 + Math.sin(Date.now()*0.008)*5;
        ctx.strokeStyle = 'rgba(255,80,80,0.6)'; ctx.lineWidth = 1;
        rrStroke(gx, gy, gw, gh, gw/2);
        ctx.restore();
      }
    }
  }

  // SCORE (Вџ░ВИА) + MAX COMBO (ВбїВИА) Рђћ ьїљВаЋВёа в░Љ в░▒ьїљВЌљ в░░В╣ў. вдгвЊгЖ▓їВъё UI віљвѓї.
  if (!window._hudRawMax) window._hudRawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
  const _hudScore = Math.round(score / window._hudRawMax * 1000000);
  if (_hudScore !== window._hudScorePrev) { window._hudScorePrev = _hudScore; window._hudScoreStr = _hudScore.toLocaleString(); }
  {
    const _lsxUI = getLaneStartX();
    const _twUI = getLaneW() * laneCount;
    const _panelTop = getHitY() + sz(2);
    const _panelBot = getBtnY();
    const _midY = _panelTop + (_panelBot - _panelTop) / 2;
    const _inPad = sz(12);
    const _labelSize = isMobile ? sz(8) : sz(10);
    const _valueSize = isMobile ? sz(16) : sz(22);

    // ВЃЂвІе ВЋАВё╝ьіИ glow вЮ╝ВЮИ Рђћ ьїљВаЋВёа в░ћвАю в░Љ (UI ьїЕ ВъЦВ░Е ВІю ьїћваѕьіИ ВЃЅ, ЖИ░в│ИВЮђ ьЮ░ВЃЅ).
    //   ЖИ░ВА┤ curSong.color ВѓгВџЕ Рєњ Ж│АвДѕвІц ВЃЅ в│ђвЈЎ Рєњ "ьїљВаЋВёа вЉљ Ж░ю" ВўцВЮИ Вюав░ю (ВюаВађ ВџћВ▓ГВю╝вАю Ж│аВаЋ).
    //   РўЁ deck_base PNG ьЎюВё▒ ВІюВЌћ PNG ВЌљ ВЮ┤в»И ВЃЂвІе ьЋЉьЂг вЮ╝ВЮИВЮ┤ ВъѕВќ┤ procedural ВЃЮвъх.
    const _uiAc = _getUiPack();
    const _uiAcSk = _getUiPackSkin();
    const _dbActive = _uiAcSk && _uiAcSk.imagePaths && _uiAcSk.imagePaths.deckBase &&
                       skinImages[_uiAcSk.imagePaths.deckBase] &&
                       skinImages[_uiAcSk.imagePaths.deckBase]._ok === true;
    if (!_dbActive) {
      const _accentCol = _uiAc && _uiAc.deckAccent ? _uiAc.deckAccent : '#ffffff';
      const _accentGrad = ctx.createLinearGradient(0, _panelTop, 0, _panelTop + sz(4));
      _accentGrad.addColorStop(0, _accentCol + 'cc');
      _accentGrad.addColorStop(1, _accentCol + '00');
      ctx.fillStyle = _accentGrad;
      ctx.fillRect(_lsxUI, _panelTop, _twUI, sz(4));

    // ьЋўвІе ВќЄВЮђ ВЋАВё╝ьіИ вЮ╝ВЮИ
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(_lsxUI + _inPad, _panelBot - sz(2), _twUI - _inPad*2, 1);

    // MAX COMBO (Вбї)
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${_labelSize}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('MAX COMBO', _lsxUI + _inPad, _midY - _valueSize * 0.45);
    ctx.font = `bold ${_valueSize}px sans-serif`;
    ctx.fillStyle = maxCombo > 0 ? '#ffd700' : 'rgba(255,255,255,0.35)';
    ctx.fillText(maxCombo + 'x', _lsxUI + _inPad, _midY + _valueSize * 0.35);

      const sel = laneCount === m;
      ctx.fillStyle = sel ? '#cc44ff22' : 'rgba(255,255,255,0.03)';
      rrFill(bx, modeY, modeBtnW, modeBtnH, sz(6));
      ctx.strokeStyle = sel ? '#cc44ff' : 'rgba(255,255,255,0.12)';
      ctx.lineWidth = sel ? 2 : 1;
      if (sel) { ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 8; }
      rrStroke(bx, modeY, modeBtnW, modeBtnH, sz(6)); ctx.shadowBlur = 0;
      ctx.textAlign = 'center'; ctx.font = `bold ${sz(12)}px sans-serif`;
      ctx.fillStyle = sel ? '#cc44ff' : 'rgba(255,255,255,0.4)';
      ctx.textBaseline = 'middle';
      ctx.fillText(m + 'K', bx + modeBtnW/2, modeY + modeBtnH/2);
    });
  }

  // ьѓц в░ћВЮИвћЕ UI (в░ўВЮЉьўЋ ьќЅ вєњВЮ┤)
  const rowH = sz(laneCount >= 7 ? 32 : laneCount >= 6 ? 36 : 42);
  const startY = modeY + modeBtnH + sz(12);
  const laneNames = Array.from({length: laneCount}, (_, i) => 'ваѕВЮИ ' + (i+1));

  if (!_mobileSettings) for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const isBinding = settingsBindingLane === i;

    // ьќЅ в░░Ж▓й
    ctx.fillStyle = isBinding ? LANE_COLORS[i] + '18' : 'rgba(255,255,255,0.03)';
    rrFill(panelX, ry, panelW, rowH - sz(4), sz(6));
    if (isBinding) {
      ctx.strokeStyle = LANE_COLORS[i]; ctx.lineWidth = 2;
      rrStroke(panelX, ry, panelW, rowH - sz(4), sz(6));
    }

    // ваѕВЮИ ВЃЅВЃЂ в░ћ
    ctx.fillStyle = LANE_COLORS[i] + (isBinding ? 'cc' : '66');
    rrFill(panelX + sz(5), ry + sz(5), sz(3), rowH - sz(14), 2);

    // ваѕВЮИ ВЮ┤вдё
    ctx.textAlign = 'left';
    ctx.font = `bold ${sz(13)}px sans-serif`;
    ctx.fillStyle = isBinding ? '#fff' : 'rgba(255,255,255,0.7)';
    ctx.textBaseline = 'middle';
    ctx.fillText(laneNames[i], panelX + sz(16), ry + (rowH - sz(4))/2);

    // ВцЉв│хьѓц Ж▓йЖ│а (2В┤ѕ ВюаВДђ)
    if (settingsDupWarnLane === i && (performance.now() - settingsDupWarnTime) < 2000) {
      const _laneW = ctx.measureText(laneNames[i]).width;
      ctx.font = `bold ${sz(11)}px sans-serif`;
      ctx.fillStyle = '#ff6666';
      ctx.fillText('ВцЉв│хьѓцВъЁвІѕвІц', panelX + sz(16) + _laneW + sz(8), ry + (rowH - sz(4))/2);
    }

    // ьѓц в▓ёьі╝
    const kbW = Math.min(sz(90), panelW * 0.3), kbH = sz(28);
    const kbX = panelX + panelW - kbW - sz(8), kbY = ry + (rowH - sz(4) - kbH) / 2;
    ctx.fillStyle = isBinding ? LANE_COLORS[i] + '33' : 'rgba(255,255,255,0.06)';
    rrFill(kbX, kbY, kbW, kbH, sz(6));
    ctx.strokeStyle = isBinding ? LANE_COLORS[i] : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isBinding ? 2 : 1;
    rrStroke(kbX, kbY, kbW, kbH, sz(6));
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(13)}px sans-serif`;
    if (isBinding) {
      const blink = Math.floor(Date.now()/400)%2===0;
      ctx.fillStyle = blink ? '#fff' : LANE_COLORS[i];
      ctx.textBaseline = 'middle';
      ctx.fillText('ьѓц ВъЁваЦ...', kbX + kbW/2, kbY + kbH/2);
    } else {
      ctx.fillStyle = LANE_COLORS[i]; ctx.textBaseline = 'middle';
      ctx.fillText(getLaneLabel(i), kbX + kbW/2, kbY + kbH/2);
    }
  }

  // В┤ѕЖИ░ьЎћ в▓ёьі╝
  const resetY = startY + laneCount * rowH + sz(10);
  const resetW = Math.min(sz(120), panelW * 0.4), resetH = sz(30);
  const resetX = (W - resetW) / 2;
  if (!_mobileSettings) {
    ctx.fillStyle = 'rgba(255,100,100,0.08)'; rrFill(resetX, resetY, resetW, resetH, sz(6));
    ctx.strokeStyle = 'rgba(255,100,100,0.4)'; ctx.lineWidth = 1; rrStroke(resetX, resetY, resetW, resetH, sz(6));
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,100,100,0.8)';
    ctx.textBaseline = 'middle';
    ctx.fillText('ЖИ░в│ИЖ░њ в│хВЏљ', W/2, resetY + resetH/2);
  }

  // ===== в│╝вЦе ВёцВаЋ =====
  const volY = _mobileSettings ? (modeY + sz(6)) : (resetY + resetH + sz(14));
  const sliderW = Math.min(panelW - sz(16), sz(240));
  const sliderX = (W - sliderW) / 2;
  const sliderH = sz(5), knobR = sz(8), volRowH = sz(38);

  // BGM в│╝вЦе
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(12)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('ВЮїВЋЁ ВъгВЃЮ', sliderX, volY + sz(10));
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volBgm * 100) + '%', sliderX + sliderW, volY + sz(10));
  const bgmTrackY = volY + sz(20);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, bgmTrackY, sliderW, sliderH, sz(2));
  const bgmFill = sliderW * volBgm;
  ctx.fillStyle = '#cc44ff44'; rrFill(sliderX, bgmTrackY, bgmFill, sliderH, sz(2));
  const bgmKnobX = sliderX + bgmFill;
  ctx.beginPath(); ctx.arc(bgmKnobX, bgmTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#cc44ff'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // SFX в│╝вЦе
  const sfxY = volY + volRowH;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(12)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('ьџеЖ│╝ВЮї', sliderX, sfxY + sz(10));
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volSfx * 100) + '%', sliderX + sliderW, sfxY + sz(10));
  const sfxTrackY = sfxY + sz(20);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, sfxTrackY, sliderW, sliderH, sz(2));
  const sfxFill = sliderW * volSfx;
  ctx.fillStyle = '#44dd6644'; rrFill(sliderX, sfxTrackY, sfxFill, sliderH, sz(2));
  const sfxKnobX = sliderX + sfxFill;
  ctx.beginPath(); ctx.arc(sfxKnobX, sfxTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#44dd66'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // ===== Ж▓їВъё вфевЊю ВёаьЃЮ =====
  const gameModeY = sfxY + volRowH + sz(8);
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('ВА░ВъЉ вфевЊю', sliderX, gameModeY);
  const gmBtnW = (sliderW - sz(8)) / 2, gmBtnH = sz(28);
  const gmBtnY = gameModeY + sz(14);
  // вдгвЊгвфевЊю в▓ёьі╝
  const rSel = gameMode === 'rhythm';
  ctx.fillStyle = rSel ? '#00d4ff22' : 'rgba(255,255,255,0.04)';
  rrFill(sliderX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.strokeStyle = rSel ? '#00d4ff' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = rSel ? 2 : 1;
  rrStroke(sliderX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(11)}px sans-serif`;
  ctx.fillStyle = rSel ? '#00d4ff' : 'rgba(255,255,255,0.4)';
  ctx.fillText('вдгвЊгвфевЊю', sliderX + gmBtnW/2, gmBtnY + gmBtnH/2);
  // вѓўвЁИвфевЊю в▓ёьі╝
  const nSel = gameMode === 'nano';
  const nBtnX = sliderX + gmBtnW + sz(8);
  ctx.fillStyle = nSel ? '#ffd70022' : 'rgba(255,255,255,0.04)';
  rrFill(nBtnX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.strokeStyle = nSel ? '#ffd700' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = nSel ? 2 : 1;
  rrStroke(nBtnX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.fillStyle = nSel ? '#ffd700' : 'rgba(255,255,255,0.4)';
  ctx.fillText('вѓўвЁИвфевЊю', nBtnX + gmBtnW/2, gmBtnY + gmBtnH/2);
  // ВёцвфЁ
  ctx.font = `${sz(9)}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText(gameMode === 'nano' ? 'в│┤вІц ВаЋЖхљьЋю ВЌ░ВБ╝вЦ╝ ВдљЖИ░ВІц вХёвЊцВЌљЖ▓ї ВХћВ▓ювЊювдйвІѕвІц' : 'ВЮїВЋЁВЮў ВѕюВѕўьЋю вдгвЊгВЮё ВдљЖИ░ВІц Вѕў ВъѕВіхвІѕвІц', W/2, gmBtnY + gmBtnH + sz(8));
  // ьЂ┤вдГ ВўЂВЌГ ВађВъЦ
  window._modeBtnRhythm = { x: sliderX, y: gmBtnY, w: gmBtnW, h: gmBtnH };
  window._modeBtnNano = { x: nBtnX, y: gmBtnY, w: gmBtnW, h: gmBtnH };

  // ===== Ж│ёВаЋ ВаЋв│┤ =====
  const acctY = gmBtnY + gmBtnH + sz(24);
  const acctBoxW = panelW, acctBoxH = sz(50);
  const acctBoxX = (W - acctBoxW) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.03)'; rrFill(acctBoxX, acctY, acctBoxW, acctBoxH, sz(8));
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; rrStroke(acctBoxX, acctY, acctBoxW, acctBoxH, sz(8));
  // вІЅвёцВъё (ьЂгЖ▓ї)
  ctx.font = `bold ${sz(16)}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(currentUser || '', W / 2, acctY + sz(22));
  // вАюЖиИВЮИ в░ЕВІЮ ьЃюЖиИ (Kplay ВаёВџЕ)
  ctx.font = `bold ${sz(10)}px sans-serif`;
  ctx.fillStyle = '#9e7aff';
  ctx.fillText('Kplay', W / 2, acctY + sz(40));

  // вАюЖиИВЋёВЏЃ + Ж│ёВаЋ ВѓГВаю в▓ёьі╝
  const actY = acctY + acctBoxH + sz(8);
  const actBtnW = Math.min(sz(110), panelW * 0.35), actBtnH = sz(30), actGap = sz(10);
  {
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    // вАюЖиИВЋёВЏЃ
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; rrStroke(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('\uB85C\uADF8\uC544\uC6C3', actStartX + actBtnW / 2, actY + actBtnH / 2);
    // Ж│ёВаЋ ВѓГВаю
    const delX = actStartX + actBtnW + actGap;
    ctx.fillStyle = 'rgba(255,50,50,0.08)'; rrFill(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(255,50,50,0.5)'; ctx.lineWidth = 1; rrStroke(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.font = `bold ${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.fillText('\uACC4\uC815 \uC0AD\uC81C', delX + actBtnW / 2, actY + actBtnH / 2);
  }

  // ьЃђВЮ┤ьІђ ьЎћвЕ┤Вю╝вАю вЈїВЋёЖ░ђЖИ░ в▓ёьі╝ (вфевЊю в│ђЖ▓йВџЕ)
  const ttY = actY + actBtnH + sz(10);
  const ttW = Math.min(sz(240), panelW * 0.8), ttH = sz(32);
  const ttX = (W - ttW) / 2;
  ctx.fillStyle = 'rgba(140,100,255,0.12)'; rrFill(ttX, ttY, ttW, ttH, sz(8));
  ctx.strokeStyle = 'rgba(160,120,255,0.5)'; ctx.lineWidth = 1; rrStroke(ttX, ttY, ttW, ttH, sz(8));
  ctx.font = `bold ${sz(12)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(200,180,255,0.9)';
  ctx.fillText('ьЃђВЮ┤ьІђ ьЎћвЕ┤Вю╝вАю (вфевЊю в│ђЖ▓й)', ttX + ttW / 2, ttY + ttH / 2);
  ctx.textBaseline = 'alphabetic';
  // ВађВъЦВџЕ (ВіцьЂгвАц в░ўВўЂвљю ВюёВ╣ўвАю ВађВъЦ)
  window._settingsTitleBtn = { x: ttX, y: ttY, w: ttW, h: ttH };

  // ВйўьЁљВИа В┤Ю вєњВЮ┤ ВађВъЦ ьЏё ьЂ┤вдй/ВіцьЂгвАц ВбЁвБї
  settingsContentH = (ttY + ttH) - (popY + sz(4));
  ctx.restore();
  // ВіцьЂгвАц в▓ћВюё ьЂ┤въеьћё
  const _scrollMax = Math.max(0, settingsContentH - _scrollClipH + sz(20));
  if (settingsScrollY > _scrollMax) settingsScrollY = _scrollMax;
  if (settingsScrollY < 0) settingsScrollY = 0;
  // ВіцьЂгвАцв░ћ (ВйўьЁљВИа Вўцв▓ёьћївАюВџ░ ВІю)
  if (_scrollMax > 0) {
    const sbX = popX + popW - sz(6), sbY = _scrollClipY + sz(4), sbH = _scrollClipH - sz(8);
    const thumbH = Math.max(sz(30), sbH * _scrollClipH / (settingsContentH + sz(20)));
    const thumbY = sbY + (sbH - thumbH) * (settingsScrollY / _scrollMax);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rrFill(sbX - 2, sbY, 4, sbH, 2);
    ctx.fillStyle = 'rgba(160,130,255,0.6)';
    rrFill(sbX - 2, thumbY, 4, thumbH, 2);
  }

  // Ж│ёВаЋ ВѓГВаю ьЎЋВЮИ ьїЮВЌЁ
  if (deleteAccountPopup) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    const dpW = Math.min(sz(300), W * 0.85), dpH = sz(180);
    const dpX = (W - dpW) / 2, dpY = (H - dpH) / 2;
    ctx.fillStyle = 'rgba(30,10,10,0.97)'; rrFill(dpX, dpY, dpW, dpH, sz(14));
    ctx.strokeStyle = 'rgba(255,50,50,0.6)'; ctx.lineWidth = 2; rrStroke(dpX, dpY, dpW, dpH, sz(14));

    ctx.font = `bold ${sz(16)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('\uACC4\uC815 \uC0AD\uC81C', W / 2, dpY + sz(35));
    ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('\uBAA8\uB4E0 \uAE30\uB85D, \uB7AD\uD0B9, \uC810\uC218, \uC5C5\uC801\uC774', W / 2, dpY + sz(60));
    ctx.fillStyle = '#ff6666'; ctx.font = `bold ${sz(12)}px sans-serif`;
    ctx.fillText('\uC601\uAD6C\uC801\uC73C\uB85C \uC0AD\uC81C\uB429\uB2C8\uB2E4.', W / 2, dpY + sz(78));
    ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('\uC774 \uC791\uC5C5\uC740 \uB418\uB3CC\uB9B4 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.', W / 2, dpY + sz(96));

    const dbW = sz(90), dbH = sz(34), dbGap = sz(14);
    const dcX = W / 2 - dbW - dbGap / 2, ddX = W / 2 + dbGap / 2;
    const dbY = dpY + dpH - sz(50);
    // ВиеВєї
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(dcX, dbY, dbW, dbH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; rrStroke(dcX, dbY, dbW, dbH, sz(8));
    ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\uCDE8\uC18C', dcX + dbW / 2, dbY + dbH / 2);
    // ВѓГВаю
    ctx.fillStyle = 'rgba(255,30,30,0.15)'; rrFill(ddX, dbY, dbW, dbH, sz(8));
    ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 1.5;
    ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 6;
    rrStroke(ddX, dbY, dbW, dbH, sz(8)); ctx.shadowBlur = 0;
    ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = '#ff3333';
    ctx.fillText('\uC0AD\uC81C', ddX + dbW / 2, dbY + dbH / 2);
    ctx.textBaseline = 'alphabetic';
  }

  // Kplay ВЌ░вЈЎ/ВаёьЎў ьїЮВЌЁ ВаюЖ▒░вље (2026-04-15) Рђћ Ж▓їВіцьіИ ВаюЖ▒░вАю вХѕьЋёВџћ
}

function handleSettingsClick(mx, my) {
  // Kplay ВЌ░вЈЎ/ВаёьЎў ьїЮВЌЁ ВаюЖ▒░вље (2026-04-15)
  // Ж│ёВаЋ ВѓГВаю ьїЮВЌЁВЮ┤ ВЌ┤вацВъѕВю╝вЕ┤ ВхюВџ░Вёа В▓ўвдг
  if (deleteAccountPopup) {
    const dpW = Math.min(sz(300), W * 0.85), dpH = sz(180);
    const dpX = (W - dpW) / 2, dpY = (H - dpH) / 2;
    const dbW = sz(90), dbH = sz(34), dbGap = sz(14);
    const dcX = W / 2 - dbW - dbGap / 2, ddX = W / 2 + dbGap / 2;
    const dbY = dpY + dpH - sz(50);
    if (hitTest(mx, my, dcX, dbY, dbW, dbH)) { deleteAccountPopup = false; return; }
    if (hitTest(mx, my, ddX, dbY, dbW, dbH)) { deleteAccount(); return; }
    return;
  }
  const popW = Math.min(sz(340), W*0.92), popH = Math.min(H*0.94, sz(620));
  const popX = (W - popW) / 2, popY = (H - popH) / 2;
  if (!hitTest(mx, my, popX, popY, popW, popH)) { settingsOpen = false; settingsBindingLane = -1; deleteAccountPopup = false; return; }
  // вІФЖИ░ в▓ёьі╝
  const bbW = sz(30), bbH = sz(24), bbX = popX + popW - bbW - sz(6), bbY = popY + sz(6);
  if (hitTest(mx, my, bbX, bbY, bbW, bbH)) { settingsOpen = false; settingsBindingLane = -1; deleteAccountPopup = false; return; }

  // ВіцьЂгвАц ВўЂВЌГ вѓ┤вХђвіћ my + scrollY ВѓгВџЕ
  const mys = my + settingsScrollY;

  // ьЃђВЮ┤ьІђ ьЎћвЕ┤Вю╝вАю вЈїВЋёЖ░ђЖИ░ (вфевЊю в│ђЖ▓й)
  if (window._settingsTitleBtn) {
    const tb = window._settingsTitleBtn;
    if (hitTest(mx, mys, tb.x, tb.y, tb.w, tb.h)) {
      settingsOpen = false; settingsBindingLane = -1;
      stopSongAudio(); stopPreview(); stopRankingBgm(); stopShopBgm(); stopAchievementBgm(); stopInventoryBgm();
      transitionTo('title', () => { startTitleBgm(); });
      return;
    }
  }

  // Ж▓їВъё вфевЊю ьєаЖИђ
  if (window._modeBtnRhythm && hitTest(mx, mys, _modeBtnRhythm.x, _modeBtnRhythm.y, _modeBtnRhythm.w, _modeBtnRhythm.h)) {
    gameMode = 'rhythm'; saveGameMode(); return;
  }
  if (window._modeBtnNano && hitTest(mx, mys, _modeBtnNano.x, _modeBtnNano.y, _modeBtnNano.w, _modeBtnNano.h)) {
    gameMode = 'nano'; saveGameMode(); return;
  }

  // 4~8ьѓц вфевЊю ьєаЖИђ (PCвДї)
  const modeY = popY + sz(58);
  const modeBtnH = sz(26);
  if (!isMobile) {
    const modeKeys = [4, 5, 6, 7, 8];
    const modeBtnW = sz(40), modeGap = sz(6);
    const modeTotalW = modeBtnW * modeKeys.length + modeGap * (modeKeys.length - 1);
    const modeX = (W - modeTotalW) / 2;
    for (let mi = 0; mi < modeKeys.length; mi++) {
      const bx = modeX + mi * (modeBtnW + modeGap);
      if (hitTest(mx, mys, bx, modeY, modeBtnW, modeBtnH) && laneCount !== modeKeys[mi]) {
        setLaneMode(modeKeys[mi]); settingsBindingLane = -1; return;
      }
    }
  }

  const panelW = Math.min(popW - sz(20), sz(300));
  const panelX = (W - panelW) / 2;
  const rowH = sz(laneCount >= 7 ? 32 : laneCount >= 6 ? 36 : 42);
  const startY = modeY + modeBtnH + sz(12);

  const _mobileSettingsC = isMobile;
  // ьѓц в▓ёьі╝ ьЂ┤вдГ (вфев░ћВЮ╝ВЌљВёювіћ ВѕеЖ╣ђ)
  if (!_mobileSettingsC) for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const kbW = Math.min(sz(90), panelW * 0.3), kbH = sz(28);
    const kbX = panelX + panelW - kbW - sz(8), kbY = ry + (rowH - sz(4) - kbH) / 2;
    if (hitTest(mx, mys, kbX, kbY, kbW, kbH)) {
      settingsBindingLane = (settingsBindingLane === i) ? -1 : i;
      return;
    }
  }

  // В┤ѕЖИ░ьЎћ в▓ёьі╝
  const resetY = startY + laneCount * rowH + sz(10);
  const resetW = Math.min(sz(120), panelW * 0.4), resetH = sz(30);
  const resetX = (W - resetW) / 2;
  if (!_mobileSettingsC && hitTest(mx, mys, resetX, resetY, resetW, resetH)) {
    resetKeymap(); settingsBindingLane = -1; return;
  }

  // в│╝вЦе ВігвЮ╝ВЮ┤вЇћ
  const sliderW = Math.min(panelW - sz(16), sz(240));
  const sliderX = (W - sliderW) / 2;
  const volY = _mobileSettingsC ? (modeY + sz(6)) : (resetY + resetH + sz(14));
  const volRowH = sz(38), sliderHitH = sz(26);
  const bgmTrackY = volY + sz(20);
  const sfxTrackY = volY + volRowH + sz(20);
  if (mys >= bgmTrackY - sliderHitH/2 && mys <= bgmTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'bgm';
    volBgm = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applyBgmVol(); saveVolSettings(); return;
  }
  if (mys >= sfxTrackY - sliderHitH/2 && mys <= sfxTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'sfx';
    volSfx = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applySfxVol(); saveVolSettings(); return;
  }

  // Ж│ёВаЋ ВаЋв│┤ в░ЋВіц + в▓ёьі╝ (renderВЎђ вЈЎВЮ╝ьЋю Y В▓┤ВЮИ)
  const sfxY_click = volY + volRowH;
  const gameModeY_click = sfxY_click + volRowH + sz(8);
  const gmBtnY_click = gameModeY_click + sz(14);
  const gmBtnH_click = sz(28);
  const acctY_click = gmBtnY_click + gmBtnH_click + sz(24);
  const acctBoxH = sz(50);
  const actY = acctY_click + acctBoxH + sz(8);
  const actBtnW = Math.min(sz(110), panelW * 0.35), actBtnH = sz(30), actGap = sz(10);
  {
    // Kplay: вАюЖиИВЋёВЏЃ + Ж│ёВаЋ ВѓГВаю
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    if (hitTest(mx, mys, actStartX, actY, actBtnW, actBtnH)) { logoutUser(); return; }
    const delX = actStartX + actBtnW + actGap;
    if (hitTest(mx, mys, delX, actY, actBtnW, actBtnH)) { deleteAccountPopup = true; return; }
  }
}

// ===== TITLE =====
let titleParticles = [];
function spawnTitleParticles() {
  const now = Date.now();
  // Ambient floating particles Рђћ ВЋѕВаё ВўЂВЌГ ьЈгьЋе ВаёВ▓┤ ьЎћвЕ┤ВЌљВёю в░юВЃЮ/ВЮ┤вЈЎ
  if (titleParticles.length < 40) {
    const hue = 240 + Math.random() * 80; // blue-purple range
    titleParticles.push({
      x: Math.random() * W, y: H + safeBottom + 10,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.3 + Math.random() * 0.8),
      size: 2 + Math.random() * 4,
      life: 1, decay: 0.002 + Math.random() * 0.003,
      hue, sat: 60 + Math.random() * 40, lit: 60 + Math.random() * 30,
      type: 'float'
    });
  }
  // Sparkle bursts from center
  if (Math.random() < 0.15) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    const hue = 260 + Math.random() * 60;
    titleParticles.push({
      x: W/2 + (Math.random()-0.5) * W * 0.3,
      y: H * 0.35 + (Math.random()-0.5) * 40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 1 + Math.random() * 2.5,
      life: 1, decay: 0.015 + Math.random() * 0.01,
      hue, sat: 80, lit: 70 + Math.random() * 20,
      type: 'spark'
    });
  }
}
function updateTitleParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.type === 'float') { p.vx += (Math.random() - 0.5) * 0.05; }
    if (p.life <= 0 || p.y < -safeTop - 20) { titleParticles.splice(i, 1); }
  }
}

function handleCoinChargePopupClick(mx, my) {
  if (_coinChargeCloseArea && hitTest(mx, my, _coinChargeCloseArea.x, _coinChargeCloseArea.y, _coinChargeCloseArea.w, _coinChargeCloseArea.h)) {
    playScrollTick(); closeCoinChargePopup(); return;
  }
  for (const b of _coinChargeBtnAreas) {
    if (hitTest(mx, my, b.x, b.y, b.w, b.h)) {
      playScrollTick();
      closeCoinChargePopup();
      if (b.action === 'goShop') {
        // ВЮ┤в»И ВЃЂВаљ ВЋѕВЮ┤вЕ┤ ВЮ┤вЈЎ вХѕьЋёВџћ. ВЋёвІѕвЕ┤ ВЃЂВаљВю╝вАю ВаёьЎў + ВЮїьЉю Вё╣ВЁў ВіцьЂгвАц.
        shopScroll = 0;
        stopPreview();
        startShopBgm();
        if (state !== 'shop') transitionTo('shop');
      }
      return;
    }
  }
  // в░ћЖ╣Ц ьЃГ Рєњ вІФЖИ░
  const pw = Math.min(sz(340), W * 0.88), ph = sz(190);
  const px = (W - pw) / 2, py = (H - ph) / 2;
  if (!hitTest(mx, my, px, py, pw, ph)) closeCoinChargePopup();
}

let shopCancelArea = null;

  const _sbb = window._shopBackBtn;

  // ВЃЂьњѕ ьЂ┤вдГ Рђћ ваївЇћВЮў _contentTop Ж│ёВѓ░Ж│╝ ВаЋьЎЋьъѕ вЈЎВЮ╝ьЋўЖ▓ї
  const _shopMobile = isMobile;

  const cw = Math.min(sz(360), W * 0.92);

// ВЃЂВаљ ВЋёВЮ┤Вйў В║ћв▓ёВіц ваївЇћвДЂ
function drawShopItemIcon(item, cx, cy, r) {
  ctx.save();
  // iconImage Ж░ђ ВъѕВю╝вЕ┤ ЖиИ ВЮ┤в»ИВДђвЦ╝ ВЏљьўЋ clip ьЋ┤Вёю ваївЇћ (loadSkinImage ВъгьЎюВџЕ)
  //   iconSrc: [sx,sy,sw,sh] ВъѕВю╝вЕ┤ atlas вХђвХё В╗и Рєњ cleaned/centered ВіцьћёвЮ╝ВЮ┤ьіИ ВѓгВџЕ Ж░ђвіЦ.
  if (item.iconImage) {
    const img = loadSkinImage(item.iconImage);
    if (img && img.complete && img.naturalWidth) {
      const dSize = r * 1.7;
      if (item.iconSrc) {
        const [sx, sy, sw, sh] = item.iconSrc;
        ctx.drawImage(img, sx, sy, sw, sh, cx - dSize/2, cy - dSize/2, dSize, dSize);
      } else {
        ctx.drawImage(img, cx - dSize/2, cy - dSize/2, dSize, dSize);
      }
      ctx.restore();
      return;
    }
    ctx.font = `${Math.round(r*1.1)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(item.icon || 'РўЁ', cx, cy);
    ctx.restore();
    return;
  }
  if (item.id === 'pass28') {
    // ьЌцвЊюьЈ░ (28ВЮ╝ ьїеВіц) Рђћ ьЮ░ВЃЅ/ВІцв▓ё, ьѓц ьЂ░ в░┤вЊю
    const cupW = r * 0.34, cupH = r * 0.55;
    const cupGap = r * 1.05;
    const cupY = cy + r * 0.32;
    const bandRX = cupGap / 2;
    const bandHeight = r * 0.78;
    const bandThick = r * 0.16;
    // ьЌцвЊюв░┤вЊю Рђћ ВѓгвІцвдгЖ╝┤+ьЃђВЏљ ВцЉЖ░ё (ВаёВ▓┤вЦ╝ вІеВЮ╝ в▓аВДђВќ┤вАю вХђвЊювЪйЖ▓ї)
    const topInset = bandRX * 0.22;
    const topArch = r * 0.18;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = '#e8eef8';
    ctx.lineWidth = bandThick;
    ctx.beginPath();
    // ВбїВИА ВІюВъЉ
    ctx.moveTo(cx - bandRX, cupY);
    // ВбїРєњВЃЂ вХђвЊювЪгВџ┤ в▓аВДђВќ┤ (ВѓгВЮ┤вЊюВЌљВёю ВюЌвЕ┤Вю╝вАю ВъљВЌ░ВіцвЪйЖ▓ї ьЮљвдё)
    ctx.bezierCurveTo(
      cx - bandRX, cupY - bandHeight * 0.85,
      cx - bandRX + topInset, cupY - bandHeight - topArch * 0.6,
      cx, cupY - bandHeight - topArch
    );
    // ВюЌвЕ┤ ВаЋВаљВЌљВёю Вџ░ВИАВю╝вАю вїђВ╣Г ьЮљвдё
    ctx.bezierCurveTo(
      cx + bandRX - topInset, cupY - bandHeight - topArch * 0.6,
      cx + bandRX, cupY - bandHeight * 0.85,
      cx + bandRX, cupY
    );
    ctx.stroke();
    ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
    // ВбїВИА ВЮ┤Вќ┤В╗х
    const lx = cx - bandRX - cupW/2;
    ctx.fillStyle = '#c8d0e0';
    rrFill(lx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    ctx.strokeStyle = '#f0f4fa'; ctx.lineWidth = 1.2;
    rrStroke(lx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    // Вџ░ВИА ВЮ┤Вќ┤В╗х
    const rx = cx + bandRX - cupW/2;
    ctx.fillStyle = '#c8d0e0';
    rrFill(rx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    ctx.strokeStyle = '#f0f4fa'; ctx.lineWidth = 1.2;
    rrStroke(rx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
  } else if (item.type === 'coins') {
    // вЈЎВаё (ВЮїьЉю 100Ж░ю) Рђћ ьЈЅвЕ┤ ВаЋвЕ┤, ВцЉВЋЎ ВаЋваг, вІеВѕю ВЏљ + РЎф
    const coinR = r * 0.7;
    // ВЎИЖ│й вДЂ
    ctx.fillStyle = '#daa520';
    ctx.beginPath(); ctx.arc(cx, cy, coinR, 0, Math.PI*2); ctx.fill();
    // ВЋѕВфй вЕ┤
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(cx, cy, coinR * 0.85, 0, Math.PI*2); ctx.fill();
    // ВЎИЖ│йВёа
    ctx.strokeStyle = '#fff8c0'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(cx, cy, coinR, 0, Math.PI*2); ctx.stroke();
    // ВЮїьЉю РЎф
    ctx.fillStyle = '#8a5d10';
    ctx.font = `bold ${Math.round(coinR * 1.3)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('РЎф', cx, cy + 1);
  } else {
    // ьЈ┤в░▒: ЖИ░в│И ВЮ┤вфеВДђ
    ctx.font = `${Math.round(r*1.2)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(item.icon || 'РўЁ', cx, cy);
  }
  ctx.restore();
}

function renderShop() {
  // ===== в░░Ж▓й (ВЋѕВаёВўЂВЌГЖ╣їВДђ ьЎЋВъЦ) =====
  const _totalH = H + safeTop + safeBottom;
  const bg = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  bg.addColorStop(0, '#1a0d2e'); bg.addColorStop(0.4, '#120820'); bg.addColorStop(1, '#08040f');
  ctx.fillStyle = bg; ctx.fillRect(0, -safeTop, W, _totalH);
  // в│┤вЮ╝/ЖИѕВЃЅ ЖИђвАюВџ░
  const glow1 = ctx.createRadialGradient(W*0.2, sz(80), 0, W*0.2, sz(80), W*0.7);
  glow1.addColorStop(0, 'rgba(180,100,255,0.10)'); glow1.addColorStop(1, 'transparent');
  ctx.fillStyle = glow1; ctx.fillRect(0, -safeTop, W, _totalH);
  const glow2 = ctx.createRadialGradient(W*0.85, sz(40), 0, W*0.85, sz(40), W*0.6);
  glow2.addColorStop(0, 'rgba(255,200,80,0.08)'); glow2.addColorStop(1, 'transparent');
  ctx.fillStyle = glow2; ctx.fillRect(0, -safeTop, W, _totalH);

  // ===== ьЌцвЇћ (вфев░ћВЮ╝ВЮђ ьЎћвЕ┤ ВхюВЃЂвІе Рђћ safeTop ВўЂВЌГЖ╣їВДђ В╗цв▓ё) =====
  const _shopMobileC = isMobile;
  // вфев░ћВЮ╝: ьЌцвЇћЖ░ђ safeTopЖ╣їВДђ ьЎЋВъЦвљўВќ┤ ьЃђВЮ┤ьІђВЮ┤ ьЎћвЕ┤ ВхюВЃЂвІеВЌљ ВюёВ╣ў
  const headerTop = _shopMobileC ? -safeTop : 0;
  const headerH = _shopMobileC ? (sz(44) + safeTop) : sz(56);
  const headerGrad = ctx.createLinearGradient(0, headerTop, W, headerTop + headerH);
  headerGrad.addColorStop(0, 'rgba(122,77,255,0.25)');
  headerGrad.addColorStop(0.5, 'rgba(255,200,80,0.18)');
  headerGrad.addColorStop(1, 'rgba(122,77,255,0.25)');
  ctx.fillStyle = headerGrad; ctx.fillRect(0, headerTop, W, headerH);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, headerTop, W, headerH);
  // ьЌцвЇћ ьЋўвІе Ж░ЋВА░Вёа
  const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, 'rgba(255,215,0,0)');
  lineGrad.addColorStop(0.5, 'rgba(255,215,0,0.6)');
  lineGrad.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = lineGrad; ctx.fillRect(0, headerTop + headerH - 2, W, 2);

  // ьЃђВЮ┤ьІђ Рђћ ьЌцвЇћ Ж░ђвАю/ВёИвАю ВцЉВЋЎ
  const titleFontSize = _shopMobileC ? sz(18) : sz(22);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${titleFontSize}px sans-serif`; ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,215,0,0.6)'; ctx.shadowBlur = 8;
  const titleY = headerTop + headerH / 2;
  ctx.fillText('­ЪЏњ  NANO SHOP', W/2, titleY);
  ctx.shadowBlur = 0;

  // ===== ВЃЂьњѕ вфЕвАЮ =====
  // ВіцьЂгвАц ВЃЂьЋю ьЂ┤въеьћё (ВЮ┤Ваё ьћёваѕВъёВЌљ ВађВъЦьЋю ВйўьЁљВИа вєњВЮ┤ ЖИ░Вцђ)
  if (window._shopMaxScroll != null) {
    if (shopScroll > window._shopMaxScroll) shopScroll = window._shopMaxScroll;
    if (shopScroll < 0) shopScroll = 0;
  }
  // ВйўьЁљВИа ВўЂВЌГ ВаЋВЮў (ьЌцвЇћ ВЋёвъў ~ вњцвАюЖ░ђЖИ░ в▓ёьі╝ Вюё)
  const _contentTop = headerTop + headerH;
  const _contentBottom = isMobile ? (H + safeBottom - sz(48)) : (H - 56);
  // ВйўьЁљВИа ВўЂВЌГВЌљ ьЂ┤вдй Рђћ В╣┤вЊюЖ░ђ ьЌцвЇћ/в░ћьЁђ ВўЂВЌГ В╣ев▓ћ в░ЕВДђ
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, _contentTop, W, _contentBottom - _contentTop);
  ctx.clip();
  const cw = Math.min(sz(360), W * 0.92), cx = (W - cw) / 2;
  let y = _contentTop + sz(14) - shopScroll;
  const items = getShopItems();

    const item = items[ii];
    // Вё╣ВЁў ьЌцвЇћ (ьЋё ьўЋьЃю)
    if (item.section && item.section !== lastSection) {
      lastSection = item.section;
      // ьЈ░ьіИвЦ╝ ве╝Вађ ВёцВаЋьЋю вњц measureText ьўИВХю (в▓ёЖиИ ВѕўВаЋ)
      ctx.font = `bold ${sz(10)}px sans-serif`;
      const secW = ctx.measureText(item.section).width + sz(28);
      const secH = sz(20), secX = cx, secY = y - sz(2);
      ctx.fillStyle = item.color + '22'; rrFill(secX, secY, secW, secH, sz(10));
      ctx.strokeStyle = item.color + '66'; ctx.lineWidth = 1; rrStroke(secX, secY, secW, secH, sz(10));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = item.color;
      ctx.fillText(item.section, secX + secW/2, secY + secH/2);
      y += sz(24);
    }
    const ih = sz(100);
    const status = item.getStatus ? item.getStatus() : null;
    const buyable = item.canBuy ? item.canBuy() : true;

    // В╣┤вЊю (ВЮђВЮђьЋю вІцьЂг в░░Ж▓й + ВўЁВЮђ В╗гвЪг ВЋАВё╝ьіИ)
    ctx.fillStyle = 'rgba(18,12,32,0.92)'; rrFill(cx, y, cw, ih, sz(14));
    const cardGrad = ctx.createLinearGradient(cx, y, cx + cw, y + ih);
    cardGrad.addColorStop(0, item.color + '0c'); cardGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cardGrad; rrFill(cx, y, cw, ih, sz(14));
    // ВЎИЖ│й в│┤вЇћ (ВЮђВЮђьЋўЖ▓ї)
    ctx.strokeStyle = item.color + '44'; ctx.lineWidth = 1; rrStroke(cx, y, cw, ih, sz(14));
    // ВбїВИА ВЋАВё╝ьіИ в░ћ
    ctx.fillStyle = item.color; rrFill(cx, y + sz(8), sz(4), ih - sz(16), sz(2));

    // ВЋёВЮ┤Вйў Рђћ skin ьЃђВъЁВЮђ ьѕгвфЁ в░░Ж▓й(halo/ьЁївЉљвдг ВЌєВЮї), вѓўвеИВДђвіћ ЖИ░ВА┤ ЖИђвАюВџ░ ВЏљ
    const iconCx = cx + sz(38), iconCy = y + ih/2;
    const iconR = sz(28);
    if (item.type !== 'skin') {
      const iconGrad = ctx.createRadialGradient(iconCx, iconCy, 0, iconCx, iconCy, iconR);
      iconGrad.addColorStop(0, item.color + '55'); iconGrad.addColorStop(1, item.color + '08');

    }
    drawShopItemIcon(item, iconCx, iconCy, iconR);

    // Ж░ђЖ▓Е в▓ёьі╝ (Вџ░ВИА ВаЋваг) Рђћ ве╝Вађ ВбїьЉю Ж│ёВѓ░ьЋ┤Вёю ьЁЇВіцьіИ ьЈГ ВаюьЋюВЌљ ВѓгВџЕ
    const pbw = sz(96), pbh = sz(34);
    const pbx = cx + cw - pbw - sz(12), pby = y + (ih - pbh) / 2;
    // ьЁЇВіцьіИ ВўЂВЌГ: ВЋёВЮ┤Вйў Вџ░ВИА~в▓ёьі╝ ВбїВИА ВѓгВЮ┤
    const textX = cx + sz(74);
    const textMaxW = pbx - sz(8) - textX;
    // ВЃЂьњѕвфЁ + ВёцвфЁ Рђћ В╣┤вЊю ВёИвАю ВцЉВЋЎ(ВЋёВЮ┤Вйў ВцЉВІг)ВЌљ вДъВХ░ ВаЋваг
    const cardCenterY = y + ih/2;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${sz(15)}px sans-serif`; ctx.fillStyle = '#fff';
    ctx.fillText(item.label, textX, cardCenterY - sz(10), textMaxW);
    ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(item.desc, textX, cardCenterY + sz(10), textMaxW);

    if (buyable) {

// ===== ВЮИв▓цьєавдг (Ж░ђв░Е) =====
let inventoryTab = 'note';
let inventoryScroll = 0;
const _invBtnAreas = []; // Ж░Ђ ьћёваѕВъё в▓ёьі╝ hit ВўЂВЌГ

// Ж░ђв░Е(backpack) ВЋёВЮ┤Вйў Рђћ ВЮ┤вфеВДђ ­Ъјњ вїђВІа canvas stroke вАю вІеВЃЅ ьЮ░ВЃЅ ваївЇћ.
//   (cx, cy) ВЋёВЮ┤Вйў ВцЉВІг, r в░ўВДђвдё(вїђвъх).
function drawInlineBagIcon(cx, cy, r) {
  ctx.save();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // Ж░ђв░Е в│ИВ▓┤ (вЉЦЖи╝ ВѓгЖ░Ђ) Рђћ ВЋёвъў Вѓ┤ВДЮ вёЊЖ▓ї, Вюёвіћ ВбЂЖ▓ї (ВѓгвІцвдгЖ╝┤ віљвѓї)
  const w = r * 1.7, h = r * 1.9;
  const x = cx - w/2, y = cy - h*0.35;
  ctx.beginPath();
  // ВЃЂвІе ВбїВџ░ вфеВёювдгвіћ ВЋйЖ░ё вЉЦЖИђЖ▓ї, ьЋўвІеВЮђ вЇћ вЉЦЖИђЖ▓ї
  const rT = r * 0.25, rB = r * 0.4;
  ctx.moveTo(x + rT, y);
  ctx.lineTo(x + w - rT, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rT);
  ctx.lineTo(x + w, y + h - rB);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rB, y + h);
  ctx.lineTo(x + rB, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rB);
  ctx.lineTo(x, y + rT);
  ctx.quadraticCurveTo(x, y, x + rT, y);
  ctx.stroke();
  // ВєљВъАВЮ┤ (ВюёВфй ВъЉВЮђ ВЋёВ╣ў)
  ctx.beginPath();
  ctx.arc(cx, y, r * 0.5, Math.PI * 1.05, Math.PI * 1.95, false);
  ctx.stroke();
  // Ж░ђв░Е ВЋъвЕ┤ ВъЉВЮђ ВБ╝веИвІѕ (Ж░ђвАю Вёа)
  ctx.beginPath();
  ctx.moveTo(x + w*0.22, y + h*0.55);
  ctx.lineTo(x + w*0.78, y + h*0.55);
  ctx.stroke();
  ctx.restore();
}

// Віцьѓе ьћёвдгви░ Рђћ atlas вѓ┤ cleaned ВЁђ ВѓгВџЕ (в░░Ж▓й ьѕгвфЁ, ЖйЃ ВцЉВЋЎ ВаЋваг).
//   в░ўьЎў: { path, src:[sx,sy,sw,sh] } вўљвіћ null.
function _getSkinPreview(id) {
  const s = SKINS[id];
  if (!s) return null;
  if (id === 'neon') return { path: 'skins/neon/note/neon_note.png', src: [2800, 0, 400, 400] };
  // в▓џЖйЃ ьъѕьіИ ВЮ┤ьјЎьіИ Рђћ ВЃЂВаљ ВЋёВЮ┤Вйў(petal_01) Ж│╝ вЈЎВЮ╝ьЋўЖ▓ї ьЉюВІю
  if (id === 'sakura_fx') return { path: 'skins/neon/hit_effect/petal_01.png', src: null };
  // ЖИ░в│И: atlas В▓Ф ВЁђ
  const p = s.imagePaths?.note;
  if (p) return { path: p, src: [0, 0, 400, 400] };
  return null;
}
function _getSkinDisplayName(id) {
  const s = SKINS[id]; return s ? (s.name || id) : id;
}

function renderInventory() {
  const _totalH = H + safeTop + safeBottom;
  const bg = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  bg.addColorStop(0, '#1a0d2e'); bg.addColorStop(0.4, '#120820'); bg.addColorStop(1, '#08040f');
  ctx.fillStyle = bg; ctx.fillRect(0, -safeTop, W, _totalH);
  const glow = ctx.createRadialGradient(W*0.5, sz(60), 0, W*0.5, sz(60), W*0.7);
  glow.addColorStop(0, 'rgba(180,100,255,0.10)'); glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0, -safeTop, W, _totalH);

  // ьЌцвЇћ
  const _mob = isMobile;
  const headerTop = _mob ? -safeTop : 0;
  const headerH = _mob ? (sz(44) + safeTop) : sz(56);
  const hg = ctx.createLinearGradient(0, headerTop, W, headerTop + headerH);

  hg.addColorStop(0.5, 'rgba(180,100,255,0.18)');
  hg.addColorStop(1, 'rgba(122,77,255,0.25)');
  ctx.fillStyle = hg; ctx.fillRect(0, headerTop, W, headerH);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, headerTop, W, headerH);
  // ьЃђВЮ┤ьІђ Рђћ Ж░ђв░Е ВЋёВЮ┤Вйў(canvas) + ьЁЇВіцьіИ. ВЮ┤вфеВДђ вїђВІа ьќёв▓ёЖ▒░ вЕћвЅ┤ВЎђ вЈЎВЮ╝ monochrome ВЋёВЮ┤Вйў.
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.font = `bold ${_mob ? sz(18) : sz(22)}px sans-serif`; ctx.fillStyle = '#fff';
  const _titleTxt = 'вѓўВЮў Ж░ђв░Е';
  const _titleTw = ctx.measureText(_titleTxt).width;
  const _iconR = _mob ? sz(9) : sz(11);
  const _gap = sz(10);
  const _totalW = _iconR * 2 + _gap + _titleTw;
  const _iconX = W/2 - _totalW/2 + _iconR;
  const _textX = _iconX + _iconR + _gap;
  const _titleY = headerTop + headerH/2;
  drawInlineBagIcon(_iconX, _titleY, _iconR);
  ctx.shadowColor = 'rgba(180,100,255,0.6)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff';
  ctx.fillText(_titleTxt, _textX, _titleY);
  ctx.shadowBlur = 0;

  // ьЃГ в░ћ Рђћ 9 В╣┤ьЁїЖ│авдг ВѕўьЈЅ (Ж░ђвАю ВіцьЂгвАц ьЋёВџћ ВЌєЖ▓ї ВДДВЮђ вЮ╝в▓е)
  _invBtnAreas.length = 0;
  const tabY = headerTop + headerH + sz(8);
  const tabH = sz(28);
  const tabPad = sz(8);
  ctx.font = `bold ${sz(11)}px sans-serif`;
  const tabW = (W - sz(16)) / SKIN_CATEGORIES.length;
  for (let i = 0; i < SKIN_CATEGORIES.length; i++) {
    const cat = SKIN_CATEGORIES[i];
    const tx = sz(8) + i * tabW;
    const active = cat === inventoryTab;
    ctx.fillStyle = active ? 'rgba(180,100,255,0.35)' : 'rgba(255,255,255,0.05)';
    rrFill(tx + sz(2), tabY, tabW - sz(4), tabH, sz(6));
    ctx.strokeStyle = active ? 'rgba(200,150,255,0.9)' : 'rgba(255,255,255,0.15)';

    rrStroke(tx + sz(2), tabY, tabW - sz(4), tabH, sz(6));

    _invBtnAreas.push({ type:'tab', cat, x: tx + sz(2), y: tabY, w: tabW - sz(4), h: tabH });

  // В╗еьЁљВИа ВўЂВЌГ (ьЃГ ВЋёвъў ~ вњцвАюЖ░ђЖИ░ Вюё)
  const contentTop = tabY + tabH + sz(12);
  const contentBottom = _mob ? (H + safeBottom - sz(48)) : (H - 56);
  ctx.save();
  ctx.beginPath(); ctx.rect(0, contentTop, W, contentBottom - contentTop); ctx.clip();

  const owned = getOwnedSkins(inventoryTab);
  if (owned.length === 0) {
    // в╣ѕ ВЃЂьЃю Рђћ ьџїВЃЅ ВЋѕвѓ┤
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `${sz(13)}px sans-serif`;
    ctx.fillText('в│┤ВюаьЋю ' + SKIN_CATEGORY_LABELS[inventoryTab] + ' ВіцьѓеВЮ┤ ВЌєВіхвІѕвІц', W/2, contentTop + sz(60));
