// мғҒм җ м•„мқҙмҪҳ мә”лІ„мҠӨ л ҢлҚ”л§Ғ
function drawShopItemIcon(item, cx, cy, r) {
  ctx.save();
  // iconImage к°Җ мһҲмңјл©ҙ к·ё мқҙлҜём§ҖлҘј мӣҗнҳ• clip н•ҙм„ң л ҢлҚ” (loadSkinImage мһ¬нҷңмҡ©)
  //   iconSrc: [sx,sy,sw,sh] мһҲмңјл©ҙ atlas л¶Җл¶„ м»· вҶ’ cleaned/centered мҠӨн”„лқјмқҙнҠё мӮ¬мҡ© к°ҖлҠҘ.
  if (item.iconImage) {
    const img = loadSkinImage(item.iconImage);
    if (img && img.complete && img.naturalWidth) {
      const dSize = r * 1.7;
      if (item.iconSrc) {
        const [sx, sy, sw, sh] = item.iconSrc;
        ctx.drawImage(img, sx, sy, sw, sh, cx - dSize/2, cy - dSize/2, dSize, dSize);
      } else {
        ctx.drawImage(img, cx - dSize/2, cy - dSize/2, dSize, dSize);
      }
      ctx.restore();
      return;
    }
    ctx.font = `${Math.round(r*1.1)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(item.icon || 'вҳ…', cx, cy);
    ctx.restore();
    return;
  }
  if (item.id === 'pass28') {
    // н—Өл“ңнҸ° (28мқј нҢЁмҠӨ) вҖ” нқ°мғү/мӢӨлІ„, нӮӨ нҒ° л°ҙл“ң
    const cupW = r * 0.34, cupH = r * 0.55;
    const cupGap = r * 1.05;
    const cupY = cy + r * 0.32;
    const bandRX = cupGap / 2;
    const bandHeight = r * 0.78;
    const bandThick = r * 0.16;
    // н—Өл“ңл°ҙл“ң вҖ” мӮ¬лӢӨлҰ¬кјҙ+нғҖмӣҗ мӨ‘к°„ (м „мІҙлҘј лӢЁмқј лІ м§Җм–ҙлЎң л¶Җл“ңлҹҪкІҢ)
    const topInset = bandRX * 0.22;
    const topArch = r * 0.18;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = '#e8eef8';
    ctx.lineWidth = bandThick;
    ctx.beginPath();
    // мўҢмёЎ мӢңмһ‘
    ctx.moveTo(cx - bandRX, cupY);
    // мўҢвҶ’мғҒ л¶Җл“ңлҹ¬мҡҙ лІ м§Җм–ҙ (мӮ¬мқҙл“ңм—җм„ң мң—л©ҙмңјлЎң мһҗм—°мҠӨлҹҪкІҢ нқҗлҰ„)
    ctx.bezierCurveTo(
      cx - bandRX, cupY - bandHeight * 0.85,
      cx - bandRX + topInset, cupY - bandHeight - topArch * 0.6,
      cx, cupY - bandHeight - topArch
    );
    // мң—л©ҙ м •м җм—җм„ң мҡ°мёЎмңјлЎң лҢҖм№ӯ нқҗлҰ„
    ctx.bezierCurveTo(
      cx + bandRX - topInset, cupY - bandHeight - topArch * 0.6,
      cx + bandRX, cupY - bandHeight * 0.85,
      cx + bandRX, cupY
    );
    ctx.stroke();
    ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
    // мўҢмёЎ мқҙм–ҙм»ө
    const lx = cx - bandRX - cupW/2;
    ctx.fillStyle = '#c8d0e0';
    rrFill(lx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    ctx.strokeStyle = '#f0f4fa'; ctx.lineWidth = 1.2;
    rrStroke(lx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    // мҡ°мёЎ мқҙм–ҙм»ө
    const rx = cx + bandRX - cupW/2;
    ctx.fillStyle = '#c8d0e0';
    rrFill(rx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    ctx.strokeStyle = '#f0f4fa'; ctx.lineWidth = 1.2;
    rrStroke(rx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
  } else if (item.type === 'coins') {
    // лҸҷм „ (мқҢн‘ң 100к°ң) вҖ” нҸүл©ҙ м •л©ҙ, мӨ‘м•ҷ м •л ¬, лӢЁмҲң мӣҗ + вҷӘ
    const coinR = r * 0.7;
    // мҷёкіҪ л§Ғ
    ctx.fillStyle = '#daa520';
    ctx.beginPath(); ctx.arc(cx, cy, coinR, 0, Math.PI*2); ctx.fill();
    // м•ҲмӘҪ л©ҙ
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(cx, cy, coinR * 0.85, 0, Math.PI*2); ctx.fill();
    // мҷёкіҪм„ 
    ctx.strokeStyle = '#fff8c0'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(cx, cy, coinR, 0, Math.PI*2); ctx.stroke();
    // мқҢн‘ң вҷӘ
    ctx.fillStyle = '#8a5d10';
    ctx.font = `bold ${Math.round(coinR * 1.3)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('вҷӘ', cx, cy + 1);
  } else {
    // нҸҙл°ұ: кё°ліё мқҙлӘЁм§Җ
    ctx.font = `${Math.round(r*1.2)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(item.icon || 'вҳ…', cx, cy);
  }
  ctx.restore();
}

function renderShop() {
  // ===== л°°кІҪ (м•Ҳм „мҳҒм—ӯк№Ңм§Җ нҷ•мһҘ) =====
  const _totalH = H + safeTop + safeBottom;
  const bg = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  bg.addColorStop(0, '#1a0d2e'); bg.addColorStop(0.4, '#120820'); bg.addColorStop(1, '#08040f');
  ctx.fillStyle = bg; ctx.fillRect(0, -safeTop, W, _totalH);
  // ліҙлқј/кёҲмғү кёҖлЎңмҡ°
  const glow1 = ctx.createRadialGradient(W*0.2, sz(80), 0, W*0.2, sz(80), W*0.7);
  glow1.addColorStop(0, 'rgba(180,100,255,0.10)'); glow1.addColorStop(1, 'transparent');
  ctx.fillStyle = glow1; ctx.fillRect(0, -safeTop, W, _totalH);
  const glow2 = ctx.createRadialGradient(W*0.85, sz(40), 0, W*0.85, sz(40), W*0.6);
  glow2.addColorStop(0, 'rgba(255,200,80,0.08)'); glow2.addColorStop(1, 'transparent');
  ctx.fillStyle = glow2; ctx.fillRect(0, -safeTop, W, _totalH);

  // ===== н—ӨлҚ” (лӘЁл°”мқјмқҖ нҷ”л©ҙ мөңмғҒлӢЁ вҖ” safeTop мҳҒм—ӯк№Ңм§Җ м»ӨлІ„) =====
  const _shopMobileC = isMobile;
  // лӘЁл°”мқј: н—ӨлҚ”к°Җ safeTopк№Ңм§Җ нҷ•мһҘлҗҳм–ҙ нғҖмқҙнӢҖмқҙ нҷ”л©ҙ мөңмғҒлӢЁм—җ мң„м№ҳ
  const headerTop = _shopMobileC ? -safeTop : 0;
  const headerH = _shopMobileC ? (sz(44) + safeTop) : sz(56);
  const headerGrad = ctx.createLinearGradient(0, headerTop, W, headerTop + headerH);
  headerGrad.addColorStop(0, 'rgba(122,77,255,0.25)');
  headerGrad.addColorStop(0.5, 'rgba(255,200,80,0.18)');
  headerGrad.addColorStop(1, 'rgba(122,77,255,0.25)');
  ctx.fillStyle = headerGrad; ctx.fillRect(0, headerTop, W, headerH);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, headerTop, W, headerH);
  // н—ӨлҚ” н•ҳлӢЁ к°•мЎ°м„ 
  const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, 'rgba(255,215,0,0)');
  lineGrad.addColorStop(0.5, 'rgba(255,215,0,0.6)');
  lineGrad.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = lineGrad; ctx.fillRect(0, headerTop + headerH - 2, W, 2);

  // нғҖмқҙнӢҖ вҖ” н—ӨлҚ” к°ҖлЎң/м„ёлЎң мӨ‘м•ҷ
  const titleFontSize = _shopMobileC ? sz(18) : sz(22);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${titleFontSize}px sans-serif`; ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,215,0,0.6)'; ctx.shadowBlur = 8;
  const titleY = headerTop + headerH / 2;
  ctx.fillText('рҹӣ’  NANO SHOP', W/2, titleY);
  ctx.shadowBlur = 0;

  // ===== мғҒн’Ҳ лӘ©лЎқ =====
  // мҠӨнҒ¬лЎӨ мғҒн•ң нҒҙлһЁн”„ (мқҙм „ н”„л Ҳмһ„м—җ м ҖмһҘн•ң мҪҳн…җмё  лҶ’мқҙ кё°мӨҖ)
  if (window._shopMaxScroll != null) {
    if (shopScroll > window._shopMaxScroll) shopScroll = window._shopMaxScroll;
    if (shopScroll < 0) shopScroll = 0;
  }
  // мҪҳн…җмё  мҳҒм—ӯ м •мқҳ (н—ӨлҚ” м•„лһҳ ~ л’ӨлЎңк°Җкё° лІ„нҠј мң„)
  const _contentTop = headerTop + headerH;
  const _contentBottom = isMobile ? (H + safeBottom - sz(48)) : (H - 56);
  // мҪҳн…җмё  мҳҒм—ӯм—җ нҒҙлҰҪ вҖ” м№ҙл“ңк°Җ н—ӨлҚ”/л°”н…Җ мҳҒм—ӯ м№ЁлІ” л°©м§Җ
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, _contentTop, W, _contentBottom - _contentTop);
  ctx.clip();
  const cw = Math.min(sz(360), W * 0.92), cx = (W - cw) / 2;
  let y = _contentTop + sz(14) - shopScroll;
  const items = getShopItems();
  let lastSection = '';
  shopCancelArea = null;
  _shopSkinCancelAreas.length = 0;

  for (let ii = 0; ii < items.length; ii++) {
    const item = items[ii];
    // м„№м…ҳ н—ӨлҚ” (н•„ нҳ•нғң)
    if (item.section && item.section !== lastSection) {
      lastSection = item.section;
      // нҸ°нҠёлҘј лЁјм Җ м„Өм •н•ң л’Ө measureText нҳём¶ң (лІ„к·ё мҲҳм •)
      ctx.font = `bold ${sz(10)}px sans-serif`;
      const secW = ctx.measureText(item.section).width + sz(28);
      const secH = sz(20), secX = cx, secY = y - sz(2);
      ctx.fillStyle = item.color + '22'; rrFill(secX, secY, secW, secH, sz(10));
      ctx.strokeStyle = item.color + '66'; ctx.lineWidth = 1; rrStroke(secX, secY, secW, secH, sz(10));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = item.color;
      ctx.fillText(item.section, secX + secW/2, secY + secH/2);
      y += sz(24);
    }
    const ih = sz(100);
    const status = item.getStatus ? item.getStatus() : null;
    const buyable = item.canBuy ? item.canBuy() : true;

    // м№ҙл“ң (мқҖмқҖн•ң лӢӨнҒ¬ л°°кІҪ + мҳ…мқҖ м»¬лҹ¬ м•Ўм„јнҠё)
    ctx.fillStyle = 'rgba(18,12,32,0.92)'; rrFill(cx, y, cw, ih, sz(14));
    const cardGrad = ctx.createLinearGradient(cx, y, cx + cw, y + ih);
    cardGrad.addColorStop(0, item.color + '0c'); cardGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cardGrad; rrFill(cx, y, cw, ih, sz(14));
    // мҷёкіҪ ліҙлҚ” (мқҖмқҖн•ҳкІҢ)
    ctx.strokeStyle = item.color + '44'; ctx.lineWidth = 1; rrStroke(cx, y, cw, ih, sz(14));
    // мўҢмёЎ м•Ўм„јнҠё л°”
    ctx.fillStyle = item.color; rrFill(cx, y + sz(8), sz(4), ih - sz(16), sz(2));

    // м•„мқҙмҪҳ вҖ” skin нғҖмһ…мқҖ нҲ¬лӘ… л°°кІҪ(halo/н…Ңл‘җлҰ¬ м—ҶмқҢ), лӮҳлЁём§ҖлҠ” кё°мЎҙ кёҖлЎңмҡ° мӣҗ
    const iconCx = cx + sz(38), iconCy = y + ih/2;
    const iconR = sz(28);
    if (item.type !== 'skin') {
      const iconGrad = ctx.createRadialGradient(iconCx, iconCy, 0, iconCx, iconCy, iconR);
      iconGrad.addColorStop(0, item.color + '55'); iconGrad.addColorStop(1, item.color + '08');
      ctx.fillStyle = iconGrad;
      ctx.beginPath(); ctx.arc(iconCx, iconCy, iconR, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = item.color + '88'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(iconCx, iconCy, iconR, 0, Math.PI*2); ctx.stroke();
    }
    drawShopItemIcon(item, iconCx, iconCy, iconR);

    // к°ҖкІ© лІ„нҠј (мҡ°мёЎ м •л ¬) вҖ” лЁјм Җ мўҢн‘ң кі„мӮ°н•ҙм„ң н…ҚмҠӨнҠё нҸӯ м ңн•ңм—җ мӮ¬мҡ©
    const pbw = sz(96), pbh = sz(34);
    const pbx = cx + cw - pbw - sz(12), pby = y + (ih - pbh) / 2;
    // н…ҚмҠӨнҠё мҳҒм—ӯ: м•„мқҙмҪҳ мҡ°мёЎ~лІ„нҠј мўҢмёЎ мӮ¬мқҙ
    const textX = cx + sz(74);
    const textMaxW = pbx - sz(8) - textX;
    // мғҒн’ҲлӘ… + м„ӨлӘ… вҖ” м№ҙл“ң м„ёлЎң мӨ‘м•ҷ(м•„мқҙмҪҳ мӨ‘мӢ¬)м—җ л§һм¶° м •л ¬
    const cardCenterY = y + ih/2;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${sz(15)}px sans-serif`; ctx.fillStyle = '#fff';
    ctx.fillText(item.label, textX, cardCenterY - sz(10), textMaxW);
    ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(item.desc, textX, cardCenterY + sz(10), textMaxW);

    if (buyable) {
      ctx.shadowColor = item.color; ctx.shadowBlur = 8;
      const btnG = ctx.createLinearGradient(pbx, pby, pbx, pby + pbh);
      btnG.addColorStop(0, item.color); btnG.addColorStop(1, item.color + 'aa');
      ctx.fillStyle = btnG; rrFill(pbx, pby, pbw, pbh, sz(8));
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; rrStroke(pbx, pby, pbw, pbh, sz(8));
      // вҷӘ к°ҷмқҖ л№„лҢҖм№ӯ кёҖлҰ¬н”„ нҸ¬н•ЁлҸјлҸ„ мӢңк°Ғ мӨ‘м•ҷ м •л ¬ вҖ” measureText лЎң tw кө¬н•ҙ left кё°мӨҖ мҲҳлҸҷ л°°м№ҳ.
      ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillStyle = '#1a0d2e';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      const _priceTw = ctx.measureText(item.price).width;
      ctx.fillText(item.price, pbx + (pbw - _priceTw) / 2, pby + pbh/2);
    } else if (status) {
      ctx.fillStyle = status.color + '20'; rrFill(pbx, pby, pbw, pbh, sz(8));
      ctx.strokeStyle = status.color + '88'; ctx.lineWidth = 1.5; rrStroke(pbx, pby, pbw, pbh, sz(8));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(11)}px sans-serif`; ctx.fillStyle = status.color;
      ctx.fillText(status.text, pbx + pbw/2, pby + pbh/2);
    }

    // localhost м·ЁмҶҢ (кө¬лҸ… мғҒн’Ҳ + нҷңм„ұ мӢң)
    if (isTestEnv && item.type === 'pass' && status) {
      const cbx = pbx + (pbw - sz(50)) / 2, cby = pby + pbh + sz(4);
      ctx.fillStyle = 'rgba(255,60,60,0.18)'; rrFill(cbx, cby, sz(50), sz(18), sz(5));
      ctx.strokeStyle = 'rgba(255,80,80,0.6)'; ctx.lineWidth = 1; rrStroke(cbx, cby, sz(50), sz(18), sz(5));
      ctx.font = `bold ${sz(9)}px sans-serif`; ctx.fillStyle = '#ff6666';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('кө¬лҸ… м·ЁмҶҢ', cbx + sz(25), cby + sz(9));
      shopCancelArea = { x: cbx, y: cby, w: sz(50), h: sz(18) };
    }
    // localhost м·ЁмҶҢ (мҠӨнӮЁ + ліҙмң мӨ‘)
    if (isTestEnv && item.type === 'skin' && status && item.skinCategory && item.skinId) {
      const cbx = pbx + (pbw - sz(60)) / 2, cby = pby + pbh + sz(4);
      ctx.fillStyle = 'rgba(255,60,60,0.18)'; rrFill(cbx, cby, sz(60), sz(18), sz(5));
      ctx.strokeStyle = 'rgba(255,80,80,0.6)'; ctx.lineWidth = 1; rrStroke(cbx, cby, sz(60), sz(18), sz(5));
      ctx.font = `bold ${sz(9)}px sans-serif`; ctx.fillStyle = '#ff6666';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('ліҙмң  м·ЁмҶҢ', cbx + sz(30), cby + sz(9));
      _shopSkinCancelAreas.push({
        cat: item.skinCategory, id: item.skinId, label: item.label,
        refund: item.coinCost || 0,
        x: cbx, y: cby, w: sz(60), h: sz(18),
      });
    }
    y += ih + sz(14);
  }

  // ===== н•ҳлӢЁ м•ҲлӮҙ =====
  y += sz(20);
  // лі„ лқјмқё
  ctx.fillStyle = 'rgba(255,215,0,0.3)'; ctx.font = `${sz(10)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('вңҰ  вңҰ  вңҰ', W/2, y);
  ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText('мғҲлЎңмҡҙ мғҒн’Ҳмқҙ кі§ м¶”к°Җлҗ©лӢҲлӢӨ', W/2, y + sz(20));

  // нҒҙлҰҪ н•ҙм ң
  ctx.restore();

  // лӢӨмқҢ н”„л Ҳмһ„ мҠӨнҒ¬лЎӨ мғҒн•ң кі„мӮ°
  const contentBottomAbs = y + shopScroll + sz(40);
  window._shopMaxScroll = Math.max(0, contentBottomAbs - _contentBottom);

  // л’ӨлЎңк°Җкё° лІ„нҠј (лһӯнӮ№/м—…м Ғкіј лҸҷмқј мҠӨнғҖмқј)
  const _mpBack = isMobile;
  const _mpLand = isMobile && !isPortrait && !isTablet && H < 500;
  const bbW = _mpBack ? (_mpLand ? sz(46) : sz(36)) : 70;
  const bbH = _mpBack ? (_mpLand ? sz(34) : sz(28)) : 38;
  const bbX = _mpBack ? sz(8) : 12;
  const bbY = _mpBack ? (H + safeBottom - sz(4) - bbH) : (H - bbH - 10);
  window._shopBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; rrStroke(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textBaseline = 'middle';
  if (_mpBack) {
    ctx.font = `bold ${_mpLand ? sz(18) : sz(16)}px sans-serif`;
    ctx.fillText('вҶҗ', bbX + bbW/2, bbY + bbH/2);
  } else {
    ctx.font = `bold ${sz(13)}px sans-serif`;
    ctx.fillText('вҶҗ л’ӨлЎң', bbX + bbW/2, bbY + bbH/2);
  }
  ctx.textBaseline = 'alphabetic';

  // н•ҳлӢЁ л°”
  renderBottomBar();
}

// ===== кіөнҶө н•ҳлӢЁ л°” (мҪ”мқё + н–„лІ„кұ° л©”лүҙ) =====
function renderBottomBar() {
  // н–„лІ„кұ° лІ„нҠј (мҡ°н•ҳлӢЁ) вҖ” лЁјм Җ мўҢн‘ң кі„мӮ°
  const _bbML = isMobile && !isPortrait && !isTablet && H < 500;
  const _bbBottom = H + safeBottom - sz(4);
  const hbW = sz(48);
  const hbH = sz(36);
  const hbX = W - hbW - sz(8), hbY = -safeTop + sz(2);
  // мҪ”мқё (н–„лІ„кұ° лІ„нҠј м„ёлЎң мӨ‘м•ҷкіј м •л ¬)
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${_bbML ? sz(12) : sz(10)}px sans-serif`; ctx.fillStyle = '#ffd700aa';
  ctx.fillText('вҷӘ ' + formatCoins(getCoins()), hbX - sz(6), hbY + hbH/2);
  // н–„лІ„кұ° лІ„нҠј л ҢлҚ”
  ctx.fillStyle = hamburgerOpen ? 'rgba(20,15,40,0.9)' : 'rgba(20,15,40,0.75)';
  rrFill(hbX, hbY, hbW, hbH, sz(7));
  ctx.strokeStyle = hamburgerOpen ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1; rrStroke(hbX, hbY, hbW, hbH, sz(7));
  const barBW = _bbML ? sz(18) : sz(14), barBH = 2, barBX = hbX + (hbW - barBW) / 2;
  const barGapY = _bbML ? sz(6) : sz(5);
  const barStartY = hbY + (hbH - (barGapY * 2 + barBH)) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let bi = 0; bi < 3; bi++) ctx.fillRect(barBX, barStartY + bi * barGapY, barBW, barBH);
  // л©”лүҙ нҺјм№Ё
  if (hamburgerOpen) {
    const menuW = sz(140), menuItemH = sz(36);
    // мғҒм җ нҺҳмқҙм§Җм—җм„  'мғҒм җ' н•ӯлӘ© м ңмҷё
    const _unread = currentUser ? getUnreadMailCount() : 0;
    const _mailLabel = 'мҡ°нҺён•Ё' + (_unread > 0 ? ' (' + _unread + ')' : '');
    const _isShop = state === 'shop', _isInv = state === 'inventory';
    const _bagItem = {label:'к°Җл°©',icon:'рҹҺ’',key:'inventory'};
    const _shopItem = {label:'мғҒм җ',icon:'рҹӣ’',key:'shop'};
    const menuItems = _isShop
      ? [_bagItem, {label:_mailLabel,icon:'вңү',key:'mail'},{label:'м„Өм •',icon:'вҡҷ',key:'settings'}]
      : _isInv
        ? [_shopItem, {label:_mailLabel,icon:'вңү',key:'mail'},{label:'м„Өм •',icon:'вҡҷ',key:'settings'}]
        : [_shopItem, _bagItem, {label:_mailLabel,icon:'вңү',key:'mail'},{label:'м„Өм •',icon:'вҡҷ',key:'settings'}];
    const menuH = menuItems.length * menuItemH;
    const menuX = hbX + hbW - menuW, menuY = hbY + hbH + sz(6);
    ctx.fillStyle = '#1a1a2e'; rrFill(menuX, menuY, menuW, menuH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; rrStroke(menuX, menuY, menuW, menuH, sz(8));
    for (let mi = 0; mi < menuItems.length; mi++) {
      const iy = menuY + mi * menuItemH;
      if (mi > 0) { ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(menuX+sz(8),iy); ctx.lineTo(menuX+menuW-sz(8),iy); ctx.stroke(); }
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      // inventory(к°Җл°©) лҠ” мқҙлӘЁм§Җ лҢҖмӢ  лӢЁмғү нқ°мғү м•„мқҙмҪҳ (лӢӨлҘё н•ӯлӘ©мІҳлҹј monochrome)
      if (menuItems[mi].key === 'inventory') {
        drawInlineBagIcon(menuX + sz(12) + sz(7), iy + menuItemH/2, sz(7));
      } else {
        ctx.font=`${sz(14)}px sans-serif`;
        ctx.fillText(menuItems[mi].icon, menuX+sz(12), iy+menuItemH/2);
      }
      ctx.font=`${sz(13)}px sans-serif`; ctx.fillText(menuItems[mi].label, menuX+sz(34), iy+menuItemH/2);
    }
    hamburgerAreas = { btn:{x:hbX,y:hbY,w:hbW,h:hbH}, menu:{x:menuX,y:menuY,w:menuW,h:menuH,itemH:menuItemH,count:menuItems.length,items:menuItems} };
  } else {
    hamburgerAreas = { btn:{x:hbX,y:hbY,w:hbW,h:hbH}, menu:null };
  }
}

// ===== мқёлІӨнҶ лҰ¬ (к°Җл°©) =====
let inventoryTab = 'note';
let inventoryScroll = 0;
const _invBtnAreas = []; // к°Ғ н”„л Ҳмһ„ лІ„нҠј hit мҳҒм—ӯ

// к°Җл°©(backpack) м•„мқҙмҪҳ вҖ” мқҙлӘЁм§Җ рҹҺ’ лҢҖмӢ  canvas stroke лЎң лӢЁмғү нқ°мғү л ҢлҚ”.
//   (cx, cy) м•„мқҙмҪҳ мӨ‘мӢ¬, r л°ҳм§ҖлҰ„(лҢҖлһө).
function drawInlineBagIcon(cx, cy, r) {
  ctx.save();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // к°Җл°© ліёмІҙ (л‘Ҙк·ј мӮ¬к°Ғ) вҖ” м•„лһҳ мӮҙм§қ л„“кІҢ, мң„лҠ” мўҒкІҢ (мӮ¬лӢӨлҰ¬кјҙ лҠҗлӮҢ)
  const w = r * 1.7, h = r * 1.9;
  const x = cx - w/2, y = cy - h*0.35;
  ctx.beginPath();
  // мғҒлӢЁ мўҢмҡ° лӘЁм„ңлҰ¬лҠ” м•Ҫк°„ л‘ҘкёҖкІҢ, н•ҳлӢЁмқҖ лҚ” л‘ҘкёҖкІҢ
  const rT = r * 0.25, rB = r * 0.4;
  ctx.moveTo(x + rT, y);
  ctx.lineTo(x + w - rT, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rT);
  ctx.lineTo(x + w, y + h - rB);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rB, y + h);
  ctx.lineTo(x + rB, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rB);
  ctx.lineTo(x, y + rT);
  ctx.quadraticCurveTo(x, y, x + rT, y);
  ctx.stroke();
  // мҶҗмһЎмқҙ (мң„мӘҪ мһ‘мқҖ м•„м№ҳ)
  ctx.beginPath();
  ctx.arc(cx, y, r * 0.5, Math.PI * 1.05, Math.PI * 1.95, false);
  ctx.stroke();
  // к°Җл°© м•һл©ҙ мһ‘мқҖ мЈјлЁёлӢҲ (к°ҖлЎң м„ )
  ctx.beginPath();
  ctx.moveTo(x + w*0.22, y + h*0.55);
  ctx.lineTo(x + w*0.78, y + h*0.55);
  ctx.stroke();
  ctx.restore();
}

// мҠӨнӮЁ н”„лҰ¬л·° вҖ” atlas лӮҙ cleaned м…Җ мӮ¬мҡ© (л°°кІҪ нҲ¬лӘ…, кҪғ мӨ‘м•ҷ м •л ¬).
//   л°ҳнҷҳ: { path, src:[sx,sy,sw,sh] } лҳҗлҠ” null.
function _getSkinPreview(id) {
  const s = SKINS[id];
  if (!s) return null;
  if (id === 'neon') return { path: 'skins/neon/note/neon_note.png', src: [2800, 0, 400, 400] };
  // лІҡкҪғ нһҲнҠё мқҙнҺҷнҠё вҖ” мғҒм җ м•„мқҙмҪҳ(petal_01) кіј лҸҷмқјн•ҳкІҢ н‘ңмӢң
  if (id === 'sakura_fx') return { path: 'skins/neon/hit_effect/petal_01.png', src: null };
  // кё°ліё: atlas мІ« м…Җ
  const p = s.imagePaths?.note;
  if (p) return { path: p, src: [0, 0, 400, 400] };
  return null;
}
function _getSkinDisplayName(id) {
  const s = SKINS[id]; return s ? (s.name || id) : id;
}

function renderInventory() {
  const _totalH = H + safeTop + safeBottom;
  const bg = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  bg.addColorStop(0, '#1a0d2e'); bg.addColorStop(0.4, '#120820'); bg.addColorStop(1, '#08040f');
  ctx.fillStyle = bg; ctx.fillRect(0, -safeTop, W, _totalH);
  const glow = ctx.createRadialGradient(W*0.5, sz(60), 0, W*0.5, sz(60), W*0.7);
  glow.addColorStop(0, 'rgba(180,100,255,0.10)'); glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0, -safeTop, W, _totalH);

  // н—ӨлҚ”
  const _mob = isMobile;
  const headerTop = _mob ? -safeTop : 0;
  const headerH = _mob ? (sz(44) + safeTop) : sz(56);
  const hg = ctx.createLinearGradient(0, headerTop, W, headerTop + headerH);
  hg.addColorStop(0, 'rgba(122,77,255,0.25)');
  hg.addColorStop(0.5, 'rgba(180,100,255,0.18)');
  hg.addColorStop(1, 'rgba(122,77,255,0.25)');
  ctx.fillStyle = hg; ctx.fillRect(0, headerTop, W, headerH);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, headerTop, W, headerH);
  // нғҖмқҙнӢҖ вҖ” к°Җл°© м•„мқҙмҪҳ(canvas) + н…ҚмҠӨнҠё. мқҙлӘЁм§Җ лҢҖмӢ  н–„лІ„кұ° л©”лүҙмҷҖ лҸҷмқј monochrome м•„мқҙмҪҳ.
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.font = `bold ${_mob ? sz(18) : sz(22)}px sans-serif`; ctx.fillStyle = '#fff';
  const _titleTxt = 'лӮҳмқҳ к°Җл°©';
  const _titleTw = ctx.measureText(_titleTxt).width;
  const _iconR = _mob ? sz(9) : sz(11);
  const _gap = sz(10);
  const _totalW = _iconR * 2 + _gap + _titleTw;
  const _iconX = W/2 - _totalW/2 + _iconR;
  const _textX = _iconX + _iconR + _gap;
  const _titleY = headerTop + headerH/2;
  drawInlineBagIcon(_iconX, _titleY, _iconR);
  ctx.shadowColor = 'rgba(180,100,255,0.6)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff';
  ctx.fillText(_titleTxt, _textX, _titleY);
  ctx.shadowBlur = 0;

  // нғӯ л°” вҖ” 9 м№ҙн…Ңкі лҰ¬ мҲҳнҸү (к°ҖлЎң мҠӨнҒ¬лЎӨ н•„мҡ” м—ҶкІҢ м§§мқҖ лқјлІЁ)
  _invBtnAreas.length = 0;
  const tabY = headerTop + headerH + sz(8);
  const tabH = sz(28);
  const tabPad = sz(8);
  ctx.font = `bold ${sz(11)}px sans-serif`;
  const tabW = (W - sz(16)) / SKIN_CATEGORIES.length;
  for (let i = 0; i < SKIN_CATEGORIES.length; i++) {
    const cat = SKIN_CATEGORIES[i];
    const tx = sz(8) + i * tabW;
    const active = cat === inventoryTab;
    ctx.fillStyle = active ? 'rgba(180,100,255,0.35)' : 'rgba(255,255,255,0.05)';
    rrFill(tx + sz(2), tabY, tabW - sz(4), tabH, sz(6));
    ctx.strokeStyle = active ? 'rgba(200,150,255,0.9)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = active ? 1.5 : 1;
    rrStroke(tx + sz(2), tabY, tabW - sz(4), tabH, sz(6));
    ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.55)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(SKIN_CATEGORY_LABELS[cat], tx + tabW/2, tabY + tabH/2);
    _invBtnAreas.push({ type:'tab', cat, x: tx + sz(2), y: tabY, w: tabW - sz(4), h: tabH });
  }

  // м»Ён…җмё  мҳҒм—ӯ (нғӯ м•„лһҳ ~ л’ӨлЎңк°Җкё° мң„)
  const contentTop = tabY + tabH + sz(12);
  const contentBottom = _mob ? (H + safeBottom - sz(48)) : (H - 56);
  ctx.save();
  ctx.beginPath(); ctx.rect(0, contentTop, W, contentBottom - contentTop); ctx.clip();

  const owned = getOwnedSkins(inventoryTab);
  if (owned.length === 0) {
    // л№Ҳ мғҒнғң вҖ” нҡҢмғү м•ҲлӮҙ
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `${sz(13)}px sans-serif`;
    ctx.fillText('ліҙмң н•ң ' + SKIN_CATEGORY_LABELS[inventoryTab] + ' мҠӨнӮЁмқҙ м—ҶмҠөлӢҲлӢӨ', W/2, contentTop + sz(60));
    ctx.font = `${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('мғҒм җм—җм„ң кө¬л§Өн•ҙліҙм„ёмҡ”', W/2, contentTop + sz(82));
  } else {
    // к·ёлҰ¬л“ң вҖ” м№ҙл“ң нҳ•нғң
    const cardW = Math.min(sz(360), W * 0.92), cardX = (W - cardW) / 2;
    let yCur = contentTop + sz(8) - inventoryScroll;
    const cardH = sz(96);
    const equippedId = getEquippedSkin(inventoryTab);
    // мҶҢмң  мҠӨнӮЁ м№ҙл“ңл“Ө (н•ҙм ң = мһҗлҸҷмңјлЎң кё°ліё мҠӨнӮЁ)
    for (const skinId of owned) {
      const s = SKINS[skinId];
      const col = (s && s.palette && s.palette[0]) || '#9f7fff';
      const equipped = equippedId === skinId;
      ctx.fillStyle = 'rgba(18,12,32,0.92)'; rrFill(cardX, yCur, cardW, cardH, sz(14));
      const cg = ctx.createLinearGradient(cardX, yCur, cardX + cardW, yCur + cardH);
      cg.addColorStop(0, col + '18'); cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg; rrFill(cardX, yCur, cardW, cardH, sz(14));
      ctx.strokeStyle = equipped ? (col + 'cc') : (col + '44');
      ctx.lineWidth = equipped ? 1.8 : 1;
      rrStroke(cardX, yCur, cardW, cardH, sz(14));
      // мўҢмёЎ м•Ўм„јнҠё
      ctx.fillStyle = col; rrFill(cardX, yCur + sz(8), sz(4), cardH - sz(16), sz(2));
      // м•„мқҙмҪҳ вҖ” мҠӨнӮЁ н”„лҰ¬л·° мқҙлҜём§Җ (нҲ¬лӘ… л°°кІҪ, halo м—ҶмқҢ)
      const iconCx = cardX + sz(38), iconCy = yCur + cardH/2, iconR = sz(28);
      const preview = _getSkinPreview(skinId);
      const img = preview ? loadSkinImage(preview.path) : null;
      if (img && img.complete && img.naturalWidth) {
        const dSize = iconR * 1.7;
        if (preview.src) {
          const [sx, sy, sw, sh] = preview.src;
          ctx.drawImage(img, sx, sy, sw, sh, iconCx - dSize/2, iconCy - dSize/2, dSize, dSize);
        } else {
          ctx.drawImage(img, iconCx - dSize/2, iconCy - dSize/2, dSize, dSize);
        }
      } else {
        ctx.fillStyle = '#fff'; ctx.font = `${sz(18)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('вҳ…', iconCx, iconCy);
      }
      // лқјлІЁ
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(14)}px sans-serif`; ctx.fillStyle = '#fff';
      ctx.fillText(_getSkinDisplayName(skinId), cardX + sz(74), yCur + cardH/2 - sz(10));
      ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillText(SKIN_CATEGORY_LABELS[inventoryTab] + ' мҠӨнӮЁ', cardX + sz(74), yCur + cardH/2 + sz(10));
      // лІ„нҠј (мһҘм°© or н•ҙм ң)
      const bbw = sz(76), bbh = sz(32);
      const bbx = cardX + cardW - bbw - sz(12), bby = yCur + (cardH - bbh)/2;
      if (equipped) {
        ctx.fillStyle = col + '22'; rrFill(bbx, bby, bbw, bbh, sz(8));
        ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 1; rrStroke(bbx, bby, bbw, bbh, sz(8));
        ctx.fillStyle = col;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `bold ${sz(12)}px sans-serif`;
        ctx.fillText('н•ҙм ң', bbx + bbw/2, bby + bbh/2);
        _invBtnAreas.push({ type:'unequip', cat: inventoryTab, x:bbx, y:bby, w:bbw, h:bbh });
      } else {
        const btnG = ctx.createLinearGradient(bbx, bby, bbx, bby + bbh);
        btnG.addColorStop(0, col); btnG.addColorStop(1, col + 'aa');
        ctx.fillStyle = btnG; rrFill(bbx, bby, bbw, bbh, sz(8));
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; rrStroke(bbx, bby, bbw, bbh, sz(8));
        ctx.fillStyle = '#1a0d2e';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `bold ${sz(12)}px sans-serif`;
        ctx.fillText('мһҘм°©', bbx + bbw/2, bby + bbh/2);
        _invBtnAreas.push({ type:'equip', cat: inventoryTab, id: skinId, x:bbx, y:bby, w:bbw, h:bbh });
      }
      yCur += cardH + sz(10);
    }
    // мҠӨнҒ¬лЎӨ мөңлҢҖк°’ м ҖмһҘ
    const bottomAbs = yCur + inventoryScroll + sz(40);
    window._inventoryMaxScroll = Math.max(0, bottomAbs - contentBottom);
  }
  ctx.restore();

  // л’ӨлЎңк°Җкё° (shop кіј лҸҷмқј мҠӨнғҖмқј)
  const _mpBack = isMobile;
  const _mpLand = isMobile && !isPortrait && !isTablet && H < 500;
  const bbW = _mpBack ? (_mpLand ? sz(46) : sz(36)) : 70;
  const bbH = _mpBack ? (_mpLand ? sz(34) : sz(28)) : 38;
  const bbX = _mpBack ? sz(8) : 12;
  const bbY = _mpBack ? (H + safeBottom - sz(4) - bbH) : (H - bbH - 10);
  window._inventoryBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; rrStroke(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textBaseline = 'middle';
  if (_mpBack) { ctx.font = `bold ${_mpLand ? sz(18) : sz(16)}px sans-serif`; ctx.fillText('вҶҗ', bbX + bbW/2, bbY + bbH/2); }
  else { ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillText('вҶҗ л’ӨлЎң', bbX + bbW/2, bbY + bbH/2); }
  ctx.textBaseline = 'alphabetic';
  renderBottomBar();
}

function handleInventoryClick(mx, my) {
  if (handleHamburgerClick(mx, my)) return;
  const _ibb = window._inventoryBackBtn;
  if (_ibb && hitTest(mx, my, _ibb.x, _ibb.y, _ibb.w, _ibb.h)) {
    playScrollTick(); stopInventoryBgm(); transitionTo('select'); return;
  }
  for (const b of _invBtnAreas) {
    if (hitTest(mx, my, b.x, b.y, b.w, b.h)) {
      if (b.type === 'tab') { playScrollTick(); inventoryTab = b.cat; inventoryScroll = 0; return; }
      if (b.type === 'equip') {
        playScrollTick();
        setEquippedSkin(b.cat, b.id);
        showLoginToast(_getSkinDisplayName(b.id) + ' мһҘм°© мҷ„лЈҢ', '#44dd66');
        return;
      }
      if (b.type === 'unequip') {
        playScrollTick();
        setEquippedSkin(b.cat, null);
        showLoginToast(SKIN_CATEGORY_LABELS[b.cat] + ' н•ҙм ң (кё°ліё мҠӨнӮЁ)', '#88aaff');
        return;
      }
    }
  }
}

function renderTitle() {
  // мҡ°мЈј м„ұмҡҙ кёҖлЎңмҡ° л°°кІҪ (м•Ҳм „ мҳҒм—ӯ нҸ¬н•Ё)
  const t0 = Date.now();
  const _totalH = H + safeTop + safeBottom;
  const nebulaAlpha = 0.06 + Math.sin(t0 * 0.0005) * 0.02;
  const nebGrad1 = ctx.createRadialGradient(W * 0.3, H * 0.25, 0, W * 0.3, H * 0.25, W * 0.5);
  nebGrad1.addColorStop(0, `rgba(80,40,160,${nebulaAlpha})`);
  nebGrad1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad1; ctx.fillRect(0, -safeTop, W, _totalH);
  const nebGrad2 = ctx.createRadialGradient(W * 0.75, H * 0.65, 0, W * 0.75, H * 0.65, W * 0.4);
  nebGrad2.addColorStop(0, `rgba(30,60,140,${nebulaAlpha * 0.8})`);
  nebGrad2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad2; ctx.fillRect(0, -safeTop, W, _totalH);

  // лі„ (л°ҳм§қмһ„ + мқјл¶Җ м»¬лҹ¬)
  for (const s of stars) {
    const twinkle = 0.3 + Math.sin(t0 * s.twinkleSpeed + s.twinkleOffset) * 0.4;
    ctx.globalAlpha = s.b * Math.max(0.1, twinkle);
    if (s.colored) {
      ctx.fillStyle = `hsl(${s.hue},70%,80%)`;
    } else {
      ctx.fillStyle = '#fff';
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // нҒ° лі„м—җ кёҖлЎңмҡ° (shadowBlur м ңкұ° вҶ’ лӢЁмҲң л°ҳнҲ¬лӘ… мӣҗмңјлЎң лҢҖмІҙ)
    if (s.s > 2.0 && twinkle > 0.55) {
      ctx.globalAlpha = s.b * twinkle * 0.08;
      ctx.fillStyle = s.colored ? `hsl(${s.hue},60%,75%)` : '#aaccff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.s * 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // лі„лҳҘлі„ (к°„н—җм Ғ)
  if (Math.random() < 0.008) spawnShootingStar();
  renderShootingStars();

  // Title particles
  spawnTitleParticles();
  updateTitleParticles();
  for (const p of titleParticles) {
    ctx.globalAlpha = p.life * (p.type === 'spark' ? 0.8 : 0.35);
    if (p.type === 'spark') {
      // shadowBlur м ңкұ° вҖ” Edge м„ұлҠҘ к°ңм„ 
    }
    ctx.fillStyle = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // м „мІҙ к°ҖмӢң мҳҒм—ӯ кё°мӨҖ y н—¬нҚј (м•Ҳм „ мҳҒм—ӯ нҸ¬н•Ё)
  const _visTop = -safeTop;
  const _visH = H + safeTop + safeBottom;
  const _visY = (ratio) => _visTop + _visH * ratio;

  // EQ bars
  const eqCount = 30, eqGap = 4;
  const eqTotalW = W * 0.75;
  const eqBarW = (eqTotalW - (eqCount-1)*eqGap) / eqCount;
  const eqX0 = (W - eqTotalW) / 2;
  const eqCenterY = _visY(0.46);
  for (let i=0;i<eqCount;i++) {
    const bx = eqX0 + i * (eqBarW + eqGap);
    const bh = 20 + Math.sin(Date.now()*0.004+i*0.6)*18 + Math.sin(Date.now()*0.007+i*1.1)*10;
    const alpha = 0.08 + Math.sin(Date.now()*0.003+i*0.4)*0.04;
    ctx.fillStyle = `rgba(130,90,255,${alpha})`;
    ctx.fillRect(bx, eqCenterY-bh/2, eqBarW, bh);
  }

  // Logo вҖ” 2мӨ„ л¶„лҰ¬ + кёҖлЎңмҡ°
  const t = Date.now();
  ctx.save(); ctx.translate(W/2, _visY(0.33));
  const p = 1 + Math.sin(t*0.002)*0.015; ctx.scale(p, p);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // "NANO" вҖ” к°ҖліҚкі  м–ҮмқҖ мҠӨнғҖмқј
  const nanoSize = sz(48);
  ctx.font = `200 ${nanoSize}px sans-serif`;
  ctx.letterSpacing = `${nanoSize * 0.3}px`;
  // кёҖлЎңмҡ° л Ҳмқҙм–ҙ
  ctx.shadowColor = 'rgba(100,180,255,0.4)'; ctx.shadowBlur = 12;
  ctx.fillStyle = 'rgba(180,210,255,0.9)';
  ctx.fillText('N A N O', 0, -nanoSize * 0.55);
  ctx.shadowBlur = 0;

  // кө¬л¶„м„  вҖ” к·ёлқјлҚ°мқҙм…ҳ + нҺ„мҠӨ
  const lineW = sz(280);
  const lineAlpha = 0.4 + Math.sin(t*0.003)*0.15;
  const lineGrad = ctx.createLinearGradient(-lineW/2, 0, lineW/2, 0);
  lineGrad.addColorStop(0, `rgba(100,180,255,0)`);
  lineGrad.addColorStop(0.3, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(0.5, `rgba(200,160,255,${lineAlpha + 0.2})`);
  lineGrad.addColorStop(0.7, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(1, `rgba(100,180,255,0)`);
  ctx.fillStyle = lineGrad;
  ctx.fillRect(-lineW/2, -2, lineW, 3);
  // лқјмқё мң„ мһ‘мқҖ л№ӣ м җ мқҙлҸҷ
  const dotX = (Math.sin(t*0.002) * lineW * 0.4);
  ctx.beginPath(); ctx.arc(dotX, -0.5, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
  ctx.fill(); ctx.shadowBlur = 0;

  // "RHYTHM" вҖ” көөкі  к°•л ¬н•ң мҠӨнғҖмқј
  const rhythmSize = sz(62);
  ctx.font = `900 ${rhythmSize}px sans-serif`;
  // ліҙлқјвҶ’нҢҢлһ‘ к·ёлқјлҚ°мқҙм…ҳ н…ҚмҠӨнҠё
  const txtGrad = ctx.createLinearGradient(-rhythmSize*2, 0, rhythmSize*2, 0);
  txtGrad.addColorStop(0, '#b060ff');
  txtGrad.addColorStop(0.5, '#e0c0ff');
  txtGrad.addColorStop(1, '#60a0ff');
  ctx.fillStyle = txtGrad;
  ctx.shadowColor = 'rgba(160,100,255,0.5)'; ctx.shadowBlur = 15;
  ctx.fillText('RHYTHM', 0, rhythmSize * 0.55);
  ctx.shadowBlur = 0;

  ctx.restore();

  // лІ„м „ н‘ңмӢң (Kplay мәҗмӢң нҷ•мқёмҡ©) вҖ” м„Өм • лІ„нҠјкіј м•Ҳ кІ№м№ҳкІҢ мўҢмёЎ н•ҳлӢЁ
  // вҳ… м—…лҚ°мқҙнҠё к°җм§Җ м§„лӢЁ м •ліҙ нҸ¬н•Ё вҖ” __BUILD_TS лҒқмһҗлҰ¬ 6 + мІҙнҒ¬ мғҒнғң
  //   м •мғҒ: 'v15.8 В· 360000 вң“360000' (м„ңлІ„ TS к°җм§ҖлҗЁ)
  //   м—җлҹ¬: 'v15.8 В· 360000 !HTTP_404' (fetch мӢӨнҢЁ мӣҗмқё)
  //   opacity 0.15 вҶ’ мқјл°ҳ мң м ҖлҠ” version string мңјлЎң мқёмӢқн•ҳкі  нҢЁмҠӨ
  ctx.font = `${sz(9)}px sans-serif`; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  let _vLabel = 'v15.8 В· ' + String(window.__BUILD_TS || 0).slice(-6);
  if (window.__lastUpdateCheckErr) {
    _vLabel += ' !' + String(window.__lastUpdateCheckErr).slice(0, 16);
  } else if (window.__lastUpdateCheck) {
    _vLabel += ' вң“' + String(window.__lastUpdateCheck.srv).slice(-6);
  }
  ctx.fillText(_vLabel, 6, H + safeBottom - 4);

  // ===== н”„лҰ¬лЎңл“ң н”„лЎңк·ёл ҲмҠӨл°” =====
  if (!_preloadDone && _preloadTotal > 0) {
    const pct = _preloadTotal > 0 ? (_preloadLoaded + _preloadFailed) / _preloadTotal : 0;
    const barW = Math.min(sz(260), W * 0.65), barH = sz(8);
    const barX = (W - barW) / 2, barY = _visY(0.62);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rrFill(barX, barY, barW, barH, sz(4));
    ctx.fillStyle = '#9e7aff';
    rrFill(barX, barY, barW * pct, barH, sz(4));
    ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`нҢЁм№ҳ мӨ‘... ${Math.round(pct * 100)}%`, W / 2, barY - sz(8));
    return;
  }

  if (!currentUser) {
    // ===== л№„лЎңк·ёмқё: Kplay лЎңк·ёмқё лІ„нҠј =====
    loginBtnAreas = [];
    const btnW = Math.min(sz(260), W * 0.78), btnH = sz(44);

// лЎңм»¬ лӢүл„Өмһ„ мәҗмӢң (Firebase м ‘к·ј мӢӨнҢЁ мӢң нҸҙл°ұ)
function getLocalNicknames() {
  try { return JSON.parse(safeGetItem('rhythm_nicknames') || '{}'); } catch(e) { return {}; }
}
function saveLocalNickname(name, uid) {
  const cache = getLocalNicknames();
  cache[name] = uid;
  safeSetItem('rhythm_nicknames', JSON.stringify(cache));
}

function cancelNicknameOverlay() {
  nicknameOverlay = false;
  nicknameInput = '';
  nicknameError = '';
  loginInputEl.value = '';
  loginInputEl.blur();
  loginInputEl.style.top = '-200px';
  pendingAuthUid = '';
  pendingAuthMethod = '';
  loginAuthPending = false;
  // authMethodк°Җ л№„м–ҙмһҲмңјл©ҙ лЎңк·ёмқё мғҒнғң м •лҰ¬ (лЎңк·ёмқё м§Ғм „ лӢЁкі„мҳҖлҚҳ кІҪмҡ°)
  if (!currentUser) {
    safeRemoveItem('rhythm_authMethod');
  }
}
let nicknameChecking = false;
function confirmNickname() {
  const name = nicknameInput.trim();
  const err = validateNickname(name);
  if (err) { nicknameError = err; return; }
  if (nicknameChecking) return;

  // лЎңм»¬ мәҗмӢңм—җм„ң мҰүмӢң мӨ‘ліө мІҙнҒ¬
  const localCache = getLocalNicknames();
  if (localCache[name] && localCache[name] !== pendingAuthUid) {
    nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.';
    return;
  }

  nicknameChecking = true;
  nicknameError = '';
  let resolved = false;
  const finish = (dup) => {
    if (resolved) return; resolved = true;
    nicknameChecking = false;
    if (dup) { nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.'; }
    else { saveLocalNickname(name, pendingAuthUid); nicknameError = ''; completeLogin(name, pendingAuthMethod); }
  };
  // 500ms лӮҙ мқ‘лӢө м—Ҷмңјл©ҙ лЎңм»¬ мәҗмӢң кё°мӨҖмңјлЎң нҶөкіј
  setTimeout(() => finish(false), 500);
  try {
    fbDb.ref('nicknames/' + name).once('value', snap => {
      const val = snap.val();
      if (val && val !== pendingAuthUid) finish(true);
      else finish(false);
    });
  } catch(e) { finish(false); }
}

// Select screen layout helper
let selectParticles = [];
function updateSelectParticles() {
  // Spawn
  const spawnCount = selectParticles.length < 50 ? 2 : 0;
  for (let s = 0; s < spawnCount; s++) {
    const sc = songs[selectedSong] ? songs[selectedSong].color : '#fff';
    selectParticles.push({
      x: Math.random() * W, y: H + 5 + Math.random()*20,
      vx: (Math.random()-0.5)*0.5, vy: -(0.3+Math.random()*0.8),
      size: 2.5+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
      color: sc
    });
  }
  for (let i = selectParticles.length-1; i >= 0; i--) {
    const p = selectParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vx += (Math.random()-0.5)*0.03;
    if (p.life <= 0 || p.y < -10) selectParticles.splice(i,1);
  }
}

function getSelectLayout() {
  // м „мІҙ к°ҖмӢң мҳҒм—ӯ (м•Ҳм „ мҳҒм—ӯ нҸ¬н•Ё)
  const visH = H + safeTop + safeBottom;
  // лӘЁл°”мқј к°ҖлЎң н”Ңлһҳк·ё (лЁјм Җ м„ м–ё)
  const _mobileLandscape = isMobile && !isPortrait && !isTablet && H < 500;
  // к°ҖлЎң л§Ҳм§„ кі л Ө: optWк°Җ нҷ”л©ҙмқ„ л„ҳм§Җ м•ҠлҸ„лЎқ м ңн•ң
  const optW = Math.min(sz(420), W - sz(16));
  // CD нҒ¬кё°: лӘЁл°”мқј к°ҖлЎңлҠ” visH л№„мңЁмқ„ м ҒлӢ№нһҲ нӮӨмӣҖ
  const cdSize = _mobileLandscape ?
      Math.min(sz(160), visH * 0.34, W * 0.3)
    : Math.min(sz(200), visH * 0.26, W * 0.4);
  const cardW = cdSize, cardH = cdSize, gap = sz(20);
  const songTotalW = songs.length * (cardW + gap) - gap;
  // лӘЁл“  spacingмқҖ sz() вҖ” UI мҠӨмјҖмқјм—җ л№„лЎҖ
  const optH = _mobileLandscape ? Math.min(sz(30), visH * 0.075) : Math.min(sz(42), visH * 0.055);
  const optGap = Math.max(sz(10), visH * 0.018);
  const sectionGap = Math.max(sz(10), visH * 0.016);
  const subBtnH = Math.min(sz(34), visH * 0.042);
  const subBtnGap = Math.max(sz(10), visH * 0.014);
  // м»ҙнҢ©нҠё к°ҖлЎң: н…ҚмҠӨнҠё нҸ°нҠё sz(14)/sz(10)м—җ л§һм¶° мһҗлҰ¬ sz()лЎң л¶Җм—¬ + м¶©л¶„н•ң м—¬мң 
  const searchBarH = _mobileLandscape ? sz(20) : sz(30);
  const titleH = _mobileLandscape ? sz(22) : sz(28);
  const titleToSearchGap = _mobileLandscape ? sz(4) : sz(12);
  const searchToSongGap = _mobileLandscape ? sz(8) : sz(14);
  const btnH = Math.min(sz(44), visH * 0.058);
  const cdTextH = _mobileLandscape ? sz(28) : sz(52); // CD мқҙлҰ„ + Lv л°°м§Җ кіөк°„
  const labelH = sz(18);
  // мӢңмһ‘ лІ„нҠјмқҖ нҷ”л©ҙ мөңн•ҳлӢЁм—җ лі„лҸ„ кі м •мқҙлҜҖлЎң flowм—җм„ң м ңмҷё
  const totalH =
      titleH + titleToSearchGap
    + searchBarH + searchToSongGap
    + cardH + cdTextH
    + subBtnGap + subBtnH

      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = '#ffd70044'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      // мҠӨнҒ¬лЎӨ bounds м ҖмһҘ
      window._searchDropBounds = { x: cxBase, y: dropY, w: optW, h: filterDropdownH, itemH: filterItemH, maxScroll };
      ctx.save();
      ctx.beginPath();
      ctx.rect(cxBase, dropY, optW, filterDropdownH);
      ctx.clip();
      const endIdx = Math.min(searchFiltered.length, searchScroll + visibleCount + 1);
      for (let fi = searchScroll; fi < endIdx; fi++) {
        const songIdx = searchFiltered[fi];
        const iy = dropY + 4 + (fi - searchScroll) * filterItemH;
        const isHl = fi === searchHighlight;
        if (isHl) {
          ctx.fillStyle = songs[songIdx].color + '33';
          rrFill(cxBase + 4, iy, optW - 8, filterItemH - 2, 6);
        }
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.font = `bold ${sz(14)}px sans-serif`;
        ctx.fillStyle = isHl ? '#fff' : 'rgba(255,255,255,0.6)';
        ctx.fillText(songs[songIdx].name, cxBase + 14, iy + filterItemH / 2);
        ctx.textBaseline = 'alphabetic';
      }
      ctx.restore();
      // мҠӨнҒ¬лЎӨл°”
      if (maxScroll > 0) {
        const sbX = cxBase + optW - 6, sbY = dropY + 4, sbH = filterDropdownH - 8;
        const thumbH = Math.max(20, sbH * visibleCount / searchFiltered.length);
        const thumbY = sbY + (sbH - thumbH) * (searchScroll / maxScroll);
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        rrFill(sbX, sbY, 3, sbH, 2);
        ctx.fillStyle = 'rgba(255,215,0,0.5)';
        rrFill(sbX, thumbY, 3, thumbH, 2);
      }
    } else {
      const filterDropdownH = 36;
      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.textAlign = 'center'; ctx.font = `${sz(12)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText('кІҖмғү кІ°кіј м—ҶмқҢ', cxBase + optW/2, dropY + filterDropdownH/2 + sz(4));
    }
  }
}

let shootingStars = [];
function spawnShootingStar() {
  const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2; // лҢҖк°Ғм„  н•ҳк°• (мҡ°н•ҳлӢЁ л°©н–Ҙ)
  const speed = 200 + Math.random() * 350;
  const startX = Math.random() * W * 1.2 - W * 0.1;
  const startY = -10 - Math.random() * H * 0.3;
  const hue = Math.random() > 0.6 ? 45 + Math.random() * 20 : 200 + Math.random() * 60; // кёҲмғү or нҢҢлһҖмғү
  const brightness = 0.7 + Math.random() * 0.3;
  const tailLen = 8 + Math.floor(Math.random() * 12);
  shootingStars.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.2 + Math.random() * 1.5,
    maxLife: 1.2 + Math.random() * 1.5,
    size: 1.5 + Math.random() * 2,
    hue, brightness, tailLen,
    trail: [] // мһ”мғҒ мўҢн‘ң м ҖмһҘ
  });
}
function updateShootingStars(dt) {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.trail.unshift({ x: ss.x, y: ss.y });
    if (ss.trail.length > ss.tailLen) ss.trail.pop();
    ss.x += ss.vx * dt;
    ss.y += ss.vy * dt;
    ss.life -= dt;
    if (ss.life <= 0 || ss.x > W + 50 || ss.y > H + 50) {
      shootingStars.splice(i, 1);
    }
  }
}
function renderShootingStars() {
  for (const ss of shootingStars) {
    const fade = Math.min(1, ss.life / (ss.maxLife * 0.3)); // л§Ҳм§Җл§ү 30%м—җм„ң нҺҳмқҙл“ңм•„мӣғ
    // кј¬лҰ¬ (мһ”мғҒ)
    for (let t = 0; t < ss.trail.length; t++) {
      const p = ss.trail[t];
      const alpha = (1 - t / ss.trail.length) * fade * ss.brightness * 0.6;
      const sz2 = ss.size * (1 - t / ss.trail.length * 0.7);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${ss.hue},80%,${70 + t * 2}%)`;
      ctx.fillRect(p.x - sz2/2, p.y - sz2/2, sz2, sz2);
    }
    // лЁёлҰ¬ (л°қмқҖ м җ)
    ctx.globalAlpha = fade * ss.brightness;
    ctx.shadowColor = `hsl(${ss.hue},90%,80%)`;
    ctx.shadowBlur = 6 + ss.size * 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ss.x, ss.y, ss.size * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawGoogleIcon(cx, cy, r) {
  const lw = r * 0.45;

}
function drawAppleIcon(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy); ctx.scale(r / 10, r / 10);
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.bezierCurveTo(-3, -11, -8, -10, -9, -6);
  ctx.bezierCurveTo(-10, -2, -9, 3, -7, 6); ctx.bezierCurveTo(-5, 9, -3, 11, 0, 11);
  ctx.bezierCurveTo(3, 11, 5, 9, 7, 6); ctx.bezierCurveTo(9, 3, 10, -2, 9, -6);
  ctx.bezierCurveTo(8, -10, 3, -11, 0, -8); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  // Leaf
  ctx.beginPath(); ctx.moveTo(0, -8);
  ctx.bezierCurveTo(1, -12, 4, -14, 5, -13);
  ctx.bezierCurveTo(5, -11, 3, -9, 0, -8); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
}

  } else {

    ctx.fillText('вҶҗ л’ӨлЎң', bbX+bbW/2, bbY+bbH*0.65);

  ctx.fillText('лһӯнӮ№', W/2, _rkLand ? sz(16) : (H*0.07+10)); ctx.shadowBlur=0;

  // localhost: мЈјк°„ ліҙмғҒ н…ҢмҠӨнҠё л°ңкёү лІ„нҠј (мҡ°мғҒлӢЁ)
  if (isTestEnv) {
    const tbW = sz(110), tbH = sz(26);
    const tbX = W - tbW - sz(8), tbY = sz(8);
    ctx.fillStyle = 'rgba(255,215,0,0.15)'; rrFill(tbX, tbY, tbW, tbH, sz(6));
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1; rrStroke(tbX, tbY, tbW, tbH, sz(6));
    ctx.font = `bold ${sz(10)}px sans-serif`; ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('мЈјк°„ ліҙмғҒ н…ҢмҠӨнҠё', tbX + tbW/2, tbY + tbH/2);
    window._rankingDevBtn = { x: tbX, y: tbY, w: tbW, h: tbH };
  } else {
    window._rankingDevBtn = null;
  }

  // Song name
  ctx.font=`${_rkLand ? sz(11) : sz(15)}px sans-serif`;
  ctx.fillStyle=song.color;
  ctx.fillText(song.name, W/2, _rkLand ? sz(32) : (H*0.13));

  // Difficulty tabs
  const tabW = _rkLand ? sz(240) : sz(280);
  const tabBtnW = tabW / DIFFICULTIES.length;
  const tabH_r = _rkLand ? 22 : 28;
  const tabX = (W - tabW) / 2, tabY = _rkLand ? sz(44) : H*0.17;
  DIFFICULTIES.forEach((d, i) => {
    const bx = tabX + i * tabBtnW, sel = i === selectedDiff;
    ctx.fillStyle = sel ? d.color+'33' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, tabH_r);
    if (sel) { ctx.fillStyle = d.color; ctx.fillRect(bx, tabY+tabH_r-3, tabBtnW, 3); }
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${_rkLand ? sz(10) : sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.4)';
    ctx.fillText(d.name, bx + tabBtnW/2, tabY + tabH_r/2);
  });
  ctx.textBaseline='alphabetic';

  // Key count sub-tabs (4K~8K)
  const keyTabCount = 5;
  const keyTabW = _rkLand ? sz(180) : sz(220);
  const keyBtnW = keyTabW / keyTabCount;
  const keyTabH = _rkLand ? 18 : 22;
  const keyTabX = (W - keyTabW) / 2, keyTabY = tabY + tabH_r + (_rkLand ? 4 : 6);
  for (let k = 0; k < keyTabCount; k++) {
    const kCount = k + 4;
    const bx = keyTabX + k * keyBtnW;
    const sel = kCount === rankingKeyCount;
    ctx.fillStyle = sel ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, keyTabY, keyBtnW, keyTabH);
    if (sel) { ctx.fillStyle = '#fff'; ctx.fillRect(bx, keyTabY+keyTabH-2, keyBtnW, 2); }
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${_rkLand ? sz(9) : sz(11)}px sans-serif`;
    ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.4)';
    ctx.fillText(kCount+'K', bx + keyBtnW/2, keyTabY + keyTabH/2);
  }
  ctx.textBaseline='alphabetic';

  // Rankings list
  const rankings = getRankings(selectedSong, selectedDiff, rankingKeyCount);
  const listY = keyTabY + keyTabH + (_rkLand ? 8 : 14), rowH = _rkLand ? 26 : 32;
  const listW = _rkLand ? sz(340) : sz(300);
  const listX = (W - listW) / 2;
  // л’ӨлЎңк°Җкё° лІ„нҠј мўҢн‘ң (м•ҲлӮҙ н…ҚмҠӨнҠёмҷҖ лҸҷмқј м„ мғҒм—җ мң„м№ҳ)
  const _bbH_rk = isMobile ? (_rkLand ? sz(34) : sz(28)) : 38;
  const _bbTop_rk = isMobile ? (H + safeBottom - sz(4) - _bbH_rk) : (H - 48);
  const _rkListBottom = _bbTop_rk - sz(8); // лІ„нҠј/м•ҲлӮҙм„  мң„ 8px л§Ҳм§„
  const maxVisible = Math.max(1, Math.floor((_rkListBottom - listY) / rowH));

  if (rankings.length === 0) {
    ctx.font=`${sz(14)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ',W/2,listY + 40);
  } else {
    const end = Math.min(rankings.length, rankingScroll + maxVisible);
    for (let i = rankingScroll; i < end; i++) {
      const r = rankings[i];
      const ry = listY + (i - rankingScroll) * rowH;
      const isMe = r.name === currentUser;

      // Row bg
      ctx.fillStyle = isMe ? song.color+'15' : 'rgba(255,255,255,0.03)';
      rrFill(listX, ry, listW, rowH - 4, 6);
      if (isMe) {
        ctx.strokeStyle = song.color+'44'; ctx.lineWidth = 1;
        rrStroke(listX, ry, listW, rowH - 4, 6);
      }

      // Rank number
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`bold ${sz(16)}px sans-serif`;
      const rankColors = ['#ffd700','#c0c0c0','#cd7f32'];
      ctx.fillStyle = i < 3 ? rankColors[i] : 'rgba(255,255,255,0.4)';
      ctx.fillText(''+(i+1), listX + 22, ry + (rowH-4)/2);

      // Name
      ctx.textAlign='left';
      ctx.font=`${isMe?'bold ':''}${sz(14)}px sans-serif`;
      ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.7)';
      ctx.fillText(r.name, listX + 45, ry + (rowH-4)/2);

      // Reward badge for top 10
      let scoreRightX = listX + listW - 10;
      if (i < 10) {
        const rwTxt = '+' + formatCoins(WEEKLY_REWARDS[i]) + 'вҷӘ';
        ctx.font = `bold ${sz(10)}px sans-serif`;
        const rwW = ctx.measureText(rwTxt).width + sz(10);
        const rwH = sz(18);
        const rowCenterY = ry + (rowH-4)/2;
        const rwX = scoreRightX - rwW, rwY = rowCenterY - rwH/2;
        ctx.fillStyle = 'rgba(255,215,0,0.15)';
        rrFill(rwX, rwY, rwW, rwH, sz(4));
        ctx.strokeStyle = 'rgba(255,215,0,0.5)'; ctx.lineWidth = 1;
        rrStroke(rwX, rwY, rwW, rwH, sz(4));
        ctx.fillStyle = '#ffd700';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(rwTxt, rwX + rwW/2, rowCenterY);
        scoreRightX = rwX - sz(8);
      }

      // Score
      ctx.textAlign='right';
      ctx.font=`bold ${sz(14)}px sans-serif`;
      ctx.fillStyle = isMe ? song.color : 'rgba(255,255,255,0.6)';
      ctx.fillText(r.score.toLocaleString(), scoreRightX, ry + (rowH-4)/2);
    }
    ctx.textBaseline='alphabetic';
  }

  // н•ҳлӢЁ м•ҲлӮҙ: л’ӨлЎңк°Җкё° лІ„нҠјкіј лҸҷмқј м„ мғҒ (мӨ‘м•ҷ)
  {
    const now = Date.now();
    const nextReset = getWeekStartKST(now) + 7 * 24 * 60 * 60 * 1000;
    const left = nextReset - now;
    const days = Math.floor(left / (24*60*60*1000));
    const hrs = Math.floor((left % (24*60*60*1000)) / (60*60*1000));
    const mins = Math.floor((left % (60*60*1000)) / (60*1000));
    let leftStr;
    if (days > 0) leftStr = days + 'мқј ' + hrs + 'мӢңк°„';
    else if (hrs > 0) leftStr = hrs + 'мӢңк°„ ' + mins + 'л¶„';
    else leftStr = mins + 'л¶„';
    const cy = _bbTop_rk + _bbH_rk / 2; // л’ӨлЎңк°Җкё° лІ„нҠј м„ёлЎң мӨ‘мӢ¬
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // 1мӨ„: мҙҲкё°нҷ” м№ҙмҡҙнҠёлӢӨмҡҙ (мң„)
    ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,200,120,0.75)';
    ctx.fillText('мҙҲкё°нҷ”к№Ңм§Җ ' + leftStr, W/2, cy - sz(7));
    // 2мӨ„: мҡ°нҺён•Ё м§Җкёү м•ҲлӮҙ (м•„лһҳ)
    ctx.font = `${sz(9)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('лһӯнӮ№ ліҙмғҒмқҖ л§ӨмЈј мҡ°нҺён•ЁмңјлЎң м§Җкёү', W/2, cy + sz(7));
    ctx.textBaseline = 'alphabetic';
  }

  renderBottomBar();
}

// ===== RESULT =====
function renderResult() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song=curSong;
  const _rTop = -safeTop + sz(10);
  const _rH = H + safeTop + safeBottom - sz(20);
  ctx.font=`bold ${sz(28)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  if (!isMobile) { ctx.shadowColor='#fff'; ctx.shadowBlur=8; }
  ctx.fillText('RESULT',W/2, _rTop + _rH * 0.08); ctx.shadowBlur=0;
  ctx.font=`${sz(13)}px sans-serif`; ctx.fillStyle=song.color;
  const diffLabel = curDiff ? curDiff.name : '';
  const spdLabel = selectedSpeed.toFixed(1)+'x';
  ctx.fillText(song.name+'  В·  '+diffLabel+'  В·  '+spdLabel,W/2, _rTop + _rH * 0.14);

  const pct=totalNodes>0?collected/totalNodes:0;
  const cleared = gauge > 0; // нҒҙлҰ¬м–ҙ м—¬л¶Җ (кІҢмқҙм§Җ мӮ¬л§қ = лҜёнҒҙлҰ¬м–ҙ)
  // м •к·ңнҷ” м җмҲҳ: л§Ңм җ 100л§Ң кё°мӨҖ
  const TARGET_MAX = 1000000;
  const rawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
  const normalizedScore = Math.round(score / rawMax * TARGET_MAX);
  // л“ұкёү: м •нҷ•лҸ„ кё°л°ҳ + лҜёнҒҙлҰ¬м–ҙ мӢң мөңлҢҖ Cл“ұкёү
  let grade;
  if (!cleared) {
    grade = 'D'; // лҜёнҒҙлҰ¬м–ҙ = л¬ҙмЎ°кұҙ D
  } else if (missed === 0) {
    grade = 'P';
  } else {
    grade = pct >= 0.98 ? 'S' : pct >= 0.90 ? 'A' : pct >= 0.80 ? 'B' : 'C';
  }
  const gc={P:'#ff44ff',S:'#ffd700',A:'#00ff88',B:'#00d4ff',C:'#ff9500',D:'#ff3333'};

  const _gradeY = _rTop + _rH * 0.30;
  const gradeR = sz(38);
  if (grade === 'P') {
    const t = Date.now() * 0.003;
    ctx.beginPath(); ctx.arc(W/2, _gradeY, gradeR, 0, Math.PI*2);
    const rGrad = ctx.createConicGradient(t, W/2, _gradeY);
    rGrad.addColorStop(0,'#ff44ff'); rGrad.addColorStop(0.25,'#44ddff');
    rGrad.addColorStop(0.5,'#ffdd44'); rGrad.addColorStop(0.75,'#44ff88');
    rGrad.addColorStop(1,'#ff44ff');
    ctx.strokeStyle=rGrad; ctx.lineWidth=4; ctx.stroke();
    ctx.font=`bold ${sz(28)}px sans-serif`;
    ctx.fillStyle='#ff44ff';
    if (!isMobile) { ctx.shadowColor='#ff44ff'; ctx.shadowBlur=40; }
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('PERFECT',W/2, _gradeY);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  } else {
    ctx.beginPath(); ctx.arc(W/2, _gradeY, gradeR, 0, Math.PI*2);
    ctx.strokeStyle=gc[grade]+'44'; ctx.lineWidth=3; ctx.stroke();
    ctx.font=`bold ${sz(50)}px sans-serif`;
    ctx.fillStyle=gc[grade];
    if (!isMobile) { ctx.shadowColor=gc[grade]; ctx.shadowBlur=20; }
    ctx.textBaseline='middle'; ctx.fillText(grade,W/2, _gradeY);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  }

  const stats=[['SCORE',normalizedScore.toLocaleString()],['MAX COMBO',maxCombo+'x'],['HIT',collected+' / '+totalNodes],['MISS',''+missed],['ACCURACY',(pct*100).toFixed(1)+'%']];
  ctx.font=`${sz(12)}px sans-serif`;
  const _statRowH = sz(22);
  const sy0 = _rTop + _rH * 0.46;
  stats.forEach((s,i)=>{
    const sy=sy0+i*_statRowH;
    ctx.fillStyle='rgba(255,255,255,0.03)';
    const bw = Math.min(sz(250), W * 0.85);
    rrFill((W-bw)/2,sy - _statRowH*0.4, bw, _statRowH*0.8, 5);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText(s[0],W/2-sz(8),sy+2);
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(s[1],W/2+sz(8),sy+2);
  });

  const msgs={P:'ALL PERFECT!!',S:'EXCELLENT!',A:'GREAT!',B:'GOOD!',C:'CLEAR',D:'TRY AGAIN'};
  ctx.font=`bold ${sz(15)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle=gc[grade]; ctx.fillText(msgs[grade],W/2, _rTop + _rH * 0.74);

  const myBest = getMyBest(curSongIdx, selectedDiff);
  if (myBest > 0) {
    ctx.font=`bold ${sz(12)}px sans-serif`;
    if (score >= myBest) {
      ctx.fillStyle='#ffd700';
      ctx.fillText('NEW RECORD!  ' + myBest.toLocaleString(), W/2, _rTop + _rH * 0.79);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('BEST: ' + myBest.toLocaleString(), W/2, _rTop + _rH * 0.79);
    }
  }

  // Newly unlocked achievements
  if (newlyUnlocked.length > 0) {
    const achY = _rTop + _rH * 0.83;
    const achW = sz(280);
    const achX = (W-achW)/2;
    const show = Math.min(newlyUnlocked.length, 3);
    let totalCoins = 0;
    for (const a of newlyUnlocked) totalCoins += a.coins;

    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='#ffd700';
    ctx.fillText('м—…м Ғ лӢ¬м„ұ! +'+formatCoins(totalCoins)+' вҷӘмқҢн‘ң', W/2, achY);

    for (let i = 0; i < show; i++) {
      const a = newlyUnlocked[i];
      const ry = achY + 10 + i * 22;
      ctx.fillStyle='#ffd70015'; rrFill(achX, ry, achW, 18, 4);
      ctx.strokeStyle='#ffd70044'; ctx.lineWidth=1; rrStroke(achX, ry, achW, 18, 4);
      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fillText(a.label, achX+8, ry+13);
      ctx.textAlign='right'; ctx.fillStyle='#ffd700';
      ctx.fillText('+'+formatCoins(a.coins), achX+achW-8, ry+13);
    }
    if (newlyUnlocked.length > 3) {
      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('+'+(newlyUnlocked.length-3)+'к°ң лҚ”...', W/2, achY+10+show*22+12);
    }
  }

  ctx.font=`${sz(13)}px sans-serif`;
  ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(Date.now()*0.004)*0.2})`;
  ctx.fillText('\uD0ED\uD558\uC5EC \uB3CC\uC544\uAC00\uAE30',W/2,H*0.94);
}

// ===== PAUSE ON TAB HIDDEN =====
let gamePaused = false;
let bgAudioState = null; // л°ұк·ёлқјмҡҙл“ң м§„мһ… м „ мҳӨл””мҳӨ мғҒнғң м ҖмһҘ

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // лӘЁл“  мҳӨл””мҳӨ мқјмӢңм •м§Җ (л°ұк·ёлқјмҡҙл“ң/мөңмҶҢнҷ”)
    bgAudioState = { titleBgm: titleBgmPlaying, rankingBgm: rankingBgmPlaying, shopBgm: shopBgmPlaying, achievementBgm: achievementBgmPlaying, inventoryBgm: inventoryBgmPlaying, preview: !!songPreviewAudio && !songPreviewAudio.paused };
    if (titleBgmPlaying) titleBgm.pause();
    if (rankingBgmPlaying && rankingBgm) rankingBgm.pause();
    if (shopBgmPlaying && shopBgm) shopBgm.pause();
    if (achievementBgmPlaying && achievementBgm) achievementBgm.pause();
    if (inventoryBgmPlaying && inventoryBgm) inventoryBgm.pause();
    if (songPreviewAudio && !songPreviewAudio.paused) songPreviewAudio.pause();
    // мқёкІҢмһ„ мҳӨл””мҳӨ
    if (state === 'playing') {
      pauseGame();
    }
  } else if (bgAudioState) {
    // ліөк·Җ мӢң dt мҠӨнҢҢмқҙнҒ¬ л°©м§Җ
    lastTime = 0;
    // ліөк·Җ мӢң: мқёкІҢмһ„мқҙ м•„лӢҢ мҳӨл””мҳӨл§Ң мһҗлҸҷ ліөмӣҗ (мқёкІҢмһ„мқҖ resumeGameмңјлЎң мІҳлҰ¬)
    if (bgAudioState.titleBgm && state !== 'playing') { titleBgm.play().catch(()=>{}); }
    if (bgAudioState.rankingBgm && state === 'ranking' && rankingBgm) { rankingBgm.play().catch(()=>{}); }
    if (bgAudioState.shopBgm && state === 'shop' && shopBgm) { shopBgm.play().catch(()=>{}); }
    if (bgAudioState.achievementBgm && state === 'achievement' && achievementBgm) { achievementBgm.play().catch(()=>{}); }
    if (bgAudioState.inventoryBgm && state === 'inventory' && inventoryBgm) { inventoryBgm.play().catch(()=>{}); }
    if (bgAudioState.preview && state === 'select' && songPreviewAudio) {
      // Preview ліөк·Җ мӢң мӮ¬мқҙнҒҙ мҷ„м „ лҰ¬м…Ӣ вҖ” л°ұк·ёлқјмҡҙл“ң мӨ‘ м–ҙкёӢлӮң нғҖмқҙл°Қ м •м •
      try {
        songPreviewAudio.currentTime = 0;
        previewCycleStart = performance.now();
        songPreviewAudio.play().catch(()=>{});
      } catch(e) {}
    }
    bgAudioState = null;
  }
});

// мҳӨл””мҳӨ л””л°”мқҙмҠӨ ліҖкІҪ (мқҙм–ҙнҸ° л¶„лҰ¬/м—°кІ°) вҖ” actx.state ліҖнҷ”мҷҖ л¬ҙкҙҖн•ҳкІҢ к°җм§Җ
try {
  if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
    navigator.mediaDevices.addEventListener('devicechange', () => {
      if (state === 'playing' && !gamePaused) {
        pauseGame();
      }
    });
  }
} catch(e) {}

let pausedAtTime = 0; // л©Ҳм¶Ө мӢңм җмқҳ gameTime
function pauseGame() {
  if (state !== 'playing' || gamePaused) return;
  gamePaused = true;
  pausedAtTime = gameTime;
  // ABS лӘЁл“ң: source м •м§Җ
  if (window._absNodes) {
    window._absPausedAt = actx ? actx.currentTime - window._absStartCtx : gameTime;
    for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} }
    window._absNodes = null;
  }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) allStemAudios[i].pause();
  }
  for (const a of pulseStemAudios) { if (a) a.pause(); }
  if (songAudio) songAudio.pause();
}

let _prevActxState = ''; // actx мғҒнғң м „нҷҳ к°җм§Җмҡ©
let _bgmNeedsResume = false;
let _audioInterrupted = false;
let _suspendPauseTimer = null; // transient suspended blip л¬ҙмӢңмҡ© л””л°”мҡҙмҠӨ
let _suspendStartAt = 0; // update() лӮҙ actx suspend л””л°”мҡҙмҠӨмҡ© вҖ” 500ms л„ҳмңјл©ҙ pause
// iOS мҳӨл””мҳӨ мқён„°лҹҪнҠё ліөкө¬ (м•ҢлһҢ/м „нҷ” нӣ„)

  // - 4к°ң dim мҶҢмҠӨ(client/vviewp/inner/probe) + canvas н…Ңл‘җлҰ¬ + мӢңмһ‘лІ„нҠј Y к°Җмқҙл“ң
  // - н•ҙмғҒлҸ„ лІ„к·ё мһ¬л°ң/лӢӨлҘё л””л°”мқҙмҠӨ н…ҢмҠӨнҠё мӢң л°”лЎң мһ¬нҷңмҡ© (feedback_viewport_measurement.md м°ёмЎ°)
  if (window._dimDebug === true) { renderDimDebug(); }
  requestAnimationFrame(loop);
}
function renderDimDebug() {
  const de = document.documentElement;
  const vv = window.visualViewport;
  const cW = de ? de.clientWidth  : innerWidth;
  const cH = de ? de.clientHeight : innerHeight;
  const vW = vv ? Math.round(vv.width)  : -1;
  const vH = vv ? Math.round(vv.height) : -1;
  const probe = readViewport();
  const dpr = window.devicePixelRatio || 1;
  // мӢңмһ‘ лІ„нҠј мҳҲмғҒ Y (select нҷ”л©ҙ)
  let _btnDbg = '', _btnY2 = -1, _btnH2 = 0;
  if (state === 'select') {
    const _visH = H + safeTop + safeBottom;
    _btnH2 = Math.min(Math.round(44 * UI), _visH * 0.058);
    _btnY2 = H + safeBottom - _btnH2 - Math.round(40 * UI);
    _btnDbg = 'btn=' + _btnY2.toFixed(0) + '..' + (_btnY2 + _btnH2).toFixed(0);
  }
  const lines = [
    'WГ—H=' + W + 'Г—' + H,
    'canvas=' + canvas.width + 'Г—' + canvas.height,
    'client=' + cW + 'Г—' + cH,
    'vviewp=' + vW + 'Г—' + vH,
    'inner =' + innerWidth + 'Г—' + innerHeight,
    'probe =' + probe.w + 'Г—' + probe.h,
    'dpr=' + dpr + ' UI=' + UI.toFixed(2),
    'isMobile=' + isMobile + ' Portrait=' + isPortrait,
    'isTablet=' + isTablet + ' iframe=' + inIframe,
    'safe T/B/L/R=' + safeTop + '/' + safeBottom + '/' + safeLeft + '/' + safeRight,
    'state=' + state + ' ' + _btnDbg,
  ];
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  const padX = 8, padY = 6, lineH = 15;
  const boxW = 260, boxH = lines.length * lineH + padY * 2;
  const boxX = Math.round((cW - boxW) / 2);
  const boxY = Math.round((cH - boxH) / 2);
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
  ctx.strokeRect(boxX + 0.5, boxY + 0.5, boxW, boxH);
  ctx.fillStyle = '#0ff';
  lines.forEach((s, i) => ctx.fillText(s, boxX + padX, boxY + padY + i * lineH));
  // мӢңмһ‘ лІ„нҠј мҳҲмғҒ мң„м№ҳм—җ л…№мғү к°Җмқҙл“ң лқјмқё
  if (_btnY2 >= 0) {
    const _cy1 = _btnY2 + safeTop;
    const _cy2 = _btnY2 + _btnH2 + safeTop;
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, _cy1); ctx.lineTo(cW, _cy1);
    ctx.moveTo(0, _cy2); ctx.lineTo(cW, _cy2);
    ctx.stroke();
    ctx.fillStyle = '#0f0';
    ctx.fillText('вҶ‘ startBtn top (' + _cy1.toFixed(0) + ')', 10, _cy1 - 16);
    ctx.fillText('вҶ“ startBtn bottom (' + _cy2.toFixed(0) + ')', 10, _cy2 + 4);
  }
  // мә”лІ„мҠӨ мӢӨм ң н…Ңл‘җлҰ¬ (л№Ёк°•)
  ctx.strokeStyle = '#f00'; ctx.lineWidth = 3;
  ctx.strokeRect(1.5, 1.5, cW - 3, cH - 3);
  ctx.fillStyle = '#f00';
  ctx.fillText('canvas bottom (' + cH + ')', 10, cH - 20);
  ctx.restore();
}
requestAnimationFrame(loop);
</script>
