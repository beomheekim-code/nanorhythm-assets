    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].type !== 'hold' && nodes[b].time >= nodes[a].time && nodes[b].time < nodes[a].endTime + 0.15) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  let maxDur = 0;
  for (const si in stemAudioBuffers) { if (stemAudioBuffers[si]) maxDur = Math.max(maxDur, stemAudioBuffers[si].duration); }
  songDuration = maxDur > 0 ? maxDur + bgmDelay + 2 : (nodes.length > 0 ? nodes[nodes.length - 1].time + 5 : 30);
}

            let peak = 0;
            const end = Math.min(j + bigChunk, data.length);

            stemAudioBuffers[_si] = buffer;
            if (_isEnergyStem) {

              const bigChunk = Math.floor(sr * 0.1);
              for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {

                const end = Math.min(j + bigChunk, data.length);

              }

              for (let w = 0; w < mapLen; w++) {

                for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }

// ===== UPDATE =====
function update(dt) {

        pauseGame();
        _suspendStartAt = 0;

      if (_curActxState === 'running') {
        _suspendStartAt = 0;
      }
    }
    // suspended/interrupted → running 전환 시 (이어폰 재연결/회전 완료 등) 오디오 재시작 + 자동 resume
    if (_curActxState === 'running' && _prevActxState && _prevActxState !== 'running') {

      resumeSyncCounter = (curSong && curSong._onsetMode) ? 0 : 30;
      window._bgmDelayStarted = false;
      if (usingStemMode) {
        songStartTime = actx.currentTime; countdownTime = 0;
        // AudioBufferSourceNode로 즉시 재생 (HTML Audio의 play() 끊김 제거)
        window._absNodes = [];
        window._absGains = [];
        window._absStartCtx = actx.currentTime;
        // 나노모드: 로우패스 필터 초기화 및 연결
        if (gameMode === 'nano') {
          initNanoFilter();
          nanoFilterTarget = NANO_FILTER_CLEAR;
          nanoFilterCurrent = NANO_FILTER_CLEAR;
          if (nanoFilter) nanoFilter.frequency.value = NANO_FILTER_CLEAR;
        }
        const _audioDest = (gameMode === 'nano' && nanoFilter) ? nanoFilter : actx.destination;
        if (gameMode === 'nano' && nanoFilter) nanoFilter.connect(actx.destination);
        for (let i = 0; i < allStemAudios.length; i++) {
          if (stemAudioBuffers[i] && actx) {
            const gain = actx.createGain();
            const _isAlways = ALWAYS_AUDIBLE_STEMS.includes(i);
            gain.gain.value = (_isAlways ? STEM_VOL_VOCAL : STEM_VOL_NORMAL) * volBgm;
            gain.connect(_isAlways ? actx.destination : _audioDest);
            const src = actx.createBufferSource();
            src.buffer = stemAudioBuffers[i];
            src.connect(gain);
            src.start(0);
            window._absNodes.push(src);
            window._absGains.push(gain);
          } else {
            window._absNodes.push(null);
            window._absGains.push(null);
          }
          // ★ HTML Audio 완전 정지 — 이중 재생이 iOS 에서 오디오 글리치 + 터치 throttling 유발.
          //   position 참조는 actx.currentTime - _absStartCtx 로 이미 계산되므로 불필요.
          if (allStemAudios[i]) { allStemAudios[i].pause(); allStemAudios[i].currentTime = 0; }
        }
      } else if (songAudio) {
        songAudio.currentTime = 0; songAudio.play().catch(()=>{});
        window._bgmDelayStarted = true;
      }
    }
    return;
  }

  gameTime += dt;

  // 오디오 기준 미세 보정 (dt 기반으로 부드럽게, 오디오로 정확하게)
  // AudioBufferSourceNode 모드: actx.currentTime 기준으로 position 계산
  let audioRef = null;
  if (window._absStartCtx != null && window._absNodes && window._absNodes.length > 0) {
    audioRef = (actx.currentTime - window._absStartCtx) + (curSong && curSong._startDelay || 0);
  } else if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && !allStemAudios[0].paused) {
    audioRef = allStemAudios[0].currentTime;
  } else if (songAudio && !songAudio.paused) {
    audioRef = songAudio.currentTime;
  }
  // actx 가 suspended/interrupted 면 오디오 타임이 frozen → sync 스킵 (dt 로만 진행)
  if (audioRef !== null && (!actx || actx.state === 'running')) {
    const drift = gameTime - audioRef;
    if (Math.abs(drift) > 0.5) console.warn('DRIFT JUMP:', drift.toFixed(3), 'gameTime:', gameTime.toFixed(3), 'audioRef:', audioRef.toFixed(3), 'syncCnt:', resumeSyncCounter);
    if (resumeSyncCounter > 0) {
      // 시작/재개 직후: 오디오에 강제 동기화
      resumeSyncCounter--;
      gameTime = audioRef;
    } else if (curSong && curSong._onsetMode && window._absStartCtx && (actx.currentTime - window._absStartCtx) < 1.0) {
      // onset 모드 BGM 시작 직후 1초: 넓은 허용치 (순간이동 방지, 부드러운 보정만)
      if (Math.abs(drift) > 0.5) gameTime = audioRef;
      else gameTime -= drift * 0.05;
    } else if (isMobile) {
      // 모바일: 30~40fps + audio.currentTime 불규칙 → 빠른 보정
      if (Math.abs(drift) > 0.06) gameTime = audioRef;
      else gameTime -= drift * 0.15;
    } else {
      // PC: 60fps 안정 → 부드러운 보정
      if (Math.abs(drift) > 0.12) gameTime = audioRef;
      else gameTime -= drift * 0.08;
    }
  }

  updateNanoPreDuck();
  updateStemVolumes(dt);
  scheduleNotes();

  // 스템 동기화 보정 (끊김 방지: seek 분산)
  const stemSyncInterval = isMobile ? 2.0 : 5.0;
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0]) {
    if (gameTime - stemSyncTime > stemSyncInterval) {
      stemSyncTime = gameTime;
      if (allStemAudios[0].paused && !gamePaused && !allStemAudios[0].ended) allStemAudios[0].play().catch(()=>{});
      const refTime = allStemAudios[0].currentTime;
      const toSync = [];
      for (let i = 1; i < allStemAudios.length; i++) {
        if (!allStemAudios[i]) continue;
        if (allStemAudios[i].paused && !gamePaused && !allStemAudios[i].ended) allStemAudios[i].play().catch(()=>{});
        if (!allStemAudios[i].ended) {
          const drift = Math.abs(allStemAudios[i].currentTime - refTime);
          if (drift > 0.15) toSync.push(i);
        }
      }
      // seek을 프레임 단위로 분산
      if (!window._stemSyncTimeouts) window._stemSyncTimeouts = [];
      window._stemSyncTimeouts.forEach(id => clearTimeout(id));
      window._stemSyncTimeouts = [];
      toSync.forEach((idx, n) => {
        window._stemSyncTimeouts.push(setTimeout(() => {
          if (allStemAudios[idx] && !allStemAudios[idx].ended && allStemAudios[0]) {
            allStemAudios[idx].currentTime = allStemAudios[0].currentTime;
          }
        }, n * 16));
      });
      // 펄스 동기화
      const pulseRef = refTime + PULSE_LEAD;
      const pulseToSync = [];
      for (let i = 0; i < pulseStemAudios.length; i++) {
        if (!pulseStemAudios[i]) continue;
        if (pulseStemAudios[i].paused && !gamePaused && !pulseStemAudios[i].ended) pulseStemAudios[i].play().catch(()=>{});
        if (!pulseStemAudios[i].ended) {
          const drift = Math.abs(pulseStemAudios[i].currentTime - pulseRef);
          if (drift > 0.2) pulseToSync.push(i);
        }
      }
      pulseToSync.forEach((idx, n) => {
        window._stemSyncTimeouts.push(setTimeout(() => {
          if (pulseStemAudios[idx] && !pulseStemAudios[idx].ended && allStemAudios[0]) {
            pulseStemAudios[idx].currentTime = allStemAudios[0].currentTime + PULSE_LEAD;
          }
        }, (toSync.length + n) * 16));
      });
    }
  }

  // Hold note tracking
  for (const n of nodes) {
    if (n.type !== 'hold' || !n.holding) continue;
    // Fire burst effect while holding
    if (!n._burstTimer) n._burstTimer = 0;
    n._burstTimer += dt;
    if (n._burstTimer >= 0.04 && particles.length < (isMobile ? 60 : 150)) {
      n._burstTimer = 0;
      const hx = getLaneX(n.lane), hy = getHitY();
      const col = LANE_COLORS[n.lane];
      const hw = (getLaneW() - 8) / 2;
      const fxActive = !!(currentHitFxSkin && SKINS[currentHitFxSkin]);
      if (fxActive) {
        // ★ 상승 drift — 데스크탑 2 / 모바일 1 개/tick. soft cap 안에서만.
        const _dN = (particles.length < (isMobile ? 40 : 90)) ? (isMobile ? 1 : 2) : 0;
        for (let i = 0; i < _dN; i++) {
          const ox = (Math.random() - 0.5) * hw * 1.6;
          particles.push({
            x: hx + ox, y: hy,
            vx: (Math.random()-0.5)*40, vy: -100 - Math.random()*220,
            life: 0.5 + Math.random()*0.5, maxLife: 1.0,
            color: '#fff', size: 18 + Math.random()*14,
            sprite: true, spriteKey: 'drift',
            rot: Math.random()*Math.PI*2, rotVel: (Math.random()-0.5)*4,
          });
        }
      } else {
        // Big upward flame columns
        for (let i = 0; i < laneCount; i++) {
          const ox = (Math.random() - 0.5) * hw * 2;
          const spd = -150 - Math.random() * 300;
          particles.push({ x: hx + ox, y: hy, vx: (Math.random()-0.5)*60, vy: spd,
            life: 0.4 + Math.random()*0.4, maxLife: 0.8, color: col, size: 6 + Math.random()*10 });
        }
        // Hot white/yellow core sparks
        for (let i = 0; i < 2; i++) {
          const coreCol = Math.random() > 0.5 ? '#fff' : '#ffd700';
          particles.push({ x: hx + (Math.random()-0.5)*hw*0.8, y: hy, vx: (Math.random()-0.5)*30, vy: -100 - Math.random()*250,
            life: 0.25 + Math.random()*0.25, maxLife: 0.5, color: coreCol, size: 4 + Math.random()*7 });
        }
        // Side fountain sparks
        for (let i = 0; i < 2; i++) {
          const dir = Math.random() > 0.5 ? 1 : -1;
          particles.push({ x: hx + dir*hw, y: hy, vx: dir*(80+Math.random()*160), vy: -60 - Math.random()*120,
            life: 0.25 + Math.random()*0.3, maxLife: 0.55, color: '#ffd700', size: 3 + Math.random()*5 });
        }
        // Rising embers (slow, long-lived)
        if (Math.random() < 0.4) {
          particles.push({ x: hx + (Math.random()-0.5)*hw*2, y: hy - Math.random()*30,
            vx: (Math.random()-0.5)*15, vy: -30 - Math.random()*60,
            life: 0.6 + Math.random()*0.5, maxLife: 1.1, color: '#ff8800', size: 2 + Math.random()*3 });
        }
      }
    }
    // Glow burst at hit line — 배열 cap 으로 다중 홀드 시 폭증 방지 (기존 cap 없음)
    if (!n._glowTimer) n._glowTimer = 0;
    n._glowTimer += dt;
    if (n._glowTimer >= 0.08 && holdGlows.length < (isMobile ? 12 : 20)) {
      n._glowTimer = 0;
      holdGlows.push({ x: getLaneX(n.lane), y: getHitY(), time: 0, maxTime: 0.35,
        color: LANE_COLORS[n.lane], w: getLaneW() - 8 });
    }
    // ★ 홀드 하강 flow — sakura_fx 장착 시.
    //   (A) sparkle 방울 — 누르는 순간 burst + 지속 (기존 유지)
    //   (B) drift + core_flash 하강 — 좌우로 조금씩 흘러내림 (신규)
    if (currentHitFxSkin && SKINS[currentHitFxSkin]) {
      const dhx = getLaneX(n.lane), dhy = getHitY();
      const dhw = (getLaneW() - 8) / 2;
      // ---- (A) sparkle 방울 — 크기 작게 + 더 자주 ----
      const _pushSparkle = (bigger) => {
        const ox = (Math.random() - 0.5) * dhw * 0.9;
        const sz = (bigger ? 14 : 12) + Math.random()*10;   // init 14~24, tick 12~22
        particles.push({
          x: dhx + ox, y: dhy,
          vx: (Math.random()-0.5)*130,
          vy: -40 - Math.random()*60,
          life: 1.3, maxLife: 1.3,
          color: '#fff', size: sz,
          sprite: true, spriteKey: 'sparkle',
          rot: Math.random()*Math.PI*2, rotVel: (Math.random()-0.5)*3,
        });
      };
      if (!n._dropInit && particles.length < (isMobile ? 60 : 150)) {
        n._dropInit = true;
        for (let i = 0; i < 6; i++) _pushSparkle(true);       // init 4 → 6
      }
      if (!n._dropTimer) n._dropTimer = 0;
      n._dropTimer += dt;
      // 더 자주 — 단 기존 drift + drop + 다중 홀드 조합으로 cap 150 찍히면 중간 stutter.
      //   cap 의 70% 이상이면 스킵해서 여유 남김.
      const _particleSoft = isMobile ? 42 : 100;
      if (n._dropTimer >= 0.08 && particles.length < _particleSoft) {
        n._dropTimer = 0;
        _pushSparkle(false);
      }
      // ---- (B) drift + core_flash 아래로 흘려보냄 — life 짧게 (더 일찍 사라짐) ----
      if (!n._holdFlowInit && particles.length < (isMobile ? 60 : 150)) {
        n._holdFlowInit = true;
        // core_flash — 짧은 번쩍
        particles.push({
          x: dhx, y: dhy + 6,
          vx: 0, vy: 30 + Math.random()*15,
          life: 0.3, maxLife: 0.3,                            // 0.45 → 0.3
          color: '#fff', size: 50 + Math.random()*10,
          sprite: true, spriteKey: 'coreFlash',
          rot: 0, rotVel: 0,
        });
        // drift 3개 — 좌우로 퍼지며 아래로, 빠르게 사라짐
        for (let i = 0; i < 3; i++) {
          particles.push({
            x: dhx + (Math.random()-0.5) * dhw * 0.6, y: dhy + 4,
            vx: (Math.random()-0.5)*60,
            vy: 45 + Math.random()*55,
            life: 0.55, maxLife: 0.55,                        // 1.0 → 0.55
            color: '#fff', size: 22 + Math.random()*10,
            sprite: true, spriteKey: 'drift',
            rot: Math.random()*Math.PI*2, rotVel: (Math.random()-0.5)*2,
          });
        }
      }
      if (!n._holdFlowTimer) n._holdFlowTimer = 0;
      n._holdFlowTimer += dt;
      if (n._holdFlowTimer >= 0.18 && particles.length < (isMobile ? 45 : 110)) {
        n._holdFlowTimer = 0;
        particles.push({
          x: dhx + (Math.random()-0.5) * dhw * 0.8, y: dhy + 2,
          vx: (Math.random()-0.5)*45,
          vy: 40 + Math.random()*45,
          life: 0.5, maxLife: 0.5,
          color: '#fff', size: 18 + Math.random()*8,
          sprite: true, spriteKey: 'drift',
          rot: Math.random()*Math.PI*2, rotVel: (Math.random()-0.5)*1.5,
        });
      }
    }
    // 홀드 중 키음 스템 볼륨 유지 (DJMAX식: 홀드하는 동안 소리 지속)
    if (usingStemMode) stemBoost(n.lane, 'perfect');
    if (gameMode === 'nano') nanoHit();
    // Combo ticks while holding
    if (!n._comboTimer) n._comboTimer = 0;
    n._comboTimer += dt;
    if (n._comboTimer >= 0.25) {
      n._comboTimer = 0;
      combo++; if (combo > maxCombo) maxCombo = combo;
      checkFeverActivate();
      const fm = fever ? 2 : 1;
      score += Math.floor(10 * fm * getKeyBonus());
      gauge = Math.min(1, gauge + curDiff.hpGain * 0.3 * fm);
    }
    // Key released — judge based on timing to endTime
    if (!keyHeld[n.lane]) {
      n.holding = false;
      n.holdComplete = true;
      stopHoldSound(n);
      const endDist = Math.abs(gameTime - n.endTime) * noteSpeed;
      const fm = fever ? 2 : 1;
      const hs = getHeightScale();
      if (endDist < 28 * hs) {
        score += Math.floor(200 * fm * getKeyBonus()); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + curDiff.hpGain * 1.3 * fm);
        judgmentText = 'PERFECT HOLD!'; judgmentTimer = 0.6; judgmentColor = '#ffd700'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'perfect');
        spawnParticles(getLaneX(n.lane), getHitY(), LANE_COLORS[n.lane], fever ? 10 : 6);
        playerAnim = 0.3;
      } else if (endDist < 52 * hs) {
        score += Math.floor(150 * fm * getKeyBonus()); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + curDiff.hpGain * fm);
        judgmentText = 'GREAT HOLD!'; judgmentTimer = 0.5; judgmentColor = '#00d4ff'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'great');
        playerAnim = 0.2;
      } else if (endDist < getHitWindow()) {
        score += Math.floor(80 * fm * getKeyBonus());
        judgmentText = 'OK'; judgmentTimer = 0.3; judgmentColor = '#44dd66'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'good');
      } else {
        nanoMiss();
        collected--; missed++; combo = 0; fever = false; feverTimer = 0;
        judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
      }
    }
    // Still holding when note ended — miss (홀드 유지 실패)
    if (n.holding && gameTime >= n.endTime + getHitWindow() / noteSpeed) {
      n.holding = false;
      n.holdComplete = true;
      n.missed = true;
      stopHoldSound(n);
      nanoMiss();
      collected--; missed++; combo = 0; fever = false; feverTimer = 0;
      judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
    }
  }

  // Miss detection — 활성 윈도우만 스캔 (nodeScanStart ~ 미래 컷오프)
  // nodes는 시간순 정렬. 시작점은 hit/missed가 전부인 앞쪽 prefix를 건너뜀.
  // 끝은 gameTime보다 많이 미래인 노트에서 break.
  const hitY = getHitY();
  const missCut = (getHitWindow() + 40 * getHeightScale()) / noteSpeed; // 초 단위 miss 컷오프
  const missTimeThresh = gameTime - missCut; // n.time < missTimeThresh 이면 MISS
  const futureCut = gameTime + 0.5; // 0.5초 이후 미래 노트는 스캔 불필요
  // 앞쪽 dead prefix 자동 advance
  while (nodeScanStart < nodes.length && (nodes[nodeScanStart].hit || nodes[nodeScanStart].missed)) {
    nodeScanStart++;
  }
  for (let i = nodeScanStart; i < nodes.length; i++) {
    const n = nodes[i];
    if (n.time > futureCut) break; // 미래 노트 — 이후 전부 미래
    if (n.hit || n.missed) continue;
    if (n.time < missTimeThresh) {
      n.missed = true;
      if (n.type === 'note' || n.type === 'hold') {
        // ★ debug: 자동 miss 순간 로그 — 최근 탭/LP 와 비교해서 씹힘 원인 진단.
        //   노트가 윈도우 지나갔는데 탭 있었으면 "씹힘". 탭 없었으면 유저가 안 친 것.
        if (window._dbg) {
          const now = performance.now();
          const _hw = getHitWindow();
          const windowMs = noteSpeed > 0 ? (_hw / noteSpeed) * 1000 : 100;
          const allRecent = (window._dbg.lanePressLog || []).filter(e => now - e.t < 1200);
          const sameLaneTaps = allRecent.filter(e => e.lane === n.lane);
          const otherLaneTaps = allRecent.filter(e => e.lane !== n.lane && now - e.t < 300);
          const hadTap = sameLaneTaps.length > 0;
          const missedByMs = (gameTime - n.time) * 1000;  // 노트 지난 시간 (ms)
          window._dbg.autoMissCount = (window._dbg.autoMissCount || 0) + 1;
          if (hadTap) window._dbg.suspiciousMissCount = (window._dbg.suspiciousMissCount || 0) + 1;
          // ★ 확정 씹힘 — 탭이 노트 hit window 안에 있었는데 miss. 이게 진짜 버그.
          if (hadTap) {
            const _closest = sameLaneTaps[sameLaneTaps.length - 1];
            const _offMs = ((_closest.gt || 0) - n.time) * 1000;
            if (Math.abs(_offMs) <= windowMs) {
              window._dbg.confirmedMissCount = (window._dbg.confirmedMissCount || 0) + 1;
            }
          }
          try {
            let msg = '[AUTO_MISS] L' + n.lane + ' noteAt=' + n.time.toFixed(2) + 's missedBy=' + missedByMs.toFixed(0) + 'ms (window=±' + windowMs.toFixed(0) + 'ms)';
            if (hadTap) {
              const closest = sameLaneTaps[sameLaneTaps.length - 1];
              const tapAgo = Math.round(now - closest.t);
              // ★ 탭 시점 gameTime (gt) vs 노트 시간 직접 비교 — 윈도우 내 였는지 판정.
              const tapGt = closest.gt || 0;
              const offsetMs = (tapGt - n.time) * 1000;  // 음수 = 너무 일찍, 양수 = 너무 늦게
              const withinWindow = Math.abs(offsetMs) <= windowMs;
              const verdict = withinWindow ? '🔥WINDOW내' : (Math.abs(offsetMs) > windowMs * 3 ? '너무먼탭' : '윈도우밖');
              msg += ' ⚠️ L' + n.lane + '탭 ' + sameLaneTaps.length + '개 (최근=' + tapAgo + 'ms전, offset=' + offsetMs.toFixed(0) + 'ms ' + verdict + ', src=' + (closest.src||'?') + ')';
              if (otherLaneTaps.length) {
                msg += ' | 다른 lane: ' + otherLaneTaps.map(e => 'L' + e.lane + '@' + Math.round(now - e.t) + 'ms').join(',');
              }
            } else {
              msg += otherLaneTaps.length ? ' (다른 lane 탭 ' + otherLaneTaps.length + '개: ' + otherLaneTaps.map(e => 'L' + e.lane + '@' + Math.round(now - e.t) + 'ms').join(',') + ')' : ' (탭 없음)';
            }
            console.log('%c' + msg, 'color:' + (hadTap ? '#ff3366;font-weight:bold' : '#888'));
          } catch(e){}
        }
        nanoMiss();
        combo = 0; missed++; fever = false; feverTimer = 0;
        if (!devInvincible && playMode === 'normal') gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain : 0.04));
        shakeX = (Math.random()-0.5)*8; shakeY = (Math.random()-0.5)*6;
        if (judgmentPriority < 2) { judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1; }
      }
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 250*dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Bursts
  for (let i = bursts.length-1; i >= 0; i--) {
    bursts[i].time += dt;
    if (bursts[i].time >= bursts[i].maxTime) bursts.splice(i, 1);
  }
  // Hold glows
  for (let i = holdGlows.length-1; i >= 0; i--) {
    holdGlows[i].time += dt;

          ctx.fillRect(sx-nw, sy-nh, nw*2, nh*2);
        }
      }
      // 기본 스킨 폴백일 때만 흰색 하이라이트 + ♪ (패턴 sprite 위엔 불필요)
      if (!_drewNote) {
        ctx.fillStyle='#fff'; ctx.globalAlpha=0.5;
        ctx.fillRect(sx-nw+_sz2, sy-nh+_sz2, _sz8, _sz6);
        ctx.globalAlpha=1;
        ctx.fillStyle='#fff'; ctx.font=`bold ${_sz11}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('\u266A', sx, sy+1);
      }
    }
  }

  // Missed flash — 최근에 missed 된 노트만 보이는 fade 구간. nodeScanStart 부터 역방향 스캔.
  // 미스 컷 시점: sy = hitY → n.time = gameTime. sy > hitY + _s80 (화면 하단 벗어남) 면 더 이상 볼 것 없음.
  const _visTimeCut = _s80 / noteSpeed; // 이만큼 시간 전 과거 노트만 유효
  for (let i = nodeScanStart - 1; i >= 0; i--) {
    const n = nodes[i];
    if (gameTime - n.time > _visTimeCut) break; // 너무 과거 — 이전은 전부 화면 밖
    if (!n.missed || n.type === 'trap') continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < hitY || sy > hitY + _s80) continue;
    const sx = getLaneX(n.lane);
    const fade = 1 - (sy - hitY) / _s80;
    if (fade > 0) {
      ctx.globalAlpha = fade*0.6; ctx.fillStyle='#ff4444';
      ctx.font=`bold ${sz(12)}px sans-serif`; ctx.textAlign='center';
      ctx.fillText('MISS', sx, sy-sz(15)); ctx.globalAlpha=1;
    }
  }
}

function renderButtons() {
  const lw = getLaneW(), lsx = getLaneStartX(), by = getBtnY(), bh = getBtnH();
  const _pad = sz(3), _r = sz(6);

  // ★ sakura_ui 장착 시 — PNG 있으면 tinted PNG 모드, 없으면 procedural + sakura 팔레트.
  const _uiSkin = _getUiPackSkin();
  const _keyBasePath = _uiSkin && _uiSkin.imagePaths && _uiSkin.imagePaths.keyBase;
  const _keyBaseImg = _keyBasePath ? skinImages[_keyBasePath] : null;
  const _sakuraMode = !!(_keyBaseImg && _keyBaseImg.complete && _keyBaseImg.naturalWidth > 0);
  const _sakuraUiActive = !!_uiSkin;
  // 키 색상: 8키 모두 동일 (deck_base wine 톤과 조화되는 medium pink).
  const _sakuraKeyColor = (_uiSkin && _uiSkin.palette && _uiSkin.palette.keyAccent) || '#ff7aa8';
  const _sakuraBody0 = (_uiSkin && _uiSkin.palette && _uiSkin.palette.keyBody0) || '#3a1f2e';
  const _sakuraBody1 = (_uiSkin && _uiSkin.palette && _uiSkin.palette.keyBody1) || '#28121f';
  const _sakuraHL    = (_uiSkin && _uiSkin.palette && _uiSkin.palette.keyHL)    || 'rgba(255,220,235,0.22)';

  for (let i = 0; i < laneCount; i++) {
    const bx = lsx + i * lw;
    const held = keyHeld[i];
    const col = LANE_COLORS[i];
    const x = bx + _pad, y = by + _pad, w = lw - _pad*2, h = bh - _pad;

    // ─── 사카라 모드: key.png + 단일 색 tint (레인 색 무관) ───
    if (_sakuraMode) {
      const tinted = _getTintedKeyCanvas(_sakuraKeyColor);
      if (tinted) {
        // 레인 크기 대비 1.2x 스케일 — PNG 내부 장식(코너 블라썸/만다라)이 outline 밖에 있어
        //   bbox 가 버튼 outline 보다 크므로, 이를 보정해 실제 버튼을 레인 크기로 맞춤.
        //   살짝 overflow 되지만 시각상 기본 버튼과 동일 사이즈로 보임.
        const _sScl = 1.2;
        const _skW = lw * _sScl, _skH = bh * _sScl;
        const _skX = bx - (_skW - lw) / 2;
        const _skY = by - (_skH - bh) / 2;
        ctx.drawImage(tinted, _skX, _skY, _skW, _skH);
        // LED 좌표 — PNG 측정값 기반: bbox 의 x=47.6%, y=23.6% (scaled 영역 기준)
        const _dcx = _skX + _skW * 0.476;
        const _dcy = _skY + _skH * 0.236;
        const _glowR = Math.min(_skW, _skH) * 0.22;
        if (held) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          const _glowG = ctx.createRadialGradient(_dcx, _dcy, 0, _dcx, _dcy, _glowR);
          _glowG.addColorStop(0, col + 'ee');
          _glowG.addColorStop(0.4, col + '77');
          _glowG.addColorStop(1, col + '00');
          ctx.fillStyle = _glowG;
          ctx.beginPath(); ctx.arc(_dcx, _dcy, _glowR, 0, Math.PI*2); ctx.fill();
          // 중심 흰 highlight
          const _wG = ctx.createRadialGradient(_dcx, _dcy, 0, _dcx, _dcy, _glowR*0.3);
          _wG.addColorStop(0, 'rgba(255,255,255,0.95)');
          _wG.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = _wG;
          ctx.beginPath(); ctx.arc(_dcx, _dcy, _glowR*0.3, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
        // 빈 입력 플래시 — 풀 레인 사이즈에 맞춤
        const _efAgeS = performance.now() - _lastEmptyFlash[i];
        if (_efAgeS < 200) {
          const _efAS = 0.6 * (1 - _efAgeS / 200);
          ctx.fillStyle = `rgba(255,50,50,${_efAS})`;
          rrFill(bx, by, lw, bh, _r);
          ctx.strokeStyle = `rgba(255,80,80,${_efAS})`; ctx.lineWidth = 2;
          rrStroke(bx, by, lw, bh, _r);
        }
        // PC 라벨
        if (!isMobile) {
          ctx.font = `bold ${sz(14)}px sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = held ? '#fff' : 'rgba(255,235,245,0.65)';
          ctx.fillText(getLaneLabel(i), bx + lw/2, by + bh * 0.82);
        }
        continue;
      }
      // tint 생성 실패 → procedural fallback
    }

    // ★ sakura_ui + PNG 없을 때: wine/pink 팔레트로 procedural key 렌더. 레인색 대신 단일 accent 사용.
    const _keyCol = _sakuraUiActive ? _sakuraKeyColor : col;
    if (held) {
      // ===== 눌림 — 키가 살짝 들어간 느낌 =====
      if (_sakuraUiActive) {
        // 벚꽃 눌림: wine body 가 더 포화되고 accent 빛남
        const _pgrad = ctx.createLinearGradient(0, y, 0, y + h);
        _pgrad.addColorStop(0, _sakuraBody0);
        _pgrad.addColorStop(0.5, _sakuraBody1);
        _pgrad.addColorStop(1, '#180810');
        ctx.fillStyle = _pgrad;
        rrFill(x, y, w, h, _r);
        // 상단 pink accent 강하게
        ctx.fillStyle = _sakuraKeyColor + 'ee';
        ctx.fillRect(x + _r, y, w - _r*2, sz(4));
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(x + sz(2), y + sz(6), w - sz(4), sz(2));
        ctx.strokeStyle = _sakuraKeyColor + 'dd'; ctx.lineWidth = 2;
        rrStroke(x, y, w, h, _r);
      } else {
        const _pgrad = ctx.createLinearGradient(0, y, 0, y + h);
        _pgrad.addColorStop(0, col + '66');
        _pgrad.addColorStop(0.5, col + '33');
        _pgrad.addColorStop(1, col + '11');
        ctx.fillStyle = _pgrad;
        rrFill(x, y, w, h, _r);
        ctx.fillStyle = col + 'dd';
        ctx.fillRect(x + _r, y, w - _r*2, sz(4));
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(x + sz(2), y + sz(6), w - sz(4), sz(2));
        ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 2;
        rrStroke(x, y, w, h, _r);
      }
      // 센서 점 — 팔레트 공통 (_keyCol 사용)
      const _dcxH = bx + lw/2, _dcyH = by + Math.min(bh * 0.55, sz(44));
      const _drH = sz(4);
      ctx.fillStyle = _keyCol + '66';
      ctx.beginPath(); ctx.arc(_dcxH, _dcyH, _drH + sz(3), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(_dcxH, _dcyH, _drH, 0, Math.PI*2); ctx.fill();
    } else {
      // ===== 대기 =====
      if (_sakuraUiActive) {
        // 1) wine body 그라데이션
        const _kgrad = ctx.createLinearGradient(0, y, 0, y + h);
        _kgrad.addColorStop(0,    _sakuraBody0);       // #3a1f2e wine
        _kgrad.addColorStop(0.45, _sakuraBody1);       // #28121f darker
        _kgrad.addColorStop(1,    '#170810');          // 바닥 거의 검정
        ctx.fillStyle = _kgrad;
        rrFill(x, y, w, h, _r);
        // 2) 상단 엣지 pink 하이라이트
        ctx.fillStyle = _sakuraHL;
        ctx.fillRect(x + _r, y + 1, w - _r*2, sz(2));
        // 3) pink accent 스트라이프 (단일 색, 레인별 구분 없음)
        ctx.fillStyle = _sakuraKeyColor + '88';
        ctx.fillRect(x + _r + sz(2), y + sz(7), w - _r*2 - sz(4), sz(2));
        ctx.fillStyle = _sakuraKeyColor + '33';
        ctx.fillRect(x + _r + sz(2), y + sz(10), w - _r*2 - sz(4), 1);
        // 4) 하단 그림자
        const _sgrad = ctx.createLinearGradient(0, y + h - sz(8), 0, y + h);
        _sgrad.addColorStop(0, 'rgba(0,0,0,0)');
        _sgrad.addColorStop(1, 'rgba(0,0,0,0.5)');
        ctx.fillStyle = _sgrad;
        ctx.fillRect(x + sz(1), y + h - sz(8), w - sz(2), sz(8));
        // 5) pink 톤 테두리
        ctx.strokeStyle = 'rgba(255,140,180,0.4)'; ctx.lineWidth = 1;
        rrStroke(x, y, w, h, _r);
      } else {
        // 기본 메탈릭 (sakura_ui 미장착)
        const _kgrad = ctx.createLinearGradient(0, y, 0, y + h);
        _kgrad.addColorStop(0,    '#3a3a44');
        _kgrad.addColorStop(0.35, '#26262e');
        _kgrad.addColorStop(1,    '#12121a');
        ctx.fillStyle = _kgrad;
        rrFill(x, y, w, h, _r);
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fillRect(x + _r, y + 1, w - _r*2, sz(2));
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(x + _r, y + sz(3), w - _r*2, 1);
        ctx.fillStyle = col + '99';
        ctx.fillRect(x + _r + sz(2), y + sz(7), w - _r*2 - sz(4), sz(2));
        ctx.fillStyle = col + '44';
        ctx.fillRect(x + _r + sz(2), y + sz(10), w - _r*2 - sz(4), 1);
        const _sgrad = ctx.createLinearGradient(0, y + h - sz(8), 0, y + h);
        _sgrad.addColorStop(0, 'rgba(0,0,0,0)');
        _sgrad.addColorStop(1, 'rgba(0,0,0,0.45)');
        ctx.fillStyle = _sgrad;
        ctx.fillRect(x + sz(1), y + h - sz(8), w - sz(2), sz(8));
        ctx.strokeStyle = 'rgba(85,85,95,0.7)'; ctx.lineWidth = 1;
        rrStroke(x, y, w, h, _r);
      }
      // 중앙 원형 센서 점 — 팔레트 공통 (_keyCol)
      const _dcx = bx + lw/2, _dcy = by + Math.min(bh * 0.55, sz(44));
      const _dr = sz(4);
      ctx.fillStyle = _keyCol + '33';
      ctx.beginPath(); ctx.arc(_dcx, _dcy, _dr + sz(2), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = _keyCol + 'bb';
      ctx.beginPath(); ctx.arc(_dcx, _dcy, _dr, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(_dcx - _dr*0.3, _dcy - _dr*0.3, _dr*0.35, 0, Math.PI*2); ctx.fill();
    }

    // 빈 입력 플래시 (노트 없이 눌렸을 때 빨간 깜박)
    const _efAge = performance.now() - _lastEmptyFlash[i];
    if (_efAge < 200) {
      const _efA = 0.6 * (1 - _efAge / 200);
      ctx.fillStyle = `rgba(255,50,50,${_efA})`;
      rrFill(x, y, w, h, _r);
      ctx.strokeStyle = `rgba(255,80,80,${_efA})`; ctx.lineWidth = 2;
      rrStroke(x, y, w, h, _r);
    }

    // Label — PC 만. 센서 점 아래쪽으로 이동 (겹침 방지).
    if (!isMobile) {
      ctx.font = `bold ${sz(14)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = held ? '#fff' : (_sakuraUiActive ? 'rgba(255,190,210,0.65)' : col + '88');
      ctx.fillText(getLaneLabel(i), bx + lw/2, by + bh * 0.82);
    }
  }
}

function rrFill(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function rrStroke(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function renderCharacter() {}

// ★ 히트 이펙트 스킨 활성 여부 + 키별 로드된 이미지 맵 반환.
//   낱개 PNG 방식 — skin.imagePaths 의 각 key 가 곧 이미지 식별자. 하나라도 로드되지
//   않았으면 그 key 는 undefined 로 빠짐 → 렌더 쪽에서 optional chaining 으로 처리.
function _hitFxData() {
  if (!currentHitFxSkin) return null;
  const s = SKINS[currentHitFxSkin];
  if (!s || !s.imagePaths) return null;
  const imgs = {};
  let anyLoaded = false;
  for (const k in s.imagePaths) {
    const img = skinImages[s.imagePaths[k]];
    if (img && img._ok) { imgs[k] = img; anyLoaded = true; }
  }
  if (!anyLoaded) return null;
  return { skin: s, imgs };
}
// ★ 부분 이미지 헬퍼 — key 찾고 있으면 drawImage 전체, 없으면 false
function _hitFxDraw(fx, key, dx, dy, dw, dh) {
  const img = fx && fx.imgs[key];
  if (!img) return false;
  ctx.drawImage(img, dx, dy, dw, dh);
  return true;
}

function renderParticles() {
  const fx = _hitFxData();
  for (const p of particles) {
    const lifeRatio = Math.max(0, p.life/p.maxLife);
    ctx.globalAlpha = lifeRatio;
    if (p.sprite && fx) {
      const img = fx.imgs[p.spriteKey];
      if (img) {
        const s = p.size * (0.6 + 0.4 * lifeRatio);
        ctx.save();
        ctx.translate(p.x, p.y);
        if (p.rotVel !== undefined) ctx.rotate((p.rot || 0) + p.rotVel * (p.maxLife - p.life));
        ctx.drawImage(img, -s/2, -s/2, s, s);
        ctx.restore();
        continue;
      }
    }
    // ★ 방울(drop) — 원형, 개별 랜덤 크기. 홀드 중 판정선 아래로 흘러내리는 연출용.
    if (p.kind === 'drop') {
      ctx.fillStyle = p.color;
      const s = p.size * (0.6 + 0.4 * lifeRatio);
      ctx.beginPath();
      ctx.arc(p.x, p.y, s, 0, Math.PI*2);
      ctx.fill();
      continue;
    }
    ctx.fillStyle = p.color;
    const s = p.size * lifeRatio;
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

function renderBursts() {
  const fx = _hitFxData();
  for (const b of bursts) {
    const t = b.time / b.maxTime;
    const alpha = 1 - t;
    ctx.save();
    ctx.translate(b.x, b.y);

    if (fx) {
      // ★ 벚꽃 sprite 버스트 — 링 2개(핑크+금) + 코어 플래시 + 스파클 방사
      //   각 key 이미지 없으면 해당 요소만 스킵 (일부만 올라와도 점진적 동작).
      // 사이즈 조정 — PC 도 약간 줄임, 모바일은 추가 축소 + 알파 감쇠(체커 희석).
      const _mobHF = isMobile ? 0.55 : 0.85;          // 일반 (sparkle/petal)
      const _mobRF = isMobile ? 0.40 : 0.75;          // ring/core — 모바일 fill rate 부담 축소 (링 확대 이후)
      const _mobAF = isMobile ? 0.55 : 0.80;          // ring/core 알파 감쇠
      for (let r = 0; r < 2; r++) {
        const delay = r * 0.1;
        const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
        if (rt <= 0 || rt >= 1) continue;
        // ★ 링 크기 확대 — 유저 요청으로 다시 크게 (기존 100 → 약 180).
        const size = (28 + r * 14 + rt * 58) * b.size * _mobRF;
        const ringImg = r === 0 ? fx.imgs.ringPink : fx.imgs.ringGold;
        if (!ringImg) continue;
        ctx.globalAlpha = (1 - rt) * 0.9 * _mobAF;
        ctx.drawImage(ringImg, -size/2, -size/2, size, size);
      }
      if (t < 0.45 && fx.imgs.coreFlash) {
        const ft = t / 0.45;
        const flashSize = (60 + ft * 120) * b.size * _mobRF;
        ctx.globalAlpha = (1 - ft) * _mobAF;
        ctx.drawImage(fx.imgs.coreFlash, -flashSize/2, -flashSize/2, flashSize, flashSize);
      }
      if (fx.imgs.sparkle) {
        const sparkCount = Math.max(4, Math.floor(b.sparks * 0.5));
        for (let i = 0; i < sparkCount; i++) {
          const a = Math.PI * 2 * i / sparkCount + t * 0.8;
          const dist = (20 + 80 * t) * b.size * _mobHF;
          const sx = Math.cos(a) * dist;
          const sy = Math.sin(a) * dist;
          const ss = (22 + (i * 7) % 14) * (1 - t) * b.size * _mobHF;
          ctx.globalAlpha = alpha * 0.95;
          ctx.drawImage(fx.imgs.sparkle, sx - ss/2, sy - ss/2, ss, ss);
        }
      }
      ctx.restore();
      continue;
    }

    // Expanding rings with thickness
    for (let r = 0; r < b.rings; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
      if (rt <= 0 || rt >= 1) continue;
      const radius = (25 + r * 25) * rt * b.size;
      const ringAlpha = (1 - rt) * 0.85;
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = r % 2 === 0 ? b.color1 : b.color2;
      ctx.lineWidth = (5 - r * 0.6) * (1 - rt) * b.size;
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
    }

    // Big center flash / shockwave
    if (t < 0.4) {
      const ft = t / 0.4;
      const flashR = 50 * b.size * ft;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, flashR);
      grd.addColorStop(0, '#ffffff');
      grd.addColorStop(0.3, b.color2);
      grd.addColorStop(1, b.color1 + '00');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0, 0, flashR, 0, Math.PI * 2); ctx.fill();
    }

    // Streaking rays
    const rayCount = Math.floor(b.sparks * 0.5);
    for (let i = 0; i < rayCount; i++) {
      const a = Math.PI * 2 * i / rayCount;
      const dist = (30 + 100 * t) * b.size;
      const len = (15 + 20 * (1 - t)) * b.size;
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = b.color2;
      ctx.lineWidth = 2 * (1 - t) * b.size;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * (dist - len), Math.sin(a) * (dist - len));
      ctx.lineTo(Math.cos(a) * dist, Math.sin(a) * dist);
      ctx.stroke();
    }

    // Diamond sparks radiating outward
    const sparkCount = Math.floor(b.sparks * 0.7);
    for (let i = 0; i < sparkCount; i++) {
      const a = Math.PI * 2 * i / sparkCount + t * 0.5;
      const dist = (20 + 90 * t) * b.size;
      const sx = Math.cos(a) * dist;
      const sy = Math.sin(a) * dist;
      const ss = (4 + Math.random() * 3) * (1 - t) * b.size;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = i % 2 === 0 ? b.color2 : b.color1;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a + t * 3);
      ctx.fillRect(-ss/2, -ss/2, ss, ss);
      ctx.restore();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ★ 벚꽃 홀드 글로우 배경 — 판정선 하단 핑크 radial glow.
//   파티클(sparkle/drift/core_flash)보다 한 단계 아래 뎁스에 그려지도록 renderParticles 직전 호출.
//   sakura_fx 장착 시만 활성. (non-sakura 는 renderHoldGlows 가 자체 radial 글로우 그림)
function renderSakuraHoldGlowBg() {
  const fx = _hitFxData();
  if (!fx) return;
  for (const g of holdGlows) {
    const t = g.time / g.maxTime;
    const alpha = (1 - t);
    const hw = g.w / 2;
    ctx.save();
    ctx.translate(g.x, g.y);
    const _mobG = isMobile ? 0.7 : 1.0;
    const glowH = _s80 * (0.45 + t * 0.55) * _mobG;
    ctx.globalAlpha = alpha * 0.65;
    const grd = ctx.createRadialGradient(0, glowH*0.1, 0, 0, glowH*0.15, hw * (1.3 + t * 0.8) * _mobG);
    grd.addColorStop(0.0, '#ffe6f0');
    grd.addColorStop(0.25, '#ff7aa8');
    grd.addColorStop(0.65, 'rgba(255,90,140,0.5)');
    grd.addColorStop(1.0, 'rgba(255,90,140,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, glowH * 0.15, hw * (1.4 + t * 0.9) * _mobG, glowH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderHoldGlows() {
  const fx = _hitFxData();
  for (const g of holdGlows) {
    const t = g.time / g.maxTime;
    const alpha = (1 - t);
    const hw = g.w / 2;
    ctx.save();
    ctx.translate(g.x, g.y);

    if (fx && fx.imgs.holdLineGlow) {
      // ★ 벚꽃 라인 글로우 — 판정선 중앙 sprite 1장만.
      //   아래 영역의 "흘러내림" 은 spawnHoldParticles 의 petal 입자가 담당 (자연스러움).
      const _mobG = isMobile ? 0.65 : 0.85;
      const w = hw * 2 * (1.6 + t * 1.0) * _mobG;
      const h = _s40 * (1 - t * 0.2) * _mobG;
      ctx.globalAlpha = alpha * 0.95;
      ctx.drawImage(fx.imgs.holdLineGlow, -w/2, -h/2, w, h);
      ctx.restore();
      continue;
    }

    // Large fire glow expanding upward
    const glowH = _s90 * (0.4 + t * 0.6);
    ctx.globalAlpha = alpha * 0.7;
    const grd = ctx.createRadialGradient(0, -glowH*0.2, 0, 0, -glowH*0.3, hw * (1.2 + t));
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.2, g.color);
    grd.addColorStop(0.6, g.color + '88');
    grd.addColorStop(1, g.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -glowH * 0.25, hw * (1.3 + t * 0.8), glowH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core — 모바일 skip (createRadialGradient 2회째 제거)
    if (!isMobile) {
      ctx.globalAlpha = alpha * 0.9;
      const coreGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 0.6);
      coreGrd.addColorStop(0, '#ffffff');
      coreGrd.addColorStop(1, '#ffffff00');
      ctx.fillStyle = coreGrd;
      ctx.beginPath();
      ctx.ellipse(0, -5, hw * 0.6, 15, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Horizontal shockwave line
    const lineW = hw * (1.5 + t * 1.5);
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(-lineW, 0);
    ctx.lineTo(lineW, 0);
    ctx.stroke();

    // Side flare streaks — 모바일 skip (beginPath/stroke 2회 절약)
    if (!isMobile) {
      ctx.globalAlpha = alpha * 0.5;
      ctx.strokeStyle = g.color;
      ctx.lineWidth = 2 * (1 - t);
      for (let s = -1; s <= 1; s += 2) {
        ctx.beginPath();
        ctx.moveTo(s * hw * 0.5, 0);
        ctx.lineTo(s * lineW * 1.2, -20 - 30 * t);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderJudgment() {
  if (judgmentTimer <= 0) return;
  const scale = Math.max(0.8, 1 + (0.5 - judgmentTimer)*0.3);
  ctx.save();
  ctx.translate(W/2, getHitY() - _s40);
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, judgmentTimer*3);
  ctx.font = `bold ${sz(22)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle = judgmentColor;
  if (!isMobile) { ctx.shadowColor=judgmentColor; ctx.shadowBlur=10; }
  ctx.fillText(judgmentText, 0, 0);
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
}

function renderUI() {
  const song = curSong;
  // HP 바 / 속도 컨트롤 기준 좌표 (프리스타일에서도 속도 컨트롤 사용)

  const _spBlockBottom = _spBlockTop + _spBlockH;
  // === HP(선택) + 배속 공유 컨테이너 — 왼쪽만 사다리꼴 캡, 오른쪽은 외곽 프레임 좌측 선과 공유 ===

  //   ★ 우측 path 를 outerX 에 명시 고정 → _gcx 가 모바일에서 왼쪽 clamp 에 걸려도 레일과 항상 flush.

    // UI 팩 테마 — 컨테이너 body / 테두리 색 오버라이드

    // ★ 벚꽃 스킨: 직사각형 컨테이너 — 좌측 상/하 꼭지점만 둥글게. 단일 로즈 stroke.

        ctx.lineTo(_rectX + _rR, _rectY + _rectH);              // bottom → toward left-bottom

      };

      ctx.beginPath();

      ctx.fillText('중복키입니다', panelX + sz(16) + _laneW + sz(8), ry + (rowH - sz(4))/2);
    }

    // 키 버튼
    const kbW = Math.min(sz(90), panelW * 0.3), kbH = sz(28);
    const kbX = panelX + panelW - kbW - sz(8), kbY = ry + (rowH - sz(4) - kbH) / 2;
    ctx.fillStyle = isBinding ? LANE_COLORS[i] + '33' : 'rgba(255,255,255,0.06)';
    rrFill(kbX, kbY, kbW, kbH, sz(6));
    ctx.strokeStyle = isBinding ? LANE_COLORS[i] : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isBinding ? 2 : 1;
    rrStroke(kbX, kbY, kbW, kbH, sz(6));
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(13)}px sans-serif`;
    if (isBinding) {
      const blink = Math.floor(Date.now()/400)%2===0;
      ctx.fillStyle = blink ? '#fff' : LANE_COLORS[i];
      ctx.textBaseline = 'middle';
      ctx.fillText('키 입력...', kbX + kbW/2, kbY + kbH/2);
    } else {
      ctx.fillStyle = LANE_COLORS[i]; ctx.textBaseline = 'middle';
      ctx.fillText(getLaneLabel(i), kbX + kbW/2, kbY + kbH/2);
    }
  }

  // 초기화 버튼
  const resetY = startY + laneCount * rowH + sz(10);
  const resetW = Math.min(sz(120), panelW * 0.4), resetH = sz(30);
  const resetX = (W - resetW) / 2;
  if (!_mobileSettings) {
    ctx.fillStyle = 'rgba(255,100,100,0.08)'; rrFill(resetX, resetY, resetW, resetH, sz(6));
    ctx.strokeStyle = 'rgba(255,100,100,0.4)'; ctx.lineWidth = 1; rrStroke(resetX, resetY, resetW, resetH, sz(6));
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,100,100,0.8)';
    ctx.textBaseline = 'middle';
    ctx.fillText('기본값 복원', W/2, resetY + resetH/2);
  }

  // ===== 볼륨 설정 =====
  const volY = _mobileSettings ? (modeY + sz(6)) : (resetY + resetH + sz(14));
  const sliderW = Math.min(panelW - sz(16), sz(240));
  const sliderX = (W - sliderW) / 2;
  const sliderH = sz(5), knobR = sz(8), volRowH = sz(38);

  // BGM 볼륨
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(12)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('음악 재생', sliderX, volY + sz(10));
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volBgm * 100) + '%', sliderX + sliderW, volY + sz(10));
  const bgmTrackY = volY + sz(20);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, bgmTrackY, sliderW, sliderH, sz(2));
  const bgmFill = sliderW * volBgm;
  ctx.fillStyle = '#cc44ff44'; rrFill(sliderX, bgmTrackY, bgmFill, sliderH, sz(2));
  const bgmKnobX = sliderX + bgmFill;
  ctx.beginPath(); ctx.arc(bgmKnobX, bgmTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#cc44ff'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // SFX 볼륨
  const sfxY = volY + volRowH;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(12)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('효과음', sliderX, sfxY + sz(10));
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volSfx * 100) + '%', sliderX + sliderW, sfxY + sz(10));
  const sfxTrackY = sfxY + sz(20);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, sfxTrackY, sliderW, sliderH, sz(2));
  const sfxFill = sliderW * volSfx;
  ctx.fillStyle = '#44dd6644'; rrFill(sliderX, sfxTrackY, sfxFill, sliderH, sz(2));
  const sfxKnobX = sliderX + sfxFill;
  ctx.beginPath(); ctx.arc(sfxKnobX, sfxTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#44dd66'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // ===== 게임 모드 선택 =====
  const gameModeY = sfxY + volRowH + sz(8);
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('조작 모드', sliderX, gameModeY);
  const gmBtnW = (sliderW - sz(8)) / 2, gmBtnH = sz(28);
  const gmBtnY = gameModeY + sz(14);
  // 리듬모드 버튼
  const rSel = gameMode === 'rhythm';
  ctx.fillStyle = rSel ? '#00d4ff22' : 'rgba(255,255,255,0.04)';
  rrFill(sliderX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.strokeStyle = rSel ? '#00d4ff' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = rSel ? 2 : 1;
  rrStroke(sliderX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(11)}px sans-serif`;
  ctx.fillStyle = rSel ? '#00d4ff' : 'rgba(255,255,255,0.4)';
  ctx.fillText('리듬모드', sliderX + gmBtnW/2, gmBtnY + gmBtnH/2);
  // 나노모드 버튼
  const nSel = gameMode === 'nano';
  const nBtnX = sliderX + gmBtnW + sz(8);
  ctx.fillStyle = nSel ? '#ffd70022' : 'rgba(255,255,255,0.04)';
  rrFill(nBtnX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.strokeStyle = nSel ? '#ffd700' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = nSel ? 2 : 1;
  rrStroke(nBtnX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.fillStyle = nSel ? '#ffd700' : 'rgba(255,255,255,0.4)';
  ctx.fillText('나노모드', nBtnX + gmBtnW/2, gmBtnY + gmBtnH/2);
  // 설명
  ctx.font = `${sz(9)}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText(gameMode === 'nano' ? '보다 정교한 연주를 즐기실 분들에게 추천드립니다' : '음악의 순수한 리듬을 즐기실 수 있습니다', W/2, gmBtnY + gmBtnH + sz(8));
  // 클릭 영역 저장
  window._modeBtnRhythm = { x: sliderX, y: gmBtnY, w: gmBtnW, h: gmBtnH };
  window._modeBtnNano = { x: nBtnX, y: gmBtnY, w: gmBtnW, h: gmBtnH };

  // ===== 계정 정보 =====
  const acctY = gmBtnY + gmBtnH + sz(24);
  const acctBoxW = panelW, acctBoxH = sz(50);
  const acctBoxX = (W - acctBoxW) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.03)'; rrFill(acctBoxX, acctY, acctBoxW, acctBoxH, sz(8));
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; rrStroke(acctBoxX, acctY, acctBoxW, acctBoxH, sz(8));
  // 닉네임 (크게)
  ctx.font = `bold ${sz(16)}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(currentUser || '', W / 2, acctY + sz(22));
  // 로그인 방식 태그 (Kplay 전용)
  ctx.font = `bold ${sz(10)}px sans-serif`;
  ctx.fillStyle = '#9e7aff';
  ctx.fillText('Kplay', W / 2, acctY + sz(40));

  // 로그아웃 + 계정 삭제 버튼
  const actY = acctY + acctBoxH + sz(8);
  const actBtnW = Math.min(sz(110), panelW * 0.35), actBtnH = sz(30), actGap = sz(10);
  {
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    // 로그아웃
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; rrStroke(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('\uB85C\uADF8\uC544\uC6C3', actStartX + actBtnW / 2, actY + actBtnH / 2);
    // 계정 삭제
    const delX = actStartX + actBtnW + actGap;
    ctx.fillStyle = 'rgba(255,50,50,0.08)'; rrFill(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(255,50,50,0.5)'; ctx.lineWidth = 1; rrStroke(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.font = `bold ${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.fillText('\uACC4\uC815 \uC0AD\uC81C', delX + actBtnW / 2, actY + actBtnH / 2);
  }

  // 타이틀 화면으로 돌아가기 버튼 (모드 변경용)
  const ttY = actY + actBtnH + sz(10);
  const ttW = Math.min(sz(240), panelW * 0.8), ttH = sz(32);
  const ttX = (W - ttW) / 2;
  ctx.fillStyle = 'rgba(140,100,255,0.12)'; rrFill(ttX, ttY, ttW, ttH, sz(8));
  ctx.strokeStyle = 'rgba(160,120,255,0.5)'; ctx.lineWidth = 1; rrStroke(ttX, ttY, ttW, ttH, sz(8));
  ctx.font = `bold ${sz(12)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(200,180,255,0.9)';
  ctx.fillText('타이틀 화면으로 (모드 변경)', ttX + ttW / 2, ttY + ttH / 2);
  ctx.textBaseline = 'alphabetic';
  // 저장용 (스크롤 반영된 위치로 저장)
  window._settingsTitleBtn = { x: ttX, y: ttY, w: ttW, h: ttH };

  // 콘텐츠 총 높이 저장 후 클립/스크롤 종료
  settingsContentH = (ttY + ttH) - (popY + sz(4));
  ctx.restore();
  // 스크롤 범위 클램프
  const _scrollMax = Math.max(0, settingsContentH - _scrollClipH + sz(20));
  if (settingsScrollY > _scrollMax) settingsScrollY = _scrollMax;
  if (settingsScrollY < 0) settingsScrollY = 0;
  // 스크롤바 (콘텐츠 오버플로우 시)
  if (_scrollMax > 0) {
    const sbX = popX + popW - sz(6), sbY = _scrollClipY + sz(4), sbH = _scrollClipH - sz(8);
    const thumbH = Math.max(sz(30), sbH * _scrollClipH / (settingsContentH + sz(20)));
    const thumbY = sbY + (sbH - thumbH) * (settingsScrollY / _scrollMax);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rrFill(sbX - 2, sbY, 4, sbH, 2);
    ctx.fillStyle = 'rgba(160,130,255,0.6)';
    rrFill(sbX - 2, thumbY, 4, thumbH, 2);
  }

  // 계정 삭제 확인 팝업
  if (deleteAccountPopup) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    const dpW = Math.min(sz(300), W * 0.85), dpH = sz(180);
    const dpX = (W - dpW) / 2, dpY = (H - dpH) / 2;
    ctx.fillStyle = 'rgba(30,10,10,0.97)'; rrFill(dpX, dpY, dpW, dpH, sz(14));
    ctx.strokeStyle = 'rgba(255,50,50,0.6)'; ctx.lineWidth = 2; rrStroke(dpX, dpY, dpW, dpH, sz(14));

    ctx.font = `bold ${sz(16)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('\uACC4\uC815 \uC0AD\uC81C', W / 2, dpY + sz(35));
    ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('\uBAA8\uB4E0 \uAE30\uB85D, \uB7AD\uD0B9, \uC810\uC218, \uC5C5\uC801\uC774', W / 2, dpY + sz(60));
    ctx.fillStyle = '#ff6666'; ctx.font = `bold ${sz(12)}px sans-serif`;
    ctx.fillText('\uC601\uAD6C\uC801\uC73C\uB85C \uC0AD\uC81C\uB429\uB2C8\uB2E4.', W / 2, dpY + sz(78));
    ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('\uC774 \uC791\uC5C5\uC740 \uB418\uB3CC\uB9B4 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.', W / 2, dpY + sz(96));

    const dbW = sz(90), dbH = sz(34), dbGap = sz(14);
    const dcX = W / 2 - dbW - dbGap / 2, ddX = W / 2 + dbGap / 2;
    const dbY = dpY + dpH - sz(50);
    // 취소
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(dcX, dbY, dbW, dbH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; rrStroke(dcX, dbY, dbW, dbH, sz(8));
    ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\uCDE8\uC18C', dcX + dbW / 2, dbY + dbH / 2);
    // 삭제
    ctx.fillStyle = 'rgba(255,30,30,0.15)'; rrFill(ddX, dbY, dbW, dbH, sz(8));
    ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 1.5;
    ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 6;
    rrStroke(ddX, dbY, dbW, dbH, sz(8)); ctx.shadowBlur = 0;
    ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = '#ff3333';
    ctx.fillText('\uC0AD\uC81C', ddX + dbW / 2, dbY + dbH / 2);
    ctx.textBaseline = 'alphabetic';
  }

  // Kplay 연동/전환 팝업 제거됨 (2026-04-15) — 게스트 제거로 불필요
}

function handleSettingsClick(mx, my) {
  // Kplay 연동/전환 팝업 제거됨 (2026-04-15)
  // 계정 삭제 팝업이 열려있으면 최우선 처리
  if (deleteAccountPopup) {
    const dpW = Math.min(sz(300), W * 0.85), dpH = sz(180);
    const dpX = (W - dpW) / 2, dpY = (H - dpH) / 2;
    const dbW = sz(90), dbH = sz(34), dbGap = sz(14);
    const dcX = W / 2 - dbW - dbGap / 2, ddX = W / 2 + dbGap / 2;
    const dbY = dpY + dpH - sz(50);
    if (hitTest(mx, my, dcX, dbY, dbW, dbH)) { deleteAccountPopup = false; return; }
    if (hitTest(mx, my, ddX, dbY, dbW, dbH)) { deleteAccount(); return; }
    return;
  }
  const popW = Math.min(sz(340), W*0.92), popH = Math.min(H*0.94, sz(620));
  const popX = (W - popW) / 2, popY = (H - popH) / 2;
  if (!hitTest(mx, my, popX, popY, popW, popH)) { settingsOpen = false; settingsBindingLane = -1; deleteAccountPopup = false; return; }
  // 닫기 버튼
  const bbW = sz(30), bbH = sz(24), bbX = popX + popW - bbW - sz(6), bbY = popY + sz(6);
  if (hitTest(mx, my, bbX, bbY, bbW, bbH)) { settingsOpen = false; settingsBindingLane = -1; deleteAccountPopup = false; return; }

  // 스크롤 영역 내부는 my + scrollY 사용
  const mys = my + settingsScrollY;

  // 타이틀 화면으로 돌아가기 (모드 변경)
  if (window._settingsTitleBtn) {
    const tb = window._settingsTitleBtn;
    if (hitTest(mx, mys, tb.x, tb.y, tb.w, tb.h)) {
      settingsOpen = false; settingsBindingLane = -1;
      stopSongAudio(); stopPreview(); stopRankingBgm(); stopShopBgm(); stopAchievementBgm(); stopInventoryBgm();
      transitionTo('title', () => { startTitleBgm(); });
      return;
    }
  }

  // 게임 모드 토글
  if (window._modeBtnRhythm && hitTest(mx, mys, _modeBtnRhythm.x, _modeBtnRhythm.y, _modeBtnRhythm.w, _modeBtnRhythm.h)) {
    gameMode = 'rhythm'; saveGameMode(); return;
  }
  if (window._modeBtnNano && hitTest(mx, mys, _modeBtnNano.x, _modeBtnNano.y, _modeBtnNano.w, _modeBtnNano.h)) {
    gameMode = 'nano'; saveGameMode(); return;
  }

  // 4~8키 모드 토글 (PC만)
  const modeY = popY + sz(58);
  const modeBtnH = sz(26);
  if (!isMobile) {
    const modeKeys = [4, 5, 6, 7, 8];
    const modeBtnW = sz(40), modeGap = sz(6);
    const modeTotalW = modeBtnW * modeKeys.length + modeGap * (modeKeys.length - 1);
    const modeX = (W - modeTotalW) / 2;
    for (let mi = 0; mi < modeKeys.length; mi++) {
      const bx = modeX + mi * (modeBtnW + modeGap);
      if (hitTest(mx, mys, bx, modeY, modeBtnW, modeBtnH) && laneCount !== modeKeys[mi]) {
        setLaneMode(modeKeys[mi]); settingsBindingLane = -1; return;
      }
    }
  }

  const panelW = Math.min(popW - sz(20), sz(300));
  const panelX = (W - panelW) / 2;
  const rowH = sz(laneCount >= 7 ? 32 : laneCount >= 6 ? 36 : 42);
  const startY = modeY + modeBtnH + sz(12);

  const _mobileSettingsC = isMobile;
  // 키 버튼 클릭 (모바일에서는 숨김)
  if (!_mobileSettingsC) for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const kbW = Math.min(sz(90), panelW * 0.3), kbH = sz(28);
    const kbX = panelX + panelW - kbW - sz(8), kbY = ry + (rowH - sz(4) - kbH) / 2;
    if (hitTest(mx, mys, kbX, kbY, kbW, kbH)) {
      settingsBindingLane = (settingsBindingLane === i) ? -1 : i;
      return;
    }
  }

  // 초기화 버튼
  const resetY = startY + laneCount * rowH + sz(10);
  const resetW = Math.min(sz(120), panelW * 0.4), resetH = sz(30);
  const resetX = (W - resetW) / 2;
  if (!_mobileSettingsC && hitTest(mx, mys, resetX, resetY, resetW, resetH)) {
    resetKeymap(); settingsBindingLane = -1; return;
  }

  // 볼륨 슬라이더
  const sliderW = Math.min(panelW - sz(16), sz(240));
  const sliderX = (W - sliderW) / 2;
  const volY = _mobileSettingsC ? (modeY + sz(6)) : (resetY + resetH + sz(14));
  const volRowH = sz(38), sliderHitH = sz(26);
  const bgmTrackY = volY + sz(20);
  const sfxTrackY = volY + volRowH + sz(20);
  if (mys >= bgmTrackY - sliderHitH/2 && mys <= bgmTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'bgm';
    volBgm = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applyBgmVol(); saveVolSettings(); return;
  }
  if (mys >= sfxTrackY - sliderHitH/2 && mys <= sfxTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'sfx';
    volSfx = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applySfxVol(); saveVolSettings(); return;
  }

  // 계정 정보 박스 + 버튼 (render와 동일한 Y 체인)
  const sfxY_click = volY + volRowH;
  const gameModeY_click = sfxY_click + volRowH + sz(8);
  const gmBtnY_click = gameModeY_click + sz(14);
  const gmBtnH_click = sz(28);
  const acctY_click = gmBtnY_click + gmBtnH_click + sz(24);
  const acctBoxH = sz(50);
  const actY = acctY_click + acctBoxH + sz(8);
  const actBtnW = Math.min(sz(110), panelW * 0.35), actBtnH = sz(30), actGap = sz(10);
  {
    // Kplay: 로그아웃 + 계정 삭제
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    if (hitTest(mx, mys, actStartX, actY, actBtnW, actBtnH)) { logoutUser(); return; }
    const delX = actStartX + actBtnW + actGap;
    if (hitTest(mx, mys, delX, actY, actBtnW, actBtnH)) { deleteAccountPopup = true; return; }
  }
}

// ===== TITLE =====
let titleParticles = [];
function spawnTitleParticles() {
  const now = Date.now();
  // Ambient floating particles — 안전 영역 포함 전체 화면에서 발생/이동
  if (titleParticles.length < 40) {
    const hue = 240 + Math.random() * 80; // blue-purple range
    titleParticles.push({
      x: Math.random() * W, y: H + safeBottom + 10,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.3 + Math.random() * 0.8),
      size: 2 + Math.random() * 4,
      life: 1, decay: 0.002 + Math.random() * 0.003,
      hue, sat: 60 + Math.random() * 40, lit: 60 + Math.random() * 30,
      type: 'float'
    });
  }
  // Sparkle bursts from center
  if (Math.random() < 0.15) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    const hue = 260 + Math.random() * 60;
    titleParticles.push({
      x: W/2 + (Math.random()-0.5) * W * 0.3,
      y: H * 0.35 + (Math.random()-0.5) * 40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 1 + Math.random() * 2.5,
      life: 1, decay: 0.015 + Math.random() * 0.01,
      hue, sat: 80, lit: 70 + Math.random() * 20,
      type: 'spark'
    });
  }
}
function updateTitleParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.type === 'float') { p.vx += (Math.random() - 0.5) * 0.05; }
    if (p.life <= 0 || p.y < -safeTop - 20) { titleParticles.splice(i, 1); }
  }
}

    // 헤드밴드 — 사다리꼴+타원 중간 (전체를 단일 베지어로 부드럽게)
    const topInset = bandRX * 0.22;
    const topArch = r * 0.18;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = '#e8eef8';
    ctx.lineWidth = bandThick;
    ctx.beginPath();
    // 좌측 시작
    ctx.moveTo(cx - bandRX, cupY);
    // 좌→상 부드러운 베지어 (사이드에서 윗면으로 자연스럽게 흐름)
    ctx.bezierCurveTo(
      cx - bandRX, cupY - bandHeight * 0.85,
      cx - bandRX + topInset, cupY - bandHeight - topArch * 0.6,
      cx, cupY - bandHeight - topArch
    );
    // 윗면 정점에서 우측으로 대칭 흐름
    ctx.bezierCurveTo(
      cx + bandRX - topInset, cupY - bandHeight - topArch * 0.6,
      cx + bandRX, cupY - bandHeight * 0.85,
      cx + bandRX, cupY
    );
    ctx.stroke();
    ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
    // 좌측 이어컵
    const lx = cx - bandRX - cupW/2;
    ctx.fillStyle = '#c8d0e0';
    rrFill(lx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    ctx.strokeStyle = '#f0f4fa'; ctx.lineWidth = 1.2;
    rrStroke(lx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    // 우측 이어컵
    const rx = cx + bandRX - cupW/2;
    ctx.fillStyle = '#c8d0e0';
    rrFill(rx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
    ctx.strokeStyle = '#f0f4fa'; ctx.lineWidth = 1.2;
    rrStroke(rx, cupY - cupH/2, cupW, cupH, cupW * 0.45);
  } else if (item.type === 'coins') {
    // 동전 (음표 100개) — 평면 정면, 중앙 정렬, 단순 원 + ♪
    const coinR = r * 0.7;
    // 외곽 링
    ctx.fillStyle = '#daa520';
    ctx.beginPath(); ctx.arc(cx, cy, coinR, 0, Math.PI*2); ctx.fill();
    // 안쪽 면
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(cx, cy, coinR * 0.85, 0, Math.PI*2); ctx.fill();
    // 외곽선
    ctx.strokeStyle = '#fff8c0'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(cx, cy, coinR, 0, Math.PI*2); ctx.stroke();
    // 음표 ♪
    ctx.fillStyle = '#8a5d10';
    ctx.font = `bold ${Math.round(coinR * 1.3)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('♪', cx, cy + 1);
  } else {
    // 폴백: 기본 이모지
    ctx.font = `${Math.round(r*1.2)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(item.icon || '★', cx, cy);
  }
  ctx.restore();
}

function renderShop() {
  // ===== 배경 (안전영역까지 확장) =====
  const _totalH = H + safeTop + safeBottom;
  const bg = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  bg.addColorStop(0, '#1a0d2e'); bg.addColorStop(0.4, '#120820'); bg.addColorStop(1, '#08040f');
  ctx.fillStyle = bg; ctx.fillRect(0, -safeTop, W, _totalH);
  // 보라/금색 글로우
  const glow1 = ctx.createRadialGradient(W*0.2, sz(80), 0, W*0.2, sz(80), W*0.7);
  glow1.addColorStop(0, 'rgba(180,100,255,0.10)'); glow1.addColorStop(1, 'transparent');
  ctx.fillStyle = glow1; ctx.fillRect(0, -safeTop, W, _totalH);
  const glow2 = ctx.createRadialGradient(W*0.85, sz(40), 0, W*0.85, sz(40), W*0.6);
  glow2.addColorStop(0, 'rgba(255,200,80,0.08)'); glow2.addColorStop(1, 'transparent');
  ctx.fillStyle = glow2; ctx.fillRect(0, -safeTop, W, _totalH);

  // ===== 헤더 (모바일은 화면 최상단 — safeTop 영역까지 커버) =====
  const _shopMobileC = isMobile;
  // 모바일: 헤더가 safeTop까지 확장되어 타이틀이 화면 최상단에 위치
  const headerTop = _shopMobileC ? -safeTop : 0;
  const headerH = _shopMobileC ? (sz(44) + safeTop) : sz(56);
  const headerGrad = ctx.createLinearGradient(0, headerTop, W, headerTop + headerH);
  headerGrad.addColorStop(0, 'rgba(122,77,255,0.25)');
  headerGrad.addColorStop(0.5, 'rgba(255,200,80,0.18)');
  headerGrad.addColorStop(1, 'rgba(122,77,255,0.25)');
  ctx.fillStyle = headerGrad; ctx.fillRect(0, headerTop, W, headerH);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, headerTop, W, headerH);
  // 헤더 하단 강조선
  const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, 'rgba(255,215,0,0)');
  lineGrad.addColorStop(0.5, 'rgba(255,215,0,0.6)');
  lineGrad.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = lineGrad; ctx.fillRect(0, headerTop + headerH - 2, W, 2);

  // 타이틀 — 헤더 가로/세로 중앙
  const titleFontSize = _shopMobileC ? sz(18) : sz(22);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${titleFontSize}px sans-serif`; ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,215,0,0.6)'; ctx.shadowBlur = 8;
  const titleY = headerTop + headerH / 2;
  ctx.fillText('🛒  NANO SHOP', W/2, titleY);
  ctx.shadowBlur = 0;

  // ===== 상품 목록 =====
  // 스크롤 상한 클램프 (이전 프레임에 저장한 콘텐츠 높이 기준)
  if (window._shopMaxScroll != null) {
    if (shopScroll > window._shopMaxScroll) shopScroll = window._shopMaxScroll;
    if (shopScroll < 0) shopScroll = 0;
  }
  // 콘텐츠 영역 정의 (헤더 아래 ~ 뒤로가기 버튼 위)
  const _contentTop = headerTop + headerH;
  const _contentBottom = isMobile ? (H + safeBottom - sz(48)) : (H - 56);
  // 콘텐츠 영역에 클립 — 카드가 헤더/바텀 영역 침범 방지
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, _contentTop, W, _contentBottom - _contentTop);
  ctx.clip();
  const cw = Math.min(sz(360), W * 0.92), cx = (W - cw) / 2;
  let y = _contentTop + sz(14) - shopScroll;
  const items = getShopItems();
  let lastSection = '';
  shopCancelArea = null;
  _shopSkinCancelAreas.length = 0;

  for (let ii = 0; ii < items.length; ii++) {
    const item = items[ii];
    // 섹션 헤더 (필 형태)
    if (item.section && item.section !== lastSection) {
      lastSection = item.section;
      // 폰트를 먼저 설정한 뒤 measureText 호출 (버그 수정)
      ctx.font = `bold ${sz(10)}px sans-serif`;
      const secW = ctx.measureText(item.section).width + sz(28);
      const secH = sz(20), secX = cx, secY = y - sz(2);
      ctx.fillStyle = item.color + '22'; rrFill(secX, secY, secW, secH, sz(10));
      ctx.strokeStyle = item.color + '66'; ctx.lineWidth = 1; rrStroke(secX, secY, secW, secH, sz(10));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = item.color;
      ctx.fillText(item.section, secX + secW/2, secY + secH/2);
      y += sz(24);
    }
    const ih = sz(100);
    const status = item.getStatus ? item.getStatus() : null;
    const buyable = item.canBuy ? item.canBuy() : true;

    // 카드 (은은한 다크 배경 + 옅은 컬러 액센트)
    ctx.fillStyle = 'rgba(18,12,32,0.92)'; rrFill(cx, y, cw, ih, sz(14));
    const cardGrad = ctx.createLinearGradient(cx, y, cx + cw, y + ih);
    cardGrad.addColorStop(0, item.color + '0c'); cardGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cardGrad; rrFill(cx, y, cw, ih, sz(14));
    // 외곽 보더 (은은하게)
    ctx.strokeStyle = item.color + '44'; ctx.lineWidth = 1; rrStroke(cx, y, cw, ih, sz(14));
    // 좌측 액센트 바
    ctx.fillStyle = item.color; rrFill(cx, y + sz(8), sz(4), ih - sz(16), sz(2));

    // 아이콘 — skin 타입은 투명 배경(halo/테두리 없음), 나머지는 기존 글로우 원
    const iconCx = cx + sz(38), iconCy = y + ih/2;
    const iconR = sz(28);
    if (item.type !== 'skin') {
      const iconGrad = ctx.createRadialGradient(iconCx, iconCy, 0, iconCx, iconCy, iconR);
      iconGrad.addColorStop(0, item.color + '55'); iconGrad.addColorStop(1, item.color + '08');
      ctx.fillStyle = iconGrad;
      ctx.beginPath(); ctx.arc(iconCx, iconCy, iconR, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = item.color + '88'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(iconCx, iconCy, iconR, 0, Math.PI*2); ctx.stroke();
    }
    drawShopItemIcon(item, iconCx, iconCy, iconR);

    // 가격 버튼 (우측 정렬) — 먼저 좌표 계산해서 텍스트 폭 제한에 사용
    const pbw = sz(96), pbh = sz(34);
    const pbx = cx + cw - pbw - sz(12), pby = y + (ih - pbh) / 2;
    // 텍스트 영역: 아이콘 우측~버튼 좌측 사이
    const textX = cx + sz(74);
    const textMaxW = pbx - sz(8) - textX;
    // 상품명 + 설명 — 카드 세로 중앙(아이콘 중심)에 맞춰 정렬
    const cardCenterY = y + ih/2;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${sz(15)}px sans-serif`; ctx.fillStyle = '#fff';
    ctx.fillText(item.label, textX, cardCenterY - sz(10), textMaxW);
    ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(item.desc, textX, cardCenterY + sz(10), textMaxW);

    if (buyable) {
      ctx.shadowColor = item.color; ctx.shadowBlur = 8;
      const btnG = ctx.createLinearGradient(pbx, pby, pbx, pby + pbh);
      btnG.addColorStop(0, item.color); btnG.addColorStop(1, item.color + 'aa');
      ctx.fillStyle = btnG; rrFill(pbx, pby, pbw, pbh, sz(8));
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; rrStroke(pbx, pby, pbw, pbh, sz(8));
      // ♪ 같은 비대칭 글리프 포함돼도 시각 중앙 정렬 — measureText 로 tw 구해 left 기준 수동 배치.
      ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillStyle = '#1a0d2e';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      const _priceTw = ctx.measureText(item.price).width;
      ctx.fillText(item.price, pbx + (pbw - _priceTw) / 2, pby + pbh/2);
    } else if (status) {
      ctx.fillStyle = status.color + '20'; rrFill(pbx, pby, pbw, pbh, sz(8));
      ctx.strokeStyle = status.color + '88'; ctx.lineWidth = 1.5; rrStroke(pbx, pby, pbw, pbh, sz(8));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(11)}px sans-serif`; ctx.fillStyle = status.color;
      ctx.fillText(status.text, pbx + pbw/2, pby + pbh/2);
    }

    // localhost 취소 (구독 상품 + 활성 시)
    if (isTestEnv && item.type === 'pass' && status) {
      const cbx = pbx + (pbw - sz(50)) / 2, cby = pby + pbh + sz(4);
      ctx.fillStyle = 'rgba(255,60,60,0.18)'; rrFill(cbx, cby, sz(50), sz(18), sz(5));
      ctx.strokeStyle = 'rgba(255,80,80,0.6)'; ctx.lineWidth = 1; rrStroke(cbx, cby, sz(50), sz(18), sz(5));
      ctx.font = `bold ${sz(9)}px sans-serif`; ctx.fillStyle = '#ff6666';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('구독 취소', cbx + sz(25), cby + sz(9));
      shopCancelArea = { x: cbx, y: cby, w: sz(50), h: sz(18) };
    }
    // localhost 취소 (스킨 + 보유중)
    if (isTestEnv && item.type === 'skin' && status && item.skinCategory && item.skinId) {
      const cbx = pbx + (pbw - sz(60)) / 2, cby = pby + pbh + sz(4);
      ctx.fillStyle = 'rgba(255,60,60,0.18)'; rrFill(cbx, cby, sz(60), sz(18), sz(5));
      ctx.strokeStyle = 'rgba(255,80,80,0.6)'; ctx.lineWidth = 1; rrStroke(cbx, cby, sz(60), sz(18), sz(5));
      ctx.font = `bold ${sz(9)}px sans-serif`; ctx.fillStyle = '#ff6666';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('보유 취소', cbx + sz(30), cby + sz(9));
      _shopSkinCancelAreas.push({
        cat: item.skinCategory, id: item.skinId, label: item.label,
        refund: item.coinCost || 0,
        x: cbx, y: cby, w: sz(60), h: sz(18),
      });
    }
    y += ih + sz(14);
  }

  // ===== 하단 안내 =====
  y += sz(20);
  // 별 라인
  ctx.fillStyle = 'rgba(255,215,0,0.3)'; ctx.font = `${sz(10)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✦  ✦  ✦', W/2, y);
  ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText('새로운 상품이 곧 추가됩니다', W/2, y + sz(20));

  // 클립 해제
  ctx.restore();

  // 다음 프레임 스크롤 상한 계산
  const contentBottomAbs = y + shopScroll + sz(40);
  window._shopMaxScroll = Math.max(0, contentBottomAbs - _contentBottom);

  // 뒤로가기 버튼 (랭킹/업적과 동일 스타일)
  const _mpBack = isMobile;
  const _mpLand = isMobile && !isPortrait && !isTablet && H < 500;
  const bbW = _mpBack ? (_mpLand ? sz(46) : sz(36)) : 70;
  const bbH = _mpBack ? (_mpLand ? sz(34) : sz(28)) : 38;
  const bbX = _mpBack ? sz(8) : 12;
  const bbY = _mpBack ? (H + safeBottom - sz(4) - bbH) : (H - bbH - 10);
  window._shopBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; rrStroke(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textBaseline = 'middle';
  if (_mpBack) {
    ctx.font = `bold ${_mpLand ? sz(18) : sz(16)}px sans-serif`;
    ctx.fillText('←', bbX + bbW/2, bbY + bbH/2);
  } else {
    ctx.font = `bold ${sz(13)}px sans-serif`;
    ctx.fillText('← 뒤로', bbX + bbW/2, bbY + bbH/2);
  }
  ctx.textBaseline = 'alphabetic';

  // 하단 바
  renderBottomBar();
}

// ===== 공통 하단 바 (코인 + 햄버거 메뉴) =====
function renderBottomBar() {
  // 햄버거 버튼 (우하단) — 먼저 좌표 계산
  const _bbML = isMobile && !isPortrait && !isTablet && H < 500;
  const _bbBottom = H + safeBottom - sz(4);
  const hbW = sz(48);
  const hbH = sz(36);
  const hbX = W - hbW - sz(8), hbY = -safeTop + sz(2);
  // 코인 (햄버거 버튼 세로 중앙과 정렬)
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${_bbML ? sz(12) : sz(10)}px sans-serif`; ctx.fillStyle = '#ffd700aa';
  ctx.fillText('♪ ' + formatCoins(getCoins()), hbX - sz(6), hbY + hbH/2);
  // 햄버거 버튼 렌더
  ctx.fillStyle = hamburgerOpen ? 'rgba(20,15,40,0.9)' : 'rgba(20,15,40,0.75)';
  rrFill(hbX, hbY, hbW, hbH, sz(7));
  ctx.strokeStyle = hamburgerOpen ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1; rrStroke(hbX, hbY, hbW, hbH, sz(7));
  const barBW = _bbML ? sz(18) : sz(14), barBH = 2, barBX = hbX + (hbW - barBW) / 2;
  const barGapY = _bbML ? sz(6) : sz(5);
  const barStartY = hbY + (hbH - (barGapY * 2 + barBH)) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let bi = 0; bi < 3; bi++) ctx.fillRect(barBX, barStartY + bi * barGapY, barBW, barBH);
  // 메뉴 펼침
  if (hamburgerOpen) {
    const menuW = sz(140), menuItemH = sz(36);
    // 상점 페이지에선 '상점' 항목 제외
    const _unread = currentUser ? getUnreadMailCount() : 0;
    const _mailLabel = '우편함' + (_unread > 0 ? ' (' + _unread + ')' : '');
    const _isShop = state === 'shop', _isInv = state === 'inventory';
    const _bagItem = {label:'가방',icon:'🎒',key:'inventory'};
    const _shopItem = {label:'상점',icon:'🛒',key:'shop'};
    const menuItems = _isShop
      ? [_bagItem, {label:_mailLabel,icon:'✉',key:'mail'},{label:'설정',icon:'⚙',key:'settings'}]
      : _isInv
        ? [_shopItem, {label:_mailLabel,icon:'✉',key:'mail'},{label:'설정',icon:'⚙',key:'settings'}]
        : [_shopItem, _bagItem, {label:_mailLabel,icon:'✉',key:'mail'},{label:'설정',icon:'⚙',key:'settings'}];
    const menuH = menuItems.length * menuItemH;
    const menuX = hbX + hbW - menuW, menuY = hbY + hbH + sz(6);
    ctx.fillStyle = '#1a1a2e'; rrFill(menuX, menuY, menuW, menuH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; rrStroke(menuX, menuY, menuW, menuH, sz(8));
    for (let mi = 0; mi < menuItems.length; mi++) {
      const iy = menuY + mi * menuItemH;
      if (mi > 0) { ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(menuX+sz(8),iy); ctx.lineTo(menuX+menuW-sz(8),iy); ctx.stroke(); }
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      // inventory(가방) 는 이모지 대신 단색 흰색 아이콘 (다른 항목처럼 monochrome)
      if (menuItems[mi].key === 'inventory') {
        drawInlineBagIcon(menuX + sz(12) + sz(7), iy + menuItemH/2, sz(7));
      } else {
        ctx.font=`${sz(14)}px sans-serif`;
        ctx.fillText(menuItems[mi].icon, menuX+sz(12), iy+menuItemH/2);
      }
      ctx.font=`${sz(13)}px sans-serif`; ctx.fillText(menuItems[mi].label, menuX+sz(34), iy+menuItemH/2);
    }
    hamburgerAreas = { btn:{x:hbX,y:hbY,w:hbW,h:hbH}, menu:{x:menuX,y:menuY,w:menuW,h:menuH,itemH:menuItemH,count:menuItems.length,items:menuItems} };
  } else {
    hamburgerAreas = { btn:{x:hbX,y:hbY,w:hbW,h:hbH}, menu:null };
  }
}

// ===== 인벤토리 (가방) =====
let inventoryTab = 'note';
let inventoryScroll = 0;
const _invBtnAreas = []; // 각 프레임 버튼 hit 영역

// 가방(backpack) 아이콘 — 이모지 🎒 대신 canvas stroke 로 단색 흰색 렌더.
//   (cx, cy) 아이콘 중심, r 반지름(대략).
function drawInlineBagIcon(cx, cy, r) {
  ctx.save();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // 가방 본체 (둥근 사각) — 아래 살짝 넓게, 위는 좁게 (사다리꼴 느낌)
  const w = r * 1.7, h = r * 1.9;
  const x = cx - w/2, y = cy - h*0.35;
  ctx.beginPath();
  // 상단 좌우 모서리는 약간 둥글게, 하단은 더 둥글게
  const rT = r * 0.25, rB = r * 0.4;
  ctx.moveTo(x + rT, y);
  ctx.lineTo(x + w - rT, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rT);
  ctx.lineTo(x + w, y + h - rB);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rB, y + h);
  ctx.lineTo(x + rB, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rB);
  ctx.lineTo(x, y + rT);
  ctx.quadraticCurveTo(x, y, x + rT, y);
  ctx.stroke();
  // 손잡이 (위쪽 작은 아치)
  ctx.beginPath();
  ctx.arc(cx, y, r * 0.5, Math.PI * 1.05, Math.PI * 1.95, false);
  ctx.stroke();
  // 가방 앞면 작은 주머니 (가로 선)
  ctx.beginPath();
  ctx.moveTo(x + w*0.22, y + h*0.55);
  ctx.lineTo(x + w*0.78, y + h*0.55);
  ctx.stroke();
  ctx.restore();
}

// 스킨 프리뷰 — atlas 내 cleaned 셀 사용 (배경 투명, 꽃 중앙 정렬).
//   반환: { path, src:[sx,sy,sw,sh] } 또는 null.
function _getSkinPreview(id) {
  const s = SKINS[id];
  if (!s) return null;
  if (id === 'neon') return { path: 'skins/neon/note/neon_note.png', src: [2800, 0, 400, 400] };
  // 벚꽃 히트 이펙트 — 상점 아이콘(petal_01) 과 동일하게 표시
  if (id === 'sakura_fx') return { path: 'skins/neon/hit_effect/petal_01.png', src: null };
  // 기본: atlas 첫 셀
  const p = s.imagePaths?.note;
  if (p) return { path: p, src: [0, 0, 400, 400] };
  return null;
}
function _getSkinDisplayName(id) {
  const s = SKINS[id]; return s ? (s.name || id) : id;
}

function renderInventory() {
  const _totalH = H + safeTop + safeBottom;
  const bg = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  bg.addColorStop(0, '#1a0d2e'); bg.addColorStop(0.4, '#120820'); bg.addColorStop(1, '#08040f');
  ctx.fillStyle = bg; ctx.fillRect(0, -safeTop, W, _totalH);
  const glow = ctx.createRadialGradient(W*0.5, sz(60), 0, W*0.5, sz(60), W*0.7);
  glow.addColorStop(0, 'rgba(180,100,255,0.10)'); glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0, -safeTop, W, _totalH);

  // 헤더
  const _mob = isMobile;
  const headerTop = _mob ? -safeTop : 0;
  const headerH = _mob ? (sz(44) + safeTop) : sz(56);
