// Select screen layout helper
let selectParticles = [];
function updateSelectParticles() {
  // Spawn
  const spawnCount = selectParticles.length < 50 ? 2 : 0;
  for (let s = 0; s < spawnCount; s++) {
    const sc = songs[selectedSong] ? songs[selectedSong].color : '#fff';
    selectParticles.push({
      x: Math.random() * W, y: H + 5 + Math.random()*20,
      vx: (Math.random()-0.5)*0.5, vy: -(0.3+Math.random()*0.8),
      size: 2.5+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
      color: sc
    });
  }
  for (let i = selectParticles.length-1; i >= 0; i--) {
    const p = selectParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vx += (Math.random()-0.5)*0.03;
    if (p.life <= 0 || p.y < -10) selectParticles.splice(i,1);
  }
}

function getSelectLayout() {
  // 전체 가시 영역 (안전 영역 포함)
  const visH = H + safeTop + safeBottom;
  // 모바일 가로 플래그 (먼저 선언)
  const _mobileLandscape = isMobile && !isPortrait;
  // 가로 마진 고려: optW가 화면을 넘지 않도록 제한
  const optW = Math.min(sz(420), W - sz(16));
  // CD 크기: 모바일 가로는 visH 비율을 적당히 키움
  const cdSize = _mobileLandscape ?
      Math.min(sz(160), visH * 0.34, W * 0.3)
    : Math.min(sz(200), visH * 0.26, W * 0.4);
  const cardW = cdSize, cardH = cdSize, gap = 20;
  const songTotalW = songs.length * (cardW + gap) - gap;
  const optH = _mobileLandscape ? Math.min(28, visH * 0.075) : Math.min(42, visH * 0.055);
  const optGap = Math.max(10, visH * 0.018);
  const sectionGap = Math.max(10, visH * 0.016);
  const subBtnH = Math.min(34, visH * 0.042);
  const subBtnGap = Math.max(10, visH * 0.014);
  const searchBarH = _mobileLandscape ? 16 : 30;
  const titleH = _mobileLandscape ? 16 : 26;
  const titleToSearchGap = _mobileLandscape ? 0 : 12;
  const searchToSongGap = _mobileLandscape ? 6 : 14;
  const btnH = Math.min(44, visH * 0.058);
  const cdTextH = _mobileLandscape ? sz(26) : sz(52); // CD 이름 + Lv 배지 공간
  const labelH = 18;
  // 시작 버튼은 화면 최하단에 별도 고정이므로 flow에서 제외
  const totalH =
      titleH + titleToSearchGap
    + searchBarH + searchToSongGap
    + cardH + cdTextH
    + subBtnGap + subBtnH
    + sectionGap + labelH + optH
    + optGap + labelH + optH;
  // 하단 바 영역(시작 버튼 + 차트/햄버거 등)을 제외한 상단 공간에서 flow 중앙 정렬
  const bottomReserve = btnH + sz(50); // 시작 버튼 + 하단 바
  const topY = -safeTop + Math.max(4, (visH - bottomReserve - totalH) / 2);
  const titleY = topY + titleH / 2; // textBaseline='middle' 기준
  const searchBarY = topY + titleH + titleToSearchGap; // search bar 상단
  const songRowY = searchBarY + searchBarH + searchToSongGap;
  return { cardW, cardH, gap, topY, titleY, searchBarY, songRowY, optW, optH, optGap, sectionGap, songTotalW, subBtnH, subBtnGap, searchBarH, btnH, cdTextH };
}
let snapAnimStart = 0, snapAnimFrom = 0, snapAnimTo = 0, snapAnimDur = 0;
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function scrollToSong(idx) {
  const lay = getSelectLayout();
  const target = _dPos(idx) * (lay.cardW + lay.gap);
  snapAnimFrom = selectScrollX;
  snapAnimTo = target;
  snapAnimDur = Math.min(0.4, Math.max(0.15, Math.abs(target - selectScrollX) / 800));
  snapAnimStart = performance.now() / 1000;
  selectTargetScrollX = target;
  selectScrollVel = 0;
}
function updateSelectScroll(dt) {
  if (state !== 'select') return;
  const lay = getSelectLayout();
  const step = lay.cardW + lay.gap;
  let minScroll = 0;
  let maxScroll = (_dLen() - 1) * step;

  // Animated snap to target (easeOut)
  if (selectTargetScrollX !== null) {
    const elapsed = performance.now() / 1000 - snapAnimStart;
    const t = Math.min(1, elapsed / snapAnimDur);
    selectScrollX = snapAnimFrom + (snapAnimTo - snapAnimFrom) * easeOutCubic(t);
    if (t >= 1) { selectScrollX = snapAnimTo; selectTargetScrollX = null; }
    selectScrollVel = 0;
  } else if (selectDragX < 0) {
    // 관성 스크롤 — 부드럽게 감쇠하면�� 중간 곡을 스쳐지나감
    selectScrollX += selectScrollVel * dt * 60;
    selectScrollVel *= Math.pow(0.96, dt * 60);
    if (Math.abs(selectScrollVel) < 0.03) selectScrollVel = 0;

    // 경계: 하드스톱 (튕김 없음)
    if (selectScrollX < minScroll) { selectScrollX = minScroll; selectScrollVel = 0; }
    if (selectScrollX > maxScroll) { selectScrollX = maxScroll; selectScrollVel = 0; }

    // 스크롤 중 가장 가까운 곡으로 selectedSong 실시간 갱신 (프리뷰 트리거)
    const _nearSong = _dSong(Math.max(0, Math.min(Math.round(selectScrollX / step), _dLen() - 1)));
    if (_nearSong !== selectedSong) { selectedSong = _nearSong; loadSongDiffSpeed(selectedSong); }

    // 관성이 충분히 줄어든 후에만 스냅
    if (Math.abs(selectScrollVel) < 0.3) {
      const nearest = Math.max(0, Math.min(Math.round(selectScrollX / step), _dLen() - 1));
      const clamped = _dSong(nearest);
      const target = nearest * step;
      if (Math.abs(target - selectScrollX) > 0.5) {
        snapAnimFrom = selectScrollX;
        snapAnimTo = target;
        snapAnimDur = Math.min(0.3, Math.max(0.08, Math.abs(target - selectScrollX) / 600));
        snapAnimStart = performance.now() / 1000;
        selectTargetScrollX = target;
        selectScrollVel = 0;
        selectedSong = clamped;
      } else {
        selectScrollX = target;
        selectedSong = clamped;
      }
    }
  }

  // 드래그 중 경계 하드스톱
  if (selectDragX >= 0) {
    if (selectScrollX < minScroll) selectScrollX = minScroll;
    if (selectScrollX > maxScroll) selectScrollX = maxScroll;
  }

  // 매 프레임 selectedSong을 스크롤 위치에 동기화 (스냅 애니메이션 중에는 스킵)
  // 즐겨찾기 모드: 스크롤 위치 → 표시 리스트 인덱스 → 실제 songIdx
  const _scrollDl = favFilterActive ? getFavorites().sort((a,b)=>a-b) : null;
  const _scrollListLen = _scrollDl ? _scrollDl.length : songs.length;
  const curPosByScroll = Math.round(Math.max(0, Math.min(maxScroll, selectScrollX)) / step);
  const clampedPos = Math.max(0, Math.min(curPosByScroll, _scrollListLen - 1));
  const curSongByScroll = _scrollDl ? (_scrollDl[clampedPos] != null ? _scrollDl[clampedPos] : selectedSong) : clampedPos;
  if (selectTargetScrollX === null) {
    if (curSongByScroll !== selectedSong && curSongByScroll >= 0 && curSongByScroll < songs.length) {
      selectedSong = curSongByScroll;
      loadSongDiffSpeed(selectedSong);
    }
  }

  // 스크롤 틱 사운드: 선택곡이 바뀔 때마다
  if (curSongByScroll !== lastScrollSong && curSongByScroll >= 0 && curSongByScroll < songs.length) {
    lastScrollSong = curSongByScroll;
    playScrollSound();
  }
}

    ctx.fillText(mobileChartCollapsed ? 'CHART ▲' : 'CHART ▼', togX + togW/2, togY + togH/2);
  }
  if (chartPanelW > 60 && (!(isMobileChart || _mlChartToggle) || !mobileChartCollapsed)) {
    const _mobileLandChart = isMobile && !isPortrait && !isMobileChart;
    const cpX = isMobileChart ? 6 : 8;
    // 모바일 가로 사이드 패널: 검색창 하단 라인 바로 밑으로 이동
    const cpY = isMobileChart ? H + safeBottom - Math.min(H * 0.35, 200) - sz(30) : (_mobileLandChart ? (lay.searchBarY + lay.searchBarH + 2) : 50);
    const cpH = isMobileChart ? Math.min(H * 0.35, 200) : (_mobileLandChart ? (H + safeBottom - cpY - sz(34)) : (H - cpY - 30));
    // 스크롤 입력용 bounds 저장
    window._chartBounds = { x: cpX, y: cpY, w: chartPanelW, h: cpH };
    // 패널 배경
    ctx.fillStyle = isMobileChart ? 'rgba(10,8,25,0.92)' : 'rgba(10,8,25,0.75)';
    rrFill(cpX, cpY, chartPanelW, cpH, 10);
    ctx.strokeStyle = 'rgba(120,100,200,0.2)'; ctx.lineWidth = 1;
    rrStroke(cpX, cpY, chartPanelW, cpH, 10);

    // 탭 버튼
    const tabH = sz(20), tabGap = sz(2);
    const tabW = (chartPanelW - sz(10) - tabGap * (CHART_TABS.length - 1)) / CHART_TABS.length;
    for (let ti = 0; ti < CHART_TABS.length; ti++) {
      const tx = cpX + sz(5) + ti * (tabW + tabGap);
      const ty = cpY + sz(5);
      const sel = ti === chartTab;
      ctx.fillStyle = sel ? 'rgba(120,80,220,0.5)' : 'rgba(255,255,255,0.05)';
      rrFill(tx, ty, tabW, tabH, sz(4));
      if (sel) { ctx.strokeStyle = 'rgba(160,130,255,0.6)'; ctx.lineWidth = 1; rrStroke(tx, ty, tabW, tabH, sz(4)); }
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${Math.min(sz(9), tabW*0.35)}px sans-serif`;
      ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.4)';
      ctx.fillText(CHART_TABS[ti].label, tx + tabW/2, ty + tabH/2);
    }

    // 차트 리스트 (최대 100위)
    const listY = cpY + sz(5) + tabH + sz(6);
    const listH = cpH - tabH - sz(16);
    const itemH = sz(32);
    const maxVisible = Math.floor(listH / itemH);
    const CHART_MAX = 100;
    const chartList = chartCache.slice(0, CHART_MAX);
    // chartScroll 범위 클램프
    const _maxChartScroll = Math.max(0, chartList.length - maxVisible);
    if (chartScroll > _maxChartScroll) chartScroll = _maxChartScroll;
    if (chartScroll < 0) chartScroll = 0;
    ctx.save();
    ctx.beginPath();
    ctx.rect(cpX, listY, chartPanelW, listH);
    ctx.clip();

    if (chartList.length === 0) {
      ctx.font = `${sz(11)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillText(fbPlaysLoaded ? '정보가 없습니다' : '로딩 중...', cpX + chartPanelW/2, listY + 30);
    }
    const _chartEnd = Math.min(chartList.length, chartScroll + maxVisible);
    for (let ci = chartScroll; ci < _chartEnd; ci++) {
      const item = chartList[ci];
      const iy = listY + (ci - chartScroll) * itemH;
      if (iy + itemH < listY || iy > listY + listH) continue;
      const s = songs[item.idx];
      const isSel = item.idx === selectedSong;

      // 배경 (선택된 곡 하이라이트)
      if (isSel) {
        ctx.fillStyle = s.color + '25';
        rrFill(cpX + 4, iy + 1, chartPanelW - 8, itemH - 2, 6);
      }

      // 순위 번호 — 모바일에선 작게 + 3자리 수 대비 (모든 순위 동일 크기로 정렬 맞춤)
      const _mlRank = isMobile && !isPortrait;
      const _mRank = isMobile;
      const rankFontSize = _mlRank ? 9 : (_mRank ? 11 : (ci < 3 ? 14 : 12));
      // 순위 오른쪽 끝 X (3자리까지 수용): 모바일 28, PC 24
      const rankRightX = cpX + (_mRank ? 28 : 24);
      // 곡 이름 시작 X (순위 오른쪽 + 여백)
      const nameStartX = rankRightX + (_mRank ? sz(6) : sz(10));
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${rankFontSize}px sans-serif`;
      ctx.fillStyle = ci === 0 ? '#ffd700' : ci === 1 ? '#c0c0c0' : ci === 2 ? '#cd7f32' : 'rgba(255,255,255,0.4)';
      ctx.fillText(ci + 1, rankRightX, iy + itemH/2);

      // 곡 이름
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = `${Math.min(sz(11), chartPanelW * 0.06)}px sans-serif`;
      ctx.fillStyle = isSel ? '#fff' : 'rgba(255,255,255,0.65)';
      const nameMaxChars = _mRank ? 10 : 14;
      const nameText = s.name.length > nameMaxChars ? s.name.slice(0, nameMaxChars - 1) + '..' : s.name;
      ctx.fillText(nameText, nameStartX, iy + itemH/2 - sz(6));

      // 플레이 수
      ctx.font = `${Math.min(sz(9), chartPanelW * 0.045)}px sans-serif`;
      ctx.fillStyle = s.color + (isSel ? 'cc' : '77');
      ctx.fillText(item.count + ' plays', nameStartX, iy + itemH/2 + sz(8));

    }
    ctx.restore();

    // "CHART" 라벨
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${Math.min(sz(10), chartPanelW*0.055)}px sans-serif`;
    ctx.fillStyle = 'rgba(160,140,255,0.5)';
    ctx.fillText('CHART', cpX + chartPanelW/2, cpY - sz(8));
    ctx.restore();
  }

  renderBottomBar();

  // 즐겨찾기 비어있음 메시지
  if (favEmptyMsg > 0) {
    const elapsed = (performance.now() - favEmptyMsg) / 1000;
    if (elapsed < 1.5) {
      const alpha = elapsed < 1.0 ? 1 : 1 - (elapsed - 1.0) / 0.5;
      ctx.globalAlpha = alpha * 0.9;
      const msgW = sz(200), msgH = sz(36);
      ctx.fillStyle = 'rgba(0,0,0,0.8)'; rrFill((W-msgW)/2, H*0.45, msgW, msgH, sz(8));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillStyle = '#ffd700';
      ctx.fillText('즐겨찾기한 곡이 없습니다', W/2, H*0.45 + msgH/2);
      ctx.globalAlpha = 1;
    } else { favEmptyMsg = 0; }
  }

  // Search filter dropdown (drawn last for z-order)
  if (searchActive && searchText) {
    const filterItemH = 38;
    const dropY = searchBarY + searchBarH + 4;
    if (searchFiltered.length > 0) {
      // 최대 높이 제한 (시작 버튼 위까지)
      const maxDropH = Math.min(searchFiltered.length * filterItemH + 8, H*0.5);
      const visibleCount = Math.floor((maxDropH - 8) / filterItemH);
      const maxScroll = Math.max(0, searchFiltered.length - visibleCount);
      if (searchScroll > maxScroll) searchScroll = maxScroll;
      if (searchScroll < 0) searchScroll = 0;
      const filterDropdownH = maxDropH;
      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = '#ffd70044'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      // 스크롤 bounds 저장
      window._searchDropBounds = { x: cxBase, y: dropY, w: optW, h: filterDropdownH, itemH: filterItemH, maxScroll };
      ctx.save();
      ctx.beginPath();
      ctx.rect(cxBase, dropY, optW, filterDropdownH);
      ctx.clip();
      const endIdx = Math.min(searchFiltered.length, searchScroll + visibleCount + 1);
      for (let fi = searchScroll; fi < endIdx; fi++) {
        const songIdx = searchFiltered[fi];
        const iy = dropY + 4 + (fi - searchScroll) * filterItemH;
        const isHl = fi === searchHighlight;
        if (isHl) {
          ctx.fillStyle = songs[songIdx].color + '33';
          rrFill(cxBase + 4, iy, optW - 8, filterItemH - 2, 6);
        }
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.font = `bold ${sz(14)}px sans-serif`;
        ctx.fillStyle = isHl ? '#fff' : 'rgba(255,255,255,0.6)';
        ctx.fillText(songs[songIdx].name, cxBase + 14, iy + filterItemH / 2);
        ctx.textBaseline = 'alphabetic';
      }
      ctx.restore();
      // 스크롤바
      if (maxScroll > 0) {
        const sbX = cxBase + optW - 6, sbY = dropY + 4, sbH = filterDropdownH - 8;
        const thumbH = Math.max(20, sbH * visibleCount / searchFiltered.length);
        const thumbY = sbY + (sbH - thumbH) * (searchScroll / maxScroll);
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        rrFill(sbX, sbY, 3, sbH, 2);
        ctx.fillStyle = 'rgba(255,215,0,0.5)';
        rrFill(sbX, thumbY, 3, thumbH, 2);
      }
    } else {
      const filterDropdownH = 36;
      ctx.fillStyle = 'rgba(10,10,20,0.97)';
      rrFill(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      rrStroke(cxBase, dropY, optW, filterDropdownH, 8);
      ctx.textAlign = 'center'; ctx.font = `${sz(12)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText('검색 결과 없음', cxBase + optW/2, dropY + filterDropdownH/2 + sz(4));
    }
  }
}

let shootingStars = [];
function spawnShootingStar() {
  const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2; // 대각선 하강 (우하단 방향)
  const speed = 200 + Math.random() * 350;
  const startX = Math.random() * W * 1.2 - W * 0.1;
  const startY = -10 - Math.random() * H * 0.3;
  const hue = Math.random() > 0.6 ? 45 + Math.random() * 20 : 200 + Math.random() * 60; // 금색 or 파란색
  const brightness = 0.7 + Math.random() * 0.3;
  const tailLen = 8 + Math.floor(Math.random() * 12);
  shootingStars.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.2 + Math.random() * 1.5,
    maxLife: 1.2 + Math.random() * 1.5,
    size: 1.5 + Math.random() * 2,
    hue, brightness, tailLen,
    trail: [] // 잔상 좌표 저장
  });
}
function updateShootingStars(dt) {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.trail.unshift({ x: ss.x, y: ss.y });
    if (ss.trail.length > ss.tailLen) ss.trail.pop();
    ss.x += ss.vx * dt;
    ss.y += ss.vy * dt;
    ss.life -= dt;
    if (ss.life <= 0 || ss.x > W + 50 || ss.y > H + 50) {
      shootingStars.splice(i, 1);
    }
  }
}
function renderShootingStars() {
  for (const ss of shootingStars) {
    const fade = Math.min(1, ss.life / (ss.maxLife * 0.3)); // 마지막 30%에서 페이드아웃
    // 꼬리 (잔상)
    for (let t = 0; t < ss.trail.length; t++) {
      const p = ss.trail[t];
      const alpha = (1 - t / ss.trail.length) * fade * ss.brightness * 0.6;
      const sz2 = ss.size * (1 - t / ss.trail.length * 0.7);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${ss.hue},80%,${70 + t * 2}%)`;
      ctx.fillRect(p.x - sz2/2, p.y - sz2/2, sz2, sz2);
    }
    // 머리 (밝은 점)
    ctx.globalAlpha = fade * ss.brightness;
    ctx.shadowColor = `hsl(${ss.hue},90%,80%)`;
    ctx.shadowBlur = 6 + ss.size * 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ss.x, ss.y, ss.size * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawGoogleIcon(cx, cy, r) {
  const lw = r * 0.45;
  ctx.lineCap = 'butt';
  ctx.lineWidth = lw;
  // Blue (left-top)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.65, Math.PI * 1.35); ctx.strokeStyle = '#4285F4'; ctx.stroke();
  // Green (bottom-left)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.35, Math.PI * 0.65); ctx.strokeStyle = '#34A853'; ctx.stroke();
  // Yellow (bottom-right)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.05, Math.PI * 0.35); ctx.strokeStyle = '#FBBC05'; ctx.stroke();
  // Red (top-right)
  ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI * 0.35, Math.PI * 0.05); ctx.strokeStyle = '#EA4335'; ctx.stroke();
  // Blue horizontal bar
  ctx.fillStyle = '#4285F4';
  ctx.fillRect(cx - r * 0.1, cy - lw / 2, r * 1.2, lw);
}
function drawFacebookIcon(cx, cy, r) {
  ctx.beginPath(); ctx.arc(cx, cy, r * 1.3, 0, Math.PI * 2);
  ctx.fillStyle = '#1877F2'; ctx.fill();
  ctx.font = `bold ${r * 2.2}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff'; ctx.fillText('f', cx + r * 0.1, cy + r * 0.15);
}
function drawAppleIcon(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy); ctx.scale(r / 10, r / 10);
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.bezierCurveTo(-3, -11, -8, -10, -9, -6);
  ctx.bezierCurveTo(-10, -2, -9, 3, -7, 6); ctx.bezierCurveTo(-5, 9, -3, 11, 0, 11);
  ctx.bezierCurveTo(3, 11, 5, 9, 7, 6); ctx.bezierCurveTo(9, 3, 10, -2, 9, -6);
  ctx.bezierCurveTo(8, -10, 3, -11, 0, -8); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  // Leaf
  ctx.beginPath(); ctx.moveTo(0, -8);
  ctx.bezierCurveTo(1, -12, 4, -14, 5, -13);
  ctx.bezierCurveTo(5, -11, 3, -9, 0, -8); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
}
function drawGuestIcon(cx, cy, r) {
  // Head
  ctx.beginPath(); ctx.arc(cx, cy - r * 0.5, r * 0.55, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  // Body
  ctx.beginPath(); ctx.arc(cx, cy + r * 1.1, r * 0.9, Math.PI, 0);
  ctx.fillStyle = '#fff'; ctx.fill();
}

function renderAchievement() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;

  // Back button — 모바일: 좌측 최하단, 햄버거와 동일 크기
  const _mpBack = isMobile;
  const _mpLand = isMobile && !isPortrait;
  const bbW = _mpBack ? (_mpLand ? sz(46) : sz(36)) : 70;
  const bbH = _mpBack ? (_mpLand ? sz(34) : sz(28)) : 38;
  const bbX = _mpBack ? sz(8) : 12;
  const bbY = _mpBack ? (H + safeBottom - sz(4) - bbH) : (H - bbH - 10);
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.7)';
  if (_mpBack) {
    // 모바일: ← 단일 글리프 중앙 정렬 (수동 보정)
    ctx.textBaseline='middle';
    ctx.font=`bold ${_mpLand ? sz(18) : sz(16)}px sans-serif`;
    ctx.fillText('←', bbX+bbW/2, bbY+bbH/2 + sz(1));
    ctx.textBaseline='alphabetic';
  } else {
    // PC: 기존 렌더 유지
    ctx.font=`bold ${sz(13)}px sans-serif`;
    ctx.fillText('← 뒤로', bbX+bbW/2, bbY+bbH*0.65);
  }

  // Title (랭킹과 동일: 큰 '업적' + 아래 곡 이름)
  const _achLand = _mpLand;
  ctx.font=`bold ${_achLand ? sz(18) : sz(26)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  const _achTitleY = _achLand ? sz(16) : (H*0.07+10);
  ctx.fillText('업적', W/2, _achTitleY); ctx.shadowBlur=0;
  if (achievementSongFilter >= 0) {
    const _achSong = songs[achievementSongFilter];
    ctx.font=`${_achLand ? sz(11) : sz(15)}px sans-serif`;
    ctx.fillStyle=_achSong.color;
    ctx.fillText(_achSong.name, W/2, _achLand ? sz(32) : (H*0.13));
  }

  // Type tabs
  const tabW = _achLand ? sz(260) : sz(300);
  const tabBtnW = tabW / ACH_TABS.length;
  const tabH_ = _achLand ? 22 : 28;
  const tabX = (W - tabW) / 2, tabY = _achLand ? sz(44) : H*0.17;
  ACH_TABS.forEach((tab, i) => {
    const bx = tabX + i * tabBtnW, sel = i === achievementTab;
    ctx.fillStyle = sel ? '#ffd70033' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, tabH_);
    if (sel) { ctx.fillStyle='#ffd700'; ctx.fillRect(bx, tabY+tabH_-3, tabBtnW, 3); }
    ctx.textAlign='center';
    ctx.font=`bold ${_achLand ? sz(10) : sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? '#ffd700' : 'rgba(255,255,255,0.4)';
    if (_achLand) {
      ctx.textBaseline='middle';
      ctx.fillText(tab.icon+' '+tab.label, bx+tabBtnW/2, tabY+tabH_/2);
      ctx.textBaseline='alphabetic';
    } else {
      ctx.fillText(tab.icon+' '+tab.label, bx+tabBtnW/2, tabY+tabH_*0.65);
    }
  });

  // Filter and progress
  const curType = ACH_TABS[achievementTab].key;
  const unlocked = getUnlocked();
  const filtered = ALL_ACHIEVEMENTS.filter(a => a.type === curType && (achievementSongFilter < 0 || a.songIdx === achievementSongFilter));
  const unlockedCount = filtered.filter(a => unlocked[a.id]).length;

  // Progress bar
  const progW = sz(200), progH = 4;
  const progX = (W-progW)/2, progY = tabY + tabH_ + (_achLand ? 6 : 8);
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(progX, progY, progW, progH);
  ctx.fillStyle='#ffd700'; ctx.fillRect(progX, progY, progW*(unlockedCount/Math.max(1,filtered.length)), progH);
  ctx.font=`${sz(10)}px sans-serif`; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText(unlockedCount+' / '+filtered.length+' 달성', W/2, progY+(_achLand ? 12 : 16));

  // Grouped rows
  const listY = progY + (_achLand ? 20 : 26), rowH = _achLand ? 28 : 34;
  const listW = _achLand ? sz(320) : sz(340);
  const listX = (W - listW) / 2;
  const rows = getAchRows();

  // 하단 back 버튼 영역 제외하고 최대한 확장
  const _listBottom = H + safeBottom - sz(40);
  const maxVisible = Math.max(1, Math.floor((_listBottom - listY) / rowH));
  const maxScroll = Math.max(0, rows.length - maxVisible);
  if (achievementScroll > maxScroll) achievementScroll = maxScroll;
  const end = Math.min(rows.length, achievementScroll + maxVisible);

  for (let i = achievementScroll; i < end; i++) {
    const row = rows[i];
    const ry = listY + (i - achievementScroll) * rowH;

    if (row.type === 'header') {
      // Song header row
      ctx.fillStyle = row.song.color + '18';
      rrFill(listX, ry, listW, rowH - 3, 6);
      ctx.fillStyle = row.song.color + '44'; ctx.fillRect(listX+3, ry+4, 4, rowH-11);
      ctx.textAlign='left';
      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = row.song.color;
      ctx.fillText(row.song.name, listX+14, ry+rowH*0.55);
      ctx.textAlign='right';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(row.songDone+'/'+row.songTotal, listX+listW-10, ry+rowH*0.55);
    } else {
      const a = row.ach, done = row.done;
      // Achievement row
      ctx.fillStyle = done ? '#ffd70008' : 'rgba(255,255,255,0.015)';
      rrFill(listX+8, ry, listW-16, rowH - 3, 5);
      if (done) {
        ctx.strokeStyle='#ffd70022'; ctx.lineWidth=1; rrStroke(listX+8, ry, listW-16, rowH-3, 5);
      }

      // Check / lock
      ctx.textAlign='center';
      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = done ? '#44dd66' : 'rgba(255,255,255,0.15)';
      ctx.fillText(done ? '✓' : '○', listX+24, ry+rowH*0.55);

      // Label (without song name, since it's under the header)
      ctx.textAlign='left';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = done ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      // Strip song name from label for cleaner display
      const shortLabel = a.label.replace(/^.+? — /, '');
      ctx.fillText(shortLabel, listX+40, ry+rowH*0.55);

      // Claim button / coins
      ctx.textAlign='right';
      ctx.font=`bold ${sz(11)}px sans-serif`;
      if (done && !row.claimed) {
        // Claimable - draw button
        const claimText = '+'+a.coins+'♪ 받기';
        ctx.font=`bold ${sz(10)}px sans-serif`;
        const cbW = Math.max(sz(56), ctx.measureText(claimText).width + sz(12));
        const cbH = sz(20), cbX = listX+listW-sz(16)-cbW, cbY = ry + (rowH-3-cbH)/2;
        ctx.fillStyle = '#ffd70033'; rrFill(cbX, cbY, cbW, cbH, 5);
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1; rrStroke(cbX, cbY, cbW, cbH, 5);
        ctx.textAlign='center';
        ctx.fillStyle = '#ffd700';
        ctx.fillText(claimText, cbX+cbW/2, cbY+cbH*0.65);
      } else if (done && row.claimed) {
        ctx.fillStyle = '#44dd6688';
        ctx.fillText('수령완료', listX+listW-16, ry+rowH*0.55);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillText('+'+a.coins+'♪', listX+listW-16, ry+rowH*0.55);
      }
    }
  }

  if (rows.length === 0) {
    ctx.font=`${sz(14)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('업적이 없습니다', W/2, listY+40);
  }

  renderBottomBar();
}

function renderRanking() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song = songs[selectedSong];

  // Back button — 모바일: 좌측 최하단, 햄버거와 동일 크기
  const _mpBack = isMobile;
  const _mpLand = isMobile && !isPortrait;
  const bbW = _mpBack ? (_mpLand ? sz(46) : sz(36)) : 70;
  const bbH = _mpBack ? (_mpLand ? sz(34) : sz(28)) : 38;
  const bbX = _mpBack ? sz(8) : 12;
  const bbY = _mpBack ? (H + safeBottom - sz(4) - bbH) : (H - bbH - 10);
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.7)';
  if (_mpBack) {
    // 모바일: ← 단일 글리프 중앙 정렬 (수동 보정)
    ctx.textBaseline='middle';
    ctx.font=`bold ${_mpLand ? sz(18) : sz(16)}px sans-serif`;
    ctx.fillText('←', bbX+bbW/2, bbY+bbH/2 + sz(1));
    ctx.textBaseline='alphabetic';
  } else {
    // PC: 기존 렌더 유지
    ctx.font=`bold ${sz(13)}px sans-serif`;
    ctx.fillText('← 뒤로', bbX+bbW/2, bbY+bbH*0.65);
  }

  const _rkLand = _mpLand;
  ctx.font=`bold ${_rkLand ? sz(18) : sz(26)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillText('랭킹', W/2, _rkLand ? sz(16) : (H*0.07+10)); ctx.shadowBlur=0;

  // Song name
  ctx.font=`${_rkLand ? sz(11) : sz(15)}px sans-serif`;
  ctx.fillStyle=song.color;
  ctx.fillText(song.name, W/2, _rkLand ? sz(32) : (H*0.13));

  // Difficulty tabs
  const tabW = _rkLand ? sz(240) : sz(280);
  const tabBtnW = tabW / DIFFICULTIES.length;
  const tabH_r = _rkLand ? 22 : 28;
  const tabX = (W - tabW) / 2, tabY = _rkLand ? sz(44) : H*0.17;
  DIFFICULTIES.forEach((d, i) => {
    const bx = tabX + i * tabBtnW, sel = i === selectedDiff;
    ctx.fillStyle = sel ? d.color+'33' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, tabH_r);
    if (sel) { ctx.fillStyle = d.color; ctx.fillRect(bx, tabY+tabH_r-3, tabBtnW, 3); }
    ctx.textAlign='center';
    ctx.font=`bold ${_rkLand ? sz(10) : sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.4)';
    if (_rkLand) {
      ctx.textBaseline='middle';
      ctx.fillText(d.name, bx + tabBtnW/2, tabY + tabH_r/2);
      ctx.textBaseline='alphabetic';
    } else {
      ctx.fillText(d.name, bx + tabBtnW/2, tabY + tabH_r*0.65);
    }
  });

  // Key count sub-tabs (4K~8K)
  const keyTabCount = 5;
  const keyTabW = _rkLand ? sz(180) : sz(220);
  const keyBtnW = keyTabW / keyTabCount;
  const keyTabH = _rkLand ? 18 : 22;
  const keyTabX = (W - keyTabW) / 2, keyTabY = tabY + tabH_r + (_rkLand ? 4 : 6);
  for (let k = 0; k < keyTabCount; k++) {
    const kCount = k + 4;
    const bx = keyTabX + k * keyBtnW;
    const sel = kCount === rankingKeyCount;
    ctx.fillStyle = sel ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, keyTabY, keyBtnW, keyTabH);
    if (sel) { ctx.fillStyle = '#fff'; ctx.fillRect(bx, keyTabY+keyTabH-2, keyBtnW, 2); }
    ctx.textAlign='center';
    ctx.font=`bold ${_rkLand ? sz(9) : sz(11)}px sans-serif`;
    ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.4)';
    if (_rkLand) {
      ctx.textBaseline='middle';
      ctx.fillText(kCount+'K', bx + keyBtnW/2, keyTabY + keyTabH/2);
      ctx.textBaseline='alphabetic';
    } else {
      ctx.fillText(kCount+'K', bx + keyBtnW/2, keyTabY + keyTabH*0.7);
    }
  }

  // Rankings list
  const rankings = getRankings(selectedSong, selectedDiff, rankingKeyCount);
  const listY = keyTabY + keyTabH + (_rkLand ? 8 : 14), rowH = _rkLand ? 26 : 32;
  const listW = _rkLand ? sz(340) : sz(300);
  const listX = (W - listW) / 2;
  const _rkListBottom = H + safeBottom - sz(40);
  const maxVisible = Math.max(1, Math.floor((_rkListBottom - listY) / rowH));

  if (rankings.length === 0) {
    ctx.font=`${sz(14)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('기록이 없습니다',W/2,listY + 40);
  } else {
    const end = Math.min(rankings.length, rankingScroll + maxVisible);
    for (let i = rankingScroll; i < end; i++) {
      const r = rankings[i];
      const ry = listY + (i - rankingScroll) * rowH;
      const isMe = r.name === currentUser;

      // Row bg
      ctx.fillStyle = isMe ? song.color+'15' : 'rgba(255,255,255,0.03)';
      rrFill(listX, ry, listW, rowH - 4, 6);
      if (isMe) {
        ctx.strokeStyle = song.color+'44'; ctx.lineWidth = 1;
        rrStroke(listX, ry, listW, rowH - 4, 6);
      }

      // Rank number
      ctx.textAlign='center';
      ctx.font=`bold ${sz(16)}px sans-serif`;
      const rankColors = ['#ffd700','#c0c0c0','#cd7f32'];
      ctx.fillStyle = i < 3 ? rankColors[i] : 'rgba(255,255,255,0.4)';
      ctx.fillText(''+(i+1), listX + 22, ry + rowH*0.55);

      // Name
      ctx.textAlign='left';
      ctx.font=`${isMe?'bold ':''}${sz(14)}px sans-serif`;
      ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.7)';
      ctx.fillText(r.name, listX + 45, ry + rowH*0.55);

      // Score
      ctx.textAlign='right';
      ctx.font=`bold ${sz(14)}px sans-serif`;
      ctx.fillStyle = isMe ? song.color : 'rgba(255,255,255,0.6)';
      ctx.fillText(r.score.toLocaleString(), listX + listW - 10, ry + rowH*0.55);
    }
  }

  renderBottomBar();
}

// ===== RESULT =====
function renderResult() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song=curSong;
  ctx.font=`bold ${sz(34)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillText('RESULT',W/2,H*0.1+12); ctx.shadowBlur=0;
  ctx.font=`${sz(15)}px sans-serif`; ctx.fillStyle=song.color;
  const diffLabel = curDiff ? curDiff.name : '';
  const spdLabel = selectedSpeed.toFixed(1)+'x';
  ctx.fillText(song.name+'  ·  '+diffLabel+'  ·  '+spdLabel,W/2,H*0.17);

  const pct=totalNodes>0?collected/totalNodes:0;
  const cleared = gauge > 0; // 클리어 여부 (게이지 사망 = 미클리어)
  // 정규화 점수: 만점 100만 기준
  const TARGET_MAX = 1000000;
  const rawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
  const normalizedScore = Math.round(score / rawMax * TARGET_MAX);
  // 등급: 정확도 기반 + 미클리어 시 최대 C등급
  let grade;
  if (!cleared) {
    grade = 'D'; // 미클리어 = 무조건 D
  } else if (missed === 0) {
    grade = 'P';
  } else {
    grade = pct >= 0.98 ? 'S' : pct >= 0.90 ? 'A' : pct >= 0.80 ? 'B' : 'C';
  }
  const gc={P:'#ff44ff',S:'#ffd700',A:'#00ff88',B:'#00d4ff',C:'#ff9500',D:'#ff3333'};

  const gradeR = sz(44);
  if (grade === 'P') {
    // P등급: 무지개 링 + 강한 글로우
    const t = Date.now() * 0.003;
    ctx.beginPath(); ctx.arc(W/2,H*0.33,gradeR,0,Math.PI*2);
    const rGrad = ctx.createConicGradient(t, W/2, H*0.33);
    rGrad.addColorStop(0,'#ff44ff'); rGrad.addColorStop(0.25,'#44ddff');
    rGrad.addColorStop(0.5,'#ffdd44'); rGrad.addColorStop(0.75,'#44ff88');
    rGrad.addColorStop(1,'#ff44ff');
    ctx.strokeStyle=rGrad; ctx.lineWidth=4; ctx.stroke();
    ctx.font=`bold ${sz(32)}px sans-serif`;
    ctx.fillStyle='#ff44ff'; ctx.shadowColor='#ff44ff'; ctx.shadowBlur=40;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('PERFECT',W/2,H*0.33);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  } else {
    ctx.beginPath(); ctx.arc(W/2,H*0.33,gradeR,0,Math.PI*2);
    ctx.strokeStyle=gc[grade]+'44'; ctx.lineWidth=3; ctx.stroke();
    ctx.font=`bold ${sz(60)}px sans-serif`;
    ctx.fillStyle=gc[grade]; ctx.shadowColor=gc[grade]; ctx.shadowBlur=20;
    ctx.textBaseline='middle'; ctx.fillText(grade,W/2,H*0.33);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  }

  const stats=[['SCORE',normalizedScore.toLocaleString()],['MAX COMBO',maxCombo+'x'],['HIT',collected+' / '+totalNodes],['MISS',''+missed],['ACCURACY',(pct*100).toFixed(1)+'%']];
  ctx.font=`${sz(13)}px sans-serif`;
  const sy0=H*0.48;
  stats.forEach((s,i)=>{
    const sy=sy0+i*26;
    ctx.fillStyle='rgba(255,255,255,0.03)';
    const bw=sz(250);
    rrFill((W-bw)/2,sy-10,bw,20,5);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText(s[0],W/2-10,sy+4);
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(s[1],W/2+10,sy+4);
  });

  const msgs={P:'ALL PERFECT!!',S:'EXCELLENT!',A:'GREAT!',B:'GOOD!',C:'CLEAR',D:'TRY AGAIN'};
  ctx.font=`bold ${sz(17)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle=gc[grade]; ctx.fillText(msgs[grade],W/2,H*0.76);

  // Best score / new record
  const myBest = getMyBest(curSongIdx, selectedDiff);
  if (myBest > 0) {
    ctx.font=`bold ${sz(14)}px sans-serif`;
    if (score >= myBest) {
      ctx.fillStyle='#ffd700';
      ctx.fillText('NEW RECORD!  ' + myBest.toLocaleString(), W/2, H*0.81);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('BEST: ' + myBest.toLocaleString(), W/2, H*0.81);
    }
  }

  // Newly unlocked achievements
  if (newlyUnlocked.length > 0) {
    const achY = H*0.84;
    const achW = sz(280);
    const achX = (W-achW)/2;
    const show = Math.min(newlyUnlocked.length, 3);
    let totalCoins = 0;
    for (const a of newlyUnlocked) totalCoins += a.coins;

    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='#ffd700';
    ctx.fillText('업적 달성! +'+totalCoins.toLocaleString()+' ♪음표', W/2, achY);

    for (let i = 0; i < show; i++) {
      const a = newlyUnlocked[i];
      const ry = achY + 10 + i * 22;
      ctx.fillStyle='#ffd70015'; rrFill(achX, ry, achW, 18, 4);
      ctx.strokeStyle='#ffd70044'; ctx.lineWidth=1; rrStroke(achX, ry, achW, 18, 4);
      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fillText(a.label, achX+8, ry+13);
      ctx.textAlign='right'; ctx.fillStyle='#ffd700';
      ctx.fillText('+'+a.coins, achX+achW-8, ry+13);
    }
    if (newlyUnlocked.length > 3) {
      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('+'+(newlyUnlocked.length-3)+'개 더...', W/2, achY+10+show*22+12);
    }
  }

  ctx.font=`${sz(13)}px sans-serif`;
  ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(Date.now()*0.004)*0.2})`;
  ctx.fillText('\uD0ED\uD558\uC5EC \uB3CC\uC544\uAC00\uAE30',W/2,H*0.94);
}

// ===== PAUSE ON TAB HIDDEN =====
let gamePaused = false;
let bgAudioState = null; // 백그라운드 진입 전 오디오 상태 저장

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // 모든 오디오 일시정지 (백그라운드/최소화)
    bgAudioState = { titleBgm: titleBgmPlaying, rankingBgm: rankingBgmPlaying, shopBgm: shopBgmPlaying, achievementBgm: achievementBgmPlaying, preview: !!songPreviewAudio && !songPreviewAudio.paused };
    if (titleBgmPlaying) titleBgm.pause();
    if (rankingBgmPlaying) rankingBgm.pause();
    if (shopBgmPlaying) shopBgm.pause();
    if (achievementBgmPlaying) achievementBgm.pause();
    if (songPreviewAudio && !songPreviewAudio.paused) songPreviewAudio.pause();
    // 인게임 오디오
    if (state === 'playing') {
      pauseGame();
    }
  } else if (bgAudioState) {
    // 복귀 시 dt 스파이크 방지
    lastTime = 0;
    // 복귀 시: 인게임이 아닌 오디오만 자동 복원 (인게임은 resumeGame으로 처리)
    if (bgAudioState.titleBgm && state !== 'playing') { titleBgm.play().catch(()=>{}); }
    if (bgAudioState.rankingBgm && state === 'ranking') { rankingBgm.play().catch(()=>{}); }
    if (bgAudioState.shopBgm && state === 'shop') { shopBgm.play().catch(()=>{}); }
    if (bgAudioState.achievementBgm && state === 'achievement') { achievementBgm.play().catch(()=>{}); }
    if (bgAudioState.preview && state === 'select' && songPreviewAudio) { songPreviewAudio.play().catch(()=>{}); }
    bgAudioState = null;
  }
});

let pausedAtTime = 0; // 멈춤 시점의 gameTime
function pauseGame() {
  if (state !== 'playing' || gamePaused) return;
  gamePaused = true;
  pausedAtTime = gameTime;
  // ABS 모드: source 정지
  if (window._absNodes) {
    window._absPausedAt = actx ? actx.currentTime - window._absStartCtx : gameTime;
    for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} }
    window._absNodes = null;
  }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) allStemAudios[i].pause();
  }
  for (const a of pulseStemAudios) { if (a) a.pause(); }
  if (songAudio) songAudio.pause();
}

function resumeGame() {
  if (!gamePaused) return;
  gamePaused = false;
  lastTime = 0; // dt 스파이크 방지: 다음 프레임을 첫 프레임처럼 처리
  resumeSyncCounter = 15; // 재개 후 15프레임간 오디오에 강제 동기화
  // 오디오 위치를 gameTime 기준으로 재동기화
  if (countdownTime <= 0) {
    const targetTime = pausedAtTime;
    gameTime = targetTime;
    if (actx) songStartTime = actx.currentTime - targetTime;
    if (usingStemMode) {
      // ABS 모드: 새 source 생성하여 재개
      if (window._absPausedAt != null && stemAudioBuffers && actx) {
        window._absNodes = [];
        window._absGains = window._absGains || [];
        window._absStartCtx = actx.currentTime - window._absPausedAt;
        for (let i = 0; i < allStemAudios.length; i++) {
          if (stemAudioBuffers[i]) {
            if (!window._absGains[i]) {
              const g = actx.createGain(); g.connect(actx.destination); window._absGains[i] = g;
            }
            const src = actx.createBufferSource();
            src.buffer = stemAudioBuffers[i];
            src.connect(window._absGains[i]);
            src.start(0, window._absPausedAt);
            window._absNodes.push(src);
          } else { window._absNodes.push(null); }
        }
        window._absPausedAt = null;
      } else {
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) { allStemAudios[i].currentTime = targetTime; }
        }
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) allStemAudios[i].play().catch(()=>{});
        }
      }
      // 펄스 오디오 동기화
      for (let i = 0; i < pulseStemAudios.length; i++) {
        if (pulseStemAudios[i]) {
          pulseStemAudios[i].currentTime = targetTime + PULSE_LEAD;
          pulseStemAudios[i].play().catch(()=>{});
        }
      }
    } else if (songAudio) {
      songAudio.currentTime = targetTime;
      songAudio.play().catch(()=>{});
    }
  }
}

// ===== LOOP =====
let lastTime = 0;
function loop(time) {
  if (lastTime === 0) lastTime = time; // 첫 프레임 dt 스파이크 방지
  const dt = Math.min((time-lastTime)/1000, 0.033); // 최대 dt 33ms (30fps 하한)
  lastTime = time;
  updateAd(dt);
  if (!gamePaused) { update(dt); }
  updateFade(dt);
  render();
  // 일시정지 오버레이
  if (gamePaused && state === 'playing') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(36)}px sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText('PAUSED', W/2, H/2 - sz(60));
    // 재개 버튼
    const rbW = sz(160), rbH = sz(40);
    const rbX = (W-rbW)/2, rbY = H/2 - sz(10);
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(rbX, rbY, rbW, rbH, sz(10));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
    rrStroke(rbX, rbY, rbW, rbH, sz(10));
    ctx.font = `bold ${sz(18)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('▶ 계속하기', W/2, rbY + rbH*0.65);
    // 나가기 버튼 (재개 아래)
    const exBW = sz(160), exBH = sz(40);
    const exBX = (W-exBW)/2, exBY = rbY + rbH + sz(14);
    ctx.fillStyle = 'rgba(255,50,50,0.08)'; rrFill(exBX, exBY, exBW, exBH, sz(10));
    ctx.strokeStyle = 'rgba(255,80,80,0.5)'; ctx.lineWidth = 2;
    rrStroke(exBX, exBY, exBW, exBH, sz(10));
    ctx.font = `bold ${sz(16)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,120,120,0.9)';
    ctx.fillText('나가기', W/2, exBY + exBH*0.65);
    window._pausedExitBtn = { x: exBX, y: exBY, w: exBW, h: exBH };
  }
  renderAd();
  renderFade();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
