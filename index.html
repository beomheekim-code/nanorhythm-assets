<script>
// вҳ… л№Ңл“ң нғҖмһ„мҠӨнғ¬н”„ вҖ” л§Ө index.html м—…лҚ°мқҙнҠё мӢң мһҗлҸҷ мҰқк°Җ. м—…лҚ°мқҙнҠё к°җм§Җмҡ©.
// diag: gamble revert + м—…лҚ°мқҙнҠё к°җм§Җ м§„лӢЁ к°•нҷ” (__BUILD_TS м„ кіЎнҷ”л©ҙ л…ём¶ң)
window.__BUILD_TS = 20260422041000;
// вҳ… Firebase goOffline л¶Җмһ‘мҡ© вҖ” мқёкІҢмһ„ м§„мһ… мӢң fbDb.goOffline() нҳём¶ңн•ҳл©ҙ in-flight мӨ‘мқҙлҚҳ
//   .set()/.once() Promise л“Өмқҙ "Error: disconnect" лЎң reject. лӘЁл‘җ fire-and-forget (кІ°кіј л¬ҙкҙҖ)
//   мқҙлқј мқҳлҸ„лҗң нҳ„мғҒмқҙм§Җл§Ң .catch м—Ҷмқҙ мҸҳкі  мһҲм–ҙ "Uncaught (in promise)" кІҪкі  мҠӨнҢё л°ңмғқ.
//   м „м—ӯ handler лЎң мқҙ нҢЁн„ҙл§Ң swallow (лӢӨлҘё м§„м§ң м—җлҹ¬лҠ” к·ёлҢҖлЎң propagate).
window.addEventListener('unhandledrejection', (e) => {
  const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
  if (msg === 'disconnect' || msg.toLowerCase().includes('disconnect')) e.preventDefault();
});
// вҳ… Debug mode вҖ” 3к°Җм§Җ нҷңм„ұнҷ” кІҪлЎң (kplay мһ„лІ л“ңм—җм„  URL мҲҳм • л¶Ҳк°Җлқј м ңмҠӨмІҳ н•„мҲҳ):
//   1) URL: ?debug=1
//   2) localStorage: rhythm_debug='1' (н•ңлІҲ мјңл©ҙ мҳҒкө¬)
//   3) нғҖмқҙнӢҖ нҷ”л©ҙ мўҢмғҒлӢЁ 80Г—80 мҳҒм—ӯ 2мҙҲ мқҙлӮҙ 7нҡҢ нғӯ вҶ’ нҶ кёҖ (лӘЁл°”мқј/iframe)
//   нҷңм„ұнҷ” мӢң window._dbg м„ёнҢ… + vConsole(мӣҗкІ© console) мЈјмһ….
function _activateDebug() {
  if (window._dbg) return;
  window._dbg = {
    lastLanePressAt: {}, lanePressLog: [], doubleHitCount: {},
    loadEvents: [], notes: [],
    touchMarkers: [],
    frameGapLog: [],
    _lastFrameAt: 0,
    perfEntries: [],   // { name, durMs, t } вҖ” мөңк·ј 3мҙҲ. SLOW_FRAME мӢң лҚӨн”„мҡ©.
  };
  // _measure: кө¬к°„ нғҖмқҙл°Қ кё°лЎқ. кІҢмһ„ лЎңм§Ғ мҳҒн–Ҙ 0 (fn нҳём¶ңл§Ң timing к°җмҢҲ).
  window._measure = function(name, fn) {
    if (!window._dbg) return fn();
    const s = performance.now();
    const r = fn();
    const d = performance.now() - s;
    if (d >= 0.3) {  // 0.3ms мқҙмғҒ кё°лЎқ (мһ‘мқҖ кө¬к°„ н•©міҗм§Җл©ҙ нҒ° л№„мӨ‘)
      window._dbg.perfEntries.push({ name, durMs: d, t: s });
      const cutoff = performance.now() - 3000;
      while (window._dbg.perfEntries.length && window._dbg.perfEntries[0].t < cutoff) {
        window._dbg.perfEntries.shift();
      }
    }
    return r;
  };
  // PerformanceObserver longtask вҖ” л©”мқё мҠӨл Ҳл“ң 50ms+ лё”лЎқ мһҗлҸҷ мәЎміҗ (script/rendering л¶„лҘҳ).
  //   Safari лҠ” л¶Җл¶„ м§Җмӣҗ. м§Җмӣҗ м•Ҳ лҗҳл©ҙ л¬ҙмӢң (try/catch).
  try {
    if (typeof PerformanceObserver !== 'undefined') {
      const po = new PerformanceObserver(list => {
        for (const entry of list.getEntries()) {
          if (entry.duration >= 50) {
            try { console.log('%c[LONGTASK] ' + entry.duration.toFixed(0) + 'ms name=' + (entry.name || '?'), 'color:#ff4488;font-weight:bold'); } catch(e){}
          }
        }
      });
      po.observe({ entryTypes: ['longtask'] });
      window._dbg._po = po;
    }
  } catch(e) {}
  window._dbgLog = function(label) {
    if (!window._dbg) return;
    _dbg.loadEvents.push({ t: Math.round(performance.now()), label });
    if (_dbg.loadEvents.length > 50) _dbg.loadEvents.shift();
  };
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js';
  s.onload = () => {
    try {
      window._vc = new window.VConsole();
      window._dbg._vcLoaded = true;
      // вҳ… API: setSwitchPosition(right_px, bottom_px). right=мҡ°мёЎ edge, bottom=м•„лһҳ edge кё°мӨҖ.
      //   мҡ°мёЎ мӨ‘к°„ лҶ’мқҙ: right=8, bottom=innerHeight*0.5. л Ҳмқё нғӯ мҳҒм—ӯ(н•ҳлӢЁ) м•Ҳ к°ҖлҰј.
      try { window._vc.setSwitchPosition(8, Math.round(window.innerHeight * 0.5)); } catch(e){}
    } catch(e) { window._dbg._vcError = e.message; }
  };
  s.onerror = () => { if (window._dbg) window._dbg._vcError = 'vConsole мҠӨнҒ¬лҰҪнҠё лЎңл“ң мӢӨнҢЁ (л„ӨнҠёмӣҢнҒ¬/CSP)'; };
  document.head.appendChild(s);
}
// вҳ… vConsole DOM лӮҙл¶Җ нғӯмқҖ кІҢмһ„ input м—җм„ң л¬ҙмӢң вҖ” кІҢмһ„ мӘҪ н•ёл“Өлҹ¬л“Өмқҙ к°Ғмһҗ мқҙ н—¬нҚјлЎң мІҙнҒ¬.
//   (stopPropagation кёҲм§Җ: vConsole мһҗмІҙ нҒҙлҰӯ н•ёл“Өлҹ¬к№Ңм§Җ л§үм•„лІ„л Ө лІ„нҠјмқҙ м•Ҳ лҲҢлҰј.)
window._isVcEvent = function(e) {
  const t = e && e.target;
  if (!t || !t.closest) return false;
  return !!(t.closest('#__vconsole') || t.closest('.vc-switch') || t.closest('.vc-mask') || t.closest('.vc-panel'));
};
// вҳ… мӢңк°Ғ н„°м№ҳ л§Ҳм»Ө вҖ” мқҳмӢ¬ м§Җм җ м „л¶Җ м»ӨлІ„.
//   (1) кі м • overlay container 1к°ң (#__touchdbg) мөңмғҒмң„ body м—җ. stacking ліҙмһҘ.
//   (2) мқҙлІӨнҠёлҠ” window + document + canvas 3кіі м „л¶Җ listen вҖ” н•ҳлӮҳ л“ңлЎӯлҸјлҸ„ лӢӨлҘё кІҪлЎң.
//   (3) _dbg кІҖмӮ¬ лҢҖмӢ  URL/localStorage н”Ңлһҳк·ё м§Ғм ‘ мІҙнҒ¬ вҖ” нҷңм„ұнҷ” нғҖмқҙл°Қ л ҲмқҙмҠӨ м ңкұ°.
//   (4) CSS transition лҢҖмӢ  rAF мҲҳлҸҷ м• лӢҲл©”мқҙм…ҳ вҖ” iOS transition л¶Ҳм•Ҳм • нҡҢн”ј.
//   (5) л§Ө л§Ҳм»Ө мғқм„ұ мӢң vConsole console.log вҖ” DOM мӢӨнҢЁн•ҙлҸ„ лЎңк·ёлҠ” лӮЁмқҢ.
(function(){
  function _dbgActive() {
    if (window._dbg) return true;
    try {
      if (new URLSearchParams(location.search).get('debug') === '1') return true;
      if (localStorage.getItem('rhythm_debug') === '1') return true;
    } catch(e) {}
    return false;
  }
  let container = null;
  function _ensureContainer() {
    if (container && document.body && document.body.contains(container)) return container;
    container = document.createElement('div');
    container.id = '__touchdbg';
    container.style.cssText =
      'position:fixed;left:0;top:0;right:0;bottom:0;' +
      'pointer-events:none;' +
      'z-index:2147483647;' +
      'overflow:visible;';
    (document.body || document.documentElement).appendChild(container);
    return container;
  }
  window._showMarker = function(x, y, src) {
    try {
      if (!_dbgActive()) return;
      _ensureContainer();
      const d = document.createElement('div');
      const isT = src === 'touch';
      const bg = isT ? 'rgba(0,255,100,0.55)' : 'rgba(80,150,255,0.55)';
      const border = isT ? '#00ff66' : '#3aa8ff';
      d.style.cssText =
        'position:absolute;' +
        'left:' + (x - 18) + 'px;top:' + (y - 18) + 'px;' +
        'width:36px;height:36px;border-radius:50%;' +
        'background:' + bg + ';border:2px solid ' + border + ';' +
        'box-shadow:0 0 4px ' + border + ';' +
        'opacity:1;transform:scale(1);will-change:opacity,transform;' +
        'transition:opacity 300ms linear, transform 300ms linear;';
      container.appendChild(d);
      // CSS transition нҠёлҰ¬кұ° вҖ” compositor thread м—җм„ң мІҳлҰ¬ (л©”мқё мҠӨл Ҳл“ң л¶Җн•ҳ 0).
      //   rAF tick лЈЁн”„ мӮӯм ң: л§Ө н”„л Ҳмһ„ JS лЎң style м—…лҚ°мқҙнҠён•ҳлҚҳ кІғмқ„ лёҢлқјмҡ°м Җк°Җ GPUлЎң.
      requestAnimationFrame(() => {
        d.style.opacity = '0';
        d.style.transform = 'scale(1.3)';
      });
      setTimeout(() => { try { d.remove(); } catch(e){} }, 350);
      try { console.log('%c[MARK] ' + src + ' @(' + Math.round(x) + ',' + Math.round(y) + ')', 'color:' + border + ';font-weight:bold'); } catch(e){}
    } catch(e) {
      try { console.error('[MARK_ERR]', e && e.message); } catch(_){}
    }
  };
  function _fire(e, src) {
    if (window._isVcEvent && window._isVcEvent(e)) return;
    let x, y;
    if (src === 'touch') {
      const t = e.changedTouches && e.changedTouches[0];
      if (!t) return;
      x = t.clientX; y = t.clientY;
    } else {
      x = e.clientX; y = e.clientY;
    }
    window._showMarker(x, y, src);
  }
  function _attach(target) {
    if (!target || !target.addEventListener) return;
    try {
      target.addEventListener('touchstart', (e) => _fire(e, 'touch'), { passive: true, capture: true });
      target.addEventListener('pointerdown', (e) => _fire(e, 'pointer'), { capture: true });
    } catch(e) {}
  }
  // window 1кіім—җл§Ң attach вҖ” capture лӢЁкі„м—җм„ң лӘЁл“  мқҙлІӨнҠё catch лҗЁ.
  //   мқҙм „: window+document+canvas 3мӨ‘ вҶ’ мқҙлІӨнҠёлӢ№ [MARK] 3лІҲ м°ҚнһҲкі  DOM 3к°ң мғқм„ұ (лЎңк·ё мҠӨнҢё + л¶Җн•ҳ).
  _attach(window);
})();
function _deactivateDebug() {
  window._dbg = null;
  try { if (window._vc) { window._vc.destroy(); window._vc = null; } } catch(e){}
  try { localStorage.removeItem('rhythm_debug'); } catch(e){}
}
// мҪҳмҶ” н—¬нҚј (desktop DevTools мҡ©)
window.enableDebug  = function(){ try { localStorage.setItem('rhythm_debug','1'); } catch(e){} _activateDebug(); };
window.disableDebug = function(){ _deactivateDebug(); };
// мҙҲкё°нҷ”: URL param OR localStorage flag
(function(){
  try {
    const p = new URLSearchParams(location.search);
    let on = (p.get('debug') === '1');
    try { if (localStorage.getItem('rhythm_debug') === '1') on = true; } catch(e){}
    if (on) _activateDebug();
  } catch(e) {}
})();
// нғҖмқҙнӢҖ мўҢмғҒлӢЁ 7нғӯ мӢңнҒ¬лҰҝ м ңмҠӨмІҳ
(function(){
  const taps = [];
  function onTap(x, y) {
    if (x > 80 || y > 80) { taps.length = 0; return; }
    const now = performance.now();
    taps.push(now);
    while (taps.length && now - taps[0] > 2000) taps.shift();
    if (taps.length >= 7) {
      taps.length = 0;
      if (window._dbg) {
        _deactivateDebug();
        try { (window.showLoginToast || window.alert)('Debug OFF', '#ff6666'); } catch(e){}
      } else {
        try { localStorage.setItem('rhythm_debug','1'); } catch(e){}
        _activateDebug();
        try { (window.showLoginToast || window.alert)('Debug ON вҖ” vConsole лЎңл”©', '#44dd66'); } catch(e){}
      }
    }
  }
  // мқёкІҢмһ„ 'playing' мғҒнғңл§Ң м ңмҷё (л…ёнҠё нғӯкіј кІ№м№ҳл©ҙ мҳӨл°ң мң„н—ҳ). лӮҳлЁём§Җ(title/login/select/...) м „л¶Җ н—Ҳмҡ©.
  const ALLOW_STATES = { title: 1, login: 1, select: 1, shop: 1, inventory: 1, ranking: 1, achievement: 1, result: 1 };
  function _dbgGestureOk() { return typeof state === 'undefined' || !!ALLOW_STATES[state]; }
  window.addEventListener('touchstart', (e) => {
    if (!_dbgGestureOk()) return;
    const t = e.changedTouches && e.changedTouches[0];
    if (t) onTap(t.clientX, t.clientY);
  }, { passive: true, capture: true });
  window.addEventListener('mousedown', (e) => {
    if (!_dbgGestureOk()) return;
    onTap(e.clientX, e.clientY);
  }, { capture: true });
})();
// вҳ… resumeAudio нғӯлӢ№ мҳӨлІ„н—Өл“ң м ңкұ° вҖ” audioSession мһ¬м„Өм • skip, applyBgmVol ліҖкІҪмӢңл§Ң
(function(){
  try {
    // мІ« лЎңл“ң мӢң URL м—җ _v нғҖмһ„мҠӨнғ¬н”„ л¶Җм—¬ (iframe src мһ¬мҡ”мІӯ мӢң fresh к°•м ң)
    if (location.search.indexOf('_v=') === -1) {
      var sep = location.search ? '&' : '?';
      location.replace(location.pathname + location.search + sep + '_v=' + Date.now() + location.hash);
      return;
    }
    // мЈјкё°м Ғ м—…лҚ°мқҙнҠё к°җм§Җ вҖ” м„ңлІ„ мөңмӢ  HTML м—җм„ң __BUILD_TS м¶”м¶ң л№„көҗ
    // вҳ… м§„лӢЁ: window.__lastUpdateCheck (мғҒнғң/мӢңк°Ғ/м„ңлІ„TS), window.__lastUpdateCheckErr (л§Ҳм§Җл§ү м—җлҹ¬)
    //   м„ кіЎнҷ”л©ҙ кө¬м„қм—җ л…ём¶ңн•ҙм„ң мң м Җк°Җ KPLAY нҷҳкІҪм—җм„ң fetch лҸҷмһ‘ м—¬л¶Җ м§Ғм ‘ нҷ•мқё к°ҖлҠҘ.
    window.__lastUpdateCheck = null;
    window.__lastUpdateCheckErr = null;
    async function _checkUpdate(){
      if (document.hidden || window.__updateAvailable) return; // мқҙлҜё к°җм§Җлҗҗмңјл©ҙ skip
      // вҳ… мқёкІҢмһ„ мӨ‘м—” fetch/regex к°Җ main thread л¶ҖлӢҙ вҶ’ н„°м№ҳ dispatch м§Җм—° мӣҗмқё.
      //   лӘЁлӢ¬ мһҗмІҙк°Җ state !== 'playing' м—җм„ңл§Ң лңЁкі , transitionTo м—җм„ң playing мў…лЈҢ мӢң
      //   мҰүмӢң _checkUpdate() нҳём¶ңн•ҳлҜҖлЎң мқёкІҢмһ„ мӨ‘ мІҙнҒ¬лҠ” мҲңмҲҳ лӮӯл№„.
      if (typeof state !== 'undefined' && state === 'playing') return;
      try {
        // вҳ… мҝјлҰ¬ мҳӨм—ј м ңкұ° вҖ” location.href мқҖ _v=, __chk= лҲ„м Ғ к°ҖлҠҘ. pathname кё°л°ҳмңјлЎң к№ЁлҒ—мқҙ.
        //   CDN мқҙ мҝјлҰ¬ кё°л°ҳ мәҗмӢң нӮӨ м“°л©ҙ л§Ө нҳём¶ңл§ҲлӢӨ лӢӨлҘё URL вҶ’ мәҗмӢң miss к°•м ң.
        var u = location.pathname + '?v=' + Date.now();
        var r = await fetch(u, {cache:'no-store'});
        if (!r.ok) { window.__lastUpdateCheckErr = 'HTTP ' + r.status; return; }
        var txt = await r.text();
        var m = txt.match(/window\.__BUILD_TS\s*=\s*(\d+)/);
        if (m) {
          var srv = parseInt(m[1]);
          window.__lastUpdateCheck = { srv: srv, t: Date.now() };
          window.__lastUpdateCheckErr = null;
          if (srv > window.__BUILD_TS) {
            console.log('[update] detected:', srv, '>', window.__BUILD_TS);
            window.__updateAvailable = true;
          }
        } else {
          window.__lastUpdateCheckErr = 'NO_BUILD_TS (wrapper?)';
        }
      } catch(e) {
        window.__lastUpdateCheckErr = (e && e.message) ? e.message.slice(0,40) : 'FETCH_ERR';
        console.warn('[update] check failed:', e);
      }
    }
    // 5мҙҲ нӣ„ мІ« мІҙнҒ¬, мқҙнӣ„ 30мҙҲл§ҲлӢӨ. visibilitychange м—җм„ңлҸ„ мІҙнҒ¬ (л°ұк·ёлқјмҡҙл“ң ліөк·Җ мӢң).
    // transitionTo м—җм„ң playingвҶ’select/title м „нҷҳ мӢң мҰүмӢң нҳём¶ң (мқёкІҢмһ„ лӮҳмҳӨмһҗл§Ҳмһҗ к°җм§Җ).
    window._checkUpdate = _checkUpdate;
    setTimeout(_checkUpdate, 5000);
    setInterval(_checkUpdate, 30000);
    document.addEventListener('visibilitychange', function(){ if (!document.hidden) _checkUpdate(); });
  } catch(e) {}
})();
</script>

<script>

  });
  const fbDb = firebase.database();
  // Firebase Auth м ңкұ°лҗЁ (Kplay лЎңк·ёмқёмңјлЎң лҢҖмІҙ)

  // ========== NETWORK RESILIENCE LAYER ==========
  // м•Ҫн•ң л„ӨнҠёмӣҢнҒ¬/мң мӢӨ/LTEвҶ”WiFi м „нҷҳ/лӢЁм Ҳ лҢҖмқ‘.
  const _QUEUE_MAX = 200;
  const _QUEUE_RETRY_MAX = 3;
  const _QUEUE_LS_KEY = '__netWriteQueue';
  function _loadQueueFromLS() {
    try { return JSON.parse(localStorage.getItem(_QUEUE_LS_KEY) || '[]'); } catch(e) { return []; }
  }
  function _saveQueueToLS(q) {
    try { localStorage.setItem(_QUEUE_LS_KEY, JSON.stringify(q.slice(-_QUEUE_MAX))); } catch(e) {}
  }
  window.__net = {
    online: typeof navigator !== 'undefined' ? navigator.onLine !== false : true,
    writeQueue: _loadQueueFromLS(),  // reload мӢң pending м“°кё° ліөкө¬
    lastReconnectAt: 0,
    toastShown: {},
    _lastEffType: null,              // connection change мӢӨм ң нғҖмһ… ліҖкІҪл§Ң л°ҳмқ‘
    _flushing: false,                // flush лҸҷмӢң мӢӨн–ү л°©м§Җ
  };
  function _enqueue(item) {
    item.tries = item.tries || 0;
    if (item.tries >= _QUEUE_RETRY_MAX) {
      console.warn('[NET] writeQueue drop (retry exhausted):', item.path);
      return;
    }
    window.__net.writeQueue.push(item);
    // мғҒн•ң мҙҲкіј мӢң мҳӨлһҳлҗң кІғ drop
    while (window.__net.writeQueue.length > _QUEUE_MAX) window.__net.writeQueue.shift();
    _saveQueueToLS(window.__net.writeQueue);
  }

  // кіөмҡ© Firebase м“°кё° лһҳнҚј вҖ” мӢӨнҢЁ/мҳӨн”„лқјмқё/нғҖмһ„м•„мӣғ мӢң нҒҗм—җ м ҖмһҘ.
  //   кё°мЎҙ fbDb.ref(path).set(val) / .update(obj) лҢҖмІҙмҡ©. кё°мЎҙ мҪ”л“ң м җм§„ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ.
  window.fbSafeSet = function(path, value) {
    if (!fbDb) return Promise.resolve(false);
    if (!window.__net.online) {
      _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
      return Promise.resolve(false);
    }
    return new Promise(resolve => {
      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
        resolve(false);
      }, 8000);
      try {
        fbDb.ref(path).set(value).then(() => {
          if (done) return; done = true; clearTimeout(timeout); resolve(true);
        }).catch(() => {
          if (done) return; done = true; clearTimeout(timeout);
          _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
          resolve(false);
        });
      } catch(e) {
        if (!done) { done = true; clearTimeout(timeout); resolve(false); }
      }
    });
  };

  // кіөмҡ© Firebase мқҪкё° лһҳнҚј вҖ” нғҖмһ„м•„мӣғ + fallback.
  window.fbSafeOnce = function(path, timeoutMs) {
    timeoutMs = timeoutMs || 6000;
    if (!fbDb) return Promise.resolve(null);
    return new Promise(resolve => {
      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        resolve(null);
      }, timeoutMs);
      try {
        fbDb.ref(path).once('value').then(snap => {
          if (done) return; done = true; clearTimeout(timeout);
          resolve(snap && snap.val ? snap.val() : null);
        }).catch(() => {
          if (done) return; done = true; clearTimeout(timeout);
          resolve(null);
        });
      } catch(e) {
        if (!done) { done = true; clearTimeout(timeout); resolve(null); }
      }
    });
  };

  // мҳӨн”„лқјмқё нҒҗ flush вҖ” мҳЁлқјмқё ліөк·Җ мӢң нҳём¶ң. лҸҷмӢң мӢӨн–ү л°©м§Җ + мһ¬мӢңлҸ„ мғҒн•ң + LS л°ұм—….
  window.__net._flushQueue = function() {
    if (window.__net._flushing) return;        // мӨ‘ліө flush л°©м§Җ
    if (!window.__net.online || !fbDb) return;
    if (window.__net.writeQueue.length === 0) return;
    window.__net._flushing = true;
    const q = window.__net.writeQueue.slice();
    window.__net.writeQueue.length = 0;
    _saveQueueToLS(window.__net.writeQueue);
    // к°ҷмқҖ path лҠ” мөңмӢ  кІғл§Ң
    const dedupe = new Map();
    for (const item of q) dedupe.set(item.path, item);
    const items = Array.from(dedupe.values());
    let remaining = items.length;
    if (remaining === 0) { window.__net._flushing = false; return; }
    for (const item of items) {
      try {
        if (item.op === 'set') {
          fbDb.ref(item.path).set(item.value).then(() => {
            if (--remaining <= 0) window.__net._flushing = false;
          }).catch(() => {
            item.tries = (item.tries || 0) + 1;
            _enqueue(item);   // мғҒн•ң мІҙнҒ¬ нҸ¬н•Ё
            if (--remaining <= 0) window.__net._flushing = false;
          });
        } else {
          if (--remaining <= 0) window.__net._flushing = false;
        }
      } catch(e) {
        item.tries = (item.tries || 0) + 1;
        _enqueue(item);
        if (--remaining <= 0) window.__net._flushing = false;
      }
    }
    // м•Ҳм „мһҘм№ҳ вҖ” 30мҙҲ нӣ„ л¬ҙмЎ°кұҙ flushing н•ҙм ң
    setTimeout(() => { window.__net._flushing = false; }, 30000);
  };

  // ---- л„ӨнҠёмӣҢнҒ¬ мғҒнғң ліҖнҷ” к°җм§Җ ----
  function _netToast(msg, color) {
    if (window.__net.toastShown[msg] && Date.now() - window.__net.toastShown[msg] < 3000) return;
    window.__net.toastShown[msg] = Date.now();
    try {
      if (typeof showLoginToast === 'function') showLoginToast(msg, color);
      else console.log('[NET]', msg);
    } catch(e) {}
  }
  function _onNetOnline() {
    const wasOnline = window.__net.online;
    window.__net.online = true;
    if (!wasOnline) {
      _netToast('л„ӨнҠёмӣҢнҒ¬ ліөкө¬лҗЁ', '#44dd66');
      window.__net._flushQueue();
      _forceReconnectFirebase();
    }
  }
  function _onNetOffline() {
    window.__net.online = false;
    _netToast('л„ӨнҠёмӣҢнҒ¬ м—°кІ° лҒҠк№Җ вҖ” м§„н–ү мғҒнҷ©мқҙ мһҗлҸҷ м ҖмһҘлҗ©лӢҲлӢӨ', '#ffaa33');
  }
  // Firebase socket мһ¬м—°кІ° вҖ” LTEвҶ”WiFi м „нҷҳ мӢң stuck мғҒнғң л°©м§Җ.
  //   goOfflineвҶ’goOnline нҠёлҰ¬кұ°н•ҳл©ҙ кё°мЎҙ мҶҢмј“ лҒҠкі  мғҲ кІҪлЎңлЎң мһ¬м—°кІ°.
  function _forceReconnectFirebase() {
    const now = Date.now();
    if (now - window.__net.lastReconnectAt < 5000) return;  // 5мҙҲ лӮҙ мӨ‘ліө л°©м§Җ
    window.__net.lastReconnectAt = now;
    try { fbDb.goOffline(); setTimeout(() => { try { fbDb.goOnline(); } catch(e){} }, 200); } catch(e) {}
  }

  window.addEventListener('online', _onNetOnline);
  window.addEventListener('offline', _onNetOffline);

  // Connection API (Chromium) вҖ” effectiveType ліҖкІҪ мӢң (WiFiвҶ”LTE м „нҷҳ) Firebase мһ¬м—°кІ°.
  try {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn && conn.addEventListener) {
      window.__net._lastEffType = conn.effectiveType || null;
      conn.addEventListener('change', () => {
        const newType = conn.effectiveType || null;
        const prevType = window.__net._lastEffType;
        // мӢӨм ң л„ӨнҠёмӣҢнҒ¬ м „нҷҳ (LTEвҶ’WiFi л“ұ) мқём§Җ к°ҷмқҖ мў…лҘҳ мӢ нҳё мҡ”лҸҷмқём§Җ кө¬л¶„.
        //   к°ҷмқҖ нғҖмһ…мқҙл©ҙ reconnect мҠӨнӮө (кіјнҳём¶ң л°©м§Җ).
        if (newType === prevType) return;
        window.__net._lastEffType = newType;
        if (newType === 'slow-2g' || newType === '2g') {
          _netToast('м•Ҫн•ң л„ӨнҠёмӣҢнҒ¬ (' + newType + ') вҖ” лЎңл”© м§Җм—° к°ҖлҠҘ', '#ffaa33');
        }
        if (window.__net.online) _forceReconnectFirebase();
      });
    }
  } catch(e) {}

  // visibilitychange вҖ” л°ұк·ёлқјмҡҙл“ңм—җм„ң ліөк·Җ мӢң Firebase мһ¬м—°кІ° (iOS Safari мҶҢмј“ drop л№ҲлІҲ).
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && window.__net.online) {
      _forceReconnectFirebase();
    }
  });

  // мЈјкё°м Ғ health check вҖ” 5л¶„л§ҲлӢӨ мҶҢмј“ мӮҙм•„мһҲлҠ”м§Җ к°„лӢЁ ping.
  setInterval(() => {
    if (!window.__net.online || !fbDb) return;
    try {
      fbDb.ref('.info/connected').once('value').then(snap => {
        if (!snap.val()) _forceReconnectFirebase();
      }).catch(() => _forceReconnectFirebase());
    } catch(e) {}
  }, 300000);

  // вҳ… нҺҳмқҙм§Җ лЎңл“ң м§Ғнӣ„ LS м—җм„ң ліөмӣҗн•ң нҒҗк°Җ мһҲмңјл©ҙ online мғҒнғңм—җм„ң мҰүмӢң flush.
  //   мқҙм „ м„ём…ҳм—җм„ң мҳӨн”„лқјмқё мӨ‘ мҢ“мқё м“°кё° вҶ’ мғҲлЎңкі м№Ё л’Ө мһҗлҸҷ ліөмӣҗ + м „мҶЎ.
  if (window.__net.writeQueue.length > 0) {
    console.log('[NET] LS м—җм„ң pending м“°кё°', window.__net.writeQueue.length, 'кұҙ ліөмӣҗ');
    if (window.__net.online) {
      setTimeout(() => window.__net._flushQueue(), 2000); // Firebase м—°кІ° м•Ҳм • нӣ„
    }
  }

  // ---- Fetch лһҳнҚј вҖ” нғҖмһ„м•„мӣғ + мһ¬мӢңлҸ„ (exponential backoff) ----
  window.fetchSafe = async function(url, opts, config) {
    opts = opts || {};
    config = config || {};
    const maxRetries = config.retries != null ? config.retries : 3;
    const timeoutMs = config.timeout != null ? config.timeout : 15000;
    let attempt = 0;
    while (attempt <= maxRetries) {
      const ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      const t = setTimeout(() => { if (ctrl) ctrl.abort(); }, timeoutMs);
      try {
        const fetchOpts = ctrl ? { ...opts, signal: ctrl.signal } : opts;
        const res = await fetch(url, fetchOpts);
        clearTimeout(t);
        // 5xx / 408 timeout / 429 rate-limit мқҖ ліөкө¬ к°ҖлҠҘн•ң мӢӨнҢЁ вҶ’ retry
        if (!res.ok && attempt < maxRetries && (res.status >= 500 || res.status === 408 || res.status === 429)) {
          throw new Error('retryable ' + res.status);
        }
        return res;
      } catch(e) {
        clearTimeout(t);
        if (attempt === maxRetries) throw e;
        await new Promise(r => setTimeout(r, 400 * Math.pow(2, attempt)));
        attempt++;
      }
    }
  };

<script>
'use strict';

// iOS к°җм§Җ (resize() м „м—җ м •мқҳлҗҳм–ҙм•ј н•Ё вҖ” TDZ м—җлҹ¬ л°©м§Җ)

const isAndroid = /Android/i.test(navigator.userAgent);

// вҳ… Sprite pre-bake мәҗмӢң вҖ” resize()/setLaneMode() ліҙлӢӨ лЁјм Җ м°ёмЎ°лҗ  мҲҳ мһҲм–ҙ мөңмғҒлӢЁ hoist.
//   const TDZ лЎң strict mode м—җм„  typeof мІҙнҒ¬лҸ„ ReferenceError вҶ’ мҠӨнҒ¬лҰҪнҠё м „мІҙ мӨ‘лӢЁ вҶ’ кІҖмқҖ нҷ”л©ҙ.
const skinSpriteBakery = new Map();

// вҳ…вҳ… нҷ”л©ҙ л…№нҷ” мҳӨл””мҳӨ мәЎмІҳ вҖ” лӘЁл“Ҳ мөңмғҒлӢЁ м„ м ң м„Өм • (HTMLAudio мғқм„ұ мқҙм „) вҳ…вҳ…
//   л¬ём ң: titleBgm/rankingBgm/shopBgm/achievementBgm/clickSfx л“ұмқҖ line 440~
//         м—җм„ң `new Audio(...)` лЎң мҰүмӢң мғқм„ұлҗЁ. iOS лҠ” Audio м—ҳлҰ¬лЁјнҠё мІ« мғқм„ұ/play мӢңм җмқҳ
//         мҳӨл””мҳӨ м„ём…ҳ м№ҙн…Ңкі лҰ¬м—җ л°”мқёл“ң вҶ’ к·ё л’Ө initAudio() м—җм„ң 'playback' м„ёнҢ…н•ҙлҸ„

//   н•ҙкІ°: м—¬кё°м„ң м„ м ңлЎң 'playback' кі м • вҶ’ мқҙнӣ„ мғқм„ұлҗҳлҠ” лӘЁл“  Audio/actx к°Җ playback кіөмң .

// ===== KPlay API (кіөмӢқ docs.kplay.games лІ„м „) =====
class KPlayAPI {
  constructor() {
    this.user = { userId: null, name: null, credits: 0 };
    this._pending = null;
    this._onUserInfo = null;
    this._onPurchaseResult = null;
    this._onScoreSubmitted = null;
    this._reqs = new Map();
    this._reqSeq = 0;
    this._storagePrefix = 'kplay:';
    this.storage = {
      getItem: (key) => this._storageGet(key),
      setItem: (key, value) => this._storageSet(key, value),
      removeItem: (key) => this._storageRemove(key),
      keys: () => this._storageKeys(),
    };
    window.addEventListener('message', (e) => {
      const { type, ...data } = e.data ?? {};
      if (!type) return;
      switch (type) {
        case 'user-info':
          this.user = { userId: data.userId, name: data.name, credits: data.credits ?? 0 };
          this._onUserInfo?.(this.user);
          if (data.userId) this._syncStorageFromServer();
          break;
        case 'purchase-result':
          if (data.success) this.user.credits = data.balance;
          this._onPurchaseResult?.(data);
          this._pending = null;
          break;
        case 'score-submitted':
          this._onScoreSubmitted?.(data);
          break;
        case 'storage-load-result':
        case 'storage-set-result':
        case 'storage-remove-result': {
          const req = this._reqs.get(data.requestId);
          if (!req) break;
          this._reqs.delete(data.requestId);
          data.success ? req.resolve(data) : req.reject(new Error(data.error || 'storage error'));
          break;
        }
      }
    });
  }
  _request(type, payload) {
    const requestId = `r${++this._reqSeq}`;
    return new Promise((resolve, reject) => {
      this._reqs.set(requestId, { resolve, reject });
      try { window.parent.postMessage({ type, requestId, ...payload }, '*'); } catch(e) {}
      setTimeout(() => {
        if (this._reqs.has(requestId)) { this._reqs.delete(requestId); reject(new Error('timeout')); }
      }, 10000);
    });
  }
  _lsKey(key) { return this._storagePrefix + key; }
  async _storageGet(key) { try { return localStorage.getItem(this._lsKey(key)); } catch(e) { return null; } }
  async _storageSet(key, value) {
    try { localStorage.setItem(this._lsKey(key), String(value)); } catch(e) {}
    if (!this.user.userId) return;
    try { await this._request('storage-set', { key, value: String(value) }); }
    catch (e) { console.warn('[kplay] cloud save failed, kept local:', e.message); }
  }
  async _storageRemove(key) {
    try { localStorage.removeItem(this._lsKey(key)); } catch(e) {}
    if (!this.user.userId) return;
    try { await this._request('storage-remove', { key }); } catch {}
  }
  async _storageKeys() {
    const keys = []; const prefix = this._storagePrefix;
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k.slice(prefix.length));
      }
    } catch(e) {}
    return keys;
  }
  async _syncStorageFromServer() {
    try {
      const res = await this._request('storage-load', {});
      const data = res.data || {};
      for (const [k, v] of Object.entries(data)) {
        try { localStorage.setItem(this._lsKey(k), v); } catch(e) {}
      }
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith(this._storagePrefix)) continue;
        const key = k.slice(this._storagePrefix.length);
        if (!(key in data)) {
          const value = localStorage.getItem(k);
          if (value != null) this._request('storage-set', { key, value }).catch(() => {});
        }
      }
    } catch (e) { console.warn('[kplay] storage sync failed:', e.message); }
  }
  purchase(itemId, itemName, price) {
    if (this._pending) return;
    if (!this.user.userId) { this.requestLogin(); return; }
    if (this.user.credits < price) { this.openCreditShop(); return; }
    this._pending = { itemId, itemName, price };
    try { window.parent.postMessage({ type: 'purchase-item', itemId, itemName, price }, '*'); } catch(e) {}
  }
  submitScore(score) { try { window.parent.postMessage({ type: 'submit-score', score }, '*'); } catch(e) {} }
  openCreditShop() { try { window.parent.postMessage({ type: 'credit-shop' }, '*'); } catch(e) {} }
  showLeaderboard() { try { window.parent.postMessage({ type: 'show-leaderboard' }, '*'); } catch(e) {} }
  log(eventType, metadata) { try { window.parent.postMessage({ type: 'analytics-event', eventType, metadata }, '*'); } catch(e) {} }
  requestLogin() { try { window.parent.postMessage({ type: 'login-required' }, '*'); } catch(e) {} }
  on(event, callback) {
    if (event === 'userInfo') this._onUserInfo = callback;
    if (event === 'purchaseResult') this._onPurchaseResult = callback;
    if (event === 'scoreSubmitted') this._onScoreSubmitted = callback;
    return this;
  }
}
window.kplay = new KPlayAPI();

// ===== Storage wrapper (localStorage sync + kplay.storage mirror) =====
function _kpHas() { return !!(window.kplay && window.kplay.storage); }
function safeGetItem(key) {
  try { return window.localStorage.getItem(key); } catch(e) { return null; }
}
function safeSetItem(key, val) {
  try { window.localStorage.setItem(key, val); } catch(e) {}
  if (_kpHas()) { try { window.kplay.storage.setItem(key, val); } catch(e) {} }
}
function safeRemoveItem(key) {
  try { window.localStorage.removeItem(key); } catch(e) {}
  if (_kpHas()) { try { window.kplay.storage.removeItem(key); } catch(e) {} }

    let targetStems = [];
    let targetOffset = 0;
    if (curSong && curSong._onsetMode && nodes.length > 0) {
      const delay = curSong._startDelay || 0;
      for (const n of nodes) {
        if (n.hit || n.missed) continue;
        if (n.lane === lane && n.stem != null) {
          targetStems = [n.stem];
          targetOffset = Math.max(0, n.time - delay); // л…ёнҠёмқҳ мӢӨм ң мҳӨл””мҳӨ мң„м№ҳ
          break;
        }
      }
      if (targetStems.length === 0) {
        for (const n of nodes) {
          if (!n.hit && !n.missed && n.stem != null) {
            targetStems = [n.stem];
            targetOffset = Math.max(0, n.time - delay);
            break;
          }
        }
      }
    }
    if (targetStems.length === 0) {
      // fallback: л Ҳмқё л§Өн•‘ мӮ¬мҡ©
      const ls = getLaneStems();
      if (ls && ls[lane]) targetStems = ls[lane].filter(si => !ALWAYS_AUDIBLE_STEMS.includes(si));
    }
    targetStems.forEach(si => {
      const stemEnded = allStemAudios[si] ? allStemAudios[si].ended : true;
      if (countdownTime > 0 || stemEnded) {
        if (stemAudioBuffers[si] && actx) {
          const src = actx.createBufferSource();
          const gain = actx.createGain();
          src.buffer = stemAudioBuffers[si];
          gain.gain.setValueAtTime(peakVol, actx.currentTime);
          gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.5);
          src.connect(gain); gain.connect(actx.destination);
          const offset = targetOffset > 0 ? targetOffset : (stemFirstSoundTime[si] || 0);
          src.start(0, offset, 0.5);
        }
      } else {
        stemPulses[si] = { start: now, peak: peakVol, dur: 500 };
        if (allStemAudios[si]) allStemAudios[si].volume = peakVol;
      }
    });
  } else {
    const freq = EMPTY_TAP_FREQS[lane % EMPTY_TAP_FREQS.length];
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(peakVol * 0.25, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.12);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + 0.12);
  }
}

// ===== SONG LOCK / SHOP SYSTEM =====
const FREE_SONG_COUNT = 10; // кё°ліё л¬ҙлЈҢ кіЎ мҲҳ
const UNLOCK_POINT_COST = 100; // нҸ¬мқёнҠёлЎң 1нҡҢ н•ҙкёҲ л№„мҡ©
const PASS_DURATION_MS = 28 * 24 * 60 * 60 * 1000; // 28мқј

function isSongLocked(idx) {
  if (idx < FREE_SONG_COUNT) return false;
  if (hasActivePass()) return false;
  if (getSongFreePlayCount(idx) > 0) return false;
  return true;
}
function hasActivePass() {
  const ts = parseInt(safeGetItem('rhythm_pass_' + (currentUser||'guest')) || '0');
  return ts > 0 && Date.now() < ts;
}
function hasEverPurchasedPass() {
  return safeGetItem('rhythm_passBought_' + (currentUser||'guest')) === '1';
}
function activatePass() {
  const expiry = Date.now() + PASS_DURATION_MS;
  safeSetItem('rhythm_pass_' + (currentUser||'guest'), '' + expiry);
  safeSetItem('rhythm_passBought_' + (currentUser||'guest'), '1');
  if (currentUser && fbDb) try {
    fbDb.ref('settings/' + currentUser + '/passExpiry').set(expiry);
    fbDb.ref('settings/' + currentUser + '/passBought').set(true);
  } catch(e) {}
}
function getPassExpiry() {
  return parseInt(safeGetItem('rhythm_pass_' + (currentUser||'guest')) || '0');
}
function loadPassFromFirebase() {
  if (!currentUser || !fbDb) return;
  fbDb.ref('settings/' + currentUser + '/passExpiry').once('value', snap => {
    const v = snap.val();
    if (v && v > Date.now()) safeSetItem('rhythm_pass_' + currentUser, '' + v);
  });
  fbDb.ref('settings/' + currentUser + '/passBought').once('value', snap => {
    if (snap.val()) safeSetItem('rhythm_passBought_' + currentUser, '1');
  });
}

// ===== кі„м • лҚ°мқҙн„° Firebase лҸҷкё°нҷ” (v16.2) =====
// лӘЁл“  мӮ¬мҡ©мһҗ лҚ°мқҙн„°лҘј settings/{user}/ кІҪлЎңлЎң sync.
// лЎңл“ң мӢң local кіј Firebase лҘј **merge** (max/union) вҖ” лЁјм Җ мғқм„ұлҗң мӣҗліё лҚ°мқҙн„° ліҙмЎҙ.
// м¶©лҸҢ мӢң: мҪ”мқё/free plays лҠ” max, м—…м Ғ/мҡ°нҺён•ЁмқҖ union (лҚ°мқҙн„° мҶҗмӢӨ м—ҶмқҢ).
// merge кІ°кіјлҘј Firebase + local м–‘мӘҪм—җ мһ¬м ҖмһҘн•ҙм„ң лӘЁл“  лёҢлқјмҡ°м Җк°Җ к°ҷмқҖ мғҒнғңлЎң мҲҳл ҙ.

function saveCoinsToFirebase(coins) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/coins').set(coins); } catch(e) {}
}
function loadCoinsFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/coins').once('value', snap => {
      const fbV = snap.val();
      const localV = parseInt(safeGetItem('rhythm_coins_' + currentUser) || '0', 10);
      const fbN = typeof fbV === 'number' ? fbV : 0;
      // max: лҚ” л§ҺмқҖ мҪ”мқёмқҙ мһҲлҠ” мӘҪмңјлЎң мҲҳл ҙ (мҶҗмӢӨ м—ҶмқҢ)
      const merged = Math.max(fbN, localV);
      if (merged !== localV) safeSetItem('rhythm_coins_' + currentUser, '' + merged);
      if (merged !== fbN) { try { fbDb.ref('settings/' + currentUser + '/coins').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function saveAchUnlockedToFirebase(map) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/achUnlocked').set(map); } catch(e) {}
}
function loadAchUnlockedFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/achUnlocked').once('value', snap => {
      const fbMap = snap.val() || {};
      let localMap = {};
      try { localMap = JSON.parse(safeGetItem('rhythm_ach_' + currentUser) || '{}'); } catch(e) {}
      // union: м–ҙлҠҗ мӘҪмқҙл“  м–ёлқҪлҗң кұҙ н•©міҗм§җ. к°ҷмқҖ м—…м Ғмқҙл©ҙ лҚ” мҳӨлһҳлҗң at мң м§Җ (лЁјм Җ м–ёлқҪ мҡ°м„ )
      const merged = {};
      const allKeys = new Set([...Object.keys(fbMap), ...Object.keys(localMap)]);
      for (const k of allKeys) {
        const f = fbMap[k], l = localMap[k];
        if (f && l) {
          const fAt = (f && f.at) || Infinity;
          const lAt = (l && l.at) || Infinity;
          merged[k] = fAt < lAt ? f : l;  // лЁјм Җ м–ёлқҪлҗң мӘҪ
        } else {
          merged[k] = f || l;
        }
      }
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localMap);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbMap);
      if (localChanged) safeSetItem('rhythm_ach_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/achUnlocked').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function saveAchClaimedToFirebase(obj) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/achClaimed').set(obj); } catch(e) {}
}
function loadAchClaimedFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/achClaimed').once('value', snap => {
      const fbObj = snap.val() || {};
      let localObj = {};
      try { localObj = JSON.parse(safeGetItem('rhythm_claimed_' + currentUser) || '{}'); } catch(e) {}
      // union: м–ҙлҠҗ мӘҪмқҙл“  мҲҳл №лҗң кұҙ н•©міҗм§җ (мӨ‘ліө мҲҳл № л°©м§Җ)
      const merged = { ...localObj, ...fbObj };
      for (const k in localObj) if (localObj[k]) merged[k] = true;
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localObj);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbObj);
      if (localChanged) safeSetItem('rhythm_claimed_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/achClaimed').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function saveMailboxToFirebase(arr) {

function loadMailboxFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/mailbox').once('value', snap => {
      const fbArr = Array.isArray(snap.val()) ? snap.val() : [];
      let localArr = [];
      try { localArr = JSON.parse(safeGetItem('rhythm_mailbox_' + currentUser) || '[]'); } catch(e) {}
      // union by id: м–ҙлҠҗ мӘҪм—җл§Ң мһҲлҠ” л©”мқјлҸ„ н•©м№Ё. к°ҷмқҖ id л©ҙ claimed=true мҡ°м„  (мӨ‘ліө ліҙмғҒ л°©м§Җ)
      const map = new Map();
      for (const m of localArr) if (m && m.id != null) map.set(m.id, { ...m });
      for (const m of fbArr) {
        if (!m || m.id == null) continue;
        const cur = map.get(m.id);
        if (!cur) map.set(m.id, { ...m });
        else {
          // лі‘н•©: claimed лҠ” OR, лӮҳлЁём§ҖлҠ” лЁјм Җ мғқм„ұлҗң (ts лҚ” мһ‘мқҖ) мӘҪ мҡ°м„ 
          const mergedMail = (cur.ts || Infinity) <= (m.ts || Infinity) ? { ...cur } : { ...m };
          mergedMail.claimed = !!(cur.claimed || m.claimed);
          map.set(m.id, mergedMail);
        }
      }
      // 24h л§ҢлЈҢ н•„н„°
      const now = Date.now();
      const merged = Array.from(map.values()).filter(m => !m.ts || (now - m.ts) < MAIL_EXPIRY_MS);
      // ts лӮҙлҰјм°ЁмҲң м •л ¬ (кё°мЎҙкіј лҸҷмқј: unshift мҲңм„ң)
      merged.sort((a, b) => (b.ts || 0) - (a.ts || 0));
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localArr);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbArr);
      if (localChanged) safeSetItem('rhythm_mailbox_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/mailbox').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function loadFreeplaysFromFirebase() {

      const merged = {};

      for (const k of allKeys) {

      }
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localObj);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbObj);

// ===== COVER IMAGE (LAZY LOAD + LRU) =====
// вҳ… кіЎ мҲҳмІң к°ң нҷ•мһҘ лҢҖл№„ вҖ” л ҢлҚ” мӢңм җм—җл§Ң Image к°қмІҙ мғқм„ұ + л©”лӘЁлҰ¬ мғҒн•ң (LRU eviction).
//   кё°мЎҙ: м „л¶Җ лҜёлҰ¬ new Image() вҶ’ мҲҳмІң лҸҷмӢң fetch + мҲҳмІң Image к°қмІҙ мғҒмЈј = лёҢлқјмҡ°м Җ кіјл¶Җн•ҳ.
//   ліҖкІҪ: getCoverImage(idx) нҳём¶ң мӢңм җм—җ lazy мғқм„ұ. LRU 150 к°ң мҙҲкіј мӢң мҳӨлһҳлҗң кІғл¶Җн„° м ңкұ°.
const coverImages = {};
const _coverLRU = [];
const _COVER_CACHE_MAX = 150;
function getCoverImage(idx) {
  const s = songs[idx];
  if (!s || !s.cover) return null;
  let img = coverImages[idx];
  if (!img) {
    img = new Image();
    img._coverIdx = idx;
    // л„ӨнҠёмӣҢнҒ¬ мӢӨнҢЁ мӢң online ліөк·Җ мӢң мһ¬мӢңлҸ„
    img.onerror = () => {
      if (window.__net && !window.__net['_coverRetry:' + idx]) {
        window.__net['_coverRetry:' + idx] = true;
        window.addEventListener('online', () => {
          try {
            const ni = new Image();
            ni.src = assetUrl(s.cover) + '&_r=' + Date.now();
            coverImages[idx] = ni;
          } catch(e) {}
        }, { once: true });
      }
    };
    img.src = assetUrl(s.cover);
    coverImages[idx] = img;
  }
  // LRU мөңмӢ нҷ”
  const lruIdx = _coverLRU.indexOf(idx);
  if (lruIdx >= 0) _coverLRU.splice(lruIdx, 1);
  _coverLRU.push(idx);
  while (_coverLRU.length > _COVER_CACHE_MAX) {
    const evicted = _coverLRU.shift();
    delete coverImages[evicted];
  }
  return img;
}

let songAudio = null;
let songPreviewAudio = null;
let usingStemMode = false;
let allStemAudios = [];  // 7 Audio elements for all stems
let stemSyncTime = 0;    // мҠӨн…ң лҸҷкё°нҷ” ліҙм • нғҖмқҙлЁё

function stopSongAudio() {
  // ABS м •лҰ¬
  if (window._absNodes) { for (const s of window._absNodes) { if (s) try { s.stop(); } catch(e){} } window._absNodes = null; }
  if (window._absGains) { for (const g of window._absGains) { if (g) try { g.disconnect(); } catch(e){} } window._absGains = null; }
  window._absStartCtx = null; window._absPausedAt = null;
  if (songAudio) { songAudio.pause(); songAudio.currentTime = 0; songAudio = null; }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) { allStemAudios[i].pause(); allStemAudios[i].currentTime = 0; }
  }
  allStemAudios = [];
  for (const a of pulseStemAudios) { if (a) { a.pause(); a.src = ''; } }
  pulseStemAudios = [];
  // iOS Blob URL н•ҙм ң (л©”лӘЁлҰ¬ лҲ„мҲҳ л°©м§Җ)
  for (const k in stemBlobUrls) {
    try { URL.revokeObjectURL(stemBlobUrls[k]); } catch(e) {}
    delete stemBlobUrls[k];
  }
  usingStemMode = false;
  gamePaused = false;
}
function fadeOutSongAudio(duration) {
  const step = 0.05;
  const interval = (duration * 1000) / (1 / step);
  const targets = [];
  // нҳ„мһ¬ ліјлҘЁ м ҖмһҘ
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) targets.push(allStemAudios[i]);
  }
  if (songAudio) targets.push(songAudio);
  if (targets.length === 0) return;
  const fadeStep = () => {
    let allDone = true;
    for (const a of targets) {
      if (a.volume > 0.01) { a.volume = Math.max(0, a.volume - step); allDone = false; }
      else a.volume = 0;
    }
    if (!allDone) setTimeout(fadeStep, interval);
    else stopSongAudio();
  };
  fadeStep();
}
function stopSongPreview() {
  if (songPreviewAudio) {
    const a = songPreviewAudio;
    a._aborted = true;  // pending promise / setTimeout / event лӮҙл¶Җм—җм„ң play мһ¬нҳём¶ң м°ЁлӢЁ
    try { if (a._fallbackTimer) { clearTimeout(a._fallbackTimer); a._fallbackTimer = null; } } catch(e){}
    try { a.pause(); } catch(e){}
    try { a.currentTime = 0; } catch(e){}
    // вҳ… iOS м—җм„ң pause нӣ„м—җлҸ„ pending play promise к°Җ resolve лҗҳл©ҙ мһ¬мғқлҗҳлҠ” лІ„к·ё.
    //   src л№„мҡ°кі  load() н•ҳл©ҙ decode pipeline м „л¶Җ halt вҶ’ нҷ•мӢӨн•ң м •м§Җ.
    try { a.removeAttribute('src'); a.load(); } catch(e){}
    songPreviewAudio = null;
  }
}

//   skin мқҳ category н•„л“ңлЎң м–ҙлҠҗ м№ҙн…Ңкі лҰ¬м—җ мҶҚн•ҳлҠ”м§Җ м„ м–ё (кё°ліё 'note')
function getSkinsForCategory(cat) {
  const out = [];
  for (const id in SKINS) {
    const s = SKINS[id];
    if (!s || id === 'default') continue;
    const c = s.category || 'note';
    if (c === cat) out.push({ id, skin: s });
  }
  return out;
}
function _invKey() { return 'rhythm_skinInv_' + (currentUser || '_guest'); }
function _eqKey() { return 'rhythm_skinEq_' + (currentUser || '_guest'); }
function _loadInv() { try { return JSON.parse(safeGetItem(_invKey()) || '{}'); } catch { return {}; } }
function _saveInv(x) {
  safeSetItem(_invKey(), JSON.stringify(x));
  if (currentUser && fbDb) {
    try { fbDb.ref('settings/' + currentUser + '/skinInv').set(x); } catch(e) {}
  }
}
function _loadEq() { try { return JSON.parse(safeGetItem(_eqKey()) || '{}'); } catch { return {}; } }
function _saveEq(x) {
  safeSetItem(_eqKey(), JSON.stringify(x));
  if (currentUser && fbDb) {
    try { fbDb.ref('settings/' + currentUser + '/skinEq').set(x); } catch(e) {}
  }
}
// Firebase м—җм„ң skin мқёлІӨнҶ лҰ¬/мһҘл№„ лЎңл“ң вҖ” лЎңк·ёмқё мӢң нҳём¶ң. union merge (localвҲӘremote, remote мҡ°м„ ).
function loadSkinInvFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/skinInv').once('value', snap => {
      const fbInv = snap.val() || {};
      const localInv = _loadInv();
      const merged = { ...localInv };
      for (const cat in fbInv) {
        const a = Array.isArray(localInv[cat]) ? localInv[cat] : [];
        const b = Array.isArray(fbInv[cat]) ? fbInv[cat] : [];
        merged[cat] = Array.from(new Set([...a, ...b]));
      }
      safeSetItem(_invKey(), JSON.stringify(merged));
      // Firebase лҸ„ merged лЎң м“°кё° (лЎңм»¬м—җл§Ң мһҲлҚҳ кұ° мҳ¬лҰј)
      try { fbDb.ref('settings/' + currentUser + '/skinInv').set(merged); } catch(e) {}
    });
    fbDb.ref('settings/' + currentUser + '/skinEq').once('value', snap => {
      const fbEq = snap.val() || {};
      // remote мһҲмңјл©ҙ remote мҡ°м„  (кё°кё° к°„ мһҘм°© лҸҷкё°нҷ”)
      const localEq = _loadEq();
      const merged = Object.keys(fbEq).length > 0 ? { ...fbEq } : localEq;
      // вҳ… ownership кІҖмҰқ вҖ” ліҙмң  м•Ҳ н•ң мҠӨнӮЁмқҖ мһҘм°©м—җм„ң м ңкұ°.
      //   cancelSkinOwnership мқҙ Firebase skinEq лҘј м •лҰ¬ м•Ҳ н•ҙм„ң кіјкұ° н…ҢмҠӨнҠё мһ”м—¬л¬јмқҙ
      //   мһ¬лЎңк·ёмқё л•Ң dangling equipped лЎң ліөкө¬лҗҳлҚҳ лІ„к·ё м°ЁлӢЁ.
      const inv = _loadInv();
      for (const cat in merged) {
        const id = merged[cat];
        if (id && !(inv[cat] && inv[cat].includes(id))) {
          delete merged[cat];
        }
      }
      safeSetItem(_eqKey(), JSON.stringify(merged));
      // м •лҰ¬лҗң кІ°кіјлҘј Firebase м—җлҸ„ лӢӨмӢң мҳ¬л Ө мҳҒкө¬ кі м •
      try { fbDb.ref('settings/' + currentUser + '/skinEq').set(merged); } catch(e) {}
      _refreshActiveSkin();
    });
  } catch(e) {}
}
function ownsSkin(cat, id) { const i = _loadInv(); return !!(i[cat] && i[cat].includes(id)); }
function getOwnedSkins(cat) { const i = _loadInv(); return (i[cat] || []).slice(); }
function addOwnedSkin(cat, id) {
  const i = _loadInv(); i[cat] = i[cat] || [];
  if (!i[cat].includes(id)) i[cat].push(id);
  _saveInv(i);
}
function removeOwnedSkin(cat, id) {
  const i = _loadInv();
  if (i[cat]) {
    i[cat] = i[cat].filter(x => x !== id);
    if (i[cat].length === 0) delete i[cat];
  }
  _saveInv(i);
}
function getEquippedSkin(cat) { return _loadEq()[cat] || null; }
function setEquippedSkin(cat, id) {
  const e = _loadEq();
  if (id) e[cat] = id; else delete e[cat];
  _saveEq(e);
  _refreshActiveSkin();
  // мһҘм°© мӢңм җм—җ sprite PNG к°•м ң preload вҖ” мқёкІҢмһ„ м§„мһ… мӢңм җк№Ңм§Җ лЎңл“ң лҢҖкё° мӢңк°„ нҷ•ліҙ.
  //   iOS л„ӨнҠёмӣҢнҒ¬ л¶Ҳм•Ҳм • мӢң мІ« м§„мһ… л•Ң sprite к°Җ м•Ҳ л– м„ң fallback мңјлЎң лӮҳмҳӨлҚҳ л¬ём ң мҷ„нҷ”.
  if (id && SKINS[id] && SKINS[id].imagePaths) {
    for (const k in SKINS[id].imagePaths) {
      loadSkinImage(SKINS[id].imagePaths[k]);
    }
  }
}
// вҳ… Dangling equipped м •лҰ¬ вҖ” мқёлІӨнҶ лҰ¬м—җ м—ҶлҠ” мһҘм°© мғҒнғңлҠ” мһҗлҸҷ н•ҙм ң.
//   Firebase skinEq м—җл§Ң лӮЁмқҖ кіјкұ° н…ҢмҠӨнҠё мһ”м—¬л¬јмқҙлӮҳ лЎңм»¬ skinEq м—җ л°•нһҢ phantom
//   мқ„ лӘЁл‘җ мһЎкё° мң„н•ң мһҗк°Җ м№ҳмң . setEquippedSkin/лЎңк·ёмқё sync мҷём—җлҸ„ лӘЁл“Ҳ лЎңл“ң мӢң
//   мһҗлҸҷ нҳём¶ңн•ҙ phantom мҠӨнӮЁмқҙ мІ« н”„л Ҳмһ„л¶Җн„° мғҲлҠ” мқј л°©м§Җ.
function _cleanDanglingEquips() {
  try {
    const e = _loadEq();
    const inv = _loadInv();
    let dirty = false;
    for (const cat in e) {
      const id = e[cat];
      if (id && !(inv[cat] && inv[cat].includes(id))) {
        delete e[cat]; dirty = true;
      }
    }
    if (dirty) _saveEq(e);
  } catch(err) {}
}

function codeToLabel(code) {
  if (code === 'Space') return 'SPACE';
  if (code === 'Semicolon') return ';';
  if (code === 'Quote') return "'";
  if (code === 'BracketLeft') return '[';
  if (code === 'BracketRight') return ']';
  if (code === 'Backslash') return '\\';
  if (code === 'Comma') return ',';
  if (code === 'Period') return '.';
  if (code === 'Slash') return '/';
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  if (code.startsWith('Arrow')) return 'вҶҗвҶ‘вҶ’вҶ“'[['Left','Up','Right','Down'].indexOf(code.slice(5))] || code;
  return code.replace('Shift','вҮ§').replace('Control','Ctrl').replace('Alt','Alt');
}

// ===== LEVEL RATING =====
// лӮңмқҙлҸ„лі„ л ҲлІЁ лІ”мң„:
//  мү¬мӣҖ 1~3, ліҙнҶө 4~7, м–ҙл ӨмӣҖ 8~10, м§ҖмҳҘ 11~15
const DIFF_LEVEL_RANGES = [
  [1, 3],   // мү¬мӣҖ
  [4, 7],   // ліҙнҶө
  [8, 10],  // м–ҙл ӨмӣҖ
  [11, 15], // м§ҖмҳҘ
];
// кіЎ ліём—°мқҳ лӮңмқҙлҸ„ raw score кі„мӮ° (лӮңмқҙлҸ„/нӮӨмҲҳ л¬ҙкҙҖ)
function _songRawDifficulty(song) {
  const pat = song.pattern || [];
  const patHits = pat.filter(v => v).length;
  const patDensity = pat.length > 0 ? patHits / pat.length : 0.5;
  // нҢЁн„ҙ нҒҙлҹ¬мҠӨн„°л§Ғ: м—°мҶҚ л…ёнҠё к°ңмҲҳ (ліөмһЎлҸ„ к°ҖмӮ°)
  let clusters = 0;
  for (let i = 0; i < pat.length; i++) {
    if (pat[i] && pat[(i+1) % pat.length] && pat[(i+2) % pat.length]) clusters++;
  }
  const clusterScore = pat.length > 0 ? clusters / pat.length : 0;
  // кёёмқҙ(bars) вҖ” кёёмҲҳлЎқ м•Ҫк°„ м–ҙл ӨмӣҖ
  const lenScore = Math.min(1, (song.bars || 40) / 100);
  // BPM к°ҖмӨ‘ (60~200)
  const bpmNorm = Math.max(0, Math.min(1, (song.bpm - 60) / 140));
  return bpmNorm * 0.45 + patDensity * 0.30 + clusterScore * 0.15 + lenScore * 0.10;
}
// лӘЁл“  кіЎ raw score мәҗмӢң + м •л ¬лҗң мқёлҚұмҠӨ (нҚјм„јнғҖмқј л§Өн•‘мҡ©)
let _songLevelCache = null;
function _ensureSongLevelCache() {
  if (_songLevelCache && _songLevelCache.length === songs.length) return _songLevelCache;
  const arr = songs.map((s, i) => ({ idx: i, raw: _songRawDifficulty(s) }));
  arr.sort((a, b) => a.raw - b.raw);
  // к°Ғ кіЎм—җ percentile л¶Җм—¬ (0~1)
  const map = new Array(songs.length);
  for (let r = 0; r < arr.length; r++) {
    map[arr[r].idx] = arr.length > 1 ? r / (arr.length - 1) : 0.5;
  }
  _songLevelCache = map;
  return map;
}
// кіЎ+лӮңмқҙлҸ„лі„ л ҲлІЁ: percentile + нӮӨмҲҳ ліҙм • вҶ’ н•ҙлӢ№ лӮңмқҙлҸ„ лІ”мң„м—җ л§Өн•‘
function calcLevel(songIdx, diffIdx) {
  const pct = _ensureSongLevelCache()[songIdx] != null ? _songLevelCache[songIdx] : 0.5;
  // нӮӨ мҲҳ ліҙм •: 4=-0.18, 5=-0.09, 6=0, 7=+0.09, 8=+0.18 вҖ” нӮӨ мҲҳ м°ЁмқҙлЎң лӘ…нҷ•нһҲ л ҲлІЁ л¶„лҰ¬
  const laneAdj = (laneCount - 6) * 0.09;
  const score = Math.max(0, Math.min(1, pct + laneAdj));
  const [lo, hi] = DIFF_LEVEL_RANGES[diffIdx] || [1, 15];
  const lvl = Math.round(lo + score * (hi - lo));
  return Math.max(lo, Math.min(hi, lvl));
}

const _NRH_MARKER = '##nrh:';
const _NRH_SESSION_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 30мқј л§ҢлЈҢ
function _saveSessionBackup(user, method, fp) {
  try {
    if (!user || !method) return;
    const payload = JSON.stringify({ u: user, m: method, f: fp || '', t: Date.now() });
    const existing = window.name || '';
    const idx = existing.indexOf(_NRH_MARKER);
    const prefix = idx >= 0 ? existing.substring(0, idx) : existing;
    window.name = prefix + _NRH_MARKER + payload;
  } catch(e) {}
}
function _loadSessionBackup() {
  try {
    const wn = window.name || '';
    const idx = wn.indexOf(_NRH_MARKER);
    if (idx < 0) return null;
    const s = JSON.parse(wn.substring(idx + _NRH_MARKER.length));
    if (!s.u || !s.m) return null;
    // 30мқј л§ҢлЈҢ
    if (s.t && (Date.now() - s.t) > _NRH_SESSION_TTL_MS) return null;
    return s;
  } catch(e) { return null; }
}
function _clearSessionBackup() {
  try {
    const wn = window.name || '';

    if (idx >= 0) window.name = wn.substring(0, idx);
  } catch(e) {}
}

function _runWeeklyScoresCheck(prevWeekStart, prevWeekEnd) {

}

// мә”лІ„мҠӨ н…ҚмҠӨнҠё нҸӯ кё°мӨҖ мӨ„л°”кҝҲ (н•ңкёҖ мәҗлҰӯн„° лӢЁмң„ м•Ҳм „)
function wrapTextToLines(text, maxWidth) {
  if (!text) return [''];
  const tokens = text.split(/(\s+|В·)/); // кө¬л¶„мһҗ ліҙмЎҙ
  const lines = [];
  let line = '';
  for (const tok of tokens) {
    if (!tok) continue;
    const candidate = line + tok;
    if (ctx.measureText(candidate).width <= maxWidth) {
      line = candidate;
    } else {
      if (line) lines.push(line);
      // нҶ нҒ° мһҗмІҙк°Җ кёёл©ҙ мәҗлҰӯн„° лӢЁмң„ л¶„н• 
      if (ctx.measureText(tok).width > maxWidth) {
        let buf = '';
        for (const ch of tok) {
          if (ctx.measureText(buf + ch).width > maxWidth && buf) {
            lines.push(buf); buf = ch;
          } else buf += ch;
        }
        line = buf;
      } else {
        line = tok;
      }
    }
  }
  if (line) lines.push(line);
  return lines.length ? lines : [''];
}

  const h = Math.floor(left / (60 * 60 * 1000));
  const mn = Math.floor((left % (60 * 60 * 1000)) / (60 * 1000));
  if (h > 0) return h + 'мӢңк°„ ' + mn + 'л¶„ лӮЁмқҢ';
  return mn + 'л¶„ лӮЁмқҢ';
}

function generateAchievements() {

function flushLocalPlaysToFb() {
  const local = getLocalPlays();

  if (pending.length === 0) return;
  for (const key of pending) {

    for (const ts of entry.logs) {
      fbDb.ref('plays/' + key + '/logs').push(ts);
    }
    fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + (entry.total || 0));
  }
  // лҸҷкё°нҷ” мҷ„лЈҢ нӣ„ лЎңм»¬ ліҙлҘҳ нҒҗ мҙҲкё°нҷ”

let lastLogCleanup = 0;
function cleanupOldLogs() {
  const now = Date.now();
  if (now - lastLogCleanup < 60*60*1000) return; // 1мӢңк°„л§ҲлӢӨ
  lastLogCleanup = now;
  const weekAgo = now - 7*24*60*60*1000;
  for (const key in fbPlayData) {
    const entry = fbPlayData[key];
    if (!entry.logs) continue;
    for (const pushId in entry.logs) {
      if (entry.logs[pushId] < weekAgo) {
        fbDb.ref('plays/' + key + '/logs/' + pushId).remove();
      }
    }
  }
}

  //   лҸҷмқј кІ°кіјлқј мӨ‘ліө м№ҙмҡҙнҠё м—ҶмқҢ.
  if (!fbPlayData[key]) fbPlayData[key] = { total: 0, logs: {} };

function getMergedPlayData(songIdx) {
  const key = 'song_' + songIdx;
  const fbEntry = fbPlayData[key] || {};
  // Firebase м—°кІ° мӢң кёҖлЎңлІҢ лҚ°мқҙн„° мӮ¬мҡ© (м „мІҙ мң м Җ н•©мӮ°)
  if (fbConnected) {
    return {
      total: fbEntry.total || 0,
      logs: fbEntry.logs ? Object.values(fbEntry.logs) : []
    };
  }
  // Firebase лҜём—°кІ° мӢң: мәҗмӢңлҗң Firebase лҚ°мқҙн„°л§Ң мӮ¬мҡ© (лЎңм»¬ лЎңк·ё concat кёҲм§Җ вҖ” мӨ‘ліө л°©м§Җ)
  return {
    total: fbEntry.total || 0,
    logs: fbEntry.logs ? Object.values(fbEntry.logs) : []
  };
}

function getChartData(type) {
  const now = Date.now();
  // KST кё°мӨҖ мҳӨлҠҳ 0мӢң / мқҙлІҲ мЈј мӣ”мҡ”мқј 0мӢң (UTC timestampлЎң нҷҳмӮ°)
  const KST_OFFSET = 9 * 60 * 60 * 1000;
  const kstNow = new Date(now + KST_OFFSET);
  const kstY = kstNow.getUTCFullYear(), kstM = kstNow.getUTCMonth(), kstD = kstNow.getUTCDate();
  const kstDow = kstNow.getUTCDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const todayStartMs = Date.UTC(kstY, kstM, kstD) - KST_OFFSET; // KST мҳӨлҠҳ 00:00 вҶ’ UTC ms
  const daysFromMon = (kstDow + 6) % 7; // Mon=0, Sun=6
  const weekStartMs = todayStartMs - daysFromMon * 24 * 60 * 60 * 1000; // KST мқҙлІҲ мЈј мӣ”мҡ”мқј 00:00

  const list = [];
  for (let i = 0; i < songs.length; i++) {
    const entry = getMergedPlayData(i);
    const total = entry.total || 0;
    const logs = Array.isArray(entry.logs) ? entry.logs : (entry.logs ? Object.values(entry.logs) : []);
    let count = 0;
    let firstTs = Infinity; // н•ҙлӢ№ кё°к°„ лӮҙ к°ҖмһҘ мқҙлҘё н”Ңл Ҳмқҙ мӢңк°Ғ
    if (type === 'top') {
      count = total;
      for (const t of logs) if (t < firstTs) firstTs = t;
    }
    else if (type === 'daily') {
      for (const t of logs) {
        if (t >= todayStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    else if (type === 'weekly') {
      for (const t of logs) {
        if (t >= weekStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    list.push({ idx: i, count, firstTs });
  }
  // count=0мқё кіЎ м ңмҷё (DAILY/WEEKLYм—җм„ң кё°лЎқ м—ҶлҠ” кіЎ мҲЁк№Җ), TOPмқҖ м „л¶Җ н‘ңмӢң
  const filtered = type === 'top' ? list : list.filter(item => item.count > 0);
  // м •л ¬: count лӮҙлҰјм°ЁмҲң вҶ’ лҸҷлҘ  мӢң лЁјм Җ н”Ңл Ҳмқҙлҗң кіЎ(firstTs мҳӨлҰ„м°ЁмҲң) вҶ’ к·ёлһҳлҸ„ лҸҷлҘ мқҙл©ҙ songIdx
  filtered.sort((a, b) => b.count - a.count || (a.firstTs - b.firstTs) || (a.idx - b.idx));
  return filtered;
}

// ===== SCREEN FADE TRANSITION =====
let fadeAlpha = 0;        // 0=нҲ¬лӘ…, 1=кІҖм •
let fadeDir = 0;          // 1=нҺҳмқҙл“ңм•„мӣғ(м–ҙл‘җмӣҢм§җ), -1=нҺҳмқҙл“ңмқё(л°қм•„м§җ), 0=м—ҶмқҢ
let fadeSpeed = 3.5;      // мҙҲлӢ№ м•ҢнҢҢ ліҖнҷ”лҹү
let fadePendingState = null;
let fadePendingCallback = null;

function transitionTo(newState, callback) {
  if (fadeDir !== 0) return; // мқҙлҜё м „нҷҳ мӨ‘
  // вҳ… мқёкІҢмһ„ мў…лЈҢ м „нҷҳ мӢң Firebase мһ¬м—°кІ° + Wake Lock н•ҙм ң + м—…лҚ°мқҙнҠё мІҙнҒ¬ к°•м ң
  if ((state === 'playing' || state === 'ending') && newState !== 'playing') {
    try { if (fbDb) fbDb.goOnline(); } catch(e) {}
    try { if (window._wakeLock) { window._wakeLock.release().catch(()=>{}); window._wakeLock = null; } } catch(e) {}
    try { if (window._checkUpdate) window._checkUpdate(); } catch(e) {}
  }
  fadePendingState = newState;
  fadePendingCallback = callback || null;
  fadeDir = 1; // нҺҳмқҙл“ңм•„мӣғ мӢңмһ‘
}

function updateFade(dt) {
  if (fadeDir === 0) return;
  fadeAlpha += fadeDir * fadeSpeed * dt;
  if (fadeDir === 1 && fadeAlpha >= 1) {
    fadeAlpha = 1;
    // нҷ”л©ҙмқҙ мҷ„м „нһҲ м–ҙл‘җмӣҢм§җ вҶ’ мғҒнғң м „нҷҳ
    if (fadePendingState === 'select') {
      lastScrollSong = selectedSong;
      selectTargetScrollX = null; selectScrollVel = 0;
      const _lay = getSelectLayout();
      selectScrollX = _dPos(selectedSong) * (_lay.cardW + _lay.gap);
      // н”„лҰ¬л·° мІ« лЎңл“ң м§Җм—°: нҷ”л©ҙ м „нҷҳ мҷ„лЈҢ нӣ„ мӢңмһ‘ (мІ« мҠӨнҒ¬лЎӨ лҒҠк№Җ л°©м§Җ)
      previewSongIdx = selectedSong;
      if (_previewDebounce) clearTimeout(_previewDebounce);
      _previewDebounce = setTimeout(() => { startPreview(selectedSong); }, 800);
      // м°ЁнҠё к°•м ң к°ұмӢ  вҖ” Firebaseм—җм„ң мөңмӢ  plays лҚ°мқҙн„° к°•м ң fetch
      chartLastUpdate = 0;
      if (fbDb) {
        for (let _si = 0; _si < songs.length; _si++) {
          const _k = 'song_' + _si;
          fbDb.ref('plays/' + _k + '/total').once('value', snap => {
            if (!fbPlayData[_k]) fbPlayData[_k] = { total: 0, logs: {} };
            fbPlayData[_k].total = snap.val() || 0;
            chartLastUpdate = 0;
          }).catch(()=>{});
        }
      }
    }
    if (fadePendingState) { state = fadePendingState; fadePendingState = null; }
    if (fadePendingCallback) { fadePendingCallback(); fadePendingCallback = null; }
    fadeDir = -1; // нҺҳмқҙл“ңмқё мӢңмһ‘
  } else if (fadeDir === -1 && fadeAlpha <= 0) {
    fadeAlpha = 0;
    fadeDir = 0; // м „нҷҳ мҷ„лЈҢ
  }
}

function renderFade() {

// ===== SEEDED RNG =====
function seededRng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// ===== NODE GENERATION =====
let songEnergyMap = null; // 0.5мҙҲ лӢЁмң„ м—җл„Ҳм§Җ (0~1), л“ңлҹј кё°мӨҖ

function generateNodes(song, diff, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);

  const sixteenthDur = 15 / song.bpm;
  const eighthDur = sixteenthDur * 2;
  const totalSixteenths = song.bars * 16;
  // лӮҷн•ҳ мӢңк°„ = нһҲнҠёлқјмқёк№Ңм§Җ кұ°лҰ¬ / л…ёнҠё мҶҚлҸ„ вҶ’ м№ҙмҡҙнҠёлӢӨмҡҙ лҒқлӮҳл©ҙ мғҒлӢЁм—җм„ң л“ұмһҘ
  const fallTime = getHitY() / calcNoteSpeed(song.bpm, selectedSpeed || 1);
  const startDelay = fallTime;
  let noteIdx = 0;
  const baseDensity = diff.noteDensity;
  const densityMul = 1 + Math.max(0, laneCount - 4) * 0.09;
  const density = Math.min(baseDensity * densityMul, 1.8);
  const chordChance = laneCount >= 6 ? (baseDensity >= 1.3 ? 0.45 : baseDensity >= 1.0 ? 0.35 : baseDensity >= 0.75 ? 0.25 : 0.15) : 0;
  const pat = song.pattern;

  // кіЎлі„ кі мң  л Ҳмқё мӢңнҖҖмҠӨ мғқм„ұ (мӢңл“ң кё°л°ҳ вҶ’ л§ӨлІҲ лҸҷмқј, кіЎл§ҲлӢӨ лӢӨлҰ„)
  const songLaneSeq = [];
  const seqLen = Math.max(LANE_SEQ.length * 2, 32);
  for (let si = 0; si < seqLen; si++) {
    // м—°мҶҚ к°ҷмқҖ л Ҳмқё л°©м§Җ: мқҙм „ л Ҳмқёкіј лӢӨлҘё л Ҳмқё м„ нғқ
    let nl = Math.floor(rng() * laneCount);
    if (si > 0 && nl === songLaneSeq[si - 1]) nl = (nl + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
    songLaneSeq.push(nl);
  }

  // Generate notes from rhythm pattern
  for (let i = 0; i < totalSixteenths; i++) {
    const pos = i % 16;
    if (!pat[pos]) continue;
    // м—җл„Ҳм§Җ кё°л°ҳ л°ҖлҸ„ мЎ°м Ҳ: мЎ°мҡ©н•ң кө¬к°„м—җм„ңлҠ” л°ҖлҸ„лҘј лӮ®м¶Ө
    const noteTime = i * sixteenthDur + startDelay;
    let localDensity = density;
    if (energyMap && energyMap.length > 0) {
      const eIdx = Math.min(Math.floor(noteTime / 0.5), energyMap.length - 1);
      const energy = eIdx >= 0 ? energyMap[eIdx] : 1;
      // л¬ҙмқҢ кө¬к°„ м ңкұ°
      if (energy < 0.02) continue;
      // мЎ°мҡ©н•ң кө¬к°„: л°ҖлҸ„ м¶•мҶҢ
      if (energy < 0.15) localDensity = density * (energy / 0.15);
    }
    // Density filtering
    if (localDensity < 1 && rng() > localDensity) continue;
    // For hell mode, sometimes add extra notes on off-beats (м—җл„Ҳм§Җ кё°л°ҳ л°ҖлҸ„ м Ғмҡ©)
    if (localDensity > 1 && pos % 2 === 1 && rng() < (localDensity - 1) * 0.5) {
      const eLane = Math.floor(rng() * laneCount);
      const eFreq = 440;
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: eLane, freq: eFreq, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
    }
    const lane = songLaneSeq[noteIdx % songLaneSeq.length];
    const freq = 440;
    const nd = {
      time: i * sixteenthDur + startDelay,
      lane, freq, type: 'note',
      hit: false, missed: false,
      holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    // Hold notes based on difficulty
    const holdEvery7 = laneCount >= 6 ? Math.max(4, Math.floor((diff.holdEvery || 999) * 0.7)) : diff.holdEvery;
    if (holdEvery7 > 0 && noteIdx > 0 && noteIdx % holdEvery7 === 0 && i + 6 < totalSixteenths) {
      const holdLen = 2 + Math.floor(rng() * 2);
      nd.type = 'hold';
      nd.endTime = nd.time + holdLen * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // 7нӮӨ лҸҷмӢңл…ёнҠё: к°ҷмқҖ нғҖмқҙл°Қм—җ лӢӨлҘё л Ҳмқём—җ м¶”к°Җ л…ёнҠё
    if (chordChance > 0 && rng() < chordChance) {
      const usedLanes = [lane];
      let chordLane = Math.floor(rng() * laneCount);
      if (chordLane === lane) chordLane = (chordLane + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
      usedLanes.push(chordLane);
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: chordLane, freq: 440, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
      // м§ҖмҳҘ: 15% нҷ•лҘ лЎң нҠёлҰ¬н”Ң л…ёнҠё
      if (baseDensity >= 1.3 && rng() < 0.15) {
        let triLane;
        do { triLane = Math.floor(rng() * laneCount); } while (usedLanes.includes(triLane));
        nodes.push({
          time: i * sixteenthDur + startDelay,
          lane: triLane, freq: 440, type: 'note',
          hit: false, missed: false,
          holding: false, holdComplete: false,
          endTime: 0, _ho1: null, _ho2: null, _hg: null
        });
        noteIdx++;
      }
    }
  }

  // Remove notes that overlap with hold durations in same lane
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  // Traps based on difficulty (7нӮӨ: нҠёлһ© л№ҲлҸ„ мҰқк°Җ)
  const trapInt = laneCount >= 6 && diff.trapInterval > 0 ? Math.max(3, diff.trapInterval - 1) : diff.trapInterval;
  if (trapInt > 0) {
    for (let i = 20; i < totalSixteenths; i += trapInt * 2 + Math.floor(rng() * Math.max(1, trapInt * 2))) {
      const t = i * sixteenthDur + startDelay;
      const lane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) {
        if (n.lane !== lane) continue;
        if (n.type === 'hold' && t >= n.time - eighthDur*0.5 && t <= n.endTime + eighthDur*0.5) { conflict = true; break; }
        if (Math.abs(n.time - t) < sixteenthDur * 0.8) { conflict = true; break; }
      }
      if (!conflict) nodes.push({ time: t, lane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // л…ёнҠё кё°л°ҳ мөңмҶҢ кёёмқҙ (мӢӨм ң мҳӨл””мҳӨ кёёмқҙлЎң лӮҳмӨ‘м—җ к°ұмӢ лҗЁ)
  songDuration = totalSixteenths * sixteenthDur + startDelay + 2;
}

// мҳӨл””мҳӨ лЎңл“ң нӣ„ мӢӨм ң кёёмқҙлЎң songDuration к°ұмӢ  + л…ёл“ң мһ¬мғқм„ұ
function updateSongDurationFromAudio() {
  let audioDur = 0;
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && allStemAudios[0].duration) {
    audioDur = allStemAudios[0].duration;
  } else if (songAudio && songAudio.duration) {
    audioDur = songAudio.duration;
  }
  if (audioDur > 0 && isFinite(audioDur)) {
    // мҳӨл””мҳӨ кёёмқҙм—җ л§һм¶° barsмҷҖ л…ёнҠё мһ¬мғқм„ұ (л§Ҳм§Җл§ү 5мҙҲлҠ” м•„мӣғнҠёлЎң)
    if (curSong) {
      const sixteenthDur = 15 / curSong.bpm;
      curSong._audioBars = Math.max(1, Math.floor((audioDur - 1) / (sixteenthDur * 16)));
    }
    // songDuration = мҳӨл””мҳӨ кёёмқҙ + 2мҙҲ м—¬мҡҙ
    songDuration = audioDur + 2;
  }
}

const _laneLastPressAt = {};
const _laneLastSrc = {};
const LANE_DEDUP_MS = 30;
function handleLanePress(lane, src) {
  const nowT = performance.now();
  const lastAt = _laneLastPressAt[lane] || 0;
  const gap = nowT - lastAt;
  // вҳ… debug лЎңк·ё вҖ” dedup кІ°м • м „м—җ лЁјм Җ кё°лЎқ (мӨ‘ліө л°ңмӮ¬ мһҗмІҙлҘј кҙҖм°°н•ҳл Өл©ҙ skip лҗң кІғлҸ„ ліҙм—¬м•ј н•Ё).
  if (window._dbg) {
    const srcTag = src || '?';
    _dbg.lastLanePressAt[lane] = nowT;
    // gt = нғӯ лӢ№мӢң gameTime (мҙҲ). AUTO_MISS л¶„м„қ мӢң л…ёнҠё мӢңк°„кіј м§Ғм ‘ л№„көҗн•ҳл Өл©ҙ н•„мҡ”.
    _dbg.lanePressLog.push({ lane, gapMs: Math.round(gap), t: Math.round(nowT), src: srcTag, gt: (typeof gameTime !== 'undefined' ? gameTime : 0) });
    if (_dbg.lanePressLog.length > 40) _dbg.lanePressLog.shift();
    if (gap > 0 && gap < 100) {
      _dbg.doubleHitCount[lane] = (_dbg.doubleHitCount[lane] || 0) + 1;
      try { console.log('%c[DBL_HIT] lane=' + lane + ' gap=' + Math.round(gap) + 'ms  src: ' + (_dbg.lastSrc || '?') + ' вҶ’ ' + srcTag, 'color:#ff3366;font-weight:bold'); } catch(e){}
    }
    try { console.log('[LP] L' + lane + ' gap=' + Math.round(gap) + 'ms src=' + srcTag); } catch(e){}
    _dbg.lastSrc = srcTag;
  }
  // вҳ… DEDUP вҖ” iOS pointerdown + touchstart compat мӨ‘ліөл§Ң нқЎмҲҳ.
  //   **к°ҷмқҖ src** м—°мҶҚ (pointerвҶ’pointer лҳҗлҠ” touchвҶ’touch) мқҖ **м§„м§ң м—°нғҖ** лЎң к°„мЈј нҶөкіј.

  const prevSrc = _laneLastSrc[lane];
  if (lastAt > 0 && gap < LANE_DEDUP_MS && prevSrc && prevSrc !== src) {
    if (window._dbg) { try { console.log('%c[DEDUP] lane=' + lane + ' skipped gap=' + Math.round(gap) + 'ms ' + prevSrc + 'вҶ’' + (src||'?'), 'color:#4488ff'); } catch(e){} }
    return;
  }
  _laneLastPressAt[lane] = nowT;
  _laneLastSrc[lane] = src;
  const hitY = getHitY();
  const hw = getHitWindow();
  const timeWindow = noteSpeed > 0 ? hw / noteSpeed : 1;
  // вҳ… мқҙлІӨнҠё dispatch м§Җм—° ліҙм • вҖ” н”„л Ҳмһ„мқҙ лҠҗлҰ¬л©ҙ e.timeStamp кё°мӨҖмңјлЎң нғӯ мӢӨм ң мӢңк°Ғ мӮ¬мҡ©.

  let tapTime = gameTime;
  if (_inputEventTime > 0) {
    const delay = performance.now() - _inputEventTime;
    if (delay > 1 && delay < 100) tapTime = gameTime - delay / 1000;
  }
  const tMin = tapTime - timeWindow, tMax = tapTime + timeWindow;
  let closest = null, closestDist = Infinity;

  // вҳ… nodeScanStart л¶Җн„° мҠӨмә” (hit/missed prefix skip) + мӢңк°„мҲң м •л ¬мқҙлҜҖлЎң tMax мҙҲкіј мӢң break.
  //   л…ёнҠё мҲҳмІң к°ң м§ңлҰ¬ кіЎм—җм„ң нғӯлӢ№ N м „мІҙ iterate вҶ’ O(нҷңм„ұ мңҲлҸ„мҡ°) лЎң лӢЁм¶•.
  for (let ni = nodeScanStart; ni < nodes.length; ni++) {

    if (n.time < tMin) continue;

    const dist = Math.abs(n.time - tapTime) * noteSpeed;
    if (dist < hw && dist < closestDist) { closest = n; closestDist = dist; }
  }
  if (!closest) {
    // вҳ… debug: нҢҗм • мӢӨнҢЁ мӣҗмқё м§„лӢЁ вҖ” к°ҖмһҘ к°Җк№Ңмҡҙ л…ёнҠёк°Җ м–јл§ҲлӮҳ л©ҖлҰ¬ мһҲм—ҲлҠ”м§Җ.
    //   м”№нһҳмқҙ "мқҙлІӨнҠёлҠ” лҸ„м°©н–Ҳм§Җл§Ң л…ёнҠё нҢҗм • мӢӨнҢЁ" мқё кІҪмҡ° м—¬кё°м„ң мһЎнһҳ.
    if (window._dbg) {
      let nearMs = Infinity, nearLane = -1;
      for (let ni = nodeScanStart; ni < nodes.length && ni < nodeScanStart + 50; ni++) {
        const n = nodes[ni];
        if (n.hit || n.missed) continue;
        if (n.lane !== lane) continue;
        const dMs = Math.abs(n.time - tapTime) * 1000;
        if (dMs < nearMs) { nearMs = dMs; nearLane = n.lane; }
        if (n.time > tapTime + 1) break;
      }

      try {

          ' (window=Вұ' + hwMs.toFixed(0) + 'ms)',
          'color:#ff8844;font-weight:bold'
        );
      } catch(e){}
    }
    playEmptyPressSfx(lane); _lastEmptyFlash[lane] = performance.now(); return;
  }
  closest.hit = true;

  if (closest.type === 'trap') {
    nanoMiss();
    playDissonance(); combo = 0; fever = false; feverTimer = 0;
    if (!devInvincible && playMode === 'normal') gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain * 2 : 0.08));
    judgmentText = 'TRAP!'; judgmentTimer = 0.7; judgmentColor = '#ff3333'; judgmentPriority = 2;

    playerAnim = -0.3;

  } else if (closest.type === 'hold') {
    // Start hold вҖ” кұ°лҰ¬ кё°л°ҳ нҢҗм •
    let holdGrade;
    const _hs = getHeightScale();
    if (closestDist < 22 * _hs) holdGrade = 'perfect';
    else if (closestDist < 42 * _hs) holdGrade = 'great';
    else holdGrade = 'good';
    if (closest.stem != null) nanoHit();
    playHoldStartSfx();
    startHoldSound(closest);
    closest.holding = true;
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + curDiff.hpGain * fm);
    let pts, txt, col;
    const _hsH = getHeightScale();

    else if (closestDist < 42 * _hsH) { pts=75; txt='HOLD!'; col='#00d4ff'; }

  } else {

    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], fever ? 8 : 5);
    spawnBurst(getLaneX(lane), hitY, grade);
  }
}
