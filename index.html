      if (!isNaN(val) && val >= SPEED_MIN && val <= SPEED_MAX) {
        selectedSpeed = parseFloat(val.toFixed(1)); saveDiffSpeed();
      }
      speedInputActive = false; speedInputText = '';
      speedInputElHidden.blur();
      e.preventDefault(); return;
    }
    if (e.code === 'Escape') { speedInputActive = false; speedInputText = ''; speedInputElHidden.blur(); e.preventDefault(); return; }
    if (e.code === 'Backspace') { speedInputText = speedInputText.slice(0, -1); e.preventDefault(); return; }
    if ((e.key >= '0' && e.key <= '9') || e.key === '.') {
      if (speedInputText.length < 4) speedInputText += e.key;
      e.preventDefault(); return;
    }
    e.preventDefault(); return;
  }
  if (e.code === 'Enter') inputQueue.push('confirm');
  if (e.code === 'ArrowUp' || e.code === 'KeyW') inputQueue.push('up');
  if (e.code === 'ArrowDown') inputQueue.push('down');
  if (e.code === 'ArrowLeft') inputQueue.push('left');

  if (e.code === 'KeyT' && state === 'select' && !searchActive) inputQueue.push('achievement');

  }
});

}

  if (fxActive) {
    const petalCount = Math.floor(conf.sparks * 0.9);
    const _mobHF = isMobile ? 0.65 : 0.85;
    for (let i = 0; i < petalCount; i++) {
      const a = Math.PI * 2 * i / petalCount + (Math.random() - 0.5) * 0.4;
      const sp = (140 + Math.random() * 240) * conf.size * _mobHF;
      particles.push({
        x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 100 * _mobHF,
        life: 0.6 + Math.random()*0.5, maxLife: 1.1,
        color: '#fff', size: (30 + Math.random() * 28) * _mobHF,
        sprite: true, spriteKey: (Math.random() < 0.5 ? 'petal1' : 'petal2'),
        rot: Math.random() * Math.PI * 2, rotVel: (Math.random() - 0.5) * 6,
      });
    }
    return;
  }
  // Big spark particles
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.PI * 2 * i / conf.sparks + (Math.random() - 0.5) * 0.4;
    const sp = (180 + Math.random() * 280) * conf.size;
    const col = Math.random() > 0.5 ? conf.color2 : conf.color1;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 120,
      life: 0.5 + Math.random()*0.4, maxLife: 0.9, color: col, size: 4 + Math.random()*7 });
  }
  // Extra scattered debris
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (60 + Math.random() * 350) * conf.size;
    particles.push({ x: x + (Math.random()-0.5)*20, y: y + (Math.random()-0.5)*10,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 150,
      life: 0.3 + Math.random()*0.5, maxLife: 0.8, color: conf.color3, size: 2 + Math.random()*5 });
  }
}

// ===== ONSET DETECTION =====
function detectOnsets(audioBuffer) {
  if (!audioBuffer) return [];
  const data = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const winSamples = Math.floor(sr * 0.015); // 15ms ВюѕвЈёВџ░
  const minGapSamples = Math.floor(sr * 0.03); // 30ms ВхюВєї Ж░ёЖ▓Е
  const onsets = [];
  let smoothed = 0;
  let lastOnset = -minGapSamples * 2;
  for (let i = 0; i < data.length; i += winSamples) {
    let sum = 0, cnt = 0;
    const end = Math.min(i + winSamples, data.length);
    for (let k = i; k < end; k += 8) { sum += data[k] * data[k]; cnt++; }
    const energy = cnt > 0 ? Math.sqrt(sum / cnt) : 0;
    if (energy > 0.003 && energy > smoothed * 1.1 && i - lastOnset > minGapSamples) {
      onsets.push(i / sr);
      lastOnset = i;
    }
    smoothed = energy * 0.2 + smoothed * 0.8;
  }
  return onsets;
}

function generateNodesFromOnsets(song, diff, onsetsByStem, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);
  const bgmDelay = 3.5;
  song._startDelay = bgmDelay;
  song._onsetMode = true;
  const sixteenth = 15 / song.bpm;

  // ===== vocalIntroRange В▓ўвдг (opt-in) =====
  // flag ьўЋьЃю:
  //   'auto' - вЪ░ьЃђВъё RMS вХёВёЮВю╝вАю в│┤В╗г-only в▓ёьѓи ВъљвЈЎ Ж░љВДђ (ВЮИьіИвАю + ВцЉЖ░ё в│┤В╗г вИїваѕВЮ┤ьЂг ВаёвХђ)
  //   [s, e] - вІеВЮ╝ в▓ћВюё
  //   [[s1,e1], [s2,e2], ...] - вІцВцЉ в▓ћВюё
  //   undefined - flag ВЌєВЮї, ЖИ░ВА┤ вЈЎВъЉ ВЎёВаё в│┤ВА┤ (ВЮ┤ вИћвАЮ ВДёВъЁ ВЋѕ ьЋе)
  let vocalRanges = [];
  const _vir = song.vocalIntroRange;
  if (_vir === 'auto' && typeof stemAudioBuffers === 'object' && stemAudioBuffers) {
    // вЈЎВаЂ Ж░љВДђ: вфевЊа ВіцьЁю RMS вХёВёЮьЋ┤Вёю !musical && vocal в▓ёьѓи В░ЙЖИ░
    // instrum(3) ВаюВЎИ: ВЋ░в╣ёВќИьіИ ьїевЊю/вдгв▓ёвИї ьЁїВЮ╝ВЮ┤ в░░Ж▓йВю╝вАю Ж╣ћвдгвіћ Ж│АВЮ┤ вДјВЋёВёю "ВДёВДю ВЮїВЋЁ ВІюВъЉ" ьїљВаЋВЌћ вХђВаЂьЋЕ
    // вдгвЊгЖ░љ Въѕвіћ ВЮїВЋЁ = drums/bass/piano/guitar Ж░ђ ВъѕВќ┤ВЋ╝ ьЋе
    const _MUSICAL = [0, 1, 4, 5];
    const _BSEC = 0.5;
    const _FL_MUSIC = 0.015;  // ВЮїВЋЁ ВіцьЁю floor
    const _FL_VOCAL = 0.008;  // в│┤В╗г floor (ВА░ВџЕьЋю в│┤В╗гвЈё ВъАЖ▓ї)
    const _MIN_RUN = 2;        // ВхюВєї ВЌ░ВєЇ в▓ёьѓи (1В┤ѕ)
    const _rms = {};
    let _nb = 0;
    for (const si of [0, 1, 2, 3, 4, 5]) { // + vocals(2) ьЈгьЋе
      const buf = stemAudioBuffers[si];
      if (!buf) { console.log('[vocalIntro auto] stem ' + si + ' NO BUFFER'); continue; }
      const d = buf.getChannelData(0);
      const sr_ = buf.sampleRate;
      const bs = Math.floor(sr_ * _BSEC);
      const nb2 = Math.ceil(d.length / bs);
      _nb = Math.max(_nb, nb2);
      const arr = new Float32Array(nb2);
      for (let b = 0; b < nb2; b++) {
        let s0 = b * bs, s1 = Math.min(s0 + bs, d.length), sum = 0, c = 0;
        for (let k = s0; k < s1; k += 32) { sum += d[k] * d[k]; c++; }
        arr[b] = c > 0 ? Math.sqrt(sum / c) : 0;
      }
      _rms[si] = arr;
    }
    const _vocalArr = _rms[2];
    if (!_vocalArr) {
      console.log('[vocalIntro auto] vocals stem not available for ' + song.name);
    } else {
      // вћћв▓ёЖиИ dump (window._vocalDebug = true ВЮ╝ вЋївДї)
      if (window._vocalDebug === true) {
        const dumpLimit = Math.min(60, _nb);
        const dumpRows = [];
        for (let b = 0; b < dumpLimit; b++) {
          const t = (b * _BSEC).toFixed(1);
          const v = (_vocalArr[b] || 0).toFixed(4);
          const d0 = (_rms[0]?.[b] || 0).toFixed(4);
          const d1 = (_rms[1]?.[b] || 0).toFixed(4);
          const d3 = (_rms[3]?.[b] || 0).toFixed(4);
          const d4 = (_rms[4]?.[b] || 0).toFixed(4);
          const d5 = (_rms[5]?.[b] || 0).toFixed(4);
          let musical = false;
          for (const si of _MUSICAL) {
            const arr = _rms[si];
            if (arr && (arr[b] || 0) > _FL_MUSIC) { musical = true; break; }
          }
          const vocal = (_vocalArr[b] || 0) > _FL_VOCAL;
          const mark = (!musical && vocal) ? ' VOCAL-ONLY' : (musical ? ' music' : ' silent');
          dumpRows.push(`  ${t}s: voc=${v} dr=${d0} bs=${d1} in=${d3} pn=${d4} gt=${d5}${mark}`);
        }
        console.log('[vocalIntro auto] RMS dump for ' + song.name + ':\n' + dumpRows.join('\n'));
      }

      // ВЌ░ВєЇ ЖхгЖ░ё В░ЙЖИ░ (ВхюВєї MIN_RUN в▓ёьѓи)
      let runStart = -1;
      for (let b = 0; b <= _nb; b++) {
        let isVocalOnly = false;
        if (b < _nb) {
          let musical = false;
          for (const si of _MUSICAL) {
            const arr = _rms[si];
            if (arr && (arr[b] || 0) > _FL_MUSIC) { musical = true; break; }
          }
          const vocal = (_vocalArr[b] || 0) > _FL_VOCAL;
          isVocalOnly = !musical && vocal;
        }
        if (isVocalOnly) {
          if (runStart < 0) runStart = b;
        } else if (runStart >= 0) {
          const runLen = b - runStart;
          if (runLen >= _MIN_RUN) {
            vocalRanges.push([runStart * _BSEC, b * _BSEC]);
          }
          runStart = -1;
        }
      }
      console.log('[vocalIntro auto] ' + vocalRanges.length + ' vocal-only ranges detected for ' + song.name, vocalRanges);
    }
  } else if (Array.isArray(_vir) && _vir.length === 2 && typeof _vir[0] === 'number') {
    // вІеВЮ╝ в▓ћВюё [s, e]
    vocalRanges = [_vir];
  } else if (Array.isArray(_vir) && _vir.length > 0 && Array.isArray(_vir[0])) {
    // вІцВцЉ в▓ћВюё [[s1,e1], [s2,e2], ...]
    vocalRanges = _vir;
  }

  // вфевЊа stem onsetВЮё ьЋўвѓўвАю ьЋЕВ╣ўвљў stem ВаЋв│┤ ВюаВДђ (vocals ВаюВЎИ)
  let allOnsets = [];
  for (const si in onsetsByStem) {
    if (ALWAYS_AUDIBLE_STEMS.includes(Number(si))) continue;
    for (const t of onsetsByStem[si]) {
      allOnsets.push({ time: t + bgmDelay, stem: Number(si) });
    }
  }
  // vocal ranges ВЋѕВЮў vocals onset ьЈгьЋе
  if (vocalRanges.length > 0 && onsetsByStem[2]) {
    let added = 0;
    for (const [vs, ve] of vocalRanges) {
      for (const t of onsetsByStem[2]) {
        if (t >= vs && t <= ve) {
          allOnsets.push({ time: t + bgmDelay, stem: 2 });
          added++;
        }
      }
    }
    if (added > 0) console.log('[vocalIntro] ' + added + ' vocal onsets added for ' + song.name);
  }
  // Ж│Ав│ё ВіцьЁю ВЎёВаё ВаюВЎИ (excludeStems: [stemIdx, ...])
  // ВіцьЁю ВЮИвЇ▒Віц: 0=drums, 1=bass, 2=vocals, 3=instrum, 4=piano, 5=guitar, 6=other
  const exStems = song.excludeStems || [];
  if (exStems.length > 0) {
    allOnsets = allOnsets.filter(o => !exStems.includes(o.stem));
  }

  // ===== ВъљвЈЎ ambient/ВА░ВџЕьЋю ЖхгЖ░ё ьЋёьё░ =====
  // MUSICAL_STEMS ВцЉ ьЋўвѓўвЮ╝вЈё Ваѕвїђ RMS > 0.003 ВЮИ в▓ёьѓивДї "ВЮїВЋЁВаЂ"Вю╝вАю ьїљВаЋ
  // ВА░ВџЕьЋю ЖхгЖ░ё(intro, outro, ВЃѕВєївдг вЊ▒)ВЮђ onset ВъљвЈЎ drop
  if (typeof stemAudioBuffers === 'object' && stemAudioBuffers) {
    const MUSICAL_STEMS = [0, 1, 3, 4, 5]; // drums, bass, instrum, piano, guitar
    const BUCKET_SEC = 0.5;
    const ABS_FLOOR = 0.02; // ВѓгвъїВЮ┤ вЊцвдгвіћ ВѕўВцђ
    const stemBucketRms = {};
    let maxBuckets = 0;
    for (const si of MUSICAL_STEMS) {
      const buf = stemAudioBuffers[si];
      if (!buf) continue;
      const d = buf.getChannelData(0);
      const sr_ = buf.sampleRate;
      const bs = Math.floor(sr_ * BUCKET_SEC);
      const nb = Math.ceil(d.length / bs);
      maxBuckets = Math.max(maxBuckets, nb);
      const arr = new Float32Array(nb);
      for (let b = 0; b < nb; b++) {
        let s0 = b * bs, s1 = Math.min(s0 + bs, d.length), sum = 0, c = 0;
        for (let k = s0; k < s1; k += 32) { sum += d[k] * d[k]; c++; }
        arr[b] = c > 0 ? Math.sqrt(sum / c) : 0;
      }
      stemBucketRms[si] = arr;
    }
    const isMusical = [];
    for (let b = 0; b < maxBuckets; b++) {
      let musical = false;
      for (const si of MUSICAL_STEMS) {
        const arr = stemBucketRms[si];
        if (arr && (arr[b] || 0) > ABS_FLOOR) { musical = true; break; }
      }
      isMusical.push(musical);
    }
    // ВЋъвњц 1в▓ёьѓи padding (Ж░ЉВъЉВіцвЪ░ вЂіЖ╣ђ в░ЕВДђ)
    const paddedMusical = isMusical.slice();
    for (let b = 0; b < isMusical.length; b++) {
      if (isMusical[b]) {
        if (b > 0) paddedMusical[b - 1] = true;
        if (b < isMusical.length - 1) paddedMusical[b + 1] = true;
      }
    }
    const before = allOnsets.length;
    // vocal ranges ВЋѕВЮђ ambient filter ВаюВЎИ (в│┤В╗г-only в▓ёьѓи ВюаВДђ)
    allOnsets = allOnsets.filter(o => {
      const relT = o.time - bgmDelay;
      if (vocalRanges.length > 0) {
        for (let vi = 0; vi < vocalRanges.length; vi++) {
          if (relT >= vocalRanges[vi][0] && relT <= vocalRanges[vi][1]) return true;
        }
      }
      const bi = Math.floor(relT / BUCKET_SEC);
      if (bi < 0 || bi >= paddedMusical.length) return true;
      return paddedMusical[bi];
    });
    if (before !== allOnsets.length) {
      console.log('ambient filter: ' + (before - allOnsets.length) + ' onsets dropped');
    }

  }

  allOnsets.sort((a, b) => a.time - b.time);

  // BPM ЖиИвдгвЊюВЌљ ьђђьЃђВЮ┤Вдѕ (16вХёВЮїьЉю)
  for (const o of allOnsets) {
    const rel = o.time - bgmDelay;
    o.time = Math.round(rel / sixteenth) * sixteenth + bgmDelay;
  }

  // ВЌљвёѕВДђ вХђВЌг
  if (energyMap && energyMap.length > 0) {
    for (const o of allOnsets) {
      const eIdx = Math.min(Math.floor((o.time - bgmDelay) / 0.5), energyMap.length - 1);
      o.energy = eIdx >= 0 ? energyMap[eIdx] : 1;
    }
  } else {
    for (const o of allOnsets) o.energy = 1;
  }

  // вёѕвг┤ Ж░ђЖ╣їВџ┤ onset в│ЉьЋЕ (вЈЎВІювЁИьіИ ьЏёв│┤)
  const merged = [];
  for (const o of allOnsets) {
    if (merged.length > 0 && Math.abs(o.time - merged[merged.length - 1].time) < 0.03) {
      if (!merged[merged.length - 1].extra) merged[merged.length - 1].extra = [];
      merged[merged.length - 1].extra.push(o);
      continue;
    }
    merged.push(o);
  }

  // ьЋўьЋю ьЋёьё░ ВаюЖ▒░: quiet ЖхгЖ░ё(ьћ╝ВЋёвЁИ ВЮИьіИвАю вЊ▒) вЁИьіИ вЊювъЇ в░ЕВДђ
  const nonSilent = merged;

  // вѓюВЮ┤вЈё ьЋёьё░вДЂ (815d64e ВЏљв│И: ВЮїВЋЁ вХёВЮїьЉю ЖИ░Вцђ)
  const density = diff.noteDensity;
  const minGap = density <= 0.5 ? sixteenth * 4    // ВЅгВЏђ: 4вХёВЮїьЉю
               : density <= 0.8 ? sixteenth * 2    // в│┤ьєх: 8вХёВЮїьЉю
               : density <= 1.2 ? sixteenth * 1.5  // Вќ┤вацВЏђ: Ваљ8вХёВЮїьЉю
               : sixteenth;                        // ВДђВўЦ: 16вХёВЮїьЉю
  const filtered = [];
  if (nonSilent.length > 0) {
    const songStart = nonSilent[0].time;
    const songEnd = nonSilent[nonSilent.length - 1].time;
    let slotStart = songStart;
    let nsIdx = 0;
    while (slotStart < songEnd + minGap) {
      const slotEnd = slotStart + minGap;
      let best = null, bestEnergy = -1;
      while (nsIdx < nonSilent.length && nonSilent[nsIdx].time < slotEnd) {
        if (nonSilent[nsIdx].time >= slotStart && nonSilent[nsIdx].energy > bestEnergy) {
          best = nonSilent[nsIdx]; bestEnergy = nonSilent[nsIdx].energy;
        }
        nsIdx++;
      }
      if (best) filtered.push(best);
      slotStart = slotEnd;
    }
  }

  // ===== "вћ░вІе" ьїеьё┤ в│хЖхг (вДцВџ░ ВЌёЖ▓Е) =====
  // в▓ёвацВДё onset ВцЉ ВёаьЃЮвљю вЁИьіИВЎђ 90~120ms + ВЌљвёѕВДђ 100%+ (ВдЅ Ваёьўђ ВЋйьЋўВДђ ВЋіВЮђ Ж▓Ѓ)
  // в│хЖхг ВЃЂьЋю: filtered ВаёВ▓┤ВЮў 5% ВЮ┤ьЋў
  {
    const PAIR_MIN = 0.09;
    const PAIR_MAX = 0.12;
    const ENERGY_RATIO = 1.2;
    const MAX_RESCUE_RATIO = 0.01;
    const maxRescue = Math.floor(filtered.length * MAX_RESCUE_RATIO);
    const filteredSet = new Set(filtered);
    const rescued = [];
    for (const f of filtered) {
      if (rescued.length >= maxRescue) break;
      for (const o of nonSilent) {
        if (filteredSet.has(o)) continue;
        const dt = o.time - f.time;
        if (dt < PAIR_MIN || dt > PAIR_MAX) continue;
        if (o.energy < f.energy * ENERGY_RATIO) continue;
        if (rescued.includes(o)) continue;
        rescued.push(o);
        break;
      }
    }
    filtered.push(...rescued);
    filtered.sort((a, b) => a.time - b.time);
  }

  // ===== stem ЖИ░в░ў ваѕВЮИ в░░вХё (ВЮїВЋЁ ЖхгВА░ в░ўВўЂ) =====
  const lc = laneCount;
  const holdEvery = diff.holdEvery || 999;
  const eighthDur = sixteenth * 2;

  // stem Рєњ ваѕВЮИ вДцьЋЉ (Ваё ваѕВЮИВЌљ Ж│авЦ┤Ж▓ї вХёВѓ░)
  const stemList = [...new Set(filtered.map(x => x.stem))].sort((a, b) => a - b);
  const stemBase = {};
  const songOff = songIdx % lc; // Ж│АвДѕвІц ВІюВъЉ ваѕВЮИ вІцвЦ┤Ж▓ї
  stemList.forEach((s, i) => { stemBase[s] = (Math.floor(i * lc / Math.max(stemList.length, 1)) + songOff) % lc; });

  // stemв│ё вѓ┤вХђ В╣┤Вџ┤ьё░ (Ж░ЎВЮђ stem вѓ┤ВЌљВёю ваѕВЮИ ВѕюьЎў)
  const stemCnt = {};
  let noteIdx = 0;
  let prevLane = -1;
  let prevTime = -1;
  const SAME_LANE_MIN_GAP = 0.3; // Ж░ЎВЮђ ваѕВЮИ ВЌ░ВєЇ ьЌѕВџЕ ВхюВєї Ж░ёЖ▓Е (В┤ѕ, ВІюЖ░Ђ overlap в░ЕВДђ)

  let _lastChordTime = 0;
  for (const o of filtered) {
    if (!stemCnt[o.stem]) stemCnt[o.stem] = 0;
    const ci = stemCnt[o.stem]++;
    const base = stemBase[o.stem] || 0;

    // stem ЖИ░в░ў + ВІювЊю RNG ВўцьћёВЁІ (815d64e ВЏљв│И в░ЕВІЮ. seededвЮ╝ Ж▓░ВаЋвАа.)
    let lane = (base + Math.floor(rng() * lc)) % lc;

    // Ж░ЎВЮђ ваѕВЮИ + 0.3s в»ИвДї = ВІюЖ░ЂВаЂ overlap Рєњ ВІюьћёьіИ
    // 0.3s ВЮ┤ВЃЂ вќеВќ┤ВАїВю╝вЕ┤ ЖиИвїђвАю (ВЌ░ьЃђ ьЌѕВџЕ)
    if (lane === prevLane && lc > 1 && (o.time - prevTime) < SAME_LANE_MIN_GAP) {
      lane = (lane + 1) % lc;
    }

    prevLane = lane;
    prevTime = o.time;
    const nd = {
      time: o.time, lane, freq: 440, type: 'note', stem: o.stem,
      hit: false, missed: false, holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    if (holdEvery > 0 && noteIdx > 0 && noteIdx % holdEvery === 0) {
      nd.type = 'hold';
      nd.endTime = nd.time + (2 + Math.floor(rng() * 2)) * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // вЈЎВІю вЁИьіИ (chord): chordMode ьЎюВё▒ + extra onset в│┤Вюа + ВЌљвёѕВДђ ВЃЂВюё ЖхгЖ░ё
    if (song.chordMode && o.extra && o.extra.length > 0 && nd.type === 'note') {
      const chordGap = song.chordMinGap || 2.0;
      if (!_lastChordTime || (o.time - _lastChordTime) >= chordGap) {
        const avgEnergy = filtered.reduce((s, x) => s + (x.energy || 0), 0) / filtered.length;
        if ((o.energy || 0) >= avgEnergy * 1.3) {
          const ex = o.extra[0];
          let cLane = (lane + 1 + Math.floor(rng() * (lc - 1))) % lc;
          nodes.push({
            time: o.time, lane: cLane, freq: 440, type: 'note', stem: ex.stem != null ? ex.stem : o.stem,
            hit: false, missed: false, holding: false, holdComplete: false,
            endTime: 0, _ho1: null, _ho2: null, _hg: null
          });
          _lastChordTime = o.time;
        }
      }
    }
  }

  // ьіИвъЕ ВХћЖ░ђ
  const trapInt = diff.trapInterval || 0;
  if (trapInt > 0 && nodes.length > 0) {
    const songEnd = nodes[nodes.length - 1].time;
    for (let t = bgmDelay + 5; t < songEnd - 2; t += (trapInt * 2 + rng() * trapInt * 2) * sixteenth) {

      for (const n of nodes) { if (Math.abs(n.time - t) < sixteenth * 2) { conflict = true; break; } }

  }

  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  let maxDur = 0;
  for (const si in stemAudioBuffers) { if (stemAudioBuffers[si]) maxDur = Math.max(maxDur, stemAudioBuffers[si].duration); }

function _warmupFeverGpu() {
  if (_feverWarmedUp) return;

    const cv = document.createElement('canvas');
    cv.width = 128; cv.height = 128;

    const lg = c.createLinearGradient(0, 0, 0, 128);
    lg.addColorStop(0, 'hsl(0,100%,65%)');
    lg.addColorStop(0.5, 'hsl(60,100%,70%)');
    lg.addColorStop(1, 'hsl(120,100%,65%)');
    c.fillStyle = lg; c.fillRect(0, 0, 128, 128);
    const lgH = c.createLinearGradient(0, 0, 128, 0);
    lgH.addColorStop(0, '#ff4d8e'); lgH.addColorStop(1, '#ffd9e3');
    c.fillStyle = lgH; c.fillRect(0, 0, 128, 64);
    // 2) radial gradient Рђћ fever note glow / burst
    const rg = c.createRadialGradient(64, 64, 0, 64, 64, 64);
    rg.addColorStop(0, 'rgba(255,100,0,0.5)');
    rg.addColorStop(1, 'rgba(255,100,0,0)');
    c.fillStyle = rg; c.fillRect(0, 0, 128, 128);
    // 3) arc (circle) Рђћ tap в▓ёьі╝ Вё╝Вёю, ьїїьІ░ьЂ┤ orb, ьћ╝в▓ё burst
    c.fillStyle = '#ff88cc';
    c.beginPath(); c.arc(64, 64, 30, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#fff'; c.lineWidth = 2;
    c.beginPath(); c.arc(64, 64, 20, 0, Math.PI*2); c.stroke();
    // 4) shadowBlur вІцВцЉ ВЃЅВЃЂ Рђћ ьћ╝в▓ё ьЁЇВіцьіИ + вѓ«ВЮђ HP glow 2Ж░ђВДђ вфевЉљ
    c.shadowColor = 'hsl(30,80%,40%)'; c.shadowBlur = 6;
    c.font = `bold ${sz(44)}px sans-serif`;
    c.textAlign = 'center'; c.textBaseline = 'top';
    c.fillStyle = lg;
    c.fillText('FEVER!', 64, 0);
    c.shadowColor = '#ff3333'; c.shadowBlur = 12;
    c.beginPath(); c.arc(64, 100, 15, 0, Math.PI*2); c.fill();
    c.shadowBlur = 0;
    // 5) rounded rect (rrFill/rrStroke ьїеьё┤ Рђћ fillStyle + beginPath + quadraticCurveTo)
    c.beginPath();
    c.moveTo(10, 10); c.lineTo(100, 10); c.quadraticCurveTo(110, 10, 110, 20);
    c.lineTo(110, 80); c.quadraticCurveTo(110, 90, 100, 90);
    c.lineTo(10, 90); c.quadraticCurveTo(0, 90, 0, 80);
    c.lineTo(0, 20); c.quadraticCurveTo(0, 10, 10, 10);
    c.closePath();
    c.fillStyle = 'rgba(12,12,16,0.85)'; c.fill();
    c.strokeStyle = 'rgba(85,85,95,0.98)'; c.lineWidth = 7; c.stroke();
    // 6) HSL ВЃЅВЃЂ string ВѓгВџЕ warm
    c.fillStyle = `hsl(${(Date.now()*0.1)%360},90%,65%)`;
    c.fillRect(10, 10, 20, 20);
  } catch(e) {}
}

      const decodedCount = Object.keys(stemAudioBuffers).filter(k => stemAudioBuffers[k]).length;
      finishLoading._retryCount = (finishLoading._retryCount || 0);
      if (decodedCount === 0 && finishLoading._retryCount < 10) {
        finishLoading._retryCount++;
        setTimeout(finishLoading, 2000);
        return;
      }
    }
    finishLoading._retryCount = 0;
    songLoading = false;
    countdownTime = 3.5;
    lastTime = 0;
  }

  function tryFinalize() {
    // ВіцьЁю + ВЌљвёѕВДђ вДх вфевЉљ ВЎёвБї ВІю ВхюВбЁ вЁИьіИ ВЃЮВё▒ ьЏё ВІюВъЉ
    if (!_stemsReady || !_energyReady) return;
    // РўЁ вАювћЕ вЂЮвѓўЖ│а ВІцВаю ьћїваѕВЮ┤ ВцЉВЮ┤вЕ┤ SKIP Рђћ detectOnsets 7Ж░ю + generateNodesFromOnsets Ж░ђ 2-3В┤ѕ вИћвАЮ Вюав░ю.
    //   songLoading ьћївъўЖиИвАю вАювћЕ ВцЉ vs ВІцВаю ьћїваѕВЮ┤ ЖхгвХё (вАювћЕ ВцЉВЌћ ВаЋВЃЂ ВІцьќЅ ьЋёВџћ).
    if (!songLoading && state === 'playing' && countdownTime <= 0) return;
    // ВўцвћћВўц ЖИИВЮ┤ ЖИ░в░ў bars в│┤ВаЋ + ВЌљвёѕВДђ вДх в░ўВўЂ ВхюВбЁ вЁИьіИ ВЃЮВё▒ (1ьџївДї)
    const origBars = curSong.bars;
    if (curSong._audioBars) curSong.bars = curSong._audioBars;
    // onset ЖИ░в░ў вЁИьіИ ВЃЮВё▒
    try {
      const onsetsByStem = {};
      for (let i = 0; i < stemNames.length; i++) {
        if (stemAudioBuffers[i]) {
          onsetsByStem[i] = detectOnsets(stemAudioBuffers[i]);
          console.log('Stem', i, stemNames[i], ':', onsetsByStem[i].length, 'onsets, first:', onsetsByStem[i][0]?.toFixed(2) + 's');
        } else {
          console.log('Stem', i, stemNames[i], ': NO BUFFER');
        }
      }
      if (Object.keys(onsetsByStem).length > 0) {
        generateNodesFromOnsets(curSong, curDiff, onsetsByStem, songEnergyMap);
        console.log('Onset notes:', nodes.length, '| First note time:', nodes[0]?.time.toFixed(2) + 's');
      } else {
        console.log('No onset buffers Рђћ fallback to pattern');
        generateNodes(curSong, curDiff, songEnergyMap);
      }
    } catch(e) {
      console.warn('onset failed, fallback:', e);
      generateNodes(curSong, curDiff, songEnergyMap);
    }
    curSong.bars = origBars;
    // ВхюВєї ьЉюВІю ВІюЖ░ё в│┤ВъЦ
    const elapsed = performance.now() - songLoadStart;
    if (elapsed >= LOAD_MIN_MS) { finishLoading(); }
    else { setTimeout(finishLoading, LOAD_MIN_MS - elapsed); }
  }

  function onAllLoaded() {
    if (_stemsReady) return;
    _stemsReady = true;
    songLoadProgress = songLoadTotal;
    // ВіцьЁю: currentTime вдгВЁІвДї (playвіћ ВЃЮВё▒ ВІю ВѓгВџЕВъљ ВаюВіцВ▓ўВЌљВёю ВЮ┤в»И ьўИВХювље)
    if (usingStemMode) {
      for (let k = 0; k < allStemAudios.length; k++) {
        if (allStemAudios[k]) {
          // вАювћЕ ВцЉ в»Ивдг seek+play+pause Рєњ вИївЮ╝Вџ░ВађЖ░ђ ВўцвћћВўц в▓ёьЇ╝вДЂ ВЎёвБї
          // В╣┤Вџ┤ьіИвІцВџ┤ вЂЮВЌљВёю play()вДї ьЋўвЕ┤ вЂіЖ╣ђ ВЌєВЮї
          allStemAudios[k].currentTime = 0;
          allStemAudios[k].volume = 0;
          allStemAudios[k].play().then(() => { allStemAudios[k].pause(); allStemAudios[k].currentTime = 0; }).catch(()=>{});
        }
      }
      // ьјёВіц ВўцвћћВўц ВЃЮВё▒
      pulseStemAudios = [];
      if (isIOS && actx) {
        // iOS: BufferPlayer ВъгВѓгВџЕ (Ж░ЎВЮђ в▓ёьЇ╝ Ж│хВюа)
        for (let k = 0; k < allStemAudios.length; k++) {
          if (ALWAYS_AUDIBLE_STEMS.includes(k)) { pulseStemAudios.push(null); continue; }
          const pp = new BufferPlayer(stemAudioBuffers[k] || null, actx);
          pp.volume = 0;
          pulseStemAudios.push(pp);
        }
      } else {
        for (let k = 0; k < allStemAudios.length; k++) {
          if (ALWAYS_AUDIBLE_STEMS.includes(k)) { pulseStemAudios.push(null); continue; }
          const pa = new Audio(allStemAudios[k].src);
          pa.volume = 0;
          pa.load();
          pulseStemAudios.push(pa);
        }
      }
    }
    tryFinalize();
  }

  if (curSong.stemDir && stemCount > 0 && isIOS && actx) {
    // ===== iOS ВаёВџЕ: AudioBufferSourceNode ЖИ░в░ў вАювћЕ =====
    pulseStemAudios = [];
    let _iosLoaded = 0;
    for (let i = 0; i < stemCount; i++) {
      const path = assetUrl(curSong.stemDir + curSong.stemPrefix + '_' + stemNames[i] + '.ogg');
      const _si = i;
      const placeholder = new BufferPlayer(null, actx);
      placeholder.src = path;
      allStemAudios.push(placeholder);
      fetchSafe(path, {}, { retries: 4, timeout: 12000 }).then(r => r.arrayBuffer()).then(buf => {
        const _dTs = performance.now();
        actx.decodeAudioData(buf, buffer => {
          if (window._dbg) {
            const dur = performance.now() - _dTs;
            if (dur > 50) try { console.log('%c[DECODE] stem#' + _si + ' ' + dur.toFixed(0) + 'ms (main thread)', 'color:#ff8844'); } catch(e){}
          }
          // BufferPlayerВЌљ в▓ёьЇ╝ ьЋавІ╣
          allStemAudios[_si].buffer = buffer;
          stemAudioBuffers[_si] = buffer; // в╣ѕвЁИьіИ/Ж│АвЂЮВџЕ ВъгВѓгВџЕ
          // В▓Ф Вєївдг ВюёВ╣ў + ВЌљвёѕВДђвДх вХёВёЮ
          const data = buffer.getChannelData(0);
          const sr = buffer.sampleRate;
          const bigChunk = Math.floor(sr * 0.1);
          for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {
            let peak = 0;
            const end = Math.min(j + bigChunk, data.length);
            for (let k = j; k < end; k += 4) { const v = Math.abs(data[k]); if (v > peak) peak = v; }
            if (peak > 0.01) { stemFirstSoundTime[_si] = j / sr; break; }
          }
          if (!ALWAYS_AUDIBLE_STEMS.includes(_si)) {
            const winSize = Math.floor(sr * 0.5);
            const mapLen = Math.ceil(data.length / winSize);
            if (!songEnergyMap || songEnergyMap.length < mapLen) {
              songEnergyMap = new Float32Array(mapLen);
            }
            for (let w = 0; w < mapLen; w++) {
              let sum = 0;
              const s0 = w * winSize, s1 = Math.min(s0 + winSize, data.length);
              for (let k = s0; k < s1; k += 8) sum += data[k] * data[k];
              songEnergyMap[w] += Math.sqrt(sum / ((s1 - s0) / 8));
            }
            _energyStemsDone++;
            if (_energyStemsDone >= _energyStemsTotal) {
              let maxVal = 0;
              for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }
              if (maxVal > 0) for (let j = 0; j < songEnergyMap.length; j++) songEnergyMap[j] /= maxVal;
              _energyReady = true;
              tryFinalize();
            }
          }
          _iosLoaded++;
          songLoadProgress = _iosLoaded;
          if (_iosLoaded === stemCount) {
            usingStemMode = true;
            updateSongDurationFromAudio();
            onAllLoaded();
          }
        }, () => { console.warn('iOS decodeAudioData failed:', path); });
      }).catch(()=>{});
    }
    // ьЃђВъёВЋёВЏЃ 30В┤ѕ (iOS віљвд░ вёцьіИВЏїьЂг вїђВЮЉ). finishLoading ВЌљВёю buffer ВЌєВю╝вЕ┤ ВХћЖ░ђ 20В┤ѕ ВъгВІювЈё.
    setTimeout(() => { if (songLoading) { songLoadProgress = songLoadTotal; _energyReady = true; onAllLoaded(); } }, 30000);
  } else if (curSong.stemDir && stemCount > 0) {
    let loaded = 0, failed = 0;
    pulseStemAudios = [];
    for (let i = 0; i < stemCount; i++) {
      const path = assetUrl(curSong.stemDir + curSong.stemPrefix + '_' + stemNames[i] + '.ogg');
      const a = new Audio(path);
      a.volume = 0;
      a.play().catch(()=>{}); // ВѓгВџЕВъљ ВаюВіцВ▓ў В╗еьЁЇВіцьіИВЌљВёю ВдЅВІю play (autoplay policy Вџ░ьџї)
      allStemAudios.push(a);
      const stemIdx = i;
      // ВіцьЁю ВўцвћћВўц вХёВёЮ: В▓Ф Вєївдг ВюёВ╣ў + ВЌљвёѕВДђ вДх (вЊювЪ╝ ЖИ░Вцђ)
      if (actx) {
        const _si = stemIdx;
        const _isEnergyStem = !ALWAYS_AUDIBLE_STEMS.includes(i);
        fetchSafe(path, {}, { retries: 4, timeout: 12000 }).then(r => r.arrayBuffer()).then(buf => {
          const _dTs2 = performance.now();
          actx.decodeAudioData(buf, buffer => {
            if (window._dbg) {
              const dur = performance.now() - _dTs2;
              if (dur > 50) try { console.log('%c[DECODE] stem#' + _si + ' ' + dur.toFixed(0) + 'ms (main thread)', 'color:#ff8844'); } catch(e){}
            }
            stemAudioBuffers[_si] = buffer;
            if (_isEnergyStem) {
              if (!ALWAYS_AUDIBLE_STEMS.includes(_si)) stemOnsetCache[_si] = detectOnsets(buffer);
              const data = buffer.getChannelData(0);
              const sr = buffer.sampleRate;
              const bigChunk = Math.floor(sr * 0.1);
              for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {
                let peak = 0;
                const end = Math.min(j + bigChunk, data.length);
                for (let k = j; k < end; k += 4) { const v = Math.abs(data[k]); if (v > peak) peak = v; }
                if (peak > 0.01) { stemFirstSoundTime[_si] = j / sr; break; }
              }
              const winSize = Math.floor(sr * 0.5);
              const mapLen = Math.ceil(data.length / winSize);
              if (!songEnergyMap || songEnergyMap.length < mapLen) songEnergyMap = new Float32Array(mapLen);
              for (let w = 0; w < mapLen; w++) {
                let sum = 0;
                const s0 = w * winSize, s1 = Math.min(s0 + winSize, data.length);
                for (let k = s0; k < s1; k += 8) sum += data[k] * data[k];
                songEnergyMap[w] += Math.sqrt(sum / ((s1 - s0) / 8));
              }
              _energyStemsDone++;
              if (_energyStemsDone >= _energyStemsTotal) {
                let maxVal = 0;
                for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }
                if (maxVal > 0) for (let j = 0; j < songEnergyMap.length; j++) songEnergyMap[j] /= maxVal;
                _energyReady = true;
                tryFinalize();
              }
            }
          });
        }).catch(()=>{});
      }
      const _onStemReady = () => {
        if (a._stemLoaded) return; a._stemLoaded = true;
        loaded++;
        songLoadProgress = loaded;
        if (loaded === stemCount) {
          usingStemMode = true;
          updateSongDurationFromAudio();
          onAllLoaded();
        }
      };
      a.addEventListener('canplaythrough', _onStemReady, { once: true });
      a.addEventListener('loadeddata', _onStemReady, { once: true }); // iOS ьЈ┤в░▒
      a.addEventListener('error', () => {
        failed++;
        if (failed === 1) {
          for (let j = 0; j < allStemAudios.length; j++) {
            if (allStemAudios[j]) { allStemAudios[j].pause(); }
          }
          allStemAudios = [];
          songAudio = new Audio(assetUrl(curSong.file));
          songAudio.volume = 0;
          songAudio.preload = 'auto';
          songAudio.addEventListener('playing', function _m() { songAudio.volume = 0; songAudio.removeEventListener('playing', _m); });
          songAudio.play().catch(()=>{});
          songAudio.addEventListener('canplaythrough', () => {
            updateSongDurationFromAudio();
            songLoadProgress = songLoadTotal;
            onAllLoaded();
          }, { once: true });
        }
      }, { once: true });
    }
    // ьЃђВъёВЋёВЏЃ 30В┤ѕ (віљвд░ вёцьіИВЏїьЂг вїђВЮЉ). finishLoading ВЌљВёю buffer ВЌєВю╝вЕ┤ ВХћЖ░ђ 20В┤ѕ ВъгВІювЈё.
    setTimeout(() => { if (songLoading) { songLoadProgress = songLoadTotal; _energyReady = true; onAllLoaded(); } }, 30000);
  } else {
    _energyReady = true; // в╣ёВіцьЁюЖ│А: ВЌљвёѕВДђ вХёВёЮ ВЌєВЮї
    songAudio = new Audio(assetUrl(curSong.file));
    songAudio.volume = 0;
    songAudio.preload = 'auto';
    songAudio.addEventListener('playing', function _m() { songAudio.volume = 0; songAudio.removeEventListener('playing', _m); });
    songAudio.play().catch(()=>{});
    songAudio.addEventListener('canplaythrough', () => {
      updateSongDurationFromAudio();
      songLoadProgress = songLoadTotal;
      onAllLoaded();
    }, { once: true });
  }
}

// ===== UPDATE =====
function update(dt) {
  // ВўцвћћВўц вћћв░ћВЮ┤Віц в│ђЖ▓й Ж░љВДђ (ВЮ┤Вќ┤ьЈ░ вХёвдг, ВаёьЎћ ВѕўВІа вЊ▒) Рђћ visibilitychange Ж░ђ ВЋѕ вюевіћ В╝ђВЮ┤Віц
  // ВўцвћћВўц вћћв░ћВЮ┤Віц в│ђЖ▓й Ж░љВДђ + в│хЖхг
  if (state === 'playing' && actx) {
    const _curActxState = actx.state;
    if (!gamePaused) {
      // running Рєњ suspended/interrupted ВаёьЎў Рђћ в░ћвАю pause ьЋўВДђ вДљЖ│а 500ms вћћв░ћВџ┤Віц ьЏё pause.
      //   вфев░ћВЮ╝ ьџїВаё(orientationchange) ВІю actx Ж░ђ ВѕюЖ░ё suspend вљљвІц ВдЅВІю в│хЖиђьЋўвіћ Ж▓йВџ░Ж░ђ ВъѕВќ┤Вёю
      //   ВдЅВІю pause ьЋўвЕ┤ вЁИьіИЖ░ђ вЕѕВХў Ж▓ЃВ▓ўвЪ╝ в│┤Въё. 500ms вёўЖ▓ї suspend ВЮ┤вЕ┤ ВДёВДю ВЮИьё░вЪйьіИвАю В▓ўвдг.
      if ((_curActxState === 'suspended' || _curActxState === 'interrupted') && _prevActxState === 'running') {
        _suspendStartAt = performance.now();
      }
      if ((_curActxState === 'suspended' || _curActxState === 'interrupted') && _suspendStartAt > 0 && performance.now() - _suspendStartAt > 500) {
        _audioInterrupted = true;
        pauseGame();
        _suspendStartAt = 0;
      }
      if (_curActxState === 'running') {
        _suspendStartAt = 0;
      }
    }
    // suspended/interrupted Рєњ running ВаёьЎў ВІю (ВЮ┤Вќ┤ьЈ░ ВъгВЌ░Ж▓░/ьџїВаё ВЎёвБї вЊ▒) ВўцвћћВўц ВъгВІюВъЉ + ВъљвЈЎ resume
    if (_curActxState === 'running' && _prevActxState && _prevActxState !== 'running') {
      if (!gamePaused) _restartAudioAfterContextResume();
      else if (_audioInterrupted) { _audioInterrupted = false; resumeGame(); }
    }
    _prevActxState = _curActxState;
  }
  if (state === 'login' || state === 'title') updateShootingStars(dt);
  updateTitleBgmFade();  // ьЃђВЮ┤ьІђ BGM ьјўВЮ┤вЊюВЋёВЏЃ polling (вДц ьћёваѕВъё)
  updateSelectScroll(dt);
  updateSelectArrowHold();
  updateSpeedHold();
  // Preview: start/switch when song selection changes in select state (вћћв░ћВџ┤Віц)
  if (state === 'select' && actx) {
    if (previewSongIdx !== selectedSong || (!previewActive && !_previewDebounce)) {
      if (_previewDebounce) clearTimeout(_previewDebounce);
      const _target = selectedSong;
      previewSongIdx = selectedSong;
      _previewDebounce = setTimeout(function _tryPreview() {
        if (selectedSong !== _target) return;
        if (Math.abs(selectScrollVel) > 0.15 || selectTargetScrollX !== null) {
          // ВЋёВДЂ ВіцьЂгвАц/ВіцвЃЁ ВцЉ Рєњ 300ms ьЏё ВъгВІювЈё
          _previewDebounce = setTimeout(_tryPreview, 300);
          return;
        }
        startPreview(_target);
        _previewDebounce = null;
      }, 750);
    }
    schedulePreview();
  } else if (previewActive) {
    stopPreview();
  }
  shakeX *= 0.82; shakeY *= 0.82;
  for (let i=0;i<laneCount;i++) keyFlash[i] = Math.max(0, keyFlash[i]-dt*2);
  if (judgmentTimer > 0) { judgmentTimer -= dt; if (judgmentTimer <= 0) judgmentPriority = 0; }
  if (fever && feverParticles.length < 40) {
    // Spawn side fire particles during fever
    for (let i = 0; i < 2; i++) {
      const side = Math.random() > 0.5 ? 0 : W;
      const col = `hsl(${Math.random()*60+20},100%,${55+Math.random()*35}%)`;
      feverParticles.push({ x: side + (Math.random()-0.5)*30, y: H * (0.3 + Math.random()*0.6),
        vx: (side === 0 ? 1 : -1) * (20+Math.random()*40), vy: -40-Math.random()*80,
        life: 0.5+Math.random()*0.5, maxLife: 1.0, color: col, size: 4+Math.random()*8 });
    }
  }
  // РўЁ ВБ╝ЖИ░ВаЂ ьћ╝в▓ё burst (1.5В┤ѕвДѕвІц) Рђћ ваѕВЮИ ВцЉВІгВЌљВёю в░ЕВѓгьўЋ ьЇ╝ВДљ, вфев░ћВЮ╝/PC вфевЉљ.
  if (fever && performance.now() >= _nextFeverBurstAt) {
    _nextFeverBurstAt = performance.now() + 1500;
    const _lsxF = _fLsx || getLaneStartX();
    const _lwF = _fLw || getLaneW();
    const _cx = _lsxF + _lwF * laneCount / 2;
    const _cy = H * 0.5;
    const _bCount = isMobile ? 14 : 22;
    for (let i = 0; i < _bCount; i++) {
      const a = (i / _bCount) * Math.PI * 2 + Math.random() * 0.15;
      const sp = 180 + Math.random() * 320;
      const col = `hsl(${Math.random()*50 + 20},100%,${65+Math.random()*25}%)`;
      particles.push({ x: _cx, y: _cy, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        life: 0.5+Math.random()*0.5, maxLife: 1.0, color: col, size: 3+Math.random()*6 });
    }
    // ьћївъўВІю pulse (ВЋйьЋўЖ▓ї)
    feverFlash = Math.max(feverFlash, 0.35);
  }
  if (feverFlash > 0) feverFlash -= dt * 1.5;
  // Update fever particles
  for (let i = feverParticles.length-1; i >= 0; i--) {
    const p = feverParticles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 60*dt; p.life -= dt;
    if (p.life <= 0) feverParticles.splice(i, 1);
  }
  if (playerAnim > 0) playerAnim = Math.max(0, playerAnim - dt);
  else if (playerAnim < 0) playerAnim = Math.min(0, playerAnim + dt);

  if (state === 'login') {
    // ВєїВЁю вАюЖиИВЮИВЮђ в▓ёьі╝ ьЂ┤вдГ ьЋИвЊцвЪгВЌљВёю В▓ўвдг Рђћ ВЌгЖИ░Вёювіћ inputQueueвДї в╣ёВЏђ
    loginInputEl.style.top = '-200px';
    inputQueue=[]; return;
  }
  if (state === 'title') {
    if (loginToastTimer > 0) loginToastTimer -= dt;
    // вІЅвёцВъё ВъЁваЦ ВцЉ: hidden input ьЈгВ╗цВіц ВюаВДђ
    if (nicknameOverlay && document.activeElement !== loginInputEl) loginInputEl.focus();
    if (!currentUser) { inputQueue=[]; return; } // в╣ёвАюЖиИВЮИ: в▓ёьі╝ ьЂ┤вдГ ьЋИвЊцвЪгВЌљВёю В▓ўвдг
    for (const inp of inputQueue) {
      if (inp==='confirm') {
        resumeAudio();
        if (!titleBgmUnlocked) {
          startTitleBgm(); titleBgmUnlocked = true;
        } else {
          stopTitleBgm(); loadFbLogsLazy(); transitionTo('select');
        }
      }
    }
    inputQueue=[]; return;
  }
  if (state === 'shop') {
    for (const inp of inputQueue) {
      if (inp==='back') { stopShopBgm(); transitionTo('select'); }
    }
    inputQueue=[]; return;
  }
  if (state === 'ranking') {
    if (inputQueue.length > 0)    for (const inp of inputQueue) {
      if (inp==='back' || inp==='confirm') { stopRankingBgm(); transitionTo('select'); }
      if (inp==='up') rankingScroll = Math.max(0, rankingScroll - 1);
      if (inp==='down') rankingScroll++;
      if (inp==='left') { selectedDiff = Math.max(0, selectedDiff-1); saveDiffSpeed(); }
      if (inp==='right') { selectedDiff = Math.min(DIFFICULTIES.length-1, selectedDiff+1); saveDiffSpeed(); }
    }
    inputQueue=[]; return;
  }
  if (state === 'achievement') {
    if (inputQueue.length > 0)    for (const inp of inputQueue) {
      if (inp==='back' || inp==='confirm') { stopAchievementBgm(); transitionTo('select'); }
      if (inp==='up') achievementScroll = Math.max(0, achievementScroll - 1);
      if (inp==='down') achievementScroll++;
      if (inp==='left') { achievementTab = Math.max(0, achievementTab - 1); achievementScroll = 0; }
      if (inp==='right') { achievementTab = Math.min(ACH_TABS.length - 1, achievementTab + 1); achievementScroll = 0; }
    }
    inputQueue=[]; return;
  }
  if (state === 'select') {

  const missTimeThresh = gameTime - missCut; // n.time < missTimeThresh ВЮ┤вЕ┤ MISS
  const futureCut = gameTime + 0.5; // 0.5В┤ѕ ВЮ┤ьЏё в»Ивъў вЁИьіИвіћ ВіцВ║ћ вХѕьЋёВџћ
  // ВЋъВфй dead prefix ВъљвЈЎ advance
  while (nodeScanStart < nodes.length && (nodes[nodeScanStart].hit || nodes[nodeScanStart].missed)) {
    nodeScanStart++;
  }
  for (let i = nodeScanStart; i < nodes.length; i++) {
    const n = nodes[i];
    if (n.time > futureCut) break; // в»Ивъў вЁИьіИ Рђћ ВЮ┤ьЏё ВаёвХђ в»Ивъў
    if (n.hit || n.missed) continue;
    if (n.time < missTimeThresh) {
      n.missed = true;
      if (n.type === 'note' || n.type === 'hold') {
        // РўЁ debug: ВъљвЈЎ miss ВѕюЖ░ё вАюЖиИ Рђћ ВхюЖи╝ ьЃГ/LP ВЎђ в╣ёЖхљьЋ┤Вёю Вћ╣ьъў ВЏљВЮИ ВДёвІе.
        //   вЁИьіИЖ░ђ ВюѕвЈёВџ░ ВДђвѓўЖ░ћвіћвЇ░ ьЃГ ВъѕВЌѕВю╝вЕ┤ "Вћ╣ьъў". ьЃГ ВЌєВЌѕВю╝вЕ┤ ВюаВађЖ░ђ ВЋѕ В╣ю Ж▓Ѓ.
        if (window._dbg) {
          const now = performance.now();
          const _hw = getHitWindow();
          const windowMs = noteSpeed > 0 ? (_hw / noteSpeed) * 1000 : 100;
          const allRecent = (window._dbg.lanePressLog || []).filter(e => now - e.t < 1200);
          const sameLaneTaps = allRecent.filter(e => e.lane === n.lane);
          const otherLaneTaps = allRecent.filter(e => e.lane !== n.lane && now - e.t < 300);
          const hadTap = sameLaneTaps.length > 0;
          const missedByMs = (gameTime - n.time) * 1000;  // вЁИьіИ ВДђвѓю ВІюЖ░ё (ms)
          window._dbg.autoMissCount = (window._dbg.autoMissCount || 0) + 1;
          if (hadTap) window._dbg.suspiciousMissCount = (window._dbg.suspiciousMissCount || 0) + 1;
          // РўЁ ьЎЋВаЋ Вћ╣ьъў Рђћ ьЃГВЮ┤ вЁИьіИ hit window ВЋѕВЌљ ВъѕВЌѕвіћвЇ░ miss. ВЮ┤Ж▓ї ВДёВДю в▓ёЖиИ.
          if (hadTap) {
            const _closest = sameLaneTaps[sameLaneTaps.length - 1];
            const _offMs = ((_closest.gt || 0) - n.time) * 1000;
            if (Math.abs(_offMs) <= windowMs) {
              window._dbg.confirmedMissCount = (window._dbg.confirmedMissCount || 0) + 1;
            }
          }
          try {
            let msg = '[AUTO_MISS] L' + n.lane + ' noteAt=' + n.time.toFixed(2) + 's missedBy=' + missedByMs.toFixed(0) + 'ms (window=┬▒' + windowMs.toFixed(0) + 'ms)';
            if (hadTap) {
              const closest = sameLaneTaps[sameLaneTaps.length - 1];
              const tapAgo = Math.round(now - closest.t);
              // РўЁ ьЃГ ВІюВаљ gameTime (gt) vs вЁИьіИ ВІюЖ░ё ВДЂВаЉ в╣ёЖхљ Рђћ ВюѕвЈёВџ░ вѓ┤ ВўђвіћВДђ ьїљВаЋ.
              const tapGt = closest.gt || 0;
              const offsetMs = (tapGt - n.time) * 1000;  // ВЮїВѕў = вёѕвг┤ ВЮ╝В░Ї, ВќЉВѕў = вёѕвг┤ відЖ▓ї
              const withinWindow = Math.abs(offsetMs) <= windowMs;
              const verdict = withinWindow ? '­ЪћЦWINDOWвѓ┤' : (Math.abs(offsetMs) > windowMs * 3 ? 'вёѕвг┤ве╝ьЃГ' : 'ВюѕвЈёВџ░в░ќ');
              msg += ' Рџа№ИЈ L' + n.lane + 'ьЃГ ' + sameLaneTaps.length + 'Ж░ю (ВхюЖи╝=' + tapAgo + 'msВаё, offset=' + offsetMs.toFixed(0) + 'ms ' + verdict + ', src=' + (closest.src||'?') + ')';
              if (otherLaneTaps.length) {
                msg += ' | вІцвЦИ lane: ' + otherLaneTaps.map(e => 'L' + e.lane + '@' + Math.round(now - e.t) + 'ms').join(',');
              }
            } else {
              msg += otherLaneTaps.length ? ' (вІцвЦИ lane ьЃГ ' + otherLaneTaps.length + 'Ж░ю: ' + otherLaneTaps.map(e => 'L' + e.lane + '@' + Math.round(now - e.t) + 'ms').join(',') + ')' : ' (ьЃГ ВЌєВЮї)';
            }
            console.log('%c' + msg, 'color:' + (hadTap ? '#ff3366;font-weight:bold' : '#888'));
          } catch(e){}
        }
        nanoMiss();
        combo = 0; missed++; fever = false; feverTimer = 0;
        if (!devInvincible && playMode === 'normal') gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain : 0.04));
        shakeX = (Math.random()-0.5)*8; shakeY = (Math.random()-0.5)*6;
        if (judgmentPriority < 2) { judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1; }
      }
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 250*dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Bursts
  for (let i = bursts.length-1; i >= 0; i--) {
    bursts[i].time += dt;
    if (bursts[i].time >= bursts[i].maxTime) bursts.splice(i, 1);
  }
  // Hold glows
  for (let i = holdGlows.length-1; i >= 0; i--) {
    holdGlows[i].time += dt;
    if (holdGlows[i].time >= holdGlows[i].maxTime) holdGlows.splice(i, 1);
  }

  // ьћёвдгВіцьЃђВЮ╝: HP Ж▓їВъёВўцв▓ё ВЌєВЮї. Ж│А ВбЁвБївАювДї result ВаёьЎў
  const gameoverByHP = playMode === 'normal' && gauge <= 0;
  if ((gameoverByHP || gameTime >= songDuration) && state === 'playing' && fadeDir === 0) {
    state = 'ending';
    fadeOutSongAudio(1.0);
    // ВаљВѕў ВаЋЖиюьЎћ: вДїВаљ 100вДїВаљ ЖИ░Вцђ
    const _rawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
    const _normalizedScore = Math.round(score / _rawMax * 1000000);
    if (playMode === 'normal') {
      saveScore(curSongIdx, selectedDiff, _normalizedScore);
      checkAndAwardAchievements();
    }
    transitionTo('result');
  }
}

// ===== RENDER =====
// РўЁ Debug overlay Рђћ ?debug=1 ВаёВџЕ. lane вѕёвдё gap/вЇћвИћьъѕьіИ В╣┤Вџ┤ьё░ + вАювћЕ ВЮ┤в▓цьіИ ьЃђВъёвЮ╝ВЮИ.
function renderDebugOverlay() {
  if (!window._dbg) return;
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);  // dpr вг┤ВІю, raw pixel
  // РўЁ ьћёваѕВъё Ж░Г вфевІѕьё░ Рђћ ВЮ┤Ваё ьћёваѕВъёВЌљВёю ВДђЖИѕЖ╣їВДђ 50ms ВЮ┤ВЃЂ ьЮўвађВю╝вЕ┤ вЕћВЮИ ВіцваѕвЊю вИћвАЮ.
  //   event queue ВїЊВЮ┤вЕ┤ ВЌгЖИ░ вАюЖиИвље. Вћ╣ьъў ВѕюЖ░ёВЮў RAF ВДђВЌ░ ВЃЂЖ┤ђЖ┤ђЖ│ё ьїїВЋЁ.
  const nowFrame = performance.now();
  if (window._dbg._lastFrameAt) {
    const gap = nowFrame - window._dbg._lastFrameAt;
    // 30ms ЖИ░Вцђ (60fps=16ms, 30ms+ ВЮђ вХђВА▒ 2ьћёваѕВъё ВЮ┤ВЃЂ) Рђћ Вћ╣ьъў В▓┤Ж░љ ВЃЂЖ┤ђВё▒ РєЉ
    if (gap > 30) {
      window._dbg.frameGapLog.push({ t: Math.round(nowFrame), gapMs: Math.round(gap) });
      if (window._dbg.frameGapLog.length > 20) window._dbg.frameGapLog.shift();
      try { console.log('%c[SLOW_FRAME] gap=' + Math.round(gap) + 'ms (main thread busy)', 'color:#ffcc44'); } catch(e){}
      // РўЁ ВДЂВаё 500ms вѓ┤ ВИАВаЋ ЖхгЖ░ё **ВЮ┤вдёв│ё В┤ЮьЋЕ** (ьўИВХю ьџЪВѕў/вѕёВаЂВІюЖ░ё) Рєњ в▓ћВЮИ ьі╣ВаЋ.
      //   вІеВЮ╝ ьЂ░ ьўИВХю (1в▓ѕ├Ќ30ms) вЈё ВъАЖ│а, ВъЉВЮђ ьўИВХю вѕёВаЂ (30в▓ѕ├Ќ1ms=30ms) вЈё ВъАВЮї.
      try {
        const cutoff = nowFrame - 500;
        const recent = window._dbg.perfEntries.filter(e => e.t >= cutoff);
        const agg = {};  // name Рєњ { totalMs, count, maxMs }
        for (const e of recent) {
          const a = agg[e.name] = agg[e.name] || { totalMs: 0, count: 0, maxMs: 0 };
          a.totalMs += e.durMs; a.count += 1;
          if (e.durMs > a.maxMs) a.maxMs = e.durMs;
        }
        const sorted = Object.entries(agg).sort((a, b) => b[1].totalMs - a[1].totalMs).slice(0, 6);
        if (sorted.length) {
          const summary = sorted.map(([n, a]) => n + '=' + a.totalMs.toFixed(1) + 'ms├Ќ' + a.count + '(max' + a.maxMs.toFixed(1) + ')').join(', ');
          console.log('%c[PROFILE] 500msьЋЕВѓ░: ' + summary, 'color:#ffcc44;font-weight:bold');
        }
      } catch(e){}
    }
  }
  window._dbg._lastFrameAt = nowFrame;
  // (ВІюЖ░Ђ ьё░В╣ў вДѕВ╗цвіћ ВЮ┤Ваю DOM div в░ЕВІЮ Рђћ ВюёВфй _showMarker ьЋеВѕўВЌљВёю В▓ўвдг)
  // в╣еЖ░ё DEBUG в░░ВДђ Рђћ ьЎћвЕ┤ ВбїВЃЂвІе (Ж░ђВъЦ вѕѕВЌљ вЮёЖ▓ї)
  ctx.fillStyle = '#e02020'; ctx.fillRect(4, 4, 72, 18);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('РЌЈ DEBUG', 4 + 36, 4 + 9);
  const panelW = Math.min(360, window.innerWidth * 0.7);
  const panelH = 360;
  const x = window.innerWidth - panelW - 6, y = 6;
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(x, y, panelW, panelH);
  ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5, y+0.5, panelW-1, panelH-1);
  ctx.font = '10px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  let ly = y + 6;
  ctx.fillStyle = '#0ff';
  const vcStatus = window._dbg._vcLoaded ? 'vConsole OK' : (window._dbg._vcError ? 'vConsole FAIL' : 'vConsole вАювћЕВцЉ');
  ctx.fillText('DEBUG Рђћ ' + vcStatus, x+6, ly); ly += 12;
  // ьЎўЖ▓й ьћївъўЖиИ
  ctx.fillStyle = '#ffcc44';
  ctx.fillText('host=' + location.hostname.slice(0, 32), x+6, ly); ly += 11;
  ctx.fillText('BUILD_TS=' + window.__BUILD_TS + '  isTestEnv=' + isTestEnv, x+6, ly); ly += 11;
  // ВЮ┤в▓цьіИ В╣┤Вџ┤ьё░ Рђћ Вћ╣ьъў ВДёвІе (PD/TS/TE вХѕВЮ╝В╣ў)
  const pd = window._dbg.pdCount || 0, ts = window._dbg.tsCount || 0, te = window._dbg.teCount || 0;
  const diff = pd - ts;
  ctx.fillStyle = Math.abs(diff) > 2 ? '#ff6666' : '#8f8';
  ctx.fillText('PD=' + pd + ' TS=' + ts + ' TE=' + te + '  (PD-TS=' + diff + ')', x+6, ly); ly += 11;
  // ьћёваѕВъё Ж░Г Рђћ вЕћВЮИ ВіцваѕвЊю вИћвАЮ В╣┤Вџ┤ьіИ (50ms+ RAF Ж░ёЖ▓Е)
  const slowFrames = window._dbg.frameGapLog.length;
  ctx.fillStyle = slowFrames > 0 ? '#ffaa33' : '#8f8';
  const lastSlow = window._dbg.frameGapLog[window._dbg.frameGapLog.length-1];
  ctx.fillText('slowFrames=' + slowFrames + (lastSlow ? ' (last=' + lastSlow.gapMs + 'ms)' : ''), x+6, ly); ly += 11;
  // РўЁ ВІцВІюЖ░ё В╣┤Вџ┤ьё░ Рђћ Вћ╣ьъў В▓┤ьЂгВџЕ. suspiciousMiss = ВхюЖи╝ 500ms ьЃГ ВъѕВЌѕвіћвЇ░ ВъљвЈЎ miss вљю вЁИьіИ.
  const am = window._dbg.autoMissCount || 0;
  const sm = window._dbg.suspiciousMissCount || 0;
  ctx.fillStyle = sm > 0 ? '#ff3366' : '#8f8';
  ctx.fillText('autoMiss=' + am + '  Вћ╣ьъўВЮўВІг=' + sm, x+6, ly); ly += 12;
  ctx.fillStyle = '#fff';
  // double hit counts
  const dh = window._dbg.doubleHitCount;
  const dhParts = Object.keys(dh).map(k => `L${k}:${dh[k]}`).join(' ');
  ctx.fillText('dblHit(<100ms): ' + (dhParts || 'Рђћ'), x+6, ly); ly += 12;
  // recent lane press log (last 8)
  ctx.fillStyle = '#ffd';
  ctx.fillText('recent lane press (gapMs):', x+6, ly); ly += 12;
  const log = window._dbg.lanePressLog.slice(-20).reverse();
  for (const e of log) {
    // 100ms в»ИвДї gap = вЇћвИћьъѕьіИ ВЮўВІг Рєњ в╣еЖ░ЏЖ▓ї
    if (e.gapMs > 0 && e.gapMs < 100) ctx.fillStyle = '#ff6666';
    else ctx.fillStyle = '#fff';
    ctx.fillText(`  L${e.lane}  +${e.gapMs}ms  ${e.src || '?'}`, x+6, ly); ly += 11;
  }
  ctx.fillStyle = '#fff';
  // load events (last 6)
  ctx.fillStyle = '#fcf';
  ctx.fillText('load events (t ms):', x+6, ly); ly += 12;
  const le = window._dbg.loadEvents.slice(-6);
  for (const e of le) {
    ctx.fillText(`  ${e.t}  ${e.label}`.slice(0, 48), x+6, ly); ly += 11;
  }
  ctx.restore();
}
function render() {
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, safeTop * dpr);
  ctx.save();
  ctx.translate(shakeX, shakeY);
  const song = curSong || songs[0];

  // BG Рђћ ВЋѕВаё ВўЂВЌГЖ╣їВДђ ьЎЋВъЦ (Kplay iframe Вюё/ВЋёвъў в╣ѕ Ж│хЖ░ё ВаюЖ▒░)
  const totalH = H + safeTop + safeBottom;
  const grad = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  grad.addColorStop(0, song.bg1); grad.addColorStop(1, song.bg2);
  ctx.fillStyle = grad; ctx.fillRect(-20, -safeTop - 20, W+40, totalH + 40);

  if (state==='login') { renderLogin(); ctx.restore(); return; }
  if (state==='title') { ctx.fillStyle='#020208'; ctx.fillRect(0, -safeTop, W, totalH); renderTitle(); if (settingsOpen) renderSettingsOverlay(); if (mailboxOpen) renderMailboxOverlay(); if (nicknameOverlay) renderNicknameOverlay(); ctx.restore(); return; }
  if (state==='select') { renderSelect(); if (unlockPopupOpen) renderUnlockPopup(); if (coinChargePopupOpen) renderCoinChargePopup(); if (settingsOpen) renderSettingsOverlay(); if (mailboxOpen) renderMailboxOverlay(); ctx.restore(); return; }
  if (state==='shop') { renderShop(); if (coinChargePopupOpen) renderCoinChargePopup(); if (settingsOpen) renderSettingsOverlay(); if (mailboxOpen) renderMailboxOverlay(); ctx.restore(); return; }
  if (state==='inventory') { renderInventory(); if (coinChargePopupOpen) renderCoinChargePopup(); if (settingsOpen) renderSettingsOverlay(); if (mailboxOpen) renderMailboxOverlay(); ctx.restore(); return; }
  if (state==='ranking') { renderRanking(); if (settingsOpen) renderSettingsOverlay(); if (mailboxOpen) renderMailboxOverlay(); ctx.restore(); return; }
  if (state==='achievement') { renderAchievement(); if (settingsOpen) renderSettingsOverlay(); if (mailboxOpen) renderMailboxOverlay(); ctx.restore(); return; }
  if (state==='result') { renderResult(); ctx.restore(); return; }

  // вАювћЕ ьЎћвЕ┤ Рђћ content-based ВѕўВДЂ ВцЉВЋЎ ВаЋваг (ьЋ┤ВЃЂвЈё/в╣ёВюе вїђВЮЉ)
  if (songLoading) {
    const _s = curSong || songs[0];
    const _sc = _s.color || '#fff';
    // в░░Ж▓й: Ж│А ЖиИвЮ╝вЇ░ВЮ┤ВЁў (ВЋѕВаё ВўЂВЌГ ьЈгьЋе) Рђћ [perf A] В║љВІю
    const _visH = H + safeTop + safeBottom;
    const _lbg1 = _s.bg1 || '#000', _lbg2 = _s.bg2 || '#111';
    const _bg = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
    _bg.addColorStop(0, _lbg1); _bg.addColorStop(1, _lbg2);
    ctx.fillStyle = _bg; ctx.fillRect(-20, -safeTop - 20, W+40, _visH + 40);
    // Вќ┤вЉљВџ┤ Вўцв▓ёваѕВЮ┤
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-20, -safeTop - 20, W+40, _visH + 40);

    // === ваѕВЮ┤ВЋёВЏЃ Ж│ёВѓ░ ===
    // Ж░ђвАю/ВёИвАю в╣ёВюеВЌљ вДъВХ░ В╗цв▓ё ьЂгЖИ░ ВА░ВаЋ
    // В╗цв▓ё в░ўЖ▓й: ьЈГЖ│╝ вєњВЮ┤ ВцЉ вЇћ ВъЉВЮђ ВХЋВЮў ~18%вЦ╝ ЖИ░ВцђВю╝вАю ьЂ┤въеьћё

    // вѓюВЮ┤вЈё + ВєЇвЈё

    rrFill(_bx, _by, _bw, _bh, _bh/2);
    const _prog = Math.min(1, songLoadProgress / songLoadTotal);
    if (_prog > 0) {

      rrFill(_bx, _by, _bw * _prog, _bh, _bh/2);
    }
    // ьЇ╝Вё╝ьіИ
    const _pctY = _by + _bh + _pctGap + _pctH/2;
    ctx.font = `${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(Math.round(_prog * 100) + '%', W/2, _pctY);
    ctx.restore(); return;
  }

  // === ьћёваѕВъё В║љВІю (вДц ьћёваѕВъё 1ьџївДї Ж│ёВѓ░) ===
  const _fNow = Date.now();
  const _fLaneW = getLaneW();
  const _fLaneStartX = getLaneStartX();
  const _fTotalLW = _fLaneW * laneCount;
  const _fHitY = getHitY();
  const _fHS = getHeightScale();
  // ВЮИЖ▓їВъё sz() precompute Рђћ ВаёВЌГ в│ђВѕўВЌљ ьЋавІ╣ (renderLanes/renderNotes вЊ▒ в│ёвЈё ьЋеВѕўВЌљВёювЈё ВаЉЖи╝)
  _s3=sz(3);_s5=sz(5);_s7=sz(7);_s8=sz(8);_s9=sz(9);_s10=sz(10);
  _s12=sz(12);_s14=sz(14);_s15=sz(15);_s20=sz(20);_s30=sz(30);
  _s40=sz(40);_s55=sz(55);_s60=sz(60);_s80=sz(80);_s90=sz(90);
  _noteW = _fLaneW - _s8;
  _noteHW = (_fLaneW - _s8) / 2;
  // вЁИьіИ ВёИвАю ЖИИВЮ┤: ваѕВЮИ ьЈГВЌљ в╣ёвАђ (8ьѓц ВёИвАювфевЊюВЌљВёю Ж│╝ьЋўЖ▓ї ЖИИВќ┤ВДђВДђ ВЋіЖ▓ї)
  _noteHH = Math.min(_s10, Math.round(_fLaneW * 0.14));
  _fLw = _fLaneW; _fLsx = _fLaneStartX; _fLaneEnd = _fLaneStartX + _fLaneW * laneCount;
  _fLaneMargin = isMobile ? _fLaneStartX : _fLaneW * 0.4;

  // Stars Рђћ [perf C] twinkle 100ms Ж░ёЖ▓ЕВю╝вАювДї Ж░▒ВІа (time-based, frame counter ВЋѕ Вћђ)
  try {
    const _twNow = performance.now();
    if (!_starTwinkleCache || _starTwinkleCache.length !== stars.length) {
      _starTwinkleCache = new Float32Array(stars.length);
      _starTwinkleLastUpdate = 0; // Ж░ЋВаю Ж░▒ВІа
    }
    if ((_twNow - _starTwinkleLastUpdate) >= 100) {
      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        _starTwinkleCache[i] = s.b * (0.3 + Math.sin(_fNow * 0.002 + s.x) * 0.2);
      }
      _starTwinkleLastUpdate = _twNow;
    }
    ctx.fillStyle = '#fff';
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      ctx.globalAlpha = _starTwinkleCache[i];
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.globalAlpha = 1;
  } catch(e) {
    // Fallback: ВЏљвъў Ж▓йвАю
    _perfLog('C', 'stars render ERROR, fallback: ' + e.message);
    for (const s of stars) {
      ctx.globalAlpha = s.b * (0.3 + Math.sin(_fNow*0.002+s.x)*0.2);
      ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.globalAlpha = 1;
  }

  // In-game ambient particles
  const lsx = _fLaneStartX, totalLW = _fTotalLW;
  const songCol = curSong ? curSong.color : '#fff';

  // (ьїљВаЋВёа в░Љ ВаёВ▓┤ ьЈГ В░еВйю ьїљ ВЮђ renderBackplate вАю ВЮ┤вЈЎ Рђћ ьїїьІ░ьЂ┤ ВюёВЌљ ЖиИвацВДђвЈёвАЮ.)
  // Spawn various types Рђћ ьЎћвЕ┤ ВаёВ▓┤ Ж│авБе вХёьЈг (ВЃЂ/ьЋў ЖиавЊ▒). cap: desktop 80, mobile 45.
  const _particleCap = isMobile ? 45 : 80;
  const _sideSpace = (lsx > sz(80)) || (W - lsx - totalLW > sz(80));
  for (let _sp = 0; _sp < 2 && gameParticles.length < _particleCap; _sp++) {
    const type = Math.random();
    if (type < 0.35) {
      // Streaks Рђћ ВюёвАю ВЈўВЋёВўгвд╝. ВѓгВЮ┤вЊю Ж│хЖ░ё вёЊВю╝вЕ┤ ВѓгВЮ┤вЊюВЌљ bias.
      const _sideRoll = _sideSpace ? Math.random() : 1;
      let _sx;
      if (_sideRoll < 0.55) {
        const side = Math.random() > 0.5;
        const _sideOffset = _s15 + Math.random() * Math.max(_s30, Math.min(W/3, lsx));
        _sx = side ? Math.max(sz(6), lsx - _sideOffset) : Math.min(W - sz(6), lsx + totalLW + _sideOffset);
      } else {
        _sx = Math.random() * W;
      }
      gameParticles.push({
        x: _sx, y: H * (0.3 + Math.random()*0.7),
        vx: (Math.random()-0.5)*0.8, vy: -(1.8 + Math.random()*2.8),
        size: 2 + Math.random()*3, life: 1, decay: 0.006 + Math.random()*0.005,
        color: songCol, kind: 'streak'
      });
    } else if (type < 0.575) {
      // Floating orbs (ВЃЂВі╣) Рђћ ьЎћвЕ┤ в░ћвІЦ ВаёВ▓┤ВЌљВёю ВюёвАю drift.
      gameParticles.push({
        x: Math.random()*W, y: H+_s10,
        vx: (Math.random()-0.5)*0.5, vy: -(0.18+Math.random()*0.45),
        size: 4+Math.random()*7, life: 1, decay: 0.0015 + Math.random()*0.0015,
        color: songCol, kind: 'orb'
      });
    } else if (type < 0.8) {
      // РўЁ Descending orbs (ьЋўЖ░Ћ) Рђћ ВЃЂвІеВЌљВёю ВЋёвъўвАю drift. ьЋўвІеЖ│╝ вЈЎВЮ╝ ВєЇвЈё/ьЂгЖИ░/ВѕўвфЁ.
      gameParticles.push({
        x: Math.random()*W, y: -_s5 + Math.random()*_s15,
        vx: (Math.random()-0.5)*0.5, vy: 0.18+Math.random()*0.45,
        size: 4+Math.random()*7, life: 1, decay: 0.0015 + Math.random()*0.0015,
        color: songCol, kind: 'orb'
      });
    } else {
      // Sparkle Рђћ ьЎћвЕ┤ ВаёВ▓┤ ьіИВюЎьЂ┤.
      gameParticles.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: 0, vy: 0,
        size: 1.2+Math.random()*1.8, life: 1, decay: 0.018+Math.random()*0.02,
        color: '#fff', kind: 'sparkle'
      });
    }
  }
  for (let i = gameParticles.length-1; i >= 0; i--) {
    const gp = gameParticles[i];
    gp.x += gp.vx; gp.y += gp.vy; gp.life -= gp.decay;
    if (gp.kind === 'orb') gp.vx += (Math.random()-0.5)*0.02;
    if (gp.kind === 'streak') gp.vy *= 0.995;
    if (gp.life <= 0 || gp.y < -_s20 || gp.y > H + _s20) { gameParticles.splice(i,1); continue; }
    if (gp.kind === 'sparkle') {
      const flicker = Math.sin(_fNow*0.02+i*7)*0.5+0.5;
      ctx.globalAlpha = gp.life * flicker * 0.7;
      ctx.fillStyle = gp.color;
      ctx.fillRect(gp.x-0.5, gp.y-0.5, gp.size, gp.size);
    } else {
      ctx.globalAlpha = gp.life * (gp.kind === 'streak' ? 0.5 : 0.3);
      if (!isMobile) { ctx.shadowColor = gp.color; ctx.shadowBlur = gp.kind === 'streak' ? 12 : 6; }
      ctx.fillStyle = gp.color;
      ctx.beginPath(); ctx.arc(gp.x, gp.y, gp.size*gp.life, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;

  // вћћв▓ёЖиИ: ЖхгЖ░ёв│ё ьЃђВЮ┤в░Ї (window._measure ВА┤Въг ВІю). ьћёвАювЇЋВЁў ВўЂьќЦ 0.
  if (window._measure) {
    _measure('renderBackplate', () => renderBackplate());
    _measure('renderLanes', () => renderLanes());
    _measure('renderNotes', () => renderNotes());
    _measure('renderBackplatePostNotes', () => renderBackplatePostNotes());
    _measure('renderHitLine', () => renderHitLine());
    _measure('renderBackplateBorder', () => renderBackplateBorder());
    _measure('renderButtons', () => renderButtons());
    _measure('renderCharacter', () => renderCharacter());
    _measure('renderParticles', () => renderParticles());
    _measure('renderBursts', () => renderBursts());
    _measure('renderHoldGlows', () => renderHoldGlows());
    _measure('renderJudgeLineDecos', () => renderJudgeLineDecos());
    _measure('renderJudgment', () => renderJudgment());
    _measure('renderUI', () => renderUI());
  } else {
    renderBackplate();
    renderLanes();
    renderNotes();
    renderBackplatePostNotes();
    renderHitLine();
    renderBackplateBorder();
    renderButtons();
    renderCharacter();
    renderParticles();
    renderBursts();
    renderHoldGlows();
    renderJudgeLineDecos();
    renderJudgment();
    renderUI();
  }

  // Fever overlay Рђћ safeTop/Bottom ьЈгьЋе ВаёВ▓┤ ьЎћвЕ┤
  if (fever) {
    const t = _fNow;
    const lw = _fLaneW, lsx = _fLaneStartX, tw = _fTotalLW;
    const _fvTop = -safeTop, _fvH = H + safeTop + safeBottom;

    if (!isMobile) {
      // Smooth golden aura along lane edges
      ctx.globalAlpha = 0.15;
      const leftGrd = ctx.createLinearGradient(lsx - _s40, 0, lsx + _s20, 0);
      leftGrd.addColorStop(0, 'transparent');
      leftGrd.addColorStop(0.5, `hsl(${(t*0.1)%360},100%,60%)`);
      leftGrd.addColorStop(1, 'transparent');
      ctx.fillStyle = leftGrd; ctx.fillRect(lsx - _s40, _fvTop, _s60, _fvH);
      const rightGrd = ctx.createLinearGradient(lsx + tw - _s20, 0, lsx + tw + _s40, 0);
      rightGrd.addColorStop(0, 'transparent');
      rightGrd.addColorStop(0.5, `hsl(${(t*0.1+180)%360},100%,60%)`);
      rightGrd.addColorStop(1, 'transparent');
      ctx.fillStyle = rightGrd; ctx.fillRect(lsx + tw - _s20, _fvTop, _s60, _fvH);
      ctx.globalAlpha = 1;
    }

    // Smooth color-shifting lane tint
    ctx.globalAlpha = isMobile ? 0.04 : 0.06;
    ctx.fillStyle = `hsl(${(t*0.08)%360},100%,55%)`;
    ctx.fillRect(lsx, _fvTop, tw, _fvH);
    ctx.globalAlpha = 1;

    if (!isMobile) {
    // Rising light streaks inside lanes
    for (let i = 0; i < laneCount; i++) {
      const phase = (t * 0.001 + i * 1.3) % 1;
      const sy = _fvH * (1 - phase) + _fvTop;
      const sx = lsx + i * lw + lw / 2;
      const streakAlpha = Math.sin(phase * Math.PI) * 0.12;
      ctx.globalAlpha = streakAlpha;
      const sg = ctx.createLinearGradient(0, sy - _s40, 0, sy + _s40);
      sg.addColorStop(0, 'transparent');
      sg.addColorStop(0.5, LANE_COLORS[i]);
      sg.addColorStop(1, 'transparent');
      ctx.fillStyle = sg;
      ctx.fillRect(sx - lw * 0.3, sy - _s40, lw * 0.6, _s80);
    }
    ctx.globalAlpha = 1;
    } // !isMobile rising streaks

    // Fever side fire particles
    for (const p of feverParticles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife) * 0.7;
      ctx.fillStyle = p.color;
      const s = p.size * (p.life / p.maxLife);
      ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
    }
    ctx.globalAlpha = 1;

    // FEVER text - smooth gradient, no flash
    ctx.save();
    const fs = sz(44);
    const bop = Math.sin(t*0.004) * _s3;
    const feverCY = _fHitY * 0.5;
    ctx.translate(lsx + tw/2, feverCY + bop);
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 4;
    ctx.strokeText('FEVER!', 0, 0);
    // Smooth shifting gradient fill
    const txtGrd = ctx.createLinearGradient(-_s60, 0, _s60, 0);
    const hue = (t * 0.06) % 360;
    txtGrd.addColorStop(0, `hsl(${hue},100%,65%)`);
    txtGrd.addColorStop(0.5, `hsl(${(hue+60)%360},100%,70%)`);
    txtGrd.addColorStop(1, `hsl(${(hue+120)%360},100%,65%)`);
    ctx.fillStyle = txtGrd;
    if (!isMobile) { ctx.shadowColor = `hsl(${hue},80%,40%)`; ctx.shadowBlur = 6; }
    ctx.fillText('FEVER!', 0, 0);
    ctx.shadowBlur = 0;
    // x2 badge
    ctx.font = `bold ${Math.floor(fs*0.4)}px sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.globalAlpha = 0.9;
    ctx.fillText('x2 SCORE', 0, fs + 2);
    ctx.restore();

    ctx.restore();
  }

  // Low gauge danger vignette Рђћ ВЋѕВаёВўЂВЌГ ьЈгьЋе ВаёВ▓┤ ьЎћвЕ┤
  if (gauge < 0.35 && playMode === 'normal') {
    const intensity = (0.35 - gauge) / 0.35;
    const pulse = 0.5 + Math.sin(_fNow * 0.006) * 0.5;
    const _vTotalH = H + safeTop + safeBottom;
    const vg = ctx.createRadialGradient(W/2, H/2, _vTotalH*0.2, W/2, H/2, _vTotalH*0.75);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, `rgba(255,0,0,${intensity * 0.25 * pulse})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, -safeTop, W, _vTotalH);
  }

  // Countdown (onset вфевЊюВЌљВёювіћ ВѕеЖ╣ђ Рђћ ваѕВЮ╝ ВёаВю╝вАю вїђВ▓┤)
  if (countdownTime > 0 && !(curSong && curSong._onsetMode)) {
    const num = Math.ceil(countdownTime);
    if (num <= 3) {
      const frac = countdownTime % 1, scale = 1+frac*0.4;
      ctx.save(); ctx.translate(W/2, H*0.4); ctx.scale(scale,scale);
      ctx.globalAlpha = Math.min(1,frac*2);
      ctx.font = `bold ${sz(90)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; if (!isMobile) { ctx.shadowColor=song.color; ctx.shadowBlur=10; }
      ctx.fillText(''+num, 0, 0);
      ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }
  }
  ctx.restore();
}

// ===== BACKPLATE (ЖИ░ЖИ░ьїљ) =====
//   Вбї/Вџ░ ВѕўВДЂ ваѕВЮ╝ + ьЋўвІе вЇ▒ВЮё ЖиИвац ВЋёВ╝ђВЮ┤вЊю вдгвЊгЖ▓їВъё віљвѓїВЮў в│ИВ▓┤ ьћёваѕВъёВЮё ьўЋВё▒.
//   Вбї ваѕВЮ╝ ВЋѕВЌљ HP в░ћЖ░ђ в░Ћьўђ "ьЋўвѓўВЮў ЖИ░ЖИ░"вАю в│┤ВЮ┤вЈёвАЮ ВёцЖ│ё (HP в░ћ BG віћ renderUI ВЌљВёю ВќЄЖ▓ї В▓ўвдг).
//   Віцьѓе ьЎЋВъЦ: SKINS[id] ВЌљ backplate: { imagePaths:{panel:...}, slice:{t,r,b,l}, palette:{...} } ВХћЖ░ђ ВўѕВаЋ.
// РўЁ UI ьїЕ Рђћ ьЋўвѓўВЮў ВЃЂьњѕВЮ┤ HP в░ћ/в░░ВєЇ/ВіцВйћВќ┤/Вйцв│┤/ьЃГ в▓ёьі╝ palette ВаёВ▓┤ вЇ«Вќ┤Вћђ.
//   nothing equipped: null в░ўьЎў Рєњ ЖИ░ВА┤ ЖИ░в│И ьїћваѕьіИ ВюаВДђ.
function _getUiPack() {
  const sid = getEquippedSkin('ui_pack');
  if (!sid) return null;
  const s = SKINS[sid];
  return s && s.palette ? s.palette : null;
}
// РўЁ UI ьїЕ ВаёВ▓┤ Віцьѓе Ж░ЮВ▓┤ в░ўьЎў Рђћ imagePaths ВаЉЖи╝ВџЕ (PNG Вўцв▓ёвЮ╝ВЮ┤вЊю В▓┤ьЂг)
function _getUiPackSkin() {
  const sid = getEquippedSkin('ui_pack');
  if (!sid) return null;
  return SKINS[sid] || null;
}
// РўЁ key.png в▓аВЮ┤ВіцвЦ╝ LANE_COLORS в│ё hue-rotate tint ьЋ┤Вёю В║љВІю
const _tintedKeyCache = {};
function _hexToHueAngle(hex) {
  if (!hex || hex.length < 7) return 340;
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const mx = Math.max(r,g,b), mn = Math.min(r,g,b), df = mx - mn;
  let h = 0;
  if (df < 1e-6) return 0;
  if (mx === r) h = (((g-b)/df) % 6) * 60;
  else if (mx === g) h = (((b-r)/df) + 2) * 60;
  else h = (((r-g)/df) + 4) * 60;
  if (h < 0) h += 360;
  return h;
}
// в▓аВЮ┤Віц PNG ВЮў opaque bbox ВИАВаЋ Рђћ ьѕгвфЁ ВЌгв░▒ crop ВџЕ
let _keyBaseBBox = null;
function _measureKeyBBox(base) {
  if (_keyBaseBBox) return _keyBaseBBox;
  try {
    const tcv = document.createElement('canvas');
    tcv.width = base.naturalWidth; tcv.height = base.naturalHeight;
    const tc = tcv.getContext('2d');
    tc.drawImage(base, 0, 0);
    const dat = tc.getImageData(0, 0, tcv.width, tcv.height).data;
    let x0=tcv.width, x1=0, y0=tcv.height, y1=0;
    for (let y=0; y<tcv.height; y+=4) {
      for (let x=0; x<tcv.width; x+=4) {
        if (dat[(y*tcv.width+x)*4+3] > 20) {
          if (x<x0) x0=x; if (x>x1) x1=x;
          if (y<y0) y0=y; if (y>y1) y1=y;
        }
      }
    }
    _keyBaseBBox = { x:x0, y:y0, w:x1-x0+1, h:y1-y0+1 };
  } catch(e) {
    _keyBaseBBox = { x:0, y:0, w:base.naturalWidth, h:base.naturalHeight };
  }
  return _keyBaseBBox;
}
function _getTintedKeyCanvas(colorHex) {
  if (_tintedKeyCache[colorHex]) return _tintedKeyCache[colorHex];
  const uiSkin = _getUiPackSkin();
  const basePath = uiSkin && uiSkin.imagePaths && uiSkin.imagePaths.keyBase;
  if (!basePath) return null;
  const base = skinImages[basePath];
  if (!base || !base.complete || !base.naturalWidth) return null;
  const bbox = _measureKeyBBox(base);
  // вІцВџ┤ВіцВ╝ђВЮ╝ + crop
  const targetH = 384;
  const targetW = Math.max(1, Math.round(targetH * (bbox.w / bbox.h)));
  const cv = document.createElement('canvas');
  cv.width = targetW; cv.height = targetH;
  const c = cv.getContext('2d');
  // в▓аВЮ┤Віц hue РЅѕ 340┬░ (вћЦ ВЎђВЮИ/ьЋЉьЂг). ьЃђЖ▓Ъ hue вАю ьџїВаё.
  const targetHue = _hexToHueAngle(colorHex);
  const baseHue = 340;
  const rotation = ((targetHue - baseHue) % 360 + 360) % 360;
  try {
    c.filter = `hue-rotate(${rotation}deg) saturate(1.15)`;
    c.drawImage(base, bbox.x, bbox.y, bbox.w, bbox.h, 0, 0, targetW, targetH);
    c.filter = 'none';
  } catch(e) {
    c.drawImage(base, bbox.x, bbox.y, bbox.w, bbox.h, 0, 0, targetW, targetH);
  }
  _tintedKeyCache[colorHex] = cv;
  return cv;
}
function _invalidateTintedKeyCache() {
  for (const k in _tintedKeyCache) delete _tintedKeyCache[k];
}
function _backplatePalette() {
  const sid = getEquippedSkin('backplate');
  const s = sid && SKINS[sid];
  if (s && s.palette) return s.palette;
  // ЖИ░в│И Віцьѓе Рђћ В░еВйю ьЁївЉљвдг + ВЮђВЮђьЋю вѓ┤вХђ ьїевёљ
  return {
    fill:      'rgba(14,18,28,0.22)',
    border:    'rgba(85,85,95,0.98)',   // вЮ╝ВЮ┤ьіИ В░еВйю Рђћ Вќ┤вЉљВџ┤ BG ВЌљВёювЈё вўљваиьЋўЖ▓ї
    highlight: 'rgba(255,255,255,0.12)',
    railInner: 'rgba(0,0,0,0.30)',
