<script>
// РўЁ в╣ївЊю ьЃђВъёВіцьЃгьћё Рђћ вДц index.html ВЌЁвЇ░ВЮ┤ьіИ ВІю ВъљвЈЎ ВдЮЖ░ђ. ВЌЁвЇ░ВЮ┤ьіИ Ж░љВДђВџЕ.
// diag: gamble revert + ВЌЁвЇ░ВЮ┤ьіИ Ж░љВДђ ВДёвІе Ж░ЋьЎћ (__BUILD_TS ВёаЖ│АьЎћвЕ┤ вЁИВХю)
window.__BUILD_TS = 20260424013100;
// РўЁ Firebase goOffline вХђВъЉВџЕ Рђћ ВЮИЖ▓їВъё ВДёВъЁ ВІю fbDb.goOffline() ьўИВХюьЋўвЕ┤ in-flight ВцЉВЮ┤вЇў
//   .set()/.once() Promise вЊцВЮ┤ "Error: disconnect" вАю reject. вфевЉљ fire-and-forget (Ж▓░Ж│╝ вг┤Ж┤ђ)
//   ВЮ┤вЮ╝ ВЮўвЈёвљю ьўёВЃЂВЮ┤ВДђвДї .catch ВЌєВЮ┤ ВЈўЖ│а ВъѕВќ┤ "Uncaught (in promise)" Ж▓йЖ│а ВіцьїИ в░юВЃЮ.
//   ВаёВЌГ handler вАю ВЮ┤ ьїеьё┤вДї swallow (вІцвЦИ ВДёВДю ВЌљвЪгвіћ ЖиИвїђвАю propagate).
window.addEventListener('unhandledrejection', (e) => {
  const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
  if (msg === 'disconnect' || msg.toLowerCase().includes('disconnect')) e.preventDefault();
});
// РўЁ Debug mode Рђћ 3Ж░ђВДђ ьЎюВё▒ьЎћ Ж▓йвАю (kplay Въёв▓авЊюВЌљВёа URL ВѕўВаЋ вХѕЖ░ђвЮ╝ ВаюВіцВ▓ў ьЋёВѕў):
//   1) URL: ?debug=1
//   2) localStorage: rhythm_debug='1' (ьЋюв▓ѕ В╝ювЕ┤ ВўЂЖхг)
//   3) ьЃђВЮ┤ьІђ ьЎћвЕ┤ ВбїВЃЂвІе 80├Ќ80 ВўЂВЌГ 2В┤ѕ ВЮ┤вѓ┤ 7ьџї ьЃГ Рєњ ьєаЖИђ (вфев░ћВЮ╝/iframe)
//   ьЎюВё▒ьЎћ ВІю window._dbg ВёИьїЁ + vConsole(ВЏљЖ▓Е console) ВБ╝ВъЁ.
function _activateDebug() {
  if (window._dbg) return;
  window._dbg = {
    lastLanePressAt: {}, lanePressLog: [], doubleHitCount: {},
    loadEvents: [], notes: [],
    touchMarkers: [],
    frameGapLog: [],
    _lastFrameAt: 0,
    perfEntries: [],   // { name, durMs, t } Рђћ ВхюЖи╝ 3В┤ѕ. SLOW_FRAME ВІю вЇцьћёВџЕ.
  };
  // _measure: ЖхгЖ░ё ьЃђВЮ┤в░Ї ЖИ░вАЮ. Ж▓їВъё вАюВДЂ ВўЂьќЦ 0 (fn ьўИВХювДї timing Ж░љВїѕ).
  window._measure = function(name, fn) {
    if (!window._dbg) return fn();
    const s = performance.now();
    const r = fn();
    const d = performance.now() - s;
    if (d >= 0.3) {  // 0.3ms ВЮ┤ВЃЂ ЖИ░вАЮ (ВъЉВЮђ ЖхгЖ░ё ьЋЕВ│љВДђвЕ┤ ьЂ░ в╣ёВцЉ)
      window._dbg.perfEntries.push({ name, durMs: d, t: s });
      const cutoff = performance.now() - 3000;
      while (window._dbg.perfEntries.length && window._dbg.perfEntries[0].t < cutoff) {
        window._dbg.perfEntries.shift();
      }
    }
    return r;
  };
  // PerformanceObserver longtask Рђћ вЕћВЮИ ВіцваѕвЊю 50ms+ вИћвАЮ ВъљвЈЎ В║АВ│љ (script/rendering вХёвЦў).
  //   Safari віћ вХђвХё ВДђВЏљ. ВДђВЏљ ВЋѕ вљўвЕ┤ вг┤ВІю (try/catch).
  try {
    if (typeof PerformanceObserver !== 'undefined') {
      const po = new PerformanceObserver(list => {
        for (const entry of list.getEntries()) {
          if (entry.duration >= 50) {
            try { console.log('%c[LONGTASK] ' + entry.duration.toFixed(0) + 'ms name=' + (entry.name || '?'), 'color:#ff4488;font-weight:bold'); } catch(e){}
          }
        }
      });
      po.observe({ entryTypes: ['longtask'] });
      window._dbg._po = po;
    }
  } catch(e) {}
  window._dbgLog = function(label) {
    if (!window._dbg) return;
    _dbg.loadEvents.push({ t: Math.round(performance.now()), label });
    if (_dbg.loadEvents.length > 50) _dbg.loadEvents.shift();
  };
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js';
  s.onload = () => {
    try {
      window._vc = new window.VConsole();
      window._dbg._vcLoaded = true;
      // РўЁ API: setSwitchPosition(right_px, bottom_px). right=Вџ░ВИА edge, bottom=ВЋёвъў edge ЖИ░Вцђ.
      //   Вџ░ВИА ВцЉЖ░ё вєњВЮ┤: right=8, bottom=innerHeight*0.5. ваѕВЮИ ьЃГ ВўЂВЌГ(ьЋўвІе) ВЋѕ Ж░ђвд╝.
      try { window._vc.setSwitchPosition(8, Math.round(window.innerHeight * 0.5)); } catch(e){}
    } catch(e) { window._dbg._vcError = e.message; }
  };
  s.onerror = () => { if (window._dbg) window._dbg._vcError = 'vConsole ВіцьЂгвдйьіИ вАювЊю ВІцьїе (вёцьіИВЏїьЂг/CSP)'; };
  document.head.appendChild(s);
}
// РўЁ vConsole DOM вѓ┤вХђ ьЃГВЮђ Ж▓їВъё input ВЌљВёю вг┤ВІю Рђћ Ж▓їВъё Вфй ьЋИвЊцвЪгвЊцВЮ┤ Ж░ЂВъљ ВЮ┤ ьЌгьЇ╝вАю В▓┤ьЂг.
//   (stopPropagation ЖИѕВДђ: vConsole ВъљВ▓┤ ьЂ┤вдГ ьЋИвЊцвЪгЖ╣їВДђ вДЅВЋёв▓ёвац в▓ёьі╝ВЮ┤ ВЋѕ вѕївд╝.)
window._isVcEvent = function(e) {
  const t = e && e.target;
  if (!t || !t.closest) return false;
  return !!(t.closest('#__vconsole') || t.closest('.vc-switch') || t.closest('.vc-mask') || t.closest('.vc-panel'));
};
// РўЁ ВІюЖ░Ђ ьё░В╣ў вДѕВ╗ц Рђћ ВЮўВІг ВДђВаљ ВаёвХђ В╗цв▓ё.
//   (1) Ж│аВаЋ overlay container 1Ж░ю (#__touchdbg) ВхюВЃЂВюё body ВЌљ. stacking в│┤ВъЦ.
//   (2) ВЮ┤в▓цьіИвіћ window + document + canvas 3Ж││ ВаёвХђ listen Рђћ ьЋўвѓў вЊювАГвЈ╝вЈё вІцвЦИ Ж▓йвАю.
//   (3) _dbg Ж▓ђВѓг вїђВІа URL/localStorage ьћївъўЖиИ ВДЂВаЉ В▓┤ьЂг Рђћ ьЎюВё▒ьЎћ ьЃђВЮ┤в░Ї ваѕВЮ┤Віц ВаюЖ▒░.
//   (4) CSS transition вїђВІа rAF ВѕўвЈЎ ВЋавІѕвЕћВЮ┤ВЁў Рђћ iOS transition вХѕВЋѕВаЋ ьџїьћ╝.
//   (5) вДц вДѕВ╗ц ВЃЮВё▒ ВІю vConsole console.log Рђћ DOM ВІцьїеьЋ┤вЈё вАюЖиИвіћ вѓеВЮї.
(function(){
  function _dbgActive() {
    if (window._dbg) return true;
    try {
      if (new URLSearchParams(location.search).get('debug') === '1') return true;
      if (localStorage.getItem('rhythm_debug') === '1') return true;
    } catch(e) {}
    return false;
  }
  let container = null;
  function _ensureContainer() {
    if (container && document.body && document.body.contains(container)) return container;
    container = document.createElement('div');
    container.id = '__touchdbg';
    container.style.cssText =
      'position:fixed;left:0;top:0;right:0;bottom:0;' +
      'pointer-events:none;' +
      'z-index:2147483647;' +
      'overflow:visible;';
    (document.body || document.documentElement).appendChild(container);
    return container;
  }
  window._showMarker = function(x, y, src) {
    try {
      if (!_dbgActive()) return;
      _ensureContainer();
      const d = document.createElement('div');
      const isT = src === 'touch';
      const bg = isT ? 'rgba(0,255,100,0.55)' : 'rgba(80,150,255,0.55)';
      const border = isT ? '#00ff66' : '#3aa8ff';
      d.style.cssText =
        'position:absolute;' +
        'left:' + (x - 18) + 'px;top:' + (y - 18) + 'px;' +
        'width:36px;height:36px;border-radius:50%;' +
        'background:' + bg + ';border:2px solid ' + border + ';' +
        'box-shadow:0 0 4px ' + border + ';' +
        'opacity:1;transform:scale(1);will-change:opacity,transform;' +
        'transition:opacity 300ms linear, transform 300ms linear;';
      container.appendChild(d);
      // CSS transition ьіИвдгЖ▒░ Рђћ compositor thread ВЌљВёю В▓ўвдг (вЕћВЮИ ВіцваѕвЊю вХђьЋў 0).
      //   rAF tick вБеьћё ВѓГВаю: вДц ьћёваѕВъё JS вАю style ВЌЁвЇ░ВЮ┤ьіИьЋўвЇў Ж▓ЃВЮё вИївЮ╝Вџ░ВађЖ░ђ GPUвАю.
      requestAnimationFrame(() => {
        d.style.opacity = '0';
        d.style.transform = 'scale(1.3)';
      });
      setTimeout(() => { try { d.remove(); } catch(e){} }, 350);
      try { console.log('%c[MARK] ' + src + ' @(' + Math.round(x) + ',' + Math.round(y) + ')', 'color:' + border + ';font-weight:bold'); } catch(e){}
    } catch(e) {
      try { console.error('[MARK_ERR]', e && e.message); } catch(_){}
    }
  };
  function _fire(e, src) {
    if (window._isVcEvent && window._isVcEvent(e)) return;
    let x, y;
    if (src === 'touch') {
      const t = e.changedTouches && e.changedTouches[0];
      if (!t) return;
      x = t.clientX; y = t.clientY;
    } else {
      x = e.clientX; y = e.clientY;
    }
    window._showMarker(x, y, src);
  }
  function _attach(target) {
    if (!target || !target.addEventListener) return;
    try {
      target.addEventListener('touchstart', (e) => _fire(e, 'touch'), { passive: true, capture: true });
      target.addEventListener('pointerdown', (e) => _fire(e, 'pointer'), { capture: true });
    } catch(e) {}
  }
  // window 1Ж││ВЌљвДї attach Рђћ capture вІеЖ│ёВЌљВёю вфевЊа ВЮ┤в▓цьіИ catch вље.
  //   ВЮ┤Ваё: window+document+canvas 3ВцЉ Рєњ ВЮ┤в▓цьіИвІ╣ [MARK] 3в▓ѕ В░ЇьъѕЖ│а DOM 3Ж░ю ВЃЮВё▒ (вАюЖиИ ВіцьїИ + вХђьЋў).
  _attach(window);
})();
function _deactivateDebug() {
  window._dbg = null;
  try { if (window._vc) { window._vc.destroy(); window._vc = null; } } catch(e){}
  try { localStorage.removeItem('rhythm_debug'); } catch(e){}
}
// ВйўВєћ ьЌгьЇ╝ (desktop DevTools ВџЕ)
window.enableDebug  = function(){ try { localStorage.setItem('rhythm_debug','1'); } catch(e){} _activateDebug(); };
window.disableDebug = function(){ _deactivateDebug(); };
// В┤ѕЖИ░ьЎћ: URL param OR localStorage flag
(function(){
  try {
    const p = new URLSearchParams(location.search);
    let on = (p.get('debug') === '1');
    try { if (localStorage.getItem('rhythm_debug') === '1') on = true; } catch(e){}
    if (on) _activateDebug();
  } catch(e) {}
})();
// ьЃђВЮ┤ьІђ ВбїВЃЂвІе 7ьЃГ ВІюьЂгвд┐ ВаюВіцВ▓ў
(function(){
  const taps = [];
  function onTap(x, y) {
    if (x > 80 || y > 80) { taps.length = 0; return; }
    const now = performance.now();
    taps.push(now);
    while (taps.length && now - taps[0] > 2000) taps.shift();
    if (taps.length >= 7) {
      taps.length = 0;
      if (window._dbg) {
        _deactivateDebug();
        try { (window.showLoginToast || window.alert)('Debug OFF', '#ff6666'); } catch(e){}
      } else {
        try { localStorage.setItem('rhythm_debug','1'); } catch(e){}
        _activateDebug();
        try { (window.showLoginToast || window.alert)('Debug ON Рђћ vConsole вАювћЕ', '#44dd66'); } catch(e){}
      }
    }
  }
  // ВЮИЖ▓їВъё 'playing' ВЃЂьЃювДї ВаюВЎИ (вЁИьіИ ьЃГЖ│╝ Ж▓╣В╣ўвЕ┤ Вўцв░ю ВюёьЌў). вѓўвеИВДђ(title/login/select/...) ВаёвХђ ьЌѕВџЕ.
  const ALLOW_STATES = { title: 1, login: 1, select: 1, shop: 1, inventory: 1, ranking: 1, achievement: 1, result: 1 };
  function _dbgGestureOk() { return typeof state === 'undefined' || !!ALLOW_STATES[state]; }
  window.addEventListener('touchstart', (e) => {
    if (!_dbgGestureOk()) return;
    const t = e.changedTouches && e.changedTouches[0];
    if (t) onTap(t.clientX, t.clientY);
  }, { passive: true, capture: true });
  window.addEventListener('mousedown', (e) => {
    if (!_dbgGestureOk()) return;
    onTap(e.clientX, e.clientY);
  }, { capture: true });
})();
// РўЁ resumeAudio ьЃГвІ╣ Вўцв▓ёьЌцвЊю ВаюЖ▒░ Рђћ audioSession ВъгВёцВаЋ skip, applyBgmVol в│ђЖ▓йВІювДї
(function(){
  try {
    // В▓Ф вАювЊю ВІю URL ВЌљ _v ьЃђВъёВіцьЃгьћё вХђВЌг (iframe src ВъгВџћВ▓Г ВІю fresh Ж░ЋВаю)
    if (location.search.indexOf('_v=') === -1) {
      var sep = location.search ? '&' : '?';
      location.replace(location.pathname + location.search + sep + '_v=' + Date.now() + location.hash);
      return;
    }
    // ВБ╝ЖИ░ВаЂ ВЌЁвЇ░ВЮ┤ьіИ Ж░љВДђ Рђћ Вёюв▓ё ВхюВІа HTML ВЌљВёю __BUILD_TS ВХћВХю в╣ёЖхљ
    // РўЁ ВДёвІе: window.__lastUpdateCheck (ВЃЂьЃю/ВІюЖ░Ђ/Вёюв▓ёTS), window.__lastUpdateCheckErr (вДѕВДђвДЅ ВЌљвЪг)
    //   ВёаЖ│АьЎћвЕ┤ ЖхгВёЮВЌљ вЁИВХюьЋ┤Вёю ВюаВађЖ░ђ KPLAY ьЎўЖ▓йВЌљВёю fetch вЈЎВъЉ ВЌгвХђ ВДЂВаЉ ьЎЋВЮИ Ж░ђвіЦ.
    window.__lastUpdateCheck = null;
    window.__lastUpdateCheckErr = null;
    async function _checkUpdate(){
      if (document.hidden || window.__updateAvailable) return; // ВЮ┤в»И Ж░љВДђвљљВю╝вЕ┤ skip
      // РўЁ ВЮИЖ▓їВъё ВцЉВЌћ fetch/regex Ж░ђ main thread вХђвІ┤ Рєњ ьё░В╣ў dispatch ВДђВЌ░ ВЏљВЮИ.
      //   вфевІг ВъљВ▓┤Ж░ђ state !== 'playing' ВЌљВёювДї вюеЖ│а, transitionTo ВЌљВёю playing ВбЁвБї ВІю
      //   ВдЅВІю _checkUpdate() ьўИВХюьЋўв»ђвАю ВЮИЖ▓їВъё ВцЉ В▓┤ьЂгвіћ ВѕюВѕў вѓГв╣ё.
      if (typeof state !== 'undefined' && state === 'playing') return;
      try {
        // РўЁ В┐╝вдг ВўцВЌ╝ ВаюЖ▒░ Рђћ location.href ВЮђ _v=, __chk= вѕёВаЂ Ж░ђвіЦ. pathname ЖИ░в░ўВю╝вАю Ж╣евЂЌВЮ┤.
        //   CDN ВЮ┤ В┐╝вдг ЖИ░в░ў В║љВІю ьѓц ВЊ░вЕ┤ вДц ьўИВХювДѕвІц вІцвЦИ URL Рєњ В║љВІю miss Ж░ЋВаю.
        var u = location.pathname + '?v=' + Date.now();
        var r = await fetch(u, {cache:'no-store'});
        if (!r.ok) { window.__lastUpdateCheckErr = 'HTTP ' + r.status; return; }
        var txt = await r.text();
        var m = txt.match(/window\.__BUILD_TS\s*=\s*(\d+)/);
        if (m) {
          var srv = parseInt(m[1]);
          window.__lastUpdateCheck = { srv: srv, t: Date.now() };
          window.__lastUpdateCheckErr = null;
          if (srv > window.__BUILD_TS) {
            console.log('[update] detected:', srv, '>', window.__BUILD_TS);
            window.__updateAvailable = true;
          }
        } else {
          window.__lastUpdateCheckErr = 'NO_BUILD_TS (wrapper?)';
        }
      } catch(e) {
        window.__lastUpdateCheckErr = (e && e.message) ? e.message.slice(0,40) : 'FETCH_ERR';
        console.warn('[update] check failed:', e);
      }
    }
    // 5В┤ѕ ьЏё В▓Ф В▓┤ьЂг, ВЮ┤ьЏё 30В┤ѕвДѕвІц. visibilitychange ВЌљВёювЈё В▓┤ьЂг (в░▒ЖиИвЮ╝Вџ┤вЊю в│хЖиђ ВІю).
    // transitionTo ВЌљВёю playingРєњselect/title ВаёьЎў ВІю ВдЅВІю ьўИВХю (ВЮИЖ▓їВъё вѓўВўцВъљвДѕВъљ Ж░љВДђ).
    window._checkUpdate = _checkUpdate;
    setTimeout(_checkUpdate, 5000);
    setInterval(_checkUpdate, 30000);
    document.addEventListener('visibilitychange', function(){ if (!document.hidden) _checkUpdate(); });
  } catch(e) {}
})();
</script>

<script>

    apiKey: "AIzaSyD7sp4VrN_7qzlvZayt5CL0mMFxwfvqtmk",
    authDomain: "nanorhythm-9fd56.firebaseapp.com",
    databaseURL: "https://nanorhythm-9fd56-default-rtdb.firebaseio.com",
    projectId: "nanorhythm-9fd56",
    storageBucket: "nanorhythm-9fd56.firebasestorage.app",
    messagingSenderId: "1050500853035",
    appId: "1:1050500853035:web:ed3adf1e45effd6605696e"
  });
  const fbDb = firebase.database();
  // Firebase Auth ВаюЖ▒░вље (Kplay вАюЖиИВЮИВю╝вАю вїђВ▓┤)

  // ========== NETWORK RESILIENCE LAYER ==========
  // ВЋйьЋю вёцьіИВЏїьЂг/ВюаВІц/LTEРєћWiFi ВаёьЎў/вІеВаѕ вїђВЮЉ.
  const _QUEUE_MAX = 200;
  const _QUEUE_RETRY_MAX = 3;
  const _QUEUE_LS_KEY = '__netWriteQueue';
  function _loadQueueFromLS() {
    try { return JSON.parse(localStorage.getItem(_QUEUE_LS_KEY) || '[]'); } catch(e) { return []; }
  }
  function _saveQueueToLS(q) {
    try { localStorage.setItem(_QUEUE_LS_KEY, JSON.stringify(q.slice(-_QUEUE_MAX))); } catch(e) {}
  }
  window.__net = {
    online: typeof navigator !== 'undefined' ? navigator.onLine !== false : true,
    writeQueue: _loadQueueFromLS(),  // reload ВІю pending ВЊ░ЖИ░ в│хЖхг
    lastReconnectAt: 0,
    toastShown: {},
    _lastEffType: null,              // connection change ВІцВаю ьЃђВъЁ в│ђЖ▓йвДї в░ўВЮЉ
    _flushing: false,                // flush вЈЎВІю ВІцьќЅ в░ЕВДђ
  };
  function _enqueue(item) {
    item.tries = item.tries || 0;
    if (item.tries >= _QUEUE_RETRY_MAX) {
      console.warn('[NET] writeQueue drop (retry exhausted):', item.path);
      return;
    }
    window.__net.writeQueue.push(item);
    // ВЃЂьЋю В┤ѕЖ│╝ ВІю Вўцвъўвљю Ж▓Ѓ drop
    while (window.__net.writeQueue.length > _QUEUE_MAX) window.__net.writeQueue.shift();
    _saveQueueToLS(window.__net.writeQueue);
  }

  // Ж│хВџЕ Firebase ВЊ░ЖИ░ въўьЇ╝ Рђћ ВІцьїе/ВўцьћёвЮ╝ВЮИ/ьЃђВъёВЋёВЏЃ ВІю ьЂљВЌљ ВађВъЦ.
  //   ЖИ░ВА┤ fbDb.ref(path).set(val) / .update(obj) вїђВ▓┤ВџЕ. ЖИ░ВА┤ ВйћвЊю ВаљВДё вДѕВЮ┤ЖиИваѕВЮ┤ВЁў.
  window.fbSafeSet = function(path, value) {
    if (!fbDb) return Promise.resolve(false);
    if (!window.__net.online) {
      _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
      return Promise.resolve(false);
    }
    return new Promise(resolve => {
      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
        resolve(false);
      }, 8000);
      try {
        fbDb.ref(path).set(value).then(() => {
          if (done) return; done = true; clearTimeout(timeout); resolve(true);
        }).catch(() => {
          if (done) return; done = true; clearTimeout(timeout);
          _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
          resolve(false);
        });
      } catch(e) {
        if (!done) { done = true; clearTimeout(timeout); resolve(false); }
      }
    });
  };

  // Ж│хВџЕ Firebase ВЮйЖИ░ въўьЇ╝ Рђћ ьЃђВъёВЋёВЏЃ + fallback.
  window.fbSafeOnce = function(path, timeoutMs) {
    timeoutMs = timeoutMs || 6000;
    if (!fbDb) return Promise.resolve(null);
    return new Promise(resolve => {
      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        resolve(null);
      }, timeoutMs);
      try {
        fbDb.ref(path).once('value').then(snap => {
          if (done) return; done = true; clearTimeout(timeout);
          resolve(snap && snap.val ? snap.val() : null);
        }).catch(() => {
          if (done) return; done = true; clearTimeout(timeout);
          resolve(null);
        });
      } catch(e) {
        if (!done) { done = true; clearTimeout(timeout); resolve(null); }
      }
    });
  };

  // ВўцьћёвЮ╝ВЮИ ьЂљ flush Рђћ ВўевЮ╝ВЮИ в│хЖиђ ВІю ьўИВХю. вЈЎВІю ВІцьќЅ в░ЕВДђ + ВъгВІювЈё ВЃЂьЋю + LS в░▒ВЌЁ.
  window.__net._flushQueue = function() {
    if (window.__net._flushing) return;        // ВцЉв│х flush в░ЕВДђ
    if (!window.__net.online || !fbDb) return;
    if (window.__net.writeQueue.length === 0) return;
    window.__net._flushing = true;
    const q = window.__net.writeQueue.slice();
    window.__net.writeQueue.length = 0;
    _saveQueueToLS(window.__net.writeQueue);
    // Ж░ЎВЮђ path віћ ВхюВІа Ж▓ЃвДї
    const dedupe = new Map();
    for (const item of q) dedupe.set(item.path, item);
    const items = Array.from(dedupe.values());
    let remaining = items.length;
    if (remaining === 0) { window.__net._flushing = false; return; }
    for (const item of items) {
      try {
        if (item.op === 'set') {
          fbDb.ref(item.path).set(item.value).then(() => {
            if (--remaining <= 0) window.__net._flushing = false;
          }).catch(() => {
            item.tries = (item.tries || 0) + 1;
            _enqueue(item);   // ВЃЂьЋю В▓┤ьЂг ьЈгьЋе
            if (--remaining <= 0) window.__net._flushing = false;
          });
        } else {
          if (--remaining <= 0) window.__net._flushing = false;
        }
      } catch(e) {
        item.tries = (item.tries || 0) + 1;
        _enqueue(item);
        if (--remaining <= 0) window.__net._flushing = false;
      }
    }
    // ВЋѕВаёВъЦВ╣ў Рђћ 30В┤ѕ ьЏё вг┤ВА░Ж▒┤ flushing ьЋ┤Ваю
    setTimeout(() => { window.__net._flushing = false; }, 30000);
  };

  // ---- вёцьіИВЏїьЂг ВЃЂьЃю в│ђьЎћ Ж░љВДђ ----
  function _netToast(msg, color) {
    if (window.__net.toastShown[msg] && Date.now() - window.__net.toastShown[msg] < 3000) return;
    window.__net.toastShown[msg] = Date.now();
    try {
      if (typeof showLoginToast === 'function') showLoginToast(msg, color);
      else console.log('[NET]', msg);
    } catch(e) {}
  }
  function _onNetOnline() {
    const wasOnline = window.__net.online;
    window.__net.online = true;
    if (!wasOnline) {
      _netToast('вёцьіИВЏїьЂг в│хЖхгвље', '#44dd66');
      window.__net._flushQueue();
      _forceReconnectFirebase();
    }
  }
  function _onNetOffline() {
    window.__net.online = false;
    _netToast('вёцьіИВЏїьЂг ВЌ░Ж▓░ вЂіЖ╣ђ Рђћ ВДёьќЅ ВЃЂьЎЕВЮ┤ ВъљвЈЎ ВађВъЦвљЕвІѕвІц', '#ffaa33');
  }
  // Firebase socket ВъгВЌ░Ж▓░ Рђћ LTEРєћWiFi ВаёьЎў ВІю stuck ВЃЂьЃю в░ЕВДђ.
  //   goOfflineРєњgoOnline ьіИвдгЖ▒░ьЋўвЕ┤ ЖИ░ВА┤ ВєїВ╝Њ вЂіЖ│а ВЃѕ Ж▓йвАювАю ВъгВЌ░Ж▓░.
  function _forceReconnectFirebase() {
    const now = Date.now();
    if (now - window.__net.lastReconnectAt < 5000) return;  // 5В┤ѕ вѓ┤ ВцЉв│х в░ЕВДђ
    window.__net.lastReconnectAt = now;
    try { fbDb.goOffline(); setTimeout(() => { try { fbDb.goOnline(); } catch(e){} }, 200); } catch(e) {}
  }

  window.addEventListener('online', _onNetOnline);
  window.addEventListener('offline', _onNetOffline);

  // Connection API (Chromium) Рђћ effectiveType в│ђЖ▓й ВІю (WiFiРєћLTE ВаёьЎў) Firebase ВъгВЌ░Ж▓░.
  try {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn && conn.addEventListener) {
      window.__net._lastEffType = conn.effectiveType || null;
      conn.addEventListener('change', () => {
        const newType = conn.effectiveType || null;
        const prevType = window.__net._lastEffType;
        // ВІцВаю вёцьіИВЏїьЂг ВаёьЎў (LTEРєњWiFi вЊ▒) ВЮИВДђ Ж░ЎВЮђ ВбЁвЦў ВІаьўИ ВџћвЈЎВЮИВДђ ЖхгвХё.
        //   Ж░ЎВЮђ ьЃђВъЁВЮ┤вЕ┤ reconnect Віцьѓх (Ж│╝ьўИВХю в░ЕВДђ).
        if (newType === prevType) return;
        window.__net._lastEffType = newType;
        if (newType === 'slow-2g' || newType === '2g') {
          _netToast('ВЋйьЋю вёцьіИВЏїьЂг (' + newType + ') Рђћ вАювћЕ ВДђВЌ░ Ж░ђвіЦ', '#ffaa33');
        }
        if (window.__net.online) _forceReconnectFirebase();
      });
    }
  } catch(e) {}

  // visibilitychange Рђћ в░▒ЖиИвЮ╝Вџ┤вЊюВЌљВёю в│хЖиђ ВІю Firebase ВъгВЌ░Ж▓░ (iOS Safari ВєїВ╝Њ drop в╣ѕв▓ѕ).
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && window.__net.online) {
      _forceReconnectFirebase();
    }
  });

  // ВБ╝ЖИ░ВаЂ health check Рђћ 5вХёвДѕвІц ВєїВ╝Њ Вѓ┤ВЋёВъѕвіћВДђ Ж░ёвІе ping.
  setInterval(() => {
    if (!window.__net.online || !fbDb) return;
    try {
      fbDb.ref('.info/connected').once('value').then(snap => {
        if (!snap.val()) _forceReconnectFirebase();
      }).catch(() => _forceReconnectFirebase());
    } catch(e) {}
  }, 300000);

  // РўЁ ьјўВЮ┤ВДђ вАювЊю ВДЂьЏё LS ВЌљВёю в│хВЏљьЋю ьЂљЖ░ђ ВъѕВю╝вЕ┤ online ВЃЂьЃюВЌљВёю ВдЅВІю flush.
  //   ВЮ┤Ваё ВёИВЁўВЌљВёю ВўцьћёвЮ╝ВЮИ ВцЉ ВїЊВЮИ ВЊ░ЖИ░ Рєњ ВЃѕвАюЖ│аВ╣е вњц ВъљвЈЎ в│хВЏљ + ВаёВєА.
  if (window.__net.writeQueue.length > 0) {
    console.log('[NET] LS ВЌљВёю pending ВЊ░ЖИ░', window.__net.writeQueue.length, 'Ж▒┤ в│хВЏљ');
    if (window.__net.online) {
      setTimeout(() => window.__net._flushQueue(), 2000); // Firebase ВЌ░Ж▓░ ВЋѕВаЋ ьЏё
    }
  }

  // ---- Fetch въўьЇ╝ Рђћ ьЃђВъёВЋёВЏЃ + ВъгВІювЈё (exponential backoff) ----
  window.fetchSafe = async function(url, opts, config) {
    opts = opts || {};
    config = config || {};
    const maxRetries = config.retries != null ? config.retries : 3;
    const timeoutMs = config.timeout != null ? config.timeout : 15000;
    let attempt = 0;
    while (attempt <= maxRetries) {
      const ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      const t = setTimeout(() => { if (ctrl) ctrl.abort(); }, timeoutMs);
      try {
        const fetchOpts = ctrl ? { ...opts, signal: ctrl.signal } : opts;
        const res = await fetch(url, fetchOpts);
        clearTimeout(t);
        // 5xx / 408 timeout / 429 rate-limit ВЮђ в│хЖхг Ж░ђвіЦьЋю ВІцьїе Рєњ retry
        if (!res.ok && attempt < maxRetries && (res.status >= 500 || res.status === 408 || res.status === 429)) {
          throw new Error('retryable ' + res.status);
        }
        return res;
      } catch(e) {
        clearTimeout(t);
        if (attempt === maxRetries) throw e;
        await new Promise(r => setTimeout(r, 400 * Math.pow(2, attempt)));
        attempt++;
      }
    }
  };
</script>
<script>
'use strict';

// iOS Ж░љВДђ (resize() ВаёВЌљ ВаЋВЮўвљўВќ┤ВЋ╝ ьЋе Рђћ TDZ ВЌљвЪг в░ЕВДђ)
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isAndroid = /Android/i.test(navigator.userAgent);

// РўЁ Sprite pre-bake В║љВІю Рђћ resize()/setLaneMode() в│┤вІц ве╝Вађ В░ИВА░вља Вѕў ВъѕВќ┤ ВхюВЃЂвІе hoist.
//   const TDZ вАю strict mode ВЌљВёа typeof В▓┤ьЂгвЈё ReferenceError Рєњ ВіцьЂгвдйьіИ ВаёВ▓┤ ВцЉвІе Рєњ Ж▓ђВЮђ ьЎћвЕ┤.
const skinSpriteBakery = new Map();

// РўЁРўЁ ьЎћвЕ┤ вЁ╣ьЎћ ВўцвћћВўц В║АВ▓ў Рђћ вфевЊѕ ВхюВЃЂвІе ВёаВаю ВёцВаЋ (HTMLAudio ВЃЮВё▒ ВЮ┤Ваё) РўЁРўЁ
//   вгИВаю: titleBgm/rankingBgm/shopBgm/achievementBgm/clickSfx вЊ▒ВЮђ line 440~
//         ВЌљВёю `new Audio(...)` вАю ВдЅВІю ВЃЮВё▒вље. iOS віћ Audio ВЌўвдгве╝ьіИ В▓Ф ВЃЮВё▒/play ВІюВаљВЮў
//         ВўцвћћВўц ВёИВЁў В╣┤ьЁїЖ│авдгВЌљ в░ћВЮИвЊю Рєњ ЖиИ вњц initAudio() ВЌљВёю 'playback' ВёИьїЁьЋ┤вЈё
//         ВЮ┤в»И 'ambient' ВЌљ вгХВЮИ ВџћВєївЊцВЮђ ьЎћвЕ┤ вЁ╣ьЎћВЌљ Вєївдг ВЋѕ ВъАьъў.
//   ьЋ┤Ж▓░: ВЌгЖИ░Вёю ВёаВаювАю 'playback' Ж│аВаЋ Рєњ ВЮ┤ьЏё ВЃЮВё▒вљўвіћ вфевЊа Audio/actx Ж░ђ playback Ж│хВюа.
try { if (navigator.audioSession) navigator.audioSession.type = 'playback'; } catch(e) {}
// РўЁРўЁ Android ьЎћвЕ┤ вЁ╣ьЎћ Рђћ MediaSession вЊ▒вАЮ РўЁРўЁ
//   в»ИВёцВаЋ ВІю Chrome Android віћ ьЃГВЮё "в»ИвћћВќ┤ ВЋ▒"Вю╝вАю вХёвЦўьЋўВДђ ВЋіВЋё
//   low-latency audio path вАю вѓ┤в│┤вЃё Рєњ вѓ┤ВъЦ screen recorder Ж░ђ вѓ┤вХђ ВўцвћћВўц вф╗ ВъАВЮї.
//   metadata вЊ▒вАЮвДїВю╝вАю Chrome ВЮ┤ captureable media stream Вю╝вАю вЮ╝Вџ░ьїЁ.
try {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({ title: 'NANO RHYTHM', artist: '', album: '' });
    // action handler вЊ▒вАЮ = "ВІцВаю ВъгВЃЮ ВцЉВЮИ в»ИвћћВќ┤" ВІаьўИ. noop Вю╝вАю ВІюВіцьЁю UI віћ вг┤ваЦьЎћ.
    navigator.mediaSession.setActionHandler('play', () => {});
    navigator.mediaSession.setActionHandler('pause', () => {});
  }
} catch(e) {}

// ===== KPlay API (Ж│хВІЮ docs.kplay.games в▓ёВаё) =====
class KPlayAPI {
  constructor() {
    this.user = { userId: null, name: null, credits: 0 };
    this._pending = null;
    this._onUserInfo = null;
    this._onPurchaseResult = null;
    this._onScoreSubmitted = null;
    this._reqs = new Map();
    this._reqSeq = 0;
    this._storagePrefix = 'kplay:';
    this.storage = {
      getItem: (key) => this._storageGet(key),
      setItem: (key, value) => this._storageSet(key, value),
      removeItem: (key) => this._storageRemove(key),
      keys: () => this._storageKeys(),
    };
    window.addEventListener('message', (e) => {
      const { type, ...data } = e.data ?? {};
      if (!type) return;
      switch (type) {
        case 'user-info':
          this.user = { userId: data.userId, name: data.name, credits: data.credits ?? 0 };
          this._onUserInfo?.(this.user);
          if (data.userId) this._syncStorageFromServer();
          break;
        case 'purchase-result':
          if (data.success) this.user.credits = data.balance;
          this._onPurchaseResult?.(data);
          this._pending = null;
          break;
        case 'score-submitted':
          this._onScoreSubmitted?.(data);
          break;
        case 'storage-load-result':
        case 'storage-set-result':
        case 'storage-remove-result': {
          const req = this._reqs.get(data.requestId);
          if (!req) break;
          this._reqs.delete(data.requestId);
          data.success ? req.resolve(data) : req.reject(new Error(data.error || 'storage error'));
          break;
        }
      }
    });
  }
  _request(type, payload) {
    const requestId = `r${++this._reqSeq}`;
    return new Promise((resolve, reject) => {
      this._reqs.set(requestId, { resolve, reject });
      try { window.parent.postMessage({ type, requestId, ...payload }, '*'); } catch(e) {}
      setTimeout(() => {
        if (this._reqs.has(requestId)) { this._reqs.delete(requestId); reject(new Error('timeout')); }
      }, 10000);
    });
  }
  _lsKey(key) { return this._storagePrefix + key; }
  async _storageGet(key) { try { return localStorage.getItem(this._lsKey(key)); } catch(e) { return null; } }
  async _storageSet(key, value) {
    try { localStorage.setItem(this._lsKey(key), String(value)); } catch(e) {}
    if (!this.user.userId) return;
    try { await this._request('storage-set', { key, value: String(value) }); }
    catch (e) { console.warn('[kplay] cloud save failed, kept local:', e.message); }
  }
  async _storageRemove(key) {
    try { localStorage.removeItem(this._lsKey(key)); } catch(e) {}
    if (!this.user.userId) return;
    try { await this._request('storage-remove', { key }); } catch {}
  }
  async _storageKeys() {
    const keys = []; const prefix = this._storagePrefix;
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k.slice(prefix.length));
      }
    } catch(e) {}
    return keys;
  }
  async _syncStorageFromServer() {
    try {
      const res = await this._request('storage-load', {});
      const data = res.data || {};
      for (const [k, v] of Object.entries(data)) {
        try { localStorage.setItem(this._lsKey(k), v); } catch(e) {}
      }
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith(this._storagePrefix)) continue;
        const key = k.slice(this._storagePrefix.length);
        if (!(key in data)) {
          const value = localStorage.getItem(k);
          if (value != null) this._request('storage-set', { key, value }).catch(() => {});
        }
      }
    } catch (e) { console.warn('[kplay] storage sync failed:', e.message); }
  }
  purchase(itemId, itemName, price) {
    if (this._pending) return;
    if (!this.user.userId) { this.requestLogin(); return; }
    if (this.user.credits < price) { this.openCreditShop(); return; }
    this._pending = { itemId, itemName, price };
    try { window.parent.postMessage({ type: 'purchase-item', itemId, itemName, price }, '*'); } catch(e) {}
  }
  submitScore(score) { try { window.parent.postMessage({ type: 'submit-score', score }, '*'); } catch(e) {} }
  openCreditShop() { try { window.parent.postMessage({ type: 'credit-shop' }, '*'); } catch(e) {} }
  showLeaderboard() { try { window.parent.postMessage({ type: 'show-leaderboard' }, '*'); } catch(e) {} }
  log(eventType, metadata) { try { window.parent.postMessage({ type: 'analytics-event', eventType, metadata }, '*'); } catch(e) {} }
  requestLogin() { try { window.parent.postMessage({ type: 'login-required' }, '*'); } catch(e) {} }
  on(event, callback) {
    if (event === 'userInfo') this._onUserInfo = callback;
    if (event === 'purchaseResult') this._onPurchaseResult = callback;
    if (event === 'scoreSubmitted') this._onScoreSubmitted = callback;
    return this;
  }
}
window.kplay = new KPlayAPI();

// ===== Storage wrapper (localStorage sync + kplay.storage mirror) =====
function _kpHas() { return !!(window.kplay && window.kplay.storage); }
function safeGetItem(key) {
  try { return window.localStorage.getItem(key); } catch(e) { return null; }
}
function safeSetItem(key, val) {
  try { window.localStorage.setItem(key, val); } catch(e) {}
  if (_kpHas()) { try { window.kplay.storage.setItem(key, val); } catch(e) {} }
}
function safeRemoveItem(key) {
  try { window.localStorage.removeItem(key); } catch(e) {}
  if (_kpHas()) { try { window.kplay.storage.removeItem(key); } catch(e) {} }
}

// в░▒ЖиИвЮ╝Вџ┤вЊю вЈЎЖИ░ьЎћ: kplay.storage Рєњ localStorage (ЖИ░ЖИ░ ВаёьЎў ВІю ьЂ┤вЮ╝Вџ░вЊю вЇ░ВЮ┤ьё░ в│хВЏљ)
// ВБ╝Вџћ ьѓцвЊцВЮё ВѕюВ░е вАювЊю. вАювЊю ьЏё Storage ВЮ┤в▓цьіИвАю ВЋївдгВДђ ВЋіЖ│а вІцВЮї Ж│А/ВёИВЁўВЌљ в░ўВўЂвље.

function updateTitleBgmFade() {
  if (!titleBgmPlaying || titleBgm.paused) return;
  const dur = titleBgm.duration;
  if (!dur || isNaN(dur) || dur <= 0) return;  // metadata ВЋёВДЂ ВЋѕ Вў┤
  const ct = titleBgm.currentTime;
  const maxVol = getTitleBgmMaxVol();
  if (ct >= dur - TITLE_BGM_FADE_OUT) {
    const remain = Math.max(0, dur - ct);
    titleBgm.volume = maxVol * (remain / TITLE_BGM_FADE_OUT);
  } else {
    titleBgm.volume = maxVol;
  }
}

  try {

        if (n.hit || n.missed) continue;
        if (n.lane === lane && n.stem != null) {
          targetStems = [n.stem];
          targetOffset = Math.max(0, n.time - delay); // вЁИьіИВЮў ВІцВаю ВўцвћћВўц ВюёВ╣ў
          break;
        }
      }
      if (targetStems.length === 0) {
        for (const n of nodes) {
          if (!n.hit && !n.missed && n.stem != null) {
            targetStems = [n.stem];
            targetOffset = Math.max(0, n.time - delay);
            break;
          }
        }
      }
    }
    if (targetStems.length === 0) {
      // fallback: ваѕВЮИ вДцьЋЉ ВѓгВџЕ
      const ls = getLaneStems();
      if (ls && ls[lane]) targetStems = ls[lane].filter(si => !ALWAYS_AUDIBLE_STEMS.includes(si));
    }
    targetStems.forEach(si => {
      const stemEnded = allStemAudios[si] ? allStemAudios[si].ended : true;
      if (countdownTime > 0 || stemEnded) {
        if (stemAudioBuffers[si] && actx) {
          const src = actx.createBufferSource();
          const gain = actx.createGain();
          src.buffer = stemAudioBuffers[si];
          gain.gain.setValueAtTime(peakVol, actx.currentTime);
          gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.5);
          src.connect(gain); gain.connect(actx.destination);
          const offset = targetOffset > 0 ? targetOffset : (stemFirstSoundTime[si] || 0);
          src.start(0, offset, 0.5);
        }
      } else {
        stemPulses[si] = { start: now, peak: peakVol, dur: 500 };
        if (allStemAudios[si]) allStemAudios[si].volume = peakVol;
      }
    });
  } else {
    const freq = EMPTY_TAP_FREQS[lane % EMPTY_TAP_FREQS.length];
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(peakVol * 0.25, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.12);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + 0.12);
  }
}

// ===== SONG LOCK / SHOP SYSTEM =====
const FREE_SONG_COUNT = 10; // ЖИ░в│И вг┤вБї Ж│А Вѕў
const UNLOCK_POINT_COST = 100; // ьЈгВЮИьіИвАю 1ьџї ьЋ┤ЖИѕ в╣ёВџЕ
const PASS_DURATION_MS = 28 * 24 * 60 * 60 * 1000; // 28ВЮ╝

function isSongLocked(idx) {
  if (idx < FREE_SONG_COUNT) return false;
  if (hasActivePass()) return false;
  if (getSongFreePlayCount(idx) > 0) return false;
  return true;
}
function hasActivePass() {
  const ts = parseInt(safeGetItem('rhythm_pass_' + (currentUser||'guest')) || '0');
  return ts > 0 && Date.now() < ts;
}
function hasEverPurchasedPass() {
  return safeGetItem('rhythm_passBought_' + (currentUser||'guest')) === '1';
}
function activatePass() {
  const expiry = Date.now() + PASS_DURATION_MS;
  safeSetItem('rhythm_pass_' + (currentUser||'guest'), '' + expiry);
  safeSetItem('rhythm_passBought_' + (currentUser||'guest'), '1');
  if (currentUser && fbDb) try {
    fbDb.ref('settings/' + currentUser + '/passExpiry').set(expiry);
    fbDb.ref('settings/' + currentUser + '/passBought').set(true);
  } catch(e) {}
}
function getPassExpiry() {
  return parseInt(safeGetItem('rhythm_pass_' + (currentUser||'guest')) || '0');
}
function loadPassFromFirebase() {
  if (!currentUser || !fbDb) return;
  fbDb.ref('settings/' + currentUser + '/passExpiry').once('value', snap => {
    const v = snap.val();
    if (v && v > Date.now()) safeSetItem('rhythm_pass_' + currentUser, '' + v);
  });
  fbDb.ref('settings/' + currentUser + '/passBought').once('value', snap => {
    if (snap.val()) safeSetItem('rhythm_passBought_' + currentUser, '1');
  });
}

// ===== Ж│ёВаЋ вЇ░ВЮ┤ьё░ Firebase вЈЎЖИ░ьЎћ (v16.2) =====
// вфевЊа ВѓгВџЕВъљ вЇ░ВЮ┤ьё░вЦ╝ settings/{user}/ Ж▓йвАювАю sync.
// вАювЊю ВІю local Ж│╝ Firebase вЦ╝ **merge** (max/union) Рђћ ве╝Вађ ВЃЮВё▒вљю ВЏљв│И вЇ░ВЮ┤ьё░ в│┤ВА┤.
// ВХЕвЈї ВІю: ВйћВЮИ/free plays віћ max, ВЌЁВаЂ/Вџ░ьјИьЋеВЮђ union (вЇ░ВЮ┤ьё░ ВєљВІц ВЌєВЮї).
// merge Ж▓░Ж│╝вЦ╝ Firebase + local ВќЉВфйВЌљ ВъгВађВъЦьЋ┤Вёю вфевЊа вИївЮ╝Вџ░ВађЖ░ђ Ж░ЎВЮђ ВЃЂьЃювАю Вѕўва┤.

function saveCoinsToFirebase(coins) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/coins').set(coins); } catch(e) {}
}
function loadCoinsFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/coins').once('value', snap => {
      const fbV = snap.val();
      const localV = parseInt(safeGetItem('rhythm_coins_' + currentUser) || '0', 10);
      const fbN = typeof fbV === 'number' ? fbV : 0;
      // max: вЇћ вДјВЮђ ВйћВЮИВЮ┤ Въѕвіћ ВфйВю╝вАю Вѕўва┤ (ВєљВІц ВЌєВЮї)
      const merged = Math.max(fbN, localV);
      if (merged !== localV) safeSetItem('rhythm_coins_' + currentUser, '' + merged);
      if (merged !== fbN) { try { fbDb.ref('settings/' + currentUser + '/coins').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function saveAchUnlockedToFirebase(map) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/achUnlocked').set(map); } catch(e) {}
}
function loadAchUnlockedFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/achUnlocked').once('value', snap => {
      const fbMap = snap.val() || {};
      let localMap = {};
      try { localMap = JSON.parse(safeGetItem('rhythm_ach_' + currentUser) || '{}'); } catch(e) {}
      // union: Вќ┤віљ ВфйВЮ┤вЊа ВќИвЮйвљю Ж▒┤ ьЋЕВ│љВДљ. Ж░ЎВЮђ ВЌЁВаЂВЮ┤вЕ┤ вЇћ Вўцвъўвљю at ВюаВДђ (ве╝Вађ ВќИвЮй Вџ░Вёа)
      const merged = {};
      const allKeys = new Set([...Object.keys(fbMap), ...Object.keys(localMap)]);
      for (const k of allKeys) {
        const f = fbMap[k], l = localMap[k];
        if (f && l) {
          const fAt = (f && f.at) || Infinity;
          const lAt = (l && l.at) || Infinity;
          merged[k] = fAt < lAt ? f : l;  // ве╝Вађ ВќИвЮйвљю Вфй
        } else {
          merged[k] = f || l;
        }
      }
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localMap);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbMap);
      if (localChanged) safeSetItem('rhythm_ach_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/achUnlocked').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function saveAchClaimedToFirebase(obj) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/achClaimed').set(obj); } catch(e) {}
}
function loadAchClaimedFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/achClaimed').once('value', snap => {
      const fbObj = snap.val() || {};
      let localObj = {};
      try { localObj = JSON.parse(safeGetItem('rhythm_claimed_' + currentUser) || '{}'); } catch(e) {}
      // union: Вќ┤віљ ВфйВЮ┤вЊа Вѕўва╣вљю Ж▒┤ ьЋЕВ│љВДљ (ВцЉв│х Вѕўва╣ в░ЕВДђ)
      const merged = { ...localObj, ...fbObj };
      for (const k in localObj) if (localObj[k]) merged[k] = true;
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localObj);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbObj);
      if (localChanged) safeSetItem('rhythm_claimed_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/achClaimed').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function saveMailboxToFirebase(arr) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/mailbox').set(arr || []); } catch(e) {}
}
function loadMailboxFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/mailbox').once('value', snap => {
      const fbArr = Array.isArray(snap.val()) ? snap.val() : [];
      let localArr = [];
      try { localArr = JSON.parse(safeGetItem('rhythm_mailbox_' + currentUser) || '[]'); } catch(e) {}
      // union by id: Вќ┤віљ ВфйВЌљвДї Въѕвіћ вЕћВЮ╝вЈё ьЋЕВ╣е. Ж░ЎВЮђ id вЕ┤ claimed=true Вџ░Вёа (ВцЉв│х в│┤ВЃЂ в░ЕВДђ)
      const map = new Map();
      for (const m of localArr) if (m && m.id != null) map.set(m.id, { ...m });
      for (const m of fbArr) {
        if (!m || m.id == null) continue;
        const cur = map.get(m.id);
        if (!cur) map.set(m.id, { ...m });
        else {
          // в│ЉьЋЕ: claimed віћ OR, вѓўвеИВДђвіћ ве╝Вађ ВЃЮВё▒вљю (ts вЇћ ВъЉВЮђ) Вфй Вџ░Вёа
          const mergedMail = (cur.ts || Infinity) <= (m.ts || Infinity) ? { ...cur } : { ...m };
          mergedMail.claimed = !!(cur.claimed || m.claimed);
          map.set(m.id, mergedMail);
        }
      }
      // 24h вДївБї ьЋёьё░
      const now = Date.now();
      const merged = Array.from(map.values()).filter(m => !m.ts || (now - m.ts) < MAIL_EXPIRY_MS);
      // ts вѓ┤вд╝В░еВѕю ВаЋваг (ЖИ░ВА┤Ж│╝ вЈЎВЮ╝: unshift ВѕюВёю)
      merged.sort((a, b) => (b.ts || 0) - (a.ts || 0));

function saveFreeplaysToFirebase(data) {
  if (!currentUser || !fbDb) return;

function loadFreeplaysFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/freeplays').once('value', snap => {
      const fbObj = snap.val() || {};
      let localObj = {};
      try { localObj = JSON.parse(safeGetItem('rhythm_freeplays_' + currentUser) || '{}'); } catch(e) {}
      // per-song max: Вќ┤віљ ВфйВЮ┤вЊа вЇћ вДјВЮђ ВъгВЃЮЖХїВЮ┤ ВъѕВю╝вЕ┤ ЖиИВфйВю╝вАю
      const merged = {};
      const allKeys = new Set([...Object.keys(fbObj), ...Object.keys(localObj)]);
      for (const k of allKeys) {
        merged[k] = Math.max(parseInt(fbObj[k] || 0, 10), parseInt(localObj[k] || 0, 10));
      }
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localObj);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbObj);
      if (localChanged) safeSetItem('rhythm_freeplays_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/freeplays').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

// ===== COVER IMAGE (LAZY LOAD + LRU) =====
// РўЁ Ж│А ВѕўВ▓ю Ж░ю ьЎЋВъЦ вїђв╣ё Рђћ ваївЇћ ВІюВаљВЌљвДї Image Ж░ЮВ▓┤ ВЃЮВё▒ + вЕћвфевдг ВЃЂьЋю (LRU eviction).
//   ЖИ░ВА┤: ВаёвХђ в»Ивдг new Image() Рєњ ВѕўВ▓ю вЈЎВІю fetch + ВѕўВ▓ю Image Ж░ЮВ▓┤ ВЃЂВБ╝ = вИївЮ╝Вџ░Вађ Ж│╝вХђьЋў.
//   в│ђЖ▓й: getCoverImage(idx) ьўИВХю ВІюВаљВЌљ lazy ВЃЮВё▒. LRU 150 Ж░ю В┤ѕЖ│╝ ВІю Вўцвъўвљю Ж▓ЃвХђьё░ ВаюЖ▒░.
const coverImages = {};
const _coverLRU = [];
const _COVER_CACHE_MAX = 150;
function getCoverImage(idx) {
  const s = songs[idx];
  if (!s || !s.cover) return null;
  let img = coverImages[idx];
  if (!img) {
    img = new Image();
    img._coverIdx = idx;
    // вёцьіИВЏїьЂг ВІцьїе ВІю online в│хЖиђ ВІю ВъгВІювЈё
    img.onerror = () => {
      if (window.__net && !window.__net['_coverRetry:' + idx]) {
        window.__net['_coverRetry:' + idx] = true;
        window.addEventListener('online', () => {
          try {
            const ni = new Image();
            ni.src = assetUrl(s.cover) + '&_r=' + Date.now();
            coverImages[idx] = ni;
          } catch(e) {}
        }, { once: true });
      }
    };
    img.src = assetUrl(s.cover);
    coverImages[idx] = img;
  }
  // LRU ВхюВІаьЎћ
  const lruIdx = _coverLRU.indexOf(idx);
  if (lruIdx >= 0) _coverLRU.splice(lruIdx, 1);
  _coverLRU.push(idx);
  while (_coverLRU.length > _COVER_CACHE_MAX) {
    const evicted = _coverLRU.shift();
    delete coverImages[evicted];
  }
  return img;
}

let songAudio = null;
let songPreviewAudio = null;
let usingStemMode = false;
let allStemAudios = [];  // 7 Audio elements for all stems
let stemSyncTime = 0;    // ВіцьЁю вЈЎЖИ░ьЎћ в│┤ВаЋ ьЃђВЮ┤веИ

function stopSongAudio() {
  // ABS ВаЋвдг
  if (window._absNodes) { for (const s of window._absNodes) { if (s) try { s.stop(); } catch(e){} } window._absNodes = null; }
  if (window._absGains) { for (const g of window._absGains) { if (g) try { g.disconnect(); } catch(e){} } window._absGains = null; }
  window._absStartCtx = null; window._absPausedAt = null;
  if (songAudio) { songAudio.pause(); songAudio.currentTime = 0; songAudio = null; }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) { allStemAudios[i].pause(); allStemAudios[i].currentTime = 0; }
  }
  allStemAudios = [];
  for (const a of pulseStemAudios) { if (a) { a.pause(); a.src = ''; } }
  pulseStemAudios = [];
  // iOS Blob URL ьЋ┤Ваю (вЕћвфевдг вѕёВѕў в░ЕВДђ)
  for (const k in stemBlobUrls) {
    try { URL.revokeObjectURL(stemBlobUrls[k]); } catch(e) {}
    delete stemBlobUrls[k];
  }
  usingStemMode = false;
  gamePaused = false;
}
function fadeOutSongAudio(duration) {
  const step = 0.05;
  const interval = (duration * 1000) / (1 / step);
  const targets = [];
  // ьўёВъг в│╝вЦе ВађВъЦ
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) targets.push(allStemAudios[i]);
  }
  if (songAudio) targets.push(songAudio);
  if (targets.length === 0) return;
  const fadeStep = () => {
    let allDone = true;
    for (const a of targets) {
      if (a.volume > 0.01) { a.volume = Math.max(0, a.volume - step); allDone = false; }
      else a.volume = 0;
    }
    if (!allDone) setTimeout(fadeStep, interval);
    else stopSongAudio();
  };
  fadeStep();
}
function stopSongPreview() {
  if (songPreviewAudio) {
    const a = songPreviewAudio;
    a._aborted = true;  // pending promise / setTimeout / event вѓ┤вХђВЌљВёю play ВъгьўИВХю В░евІе
    try { if (a._fallbackTimer) { clearTimeout(a._fallbackTimer); a._fallbackTimer = null; } } catch(e){}
    try { a.pause(); } catch(e){}
    try { a.currentTime = 0; } catch(e){}
    // РўЁ iOS ВЌљВёю pause ьЏёВЌљвЈё pending play promise Ж░ђ resolve вљўвЕ┤ ВъгВЃЮвљўвіћ в▓ёЖиИ.
    //   src в╣ёВџ░Ж│а load() ьЋўвЕ┤ decode pipeline ВаёвХђ halt Рєњ ьЎЋВІцьЋю ВаЋВДђ.
    try { a.removeAttribute('src'); a.load(); } catch(e){}
    songPreviewAudio = null;
  }
}

// ===== Віцьѓе ВЮИв▓цьєавдг/ВъЦв╣ё ВІюВіцьЁю =====
// В╣┤ьЁїЖ│авдгв│ё ВєїВюа/ВъЦВ░Е вЈЁвдй. ВъЦВ░Е ВЋѕ вљю В╣┤ьЁїЖ│авдгвіћ default (fallback canvas ваївЇћ).
// РўЁ ВЮИв▓цьєавдг ьЃГ Рђћ вЁИьіИ/ВЮ┤ьјЎьіИ/UIьїЕ 3Ж░ювАю Ж░ёЖ▓░ьЎћ (вѓўвеИВДђ В╣┤ьЁїЖ│авдгвіћ UI ьїЕВЌљ ьєхьЋЕ)
const SKIN_CATEGORIES = ['note','hit_effect','ui_pack'];
const SKIN_CATEGORY_LABELS = {
  note:'вЁИьіИ', hit_effect:'ВЮ┤ьјЎьіИ', ui_pack:'UI ьїЕ'
};
// В╣┤ьЁїЖ│авдгв│ё Віцьѓе В╣┤ьЃѕвАюЖиИ (ЖхгвДц Ж░ђвіЦьЋю Віцьѓе) Рђћ SKINS ваѕВДђВіцьіИвдгВЌљВёю ьїїВЃЮ
//   skin ВЮў category ьЋёвЊювАю Вќ┤віљ В╣┤ьЁїЖ│авдгВЌљ ВєЇьЋўвіћВДђ ВёаВќИ (ЖИ░в│И 'note')
function getSkinsForCategory(cat) {
  const out = [];
  for (const id in SKINS) {
    const s = SKINS[id];
    if (!s || id === 'default') continue;
    const c = s.category || 'note';
    if (c === cat) out.push({ id, skin: s });
  }
  return out;
}
function _invKey() { return 'rhythm_skinInv_' + (currentUser || '_guest'); }
function _eqKey() { return 'rhythm_skinEq_' + (currentUser || '_guest'); }
function _loadInv() { try { return JSON.parse(safeGetItem(_invKey()) || '{}'); } catch { return {}; } }
function _saveInv(x) {
  safeSetItem(_invKey(), JSON.stringify(x));
  if (currentUser && fbDb) {
    try { fbDb.ref('settings/' + currentUser + '/skinInv').set(x); } catch(e) {}
  }
}
function _loadEq() { try { return JSON.parse(safeGetItem(_eqKey()) || '{}'); } catch { return {}; } }
function _saveEq(x) {
  safeSetItem(_eqKey(), JSON.stringify(x));
  if (currentUser && fbDb) {
    try { fbDb.ref('settings/' + currentUser + '/skinEq').set(x); } catch(e) {}

  if (code === 'BracketRight') return ']';
  if (code === 'Backslash') return '\\';
  if (code === 'Comma') return ',';
  if (code === 'Period') return '.';
  if (code === 'Slash') return '/';

function startSpeedHold(dir) {
  if (_speedHoldDir === dir) return;
  _speedHoldDir = dir;
  _speedHoldStart = performance.now();

  _speedHoldDirty = false;

function stopSpeedHold() {
  if (_speedHoldDirty) saveDiffSpeed(); // release ВІю 1ьџївДї ВађВъЦ

function updateSpeedHold() {
  if (!_speedHoldDir) return;
  const now = performance.now();
  const elapsed = now - _speedHoldStart;
  // В▓Ф 300ms вїђЖИ░ ьЏё, 120ms Рєњ 40ms вАю Ж░ђВєЇ (800ms ВЌљ Ж▒ИВ│љ)
  let interval;
  if (elapsed < 300) interval = 300;
  else {
    const t = Math.min(1, (elapsed - 300) / 800);
    interval = 120 - (120 - 40) * t;
  }
  if (now - _speedHoldLastFire >= interval) {
    // hold ВцЉВЌћ ВађВъЦ ВЌєВЮ┤ Ж░њвДї в│ђЖ▓й (saveDiffSpeed Віцьѓх Рєњ localStorage/Firebase въўЖиИ в░ЕВДђ)
    if (_speedHoldDir > 0) {

    _speedHoldLastFire = now;
  }

// ===== LEVEL RATING =====
// вѓюВЮ┤вЈёв│ё ваѕв▓е в▓ћВюё:
//  ВЅгВЏђ 1~3, в│┤ьєх 4~7, Вќ┤вацВЏђ 8~10, ВДђВўЦ 11~15
const DIFF_LEVEL_RANGES = [
  [1, 3],   // ВЅгВЏђ
  [4, 7],   // в│┤ьєх
  [8, 10],  // Вќ┤вацВЏђ
  [11, 15], // ВДђВўЦ
];
// Ж│А в│ИВЌ░ВЮў вѓюВЮ┤вЈё raw score Ж│ёВѓ░ (вѓюВЮ┤вЈё/ьѓцВѕў вг┤Ж┤ђ)
function _songRawDifficulty(song) {
  const pat = song.pattern || [];
  const patHits = pat.filter(v => v).length;
  const patDensity = pat.length > 0 ? patHits / pat.length : 0.5;
  // ьїеьё┤ ьЂ┤вЪгВіцьё░вДЂ: ВЌ░ВєЇ вЁИьіИ Ж░юВѕў (в│хВъАвЈё Ж░ђВѓ░)
  let clusters = 0;
  for (let i = 0; i < pat.length; i++) {
    if (pat[i] && pat[(i+1) % pat.length] && pat[(i+2) % pat.length]) clusters++;
  }
  const clusterScore = pat.length > 0 ? clusters / pat.length : 0;
  // ЖИИВЮ┤(bars) Рђћ ЖИИВѕўвАЮ ВЋйЖ░ё Вќ┤вацВЏђ
  const lenScore = Math.min(1, (song.bars || 40) / 100);
  // BPM Ж░ђВцЉ (60~200)
  const bpmNorm = Math.max(0, Math.min(1, (song.bpm - 60) / 140));
  return bpmNorm * 0.45 + patDensity * 0.30 + clusterScore * 0.15 + lenScore * 0.10;
}
// вфевЊа Ж│А raw score В║љВІю + ВаЋвагвљю ВЮИвЇ▒Віц (ьЇ╝Вё╝ьЃђВЮ╝ вДцьЋЉВџЕ)
let _songLevelCache = null;
function _ensureSongLevelCache() {
  if (_songLevelCache && _songLevelCache.length === songs.length) return _songLevelCache;
  const arr = songs.map((s, i) => ({ idx: i, raw: _songRawDifficulty(s) }));
  arr.sort((a, b) => a.raw - b.raw);
  // Ж░Ђ Ж│АВЌљ percentile вХђВЌг (0~1)
  const map = new Array(songs.length);
  for (let r = 0; r < arr.length; r++) {
    map[arr[r].idx] = arr.length > 1 ? r / (arr.length - 1) : 0.5;
  }
  _songLevelCache = map;
  return map;
}
// Ж│А+вѓюВЮ┤вЈёв│ё ваѕв▓е: percentile + ьѓцВѕў в│┤ВаЋ Рєњ ьЋ┤вІ╣ вѓюВЮ┤вЈё в▓ћВюёВЌљ вДцьЋЉ
function calcLevel(songIdx, diffIdx) {
  const pct = _ensureSongLevelCache()[songIdx] != null ? _songLevelCache[songIdx] : 0.5;
  // ьѓц Вѕў в│┤ВаЋ: 4=-0.18, 5=-0.09, 6=0, 7=+0.09, 8=+0.18 Рђћ ьѓц Вѕў В░еВЮ┤вАю вфЁьЎЋьъѕ ваѕв▓е вХёвдг
  const laneAdj = (laneCount - 6) * 0.09;
  const score = Math.max(0, Math.min(1, pct + laneAdj));
  const [lo, hi] = DIFF_LEVEL_RANGES[diffIdx] || [1, 15];
  const lvl = Math.round(lo + score * (hi - lo));
  return Math.max(lo, Math.min(hi, lvl));
}

// window.name ЖИ░в░ў ВёИВЁў в░▒ВЌЁ (iOS Safari iframe localStorage eviction вїђВЮЉ)
// localStorage Ж░ђ ВдЮв░юьЋ┤вЈё window.name ВЮђ Ж░ЎВЮђ ьЃГ вѓ┤ вдгвАювЊю/вёцв╣ёЖ▓їВЮ┤ВЁў ВаёВ▓┤ persist
// Kplay ьЈгьёИВЮ┤ iframe name ВЮё ве╝Вађ ВёцВаЋьќѕВЮё Вѕў ВъѕВю╝в»ђвАю MARKER вњцВЌљ suffix вАювДї ВађВъЦ
const _NRH_MARKER = '##nrh:';
const _NRH_SESSION_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 30ВЮ╝ вДївБї
function _saveSessionBackup(user, method, fp) {
  try {
    if (!user || !method) return;
    const payload = JSON.stringify({ u: user, m: method, f: fp || '', t: Date.now() });
    const existing = window.name || '';
    const idx = existing.indexOf(_NRH_MARKER);
    const prefix = idx >= 0 ? existing.substring(0, idx) : existing;
    window.name = prefix + _NRH_MARKER + payload;
  } catch(e) {}
}
function _loadSessionBackup() {
  try {
    const wn = window.name || '';
    const idx = wn.indexOf(_NRH_MARKER);
    if (idx < 0) return null;
    const s = JSON.parse(wn.substring(idx + _NRH_MARKER.length));
    if (!s.u || !s.m) return null;
    // 30ВЮ╝ вДївБї
    if (s.t && (Date.now() - s.t) > _NRH_SESSION_TTL_MS) return null;
    return s;
  } catch(e) { return null; }
}
function _clearSessionBackup() {
  try {
    const wn = window.name || '';
    const idx = wn.indexOf(_NRH_MARKER);
    if (idx >= 0) window.name = wn.substring(0, idx);
  } catch(e) {}
}

(function _migrateGuestPurge() {
  try {

    if (safeGetItem(MIGRATION_KEY)) return; // ВЮ┤в»И ВІцьќЅвље

    const prevMethod = safeGetItem('rhythm_authMethod');

    if (wasGuest && prevUser) {

      try {

        let uid = null;

          }
        }
        if (uid) {

        }
        try { fbDb.ref('nicknames/' + prevUser).remove(); } catch(e) {}
        try { fbDb.ref('settings/' + prevUser).remove(); } catch(e) {}
        // scores ВЌљВёю ьЋ┤вІ╣ ВюаВађ ВаюЖ▒░ (async, fire-and-forget)
        try {
          fbDb.ref('scores').once('value', snap => {
            const scores = snap.val() || {};
            for (const k in scores) {
              if (scores[k] && scores[k][prevUser] != null) {

              }

  if (!name || name.length === 0) return '\uB2C9\uB124\uC784\uC744 \uC785\uB825\uD574\uC8FC\uC138\uC694.';
  if (name.length > 8) return '8\uAE00\uC790 \uC774\uD558\uB85C \uC785\uB825\uD574\uC8FC\uC138\uC694.';

function handleAuthSuccess(uid, method) {
  pendingAuthUid = uid;
  pendingAuthMethod = method;
  loginAuthPending = false;

  // Kplay: вАюВ╗г В║љВІювљю вІЅвёцВъё (ВЮ┤Ваё вАюЖиИВЮИ ВІю ВађВъЦ) ВъѕВю╝вЕ┤ ВдЅВІю ВаЉВєЇ
  const kplayNick = safeGetItem('rhythm_kplayNickname_' + uid);
  if (kplayNick) { completeLogin(kplayNick, 'kplay'); return; }

  // Firebase ВЌљВёю users/{uid}/nickname ВДЂВаЉ ВА░ьџї (O(1))
  // ьЃђВъёВЋёВЏЃ 3В┤ѕ: віљвд░ вёцьіИВЏїьЂг вїђВЮЉ
  let nickResolved = false;
  const nickTimeout = setTimeout(() => {
    if (!nickResolved) { nickResolved = true; showNicknameInput(); }
  }, 3000);
  try {
    fbDb.ref('users/' + uid + '/nickname').once('value', snap => {
      if (nickResolved) return;
      const nick = snap.val();
      if (nick && typeof nick === 'string') {
        nickResolved = true; clearTimeout(nickTimeout);
        safeSetItem('rhythm_kplayNickname_' + uid, nick);
        completeLogin(nick, 'kplay');
        return;
      }
      // users/{uid}/nickname ВЌљ ВЌєВю╝вЕ┤ legacy nicknames ВіцВ║ћ (ЖхгьўЋ вЇ░ВЮ┤ьё░ ьўИьЎў)
      fbDb.ref('nicknames').once('value', snap2 => {
        if (nickResolved) return;
        nickResolved = true; clearTimeout(nickTimeout);
        const all = snap2.val() || {};
        let found = '';
        for (const n in all) { if (all[n] === uid) { found = n; break; } }
        if (found) {
          safeSetItem('rhythm_kplayNickname_' + uid, found);
          completeLogin(found, 'kplay');
        } else {
          showNicknameInput();
        }
      });
    });
  } catch(e) {
    if (!nickResolved) { nickResolved = true; clearTimeout(nickTimeout); showNicknameInput(); }
  }
}

function _scoreKey(songIdx, diffIdx, lc) { return songIdx + '_' + diffIdx + '_' + lc; }
function _legacyKey(songIdx, diffIdx) { return songIdx + '_' + diffIdx; }
// Firebase ЖИђвАюв▓ї въГьѓ╣ В║љВІю: key(songIdx_diffIdx_lc) Рєњ { user: { score, ts } | number(legacy) }
let fbRankingsCache = {};
// вАюВ╗г ВаљВѕў ВЌћьіИвдг ьЋ┤ВёЮ: ВѕФВъљ(ваѕЖ▒░ВІю) вўљвіћ { score, ts } Ж░ЮВ▓┤
function _scoreValue(v) { return (v != null && typeof v === 'object') ? (v.score || 0) : (v || 0); }

function saveScore(songIdx, diffIdx, newScore, lc) {
  if (!currentUser) return;
  if (lc == null) lc = laneCount;
  const all = getAllScores();
  if (!all[currentUser]) all[currentUser] = {};
  const key = _scoreKey(songIdx, diffIdx, lc);
  const prevEntry = all[currentUser][key];
  const prev = _scoreValue(prevEntry);
  if (newScore > prev) {
    // В▓Ф ЖИ░вАЮ вўљвіћ Ж░▒ВІа
    const entry = { score: newScore, ts: Date.now() };
    all[currentUser][key] = entry;
    safeSetItem('rhythm_allScores', JSON.stringify(all));
    if (fbDb) {
      try { fbDb.ref('scores/' + key + '/' + currentUser).set(entry); } catch(e) {}
    }
    // Kplay Ж│хВІЮ вдгвЇћв│┤вЊю ВаюВХю (Вёюв▓ё Ж▓ђВдЮ + ВА░ВъЉ в░ЕВќ┤)
    if (window.kplay && window.kplay.user && window.kplay.user.userId) {
      try { window.kplay.submitScore(newScore); } catch(e) {}
    }
  }

// ьі╣ВаЋ keyВЮў Firebase въГьѓ╣ ВІцВІюЖ░ё ЖхгвЈЁ (въГьѓ╣ ьЎћвЕ┤ ВДёВъЁ ВІю ьўИВХю)
const _fbRankingSubs = {};
function subscribeFbRanking(songIdx, diffIdx, lc) {
  if (!fbDb) return;
  const key = _scoreKey(songIdx, diffIdx, lc);
  if (_fbRankingSubs[key]) return;
  _fbRankingSubs[key] = true;
  fbDb.ref('scores/' + key).on('value', snap => {
    fbRankingsCache[key] = snap.val() || {};
  }, () => {});
}
// РўЁ Ж▓їВъё ВІюВъЉ ВІю ВаёВ▓┤ въГьѓ╣ ЖхгвЈЁ ьЋ┤Ваю Рђћ ВЮИЖ▓їВъё ВцЉ вІцвЦИ ВюаВађ ВаљВѕў ВаюВХю вЋївДѕвІц
//   snapshot parse Ж░ђ вЕћВЮИ ВіцваѕвЊю Віцьєе Рєњ iOS Ж░ђ rapid touch вЊювАГьЋўвіћ ВЏљВЮИ ВХћВаЋ.
//   въГьѓ╣ ьЎћвЕ┤ ВъгВДёВъЁ ВІю subscribeFbRanking() вІцВІю ьўИВХювљўв»ђвАю ЖИ░віЦ ВўЂьќЦ ВЌєВЮї.
function unsubscribeAllFbRankings() {
  if (!fbDb) return;
  for (const key in _fbRankingSubs) {
    if (_fbRankingSubs[key]) {
      try { fbDb.ref('scores/' + key).off('value'); } catch(e) {}
      delete _fbRankingSubs[key];
    }
  }
}
function getMyBest(songIdx, diffIdx, lc) {
  if (!currentUser) return 0;
  if (lc == null) lc = laneCount;
  const all = getAllScores();
  if (!all[currentUser]) return 0;
  const key = _scoreKey(songIdx, diffIdx, lc);
  if (all[currentUser][key] != null) return _scoreValue(all[currentUser][key]);
  // ваѕЖ▒░ВІю ьЈ┤в░▒: 4KВЌљВёювДї ВЮ┤Ваё ьѓц ВѓгВџЕ
  if (lc === 4 && all[currentUser][_legacyKey(songIdx, diffIdx)] != null) {
    return _scoreValue(all[currentUser][_legacyKey(songIdx, diffIdx)]);
  }
  return 0;
}
function getRankings(songIdx, diffIdx, lc) {
  if (lc == null) lc = laneCount;
  const key = _scoreKey(songIdx, diffIdx, lc);
  const legacyKey = _legacyKey(songIdx, diffIdx);
  // ВБ╝Ж░ё вдгВЁІ: вДцВБ╝ ВЏћВџћВЮ╝ KST 00:00 ВЮ┤ьЏё ЖИ░вАЮвДї въГьѓ╣ВЌљ в░ўВўЂ
  const curWeekStart = getWeekStartKST(Date.now());
  // Firebase ЖИђвАюв▓ї + вАюВ╗г в│ЉьЋЕ (Вхювїђ ВаљВѕў, вЈЎвЦа ВІю вЇћ ВЮ┤вЦИ ts Вџ░Вёа)
  const merged = {}; // user Рєњ { score, ts }
  function _merge(user, sc, ts) {
    if (!sc || sc <= 0) return;
    if (!ts || ts < curWeekStart) return; // ВЮ┤в▓ѕ ВБ╝ ЖИ░вАЮвДї
    const cur = merged[user];
    if (!cur || sc > cur.score) {
      merged[user] = { score: sc, ts: ts || 0 };
    } else if (sc === cur.score && ts && (!cur.ts || ts < cur.ts)) {
      merged[user] = { score: sc, ts: ts };
    }
  }
  // 1) Firebase ЖИђвАюв▓ї въГьѓ╣
  const fbData = fbRankingsCache[key] || {};
  for (const user in fbData) {
    _merge(user, _scoreValue(fbData[user]), _scoreTs(fbData[user]));
  }
  // 2) вАюВ╗г ВаљВѕўвЈё в│ЉьЋЕ (ВўцьћёвЮ╝ВЮИ ЖИ░вАЮ в│┤ВъЦ)
  const all = getAllScores();
  for (const user in all) {
    let v = all[user][key];
    if (v == null && lc === 4) v = all[user][legacyKey];
    _merge(user, _scoreValue(v), _scoreTs(v));
  }
  const list = [];
  for (const user in merged) list.push({ name: user, score: merged[user].score, ts: merged[user].ts });
  // ВаљВѕў вѓ┤вд╝В░еВѕю Рєњ вЈЎвЦа ВІю ве╝Вађ вЊ▒вАЮ(ts ВъЉВЮђ Вѕю)ВЮ┤ ВЃЂВюё
  list.sort((a, b) => b.score - a.score || (a.ts || 0) - (b.ts || 0));
  // ВЃЂВюё 100вфЁвДї
  return list.slice(0, 100);
}

function addMail(mail) {

function getWeekStartKST(ms) {
  const KST_OFFSET = 9 * 60 * 60 * 1000;
  const d = new Date(ms + KST_OFFSET);
  const dow = d.getUTCDay(); // 0=Sun
  const daysFromMon = (dow + 6) % 7;
  const midnightKst = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()) - KST_OFFSET;
  return midnightKst - daysFromMon * 24 * 60 * 60 * 1000;
}
function checkWeeklyRewards() {

      const rawCM = snapCM.val();

      const merged = Array.from(new Set([...getClaimedMailIds(), ...fbClaimed.filter(x => typeof x === 'string')]));
      safeSetItem(_claimedIdsKey(), JSON.stringify(merged));
      _runWeeklyScoresCheck(prevWeekStart, prevWeekEnd);
    }).catch(() => {});
  } catch(e) {}
}
function _runWeeklyScoresCheck(prevWeekStart, prevWeekEnd) {
  const now = Date.now();
  const curWeek = getWeekStartKST(now);
  try {
    fbDb.ref('scores').once('value', snap => {
      const all = snap.val() || {};
      // (songIdx, diffIdx, lc) ВА░ьЋЕв│ёвАю top 10 Ж│ёВѓ░
      for (const key in all) {
        const parts = key.split('_');
        const songIdx = parseInt(parts[0], 10);
        const diffIdx = parseInt(parts[1], 10);
        const lc = parseInt(parts[2], 10);
        if (isNaN(songIdx) || isNaN(diffIdx)) continue;
        const users = all[key];
        const userBest = new Map();
        for (const user in users) {
          const e = users[user];
          const ts = (e && typeof e === 'object') ? (e.ts || 0) : 0;
          const score = (e && typeof e === 'object') ? (e.score || 0) : (e || 0);
          if (ts < prevWeekStart || ts >= prevWeekEnd) continue;
          if ((userBest.get(user) || 0) < score) userBest.set(user, score);
        }
        if (!userBest.has(currentUser)) continue;
        const ranked = Array.from(userBest.entries()).sort((a, b) => b[1] - a[1]);
        const myRank = ranked.findIndex(([u]) => u === currentUser);
        if (myRank >= 0 && myRank < 10) {
          const reward = WEEKLY_REWARDS[myRank];
          const songName = songs[songIdx] ? songs[songIdx].name : 'Ж│А #' + songIdx;
          const diffName = (DIFFICULTIES[diffIdx] && DIFFICULTIES[diffIdx].name) || '';
          const lcLabel = isNaN(lc) ? '' : (lc + 'K');
          const body = `${songName} ┬и ${diffName}${lcLabel ? ' ┬и ' + lcLabel : ''} ┬и ${myRank + 1}Вюё вІгВё▒!`;
          addMail({
            id: 'weekly_' + prevWeekStart + '_' + key,
            title: 'ВБ╝Ж░ё въГьѓ╣ в│┤ВЃЂ',
            body: body,
            reward: reward,
            songIdx: songIdx,
            diffIdx: diffIdx,
            lc: isNaN(lc) ? null : lc,
            rank: myRank + 1,
            claimed: false,
            ts: now,
          });
        }
      }
      // РўЁ В▓┤ьЂг ВЎёвБї вДѕьѓ╣ Рђћ Firebase + localStorage ВќЉВфй.
      //   Firebase Ж░ђ ЖХїВюё (вћћв░ћВЮ┤Віц вг┤Ж┤ђ ВъгВДђЖИЅ В░евІе), localStorage віћ в╣авЦИ bail-out.
      safeSetItem(_weeklyCheckedKey(prevWeekStart), '1');
      safeSetItem(_lastWeeklyKey(), '' + curWeek);
      try { fbDb.ref('settings/' + currentUser + '/weeklyChecked/' + prevWeekStart).set(true); } catch(e) {}
    });
  } catch(e) {
    // fb ВА░ьџї ВІцьїе ВІю checkedKey ВађВъЦ ВЋѕ ьЋе Рєњ вІцВЮї вАюЖиИВЮИ вЋї ВъгВІювЈё
  }
}

// В║ћв▓ёВіц ьЁЇВіцьіИ ьЈГ ЖИ░Вцђ Вцёв░ћЖ┐ѕ (ьЋюЖИђ В║љвдГьё░ вІеВюё ВЋѕВаё)
function wrapTextToLines(text, maxWidth) {
  if (!text) return [''];
  const tokens = text.split(/(\s+|┬и)/); // ЖхгвХёВъљ в│┤ВА┤
  const lines = [];
  let line = '';
  for (const tok of tokens) {
    if (!tok) continue;
    const candidate = line + tok;
    if (ctx.measureText(candidate).width <= maxWidth) {
      line = candidate;
    } else {
      if (line) lines.push(line);
      // ьєаьЂ░ ВъљВ▓┤Ж░ђ ЖИИвЕ┤ В║љвдГьё░ вІеВюё вХёьЋа
      if (ctx.measureText(tok).width > maxWidth) {
        let buf = '';
        for (const ch of tok) {
          if (ctx.measureText(buf + ch).width > maxWidth && buf) {
            lines.push(buf); buf = ch;
          } else buf += ch;
        }
        line = buf;
      } else {
        line = tok;
      }
    }
  }
  if (line) lines.push(line);
  return lines.length ? lines : [''];
}
// вДївБї вѓеВЮђ ВІюЖ░ё ьЈгвДи
function formatMailTimeLeft(mail) {
  if (!mail.ts) return '';
  const left = MAIL_EXPIRY_MS - (Date.now() - mail.ts);
  if (left <= 0) return 'вДївБї';
  const h = Math.floor(left / (60 * 60 * 1000));
  const mn = Math.floor((left % (60 * 60 * 1000)) / (60 * 1000));
  if (h > 0) return h + 'ВІюЖ░ё ' + mn + 'вХё вѓеВЮї';
  return mn + 'вХё вѓеВЮї';
}

const SCORE_THRESHOLDS = [600000, 800000, 1000000, 1200000];
const GRADE_ORDER = ['C','B','A','S','P'];
// РўЁ 2026-04-21 в│┤ВЃЂ ВаёВ▓┤ Ваѕв░ўВю╝вАю ьЋўьќЦ (в░ИвЪ░Віц ВА░ВаЋ).
const GRADE_COINS = { C: 13, B: 25, A: 50, S: 100, P: 250 };
const SCORE_COINS = { 600000: 25, 800000: 50, 1000000: 100, 1200000: 250 };
const DIFF_COINS = [13, 25, 50, 100];
// SPEED_COINS в░░ВЌ┤ВЮђ в░░ВєЇ ВЌЁВаЂ вІеВЮ╝ьЎћвАю ВѓгВџЕ ВЋѕ ьЋе. ьЋўВюё ьўИьЎўВџЕ вѓеЖ╣ђ.

const SPEED_CLEAR_COINS = 50;

function generateAchievements() {
  const achs = [];
  songs.forEach((s, si) => {
    // Grade achievements
    GRADE_ORDER.forEach(g => {
      const minPct = g==='S'?0.98:g==='A'?0.90:g==='B'?0.80:0.60;
      const glabel = g==='P' ? `${s.name} Рђћ PERFECT ьЂ┤вдгВќ┤` : `${s.name} Рђћ ${g}вЊ▒ЖИЅ ВЮ┤ВЃЂ ьЂ┤вдгВќ┤`;
      achs.push({ id:`s${si}_grade_${g}`, songIdx:si, type:'grade',
        label: glabel, coins: GRADE_COINS[g],
        check: d => d.songIdx===si && d.gauge>0 && (g==='P' ? d.missed===0 : d.pct>=minPct) });
    });
    // Score achievements
    SCORE_THRESHOLDS.forEach(t => {
      achs.push({ id:`s${si}_score_${t}`, songIdx:si, type:'score',
        label:`${s.name} Рђћ ${t.toLocaleString()}Ваљ ВЮ┤ВЃЂ`, coins: SCORE_COINS[t],
        check: d => d.songIdx===si && d.score>=t });
    });
    // Difficulty achievements
    DIFFICULTIES.forEach((d, di) => {
      achs.push({ id:`s${si}_diff_${di}`, songIdx:si, type:'diff',
        label:`${s.name} Рђћ ${d.name} ьЂ┤вдгВќ┤`, coins: DIFF_COINS[di],
        check: dd => dd.songIdx===si && dd.diffIdx===di && dd.gauge>0 });
    });
    // РўЁ в░░ВєЇ ВЌЁВаЂ ВЎёВаё ВаюЖ▒░ (2026-04-21 ВюаВађ Ж▓░ВаЋ) Рђћ в│┤ВЃЂ в░ИвЪ░Віц ВаЋвдг ВцЉ.
    //   SPEED_COINS / SPEED_CLEAR_COINS ВЃЂВѕўвіћ ьЋўВюёьўИьЎўВџЕВю╝вАю вѓеЖ╣ђ (в»ИВѓгВџЕ).
  });
  return achs;
}

// Ж│Ав│ё total вдгВіцвІЮвДї (TOP В░еьіИВџЕ) Рђћ ВІцВІюЖ░ё ЖхгвЈЁ
for (let _si = 0; _si < songs.length; _si++) {

  fbDb.ref('plays/' + _key + '/total').on('value', snap => {
    if (!fbPlayData[_key]) fbPlayData[_key] = { total: 0, logs: {} };
    // РўЁ optimistic вАюВ╗г Ж░њВЮ┤ Вёюв▓ё echo в│┤вІц ВЋъВёюВъѕВЮё Вѕў ВъѕВЮї (startSong ВцЉ goOffline ьЂљВъЅ) Рєњ
    //   Math.max вАю вАюВ╗гВЮ┤ вЇћ ьЂгвЕ┤ ВюаВДђ. вІцвЦИ ВюаВађЖ░ђ ьћїваѕВЮ┤ьЋ┤Вёю Вёюв▓ёЖ░ђ В╗цВДђвЕ┤ ЖиИвЋї в░ўВўЂ.
    fbPlayData[_key].total = Math.max(fbPlayData[_key].total || 0, snap.val() || 0);
    fbConnected = true; fbPlaysLoaded = true; chartLastUpdate = 0;
  }, () => { fbConnected = false; });

// logsвіћ ВёаЖ│А ьЎћвЕ┤ ВДёВъЁ ВІю lazy вАювЊю (DAILY/WEEKLY В░еьіИВџЕ, ВІцВІюЖ░ё ЖхгвЈЁ)

// вАюВ╗гВЌљ в│┤вЦўвљю ьћїваѕВЮ┤ ЖИ░вАЮВЮё FirebaseвАю вЈЎЖИ░ьЎћ
function flushLocalPlaysToFb() {
  const local = getLocalPlays();
  const pending = Object.keys(local);
  if (pending.length === 0) return;
  for (const key of pending) {
    const entry = local[key];
    if (!entry.logs || entry.logs.length === 0) continue;
    for (const ts of entry.logs) {
      fbDb.ref('plays/' + key + '/logs').push(ts);
    }
    fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + (entry.total || 0));
  }
  // вЈЎЖИ░ьЎћ ВЎёвБї ьЏё вАюВ╗г в│┤вЦў ьЂљ В┤ѕЖИ░ьЎћ
  safeRemoveItem('rhythm_localPlays');
}

// Вўцвъўвљю Firebase вАюЖиИ ВаЋвдг (1ВБ╝ВЮ╝ ВЮ┤ВЃЂ)
let lastLogCleanup = 0;
function cleanupOldLogs() {
  const now = Date.now();
  if (now - lastLogCleanup < 60*60*1000) return; // 1ВІюЖ░ёвДѕвІц
  lastLogCleanup = now;
  const weekAgo = now - 7*24*60*60*1000;
  for (const key in fbPlayData) {
    const entry = fbPlayData[key];
    if (!entry.logs) continue;
    for (const pushId in entry.logs) {
      if (entry.logs[pushId] < weekAgo) {
        fbDb.ref('plays/' + key + '/logs/' + pushId).remove();
      }
    }
  }
}

function recordPlay(songIdx) {
  const key = 'song_' + songIdx;
  const now = Date.now();
  // РўЁ вАюВ╗г ВдЅВІю в░ўВўЂ Рђћ TOP ьЃГВЮђ total, WEEKLY/DAILY віћ logs вЦ╝ в│┤в»ђвАю вЉў вІц Вёав░ўВўЂ.
  //   Firebase transaction echo Ж░ђ startSong Рєњ goOffline вїђЖИ░ВЌ┤ВЌљ вгХВЌг ВДђВЌ░вљўвіћ В╝ђВЮ┤ВіцВЌљВёю
  //   TOP вДї ВЌЁвЇ░ВЮ┤ьіИЖ░ђ в░ђвдгвЇў ьўёВЃЂ в░ЕВДђ. Firebase ВъгВЌ░Ж▓░ ВІю Вёюв▓ё Ж░њВЮ┤ listener вАю вЊцВќ┤ВЎђвЈё
  //   вЈЎВЮ╝ Ж▓░Ж│╝вЮ╝ ВцЉв│х В╣┤Вџ┤ьіИ ВЌєВЮї.
  if (!fbPlayData[key]) fbPlayData[key] = { total: 0, logs: {} };
  fbPlayData[key].total = (fbPlayData[key].total || 0) + 1;
  if (!fbPlayData[key].logs) fbPlayData[key].logs = {};
  fbPlayData[key].logs['local_' + now + '_' + Math.random().toString(36).slice(2, 8)] = now;
  chartLastUpdate = 0; // вІцВЮї ьћёваѕВъёВЌљ В░еьіИ ВдЅВІю ВъгЖ│ёВѓ░
  if (fbConnected) {
    // FirebaseВЌљ ВДЂВаЉ ЖИ░вАЮ (ЖИђвАюв▓ї Ж│хВюа)
    try {
      fbDb.ref('plays/' + key + '/logs').push(now);
      fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + 1);
    } catch(e) {
      saveLocalPlay(songIdx); // ВІцьїе ВІю вАюВ╗гВЌљ в│┤вЦў
    }
  } else {
    saveLocalPlay(songIdx); // ВўцьћёвЮ╝ВЮИ: вАюВ╗гВЌљ в│┤вЦў
  }
  cleanupOldLogs();
}

// Firebase ЖИђвАюв▓ї вЇ░ВЮ┤ьё░ в░ўьЎў (вфевЊа ВюаВађ ьЋЕВѓ░, вАюВ╗г fallback)
function getMergedPlayData(songIdx) {
  const key = 'song_' + songIdx;
  const fbEntry = fbPlayData[key] || {};
  // Firebase ВЌ░Ж▓░ ВІю ЖИђвАюв▓ї вЇ░ВЮ┤ьё░ ВѓгВџЕ (ВаёВ▓┤ ВюаВађ ьЋЕВѓ░)
  if (fbConnected) {
    return {
      total: fbEntry.total || 0,
      logs: fbEntry.logs ? Object.values(fbEntry.logs) : []
    };
  }
  // Firebase в»ИВЌ░Ж▓░ ВІю: В║љВІювљю Firebase вЇ░ВЮ┤ьё░вДї ВѓгВџЕ (вАюВ╗г вАюЖиИ concat ЖИѕВДђ Рђћ ВцЉв│х в░ЕВДђ)
  return {
    total: fbEntry.total || 0,
    logs: fbEntry.logs ? Object.values(fbEntry.logs) : []
  };
}

function getChartData(type) {
  const now = Date.now();
  // KST ЖИ░Вцђ Вўцвіў 0ВІю / ВЮ┤в▓ѕ ВБ╝ ВЏћВџћВЮ╝ 0ВІю (UTC timestampвАю ьЎўВѓ░)
  const KST_OFFSET = 9 * 60 * 60 * 1000;
  const kstNow = new Date(now + KST_OFFSET);
  const kstY = kstNow.getUTCFullYear(), kstM = kstNow.getUTCMonth(), kstD = kstNow.getUTCDate();
  const kstDow = kstNow.getUTCDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const todayStartMs = Date.UTC(kstY, kstM, kstD) - KST_OFFSET; // KST Вўцвіў 00:00 Рєњ UTC ms
  const daysFromMon = (kstDow + 6) % 7; // Mon=0, Sun=6
  const weekStartMs = todayStartMs - daysFromMon * 24 * 60 * 60 * 1000; // KST ВЮ┤в▓ѕ ВБ╝ ВЏћВџћВЮ╝ 00:00

  const list = [];
  for (let i = 0; i < songs.length; i++) {
    const entry = getMergedPlayData(i);
    const total = entry.total || 0;
    const logs = Array.isArray(entry.logs) ? entry.logs : (entry.logs ? Object.values(entry.logs) : []);
    let count = 0;
    let firstTs = Infinity; // ьЋ┤вІ╣ ЖИ░Ж░ё вѓ┤ Ж░ђВъЦ ВЮ┤вЦИ ьћїваѕВЮ┤ ВІюЖ░Ђ
    if (type === 'top') {
      count = total;
      for (const t of logs) if (t < firstTs) firstTs = t;
    }
    else if (type === 'daily') {
      for (const t of logs) {
        if (t >= todayStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    else if (type === 'weekly') {
      for (const t of logs) {
        if (t >= weekStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    list.push({ idx: i, count, firstTs });
  }
  // count=0ВЮИ Ж│А ВаюВЎИ (DAILY/WEEKLYВЌљВёю ЖИ░вАЮ ВЌєвіћ Ж│А ВѕеЖ╣ђ), TOPВЮђ ВаёвХђ ьЉюВІю
  const filtered = type === 'top' ? list : list.filter(item => item.count > 0);
  // ВаЋваг: count вѓ┤вд╝В░еВѕю Рєњ вЈЎвЦа ВІю ве╝Вађ ьћїваѕВЮ┤вљю Ж│А(firstTs ВўцвдёВ░еВѕю) Рєњ ЖиИвъўвЈё вЈЎвЦаВЮ┤вЕ┤ songIdx
  filtered.sort((a, b) => b.count - a.count || (a.firstTs - b.firstTs) || (a.idx - b.idx));
  return filtered;
}

function transitionTo(newState, callback) {
  if (fadeDir !== 0) return; // ВЮ┤в»И ВаёьЎў ВцЉ
  // РўЁ ВЮИЖ▓їВъё ВбЁвБї ВаёьЎў ВІю Firebase ВъгВЌ░Ж▓░ + Wake Lock ьЋ┤Ваю + ВЌЁвЇ░ВЮ┤ьіИ В▓┤ьЂг Ж░ЋВаю

  }

function updateFade(dt) {
  if (fadeDir === 0) return;
  fadeAlpha += fadeDir * fadeSpeed * dt;
  if (fadeDir === 1 && fadeAlpha >= 1) {
    fadeAlpha = 1;
    // ьЎћвЕ┤ВЮ┤ ВЎёВаёьъѕ Вќ┤вЉљВЏїВДљ Рєњ ВЃЂьЃю ВаёьЎў
    if (fadePendingState === 'select') {

      //   вІе optimistic вАюВ╗г Ж░њ(recordPlay ВЌљВёю +1 Вёав░ўВўЂ)ВЮ┤ Вёюв▓ё вЈЎЖИ░ьЎћ в│┤вІц
      //   ВЋъВёюВъѕВЮё Вѕў ВъѕВю╝в»ђвАю Math.max вАю ВЌГьќЅ в░ЕВДђ.
      chartLastUpdate = 0;
      if (fbDb) {
        for (let _si = 0; _si < songs.length; _si++) {
          const _k = 'song_' + _si;
          fbDb.ref('plays/' + _k + '/total').once('value', snap => {
            if (!fbPlayData[_k]) fbPlayData[_k] = { total: 0, logs: {} };
            fbPlayData[_k].total = Math.max(fbPlayData[_k].total || 0, snap.val() || 0);
            chartLastUpdate = 0;
          }).catch(()=>{});
        }
      }
    }
    if (fadePendingState) { state = fadePendingState; fadePendingState = null; }
    if (fadePendingCallback) { fadePendingCallback(); fadePendingCallback = null; }
    fadeDir = -1; // ьјўВЮ┤вЊюВЮИ ВІюВъЉ
  } else if (fadeDir === -1 && fadeAlpha <= 0) {
    fadeAlpha = 0;
    fadeDir = 0; // ВаёьЎў ВЎёвБї
  }
}

// ===== SEEDED RNG =====
function seededRng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// ===== NODE GENERATION =====
let songEnergyMap = null; // 0.5В┤ѕ вІеВюё ВЌљвёѕВДђ (0~1), вЊювЪ╝ ЖИ░Вцђ

function generateNodes(song, diff, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);

  const sixteenthDur = 15 / song.bpm;
  const eighthDur = sixteenthDur * 2;
  const totalSixteenths = song.bars * 16;
  // вѓЎьЋў ВІюЖ░ё = ьъѕьіИвЮ╝ВЮИЖ╣їВДђ Ж▒░вдг / вЁИьіИ ВєЇвЈё Рєњ В╣┤Вџ┤ьіИвІцВџ┤ вЂЮвѓўвЕ┤ ВЃЂвІеВЌљВёю вЊ▒ВъЦ
  const fallTime = getHitY() / calcNoteSpeed(song.bpm, selectedSpeed || 1);
  const startDelay = fallTime;
  let noteIdx = 0;
  const baseDensity = diff.noteDensity;
  const densityMul = 1 + Math.max(0, laneCount - 4) * 0.09;
  const density = Math.min(baseDensity * densityMul, 1.8);
  const chordChance = laneCount >= 6 ? (baseDensity >= 1.3 ? 0.45 : baseDensity >= 1.0 ? 0.35 : baseDensity >= 0.75 ? 0.25 : 0.15) : 0;
  const pat = song.pattern;

  // Ж│Ав│ё Ж│аВюа ваѕВЮИ ВІюьђђВіц ВЃЮВё▒ (ВІювЊю ЖИ░в░ў Рєњ вДцв▓ѕ вЈЎВЮ╝, Ж│АвДѕвІц вІцвдё)
  const songLaneSeq = [];
  const seqLen = Math.max(LANE_SEQ.length * 2, 32);
  for (let si = 0; si < seqLen; si++) {
    // ВЌ░ВєЇ Ж░ЎВЮђ ваѕВЮИ в░ЕВДђ: ВЮ┤Ваё ваѕВЮИЖ│╝ вІцвЦИ ваѕВЮИ ВёаьЃЮ
    let nl = Math.floor(rng() * laneCount);
    if (si > 0 && nl === songLaneSeq[si - 1]) nl = (nl + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
    songLaneSeq.push(nl);
  }

  // Generate notes from rhythm pattern
  for (let i = 0; i < totalSixteenths; i++) {
    const pos = i % 16;
    if (!pat[pos]) continue;
    // ВЌљвёѕВДђ ЖИ░в░ў в░ђвЈё ВА░Ваѕ: ВА░ВџЕьЋю ЖхгЖ░ёВЌљВёювіћ в░ђвЈёвЦ╝ вѓ«ВХц
    const noteTime = i * sixteenthDur + startDelay;
    let localDensity = density;
    if (energyMap && energyMap.length > 0) {
      const eIdx = Math.min(Math.floor(noteTime / 0.5), energyMap.length - 1);
      const energy = eIdx >= 0 ? energyMap[eIdx] : 1;
      // вг┤ВЮї ЖхгЖ░ё ВаюЖ▒░
      if (energy < 0.02) continue;
      // ВА░ВџЕьЋю ЖхгЖ░ё: в░ђвЈё ВХЋВєї
      if (energy < 0.15) localDensity = density * (energy / 0.15);
    }
    // Density filtering
    if (localDensity < 1 && rng() > localDensity) continue;
    // For hell mode, sometimes add extra notes on off-beats (ВЌљвёѕВДђ ЖИ░в░ў в░ђвЈё ВаЂВџЕ)
    if (localDensity > 1 && pos % 2 === 1 && rng() < (localDensity - 1) * 0.5) {
      const eLane = Math.floor(rng() * laneCount);
      const eFreq = 440;
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: eLane, freq: eFreq, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
    }
    const lane = songLaneSeq[noteIdx % songLaneSeq.length];
    const freq = 440;
    const nd = {
      time: i * sixteenthDur + startDelay,
      lane, freq, type: 'note',
      hit: false, missed: false,
      holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    // Hold notes based on difficulty
    const holdEvery7 = laneCount >= 6 ? Math.max(4, Math.floor((diff.holdEvery || 999) * 0.7)) : diff.holdEvery;
    if (holdEvery7 > 0 && noteIdx > 0 && noteIdx % holdEvery7 === 0 && i + 6 < totalSixteenths) {
      const holdLen = 2 + Math.floor(rng() * 2);
      nd.type = 'hold';
      nd.endTime = nd.time + holdLen * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // 7ьѓц вЈЎВІювЁИьіИ: Ж░ЎВЮђ ьЃђВЮ┤в░ЇВЌљ вІцвЦИ ваѕВЮИВЌљ ВХћЖ░ђ вЁИьіИ
    if (chordChance > 0 && rng() < chordChance) {
      const usedLanes = [lane];
      let chordLane = Math.floor(rng() * laneCount);
      if (chordLane === lane) chordLane = (chordLane + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
      usedLanes.push(chordLane);
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: chordLane, freq: 440, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
      // ВДђВўЦ: 15% ьЎЋвЦавАю ьіИвдгьћї вЁИьіИ
      if (baseDensity >= 1.3 && rng() < 0.15) {
        let triLane;
        do { triLane = Math.floor(rng() * laneCount); } while (usedLanes.includes(triLane));
        nodes.push({
          time: i * sixteenthDur + startDelay,
          lane: triLane, freq: 440, type: 'note',
          hit: false, missed: false,
          holding: false, holdComplete: false,
          endTime: 0, _ho1: null, _ho2: null, _hg: null
        });
        noteIdx++;
      }
    }
  }

  // Remove notes that overlap with hold durations in same lane
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  // Traps based on difficulty (7ьѓц: ьіИвъЕ в╣ѕвЈё ВдЮЖ░ђ)
  const trapInt = laneCount >= 6 && diff.trapInterval > 0 ? Math.max(3, diff.trapInterval - 1) : diff.trapInterval;
  if (trapInt > 0) {
    for (let i = 20; i < totalSixteenths; i += trapInt * 2 + Math.floor(rng() * Math.max(1, trapInt * 2))) {
      const t = i * sixteenthDur + startDelay;
      const lane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) {
        if (n.lane !== lane) continue;
        if (n.type === 'hold' && t >= n.time - eighthDur*0.5 && t <= n.endTime + eighthDur*0.5) { conflict = true; break; }
        if (Math.abs(n.time - t) < sixteenthDur * 0.8) { conflict = true; break; }
      }
      if (!conflict) nodes.push({ time: t, lane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // вЁИьіИ ЖИ░в░ў ВхюВєї ЖИИВЮ┤ (ВІцВаю ВўцвћћВўц ЖИИВЮ┤вАю вѓўВцЉВЌљ Ж░▒ВІавље)
  songDuration = totalSixteenths * sixteenthDur + startDelay + 2;
}

// ВўцвћћВўц вАювЊю ьЏё ВІцВаю ЖИИВЮ┤вАю songDuration Ж░▒ВІа + вЁИвЊю ВъгВЃЮВё▒
function updateSongDurationFromAudio() {
  let audioDur = 0;
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && allStemAudios[0].duration) {
    audioDur = allStemAudios[0].duration;
  } else if (songAudio && songAudio.duration) {
    audioDur = songAudio.duration;
  }
  if (audioDur > 0 && isFinite(audioDur)) {
    // ВўцвћћВўц ЖИИВЮ┤ВЌљ вДъВХ░ barsВЎђ вЁИьіИ ВъгВЃЮВё▒ (вДѕВДђвДЅ 5В┤ѕвіћ ВЋёВЏЃьіИвАю)
    if (curSong) {
      const sixteenthDur = 15 / curSong.bpm;
      curSong._audioBars = Math.max(1, Math.floor((audioDur - 1) / (sixteenthDur * 16)));
    }
    // songDuration = ВўцвћћВўц ЖИИВЮ┤ + 2В┤ѕ ВЌгВџ┤
    songDuration = audioDur + 2;
  }
}

  if (state === 'login') {

  if (settingsOpen) {
    if (settingsBindingLane >= 0) {
      if (e.code === 'Escape') { settingsBindingLane = -1; e.preventDefault(); return; }
      // ВцЉв│х ьѓц В░евІе (вІцвЦИ ваѕВЮИВЌљ ВЮ┤в»И вЊ▒вАЮвљю ьѓцВЮИВДђ ьЎЋВЮИ)
      const _dupIdx = LANE_CODES.findIndex((c, idx) => idx !== settingsBindingLane && idx < laneCount && c === e.code);
      if (_dupIdx >= 0) {

  }

    return;
  }
  if (state === 'select' && speedInputActive) {
