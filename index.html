// ===== ONSET DETECTION =====
function detectOnsets(audioBuffer) {
  if (!audioBuffer) return [];
  const data = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const winSamples = Math.floor(sr * 0.015); // 15ms мңҲлҸ„мҡ°
  const minGapSamples = Math.floor(sr * 0.03); // 30ms мөңмҶҢ к°„кІ©
  const onsets = [];
  let smoothed = 0;
  let lastOnset = -minGapSamples * 2;
  for (let i = 0; i < data.length; i += winSamples) {
    let sum = 0, cnt = 0;
    const end = Math.min(i + winSamples, data.length);
    for (let k = i; k < end; k += 8) { sum += data[k] * data[k]; cnt++; }
    const energy = cnt > 0 ? Math.sqrt(sum / cnt) : 0;
    if (energy > 0.003 && energy > smoothed * 1.1 && i - lastOnset > minGapSamples) {
      onsets.push(i / sr);
      lastOnset = i;
    }
    smoothed = energy * 0.2 + smoothed * 0.8;
  }
  return onsets;
}

function generateNodesFromOnsets(song, diff, onsetsByStem, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);
  const bgmDelay = 3.5;
  song._startDelay = bgmDelay;
  song._onsetMode = true;
  const sixteenth = 15 / song.bpm;

  // ===== vocalIntroRange мІҳлҰ¬ (opt-in) =====
  // flag нҳ•нғң:
  //   'auto' - лҹ°нғҖмһ„ RMS л¶„м„қмңјлЎң ліҙм»¬-only лІ„нӮ· мһҗлҸҷ к°җм§Җ (мқёнҠёлЎң + мӨ‘к°„ ліҙм»¬ лёҢл ҲмқҙнҒ¬ м „л¶Җ)
  //   [s, e] - лӢЁмқј лІ”мң„
  //   [[s1,e1], [s2,e2], ...] - лӢӨмӨ‘ лІ”мң„
  //   undefined - flag м—ҶмқҢ, кё°мЎҙ лҸҷмһ‘ мҷ„м „ ліҙмЎҙ (мқҙ лё”лЎқ м§„мһ… м•Ҳ н•Ё)
  let vocalRanges = [];
  const _vir = song.vocalIntroRange;
  if (_vir === 'auto' && typeof stemAudioBuffers === 'object' && stemAudioBuffers) {
    // лҸҷм Ғ к°җм§Җ: лӘЁл“  мҠӨн…ң RMS л¶„м„қн•ҙм„ң !musical && vocal лІ„нӮ· м°ҫкё°
    // instrum(3) м ңмҷё: м•°л№„м–ёнҠё нҢЁл“ң/лҰ¬лІ„лёҢ н…Ңмқјмқҙ л°°кІҪмңјлЎң к№”лҰ¬лҠ” кіЎмқҙ л§Һм•„м„ң "м§„м§ң мқҢм•… мӢңмһ‘" нҢҗм •м—” л¶Җм Ғн•©
    // лҰ¬л“¬к°җ мһҲлҠ” мқҢм•… = drums/bass/piano/guitar к°Җ мһҲм–ҙм•ј н•Ё
    const _MUSICAL = [0, 1, 4, 5];
    const _BSEC = 0.5;
    const _FL_MUSIC = 0.015;  // мқҢм•… мҠӨн…ң floor
    const _FL_VOCAL = 0.008;  // ліҙм»¬ floor (мЎ°мҡ©н•ң ліҙм»¬лҸ„ мһЎкІҢ)
    const _MIN_RUN = 2;        // мөңмҶҢ м—°мҶҚ лІ„нӮ· (1мҙҲ)
    const _rms = {};
    let _nb = 0;
    for (const si of [0, 1, 2, 3, 4, 5]) { // + vocals(2) нҸ¬н•Ё
      const buf = stemAudioBuffers[si];
      if (!buf) { console.log('[vocalIntro auto] stem ' + si + ' NO BUFFER'); continue; }
      const d = buf.getChannelData(0);
      const sr_ = buf.sampleRate;
      const bs = Math.floor(sr_ * _BSEC);
      const nb2 = Math.ceil(d.length / bs);
      _nb = Math.max(_nb, nb2);
      const arr = new Float32Array(nb2);
      for (let b = 0; b < nb2; b++) {
        let s0 = b * bs, s1 = Math.min(s0 + bs, d.length), sum = 0, c = 0;
        for (let k = s0; k < s1; k += 32) { sum += d[k] * d[k]; c++; }
        arr[b] = c > 0 ? Math.sqrt(sum / c) : 0;
      }
      _rms[si] = arr;
    }
    const _vocalArr = _rms[2];
    if (!_vocalArr) {
      console.log('[vocalIntro auto] vocals stem not available for ' + song.name);
    } else {
      // л””лІ„к·ё dump (window._vocalDebug = true мқј л•Ңл§Ң)
      if (window._vocalDebug === true) {
        const dumpLimit = Math.min(60, _nb);
        const dumpRows = [];
        for (let b = 0; b < dumpLimit; b++) {
          const t = (b * _BSEC).toFixed(1);
          const v = (_vocalArr[b] || 0).toFixed(4);
          const d0 = (_rms[0]?.[b] || 0).toFixed(4);
          const d1 = (_rms[1]?.[b] || 0).toFixed(4);
          const d3 = (_rms[3]?.[b] || 0).toFixed(4);
          const d4 = (_rms[4]?.[b] || 0).toFixed(4);
          const d5 = (_rms[5]?.[b] || 0).toFixed(4);
          let musical = false;
          for (const si of _MUSICAL) {
            const arr = _rms[si];
            if (arr && (arr[b] || 0) > _FL_MUSIC) { musical = true; break; }
          }
          const vocal = (_vocalArr[b] || 0) > _FL_VOCAL;
          const mark = (!musical && vocal) ? ' VOCAL-ONLY' : (musical ? ' music' : ' silent');
          dumpRows.push(`  ${t}s: voc=${v} dr=${d0} bs=${d1} in=${d3} pn=${d4} gt=${d5}${mark}`);
        }
        console.log('[vocalIntro auto] RMS dump for ' + song.name + ':\n' + dumpRows.join('\n'));
      }

      // м—°мҶҚ кө¬к°„ м°ҫкё° (мөңмҶҢ MIN_RUN лІ„нӮ·)
      let runStart = -1;
      for (let b = 0; b <= _nb; b++) {
        let isVocalOnly = false;
        if (b < _nb) {
          let musical = false;
          for (const si of _MUSICAL) {
            const arr = _rms[si];
            if (arr && (arr[b] || 0) > _FL_MUSIC) { musical = true; break; }
          }
          const vocal = (_vocalArr[b] || 0) > _FL_VOCAL;
          isVocalOnly = !musical && vocal;
        }
        if (isVocalOnly) {
          if (runStart < 0) runStart = b;
        } else if (runStart >= 0) {
          const runLen = b - runStart;
          if (runLen >= _MIN_RUN) {
            vocalRanges.push([runStart * _BSEC, b * _BSEC]);
          }
          runStart = -1;
        }
      }
      console.log('[vocalIntro auto] ' + vocalRanges.length + ' vocal-only ranges detected for ' + song.name, vocalRanges);
    }
  } else if (Array.isArray(_vir) && _vir.length === 2 && typeof _vir[0] === 'number') {
    // лӢЁмқј лІ”мң„ [s, e]
    vocalRanges = [_vir];
  } else if (Array.isArray(_vir) && _vir.length > 0 && Array.isArray(_vir[0])) {
    // лӢӨмӨ‘ лІ”мң„ [[s1,e1], [s2,e2], ...]
    vocalRanges = _vir;
  }

  // лӘЁл“  stem onsetмқ„ н•ҳлӮҳлЎң н•©м№ҳлҗҳ stem м •ліҙ мң м§Җ (vocals м ңмҷё)
  let allOnsets = [];
  for (const si in onsetsByStem) {
    if (ALWAYS_AUDIBLE_STEMS.includes(Number(si))) continue;
    for (const t of onsetsByStem[si]) {
      allOnsets.push({ time: t + bgmDelay, stem: Number(si) });
    }
  }
  // vocal ranges м•Ҳмқҳ vocals onset нҸ¬н•Ё
  if (vocalRanges.length > 0 && onsetsByStem[2]) {
    let added = 0;
    for (const [vs, ve] of vocalRanges) {
      for (const t of onsetsByStem[2]) {
        if (t >= vs && t <= ve) {
          allOnsets.push({ time: t + bgmDelay, stem: 2 });
          added++;
        }
      }
    }
    if (added > 0) console.log('[vocalIntro] ' + added + ' vocal onsets added for ' + song.name);
  }
  // кіЎлі„ мҠӨн…ң мҷ„м „ м ңмҷё (excludeStems: [stemIdx, ...])
  // мҠӨн…ң мқёлҚұмҠӨ: 0=drums, 1=bass, 2=vocals, 3=instrum, 4=piano, 5=guitar, 6=other
  const exStems = song.excludeStems || [];
  if (exStems.length > 0) {
    allOnsets = allOnsets.filter(o => !exStems.includes(o.stem));
  }

  // ===== мһҗлҸҷ ambient/мЎ°мҡ©н•ң кө¬к°„ н•„н„° =====
  // MUSICAL_STEMS мӨ‘ н•ҳлӮҳлқјлҸ„ м ҲлҢҖ RMS > 0.003 мқё лІ„нӮ·л§Ң "мқҢм•…м Ғ"мңјлЎң нҢҗм •
  // мЎ°мҡ©н•ң кө¬к°„(intro, outro, мғҲмҶҢлҰ¬ л“ұ)мқҖ onset мһҗлҸҷ drop
  if (typeof stemAudioBuffers === 'object' && stemAudioBuffers) {
    const MUSICAL_STEMS = [0, 1, 3, 4, 5]; // drums, bass, instrum, piano, guitar
    const BUCKET_SEC = 0.5;
    const ABS_FLOOR = 0.02; // мӮ¬лһҢмқҙ л“ӨлҰ¬лҠ” мҲҳмӨҖ
    const stemBucketRms = {};
    let maxBuckets = 0;
    for (const si of MUSICAL_STEMS) {
      const buf = stemAudioBuffers[si];
      if (!buf) continue;
      const d = buf.getChannelData(0);
      const sr_ = buf.sampleRate;
      const bs = Math.floor(sr_ * BUCKET_SEC);
      const nb = Math.ceil(d.length / bs);
      maxBuckets = Math.max(maxBuckets, nb);
      const arr = new Float32Array(nb);
      for (let b = 0; b < nb; b++) {
        let s0 = b * bs, s1 = Math.min(s0 + bs, d.length), sum = 0, c = 0;
        for (let k = s0; k < s1; k += 32) { sum += d[k] * d[k]; c++; }
        arr[b] = c > 0 ? Math.sqrt(sum / c) : 0;
      }
      stemBucketRms[si] = arr;
    }
    const isMusical = [];
    for (let b = 0; b < maxBuckets; b++) {
      let musical = false;
      for (const si of MUSICAL_STEMS) {
        const arr = stemBucketRms[si];
        if (arr && (arr[b] || 0) > ABS_FLOOR) { musical = true; break; }
      }
      isMusical.push(musical);
    }
    // м•һл’Ө 1лІ„нӮ· padding (к°‘мһ‘мҠӨлҹ° лҒҠк№Җ л°©м§Җ)
    const paddedMusical = isMusical.slice();
    for (let b = 0; b < isMusical.length; b++) {
      if (isMusical[b]) {
        if (b > 0) paddedMusical[b - 1] = true;
        if (b < isMusical.length - 1) paddedMusical[b + 1] = true;
      }
    }
    const before = allOnsets.length;
    // vocal ranges м•ҲмқҖ ambient filter м ңмҷё (ліҙм»¬-only лІ„нӮ· мң м§Җ)
    allOnsets = allOnsets.filter(o => {
      const relT = o.time - bgmDelay;
      if (vocalRanges.length > 0) {
        for (let vi = 0; vi < vocalRanges.length; vi++) {
          if (relT >= vocalRanges[vi][0] && relT <= vocalRanges[vi][1]) return true;
        }
      }
      const bi = Math.floor(relT / BUCKET_SEC);
      if (bi < 0 || bi >= paddedMusical.length) return true;
      return paddedMusical[bi];
    });
    if (before !== allOnsets.length) {
      console.log('ambient filter: ' + (before - allOnsets.length) + ' onsets dropped');
    }

  }

  allOnsets.sort((a, b) => a.time - b.time);

  // BPM к·ёлҰ¬л“ңм—җ нҖҖнғҖмқҙмҰҲ (16л¶„мқҢн‘ң)
  for (const o of allOnsets) {
    const rel = o.time - bgmDelay;
    o.time = Math.round(rel / sixteenth) * sixteenth + bgmDelay;
  }

  // м—җл„Ҳм§Җ л¶Җм—¬
  if (energyMap && energyMap.length > 0) {
    for (const o of allOnsets) {
      const eIdx = Math.min(Math.floor((o.time - bgmDelay) / 0.5), energyMap.length - 1);
      o.energy = eIdx >= 0 ? energyMap[eIdx] : 1;
    }
  } else {
    for (const o of allOnsets) o.energy = 1;
  }

  // л„Ҳл¬ҙ к°Җк№Ңмҡҙ onset лі‘н•© (лҸҷмӢңл…ёнҠё нӣ„ліҙ)
  const merged = [];
  for (const o of allOnsets) {
    if (merged.length > 0 && Math.abs(o.time - merged[merged.length - 1].time) < 0.03) {
      if (!merged[merged.length - 1].extra) merged[merged.length - 1].extra = [];
      merged[merged.length - 1].extra.push(o);
      continue;
    }
    merged.push(o);
  }

  // н•ҳн•ң н•„н„° м ңкұ°: quiet кө¬к°„(н”јм•„л…ё мқёнҠёлЎң л“ұ) л…ёнҠё л“ңлһҚ л°©м§Җ
  const nonSilent = merged;

  // лӮңмқҙлҸ„ н•„н„°л§Ғ (815d64e мӣҗліё: мқҢм•… л¶„мқҢн‘ң кё°мӨҖ)
  const density = diff.noteDensity;
  const minGap = density <= 0.5 ? sixteenth * 4    // мү¬мӣҖ: 4л¶„мқҢн‘ң
               : density <= 0.8 ? sixteenth * 2    // ліҙнҶө: 8л¶„мқҢн‘ң
               : density <= 1.2 ? sixteenth * 1.5  // м–ҙл ӨмӣҖ: м җ8л¶„мқҢн‘ң
               : sixteenth;                        // м§ҖмҳҘ: 16л¶„мқҢн‘ң
  const filtered = [];
  if (nonSilent.length > 0) {
    const songStart = nonSilent[0].time;
    const songEnd = nonSilent[nonSilent.length - 1].time;
    let slotStart = songStart;
    let nsIdx = 0;
    while (slotStart < songEnd + minGap) {
      const slotEnd = slotStart + minGap;
      let best = null, bestEnergy = -1;
      while (nsIdx < nonSilent.length && nonSilent[nsIdx].time < slotEnd) {
        if (nonSilent[nsIdx].time >= slotStart && nonSilent[nsIdx].energy > bestEnergy) {
          best = nonSilent[nsIdx]; bestEnergy = nonSilent[nsIdx].energy;
        }
        nsIdx++;
      }
      if (best) filtered.push(best);
      slotStart = slotEnd;
    }
  }

  // ===== "л”°лӢЁ" нҢЁн„ҙ ліөкө¬ (л§Өмҡ° м—„кІ©) =====
  // лІ„л Өм§„ onset мӨ‘ м„ нғқлҗң л…ёнҠёмҷҖ 90~120ms + м—җл„Ҳм§Җ 100%+ (мҰү м „нҳҖ м•Ҫн•ҳм§Җ м•ҠмқҖ кІғ)
  // ліөкө¬ мғҒн•ң: filtered м „мІҙмқҳ 5% мқҙн•ҳ
  {
    const PAIR_MIN = 0.09;
    const PAIR_MAX = 0.12;
    const ENERGY_RATIO = 1.2;
    const MAX_RESCUE_RATIO = 0.01;
    const maxRescue = Math.floor(filtered.length * MAX_RESCUE_RATIO);
    const filteredSet = new Set(filtered);
    const rescued = [];
    for (const f of filtered) {
      if (rescued.length >= maxRescue) break;
      for (const o of nonSilent) {
        if (filteredSet.has(o)) continue;
        const dt = o.time - f.time;
        if (dt < PAIR_MIN || dt > PAIR_MAX) continue;
        if (o.energy < f.energy * ENERGY_RATIO) continue;
        if (rescued.includes(o)) continue;
        rescued.push(o);
        break;
      }
    }
    filtered.push(...rescued);
    filtered.sort((a, b) => a.time - b.time);
  }

  // ===== stem кё°л°ҳ л Ҳмқё л°°л¶„ (мқҢм•… кө¬мЎ° л°ҳмҳҒ) =====
  const lc = laneCount;
  const holdEvery = diff.holdEvery || 999;
  const eighthDur = sixteenth * 2;

  // stem вҶ’ л Ҳмқё л§Өн•‘ (м „ л Ҳмқём—җ кі лҘҙкІҢ л¶„мӮ°)
  const stemList = [...new Set(filtered.map(x => x.stem))].sort((a, b) => a - b);
  const stemBase = {};
  const songOff = songIdx % lc; // кіЎл§ҲлӢӨ мӢңмһ‘ л Ҳмқё лӢӨлҘҙкІҢ
  stemList.forEach((s, i) => { stemBase[s] = (Math.floor(i * lc / Math.max(stemList.length, 1)) + songOff) % lc; });

  // stemлі„ лӮҙл¶Җ м№ҙмҡҙн„° (к°ҷмқҖ stem лӮҙм—җм„ң л Ҳмқё мҲңнҷҳ)
  const stemCnt = {};
  let noteIdx = 0;
  let prevLane = -1;
  let prevTime = -1;
  const SAME_LANE_MIN_GAP = 0.3; // к°ҷмқҖ л Ҳмқё м—°мҶҚ н—Ҳмҡ© мөңмҶҢ к°„кІ© (мҙҲ, мӢңк°Ғ overlap л°©м§Җ)

  let _lastChordTime = 0;
  for (const o of filtered) {
    if (!stemCnt[o.stem]) stemCnt[o.stem] = 0;
    const ci = stemCnt[o.stem]++;
    const base = stemBase[o.stem] || 0;

    // stem кё°л°ҳ + мӢңл“ң RNG мҳӨн”„м…Ӣ (815d64e мӣҗліё л°©мӢқ. seededлқј кІ°м •лЎ .)
    let lane = (base + Math.floor(rng() * lc)) % lc;

    // к°ҷмқҖ л Ҳмқё + 0.3s лҜёл§Ң = мӢңк°Ғм Ғ overlap вҶ’ мӢңн”„нҠё
    // 0.3s мқҙмғҒ л–Ём–ҙмЎҢмңјл©ҙ к·ёлҢҖлЎң (м—°нғҖ н—Ҳмҡ©)
    if (lane === prevLane && lc > 1 && (o.time - prevTime) < SAME_LANE_MIN_GAP) {
      lane = (lane + 1) % lc;
    }

    prevLane = lane;
    prevTime = o.time;
    const nd = {
      time: o.time, lane, freq: 440, type: 'note', stem: o.stem,
      hit: false, missed: false, holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    if (holdEvery > 0 && noteIdx > 0 && noteIdx % holdEvery === 0) {
      nd.type = 'hold';
      nd.endTime = nd.time + (2 + Math.floor(rng() * 2)) * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // лҸҷмӢң л…ёнҠё (chord): chordMode нҷңм„ұ + extra onset ліҙмң  + м—җл„Ҳм§Җ мғҒмң„ кө¬к°„
    if (song.chordMode && o.extra && o.extra.length > 0 && nd.type === 'note') {
      const chordGap = song.chordMinGap || 2.0;
      if (!_lastChordTime || (o.time - _lastChordTime) >= chordGap) {
        const avgEnergy = filtered.reduce((s, x) => s + (x.energy || 0), 0) / filtered.length;
        if ((o.energy || 0) >= avgEnergy * 1.3) {
          const ex = o.extra[0];
          let cLane = (lane + 1 + Math.floor(rng() * (lc - 1))) % lc;
          nodes.push({
            time: o.time, lane: cLane, freq: 440, type: 'note', stem: ex.stem != null ? ex.stem : o.stem,
            hit: false, missed: false, holding: false, holdComplete: false,
            endTime: 0, _ho1: null, _ho2: null, _hg: null
          });
          _lastChordTime = o.time;
        }
      }
    }
  }

  // нҠёлһ© м¶”к°Җ
  const trapInt = diff.trapInterval || 0;
  if (trapInt > 0 && nodes.length > 0) {
    const songEnd = nodes[nodes.length - 1].time;
    for (let t = bgmDelay + 5; t < songEnd - 2; t += (trapInt * 2 + rng() * trapInt * 2) * sixteenth) {
      const tLane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) { if (Math.abs(n.time - t) < sixteenth * 2) { conflict = true; break; } }
      if (!conflict) nodes.push({ time: t, lane: tLane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // нҷҖл“ң л…ёнҠё кө¬к°„ лӮҙ к°ҷмқҖ л Ҳмқё мқјл°ҳ л…ёнҠё м ңкұ° (нҷҖл“ң мӢңмһ‘~лҒқ + м—¬мң  0.15мҙҲ)
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].type !== 'hold' && nodes[b].time >= nodes[a].time && nodes[b].time < nodes[a].endTime + 0.15) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;
  // songDuration from actual audio, not notes
  let maxDur = 0;
  for (const si in stemAudioBuffers) { if (stemAudioBuffers[si]) maxDur = Math.max(maxDur, stemAudioBuffers[si].duration); }
  songDuration = maxDur > 0 ? maxDur + bgmDelay + 2 : (nodes.length > 0 ? nodes[nodes.length - 1].time + 5 : 30);
}

// ===== START SONG =====
let songLoading = false, songLoadProgress = 0, songLoadTotal = 1;
let stemFirstSoundTime = {}; // мҠӨн…ңлі„ мІ« мҶҢлҰ¬ мң„м№ҳ (мҙҲ)
let stemAudioBuffers = {};   // мҠӨн…ңлі„ л””мҪ”л”©лҗң AudioBuffer (кіЎ лҒқ л№Ҳл…ёнҠёмҡ©)
let stemOnsetCache = {};     // мҠӨн…ңлі„ onset кІ°кіј мәҗмӢң

// вҳ… н”јлІ„ GPU/н…ҚмҠӨнҠё/к·ёлқјлҚ°мқҙм…ҳ нҢҢмқҙн”„лқјмқё н”„лҰ¬мӣң вҖ” мІ« н”јлІ„ activation м—җм„ң л°ңмғқн•ҳлҠ”
//   createLinearGradient/createRadialGradient + мғҲ нҸ°нҠё мӮ¬мқҙмҰҲ(FEVER! text) + shadowBlur
//   мЎ°н•©мқҳ shader JIT м»ҙнҢҢмқј л№„мҡ©мқ„ мҲЁк№Җ canvas м—җм„ң лҜёлҰ¬ м§Җл¶Ҳн•ҙ мқёкІҢмһ„ н”„л Ҳмһ„ л“ңлЎӯ л°©м§Җ.
//   н•ң лІҲл§Ң мӢӨн–ү (_feverWarmedUp н”Ңлһҳк·ё), л№„мҡ© ~5ms, мң м Җ мІҙк°җ 0.
let _feverWarmedUp = false;
function _warmupFeverGpu() {
  if (_feverWarmedUp) return;
  _feverWarmedUp = true;
  try {
    const cv = document.createElement('canvas');
    cv.width = 64; cv.height = 64;
    const c = cv.getContext('2d');
    // 1) linear gradient вҖ” н”јлІ„ л Ҳмқј/мҠӨнҠёлҰӯ/н…ҚмҠӨнҠё мҡ© нҢҢмқҙн”„лқјмқё warm
    const lg = c.createLinearGradient(0, 0, 0, 64);
    lg.addColorStop(0, 'hsl(0,100%,65%)');
    lg.addColorStop(0.5, 'hsl(60,100%,70%)');
    lg.addColorStop(1, 'hsl(120,100%,65%)');
    c.fillStyle = lg; c.fillRect(0, 0, 64, 64);
    // 2) radial gradient вҖ” flower мҠӨнӮЁ fever л…ёнҠё glow мҡ©
    const rg = c.createRadialGradient(32, 32, 0, 32, 32, 32);
    rg.addColorStop(0, 'rgba(255,100,0,0.5)');
    rg.addColorStop(1, 'rgba(255,100,0,0)');
    c.fillStyle = rg; c.fillRect(0, 0, 64, 64);
    // 3) FEVER! н…ҚмҠӨнҠё вҖ” нҸ°нҠё л©”нҠёлҰӯ мәҗмӢң + shadowBlur shader JIT
    c.shadowColor = 'hsl(30,80%,40%)'; c.shadowBlur = 6;
    c.font = `bold ${sz(44)}px sans-serif`;
    c.textAlign = 'center'; c.textBaseline = 'top';
    c.fillStyle = lg;
    c.fillText('FEVER!', 32, 0);
    c.shadowBlur = 0;
  } catch(e) {}
}

function startSong(idx) {
  stopTitleBgm(); stopPreview(); stopSongPreview(); stopSongAudio(); resumeAudio();
  // вҳ… н”јлІ„ нҢҢмқҙн”„лқјмқё н”„лҰ¬мӣң вҖ” мІ« н”јлІ„ activation мӢң gradient/text/shadow JIT лЎң л°ңмғқн•ҳлҠ”
  //   1нҡҢм„ұ лІ„лІ…мһ„ л°©м§Җ. лЎңл”© мӢңмһ‘ мӢңм җм—җ мҳӨн”„мҠӨнҒ¬лҰ° canvas м—җм„ң лҜёлҰ¬ мІҳлҰ¬.

  //   мқҙ мӢңм җм—җ лҜёлҰ¬ мһ¬мӢңлҸ„н•ҙм„ң мқёкІҢмһ„ м§„мһ… м „ к°ҖлҠҘн•ҳл©ҙ лЎңл“ң мҷ„лЈҢ мғҒнғңлЎң л§Ңл“Ұ.

  //   л©”мқё мҠӨл Ҳл“ңм—җм„ң snapshot parse вҶ’ iOS к°Җ rapid touch л“ңлЎӯн•ҳлҠ” мӣҗмқё.
  //   кІҢмһ„ мӢңмһ‘кіј лҸҷмӢңм—җ м „л¶Җ н•ҙм ң. лһӯнӮ№ нҷ”л©ҙ ліөк·Җ мӢң мһ¬кө¬лҸ…лҗЁ.
  unsubscribeAllFbRankings();

  //   л©”мқё мҠӨл Ҳл“ң м җмң  л°©м§Җ. transitionTo м—җм„ң goOnline мңјлЎң мһ¬м—°кІ°.
  try { if (fbDb) fbDb.goOffline(); } catch(e) {}

  //   iOS 16.4+ м§Җмӣҗ. м§Җмӣҗ м•Ҳ н•ҳлҠ” нҷҳкІҪмқҖ try/catch лЎң л¬ҙмӢңлҗЁ.

  generateNodes(curSong, curDiff);
  stemFirstSoundTime = {};
  stemAudioBuffers = {};
  stemOnsetCache = {};
  score=0; combo=0; maxCombo=0; collected=0; missed=0; window._hudRawMax=0;

  // вҳ… н„°м№ҳ/нҸ¬мқён„° мғҒнғң л°©м–ҙм Ғ мҙҲкё°нҷ” вҖ” л©”лүҙ/лЎңл”© мӨ‘ мҢ“мқё stale м—”нҠёлҰ¬ м ңкұ°.
  //   iOS к°Җ pointerup/touchend л“ңлЎӯн•ҳкұ°лӮҳ мҷёл¶Җ л§ҒнҒ¬ м§„мһ… мӢң мқҙм „ м„ём…ҳ мһ”мһ¬лЎң silent drop мң л°ң к°ҖлҠҘ.
  //   лЎңл”© нҷ”л©ҙ м§„мһ…л§ҲлӢӨ лҰ¬м…Ӣн•ҙм„ң мӢӨм ң кІҢмһ„ мӢңмһ‘ мӢңм җм—” н•ӯмғҒ к№ЁлҒ—н•ң мғҒнғң ліҙмһҘ.
  _pointerLaneMap.clear();

  const stemNames = curSong.stemNames || [];

  function finishLoading() {
    // вҳ… л„ӨнҠёмӣҢнҒ¬ лҠҗлҰ° кІҪмҡ°: stem buffer н•ҳлӮҳлҸ„ л””мҪ”л”© м•Ҳ лҗҳм–ҙ мһҲмңјл©ҙ 2мҙҲ лҚ” кё°лӢӨлҰј (мөңлҢҖ 10нҡҢ = 20мҙҲ).
    //   кё°ліё timeout (15~30мҙҲ) л§ҢмңјлЎңлҠ” л¶Ҳм¶©л¶„н•ң мҠ¬лЎңмҡ° мјҖмқҙмҠӨ лҢҖмқ‘. buffer м—Ҷмқҙ countdown мӢңмһ‘н•ҳл©ҙ
    //   ABS play мӢӨнҢЁ + HTML лҸ„ лІ„нҚј л¶ҖмЎұмңјлЎң л¬ҙмқҢ вҖ” мқёкІҢмһ„ BGM м•Ҳ л“ӨлҰ¬лҠ” мқҙмҠҲ л°©м§Җ.
    if (curSong && curSong.stemDir && stemCount > 0) {
      const decodedCount = Object.keys(stemAudioBuffers).filter(k => stemAudioBuffers[k]).length;
      finishLoading._retryCount = (finishLoading._retryCount || 0);
      if (decodedCount === 0 && finishLoading._retryCount < 10) {
        finishLoading._retryCount++;
        setTimeout(finishLoading, 2000);
        return;
      }
    }
    finishLoading._retryCount = 0;
    songLoading = false;
    countdownTime = 3.5;
    lastTime = 0;
  }

  function tryFinalize() {
    // мҠӨн…ң + м—җл„Ҳм§Җ л§ө лӘЁл‘җ мҷ„лЈҢ мӢң мөңмў… л…ёнҠё мғқм„ұ нӣ„ мӢңмһ‘
    if (!_stemsReady || !_energyReady) return;
    // вҳ… лЎңл”© лҒқлӮҳкі  мӢӨм ң н”Ңл Ҳмқҙ мӨ‘мқҙл©ҙ SKIP вҖ” detectOnsets 7к°ң + generateNodesFromOnsets к°Җ 2-3мҙҲ лё”лЎқ мң л°ң.
    //   songLoading н”Ңлһҳк·ёлЎң лЎңл”© мӨ‘ vs мӢӨм ң н”Ңл Ҳмқҙ кө¬л¶„ (лЎңл”© мӨ‘м—” м •мғҒ мӢӨн–ү н•„мҡ”).
    if (!songLoading && state === 'playing' && countdownTime <= 0) return;
    // мҳӨл””мҳӨ кёёмқҙ кё°л°ҳ bars ліҙм • + м—җл„Ҳм§Җ л§ө л°ҳмҳҒ мөңмў… л…ёнҠё мғқм„ұ (1нҡҢл§Ң)
    const origBars = curSong.bars;

    // onset кё°л°ҳ л…ёнҠё мғқм„ұ
    try {

      for (let i = 0; i < stemNames.length; i++) {

        } else {

      } else {

    curSong.bars = origBars;
    // мөңмҶҢ н‘ңмӢң мӢңк°„ ліҙмһҘ
    const elapsed = performance.now() - songLoadStart;

  function onAllLoaded() {

    if (usingStemMode) {
      for (let k = 0; k < allStemAudios.length; k++) {

          // лЎңл”© мӨ‘ лҜёлҰ¬ seek+play+pause вҶ’ лёҢлқјмҡ°м Җк°Җ мҳӨл””мҳӨ лІ„нҚјл§Ғ мҷ„лЈҢ
          // м№ҙмҡҙнҠёлӢӨмҡҙ лҒқм—җм„ң play()л§Ң н•ҳл©ҙ лҒҠк№Җ м—ҶмқҢ
          allStemAudios[k].currentTime = 0;

      placeholder.src = path;
      allStemAudios.push(placeholder);

          }

          const data = buffer.getChannelData(0);
          const sr = buffer.sampleRate;
          const bigChunk = Math.floor(sr * 0.1);
          for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {
            let peak = 0;
            const end = Math.min(j + bigChunk, data.length);
            for (let k = j; k < end; k += 4) { const v = Math.abs(data[k]); if (v > peak) peak = v; }
            if (peak > 0.01) { stemFirstSoundTime[_si] = j / sr; break; }
          }
          if (!ALWAYS_AUDIBLE_STEMS.includes(_si)) {
            const winSize = Math.floor(sr * 0.5);
            const mapLen = Math.ceil(data.length / winSize);
            if (!songEnergyMap || songEnergyMap.length < mapLen) {
              songEnergyMap = new Float32Array(mapLen);
            }
            for (let w = 0; w < mapLen; w++) {
              let sum = 0;
              const s0 = w * winSize, s1 = Math.min(s0 + winSize, data.length);
              for (let k = s0; k < s1; k += 8) sum += data[k] * data[k];
              songEnergyMap[w] += Math.sqrt(sum / ((s1 - s0) / 8));
            }
            _energyStemsDone++;
            if (_energyStemsDone >= _energyStemsTotal) {
              let maxVal = 0;
              for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }
              if (maxVal > 0) for (let j = 0; j < songEnergyMap.length; j++) songEnergyMap[j] /= maxVal;

              tryFinalize();
            }
          }
          _iosLoaded++;
          songLoadProgress = _iosLoaded;
          if (_iosLoaded === stemCount) {
            usingStemMode = true;
            updateSongDurationFromAudio();
            onAllLoaded();
          }
        }, () => { console.warn('iOS decodeAudioData failed:', path); });
      }).catch(()=>{});
    }
    // нғҖмһ„м•„мӣғ 30мҙҲ (iOS лҠҗлҰ° л„ӨнҠёмӣҢнҒ¬ лҢҖмқ‘). finishLoading м—җм„ң buffer м—Ҷмңјл©ҙ м¶”к°Җ 20мҙҲ мһ¬мӢңлҸ„.
    setTimeout(() => { if (songLoading) { songLoadProgress = songLoadTotal; _energyReady = true; onAllLoaded(); } }, 30000);
  } else if (curSong.stemDir && stemCount > 0) {
    let loaded = 0, failed = 0;
    pulseStemAudios = [];
    for (let i = 0; i < stemCount; i++) {
      const path = assetUrl(curSong.stemDir + curSong.stemPrefix + '_' + stemNames[i] + '.ogg');

      a.play().catch(()=>{}); // мӮ¬мҡ©мһҗ м ңмҠӨмІҳ м»Ён…ҚмҠӨнҠём—җм„ң мҰүмӢң play (autoplay policy мҡ°нҡҢ)
      allStemAudios.push(a);

      if (actx) {

          const _dTs2 = performance.now();
          actx.decodeAudioData(buf, buffer => {

              const dur = performance.now() - _dTs2;

            }
            stemAudioBuffers[_si] = buffer;
            if (_isEnergyStem) {
              if (!ALWAYS_AUDIBLE_STEMS.includes(_si)) stemOnsetCache[_si] = detectOnsets(buffer);
              const data = buffer.getChannelData(0);
              const sr = buffer.sampleRate;
              const bigChunk = Math.floor(sr * 0.1);
              for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {
                let peak = 0;
                const end = Math.min(j + bigChunk, data.length);
                for (let k = j; k < end; k += 4) { const v = Math.abs(data[k]); if (v > peak) peak = v; }
                if (peak > 0.01) { stemFirstSoundTime[_si] = j / sr; break; }
              }
              const winSize = Math.floor(sr * 0.5);
              const mapLen = Math.ceil(data.length / winSize);
              if (!songEnergyMap || songEnergyMap.length < mapLen) songEnergyMap = new Float32Array(mapLen);
              for (let w = 0; w < mapLen; w++) {
                let sum = 0;
                const s0 = w * winSize, s1 = Math.min(s0 + winSize, data.length);
                for (let k = s0; k < s1; k += 8) sum += data[k] * data[k];
                songEnergyMap[w] += Math.sqrt(sum / ((s1 - s0) / 8));
              }
              _energyStemsDone++;
              if (_energyStemsDone >= _energyStemsTotal) {
                let maxVal = 0;
                for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }
                if (maxVal > 0) for (let j = 0; j < songEnergyMap.length; j++) songEnergyMap[j] /= maxVal;
                _energyReady = true;
                tryFinalize();
              }
            }
          });
        }).catch(()=>{});
      }
      const _onStemReady = () => {
        if (a._stemLoaded) return; a._stemLoaded = true;
        loaded++;
        songLoadProgress = loaded;
        if (loaded === stemCount) {
          usingStemMode = true;
          updateSongDurationFromAudio();
          onAllLoaded();
        }
      };
      a.addEventListener('canplaythrough', _onStemReady, { once: true });
      a.addEventListener('loadeddata', _onStemReady, { once: true }); // iOS нҸҙл°ұ

          for (let j = 0; j < allStemAudios.length; j++) {
            if (allStemAudios[j]) { allStemAudios[j].pause(); }
          }
          allStemAudios = [];
          songAudio = new Audio(assetUrl(curSong.file));
          songAudio.volume = 0;
          songAudio.preload = 'auto';
          songAudio.addEventListener('playing', function _m() { songAudio.volume = 0; songAudio.removeEventListener('playing', _m); });
          songAudio.play().catch(()=>{});
          songAudio.addEventListener('canplaythrough', () => {
            updateSongDurationFromAudio();
            songLoadProgress = songLoadTotal;
            onAllLoaded();
          }, { once: true });
        }
      }, { once: true });
    }
    // нғҖмһ„м•„мӣғ 30мҙҲ (лҠҗлҰ° л„ӨнҠёмӣҢнҒ¬ лҢҖмқ‘). finishLoading м—җм„ң buffer м—Ҷмңјл©ҙ м¶”к°Җ 20мҙҲ мһ¬мӢңлҸ„.
    setTimeout(() => { if (songLoading) { songLoadProgress = songLoadTotal; _energyReady = true; onAllLoaded(); } }, 30000);
  } else {
    _energyReady = true; // л№„мҠӨн…ңкіЎ: м—җл„Ҳм§Җ л¶„м„қ м—ҶмқҢ
    songAudio = new Audio(assetUrl(curSong.file));
    songAudio.volume = 0;
    songAudio.preload = 'auto';
    songAudio.addEventListener('playing', function _m() { songAudio.volume = 0; songAudio.removeEventListener('playing', _m); });
    songAudio.play().catch(()=>{});
    songAudio.addEventListener('canplaythrough', () => {
      updateSongDurationFromAudio();

// ===== UPDATE =====
function update(dt) {
  // мҳӨл””мҳӨ л””л°”мқҙмҠӨ ліҖкІҪ к°җм§Җ (мқҙм–ҙнҸ° л¶„лҰ¬, м „нҷ” мҲҳмӢ  л“ұ) вҖ” visibilitychange к°Җ м•Ҳ лңЁлҠ” мјҖмқҙмҠӨ
  // мҳӨл””мҳӨ л””л°”мқҙмҠӨ ліҖкІҪ к°җм§Җ + ліөкө¬
  if (state === 'playing' && actx) {
    const _curActxState = actx.state;
    if (!gamePaused) {
      // running вҶ’ suspended/interrupted м „нҷҳ вҖ” л°”лЎң pause н•ҳм§Җ л§җкі  500ms л””л°”мҡҙмҠӨ нӣ„ pause.
      //   лӘЁл°”мқј нҡҢм „(orientationchange) мӢң actx к°Җ мҲңк°„ suspend лҗҗлӢӨ мҰүмӢң ліөк·Җн•ҳлҠ” кІҪмҡ°к°Җ мһҲм–ҙм„ң
      //   мҰүмӢң pause н•ҳл©ҙ л…ёнҠёк°Җ л©Ҳм¶ҳ кІғмІҳлҹј ліҙмһ„. 500ms л„ҳкІҢ suspend мқҙл©ҙ м§„м§ң мқён„°лҹҪнҠёлЎң мІҳлҰ¬.
      if ((_curActxState === 'suspended' || _curActxState === 'interrupted') && _prevActxState === 'running') {
        _suspendStartAt = performance.now();
      }
      if ((_curActxState === 'suspended' || _curActxState === 'interrupted') && _suspendStartAt > 0 && performance.now() - _suspendStartAt > 500) {
        _audioInterrupted = true;
        pauseGame();
        _suspendStartAt = 0;
      }
      if (_curActxState === 'running') {
        _suspendStartAt = 0;
      }
    }
    // suspended/interrupted вҶ’ running м „нҷҳ мӢң (мқҙм–ҙнҸ° мһ¬м—°кІ°/нҡҢм „ мҷ„лЈҢ л“ұ) мҳӨл””мҳӨ мһ¬мӢңмһ‘ + мһҗлҸҷ resume
    if (_curActxState === 'running' && _prevActxState && _prevActxState !== 'running') {
      if (!gamePaused) _restartAudioAfterContextResume();
      else if (_audioInterrupted) { _audioInterrupted = false; resumeGame(); }
    }
    _prevActxState = _curActxState;
  }
  if (state === 'login' || state === 'title') updateShootingStars(dt);
  updateTitleBgmFade();  // нғҖмқҙнӢҖ BGM нҺҳмқҙл“ңм•„мӣғ polling (л§Ө н”„л Ҳмһ„)
  updateSelectScroll(dt);
  updateSelectArrowHold();
  updateSpeedHold();
  // Preview: start/switch when song selection changes in select state (л””л°”мҡҙмҠӨ)
  if (state === 'select' && actx) {
    if (previewSongIdx !== selectedSong || (!previewActive && !_previewDebounce)) {
      if (_previewDebounce) clearTimeout(_previewDebounce);
      const _target = selectedSong;
      previewSongIdx = selectedSong;
      _previewDebounce = setTimeout(function _tryPreview() {
        if (selectedSong !== _target) return;
        if (Math.abs(selectScrollVel) > 0.15 || selectTargetScrollX !== null) {
          // м•„м§Ғ мҠӨнҒ¬лЎӨ/мҠӨлғ… мӨ‘ вҶ’ 300ms нӣ„ мһ¬мӢңлҸ„
          _previewDebounce = setTimeout(_tryPreview, 300);
          return;
        }
        startPreview(_target);
        _previewDebounce = null;
      }, 750);
    }
    schedulePreview();
  } else if (previewActive) {
    stopPreview();
  }
  shakeX *= 0.82; shakeY *= 0.82;
  for (let i=0;i<laneCount;i++) keyFlash[i] = Math.max(0, keyFlash[i]-dt*2);
  if (judgmentTimer > 0) { judgmentTimer -= dt; if (judgmentTimer <= 0) judgmentPriority = 0; }
  if (fever && feverParticles.length < 40) {
    // Spawn side fire particles during fever
    for (let i = 0; i < 2; i++) {
      const side = Math.random() > 0.5 ? 0 : W;
      const col = `hsl(${Math.random()*60+20},100%,${55+Math.random()*35}%)`;
      feverParticles.push({ x: side + (Math.random()-0.5)*30, y: H * (0.3 + Math.random()*0.6),
        vx: (side === 0 ? 1 : -1) * (20+Math.random()*40), vy: -40-Math.random()*80,
        life: 0.5+Math.random()*0.5, maxLife: 1.0, color: col, size: 4+Math.random()*8 });
    }
  }
  if (feverFlash > 0) feverFlash -= dt * 1.5;
  // Update fever particles
  for (let i = feverParticles.length-1; i >= 0; i--) {
    const p = feverParticles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 60*dt; p.life -= dt;
    if (p.life <= 0) feverParticles.splice(i, 1);
  }
  if (playerAnim > 0) playerAnim = Math.max(0, playerAnim - dt);

          const allRecent = (window._dbg.lanePressLog || []).filter(e => now - e.t < 1200);
          const sameLaneTaps = allRecent.filter(e => e.lane === n.lane);
          const otherLaneTaps = allRecent.filter(e => e.lane !== n.lane && now - e.t < 300);
          const hadTap = sameLaneTaps.length > 0;
          const missedByMs = (gameTime - n.time) * 1000;  // л…ёнҠё м§ҖлӮң мӢңк°„ (ms)
          window._dbg.autoMissCount = (window._dbg.autoMissCount || 0) + 1;
          if (hadTap) window._dbg.suspiciousMissCount = (window._dbg.suspiciousMissCount || 0) + 1;
          // вҳ… нҷ•м • м”№нһҳ вҖ” нғӯмқҙ л…ёнҠё hit window м•Ҳм—җ мһҲм—ҲлҠ”лҚ° miss. мқҙкІҢ м§„м§ң лІ„к·ё.
          if (hadTap) {
            const _closest = sameLaneTaps[sameLaneTaps.length - 1];
            const _offMs = ((_closest.gt || 0) - n.time) * 1000;
            if (Math.abs(_offMs) <= windowMs) {
              window._dbg.confirmedMissCount = (window._dbg.confirmedMissCount || 0) + 1;
            }
          }
          try {
            let msg = '[AUTO_MISS] L' + n.lane + ' noteAt=' + n.time.toFixed(2) + 's missedBy=' + missedByMs.toFixed(0) + 'ms (window=Вұ' + windowMs.toFixed(0) + 'ms)';
            if (hadTap) {
              const closest = sameLaneTaps[sameLaneTaps.length - 1];
              const tapAgo = Math.round(now - closest.t);
              // вҳ… нғӯ мӢңм җ gameTime (gt) vs л…ёнҠё мӢңк°„ м§Ғм ‘ л№„көҗ вҖ” мңҲлҸ„мҡ° лӮҙ мҳҖлҠ”м§Җ нҢҗм •.
              const tapGt = closest.gt || 0;
              const offsetMs = (tapGt - n.time) * 1000;  // мқҢмҲҳ = л„Ҳл¬ҙ мқјм°Қ, м–‘мҲҳ = л„Ҳл¬ҙ лҠҰкІҢ
              const withinWindow = Math.abs(offsetMs) <= windowMs;
              const verdict = withinWindow ? 'рҹ”ҘWINDOWлӮҙ' : (Math.abs(offsetMs) > windowMs * 3 ? 'л„Ҳл¬ҙлЁјнғӯ' : 'мңҲлҸ„мҡ°л°–');
              msg += ' вҡ пёҸ L' + n.lane + 'нғӯ ' + sameLaneTaps.length + 'к°ң (мөңк·ј=' + tapAgo + 'msм „, offset=' + offsetMs.toFixed(0) + 'ms ' + verdict + ', src=' + (closest.src||'?') + ')';
              if (otherLaneTaps.length) {
                msg += ' | лӢӨлҘё lane: ' + otherLaneTaps.map(e => 'L' + e.lane + '@' + Math.round(now - e.t) + 'ms').join(',');
              }
            } else {
              msg += otherLaneTaps.length ? ' (лӢӨлҘё lane нғӯ ' + otherLaneTaps.length + 'к°ң: ' + otherLaneTaps.map(e => 'L' + e.lane + '@' + Math.round(now - e.t) + 'ms').join(',') + ')' : ' (нғӯ м—ҶмқҢ)';
            }
            console.log('%c' + msg, 'color:' + (hadTap ? '#ff3366;font-weight:bold' : '#888'));
          } catch(e){}
        }
        nanoMiss();
        combo = 0; missed++; fever = false; feverTimer = 0;
        if (!devInvincible && playMode === 'normal') gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain : 0.04));
        shakeX = (Math.random()-0.5)*8; shakeY = (Math.random()-0.5)*6;
        if (judgmentPriority < 2) { judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1; }
      }
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 250*dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Bursts
  for (let i = bursts.length-1; i >= 0; i--) {
    bursts[i].time += dt;
    if (bursts[i].time >= bursts[i].maxTime) bursts.splice(i, 1);
  }
  // Hold glows
  for (let i = holdGlows.length-1; i >= 0; i--) {
    holdGlows[i].time += dt;
    if (holdGlows[i].time >= holdGlows[i].maxTime) holdGlows.splice(i, 1);
  }

  // н”„лҰ¬мҠӨнғҖмқј: HP кІҢмһ„мҳӨлІ„ м—ҶмқҢ. кіЎ мў…лЈҢлЎңл§Ң result м „нҷҳ
  const gameoverByHP = playMode === 'normal' && gauge <= 0;
  if ((gameoverByHP || gameTime >= songDuration) && state === 'playing' && fadeDir === 0) {
    state = 'ending';
    fadeOutSongAudio(1.0);
    // м җмҲҳ м •к·ңнҷ”: л§Ңм җ 100л§Ңм җ кё°мӨҖ
    const _rawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
    const _normalizedScore = Math.round(score / _rawMax * 1000000);
    if (playMode === 'normal') {
      saveScore(curSongIdx, selectedDiff, _normalizedScore);
      checkAndAwardAchievements();
    }
    transitionTo('result');
  }
}

function renderBackplate() {

  //   HP/л°°мҶҚ м»Ён…Ңмқҙл„ҲлҠ” renderUI м—җм„ң лҸ…лҰҪ л ҢлҚ”. мҷёкіҪ н”„л Ҳмһ„мқҖ л Ҳмқё мҳҒм—ӯ м „мҡ©.

  }

}

    ctx.beginPath();
    ctx.moveTo(outerX + cornerR, outerY);
    ctx.quadraticCurveTo(outerX, outerY, outerX, outerY + cornerR);
    ctx.lineTo(outerX, outerB);

  for (let i = 0; i < laneCount; i++) {

      if (!_drewNote) {

        ctx.fillRect(sx-nw+_sz2, sy-nh+_sz2, _sz8, _sz6);
        ctx.globalAlpha=1;
        ctx.fillStyle='#fff'; ctx.font=`bold ${_sz11}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('\u266A', sx, sy+1);
      }
    }
  }

  // Missed flash вҖ” мөңк·јм—җ missed лҗң л…ёнҠёл§Ң ліҙмқҙлҠ” fade кө¬к°„. nodeScanStart л¶Җн„° м—ӯл°©н–Ҙ мҠӨмә”.
  // лҜёмҠӨ м»· мӢңм җ: sy = hitY вҶ’ n.time = gameTime. sy > hitY + _s80 (нҷ”л©ҙ н•ҳлӢЁ лІ—м–ҙлӮЁ) л©ҙ лҚ” мқҙмғҒ ліј кІғ м—ҶмқҢ.
  const _visTimeCut = _s80 / noteSpeed; // мқҙл§ҢнҒј мӢңк°„ м „ кіјкұ° л…ёнҠёл§Ң мң нҡЁ
  for (let i = nodeScanStart - 1; i >= 0; i--) {
    const n = nodes[i];
    if (gameTime - n.time > _visTimeCut) break; // л„Ҳл¬ҙ кіјкұ° вҖ” мқҙм „мқҖ м „л¶Җ нҷ”л©ҙ л°–
    if (!n.missed || n.type === 'trap') continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < hitY || sy > hitY + _s80) continue;
    const sx = getLaneX(n.lane);
    const fade = 1 - (sy - hitY) / _s80;
    if (fade > 0) {
      ctx.globalAlpha = fade*0.6; ctx.fillStyle='#ff4444';
      ctx.font=`bold ${sz(12)}px sans-serif`; ctx.textAlign='center';
      ctx.fillText('MISS', sx, sy-sz(15)); ctx.globalAlpha=1;
    }
  }
}

function renderButtons() {
  const lw = getLaneW(), lsx = getLaneStartX(), by = getBtnY(), bh = getBtnH();
  // н…Ңл‘җлҰ¬/мқҙлҜём§Җ кІ№м№Ё л°©м§Җ вҖ” л Ҳмқё к°„ padding sz(3) мңјлЎң лҠҳл Ө лІ„нҠјкіј мҷёкіҪ н”„л Ҳмһ„/л Ҳмқё divider мӮ¬мқҙ м—¬л°ұ нҷ•ліҙ.
  const _pad = sz(3), _r = sz(8);

  for (let i = 0; i < laneCount; i++) {
    const bx = lsx + i * lw;
    const held = keyHeld[i];
    const col = LANE_COLORS[i];
    const x = bx + _pad, y = by + _pad, w = lw - _pad*2, h = bh - _pad;

    // л¶ҲнҲ¬лӘ… м–ҙл‘җмҡҙ л°°кІҪ (кіөнҶө)
    ctx.fillStyle = 'rgba(8,6,18,0.95)';
    rrFill(x, y, w, h, _r);

    if (held) {
      // ===== лҲҢлҰј вҖ” PC/лӘЁл°”мқј нҶөмқј (лӘЁл°”мқј л””мһҗмқё) =====
      ctx.fillStyle = col + '44';
      rrFill(x, y, w, h, _r);
      ctx.fillStyle = col + 'cc';
      ctx.fillRect(x + _r, y, w - _r*2, sz(3));
      ctx.strokeStyle = col + 'bb'; ctx.lineWidth = 2;
      rrStroke(x, y, w, h, _r);
    } else {
      // ===== кё°ліё (лҢҖкё°) вҖ” PC/лӘЁл°”мқј нҶөмқј (лӘЁл°”мқј л””мһҗмқё) =====
      ctx.fillStyle = col + '55';
      ctx.fillRect(x + _r, y + 1, w - _r*2, sz(2));
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      rrStroke(x, y, w, h, _r);
    }

    // л№Ҳ мһ…л Ҙ н”ҢлһҳмӢң (л…ёнҠё м—Ҷмқҙ лҲҢл ёмқ„ л•Ң л№Ёк°„ к№ңл°•)
    const _efAge = performance.now() - _lastEmptyFlash[i];
    if (_efAge < 200) {
      const _efA = 0.6 * (1 - _efAge / 200);
      ctx.fillStyle = `rgba(255,50,50,${_efA})`;
      rrFill(x, y, w, h, _r);
      ctx.strokeStyle = `rgba(255,80,80,${_efA})`; ctx.lineWidth = 2;
      rrStroke(x, y, w, h, _r);
    }

    // Label вҖ” PC л§Ң
    if (!isMobile) {
      ctx.font = `bold ${sz(16)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = held ? '#fff' : col + '55';
      ctx.fillText(getLaneLabel(i), bx + lw/2, by + bh / 2);
    }
  }
}

function rrFill(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function rrStroke(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function renderCharacter() {}

// вҳ… нһҲнҠё мқҙнҺҷнҠё мҠӨнӮЁ нҷңм„ұ м—¬л¶Җ + нӮӨлі„ лЎңл“ңлҗң мқҙлҜём§Җ л§ө л°ҳнҷҳ.
//   лӮұк°ң PNG л°©мӢқ вҖ” skin.imagePaths мқҳ к°Ғ key к°Җ кі§ мқҙлҜём§Җ мӢқлі„мһҗ. н•ҳлӮҳлқјлҸ„ лЎңл“ңлҗҳм§Җ
//   м•Ҡм•ҳмңјл©ҙ к·ё key лҠ” undefined лЎң л№ м§җ вҶ’ л ҢлҚ” мӘҪм—җм„ң optional chaining мңјлЎң мІҳлҰ¬.
function _hitFxData() {
  if (!currentHitFxSkin) return null;
  const s = SKINS[currentHitFxSkin];
  if (!s || !s.imagePaths) return null;
  const imgs = {};
  let anyLoaded = false;
  for (const k in s.imagePaths) {
    const img = skinImages[s.imagePaths[k]];
    if (img && img._ok) { imgs[k] = img; anyLoaded = true; }
  }
  if (!anyLoaded) return null;
  return { skin: s, imgs };
}
// вҳ… л¶Җл¶„ мқҙлҜём§Җ н—¬нҚј вҖ” key м°ҫкі  мһҲмңјл©ҙ drawImage м „мІҙ, м—Ҷмңјл©ҙ false
function _hitFxDraw(fx, key, dx, dy, dw, dh) {
  const img = fx && fx.imgs[key];
  if (!img) return false;
  ctx.drawImage(img, dx, dy, dw, dh);
  return true;
}

function renderParticles() {
  const fx = _hitFxData();
  for (const p of particles) {
    const lifeRatio = Math.max(0, p.life/p.maxLife);
    ctx.globalAlpha = lifeRatio;
    if (p.sprite && fx) {
      const img = fx.imgs[p.spriteKey];
      if (img) {
        const s = p.size * (0.6 + 0.4 * lifeRatio);
        ctx.save();
        ctx.translate(p.x, p.y);
        if (p.rotVel !== undefined) ctx.rotate((p.rot || 0) + p.rotVel * (p.maxLife - p.life));
        ctx.drawImage(img, -s/2, -s/2, s, s);
        ctx.restore();
        continue;
      }
    }
    ctx.fillStyle = p.color;
    const s = p.size * lifeRatio;
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

function renderBursts() {
  const fx = _hitFxData();
  for (const b of bursts) {
    const t = b.time / b.maxTime;
    const alpha = 1 - t;
    ctx.save();
    ctx.translate(b.x, b.y);

    if (fx) {
      // вҳ… лІҡкҪғ sprite лІ„мҠӨнҠё вҖ” л§Ғ 2к°ң(н•‘нҒ¬+кёҲ) + мҪ”м–ҙ н”ҢлһҳмӢң + мҠӨнҢҢнҒҙ л°©мӮ¬
      //   к°Ғ key мқҙлҜём§Җ м—Ҷмңјл©ҙ н•ҙлӢ№ мҡ”мҶҢл§Ң мҠӨнӮө (мқјл¶Җл§Ң мҳ¬лқјмҷҖлҸ„ м җм§„м Ғ лҸҷмһ‘).
      for (let r = 0; r < 2; r++) {
        const delay = r * 0.1;
        const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
        if (rt <= 0 || rt >= 1) continue;
        // вҳ… л§Ғ нҒ¬кё° лҢҖнҸӯ м¶•мҶҢ вҖ” 558 вҶ’ 279 вҶ’ 180 вҶ’ 100 (мң м Җ лӯүк°ңм§җ м§ҖмҶҚ н”јл“ңл°ұ).
        //   Gemini л§Ғ PNG к°Җ ліёлһҳ л‘җк»ҚкІҢ к·ёл Өм ё нҒ¬кІҢ л ҢлҚ”н• мҲҳлЎқ н•‘нҒ¬ лё”лЎӯ мІҳлҹј лӯүк°ңм§җ.
        //   мһ‘кІҢ к·ёлҰ¬л©ҙ м–ҮмқҖ л§Ғ лҠҗлӮҢмқҙ мӮҙм•„лӮЁ.
        const size = (14 + r * 8 + rt * 32) * b.size;
        const ringImg = r === 0 ? fx.imgs.ringPink : fx.imgs.ringGold;
        if (!ringImg) continue;
        ctx.globalAlpha = (1 - rt) * 0.9;
        ctx.drawImage(ringImg, -size/2, -size/2, size, size);
      }
      if (t < 0.45 && fx.imgs.coreFlash) {
        const ft = t / 0.45;
        const flashSize = (40 + ft * 80) * b.size;
        ctx.globalAlpha = (1 - ft);
        ctx.drawImage(fx.imgs.coreFlash, -flashSize/2, -flashSize/2, flashSize, flashSize);
      }
      if (fx.imgs.sparkle) {
        const sparkCount = Math.max(4, Math.floor(b.sparks * 0.5));
        for (let i = 0; i < sparkCount; i++) {
          const a = Math.PI * 2 * i / sparkCount + t * 0.8;
          const dist = (20 + 80 * t) * b.size;
          const sx = Math.cos(a) * dist;
          const sy = Math.sin(a) * dist;
          const ss = (22 + (i * 7) % 14) * (1 - t) * b.size;
          ctx.globalAlpha = alpha * 0.95;
          ctx.drawImage(fx.imgs.sparkle, sx - ss/2, sy - ss/2, ss, ss);
        }
      }
      ctx.restore();
      continue;
    }

    // Expanding rings with thickness
    for (let r = 0; r < b.rings; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
      if (rt <= 0 || rt >= 1) continue;
      const radius = (25 + r * 25) * rt * b.size;
      const ringAlpha = (1 - rt) * 0.85;
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = r % 2 === 0 ? b.color1 : b.color2;
      ctx.lineWidth = (5 - r * 0.6) * (1 - rt) * b.size;
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
    }

    // Big center flash / shockwave
    if (t < 0.4) {
      const ft = t / 0.4;
      const flashR = 50 * b.size * ft;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, flashR);
      grd.addColorStop(0, '#ffffff');
      grd.addColorStop(0.3, b.color2);
      grd.addColorStop(1, b.color1 + '00');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0, 0, flashR, 0, Math.PI * 2); ctx.fill();
    }

    // Streaking rays
    const rayCount = Math.floor(b.sparks * 0.5);
    for (let i = 0; i < rayCount; i++) {
      const a = Math.PI * 2 * i / rayCount;
      const dist = (30 + 100 * t) * b.size;
      const len = (15 + 20 * (1 - t)) * b.size;
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = b.color2;
      ctx.lineWidth = 2 * (1 - t) * b.size;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * (dist - len), Math.sin(a) * (dist - len));
      ctx.lineTo(Math.cos(a) * dist, Math.sin(a) * dist);
      ctx.stroke();
    }

    // Diamond sparks radiating outward
    const sparkCount = Math.floor(b.sparks * 0.7);
    for (let i = 0; i < sparkCount; i++) {
      const a = Math.PI * 2 * i / sparkCount + t * 0.5;
      const dist = (20 + 90 * t) * b.size;
      const sx = Math.cos(a) * dist;
      const sy = Math.sin(a) * dist;
      const ss = (4 + Math.random() * 3) * (1 - t) * b.size;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = i % 2 === 0 ? b.color2 : b.color1;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a + t * 3);
      ctx.fillRect(-ss/2, -ss/2, ss, ss);
      ctx.restore();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderHoldGlows() {
  const fx = _hitFxData();
  for (const g of holdGlows) {
    const t = g.time / g.maxTime;
    const alpha = (1 - t);
    const hw = g.w / 2;
    ctx.save();
    ctx.translate(g.x, g.y);

    if (fx && fx.imgs.holdLineGlow) {
      // вҳ… лІҡкҪғ лқјмқё кёҖлЎңмҡ° sprite вҖ” нҢҗм •м„  мң„м—җ мҶҢн”„нҠё л№ӣ л°”
      const w = hw * 2 * (1.4 + t * 0.9);
      const h = _s40 * (1 - t * 0.25);
      ctx.globalAlpha = alpha * 0.9;
      ctx.drawImage(fx.imgs.holdLineGlow, -w/2, -h/2, w, h);
      ctx.restore();
      continue;
    }

    // Large fire glow expanding upward
    const glowH = _s90 * (0.4 + t * 0.6);
    ctx.globalAlpha = alpha * 0.7;
    const grd = ctx.createRadialGradient(0, -glowH*0.2, 0, 0, -glowH*0.3, hw * (1.2 + t));
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.2, g.color);
    grd.addColorStop(0.6, g.color + '88');
    grd.addColorStop(1, g.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -glowH * 0.25, hw * (1.3 + t * 0.8), glowH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core
    ctx.globalAlpha = alpha * 0.9;
    const coreGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 0.6);
    coreGrd.addColorStop(0, '#ffffff');
    coreGrd.addColorStop(1, '#ffffff00');
    ctx.fillStyle = coreGrd;
    ctx.beginPath();
    ctx.ellipse(0, -5, hw * 0.6, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Horizontal shockwave line
    const lineW = hw * (1.5 + t * 1.5);
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(-lineW, 0);
    ctx.lineTo(lineW, 0);
    ctx.stroke();

    // Side flare streaks
    ctx.globalAlpha = alpha * 0.5;
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2 * (1 - t);
    for (let s = -1; s <= 1; s += 2) {
      ctx.beginPath();
      ctx.moveTo(s * hw * 0.5, 0);
      ctx.lineTo(s * lineW * 1.2, -20 - 30 * t);
      ctx.stroke();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderJudgment() {
  if (judgmentTimer <= 0) return;
  const scale = Math.max(0.8, 1 + (0.5 - judgmentTimer)*0.3);
  ctx.save();
  ctx.translate(W/2, getHitY() - _s40);
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, judgmentTimer*3);
  ctx.font = `bold ${sz(22)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle = judgmentColor;
  if (!isMobile) { ctx.shadowColor=judgmentColor; ctx.shadowBlur=10; }
  ctx.fillText(judgmentText, 0, 0);
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
}

function renderUI() {
  const song = curSong;
  // HP л°” / мҶҚлҸ„ м»ЁнҠёлЎӨ кё°мӨҖ мўҢн‘ң (н”„лҰ¬мҠӨнғҖмқјм—җм„ңлҸ„ мҶҚлҸ„ м»ЁнҠёлЎӨ мӮ¬мҡ©)
  // HPл°”/мҶҚлҸ„ м»ЁнҠёлЎӨ: л Ҳмқё мҷјмӘҪ м»¬лҹјм—җ stack л°°м№ҳ (HP мң„, л°°мҶҚ л°”лЎң л°‘). м„ёлЎң мӨ‘м•ҷ м •л ¬.
  const gw = sz(12);
  const _spBtnSz = sz(26), _spGapSz = sz(3), _spPadSz = sz(3);
  const _spTotalH = _spBtnSz*3 + _spGapSz*2;
  const _spBlockH = _spTotalH + _spPadSz*2;
  const _gcx = Math.max(sz(2) + _spBtnSz/2, getLaneStartX() - sz(14) - _spBtnSz/2);
  const gx = _gcx - gw/2;
  // м„ёлЎң мӨ‘м•ҷ м •л ¬ stack вҖ” мӮ¬мҡ© к°ҖлҠҘ м„ёлЎң лІ”мң„ = мғҒлӢЁ м—¬мң  ~ нҢҗм •м„  мң„.
  const _colTop = -safeTop + sz(14);
  const _colBot = getHitY() - sz(8);
  const _colH = _colBot - _colTop;
  const _gapHpSp = sz(6);
  const gh = Math.max(sz(120), Math.min(sz(260), (_colH - _spBlockH - _gapHpSp) * 0.75));
  const _stackH = gh + _gapHpSp + _spBlockH;
  const gy = _colTop + Math.max(0, (_colH - _stackH) / 2);
  const _spBlockTop = gy + gh + _gapHpSp;
  const _spBlockBottom = _spBlockTop + _spBlockH;
  // === HP(м„ нғқ) + л°°мҶҚ кіөмң  м»Ён…Ңмқҙл„Ҳ вҖ” мҷјмӘҪл§Ң мӮ¬лӢӨлҰ¬кјҙ мәЎ, мҳӨлҘёмӘҪмқҖ мҷёкіҪ н”„л Ҳмһ„ мўҢмёЎ м„ кіј кіөмң  ===
  //   н”„лҰ¬мҠӨнғҖмқј: HP м—ҶмқҢ вҶ’ м»Ён…Ңмқҙл„ҲлҠ” л°°мҶҚ лё”лЎқл§Ң к°җмҢҲ. мҷёкіҪ н”„л Ҳмһ„кіј лҸҷмқјн•ң sz(7) н…Ңл‘җлҰ¬.
  //   вҳ… мҡ°мёЎ path лҘј outerX м—җ лӘ…мӢң кі м • вҶ’ _gcx к°Җ лӘЁл°”мқјм—җм„ң мҷјмӘҪ clamp м—җ кұёл ӨлҸ„ л Ҳмқјкіј н•ӯмғҒ flush.
  {
    const _bpPal = _backplatePalette();
    // вҳ… _contPadX = sz(10): м»Ён…Ңмқҙл„Ҳ body мўҢмёЎ м—Јм§ҖлҘј button мҷјмӘҪм—җм„ң sz(10) л–Ём–ҙм§ҖкІҢ л°°м№ҳ.
    //   button мқҙ container мқҳ мўҢ/мҡ° stroke мҷҖ лҸҷмқјн•ң sz(6.5) gap мңјлЎң мӨ‘м•ҷ м •л ¬лҗЁ.
    const _contPadX = sz(10);
    const _capH = sz(10);
    const _contCx = _gcx;
    const _bodyHalf = Math.max(gw, _spBtnSz) / 2 + _contPadX;
    const _capHalfL = _bodyHalf - sz(5);
    // мҷёкіҪ н”„л Ҳмһ„ мўҢмёЎ path x вҖ” renderBackplate мҷҖ лҸҷмқј мӮ°мӢқ (мҷ„м „ мқјм№ҳ н•„мҲҳ).
    const _rightEdgeX = Math.max(sz(3), getLaneStartX() - sz(6));
    // лӘЁл“ңлі„ body лІ”мң„: normal=HP мғҒлӢЁ~л°°мҶҚ н•ҳлӢЁ / freestyle=л°°мҶҚ мғҒлӢЁ~л°°мҶҚ н•ҳлӢЁ.
    const _bodyTopY = (playMode === 'normal') ? gy : _spBlockTop;
    const _bodyBotY = _spBlockBottom;
    const _contTopY = _bodyTopY - _capH;
    const _contBotY = _bodyBotY + _capH;
    // вҳ… мғҒ/н•ҳлӢЁ кјӯм§Җм җм—җм„ң л Ҳмқј н…Ңл‘җлҰ¬к№Ңм§Җ лҢҖк°Ғм„  wedge вҖ” cap vertex м—җм„ң outerX мқҳ

function handleSettingsClick(mx, my) {
  // Kplay м—°лҸҷ/м „нҷҳ нҢқм—… м ңкұ°лҗЁ (2026-04-15)
  // кі„м • мӮӯм ң нҢқм—…мқҙ м—ҙл ӨмһҲмңјл©ҙ мөңмҡ°м„  мІҳлҰ¬
  if (deleteAccountPopup) {
    const dpW = Math.min(sz(300), W * 0.85), dpH = sz(180);
    const dpX = (W - dpW) / 2, dpY = (H - dpH) / 2;
    const dbW = sz(90), dbH = sz(34), dbGap = sz(14);
    const dcX = W / 2 - dbW - dbGap / 2, ddX = W / 2 + dbGap / 2;
    const dbY = dpY + dpH - sz(50);
    if (hitTest(mx, my, dcX, dbY, dbW, dbH)) { deleteAccountPopup = false; return; }
    if (hitTest(mx, my, ddX, dbY, dbW, dbH)) { deleteAccount(); return; }
    return;
  }
  const popW = Math.min(sz(340), W*0.92), popH = Math.min(H*0.94, sz(620));
  const popX = (W - popW) / 2, popY = (H - popH) / 2;
  if (!hitTest(mx, my, popX, popY, popW, popH)) { settingsOpen = false; settingsBindingLane = -1; deleteAccountPopup = false; return; }
  // лӢ«кё° лІ„нҠј
  const bbW = sz(30), bbH = sz(24), bbX = popX + popW - bbW - sz(6), bbY = popY + sz(6);
  if (hitTest(mx, my, bbX, bbY, bbW, bbH)) { settingsOpen = false; settingsBindingLane = -1; deleteAccountPopup = false; return; }

  // мҠӨнҒ¬лЎӨ мҳҒм—ӯ лӮҙл¶ҖлҠ” my + scrollY мӮ¬мҡ©
  const mys = my + settingsScrollY;

  // нғҖмқҙнӢҖ нҷ”л©ҙмңјлЎң лҸҢм•„к°Җкё° (лӘЁл“ң ліҖкІҪ)
  if (window._settingsTitleBtn) {
    const tb = window._settingsTitleBtn;
    if (hitTest(mx, mys, tb.x, tb.y, tb.w, tb.h)) {
      settingsOpen = false; settingsBindingLane = -1;
      stopSongAudio(); stopPreview(); stopRankingBgm(); stopShopBgm(); stopAchievementBgm(); stopInventoryBgm();
      transitionTo('title', () => { startTitleBgm(); });
      return;
    }
  }

  // кІҢмһ„ лӘЁл“ң нҶ кёҖ
  if (window._modeBtnRhythm && hitTest(mx, mys, _modeBtnRhythm.x, _modeBtnRhythm.y, _modeBtnRhythm.w, _modeBtnRhythm.h)) {
    gameMode = 'rhythm'; saveGameMode(); return;
  }
  if (window._modeBtnNano && hitTest(mx, mys, _modeBtnNano.x, _modeBtnNano.y, _modeBtnNano.w, _modeBtnNano.h)) {
    gameMode = 'nano'; saveGameMode(); return;
  }

  // 4~8нӮӨ лӘЁл“ң нҶ кёҖ (PCл§Ң)
  const modeY = popY + sz(58);
  const modeBtnH = sz(26);
  if (!isMobile) {
    const modeKeys = [4, 5, 6, 7, 8];
    const modeBtnW = sz(40), modeGap = sz(6);
    const modeTotalW = modeBtnW * modeKeys.length + modeGap * (modeKeys.length - 1);
    const modeX = (W - modeTotalW) / 2;
    for (let mi = 0; mi < modeKeys.length; mi++) {
      const bx = modeX + mi * (modeBtnW + modeGap);
      if (hitTest(mx, mys, bx, modeY, modeBtnW, modeBtnH) && laneCount !== modeKeys[mi]) {
        setLaneMode(modeKeys[mi]); settingsBindingLane = -1; return;
      }
    }
  }

  const panelW = Math.min(popW - sz(20), sz(300));
  const panelX = (W - panelW) / 2;
  const rowH = sz(laneCount >= 7 ? 32 : laneCount >= 6 ? 36 : 42);
  const startY = modeY + modeBtnH + sz(12);

  const _mobileSettingsC = isMobile;
  // нӮӨ лІ„нҠј нҒҙлҰӯ (лӘЁл°”мқјм—җм„ңлҠ” мҲЁк№Җ)
  if (!_mobileSettingsC) for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const kbW = Math.min(sz(90), panelW * 0.3), kbH = sz(28);
    const kbX = panelX + panelW - kbW - sz(8), kbY = ry + (rowH - sz(4) - kbH) / 2;
    if (hitTest(mx, mys, kbX, kbY, kbW, kbH)) {
      settingsBindingLane = (settingsBindingLane === i) ? -1 : i;
      return;
    }
  }

  // мҙҲкё°нҷ” лІ„нҠј
  const resetY = startY + laneCount * rowH + sz(10);
  const resetW = Math.min(sz(120), panelW * 0.4), resetH = sz(30);
  const resetX = (W - resetW) / 2;
  if (!_mobileSettingsC && hitTest(mx, mys, resetX, resetY, resetW, resetH)) {
    resetKeymap(); settingsBindingLane = -1; return;
  }

  // ліјлҘЁ мҠ¬лқјмқҙлҚ”
  const sliderW = Math.min(panelW - sz(16), sz(240));
  const sliderX = (W - sliderW) / 2;
  const volY = _mobileSettingsC ? (modeY + sz(6)) : (resetY + resetH + sz(14));
  const volRowH = sz(38), sliderHitH = sz(26);
  const bgmTrackY = volY + sz(20);
  const sfxTrackY = volY + volRowH + sz(20);
  if (mys >= bgmTrackY - sliderHitH/2 && mys <= bgmTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'bgm';
    volBgm = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applyBgmVol(); saveVolSettings(); return;
  }
  if (mys >= sfxTrackY - sliderHitH/2 && mys <= sfxTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'sfx';
    volSfx = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applySfxVol(); saveVolSettings(); return;
  }

  // кі„м • м •ліҙ л°•мҠӨ + лІ„нҠј (renderмҷҖ лҸҷмқјн•ң Y мІҙмқё)
  const sfxY_click = volY + volRowH;
  const gameModeY_click = sfxY_click + volRowH + sz(8);
  const gmBtnY_click = gameModeY_click + sz(14);
  const gmBtnH_click = sz(28);
  const acctY_click = gmBtnY_click + gmBtnH_click + sz(24);
  const acctBoxH = sz(50);
  const actY = acctY_click + acctBoxH + sz(8);
  const actBtnW = Math.min(sz(110), panelW * 0.35), actBtnH = sz(30), actGap = sz(10);
  {
    // Kplay: лЎңк·ём•„мӣғ + кі„м • мӮӯм ң
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    if (hitTest(mx, mys, actStartX, actY, actBtnW, actBtnH)) { logoutUser(); return; }
    const delX = actStartX + actBtnW + actGap;
    if (hitTest(mx, mys, delX, actY, actBtnW, actBtnH)) { deleteAccountPopup = true; return; }
  }
}

let titleParticles = [];
function spawnTitleParticles() {
  const now = Date.now();
  // Ambient floating particles вҖ” м•Ҳм „ мҳҒм—ӯ нҸ¬н•Ё м „мІҙ нҷ”л©ҙм—җм„ң л°ңмғқ/мқҙлҸҷ
  if (titleParticles.length < 40) {
    const hue = 240 + Math.random() * 80; // blue-purple range
    titleParticles.push({
      x: Math.random() * W, y: H + safeBottom + 10,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.3 + Math.random() * 0.8),
      size: 2 + Math.random() * 4,
      life: 1, decay: 0.002 + Math.random() * 0.003,
      hue, sat: 60 + Math.random() * 40, lit: 60 + Math.random() * 30,
      type: 'float'
    });
  }
  // Sparkle bursts from center
  if (Math.random() < 0.15) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    const hue = 260 + Math.random() * 60;
    titleParticles.push({
      x: W/2 + (Math.random()-0.5) * W * 0.3,
      y: H * 0.35 + (Math.random()-0.5) * 40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 1 + Math.random() * 2.5,
      life: 1, decay: 0.015 + Math.random() * 0.01,
      hue, sat: 80, lit: 70 + Math.random() * 20,
      type: 'spark'
    });
  }
}
function updateTitleParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.type === 'float') { p.vx += (Math.random() - 0.5) * 0.05; }
    if (p.life <= 0 || p.y < -safeTop - 20) { titleParticles.splice(i, 1); }
  }
}
