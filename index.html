<script>
// ★ 빌드 타임스탬프 — 매 index.html 업데이트 시 자동 증가. 업데이트 감지용.
// diag: gamble revert + 업데이트 감지 진단 강화 (__BUILD_TS 선곡화면 노출)
window.__BUILD_TS = 20260424044100;
// ★ Firebase goOffline 부작용 — 인게임 진입 시 fbDb.goOffline() 호출하면 in-flight 중이던
//   .set()/.once() Promise 들이 "Error: disconnect" 로 reject. 모두 fire-and-forget (결과 무관)
//   이라 의도된 현상이지만 .catch 없이 쏘고 있어 "Uncaught (in promise)" 경고 스팸 발생.
//   전역 handler 로 이 패턴만 swallow (다른 진짜 에러는 그대로 propagate).
window.addEventListener('unhandledrejection', (e) => {
  const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
  if (msg === 'disconnect' || msg.toLowerCase().includes('disconnect')) e.preventDefault();
});
// ★ Debug mode — 3가지 활성화 경로 (kplay 임베드에선 URL 수정 불가라 제스처 필수):
//   1) URL: ?debug=1
//   2) localStorage: rhythm_debug='1' (한번 켜면 영구)
//   3) 타이틀 화면 좌상단 80×80 영역 2초 이내 7회 탭 → 토글 (모바일/iframe)
//   활성화 시 window._dbg 세팅 + vConsole(원격 console) 주입.
function _activateDebug() {
  if (window._dbg) return;
  window._dbg = {
    lastLanePressAt: {}, lanePressLog: [], doubleHitCount: {},
    loadEvents: [], notes: [],
    touchMarkers: [],
    frameGapLog: [],
    _lastFrameAt: 0,
    perfEntries: [],   // { name, durMs, t } — 최근 3초. SLOW_FRAME 시 덤프용.
  };
  // _measure: 구간 타이밍 기록. 게임 로직 영향 0 (fn 호출만 timing 감쌈).
  window._measure = function(name, fn) {
    if (!window._dbg) return fn();
    const s = performance.now();
    const r = fn();
    const d = performance.now() - s;
    if (d >= 0.3) {  // 0.3ms 이상 기록 (작은 구간 합쳐지면 큰 비중)
      window._dbg.perfEntries.push({ name, durMs: d, t: s });
      const cutoff = performance.now() - 3000;
      while (window._dbg.perfEntries.length && window._dbg.perfEntries[0].t < cutoff) {
        window._dbg.perfEntries.shift();
      }
    }
    return r;
  };
  // PerformanceObserver longtask — 메인 스레드 50ms+ 블록 자동 캡쳐 (script/rendering 분류).
  //   Safari 는 부분 지원. 지원 안 되면 무시 (try/catch).
  try {
    if (typeof PerformanceObserver !== 'undefined') {
      const po = new PerformanceObserver(list => {
        for (const entry of list.getEntries()) {
          if (entry.duration >= 50) {
            try { console.log('%c[LONGTASK] ' + entry.duration.toFixed(0) + 'ms name=' + (entry.name || '?'), 'color:#ff4488;font-weight:bold'); } catch(e){}
          }
        }
      });
      po.observe({ entryTypes: ['longtask'] });
      window._dbg._po = po;
    }
  } catch(e) {}
  window._dbgLog = function(label) {
    if (!window._dbg) return;
    _dbg.loadEvents.push({ t: Math.round(performance.now()), label });
    if (_dbg.loadEvents.length > 50) _dbg.loadEvents.shift();
  };
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js';
  s.onload = () => {
    try {
      window._vc = new window.VConsole();
      window._dbg._vcLoaded = true;
      // ★ API: setSwitchPosition(right_px, bottom_px). right=우측 edge, bottom=아래 edge 기준.
      //   우측 중간 높이: right=8, bottom=innerHeight*0.5. 레인 탭 영역(하단) 안 가림.
      try { window._vc.setSwitchPosition(8, Math.round(window.innerHeight * 0.5)); } catch(e){}
    } catch(e) { window._dbg._vcError = e.message; }
  };
  s.onerror = () => { if (window._dbg) window._dbg._vcError = 'vConsole 스크립트 로드 실패 (네트워크/CSP)'; };
  document.head.appendChild(s);
}
// ★ vConsole DOM 내부 탭은 게임 input 에서 무시 — 게임 쪽 핸들러들이 각자 이 헬퍼로 체크.
//   (stopPropagation 금지: vConsole 자체 클릭 핸들러까지 막아버려 버튼이 안 눌림.)
window._isVcEvent = function(e) {
  const t = e && e.target;
  if (!t || !t.closest) return false;
  return !!(t.closest('#__vconsole') || t.closest('.vc-switch') || t.closest('.vc-mask') || t.closest('.vc-panel'));
};
// ★ 시각 터치 마커 — 의심 지점 전부 커버.
//   (1) 고정 overlay container 1개 (#__touchdbg) 최상위 body 에. stacking 보장.
//   (2) 이벤트는 window + document + canvas 3곳 전부 listen — 하나 드롭돼도 다른 경로.
//   (3) _dbg 검사 대신 URL/localStorage 플래그 직접 체크 — 활성화 타이밍 레이스 제거.
//   (4) CSS transition 대신 rAF 수동 애니메이션 — iOS transition 불안정 회피.
//   (5) 매 마커 생성 시 vConsole console.log — DOM 실패해도 로그는 남음.
(function(){
  function _dbgActive() {
    if (window._dbg) return true;
    try {
      if (new URLSearchParams(location.search).get('debug') === '1') return true;
      if (localStorage.getItem('rhythm_debug') === '1') return true;
    } catch(e) {}
    return false;
  }
  let container = null;
  function _ensureContainer() {
    if (container && document.body && document.body.contains(container)) return container;
    container = document.createElement('div');
    container.id = '__touchdbg';
    container.style.cssText =
      'position:fixed;left:0;top:0;right:0;bottom:0;' +
      'pointer-events:none;' +
      'z-index:2147483647;' +
      'overflow:visible;';
    (document.body || document.documentElement).appendChild(container);
    return container;
  }
  window._showMarker = function(x, y, src) {
    try {
      if (!_dbgActive()) return;
      _ensureContainer();
      const d = document.createElement('div');
      const isT = src === 'touch';
      const bg = isT ? 'rgba(0,255,100,0.55)' : 'rgba(80,150,255,0.55)';
      const border = isT ? '#00ff66' : '#3aa8ff';
      d.style.cssText =
        'position:absolute;' +
        'left:' + (x - 18) + 'px;top:' + (y - 18) + 'px;' +
        'width:36px;height:36px;border-radius:50%;' +
        'background:' + bg + ';border:2px solid ' + border + ';' +
        'box-shadow:0 0 4px ' + border + ';' +
        'opacity:1;transform:scale(1);will-change:opacity,transform;' +
        'transition:opacity 300ms linear, transform 300ms linear;';
      container.appendChild(d);
      // CSS transition 트리거 — compositor thread 에서 처리 (메인 스레드 부하 0).
      //   rAF tick 루프 삭제: 매 프레임 JS 로 style 업데이트하던 것을 브라우저가 GPU로.
      requestAnimationFrame(() => {
        d.style.opacity = '0';
        d.style.transform = 'scale(1.3)';
      });
      setTimeout(() => { try { d.remove(); } catch(e){} }, 350);
      try { console.log('%c[MARK] ' + src + ' @(' + Math.round(x) + ',' + Math.round(y) + ')', 'color:' + border + ';font-weight:bold'); } catch(e){}
    } catch(e) {
      try { console.error('[MARK_ERR]', e && e.message); } catch(_){}
    }
  };
  function _fire(e, src) {
    if (window._isVcEvent && window._isVcEvent(e)) return;
    let x, y;
    if (src === 'touch') {
      const t = e.changedTouches && e.changedTouches[0];
      if (!t) return;
      x = t.clientX; y = t.clientY;
    } else {
      x = e.clientX; y = e.clientY;
    }
    window._showMarker(x, y, src);
  }
  function _attach(target) {
    if (!target || !target.addEventListener) return;
    try {
      target.addEventListener('touchstart', (e) => _fire(e, 'touch'), { passive: true, capture: true });
      target.addEventListener('pointerdown', (e) => _fire(e, 'pointer'), { capture: true });
    } catch(e) {}
  }
  // window 1곳에만 attach — capture 단계에서 모든 이벤트 catch 됨.
  //   이전: window+document+canvas 3중 → 이벤트당 [MARK] 3번 찍히고 DOM 3개 생성 (로그 스팸 + 부하).
  _attach(window);
})();
function _deactivateDebug() {
  window._dbg = null;
  try { if (window._vc) { window._vc.destroy(); window._vc = null; } } catch(e){}
  try { localStorage.removeItem('rhythm_debug'); } catch(e){}
}
// 콘솔 헬퍼 (desktop DevTools 용)
window.enableDebug  = function(){ try { localStorage.setItem('rhythm_debug','1'); } catch(e){} _activateDebug(); };
window.disableDebug = function(){ _deactivateDebug(); };
// 초기화: URL param OR localStorage flag
(function(){
  try {
    const p = new URLSearchParams(location.search);
    let on = (p.get('debug') === '1');
    try { if (localStorage.getItem('rhythm_debug') === '1') on = true; } catch(e){}
    if (on) _activateDebug();
  } catch(e) {}
})();
// 타이틀 좌상단 7탭 시크릿 제스처
(function(){
  const taps = [];
  function onTap(x, y) {
    if (x > 80 || y > 80) { taps.length = 0; return; }
    const now = performance.now();
    taps.push(now);
    while (taps.length && now - taps[0] > 2000) taps.shift();
    if (taps.length >= 7) {
      taps.length = 0;
      if (window._dbg) {
        _deactivateDebug();
        try { (window.showLoginToast || window.alert)('Debug OFF', '#ff6666'); } catch(e){}
      } else {
        try { localStorage.setItem('rhythm_debug','1'); } catch(e){}
        _activateDebug();
        try { (window.showLoginToast || window.alert)('Debug ON — vConsole 로딩', '#44dd66'); } catch(e){}
      }
    }
  }
  // 인게임 'playing' 상태만 제외 (노트 탭과 겹치면 오발 위험). 나머지(title/login/select/...) 전부 허용.
  const ALLOW_STATES = { title: 1, login: 1, select: 1, shop: 1, inventory: 1, ranking: 1, achievement: 1, result: 1 };
  function _dbgGestureOk() { return typeof state === 'undefined' || !!ALLOW_STATES[state]; }
  window.addEventListener('touchstart', (e) => {
    if (!_dbgGestureOk()) return;
    const t = e.changedTouches && e.changedTouches[0];
    if (t) onTap(t.clientX, t.clientY);
  }, { passive: true, capture: true });
  window.addEventListener('mousedown', (e) => {
    if (!_dbgGestureOk()) return;
    onTap(e.clientX, e.clientY);
  }, { capture: true });
})();
// ★ resumeAudio 탭당 오버헤드 제거 — audioSession 재설정 skip, applyBgmVol 변경시만
(function(){
  try {
    // 첫 로드 시 URL 에 _v 타임스탬프 부여 (iframe src 재요청 시 fresh 강제)
    if (location.search.indexOf('_v=') === -1) {
      var sep = location.search ? '&' : '?';
      location.replace(location.pathname + location.search + sep + '_v=' + Date.now() + location.hash);
      return;
    }
    // 주기적 업데이트 감지 — 서버 최신 HTML 에서 __BUILD_TS 추출 비교
    // ★ 진단: window.__lastUpdateCheck (상태/시각/서버TS), window.__lastUpdateCheckErr (마지막 에러)
    //   선곡화면 구석에 노출해서 유저가 KPLAY 환경에서 fetch 동작 여부 직접 확인 가능.
    window.__lastUpdateCheck = null;
    window.__lastUpdateCheckErr = null;
    async function _checkUpdate(){
      if (document.hidden || window.__updateAvailable) return; // 이미 감지됐으면 skip
      // ★ 인게임 중엔 fetch/regex 가 main thread 부담 → 터치 dispatch 지연 원인.
      //   모달 자체가 state !== 'playing' 에서만 뜨고, transitionTo 에서 playing 종료 시
      //   즉시 _checkUpdate() 호출하므로 인게임 중 체크는 순수 낭비.
      if (typeof state !== 'undefined' && state === 'playing') return;
      try {
        // ★ 쿼리 오염 제거 — location.href 은 _v=, __chk= 누적 가능. pathname 기반으로 깨끗이.
        //   CDN 이 쿼리 기반 캐시 키 쓰면 매 호출마다 다른 URL → 캐시 miss 강제.
        var u = location.pathname + '?v=' + Date.now();
        var r = await fetch(u, {cache:'no-store'});
        if (!r.ok) { window.__lastUpdateCheckErr = 'HTTP ' + r.status; return; }
        var txt = await r.text();
        var m = txt.match(/window\.__BUILD_TS\s*=\s*(\d+)/);
        if (m) {
          var srv = parseInt(m[1]);
          window.__lastUpdateCheck = { srv: srv, t: Date.now() };
          window.__lastUpdateCheckErr = null;
          if (srv > window.__BUILD_TS) {
            console.log('[update] detected:', srv, '>', window.__BUILD_TS);
            window.__updateAvailable = true;
          }
        } else {
          window.__lastUpdateCheckErr = 'NO_BUILD_TS (wrapper?)';
        }
      } catch(e) {
        window.__lastUpdateCheckErr = (e && e.message) ? e.message.slice(0,40) : 'FETCH_ERR';
        console.warn('[update] check failed:', e);
      }
    }
    // 5초 후 첫 체크, 이후 30초마다. visibilitychange 에서도 체크 (백그라운드 복귀 시).
    // transitionTo 에서 playing→select/title 전환 시 즉시 호출 (인게임 나오자마자 감지).
    window._checkUpdate = _checkUpdate;
    setTimeout(_checkUpdate, 5000);
    setInterval(_checkUpdate, 30000);
    document.addEventListener('visibilitychange', function(){ if (!document.hidden) _checkUpdate(); });
  } catch(e) {}
})();
</script>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyD7sp4VrN_7qzlvZayt5CL0mMFxwfvqtmk",
    authDomain: "nanorhythm-9fd56.firebaseapp.com",
    databaseURL: "https://nanorhythm-9fd56-default-rtdb.firebaseio.com",
    projectId: "nanorhythm-9fd56",
    storageBucket: "nanorhythm-9fd56.firebasestorage.app",
    messagingSenderId: "1050500853035",
    appId: "1:1050500853035:web:ed3adf1e45effd6605696e"
  });
  const fbDb = firebase.database();
  // Firebase Auth 제거됨 (Kplay 로그인으로 대체)

  // ========== NETWORK RESILIENCE LAYER ==========
  // 약한 네트워크/유실/LTE↔WiFi 전환/단절 대응.
  const _QUEUE_MAX = 200;
  const _QUEUE_RETRY_MAX = 3;
  const _QUEUE_LS_KEY = '__netWriteQueue';
  function _loadQueueFromLS() {
    try { return JSON.parse(localStorage.getItem(_QUEUE_LS_KEY) || '[]'); } catch(e) { return []; }
  }
  function _saveQueueToLS(q) {
    try { localStorage.setItem(_QUEUE_LS_KEY, JSON.stringify(q.slice(-_QUEUE_MAX))); } catch(e) {}
  }
  window.__net = {
    online: typeof navigator !== 'undefined' ? navigator.onLine !== false : true,
    writeQueue: _loadQueueFromLS(),  // reload 시 pending 쓰기 복구
    lastReconnectAt: 0,
    toastShown: {},
    _lastEffType: null,              // connection change 실제 타입 변경만 반응
    _flushing: false,                // flush 동시 실행 방지
  };
  function _enqueue(item) {
    item.tries = item.tries || 0;
    if (item.tries >= _QUEUE_RETRY_MAX) {
      console.warn('[NET] writeQueue drop (retry exhausted):', item.path);
      return;
    }
    window.__net.writeQueue.push(item);
    // 상한 초과 시 오래된 것 drop
    while (window.__net.writeQueue.length > _QUEUE_MAX) window.__net.writeQueue.shift();
    _saveQueueToLS(window.__net.writeQueue);
  }

  // 공용 Firebase 쓰기 래퍼 — 실패/오프라인/타임아웃 시 큐에 저장.
  //   기존 fbDb.ref(path).set(val) / .update(obj) 대체용. 기존 코드 점진 마이그레이션.
  window.fbSafeSet = function(path, value) {
    if (!fbDb) return Promise.resolve(false);
    if (!window.__net.online) {
      _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
      return Promise.resolve(false);
    }
    return new Promise(resolve => {
      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
        resolve(false);
      }, 8000);
      try {
        fbDb.ref(path).set(value).then(() => {
          if (done) return; done = true; clearTimeout(timeout); resolve(true);
        }).catch(() => {
          if (done) return; done = true; clearTimeout(timeout);
          _enqueue({ path, value, op: 'set', ts: Date.now(), tries: 0 });
          resolve(false);
        });
      } catch(e) {
        if (!done) { done = true; clearTimeout(timeout); resolve(false); }
      }
    });
  };

  // 공용 Firebase 읽기 래퍼 — 타임아웃 + fallback.
  window.fbSafeOnce = function(path, timeoutMs) {
    timeoutMs = timeoutMs || 6000;
    if (!fbDb) return Promise.resolve(null);
    return new Promise(resolve => {
      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        resolve(null);
      }, timeoutMs);
      try {
        fbDb.ref(path).once('value').then(snap => {
          if (done) return; done = true; clearTimeout(timeout);
          resolve(snap && snap.val ? snap.val() : null);
        }).catch(() => {
          if (done) return; done = true; clearTimeout(timeout);
          resolve(null);
        });
      } catch(e) {
        if (!done) { done = true; clearTimeout(timeout); resolve(null); }
      }
    });
  };

  // 오프라인 큐 flush — 온라인 복귀 시 호출. 동시 실행 방지 + 재시도 상한 + LS 백업.
  window.__net._flushQueue = function() {
    if (window.__net._flushing) return;        // 중복 flush 방지
    if (!window.__net.online || !fbDb) return;
    if (window.__net.writeQueue.length === 0) return;
    window.__net._flushing = true;
    const q = window.__net.writeQueue.slice();
    window.__net.writeQueue.length = 0;
    _saveQueueToLS(window.__net.writeQueue);
    // 같은 path 는 최신 것만
    const dedupe = new Map();
    for (const item of q) dedupe.set(item.path, item);
    const items = Array.from(dedupe.values());
    let remaining = items.length;
    if (remaining === 0) { window.__net._flushing = false; return; }

// AudioBufferSourceNode 기반 → play() 레이턴시 거의 0
class BufferPlayer {

    return Math.min(this.buffer.duration, t);
  }

    const wasPlaying = !this._paused;
    if (wasPlaying) this._stopSource();
    this._savedTime = Math.max(0, Math.min(this.buffer ? this.buffer.duration : 0, t));
    this._ended = false;
    if (wasPlaying) this._startSource();

    this._startSource();

    this._stopSource();
  }
  _startSource() {
    this._stopSource();
    if (!this.buffer) return;
    const src = this.actx.createBufferSource();
    src.buffer = this.buffer;
    src.connect(this.gainNode);
    src.onended = () => {
      if (this.source === src) {
        // 자연 종료 (pause로 stop된 것과 구분)
        if (!this._paused) { this._ended = true; this._paused = true; }

    try { src.start(0, this._savedTime); } catch(e) {}

    this._ended = false;

function routeAudioThroughGain(audioEl, gainValue) {
  if (!actx || !audioEl) return null;
  try {
    const src = actx.createMediaElementSource(audioEl);
    const gain = actx.createGain();
    gain.gain.value = gainValue;
    src.connect(gain);
    gain.connect(actx.destination);

  } catch(e) { return null; } // 이미 연결된 경우 에러

function resumeAudio() {
  if (!actx) initAudio();
  // ★ audioSession 은 iOS 인터럽션(전화/백그라운드/silent) 후 기본값으로 되돌아감 → 제스처마다 재확인.
  //   HTMLAudio(preview/title/ranking) 가 무음으로 돌아가는 regression 방지.
  try {
    if (navigator.audioSession && navigator.audioSession.type !== 'playback') {
      navigator.audioSession.type = 'playback';

  } catch(e) {}
  if (actx.state === 'suspended') actx.resume();
  // iOS: 무음 버퍼 재생으로 AudioContext + HTML Audio 동시 unlock
  if (!resumeAudio._unlocked && actx) {
    const silentBuf = actx.createBuffer(1, 1, actx.sampleRate);
    const src = actx.createBufferSource();
    src.buffer = silentBuf;
    src.connect(actx.destination);
    src.start(0);
    resumeAudio._unlocked = true;
  }
  // applyBgmVol 은 볼륨 설정 변경 시에만 필요 — 매 탭마다 호출하면 4~5 HTMLAudio 쓰기
  if (resumeAudio._lastVol !== volBgm) {

  }

const PREVIEW_GAP = 0.5; // 0.5s silence between loops

function startPreview(idx) {
  stopSongPreview();

  // ★ abort flag — pending play promise / setTimeout / event 가 stop 이후 실행될 때
  //   audio.play() 재호출 차단. iOS 에서 pause 후 비동기 play 해버리는 버그 대응.
  audio._aborted = false;

  audio.volume = 0;

    if (audio._aborted || songPreviewAudio !== audio || !previewLoading) return;
    previewLoading = false;
    previewCycleStart = performance.now();

  audio.addEventListener('playing', markReady, { once: true });

      try { audio.load(); } catch(e) {}
      try { audio.play().catch(()=>{}); } catch(e) {}
    }, 600);
  });

    if (audio._aborted || songPreviewAudio !== audio) return;
    if (audio.currentTime >= PREVIEW_DURATION) {

    }

  audio._fallbackTimer = setTimeout(() => {

function schedulePreview() {
  if (!previewActive || !songPreviewAudio || previewLoading || songPreviewAudio._aborted) return;
  const elapsed = (performance.now() - previewCycleStart) / 1000;
  // ★ paused 인데 정상 재생 구간인 케이스 복구 — 네트워크 플랩/오디오 세션 인터럽트로
  //   play() 가 silent 실패했을 때 볼륨만 올라가고 소리가 안 나는 간헐 버그 방지.
  //   fade-out 구간은 timeupdate 핸들러가 의도적으로 pause 시키므로 제외, 마지막 GAP 도 제외.
  if (songPreviewAudio.paused && elapsed < PREVIEW_DURATION - PREVIEW_FADE_OUT) {
    try { songPreviewAudio.play().catch(()=>{}); } catch(e) {}
  }
  if (elapsed < PREVIEW_FADE_IN) {
    // 페이드인
    songPreviewAudio.volume = getPreviewMaxVol() * (elapsed / PREVIEW_FADE_IN);
  } else if (elapsed < PREVIEW_DURATION - PREVIEW_FADE_OUT) {
    // 정상 재생
    songPreviewAudio.volume = getPreviewMaxVol();
  } else if (elapsed < PREVIEW_DURATION) {
    // 페이드아웃
    const remain = PREVIEW_DURATION - elapsed;
    songPreviewAudio.volume = getPreviewMaxVol() * (remain / PREVIEW_FADE_OUT);
  } else if (elapsed < PREVIEW_DURATION + PREVIEW_GAP) {
    // 갭 (무음)
    songPreviewAudio.volume = 0;
  } else {
    // 다시 처음부터
    if (songPreviewAudio._aborted) return;
    songPreviewAudio.currentTime = 0;
    songPreviewAudio.play().catch(()=>{});
    previewCycleStart = performance.now();
  }
}

let nanoFilter = null;       // BiquadFilterNode
let nanoFilterTarget = 20000; // 목표 주파수 (20000=클리어, 낮을수록 먹먹)
let nanoFilterCurrent = 20000;
const NANO_FILTER_CLEAR = 20000;  // HIT: 풀 개방
const NANO_FILTER_MISS = 200;     // MISS: 강한 먹먹함

function initNanoFilter() {
  if (!actx || nanoFilter) return;
  nanoFilter = actx.createBiquadFilter();
  nanoFilter.type = 'lowpass';
  nanoFilter.frequency.value = NANO_FILTER_CLEAR;
  nanoFilter.Q.value = 1.0;
  nanoFilterCurrent = NANO_FILTER_CLEAR;
  nanoFilterTarget = NANO_FILTER_CLEAR;
}
function nanoHit() {
  if (gameMode !== 'nano') return;
  // 즉시 클리어 복구
  nanoFilterTarget = NANO_FILTER_CLEAR;
  nanoFilterCurrent = NANO_FILTER_CLEAR;
  if (nanoFilter) nanoFilter.frequency.value = NANO_FILTER_CLEAR;
}
function nanoMiss() {
  if (gameMode !== 'nano') return;
  // 즉시 먹먹하게
  nanoFilterTarget = NANO_FILTER_MISS;
  nanoFilterCurrent = NANO_FILTER_MISS;
  if (nanoFilter) nanoFilter.frequency.value = NANO_FILTER_MISS;
}
function updateNanoFilter(dt) {}

function updateNanoPreDuck() {}
function updateStemVolumes(dt) {
  updateNanoFilter(dt);
  if (usingStemMode) {
    const songEnded = songDuration > 0 && gameTime >= songDuration - 1;
    const baseVol = (countdownTime > 0 || songEnded) ? 0 : volBgm;
    const useAbs = window._absGains && window._absGains.length > 0;
    for (let i = 0; i < allStemAudios.length; i++) {
      const isAlways = ALWAYS_AUDIBLE_STEMS.includes(i);
      const vol = isAlways ? STEM_VOL_VOCAL : STEM_VOL_NORMAL;
      const targetVol = baseVol * vol;
      if (useAbs && window._absGains[i]) {
        const g = window._absGains[i].gain;
        if (Math.abs(g.value - targetVol) > 0.001) g.value = targetVol;
      }
      if (allStemAudios[i]) { const nv = useAbs ? 0 : targetVol; if (Math.abs(allStemAudios[i].volume - nv) > 0.001) allStemAudios[i].volume = nv; }
    }
  } else if (songAudio) {
    const nv = 0.7 * volBgm; if (Math.abs(songAudio.volume - nv) > 0.001) songAudio.volume = nv;
  }
}

// ===== 허공 입력 =====
// BGM 재생 중: 해당 레인 스템을 순간 펄스 (볼륨 즉시 올리고 lerp가 빠르게 내림)
// BGM 재생 전: 짧은 탭 폴백음
const EMPTY_TAP_FREQS = [200, 300, 400, 500, 600, 700, 800, 900];

let _lastEmptySfxTime = 0;
function playEmptyPressSfx(lane) {
  if (!actx) return;
  // BGM 재생 중(카운트다운 끝난 후)에는 빈 노트 SFX 비활성 — 연타 시 오디오 소스 폭주로 지지직 소리 발생 방지
  if (countdownTime <= 0 && !songLoading) return;
  // 연타 시 오디오 소스 폭주 방지: 50ms 쿨다운
  const now = performance.now();
  if (now - _lastEmptySfxTime < 50) return;
  _lastEmptySfxTime = now;
  resumeAudio(); // AudioContext resume 보장
  // BGM 종료 후: 무음
  if (songDuration > 0 && gameTime >= songDuration - 1) return;
  const peakVol = countdownTime > 0 ? STEM_VOL_NORMAL * volBgm : Math.min(1.0, STEM_VOL_NORMAL * volBgm * 1.4);
  if (usingStemMode) {
    // onset 모드: 해당 레인의 다음 노트 stem + onset 시간으로 재생
    let targetStems = [];
    let targetOffset = 0;
    if (curSong && curSong._onsetMode && nodes.length > 0) {
      const delay = curSong._startDelay || 0;
      for (const n of nodes) {
        if (n.hit || n.missed) continue;
        if (n.lane === lane && n.stem != null) {
          targetStems = [n.stem];
          targetOffset = Math.max(0, n.time - delay); // 노트의 실제 오디오 위치
          break;
        }
      }
      if (targetStems.length === 0) {
        for (const n of nodes) {
          if (!n.hit && !n.missed && n.stem != null) {
            targetStems = [n.stem];
            targetOffset = Math.max(0, n.time - delay);
            break;
          }
        }
      }
    }
    if (targetStems.length === 0) {
      // fallback: 레인 매핑 사용
      const ls = getLaneStems();
      if (ls && ls[lane]) targetStems = ls[lane].filter(si => !ALWAYS_AUDIBLE_STEMS.includes(si));
    }
    targetStems.forEach(si => {
      const stemEnded = allStemAudios[si] ? allStemAudios[si].ended : true;
      if (countdownTime > 0 || stemEnded) {
        if (stemAudioBuffers[si] && actx) {
          const src = actx.createBufferSource();
          const gain = actx.createGain();
          src.buffer = stemAudioBuffers[si];
          gain.gain.setValueAtTime(peakVol, actx.currentTime);
          gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.5);
          src.connect(gain); gain.connect(actx.destination);
          const offset = targetOffset > 0 ? targetOffset : (stemFirstSoundTime[si] || 0);
          src.start(0, offset, 0.5);
        }
      } else {
        stemPulses[si] = { start: now, peak: peakVol, dur: 500 };
        if (allStemAudios[si]) allStemAudios[si].volume = peakVol;
      }
    });
  } else {
    const freq = EMPTY_TAP_FREQS[lane % EMPTY_TAP_FREQS.length];
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(peakVol * 0.25, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.12);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + 0.12);
  }
}

// ===== 계정 데이터 Firebase 동기화 (v16.2) =====
// 모든 사용자 데이터를 settings/{user}/ 경로로 sync.
// 로드 시 local 과 Firebase 를 **merge** (max/union) — 먼저 생성된 원본 데이터 보존.
// 충돌 시: 코인/free plays 는 max, 업적/우편함은 union (데이터 손실 없음).
// merge 결과를 Firebase + local 양쪽에 재저장해서 모든 브라우저가 같은 상태로 수렴.

function saveCoinsToFirebase(coins) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/coins').set(coins); } catch(e) {}
}
function loadCoinsFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/coins').once('value', snap => {
      const fbV = snap.val();
      const localV = parseInt(safeGetItem('rhythm_coins_' + currentUser) || '0', 10);
      const fbN = typeof fbV === 'number' ? fbV : 0;
      // max: 더 많은 코인이 있는 쪽으로 수렴 (손실 없음)
      const merged = Math.max(fbN, localV);
      if (merged !== localV) safeSetItem('rhythm_coins_' + currentUser, '' + merged);
      if (merged !== fbN) { try { fbDb.ref('settings/' + currentUser + '/coins').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

function saveAchUnlockedToFirebase(map) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/achUnlocked').set(map); } catch(e) {}
}
function loadAchUnlockedFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/achUnlocked').once('value', snap => {
      const fbMap = snap.val() || {};
      let localMap = {};
      try { localMap = JSON.parse(safeGetItem('rhythm_ach_' + currentUser) || '{}'); } catch(e) {}
      // union: 어느 쪽이든 언락된 건 합쳐짐. 같은 업적이면 더 오래된 at 유지 (먼저 언락 우선)
      const merged = {};
      const allKeys = new Set([...Object.keys(fbMap), ...Object.keys(localMap)]);
      for (const k of allKeys) {
        const f = fbMap[k], l = localMap[k];
        if (f && l) {
          const fAt = (f && f.at) || Infinity;
          const lAt = (l && l.at) || Infinity;
          merged[k] = fAt < lAt ? f : l;  // 먼저 언락된 쪽
        } else {
          merged[k] = f || l;
        }
      }
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localMap);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbMap);
      if (localChanged) safeSetItem('rhythm_ach_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/achUnlocked').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

      // union: 어느 쪽이든 수령된 건 합쳐짐 (중복 수령 방지)
      const merged = { ...localObj, ...fbObj };
      for (const k in localObj) if (localObj[k]) merged[k] = true;
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localObj);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbObj);
      if (localChanged) safeSetItem('rhythm_claimed_' + currentUser, JSON.stringify(merged));

function saveMailboxToFirebase(arr) {
  if (!currentUser || !fbDb) return;
  try { fbDb.ref('settings/' + currentUser + '/mailbox').set(arr || []); } catch(e) {}
}
function loadMailboxFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/mailbox').once('value', snap => {
      const fbArr = Array.isArray(snap.val()) ? snap.val() : [];
      let localArr = [];
      try { localArr = JSON.parse(safeGetItem('rhythm_mailbox_' + currentUser) || '[]'); } catch(e) {}
      // union by id: 어느 쪽에만 있는 메일도 합침. 같은 id 면 claimed=true 우선 (중복 보상 방지)
      const map = new Map();
      for (const m of localArr) if (m && m.id != null) map.set(m.id, { ...m });
      for (const m of fbArr) {
        if (!m || m.id == null) continue;
        const cur = map.get(m.id);
        if (!cur) map.set(m.id, { ...m });
        else {
          // 병합: claimed 는 OR, 나머지는 먼저 생성된 (ts 더 작은) 쪽 우선
          const mergedMail = (cur.ts || Infinity) <= (m.ts || Infinity) ? { ...cur } : { ...m };
          mergedMail.claimed = !!(cur.claimed || m.claimed);
          map.set(m.id, mergedMail);
        }
      }
      // 24h 만료 필터
      const now = Date.now();
      const merged = Array.from(map.values()).filter(m => !m.ts || (now - m.ts) < MAIL_EXPIRY_MS);
      // ts 내림차순 정렬 (기존과 동일: unshift 순서)
      merged.sort((a, b) => (b.ts || 0) - (a.ts || 0));
      const localChanged = JSON.stringify(merged) !== JSON.stringify(localArr);
      const fbChanged = JSON.stringify(merged) !== JSON.stringify(fbArr);
      if (localChanged) safeSetItem('rhythm_mailbox_' + currentUser, JSON.stringify(merged));
      if (fbChanged) { try { fbDb.ref('settings/' + currentUser + '/mailbox').set(merged); } catch(e) {} }
    });
  } catch(e) {}
}

// ===== COVER IMAGE (LAZY LOAD + LRU) =====
// ★ 곡 수천 개 확장 대비 — 렌더 시점에만 Image 객체 생성 + 메모리 상한 (LRU eviction).
//   기존: 전부 미리 new Image() → 수천 동시 fetch + 수천 Image 객체 상주 = 브라우저 과부하.
//   변경: getCoverImage(idx) 호출 시점에 lazy 생성. LRU 150 개 초과 시 오래된 것부터 제거.
const coverImages = {};
const _coverLRU = [];
const _COVER_CACHE_MAX = 150;
function getCoverImage(idx) {
  const s = songs[idx];
  if (!s || !s.cover) return null;
  let img = coverImages[idx];
  if (!img) {
    img = new Image();
    img._coverIdx = idx;
    // 네트워크 실패 시 online 복귀 시 재시도
    img.onerror = () => {
      if (window.__net && !window.__net['_coverRetry:' + idx]) {
        window.__net['_coverRetry:' + idx] = true;
        window.addEventListener('online', () => {
          try {
            const ni = new Image();
            ni.src = assetUrl(s.cover) + '&_r=' + Date.now();
            coverImages[idx] = ni;
          } catch(e) {}
        }, { once: true });
      }
    };
    img.src = assetUrl(s.cover);
    coverImages[idx] = img;
  }
  // LRU 최신화
  const lruIdx = _coverLRU.indexOf(idx);
  if (lruIdx >= 0) _coverLRU.splice(lruIdx, 1);
  _coverLRU.push(idx);
  while (_coverLRU.length > _COVER_CACHE_MAX) {
    const evicted = _coverLRU.shift();
    delete coverImages[evicted];
  }
  return img;
}

let songAudio = null;
let songPreviewAudio = null;
let usingStemMode = false;
let allStemAudios = [];  // 7 Audio elements for all stems
let stemSyncTime = 0;    // 스템 동기화 보정 타이머

function stopSongAudio() {
  // ABS 정리
  if (window._absNodes) { for (const s of window._absNodes) { if (s) try { s.stop(); } catch(e){} } window._absNodes = null; }
  if (window._absGains) { for (const g of window._absGains) { if (g) try { g.disconnect(); } catch(e){} } window._absGains = null; }
  window._absStartCtx = null; window._absPausedAt = null;
  if (songAudio) { songAudio.pause(); songAudio.currentTime = 0; songAudio = null; }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) { allStemAudios[i].pause(); allStemAudios[i].currentTime = 0; }
  }
  allStemAudios = [];
  for (const a of pulseStemAudios) { if (a) { a.pause(); a.src = ''; } }
  pulseStemAudios = [];
  // iOS Blob URL 해제 (메모리 누수 방지)
  for (const k in stemBlobUrls) {
    try { URL.revokeObjectURL(stemBlobUrls[k]); } catch(e) {}
    delete stemBlobUrls[k];
  }
  usingStemMode = false;
  gamePaused = false;
}
function fadeOutSongAudio(duration) {
  const step = 0.05;
  const interval = (duration * 1000) / (1 / step);
  const targets = [];
  // 현재 볼륨 저장
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) targets.push(allStemAudios[i]);
  }
  if (songAudio) targets.push(songAudio);
  if (targets.length === 0) return;
  const fadeStep = () => {
    let allDone = true;
    for (const a of targets) {
      if (a.volume > 0.01) { a.volume = Math.max(0, a.volume - step); allDone = false; }
      else a.volume = 0;
    }
    if (!allDone) setTimeout(fadeStep, interval);
    else stopSongAudio();
  };
  fadeStep();
}
function stopSongPreview() {
  if (songPreviewAudio) {
    const a = songPreviewAudio;
    a._aborted = true;  // pending promise / setTimeout / event 내부에서 play 재호출 차단
    try { if (a._fallbackTimer) { clearTimeout(a._fallbackTimer); a._fallbackTimer = null; } } catch(e){}
    try { a.pause(); } catch(e){}
    try { a.currentTime = 0; } catch(e){}
    // ★ iOS 에서 pause 후에도 pending play promise 가 resolve 되면 재생되는 버그.
    //   src 비우고 load() 하면 decode pipeline 전부 halt → 확실한 정지.
    try { a.removeAttribute('src'); a.load(); } catch(e){}
    songPreviewAudio = null;
  }
}

// ===== 스킨 인벤토리/장비 시스템 =====
// 카테고리별 소유/장착 독립. 장착 안 된 카테고리는 default (fallback canvas 렌더).
// ★ 인벤토리 탭 — 노트/이펙트/UI팩 3개로 간결화 (나머지 카테고리는 UI 팩에 통합)
const SKIN_CATEGORIES = ['note','hit_effect','ui_pack'];
const SKIN_CATEGORY_LABELS = {
  note:'노트', hit_effect:'이펙트', ui_pack:'UI 팩'
};
// 카테고리별 스킨 카탈로그 (구매 가능한 스킨) — SKINS 레지스트리에서 파생
//   skin 의 category 필드로 어느 카테고리에 속하는지 선언 (기본 'note')
function getSkinsForCategory(cat) {
  const out = [];
  for (const id in SKINS) {
    const s = SKINS[id];
    if (!s || id === 'default') continue;
    const c = s.category || 'note';
    if (c === cat) out.push({ id, skin: s });
  }
  return out;
}
function _invKey() { return 'rhythm_skinInv_' + (currentUser || '_guest'); }
function _eqKey() { return 'rhythm_skinEq_' + (currentUser || '_guest'); }
function _loadInv() { try { return JSON.parse(safeGetItem(_invKey()) || '{}'); } catch { return {}; } }
function _saveInv(x) {
  safeSetItem(_invKey(), JSON.stringify(x));
  if (currentUser && fbDb) {
    try { fbDb.ref('settings/' + currentUser + '/skinInv').set(x); } catch(e) {}
  }
}
function _loadEq() { try { return JSON.parse(safeGetItem(_eqKey()) || '{}'); } catch { return {}; } }
function _saveEq(x) {
  safeSetItem(_eqKey(), JSON.stringify(x));
  if (currentUser && fbDb) {
    try { fbDb.ref('settings/' + currentUser + '/skinEq').set(x); } catch(e) {}
  }
}
// Firebase 에서 skin 인벤토리/장비 로드 — 로그인 시 호출. union merge (local∪remote, remote 우선).
function loadSkinInvFromFirebase() {
  if (!currentUser || !fbDb) return;
  try {
    fbDb.ref('settings/' + currentUser + '/skinInv').once('value', snap => {
      const fbInv = snap.val() || {};
      const localInv = _loadInv();
      const merged = { ...localInv };
      for (const cat in fbInv) {
        const a = Array.isArray(localInv[cat]) ? localInv[cat] : [];
        const b = Array.isArray(fbInv[cat]) ? fbInv[cat] : [];
        merged[cat] = Array.from(new Set([...a, ...b]));
      }
      safeSetItem(_invKey(), JSON.stringify(merged));
      // Firebase 도 merged 로 쓰기 (로컬에만 있던 거 올림)
      try { fbDb.ref('settings/' + currentUser + '/skinInv').set(merged); } catch(e) {}
    });
    fbDb.ref('settings/' + currentUser + '/skinEq').once('value', snap => {
      const fbEq = snap.val() || {};
      // remote 있으면 remote 우선 (기기 간 장착 동기화)
      const localEq = _loadEq();
      const merged = Object.keys(fbEq).length > 0 ? { ...fbEq } : localEq;
      // ★ ownership 검증 — 보유 안 한 스킨은 장착에서 제거.
      //   cancelSkinOwnership 이 Firebase skinEq 를 정리 안 해서 과거 테스트 잔여물이
      //   재로그인 때 dangling equipped 로 복구되던 버그 차단.
      const inv = _loadInv();
      for (const cat in merged) {
        const id = merged[cat];
        if (id && !(inv[cat] && inv[cat].includes(id))) {
          delete merged[cat];
        }
      }
      safeSetItem(_eqKey(), JSON.stringify(merged));
      // 정리된 결과를 Firebase 에도 다시 올려 영구 고정
      try { fbDb.ref('settings/' + currentUser + '/skinEq').set(merged); } catch(e) {}
      _refreshActiveSkin();
    });
  } catch(e) {}
}
function ownsSkin(cat, id) { const i = _loadInv(); return !!(i[cat] && i[cat].includes(id)); }
function getOwnedSkins(cat) { const i = _loadInv(); return (i[cat] || []).slice(); }
function addOwnedSkin(cat, id) {
  const i = _loadInv(); i[cat] = i[cat] || [];
  if (!i[cat].includes(id)) i[cat].push(id);
  _saveInv(i);
}
function removeOwnedSkin(cat, id) {
  const i = _loadInv();
  if (i[cat]) {
    i[cat] = i[cat].filter(x => x !== id);
    if (i[cat].length === 0) delete i[cat];
  }
  _saveInv(i);
}
function getEquippedSkin(cat) { return _loadEq()[cat] || null; }
function setEquippedSkin(cat, id) {
  const e = _loadEq();
  if (id) e[cat] = id; else delete e[cat];
  _saveEq(e);
  _refreshActiveSkin();
  // 장착 시점에 sprite PNG 강제 preload — 인게임 진입 시점까지 로드 대기 시간 확보.
  //   iOS 네트워크 불안정 시 첫 진입 때 sprite 가 안 떠서 fallback 으로 나오던 문제 완화.

// 난이도별 레벨 범위:
//  쉬움 1~3, 보통 4~7, 어려움 8~10, 지옥 11~15
const DIFF_LEVEL_RANGES = [
  [1, 3],   // 쉬움
  [4, 7],   // 보통
  [8, 10],  // 어려움
  [11, 15], // 지옥

// 곡 본연의 난이도 raw score 계산 (난이도/키수 무관)
function _songRawDifficulty(song) {
  const pat = song.pattern || [];
  const patHits = pat.filter(v => v).length;
  const patDensity = pat.length > 0 ? patHits / pat.length : 0.5;
  // 패턴 클러스터링: 연속 노트 개수 (복잡도 가산)
  let clusters = 0;
  for (let i = 0; i < pat.length; i++) {
    if (pat[i] && pat[(i+1) % pat.length] && pat[(i+2) % pat.length]) clusters++;
  }
  const clusterScore = pat.length > 0 ? clusters / pat.length : 0;
  // 길이(bars) — 길수록 약간 어려움
  const lenScore = Math.min(1, (song.bars || 40) / 100);
  // BPM 가중 (60~200)
  const bpmNorm = Math.max(0, Math.min(1, (song.bpm - 60) / 140));
  return bpmNorm * 0.45 + patDensity * 0.30 + clusterScore * 0.15 + lenScore * 0.10;
}
// 모든 곡 raw score 캐시 + 정렬된 인덱스 (퍼센타일 매핑용)

function _ensureSongLevelCache() {
  if (_songLevelCache && _songLevelCache.length === songs.length) return _songLevelCache;
  const arr = songs.map((s, i) => ({ idx: i, raw: _songRawDifficulty(s) }));
  arr.sort((a, b) => a.raw - b.raw);
  // 각 곡에 percentile 부여 (0~1)
  const map = new Array(songs.length);
  for (let r = 0; r < arr.length; r++) {
    map[arr[r].idx] = arr.length > 1 ? r / (arr.length - 1) : 0.5;
  }

}
// 곡+난이도별 레벨: percentile + 키수 보정 → 해당 난이도 범위에 매핑
function calcLevel(songIdx, diffIdx) {

  // 키 수 보정: 4=-0.18, 5=-0.09, 6=0, 7=+0.09, 8=+0.18 — 키 수 차이로 명확히 레벨 분리
  const laneAdj = (laneCount - 6) * 0.09;
  const score = Math.max(0, Math.min(1, pct + laneAdj));
  const [lo, hi] = DIFF_LEVEL_RANGES[diffIdx] || [1, 15];

}

const _NRH_MARKER = '##nrh:';

function _saveSessionBackup(user, method, fp) {

function getRankings(songIdx, diffIdx, lc) {
  if (lc == null) lc = laneCount;
  const key = _scoreKey(songIdx, diffIdx, lc);
  const legacyKey = _legacyKey(songIdx, diffIdx);
  // 주간 리셋: 매주 월요일 KST 00:00 이후 기록만 랭킹에 반영
  const curWeekStart = getWeekStartKST(Date.now());
  // Firebase 글로벌 + 로컬 병합 (최대 점수, 동률 시 더 이른 ts 우선)

    if (!ts || ts < curWeekStart) return; // 이번 주 기록만
    const cur = merged[user];
    if (!cur || sc > cur.score) {
      merged[user] = { score: sc, ts: ts || 0 };
    } else if (sc === cur.score && ts && (!cur.ts || ts < cur.ts)) {
      merged[user] = { score: sc, ts: ts };

  const fbData = fbRankingsCache[key] || {};
  for (const user in fbData) {
    _merge(user, _scoreValue(fbData[user]), _scoreTs(fbData[user]));

  // 2) 로컬 점수도 병합 (오프라인 기록 보장)
  const all = getAllScores();
  for (const user in all) {
    let v = all[user][key];
    if (v == null && lc === 4) v = all[user][legacyKey];
    _merge(user, _scoreValue(v), _scoreTs(v));
  }
  const list = [];
  for (const user in merged) list.push({ name: user, score: merged[user].score, ts: merged[user].ts });
  // 점수 내림차순 → 동률 시 먼저 등록(ts 작은 순)이 상위
  list.sort((a, b) => b.score - a.score || (a.ts || 0) - (b.ts || 0));

  return list.slice(0, 100);
}

function getWeekStartKST(ms) {
  const KST_OFFSET = 9 * 60 * 60 * 1000;
  const d = new Date(ms + KST_OFFSET);
  const dow = d.getUTCDay(); // 0=Sun
  const daysFromMon = (dow + 6) % 7;
  const midnightKst = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()) - KST_OFFSET;
  return midnightKst - daysFromMon * 24 * 60 * 60 * 1000;
}
function checkWeeklyRewards() {
  if (!currentUser || !fbDb) return;
  const now = Date.now();
  const curWeek = getWeekStartKST(now);
  const prevWeekStart = curWeek - 7 * 24 * 60 * 60 * 1000;
  const prevWeekEnd = curWeek;
  // ★ Firebase 의 weeklyChecked 플래그 먼저 체크 (localStorage 독립 — 디바이스 변경/캐시 삭제에도 안전)
  //   claimedMails 도 같이 가져와서 addMail 체크 전 local cache 갱신 → race condition 제거.
  try {
    Promise.all([
      fbDb.ref('settings/' + currentUser + '/weeklyChecked/' + prevWeekStart).once('value'),
      fbDb.ref('settings/' + currentUser + '/claimedMails').once('value'),
    ]).then(([snapWC, snapCM]) => {
      // 이미 이 주차 체크 완료 → 스코어 조회 안 함
      if (snapWC.val()) {
        safeSetItem(_weeklyCheckedKey(prevWeekStart), '1');  // 로컬에도 마킹
        return;
      }
      // claimedMails Firebase → localStorage 동기화 (addMail 이 이걸 읽음)
      const rawCM = snapCM.val();
      const fbClaimed = Array.isArray(rawCM) ? rawCM : (rawCM && typeof rawCM === 'object' ? Object.values(rawCM) : []);
      const merged = Array.from(new Set([...getClaimedMailIds(), ...fbClaimed.filter(x => typeof x === 'string')]));
      safeSetItem(_claimedIdsKey(), JSON.stringify(merged));
      _runWeeklyScoresCheck(prevWeekStart, prevWeekEnd);
    }).catch(() => {});
  } catch(e) {}
}
function _runWeeklyScoresCheck(prevWeekStart, prevWeekEnd) {
  const now = Date.now();
  const curWeek = getWeekStartKST(now);
  try {
    fbDb.ref('scores').once('value', snap => {
      const all = snap.val() || {};
      // (songIdx, diffIdx, lc) 조합별로 top 10 계산
      for (const key in all) {
        const parts = key.split('_');
        const songIdx = parseInt(parts[0], 10);
        const diffIdx = parseInt(parts[1], 10);
        const lc = parseInt(parts[2], 10);
        if (isNaN(songIdx) || isNaN(diffIdx)) continue;
        const users = all[key];
        const userBest = new Map();
        for (const user in users) {
          const e = users[user];
          const ts = (e && typeof e === 'object') ? (e.ts || 0) : 0;
          const score = (e && typeof e === 'object') ? (e.score || 0) : (e || 0);
          if (ts < prevWeekStart || ts >= prevWeekEnd) continue;
          if ((userBest.get(user) || 0) < score) userBest.set(user, score);
        }
        if (!userBest.has(currentUser)) continue;
        const ranked = Array.from(userBest.entries()).sort((a, b) => b[1] - a[1]);
        const myRank = ranked.findIndex(([u]) => u === currentUser);
        if (myRank >= 0 && myRank < 10) {
          const reward = WEEKLY_REWARDS[myRank];
          const songName = songs[songIdx] ? songs[songIdx].name : '곡 #' + songIdx;
          const diffName = (DIFFICULTIES[diffIdx] && DIFFICULTIES[diffIdx].name) || '';
          const lcLabel = isNaN(lc) ? '' : (lc + 'K');
          const body = `${songName} · ${diffName}${lcLabel ? ' · ' + lcLabel : ''} · ${myRank + 1}위 달성!`;
          addMail({
            id: 'weekly_' + prevWeekStart + '_' + key,
            title: '주간 랭킹 보상',
            body: body,
            reward: reward,
            songIdx: songIdx,
            diffIdx: diffIdx,
            lc: isNaN(lc) ? null : lc,
            rank: myRank + 1,
            claimed: false,
            ts: now,
          });
        }
      }
      // ★ 체크 완료 마킹 — Firebase + localStorage 양쪽.
      //   Firebase 가 권위 (디바이스 무관 재지급 차단), localStorage 는 빠른 bail-out.
      safeSetItem(_weeklyCheckedKey(prevWeekStart), '1');
      safeSetItem(_lastWeeklyKey(), '' + curWeek);
      try { fbDb.ref('settings/' + currentUser + '/weeklyChecked/' + prevWeekStart).set(true); } catch(e) {}
    });
  } catch(e) {
    // fb 조회 실패 시 checkedKey 저장 안 함 → 다음 로그인 때 재시도
  }
}

// 캔버스 텍스트 폭 기준 줄바꿈 (한글 캐릭터 단위 안전)
function wrapTextToLines(text, maxWidth) {
  if (!text) return [''];
  const tokens = text.split(/(\s+|·)/); // 구분자 보존
  const lines = [];
  let line = '';
  for (const tok of tokens) {
    if (!tok) continue;
    const candidate = line + tok;
    if (ctx.measureText(candidate).width <= maxWidth) {
      line = candidate;
    } else {
      if (line) lines.push(line);
      // 토큰 자체가 길면 캐릭터 단위 분할
      if (ctx.measureText(tok).width > maxWidth) {
        let buf = '';
        for (const ch of tok) {
          if (ctx.measureText(buf + ch).width > maxWidth && buf) {
            lines.push(buf); buf = ch;
          } else buf += ch;
        }
        line = buf;
      } else {
        line = tok;
      }
    }
  }
  if (line) lines.push(line);
  return lines.length ? lines : [''];
}
// 만료 남은 시간 포맷
function formatMailTimeLeft(mail) {
  if (!mail.ts) return '';
  const left = MAIL_EXPIRY_MS - (Date.now() - mail.ts);
  if (left <= 0) return '만료';
  const h = Math.floor(left / (60 * 60 * 1000));
  const mn = Math.floor((left % (60 * 60 * 1000)) / (60 * 1000));
  if (h > 0) return h + '시간 ' + mn + '분 남음';
  return mn + '분 남음';
}

const SCORE_THRESHOLDS = [600000, 800000, 1000000, 1200000];
const GRADE_ORDER = ['C','B','A','S','P'];
// ★ 2026-04-21 보상 전체 절반으로 하향 (밸런스 조정).
const GRADE_COINS = { C: 13, B: 25, A: 50, S: 100, P: 250 };
const SCORE_COINS = { 600000: 25, 800000: 50, 1000000: 100, 1200000: 250 };
const DIFF_COINS = [13, 25, 50, 100];
// SPEED_COINS 배열은 배속 업적 단일화로 사용 안 함. 하위 호환용 남김.

function generateAchievements() {
  const achs = [];
  songs.forEach((s, si) => {
    // Grade achievements
    GRADE_ORDER.forEach(g => {
      const minPct = g==='S'?0.98:g==='A'?0.90:g==='B'?0.80:0.60;
      const glabel = g==='P' ? `${s.name} — PERFECT 클리어` : `${s.name} — ${g}등급 이상 클리어`;
      achs.push({ id:`s${si}_grade_${g}`, songIdx:si, type:'grade',
        label: glabel, coins: GRADE_COINS[g],
        check: d => d.songIdx===si && d.gauge>0 && (g==='P' ? d.missed===0 : d.pct>=minPct) });
    });
    // Score achievements
    SCORE_THRESHOLDS.forEach(t => {
      achs.push({ id:`s${si}_score_${t}`, songIdx:si, type:'score',
        label:`${s.name} — ${t.toLocaleString()}점 이상`, coins: SCORE_COINS[t],
        check: d => d.songIdx===si && d.score>=t });
    });
    // Difficulty achievements
    DIFFICULTIES.forEach((d, di) => {
      achs.push({ id:`s${si}_diff_${di}`, songIdx:si, type:'diff',
        label:`${s.name} — ${d.name} 클리어`, coins: DIFF_COINS[di],
        check: dd => dd.songIdx===si && dd.diffIdx===di && dd.gauge>0 });
    });
    // ★ 배속 업적 완전 제거 (2026-04-21 유저 결정) — 보상 밸런스 정리 중.
    //   SPEED_COINS / SPEED_CLEAR_COINS 상수는 하위호환용으로 남김 (미사용).
  });
  return achs;
}

// 로컬에 보류된 플레이 기록을 Firebase로 동기화
function flushLocalPlaysToFb() {
  const local = getLocalPlays();
  const pending = Object.keys(local);
  if (pending.length === 0) return;
  for (const key of pending) {
    const entry = local[key];
    if (!entry.logs || entry.logs.length === 0) continue;
    for (const ts of entry.logs) {
      fbDb.ref('plays/' + key + '/logs').push(ts);
    }
    fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + (entry.total || 0));
  }
  // 동기화 완료 후 로컬 보류 큐 초기화
  safeRemoveItem('rhythm_localPlays');
}

// 오래된 Firebase 로그 정리 (1주일 이상)
let lastLogCleanup = 0;
function cleanupOldLogs() {
  const now = Date.now();
  if (now - lastLogCleanup < 60*60*1000) return; // 1시간마다
  lastLogCleanup = now;
  const weekAgo = now - 7*24*60*60*1000;
  for (const key in fbPlayData) {
    const entry = fbPlayData[key];
    if (!entry.logs) continue;
    for (const pushId in entry.logs) {
      if (entry.logs[pushId] < weekAgo) {
        fbDb.ref('plays/' + key + '/logs/' + pushId).remove();
      }
    }
  }
}

function recordPlay(songIdx) {
  const key = 'song_' + songIdx;
  const now = Date.now();
  // ★ 로컬 즉시 반영 — TOP 탭은 total, WEEKLY/DAILY 는 logs 를 보므로 둘 다 선반영.
  //   Firebase transaction echo 가 startSong → goOffline 대기열에 묶여 지연되는 케이스에서
  //   TOP 만 업데이트가 밀리던 현상 방지. Firebase 재연결 시 서버 값이 listener 로 들어와도
  //   동일 결과라 중복 카운트 없음.
  if (!fbPlayData[key]) fbPlayData[key] = { total: 0, logs: {} };
  fbPlayData[key].total = (fbPlayData[key].total || 0) + 1;
  if (!fbPlayData[key].logs) fbPlayData[key].logs = {};
  fbPlayData[key].logs['local_' + now + '_' + Math.random().toString(36).slice(2, 8)] = now;
  chartLastUpdate = 0; // 다음 프레임에 차트 즉시 재계산
  if (fbConnected) {
    // Firebase에 직접 기록 (글로벌 공유)
    try {
      fbDb.ref('plays/' + key + '/logs').push(now);
      fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + 1);
    } catch(e) {
      saveLocalPlay(songIdx); // 실패 시 로컬에 보류
    }
  } else {
    saveLocalPlay(songIdx); // 오프라인: 로컬에 보류
  }
  cleanupOldLogs();
}

  // Firebase 연결 시 글로벌 데이터 사용 (전체 유저 합산)
  if (fbConnected) {
    return {
      total: fbEntry.total || 0,
      logs: fbEntry.logs ? Object.values(fbEntry.logs) : []
    };
  }
  // Firebase 미연결 시: 캐시된 Firebase 데이터만 사용 (로컬 로그 concat 금지 — 중복 방지)
  return {
    total: fbEntry.total || 0,
    logs: fbEntry.logs ? Object.values(fbEntry.logs) : []
  };
}

function getChartData(type) {
  const now = Date.now();
  // KST 기준 오늘 0시 / 이번 주 월요일 0시 (UTC timestamp로 환산)
  const KST_OFFSET = 9 * 60 * 60 * 1000;
  const kstNow = new Date(now + KST_OFFSET);
  const kstY = kstNow.getUTCFullYear(), kstM = kstNow.getUTCMonth(), kstD = kstNow.getUTCDate();
  const kstDow = kstNow.getUTCDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const todayStartMs = Date.UTC(kstY, kstM, kstD) - KST_OFFSET; // KST 오늘 00:00 → UTC ms
  const daysFromMon = (kstDow + 6) % 7; // Mon=0, Sun=6
  const weekStartMs = todayStartMs - daysFromMon * 24 * 60 * 60 * 1000; // KST 이번 주 월요일 00:00

  const list = [];
  for (let i = 0; i < songs.length; i++) {
    const entry = getMergedPlayData(i);
    const total = entry.total || 0;
    const logs = Array.isArray(entry.logs) ? entry.logs : (entry.logs ? Object.values(entry.logs) : []);
    let count = 0;
    let firstTs = Infinity; // 해당 기간 내 가장 이른 플레이 시각
    if (type === 'top') {
      count = total;
      for (const t of logs) if (t < firstTs) firstTs = t;
    }
    else if (type === 'daily') {
      for (const t of logs) {
        if (t >= todayStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    else if (type === 'weekly') {
      for (const t of logs) {
        if (t >= weekStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    list.push({ idx: i, count, firstTs });
  }
  // count=0인 곡 제외 (DAILY/WEEKLY에서 기록 없는 곡 숨김), TOP은 전부 표시
  const filtered = type === 'top' ? list : list.filter(item => item.count > 0);
  // 정렬: count 내림차순 → 동률 시 먼저 플레이된 곡(firstTs 오름차순) → 그래도 동률이면 songIdx
  filtered.sort((a, b) => b.count - a.count || (a.firstTs - b.firstTs) || (a.idx - b.idx));
  return filtered;
}

let fadeAlpha = 0;        // 0=투명, 1=검정

let fadeSpeed = 3.5;      // 초당 알파 변화량

function transitionTo(newState, callback) {
  if (fadeDir !== 0) return; // 이미 전환 중
  // ★ 인게임 종료 전환 시 Firebase 재연결 + Wake Lock 해제 + 업데이트 체크 강제
  if ((state === 'playing' || state === 'ending') && newState !== 'playing') {

    try { if (window._checkUpdate) window._checkUpdate(); } catch(e) {}
  }
  fadePendingState = newState;
  fadePendingCallback = callback || null;
  fadeDir = 1; // 페이드아웃 시작
}

function updateFade(dt) {
  if (fadeDir === 0) return;
  fadeAlpha += fadeDir * fadeSpeed * dt;
  if (fadeDir === 1 && fadeAlpha >= 1) {
    fadeAlpha = 1;
    // 화면이 완전히 어두워짐 → 상태 전환
    if (fadePendingState === 'select') {
      lastScrollSong = selectedSong;
      selectTargetScrollX = null; selectScrollVel = 0;
      const _lay = getSelectLayout();
      selectScrollX = _dPos(selectedSong) * (_lay.cardW + _lay.gap);
      // 프리뷰 첫 로드 지연: 화면 전환 완료 후 시작 (첫 스크롤 끊김 방지)
      previewSongIdx = selectedSong;
      if (_previewDebounce) clearTimeout(_previewDebounce);
      _previewDebounce = setTimeout(() => { startPreview(selectedSong); }, 800);
      // 차트 강제 갱신 — Firebase에서 최신 plays 데이터 강제 fetch.
      //   단 optimistic 로컬 값(recordPlay 에서 +1 선반영)이 서버 동기화 보다
      //   앞서있을 수 있으므로 Math.max 로 역행 방지.
      chartLastUpdate = 0;
      if (fbDb) {
        for (let _si = 0; _si < songs.length; _si++) {
          const _k = 'song_' + _si;
          fbDb.ref('plays/' + _k + '/total').once('value', snap => {
            if (!fbPlayData[_k]) fbPlayData[_k] = { total: 0, logs: {} };
            fbPlayData[_k].total = Math.max(fbPlayData[_k].total || 0, snap.val() || 0);
            chartLastUpdate = 0;
          }).catch(()=>{});
        }
      }
    }
    if (fadePendingState) { state = fadePendingState; fadePendingState = null; }
    if (fadePendingCallback) { fadePendingCallback(); fadePendingCallback = null; }
    fadeDir = -1; // 페이드인 시작
  } else if (fadeDir === -1 && fadeAlpha <= 0) {
    fadeAlpha = 0;
    fadeDir = 0; // 전환 완료
  }
}

// ===== SEEDED RNG =====
function seededRng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// ===== NODE GENERATION =====
let songEnergyMap = null; // 0.5초 단위 에너지 (0~1), 드럼 기준

function generateNodes(song, diff, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);

  const sixteenthDur = 15 / song.bpm;
  const eighthDur = sixteenthDur * 2;
  const totalSixteenths = song.bars * 16;
  // 낙하 시간 = 히트라인까지 거리 / 노트 속도 → 카운트다운 끝나면 상단에서 등장
  const fallTime = getHitY() / calcNoteSpeed(song.bpm, selectedSpeed || 1);
  const startDelay = fallTime;
  let noteIdx = 0;
  const baseDensity = diff.noteDensity;
  const densityMul = 1 + Math.max(0, laneCount - 4) * 0.09;
  const density = Math.min(baseDensity * densityMul, 1.8);
  const chordChance = laneCount >= 6 ? (baseDensity >= 1.3 ? 0.45 : baseDensity >= 1.0 ? 0.35 : baseDensity >= 0.75 ? 0.25 : 0.15) : 0;
  const pat = song.pattern;

  // 곡별 고유 레인 시퀀스 생성 (시드 기반 → 매번 동일, 곡마다 다름)
  const songLaneSeq = [];
  const seqLen = Math.max(LANE_SEQ.length * 2, 32);
  for (let si = 0; si < seqLen; si++) {
    // 연속 같은 레인 방지: 이전 레인과 다른 레인 선택
    let nl = Math.floor(rng() * laneCount);
    if (si > 0 && nl === songLaneSeq[si - 1]) nl = (nl + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
    songLaneSeq.push(nl);
  }

  // Generate notes from rhythm pattern
  for (let i = 0; i < totalSixteenths; i++) {
    const pos = i % 16;
    if (!pat[pos]) continue;
    // 에너지 기반 밀도 조절: 조용한 구간에서는 밀도를 낮춤
    const noteTime = i * sixteenthDur + startDelay;
    let localDensity = density;
    if (energyMap && energyMap.length > 0) {
      const eIdx = Math.min(Math.floor(noteTime / 0.5), energyMap.length - 1);
      const energy = eIdx >= 0 ? energyMap[eIdx] : 1;
      // 무음 구간 제거
      if (energy < 0.02) continue;
      // 조용한 구간: 밀도 축소
      if (energy < 0.15) localDensity = density * (energy / 0.15);
    }
    // Density filtering
    if (localDensity < 1 && rng() > localDensity) continue;
    // For hell mode, sometimes add extra notes on off-beats (에너지 기반 밀도 적용)
    if (localDensity > 1 && pos % 2 === 1 && rng() < (localDensity - 1) * 0.5) {
      const eLane = Math.floor(rng() * laneCount);
      const eFreq = 440;
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: eLane, freq: eFreq, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
    }
    const lane = songLaneSeq[noteIdx % songLaneSeq.length];
    const freq = 440;
    const nd = {
      time: i * sixteenthDur + startDelay,
      lane, freq, type: 'note',
      hit: false, missed: false,
      holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    // Hold notes based on difficulty
    const holdEvery7 = laneCount >= 6 ? Math.max(4, Math.floor((diff.holdEvery || 999) * 0.7)) : diff.holdEvery;
    if (holdEvery7 > 0 && noteIdx > 0 && noteIdx % holdEvery7 === 0 && i + 6 < totalSixteenths) {
      const holdLen = 2 + Math.floor(rng() * 2);
      nd.type = 'hold';
      nd.endTime = nd.time + holdLen * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // 7키 동시노트: 같은 타이밍에 다른 레인에 추가 노트
    if (chordChance > 0 && rng() < chordChance) {
      const usedLanes = [lane];
      let chordLane = Math.floor(rng() * laneCount);
      if (chordLane === lane) chordLane = (chordLane + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
      usedLanes.push(chordLane);
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: chordLane, freq: 440, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
      // 지옥: 15% 확률로 트리플 노트
      if (baseDensity >= 1.3 && rng() < 0.15) {
        let triLane;
        do { triLane = Math.floor(rng() * laneCount); } while (usedLanes.includes(triLane));
        nodes.push({
          time: i * sixteenthDur + startDelay,
          lane: triLane, freq: 440, type: 'note',
          hit: false, missed: false,
          holding: false, holdComplete: false,
          endTime: 0, _ho1: null, _ho2: null, _hg: null
        });
        noteIdx++;
      }
    }
  }

  // Remove notes that overlap with hold durations in same lane
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  // Traps based on difficulty (7키: 트랩 빈도 증가)
  const trapInt = laneCount >= 6 && diff.trapInterval > 0 ? Math.max(3, diff.trapInterval - 1) : diff.trapInterval;
  if (trapInt > 0) {
    for (let i = 20; i < totalSixteenths; i += trapInt * 2 + Math.floor(rng() * Math.max(1, trapInt * 2))) {
      const t = i * sixteenthDur + startDelay;
      const lane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) {
        if (n.lane !== lane) continue;
        if (n.type === 'hold' && t >= n.time - eighthDur*0.5 && t <= n.endTime + eighthDur*0.5) { conflict = true; break; }
        if (Math.abs(n.time - t) < sixteenthDur * 0.8) { conflict = true; break; }
      }
      if (!conflict) nodes.push({ time: t, lane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // 노트 기반 최소 길이 (실제 오디오 길이로 나중에 갱신됨)
  songDuration = totalSixteenths * sixteenthDur + startDelay + 2;
}

// 오디오 로드 후 실제 길이로 songDuration 갱신 + 노드 재생성
function updateSongDurationFromAudio() {
  let audioDur = 0;
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && allStemAudios[0].duration) {
    audioDur = allStemAudios[0].duration;
  } else if (songAudio && songAudio.duration) {
    audioDur = songAudio.duration;
  }

    playDissonance(); combo = 0; fever = false; feverTimer = 0;
    if (!devInvincible && playMode === 'normal') gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain * 2 : 0.08));
    judgmentText = 'TRAP!'; judgmentTimer = 0.7; judgmentColor = '#ff3333'; judgmentPriority = 2;
    shakeX = (Math.random()-0.5)*18; shakeY = (Math.random()-0.5)*12;
    playerAnim = -0.3;
    spawnParticles(getLaneX(lane), hitY, '#ff3333', 8);
  } else if (closest.type === 'hold') {
    // Start hold — 거리 기반 판정
    let holdGrade;
    const _hs = getHeightScale();
    if (closestDist < 22 * _hs) holdGrade = 'perfect';
    else if (closestDist < 42 * _hs) holdGrade = 'great';
    else holdGrade = 'good';
    if (closest.stem != null) nanoHit();
    playHoldStartSfx();
    startHoldSound(closest);
    closest.holding = true;
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + curDiff.hpGain * fm);
    let pts, txt, col;
    const _hsH = getHeightScale();
    if (closestDist < 22 * _hsH) { pts=100; txt='HOLD!'; col='#ffd700'; }
    else if (closestDist < 42 * _hsH) { pts=75; txt='HOLD!'; col='#00d4ff'; }
    else { pts=40; txt='HOLD'; col='#44dd66'; }
    score += Math.floor(pts * fm * Math.min(1 + combo * 0.01, 2.0) * getKeyBonus());
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.2;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], 6);
  } else {
    let pts, txt, col;
    let grade;
    const _hs2 = getHeightScale();
    if (closestDist < 28 * _hs2) { pts=200; txt='PERFECT'; col='#ffd700'; grade='perfect'; }
    else if (closestDist < 52 * _hs2) { pts=150; txt='GREAT'; col='#00d4ff'; grade='great'; }
    else { pts=80; txt='GOOD'; col='#44dd66'; grade='good'; }
    if (closest.stem != null) nanoHit();
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + curDiff.hpGain * fm);
    score += Math.floor(pts * fm * Math.min(1 + combo * 0.01, 2.0) * getKeyBonus());
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.3;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], fever ? 8 : 5);
    spawnBurst(getLaneX(lane), hitY, grade);
  }
}

function spawnParticles(x, y, color, count) {
  if (particles.length > (isMobile ? 60 : 150)) return;
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, sp = 60+Math.random()*180;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-60,
      life: 0.4+Math.random()*0.3, maxLife: 0.7, color, size: 3+Math.random()*5 });
  }
}

function spawnBurst(x, y, grade) {
  const conf = {
    perfect: { color1: '#ffd700', color2: '#fff7aa', color3: '#ff8800', rings: 3, sparks: 14, size: 1.8 },
    great:   { color1: '#00d4ff', color2: '#aaeeff', color3: '#0088ff', rings: 2, sparks: 10, size: 1.3 },
    good:    { color1: '#44dd66', color2: '#aaffbb', color3: '#22aa44', rings: 1, sparks: 6, size: 1.0 },
  }[grade];
  bursts.push({ x, y, time: 0, maxTime: 0.6, grade, ...conf });
  // ★ sakura_fx 장착 시 꽃잎 sprite 파티클로 교체 (링/플래시/스파클은 renderBursts 에서 그림).
  const fxActive = !!(currentHitFxSkin && SKINS[currentHitFxSkin]);
  if (fxActive) {
    const petalCount = Math.floor(conf.sparks * 0.9);
    const _mobHF = isMobile ? 0.65 : 0.85;
    for (let i = 0; i < petalCount; i++) {
      const a = Math.PI * 2 * i / petalCount + (Math.random() - 0.5) * 0.4;
      const sp = (140 + Math.random() * 240) * conf.size * _mobHF;
      particles.push({
        x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 100 * _mobHF,
        life: 0.6 + Math.random()*0.5, maxLife: 1.1,
        color: '#fff', size: (30 + Math.random() * 28) * _mobHF,
        sprite: true, spriteKey: (Math.random() < 0.5 ? 'petal1' : 'petal2'),
        rot: Math.random() * Math.PI * 2, rotVel: (Math.random() - 0.5) * 6,
      });
    }
    return;
  }
  // Big spark particles
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.PI * 2 * i / conf.sparks + (Math.random() - 0.5) * 0.4;
    const sp = (180 + Math.random() * 280) * conf.size;
    const col = Math.random() > 0.5 ? conf.color2 : conf.color1;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 120,
      life: 0.5 + Math.random()*0.4, maxLife: 0.9, color: col, size: 4 + Math.random()*7 });
  }
  // Extra scattered debris
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (60 + Math.random() * 350) * conf.size;
    particles.push({ x: x + (Math.random()-0.5)*20, y: y + (Math.random()-0.5)*10,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 150,
      life: 0.3 + Math.random()*0.5, maxLife: 0.8, color: conf.color3, size: 2 + Math.random()*5 });
  }
}

// ===== ONSET DETECTION =====
function detectOnsets(audioBuffer) {
  if (!audioBuffer) return [];
  const data = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const winSamples = Math.floor(sr * 0.015); // 15ms 윈도우
  const minGapSamples = Math.floor(sr * 0.03); // 30ms 최소 간격
  const onsets = [];
  let smoothed = 0;
  let lastOnset = -minGapSamples * 2;
  for (let i = 0; i < data.length; i += winSamples) {
    let sum = 0, cnt = 0;
    const end = Math.min(i + winSamples, data.length);
    for (let k = i; k < end; k += 8) { sum += data[k] * data[k]; cnt++; }
    const energy = cnt > 0 ? Math.sqrt(sum / cnt) : 0;
    if (energy > 0.003 && energy > smoothed * 1.1 && i - lastOnset > minGapSamples) {
      onsets.push(i / sr);
      lastOnset = i;
    }
    smoothed = energy * 0.2 + smoothed * 0.8;
  }
  return onsets;
}

function generateNodesFromOnsets(song, diff, onsetsByStem, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);
  const bgmDelay = 3.5;
  song._startDelay = bgmDelay;
  song._onsetMode = true;
  const sixteenth = 15 / song.bpm;

  // ===== vocalIntroRange 처리 (opt-in) =====
  // flag 형태:
  //   'auto' - 런타임 RMS 분석으로 보컬-only 버킷 자동 감지 (인트로 + 중간 보컬 브레이크 전부)
  //   [s, e] - 단일 범위
  //   [[s1,e1], [s2,e2], ...] - 다중 범위
  //   undefined - flag 없음, 기존 동작 완전 보존 (이 블록 진입 안 함)
  let vocalRanges = [];
  const _vir = song.vocalIntroRange;
  if (_vir === 'auto' && typeof stemAudioBuffers === 'object' && stemAudioBuffers) {
    // 동적 감지: 모든 스템 RMS 분석해서 !musical && vocal 버킷 찾기
    // instrum(3) 제외: 앰비언트 패드/리버브 테일이 배경으로 깔리는 곡이 많아서 "진짜 음악 시작" 판정엔 부적합
    // 리듬감 있는 음악 = drums/bass/piano/guitar 가 있어야 함
    const _MUSICAL = [0, 1, 4, 5];
    const _BSEC = 0.5;
    const _FL_MUSIC = 0.015;  // 음악 스템 floor
    const _FL_VOCAL = 0.008;  // 보컬 floor (조용한 보컬도 잡게)
    const _MIN_RUN = 2;        // 최소 연속 버킷 (1초)
    const _rms = {};
    let _nb = 0;
    for (const si of [0, 1, 2, 3, 4, 5]) { // + vocals(2) 포함
      const buf = stemAudioBuffers[si];
      if (!buf) { console.log('[vocalIntro auto] stem ' + si + ' NO BUFFER'); continue; }
      const d = buf.getChannelData(0);
      const sr_ = buf.sampleRate;
      const bs = Math.floor(sr_ * _BSEC);
      const nb2 = Math.ceil(d.length / bs);
      _nb = Math.max(_nb, nb2);
      const arr = new Float32Array(nb2);
      for (let b = 0; b < nb2; b++) {
        let s0 = b * bs, s1 = Math.min(s0 + bs, d.length), sum = 0, c = 0;
        for (let k = s0; k < s1; k += 32) { sum += d[k] * d[k]; c++; }
        arr[b] = c > 0 ? Math.sqrt(sum / c) : 0;
      }
      _rms[si] = arr;
    }
    const _vocalArr = _rms[2];
    if (!_vocalArr) {
      console.log('[vocalIntro auto] vocals stem not available for ' + song.name);
    } else {
      // 디버그 dump (window._vocalDebug = true 일 때만)
      if (window._vocalDebug === true) {
        const dumpLimit = Math.min(60, _nb);
        const dumpRows = [];
        for (let b = 0; b < dumpLimit; b++) {
          const t = (b * _BSEC).toFixed(1);
          const v = (_vocalArr[b] || 0).toFixed(4);
          const d0 = (_rms[0]?.[b] || 0).toFixed(4);
          const d1 = (_rms[1]?.[b] || 0).toFixed(4);
          const d3 = (_rms[3]?.[b] || 0).toFixed(4);
          const d4 = (_rms[4]?.[b] || 0).toFixed(4);
          const d5 = (_rms[5]?.[b] || 0).toFixed(4);
          let musical = false;
          for (const si of _MUSICAL) {
            const arr = _rms[si];
            if (arr && (arr[b] || 0) > _FL_MUSIC) { musical = true; break; }
          }
          const vocal = (_vocalArr[b] || 0) > _FL_VOCAL;
          const mark = (!musical && vocal) ? ' VOCAL-ONLY' : (musical ? ' music' : ' silent');
          dumpRows.push(`  ${t}s: voc=${v} dr=${d0} bs=${d1} in=${d3} pn=${d4} gt=${d5}${mark}`);
        }
        console.log('[vocalIntro auto] RMS dump for ' + song.name + ':\n' + dumpRows.join('\n'));
      }

      // 연속 구간 찾기 (최소 MIN_RUN 버킷)
      let runStart = -1;
      for (let b = 0; b <= _nb; b++) {
        let isVocalOnly = false;
        if (b < _nb) {
          let musical = false;
          for (const si of _MUSICAL) {
            const arr = _rms[si];
            if (arr && (arr[b] || 0) > _FL_MUSIC) { musical = true; break; }
          }
          const vocal = (_vocalArr[b] || 0) > _FL_VOCAL;
          isVocalOnly = !musical && vocal;
        }
        if (isVocalOnly) {
          if (runStart < 0) runStart = b;
        } else if (runStart >= 0) {
          const runLen = b - runStart;
          if (runLen >= _MIN_RUN) {
            vocalRanges.push([runStart * _BSEC, b * _BSEC]);
          }
          runStart = -1;
        }
      }
      console.log('[vocalIntro auto] ' + vocalRanges.length + ' vocal-only ranges detected for ' + song.name, vocalRanges);
    }
  } else if (Array.isArray(_vir) && _vir.length === 2 && typeof _vir[0] === 'number') {
    // 단일 범위 [s, e]
    vocalRanges = [_vir];
  } else if (Array.isArray(_vir) && _vir.length > 0 && Array.isArray(_vir[0])) {
    // 다중 범위 [[s1,e1], [s2,e2], ...]
    vocalRanges = _vir;
  }

  // 모든 stem onset을 하나로 합치되 stem 정보 유지 (vocals 제외)
  let allOnsets = [];
  for (const si in onsetsByStem) {
    if (ALWAYS_AUDIBLE_STEMS.includes(Number(si))) continue;
    for (const t of onsetsByStem[si]) {
      allOnsets.push({ time: t + bgmDelay, stem: Number(si) });
    }
  }
  // vocal ranges 안의 vocals onset 포함
  if (vocalRanges.length > 0 && onsetsByStem[2]) {
    let added = 0;
    for (const [vs, ve] of vocalRanges) {
      for (const t of onsetsByStem[2]) {
        if (t >= vs && t <= ve) {
          allOnsets.push({ time: t + bgmDelay, stem: 2 });
          added++;
        }
      }
    }
    if (added > 0) console.log('[vocalIntro] ' + added + ' vocal onsets added for ' + song.name);
  }
  // 곡별 스템 완전 제외 (excludeStems: [stemIdx, ...])
  // 스템 인덱스: 0=drums, 1=bass, 2=vocals, 3=instrum, 4=piano, 5=guitar, 6=other
  const exStems = song.excludeStems || [];
  if (exStems.length > 0) {
    allOnsets = allOnsets.filter(o => !exStems.includes(o.stem));
  }

  // ===== 자동 ambient/조용한 구간 필터 =====
  // MUSICAL_STEMS 중 하나라도 절대 RMS > 0.003 인 버킷만 "음악적"으로 판정
  // 조용한 구간(intro, outro, 새소리 등)은 onset 자동 drop
  if (typeof stemAudioBuffers === 'object' && stemAudioBuffers) {
    const MUSICAL_STEMS = [0, 1, 3, 4, 5]; // drums, bass, instrum, piano, guitar
    const BUCKET_SEC = 0.5;
    const ABS_FLOOR = 0.02; // 사람이 들리는 수준
    const stemBucketRms = {};
    let maxBuckets = 0;
    for (const si of MUSICAL_STEMS) {
      const buf = stemAudioBuffers[si];
      if (!buf) continue;
      const d = buf.getChannelData(0);
      const sr_ = buf.sampleRate;
      const bs = Math.floor(sr_ * BUCKET_SEC);
      const nb = Math.ceil(d.length / bs);
      maxBuckets = Math.max(maxBuckets, nb);
      const arr = new Float32Array(nb);
      for (let b = 0; b < nb; b++) {
        let s0 = b * bs, s1 = Math.min(s0 + bs, d.length), sum = 0, c = 0;
        for (let k = s0; k < s1; k += 32) { sum += d[k] * d[k]; c++; }
        arr[b] = c > 0 ? Math.sqrt(sum / c) : 0;
      }
      stemBucketRms[si] = arr;
    }
    const isMusical = [];
    for (let b = 0; b < maxBuckets; b++) {
      let musical = false;
      for (const si of MUSICAL_STEMS) {
        const arr = stemBucketRms[si];
        if (arr && (arr[b] || 0) > ABS_FLOOR) { musical = true; break; }
      }
      isMusical.push(musical);
    }
    // 앞뒤 1버킷 padding (갑작스런 끊김 방지)
    const paddedMusical = isMusical.slice();
    for (let b = 0; b < isMusical.length; b++) {
      if (isMusical[b]) {
        if (b > 0) paddedMusical[b - 1] = true;
        if (b < isMusical.length - 1) paddedMusical[b + 1] = true;
      }
    }
    const before = allOnsets.length;
    // vocal ranges 안은 ambient filter 제외 (보컬-only 버킷 유지)
    allOnsets = allOnsets.filter(o => {
      const relT = o.time - bgmDelay;
      if (vocalRanges.length > 0) {
        for (let vi = 0; vi < vocalRanges.length; vi++) {
          if (relT >= vocalRanges[vi][0] && relT <= vocalRanges[vi][1]) return true;
        }
      }
      const bi = Math.floor(relT / BUCKET_SEC);
      if (bi < 0 || bi >= paddedMusical.length) return true;
      return paddedMusical[bi];
    });
    if (before !== allOnsets.length) {
      console.log('ambient filter: ' + (before - allOnsets.length) + ' onsets dropped');
    }

  }

  // ===== introSparse (opt-in) — 특정 구간 onset 간 최소 간격 강제 (일반 tap 유지) =====
  // song.introSparse: [startSec, endSec, minGapSec=1.0]
  //   distinct 히트는 살아남고 노이즈/앰비언트 크라우드 drop.
  if (Array.isArray(song.introSparse) && song.introSparse.length >= 2) {
    const iS = song.introSparse[0];
    const iE = song.introSparse[1];
    const iMinGap = song.introSparse[2] || 1.0;
    const iSA = iS + bgmDelay;
    const iEA = iE + bgmDelay;
    allOnsets.sort((a, b) => a.time - b.time);
    const kept = [];
    let lastKeptIntroT = -Infinity;
    let dropped = 0;
    for (const o of allOnsets) {
      if (o.time < iSA || o.time > iEA) { kept.push(o); continue; }
      if (o.time - lastKeptIntroT >= iMinGap) {
        kept.push(o);
        lastKeptIntroT = o.time;
      } else {
        dropped++;
      }
    }
    allOnsets = kept;
    if (dropped > 0) console.log('[introSparse] ' + dropped + ' intro onsets dropped for ' + song.name);
  }

  // ===== introHolds (opt-in) — 수동 지정 hold 노트 추가 =====
  // song.introHolds: [[timeSec, durSec], [timeSec, durSec], ...]
  //   onset 없이도 특정 시점에 hold 를 명시적으로 배치. 앰비언트 드론/페이드에 대응.
  //   bgmDelay 자동 오프셋, _forceHold 플래그로 노드 생성 루프에서 hold 로 처리.
  if (Array.isArray(song.introHolds) && song.introHolds.length > 0) {
    let added = 0;
    for (const h of song.introHolds) {
      if (!Array.isArray(h) || h.length < 2) continue;
      const ht = h[0] + bgmDelay;
      const hd = h[1];
      allOnsets.push({
        time: ht, stem: 0, _forceHold: true, _holdDur: hd,
      });
      added++;
    }
    if (added > 0) console.log('[introHolds] ' + added + ' manual holds for ' + song.name);
  }

  allOnsets.sort((a, b) => a.time - b.time);

  // BPM 그리드에 퀀타이즈 (16분음표)
  for (const o of allOnsets) {
    const rel = o.time - bgmDelay;
    o.time = Math.round(rel / sixteenth) * sixteenth + bgmDelay;
  }

  // 에너지 부여
  if (energyMap && energyMap.length > 0) {
    for (const o of allOnsets) {
      const eIdx = Math.min(Math.floor((o.time - bgmDelay) / 0.5), energyMap.length - 1);
      o.energy = eIdx >= 0 ? energyMap[eIdx] : 1;
    }
  } else {
    for (const o of allOnsets) o.energy = 1;
  }

  // 너무 가까운 onset 병합 (동시노트 후보)
  const merged = [];
  for (const o of allOnsets) {
    if (merged.length > 0 && Math.abs(o.time - merged[merged.length - 1].time) < 0.03) {
      if (!merged[merged.length - 1].extra) merged[merged.length - 1].extra = [];
      merged[merged.length - 1].extra.push(o);
      continue;
    }
    merged.push(o);
  }

  // 하한 필터 제거: quiet 구간(피아노 인트로 등) 노트 드랍 방지
  const nonSilent = merged;

  // 난이도 필터링 (815d64e 원본: 음악 분음표 기준)
  const density = diff.noteDensity;
  const minGap = density <= 0.5 ? sixteenth * 4    // 쉬움: 4분음표
               : density <= 0.8 ? sixteenth * 2    // 보통: 8분음표
               : density <= 1.2 ? sixteenth * 1.5  // 어려움: 점8분음표
               : sixteenth;                        // 지옥: 16분음표
  const filtered = [];
  if (nonSilent.length > 0) {
    const songStart = nonSilent[0].time;
    const songEnd = nonSilent[nonSilent.length - 1].time;
    let slotStart = songStart;
    let nsIdx = 0;
    while (slotStart < songEnd + minGap) {
      const slotEnd = slotStart + minGap;
      let best = null, bestEnergy = -1;
      while (nsIdx < nonSilent.length && nonSilent[nsIdx].time < slotEnd) {
        if (nonSilent[nsIdx].time >= slotStart && nonSilent[nsIdx].energy > bestEnergy) {
          best = nonSilent[nsIdx]; bestEnergy = nonSilent[nsIdx].energy;
        }
        nsIdx++;
      }
      if (best) filtered.push(best);
      slotStart = slotEnd;
    }
  }

  // ===== "따단" 패턴 복구 (매우 엄격) =====
  // 버려진 onset 중 선택된 노트와 90~120ms + 에너지 100%+ (즉 전혀 약하지 않은 것)
  // 복구 상한: filtered 전체의 5% 이하
  {
    const PAIR_MIN = 0.09;
    const PAIR_MAX = 0.12;
    const ENERGY_RATIO = 1.2;
    const MAX_RESCUE_RATIO = 0.01;
    const maxRescue = Math.floor(filtered.length * MAX_RESCUE_RATIO);
    const filteredSet = new Set(filtered);
    const rescued = [];
    for (const f of filtered) {
      if (rescued.length >= maxRescue) break;
      for (const o of nonSilent) {
        if (filteredSet.has(o)) continue;
        const dt = o.time - f.time;
        if (dt < PAIR_MIN || dt > PAIR_MAX) continue;
        if (o.energy < f.energy * ENERGY_RATIO) continue;
        if (rescued.includes(o)) continue;
        rescued.push(o);
        break;
      }
    }
    filtered.push(...rescued);
    filtered.sort((a, b) => a.time - b.time);
  }

  // ===== stem 기반 레인 배분 (음악 구조 반영) =====
  const lc = laneCount;
  const holdEvery = diff.holdEvery || 999;
  const eighthDur = sixteenth * 2;

  const stemList = [...new Set(filtered.map(x => x.stem))].sort((a, b) => a - b);
  const stemBase = {};
  const songOff = songIdx % lc; // 곡마다 시작 레인 다르게
  stemList.forEach((s, i) => { stemBase[s] = (Math.floor(i * lc / Math.max(stemList.length, 1)) + songOff) % lc; });

  const stemCnt = {};
  let noteIdx = 0;
  let prevLane = -1;
  let prevTime = -1;
  const SAME_LANE_MIN_GAP = 0.3; // 같은 레인 연속 허용 최소 간격 (초, 시각 overlap 방지)

  let _lastChordTime = 0;
  for (const o of filtered) {
    if (!stemCnt[o.stem]) stemCnt[o.stem] = 0;
    const ci = stemCnt[o.stem]++;
    const base = stemBase[o.stem] || 0;

    // stem 기반 + 시드 RNG 오프셋 (815d64e 원본 방식. seeded라 결정론.)
    let lane = (base + Math.floor(rng() * lc)) % lc;

    // 같은 레인 + 0.3s 미만 = 시각적 overlap → 시프트
    // 0.3s 이상 떨어졌으면 그대로 (연타 허용)
    if (lane === prevLane && lc > 1 && (o.time - prevTime) < SAME_LANE_MIN_GAP) {
      lane = (lane + 1) % lc;
    }

    prevLane = lane;
    prevTime = o.time;
    const nd = {
      time: o.time, lane, freq: 440, type: 'note', stem: o.stem,
      hit: false, missed: false, holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    if (o._forceHold) {
      // introHolds 수동 지정 hold
      nd.type = 'hold';
      nd.endTime = nd.time + (o._holdDur || 1.2);
    } else if (holdEvery > 0 && noteIdx > 0 && noteIdx % holdEvery === 0) {
      nd.type = 'hold';
      nd.endTime = nd.time + (2 + Math.floor(rng() * 2)) * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // 동시 노트 (chord): chordMode 활성 + extra onset 보유 + 에너지 상위 구간
    if (song.chordMode && o.extra && o.extra.length > 0 && nd.type === 'note') {
      const chordGap = song.chordMinGap || 2.0;
      if (!_lastChordTime || (o.time - _lastChordTime) >= chordGap) {
        const avgEnergy = filtered.reduce((s, x) => s + (x.energy || 0), 0) / filtered.length;
        if ((o.energy || 0) >= avgEnergy * 1.3) {
          const ex = o.extra[0];
          let cLane = (lane + 1 + Math.floor(rng() * (lc - 1))) % lc;
          nodes.push({
            time: o.time, lane: cLane, freq: 440, type: 'note', stem: ex.stem != null ? ex.stem : o.stem,
            hit: false, missed: false, holding: false, holdComplete: false,
            endTime: 0, _ho1: null, _ho2: null, _hg: null

  const trapInt = diff.trapInterval || 0;
  if (trapInt > 0 && nodes.length > 0) {
    const songEnd = nodes[nodes.length - 1].time;
    for (let t = bgmDelay + 5; t < songEnd - 2; t += (trapInt * 2 + rng() * trapInt * 2) * sixteenth) {
      const tLane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) { if (Math.abs(n.time - t) < sixteenth * 2) { conflict = true; break; } }
      if (!conflict) nodes.push({ time: t, lane: tLane, freq: 0, type: 'trap', hit: false, missed: false });

  nodes.sort((a, b) => a.time - b.time);
  // 홀드 노트 구간 내 같은 레인 일반 노트 제거 (홀드 시작~끝 + 여유 0.15초)
