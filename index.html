  hg.addColorStop(0, 'rgba(122,77,255,0.25)');
  hg.addColorStop(0.5, 'rgba(180,100,255,0.18)');
  hg.addColorStop(1, 'rgba(122,77,255,0.25)');
  ctx.fillStyle = hg; ctx.fillRect(0, headerTop, W, headerH);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, headerTop, W, headerH);
  // 타이틀 — 가방 아이콘(canvas) + 텍스트. 이모지 대신 햄버거 메뉴와 동일 monochrome 아이콘.
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.font = `bold ${_mob ? sz(18) : sz(22)}px sans-serif`; ctx.fillStyle = '#fff';
  const _titleTxt = '나의 가방';
  const _titleTw = ctx.measureText(_titleTxt).width;
  const _iconR = _mob ? sz(9) : sz(11);
  const _gap = sz(10);
  const _totalW = _iconR * 2 + _gap + _titleTw;
  const _iconX = W/2 - _totalW/2 + _iconR;
  const _textX = _iconX + _iconR + _gap;
  const _titleY = headerTop + headerH/2;
  drawInlineBagIcon(_iconX, _titleY, _iconR);
  ctx.shadowColor = 'rgba(180,100,255,0.6)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff';
  ctx.fillText(_titleTxt, _textX, _titleY);
  ctx.shadowBlur = 0;

  // 탭 바 — 9 카테고리 수평 (가로 스크롤 필요 없게 짧은 라벨)
  _invBtnAreas.length = 0;
  const tabY = headerTop + headerH + sz(8);
  const tabH = sz(28);
  const tabPad = sz(8);
  ctx.font = `bold ${sz(11)}px sans-serif`;
  const tabW = (W - sz(16)) / SKIN_CATEGORIES.length;
  for (let i = 0; i < SKIN_CATEGORIES.length; i++) {
    const cat = SKIN_CATEGORIES[i];
    const tx = sz(8) + i * tabW;
    const active = cat === inventoryTab;
    ctx.fillStyle = active ? 'rgba(180,100,255,0.35)' : 'rgba(255,255,255,0.05)';
    rrFill(tx + sz(2), tabY, tabW - sz(4), tabH, sz(6));
    ctx.strokeStyle = active ? 'rgba(200,150,255,0.9)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = active ? 1.5 : 1;
    rrStroke(tx + sz(2), tabY, tabW - sz(4), tabH, sz(6));
    ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.55)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(SKIN_CATEGORY_LABELS[cat], tx + tabW/2, tabY + tabH/2);
    _invBtnAreas.push({ type:'tab', cat, x: tx + sz(2), y: tabY, w: tabW - sz(4), h: tabH });
  }

  // 컨텐츠 영역 (탭 아래 ~ 뒤로가기 위)
  const contentTop = tabY + tabH + sz(12);
  const contentBottom = _mob ? (H + safeBottom - sz(48)) : (H - 56);
  ctx.save();
  ctx.beginPath(); ctx.rect(0, contentTop, W, contentBottom - contentTop); ctx.clip();

  const owned = getOwnedSkins(inventoryTab);
  if (owned.length === 0) {
    // 빈 상태 — 회색 안내
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `${sz(13)}px sans-serif`;
    ctx.fillText('보유한 ' + SKIN_CATEGORY_LABELS[inventoryTab] + ' 스킨이 없습니다', W/2, contentTop + sz(60));
    ctx.font = `${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('상점에서 구매해보세요', W/2, contentTop + sz(82));
  } else {
    // 그리드 — 카드 형태
    const cardW = Math.min(sz(360), W * 0.92), cardX = (W - cardW) / 2;
    let yCur = contentTop + sz(8) - inventoryScroll;
    const cardH = sz(96);
    const equippedId = getEquippedSkin(inventoryTab);
    // 소유 스킨 카드들 (해제 = 자동으로 기본 스킨)
    for (const skinId of owned) {
      const s = SKINS[skinId];
      const col = (s && s.palette && s.palette[0]) || '#9f7fff';
      const equipped = equippedId === skinId;
      ctx.fillStyle = 'rgba(18,12,32,0.92)'; rrFill(cardX, yCur, cardW, cardH, sz(14));
      const cg = ctx.createLinearGradient(cardX, yCur, cardX + cardW, yCur + cardH);
      cg.addColorStop(0, col + '18'); cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg; rrFill(cardX, yCur, cardW, cardH, sz(14));
      ctx.strokeStyle = equipped ? (col + 'cc') : (col + '44');
      ctx.lineWidth = equipped ? 1.8 : 1;
      rrStroke(cardX, yCur, cardW, cardH, sz(14));
      // 좌측 액센트
      ctx.fillStyle = col; rrFill(cardX, yCur + sz(8), sz(4), cardH - sz(16), sz(2));
      // 아이콘 — 스킨 프리뷰 이미지 (투명 배경, halo 없음)
      const iconCx = cardX + sz(38), iconCy = yCur + cardH/2, iconR = sz(28);
      const preview = _getSkinPreview(skinId);
      const img = preview ? loadSkinImage(preview.path) : null;
      if (img && img.complete && img.naturalWidth) {
        const dSize = iconR * 1.7;
        if (preview.src) {
          const [sx, sy, sw, sh] = preview.src;
          ctx.drawImage(img, sx, sy, sw, sh, iconCx - dSize/2, iconCy - dSize/2, dSize, dSize);
        } else {
          ctx.drawImage(img, iconCx - dSize/2, iconCy - dSize/2, dSize, dSize);
        }
      } else {
        ctx.fillStyle = '#fff'; ctx.font = `${sz(18)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('★', iconCx, iconCy);
      }
      // 라벨
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(14)}px sans-serif`; ctx.fillStyle = '#fff';
      ctx.fillText(_getSkinDisplayName(skinId), cardX + sz(74), yCur + cardH/2 - sz(10));
      ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillText(SKIN_CATEGORY_LABELS[inventoryTab] + ' 스킨', cardX + sz(74), yCur + cardH/2 + sz(10));
      // 버튼 (장착 or 해제)
      const bbw = sz(76), bbh = sz(32);
      const bbx = cardX + cardW - bbw - sz(12), bby = yCur + (cardH - bbh)/2;
      if (equipped) {
        ctx.fillStyle = col + '22'; rrFill(bbx, bby, bbw, bbh, sz(8));
        ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 1; rrStroke(bbx, bby, bbw, bbh, sz(8));
        ctx.fillStyle = col;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `bold ${sz(12)}px sans-serif`;
        ctx.fillText('해제', bbx + bbw/2, bby + bbh/2);
        _invBtnAreas.push({ type:'unequip', cat: inventoryTab, x:bbx, y:bby, w:bbw, h:bbh });
      } else {
        const btnG = ctx.createLinearGradient(bbx, bby, bbx, bby + bbh);
        btnG.addColorStop(0, col); btnG.addColorStop(1, col + 'aa');
        ctx.fillStyle = btnG; rrFill(bbx, bby, bbw, bbh, sz(8));
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; rrStroke(bbx, bby, bbw, bbh, sz(8));
        ctx.fillStyle = '#1a0d2e';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `bold ${sz(12)}px sans-serif`;
        ctx.fillText('장착', bbx + bbw/2, bby + bbh/2);
        _invBtnAreas.push({ type:'equip', cat: inventoryTab, id: skinId, x:bbx, y:bby, w:bbw, h:bbh });
      }
      yCur += cardH + sz(10);
    }
    // 스크롤 최대값 저장
    const bottomAbs = yCur + inventoryScroll + sz(40);
    window._inventoryMaxScroll = Math.max(0, bottomAbs - contentBottom);
  }
  ctx.restore();

  // 뒤로가기 (shop 과 동일 스타일)
  const _mpBack = isMobile;
  const _mpLand = isMobile && !isPortrait && !isTablet && H < 500;
  const bbW = _mpBack ? (_mpLand ? sz(46) : sz(36)) : 70;
  const bbH = _mpBack ? (_mpLand ? sz(34) : sz(28)) : 38;
  const bbX = _mpBack ? sz(8) : 12;
  const bbY = _mpBack ? (H + safeBottom - sz(4) - bbH) : (H - bbH - 10);
  window._inventoryBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; rrStroke(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textBaseline = 'middle';
  if (_mpBack) { ctx.font = `bold ${_mpLand ? sz(18) : sz(16)}px sans-serif`; ctx.fillText('←', bbX + bbW/2, bbY + bbH/2); }
  else { ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillText('← 뒤로', bbX + bbW/2, bbY + bbH/2); }
  ctx.textBaseline = 'alphabetic';
  renderBottomBar();
}

function handleInventoryClick(mx, my) {
  if (handleHamburgerClick(mx, my)) return;
  const _ibb = window._inventoryBackBtn;
  if (_ibb && hitTest(mx, my, _ibb.x, _ibb.y, _ibb.w, _ibb.h)) {
    playScrollTick(); stopInventoryBgm(); transitionTo('select'); return;
  }
  for (const b of _invBtnAreas) {
    if (hitTest(mx, my, b.x, b.y, b.w, b.h)) {
      if (b.type === 'tab') { playScrollTick(); inventoryTab = b.cat; inventoryScroll = 0; return; }
      if (b.type === 'equip') {
        playScrollTick();
        setEquippedSkin(b.cat, b.id);
        showLoginToast(_getSkinDisplayName(b.id) + ' 장착 완료', '#44dd66');
        return;
      }
      if (b.type === 'unequip') {
        playScrollTick();
        setEquippedSkin(b.cat, null);
        showLoginToast(SKIN_CATEGORY_LABELS[b.cat] + ' 해제 (기본 스킨)', '#88aaff');
        return;
      }
    }
  }
}

function renderTitle() {
  // 우주 성운 글로우 배경 (안전 영역 포함)
  const t0 = Date.now();
  const _totalH = H + safeTop + safeBottom;
  const nebulaAlpha = 0.06 + Math.sin(t0 * 0.0005) * 0.02;
  const nebGrad1 = ctx.createRadialGradient(W * 0.3, H * 0.25, 0, W * 0.3, H * 0.25, W * 0.5);
  nebGrad1.addColorStop(0, `rgba(80,40,160,${nebulaAlpha})`);
  nebGrad1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad1; ctx.fillRect(0, -safeTop, W, _totalH);
  const nebGrad2 = ctx.createRadialGradient(W * 0.75, H * 0.65, 0, W * 0.75, H * 0.65, W * 0.4);
  nebGrad2.addColorStop(0, `rgba(30,60,140,${nebulaAlpha * 0.8})`);
  nebGrad2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad2; ctx.fillRect(0, -safeTop, W, _totalH);

  // 별 (반짝임 + 일부 컬러)
  for (const s of stars) {
    const twinkle = 0.3 + Math.sin(t0 * s.twinkleSpeed + s.twinkleOffset) * 0.4;
    ctx.globalAlpha = s.b * Math.max(0.1, twinkle);
    if (s.colored) {
      ctx.fillStyle = `hsl(${s.hue},70%,80%)`;
    } else {
      ctx.fillStyle = '#fff';
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // 큰 별에 글로우 (shadowBlur 제거 → 단순 반투명 원으로 대체)
    if (s.s > 2.0 && twinkle > 0.55) {
      ctx.globalAlpha = s.b * twinkle * 0.08;
      ctx.fillStyle = s.colored ? `hsl(${s.hue},60%,75%)` : '#aaccff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.s * 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // 별똥별 (간헐적)
  if (Math.random() < 0.008) spawnShootingStar();
  renderShootingStars();

  // Title particles
  spawnTitleParticles();
  updateTitleParticles();
  for (const p of titleParticles) {
    ctx.globalAlpha = p.life * (p.type === 'spark' ? 0.8 : 0.35);
    if (p.type === 'spark') {
      // shadowBlur 제거 — Edge 성능 개선
    }
    ctx.fillStyle = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // 전체 가시 영역 기준 y 헬퍼 (안전 영역 포함)
  const _visTop = -safeTop;
  const _visH = H + safeTop + safeBottom;
  const _visY = (ratio) => _visTop + _visH * ratio;

  // EQ bars
  const eqCount = 30, eqGap = 4;
  const eqTotalW = W * 0.75;
  const eqBarW = (eqTotalW - (eqCount-1)*eqGap) / eqCount;
  const eqX0 = (W - eqTotalW) / 2;
  const eqCenterY = _visY(0.46);
  for (let i=0;i<eqCount;i++) {
    const bx = eqX0 + i * (eqBarW + eqGap);
    const bh = 20 + Math.sin(Date.now()*0.004+i*0.6)*18 + Math.sin(Date.now()*0.007+i*1.1)*10;
    const alpha = 0.08 + Math.sin(Date.now()*0.003+i*0.4)*0.04;
    ctx.fillStyle = `rgba(130,90,255,${alpha})`;
    ctx.fillRect(bx, eqCenterY-bh/2, eqBarW, bh);
  }

  // Logo — 2줄 분리 + 글로우
  const t = Date.now();
  ctx.save(); ctx.translate(W/2, _visY(0.33));
  const p = 1 + Math.sin(t*0.002)*0.015; ctx.scale(p, p);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // "NANO" — 가볍고 얇은 스타일
  const nanoSize = sz(48);
  ctx.font = `200 ${nanoSize}px sans-serif`;
  ctx.letterSpacing = `${nanoSize * 0.3}px`;
  // 글로우 레이어
  ctx.shadowColor = 'rgba(100,180,255,0.4)'; ctx.shadowBlur = 12;
  ctx.fillStyle = 'rgba(180,210,255,0.9)';
  ctx.fillText('N A N O', 0, -nanoSize * 0.55);
  ctx.shadowBlur = 0;

  // 구분선 — 그라데이션 + 펄스
  const lineW = sz(280);
  const lineAlpha = 0.4 + Math.sin(t*0.003)*0.15;
  const lineGrad = ctx.createLinearGradient(-lineW/2, 0, lineW/2, 0);
  lineGrad.addColorStop(0, `rgba(100,180,255,0)`);
  lineGrad.addColorStop(0.3, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(0.5, `rgba(200,160,255,${lineAlpha + 0.2})`);
  lineGrad.addColorStop(0.7, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(1, `rgba(100,180,255,0)`);
  ctx.fillStyle = lineGrad;
  ctx.fillRect(-lineW/2, -2, lineW, 3);
  // 라인 위 작은 빛 점 이동
  const dotX = (Math.sin(t*0.002) * lineW * 0.4);
  ctx.beginPath(); ctx.arc(dotX, -0.5, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
  ctx.fill(); ctx.shadowBlur = 0;

  // "RHYTHM" — 굵고 강렬한 스타일
  const rhythmSize = sz(62);
  ctx.font = `900 ${rhythmSize}px sans-serif`;
  // 보라→파랑 그라데이션 텍스트
  const txtGrad = ctx.createLinearGradient(-rhythmSize*2, 0, rhythmSize*2, 0);
  txtGrad.addColorStop(0, '#b060ff');
  txtGrad.addColorStop(0.5, '#e0c0ff');
  txtGrad.addColorStop(1, '#60a0ff');
  ctx.fillStyle = txtGrad;
  ctx.shadowColor = 'rgba(160,100,255,0.5)'; ctx.shadowBlur = 15;
  ctx.fillText('RHYTHM', 0, rhythmSize * 0.55);
  ctx.shadowBlur = 0;

  ctx.restore();

  // 버전 표시 (Kplay 캐시 확인용) — 설정 버튼과 안 겹치게 좌측 하단
  // ★ 업데이트 감지 진단 정보 포함 — __BUILD_TS 끝자리 6 + 체크 상태
  //   정상: 'v15.8 · 360000 ✓360000' (서버 TS 감지됨)
  //   에러: 'v15.8 · 360000 !HTTP_404' (fetch 실패 원인)
  //   opacity 0.15 → 일반 유저는 version string 으로 인식하고 패스
  ctx.font = `${sz(9)}px sans-serif`; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  let _vLabel = 'v15.8 · ' + String(window.__BUILD_TS || 0).slice(-6);
  if (window.__lastUpdateCheckErr) {
    _vLabel += ' !' + String(window.__lastUpdateCheckErr).slice(0, 16);
  } else if (window.__lastUpdateCheck) {
    _vLabel += ' ✓' + String(window.__lastUpdateCheck.srv).slice(-6);
  }
  ctx.fillText(_vLabel, 6, H + safeBottom - 4);

  // ===== 프리로드 프로그레스바 =====
  if (!_preloadDone && _preloadTotal > 0) {
    const pct = _preloadTotal > 0 ? (_preloadLoaded + _preloadFailed) / _preloadTotal : 0;
    const barW = Math.min(sz(260), W * 0.65), barH = sz(8);
    const barX = (W - barW) / 2, barY = _visY(0.62);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rrFill(barX, barY, barW, barH, sz(4));
    ctx.fillStyle = '#9e7aff';
    rrFill(barX, barY, barW * pct, barH, sz(4));
    ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`패치 중... ${Math.round(pct * 100)}%`, W / 2, barY - sz(8));
    return;
  }

  if (!currentUser) {
    // ===== 비로그인: Kplay 로그인 버튼 =====
    loginBtnAreas = [];
    const btnW = Math.min(sz(260), W * 0.78), btnH = sz(44);
    const by = _visY(0.62) - btnH / 2;
    const btnStartX = (W - btnW) / 2;

let nicknameChecking = false;
function confirmNickname() {
  const name = nicknameInput.trim();
  const err = validateNickname(name);
  if (err) { nicknameError = err; return; }
  if (nicknameChecking) return;

  // 로컬 캐시에서 즉시 중복 체크
  const localCache = getLocalNicknames();
  if (localCache[name] && localCache[name] !== pendingAuthUid) {
    nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.';
    return;
  }

  nicknameChecking = true;
  nicknameError = '';
  let resolved = false;
  const finish = (dup) => {
    if (resolved) return; resolved = true;
    nicknameChecking = false;
    if (dup) { nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.'; }
    else { saveLocalNickname(name, pendingAuthUid); nicknameError = ''; completeLogin(name, pendingAuthMethod); }
  };
  // 500ms 내 응답 없으면 로컬 캐시 기준으로 통과
  setTimeout(() => finish(false), 500);
  try {
    fbDb.ref('nicknames/' + name).once('value', snap => {
      const val = snap.val();
      if (val && val !== pendingAuthUid) finish(true);
      else finish(false);
    });
  } catch(e) { finish(false); }
}

// Select screen layout helper
let selectParticles = [];
function updateSelectParticles() {
  // Spawn
  const spawnCount = selectParticles.length < 50 ? 2 : 0;
  for (let s = 0; s < spawnCount; s++) {
    const sc = songs[selectedSong] ? songs[selectedSong].color : '#fff';
    selectParticles.push({
      x: Math.random() * W, y: H + 5 + Math.random()*20,
      vx: (Math.random()-0.5)*0.5, vy: -(0.3+Math.random()*0.8),
      size: 2.5+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
      color: sc
    });
  }
  for (let i = selectParticles.length-1; i >= 0; i--) {

    p.x += p.vx; p.y += p.vy; p.life -= p.decay;

    if (p.life <= 0 || p.y < -10) selectParticles.splice(i,1);

}

function getSelectLayout() {

  const _mobileLandscape = isMobile && !isPortrait && !isTablet && H < 500;
  // 가로 마진 고려: optW가 화면을 넘지 않도록 제한
  const optW = Math.min(sz(420), W - sz(16));
  // CD 크기: 모바일 가로는 visH 비율을 적당히 키움
  const cdSize = _mobileLandscape ?
      Math.min(sz(160), visH * 0.34, W * 0.3)
    : Math.min(sz(200), visH * 0.26, W * 0.4);
  const cardW = cdSize, cardH = cdSize, gap = sz(20);
  const songTotalW = songs.length * (cardW + gap) - gap;
  // 모든 spacing은 sz() — UI 스케일에 비례
  const optH = _mobileLandscape ? Math.min(sz(30), visH * 0.075) : Math.min(sz(42), visH * 0.055);
  const optGap = Math.max(sz(10), visH * 0.018);
  const sectionGap = Math.max(sz(10), visH * 0.016);
  const subBtnH = Math.min(sz(34), visH * 0.042);
  const subBtnGap = Math.max(sz(10), visH * 0.014);
  // 컴팩트 가로: 텍스트 폰트 sz(14)/sz(10)에 맞춰 자리 sz()로 부여 + 충분한 여유
  const searchBarH = _mobileLandscape ? sz(20) : sz(30);
  const titleH = _mobileLandscape ? sz(22) : sz(28);

  const btnH = Math.min(sz(44), visH * 0.058);

  const labelH = sz(18);
  // 시작 버튼은 화면 최하단에 별도 고정이므로 flow에서 제외
  const totalH =
      titleH + titleToSearchGap
    + searchBarH + searchToSongGap
    + cardH + cdTextH
    + subBtnGap + subBtnH
    + sectionGap + labelH + optH

  // 하단 바 영역(시작 버튼 + 차트/햄버거 등)을 제외한 상단 공간에서 flow 중앙 정렬
  const bottomReserve = btnH + sz(50); // 시작 버튼 + 하단 바

  const searchBarY = topY + titleH + titleToSearchGap; // search bar 상단
  const songRowY = searchBarY + searchBarH + searchToSongGap;
  return { cardW, cardH, gap, topY, titleY, searchBarY, songRowY, optW, optH, optGap, sectionGap, songTotalW, subBtnH, subBtnGap, searchBarH, btnH, cdTextH };
}
let snapAnimStart = 0, snapAnimFrom = 0, snapAnimTo = 0, snapAnimDur = 0;
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
// === 곡 선택 화살표 hold-to-scroll (가속) ===
let _selectArrowHoldDir = 0;     // -1: 좌, 1: 우, 0: 미사용
let _selectArrowHoldStart = 0;
let _selectArrowLastFire = 0;
function _fireSelectArrowAdvance() {
  const p = _dPos(selectedSong);
  const next = p + _selectArrowHoldDir;
  if (next < 0 || next >= _dLen()) { _selectArrowHoldDir = 0; return; }
  selectedSong = _dSong(next);
  loadSongDiffSpeed(selectedSong);
  scrollToSong(selectedSong);
  playScrollSound();
}
function startSelectArrowHold(dir) {
  if (_selectArrowHoldDir === dir) return;
  _selectArrowHoldDir = dir;
  _selectArrowHoldStart = performance.now();
  // 첫 발사는 클릭 핸들러가 이미 한번 처리했으므로, hold 시작 후 350ms 대기
  _selectArrowLastFire = _selectArrowHoldStart;
}
function stopSelectArrowHold() { _selectArrowHoldDir = 0; }
function updateSelectArrowHold() {
  if (!_selectArrowHoldDir) return;
  if (state !== 'select') { _selectArrowHoldDir = 0; return; }
  const now = performance.now();
  const elapsed = now - _selectArrowHoldStart;
  // 첫 hold 200ms 대기 후, 150ms → 45ms 로 가속 (700ms에 걸쳐)
  let interval;
  if (elapsed < 200) interval = 200;
  else {
    const t = Math.min(1, (elapsed - 200) / 700);
    interval = 150 - (150 - 45) * t;
  }
  if (now - _selectArrowLastFire >= interval) {
    _fireSelectArrowAdvance();
    _selectArrowLastFire = now;
  }
}

// ===== LOGIN SHOOTING STARS =====
let shootingStars = [];
function spawnShootingStar() {
  const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2; // 대각선 하강 (우하단 방향)
  const speed = 200 + Math.random() * 350;
  const startX = Math.random() * W * 1.2 - W * 0.1;
  const startY = -10 - Math.random() * H * 0.3;
  const hue = Math.random() > 0.6 ? 45 + Math.random() * 20 : 200 + Math.random() * 60; // 금색 or 파란색
  const brightness = 0.7 + Math.random() * 0.3;
  const tailLen = 8 + Math.floor(Math.random() * 12);
  shootingStars.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.2 + Math.random() * 1.5,
    maxLife: 1.2 + Math.random() * 1.5,
    size: 1.5 + Math.random() * 2,
    hue, brightness, tailLen,
    trail: [] // 잔상 좌표 저장
  });
}
function updateShootingStars(dt) {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.trail.unshift({ x: ss.x, y: ss.y });
    if (ss.trail.length > ss.tailLen) ss.trail.pop();
    ss.x += ss.vx * dt;
    ss.y += ss.vy * dt;
    ss.life -= dt;
    if (ss.life <= 0 || ss.x > W + 50 || ss.y > H + 50) {
      shootingStars.splice(i, 1);
    }
  }
}
function renderShootingStars() {
  for (const ss of shootingStars) {
    const fade = Math.min(1, ss.life / (ss.maxLife * 0.3)); // 마지막 30%에서 페이드아웃
    // 꼬리 (잔상)
    for (let t = 0; t < ss.trail.length; t++) {
      const p = ss.trail[t];
      const alpha = (1 - t / ss.trail.length) * fade * ss.brightness * 0.6;
      const sz2 = ss.size * (1 - t / ss.trail.length * 0.7);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${ss.hue},80%,${70 + t * 2}%)`;
      ctx.fillRect(p.x - sz2/2, p.y - sz2/2, sz2, sz2);
    }
    // 머리 (밝은 점)
    ctx.globalAlpha = fade * ss.brightness;
    ctx.shadowColor = `hsl(${ss.hue},90%,80%)`;
    ctx.shadowBlur = 6 + ss.size * 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ss.x, ss.y, ss.size * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawAppleIcon(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy); ctx.scale(r / 10, r / 10);

// ===== PAUSE ON TAB HIDDEN =====
let gamePaused = false;
let bgAudioState = null; // 백그라운드 진입 전 오디오 상태 저장

    if (titleBgmPlaying) titleBgm.pause();

    if (shopBgmPlaying && shopBgm) shopBgm.pause();

    }

    lastTime = 0;
    // 복귀 시: 인게임이 아닌 오디오만 자동 복원 (인게임은 resumeGame으로 처리)
    if (bgAudioState.titleBgm && state !== 'playing') { titleBgm.play().catch(()=>{}); }
    if (bgAudioState.rankingBgm && state === 'ranking' && rankingBgm) { rankingBgm.play().catch(()=>{}); }
    if (bgAudioState.shopBgm && state === 'shop' && shopBgm) { shopBgm.play().catch(()=>{}); }
    if (bgAudioState.achievementBgm && state === 'achievement' && achievementBgm) { achievementBgm.play().catch(()=>{}); }
    if (bgAudioState.inventoryBgm && state === 'inventory' && inventoryBgm) { inventoryBgm.play().catch(()=>{}); }
    if (bgAudioState.preview && state === 'select' && songPreviewAudio) {
      // Preview 복귀 시 사이클 완전 리셋 — 백그라운드 중 어긋난 타이밍 정정
      try {
        songPreviewAudio.currentTime = 0;
        previewCycleStart = performance.now();
        songPreviewAudio.play().catch(()=>{});
      } catch(e) {}
    }

  }
});

// 오디오 디바이스 변경 (이어폰 분리/연결) — actx.state 변화와 무관하게 감지
try {
  if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
    navigator.mediaDevices.addEventListener('devicechange', () => {
      if (state === 'playing' && !gamePaused) {
        pauseGame();
      }
    });
  }
} catch(e) {}

let pausedAtTime = 0; // 멈춤 시점의 gameTime
function pauseGame() {
  if (state !== 'playing' || gamePaused) return;
  gamePaused = true;
  pausedAtTime = gameTime;
  // ABS 모드: source 정지
  if (window._absNodes) {
    window._absPausedAt = actx ? actx.currentTime - window._absStartCtx : gameTime;
    for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} }
    window._absNodes = null;
  }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) allStemAudios[i].pause();
  }
  for (const a of pulseStemAudios) { if (a) a.pause(); }
  if (songAudio) songAudio.pause();
}

let _prevActxState = ''; // actx 상태 전환 감지용
let _bgmNeedsResume = false;
let _audioInterrupted = false;
let _suspendPauseTimer = null; // transient suspended blip 무시용 디바운스
let _suspendStartAt = 0; // update() 내 actx suspend 디바운스용 — 500ms 넘으면 pause
// iOS 오디오 인터럽트 복구 (알람/전화 후)
// ★ iOS 오디오 컨텍스트는 노드 생성/SFX 재생 등으로 짧게 suspended 됐다가 즉시 running 복귀하는 경우 있음.
//   이걸 즉시 pauseGame 하면 MISS/따닥 시 flash 없이 게임이 일시 정지 → 다음 탭으로 자동 resume 되는
//   silent drop 증상 유발. 'suspended' 는 500ms 디바운스, 'interrupted' 만 즉시 pause.
function _onActxStateChange() {
  if (!actx) return;
  // ★ 인게임 중 actx 상태 변경 이벤트 게이팅 — SFX 생성으로 인한 잦은 state change 가
  //   clearTimeout/setTimeout 누적 유발 → 메인 스레드 오버헤드. 게임 중엔 무시.
  if (state === 'playing') return;
  if (actx.state === 'running') {
    _bgmNeedsResume = true;
    if (_suspendPauseTimer) { clearTimeout(_suspendPauseTimer); _suspendPauseTimer = null; }
  } else if (actx.state === 'interrupted' || actx.state === 'suspended') {
    // ★ 'interrupted'/'suspended' 둘 다 500ms 디바운스. iOS 는 rapid SFX 중 순간 interrupted
    //   상태로 진입했다 즉시 running 복귀하는 경우가 있는데, 즉시 pauseGame 하면 그 찰나의
    //   탭이 gamePaused early return 으로 차단되어 씹힘 발생. 진짜 전화/알람 같은 장기 인터럽트는
    //   500ms 안에 복귀 안 하니까 그대로 pause 처리됨.
    if (_suspendPauseTimer) clearTimeout(_suspendPauseTimer);
    _suspendPauseTimer = setTimeout(() => {
      _suspendPauseTimer = null;
      if (actx && (actx.state === 'suspended' || actx.state === 'interrupted')) {
        _audioInterrupted = true;
        if (state === 'playing' && !gamePaused) pauseGame();
      }

  }
}
if (actx) {
  try { actx.addEventListener('statechange', _onActxStateChange); } catch(e) {}
  actx.onstatechange = _onActxStateChange;
}
// actx 가 suspended→running 복구 시 ABS 소스 재생성 (이어폰 재연결 등)
function _restartAudioAfterContextResume() {
  if (!actx || actx.state !== 'running' || countdownTime > 0) return;
  try {
    const targetTime = gameTime - (curSong && curSong._startDelay || 0);
    if (targetTime < 0) return;
    if (stemAudioBuffers && Object.keys(stemAudioBuffers).length > 0) {
      // ABS 모드: 기존 소스 정리 후 재생성
      if (window._absNodes) {
        for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} }
      }
      window._absNodes = [];
      window._absGains = [];
      window._absStartCtx = actx.currentTime - targetTime;
      for (let i = 0; i < allStemAudios.length; i++) {
        if (stemAudioBuffers[i]) {
          const g = actx.createGain(); g.connect(actx.destination); window._absGains[i] = g;
          const src = actx.createBufferSource();
          src.buffer = stemAudioBuffers[i];
          src.connect(window._absGains[i]);
          src.start(0, Math.max(0, targetTime));
          window._absNodes.push(src);
        } else { window._absNodes.push(null); }
      }
    } else if (songAudio) {
      songAudio.currentTime = targetTime;
      songAudio.play().catch(()=>{});
    }
  } catch(e) { console.warn('[audio] restart failed:', e); }
}
function resumeGame() {
  if (!gamePaused) return;
  gamePaused = false;
  lastTime = 0; // dt 스파이크 방지: 다음 프레임을 첫 프레임처럼 처리
  resumeSyncCounter = 15; // 재개 후 15프레임간 오디오에 강제 동기화
  _prevActxState = ''; // 전환 감지 리셋 — resume 직후 재pause 방지
  resumeAudio();
  if (countdownTime <= 0) {
    const targetTime = pausedAtTime;
    gameTime = targetTime;
    if (actx && actx.state !== 'running') actx.resume().catch(()=>{});
    // 기존 ABS 소스 정리
    if (window._absNodes) { for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} } }
    window._absNodes = null;
    window._absGains = null;
    window._absStartCtx = null;
    window._absPausedAt = null;
    _audioInterrupted = false;
    // 1순위: ABS 재생성 (actx.currentTime 샘플 정확도 — HTML Audio seek 지연 100~500ms 회피)
    const _canAbs = actx && usingStemMode && stemAudioBuffers && Object.keys(stemAudioBuffers).length > 0;
    if (_canAbs) {
      // ★ onset 모드의 _startDelay(3.5s) 만큼 buffer offset 빼야 함.
      //   불변식: audioRef = (actx.currentTime - _absStartCtx) + _startDelay = gameTime
      //   따라서 buffer_pos = targetTime - _startDelay, _absStartCtx 도 그에 맞춰.
      const _sd = (curSong && curSong._startDelay) || 0;
      const _bufOff = Math.max(0, targetTime - _sd);
      window._absNodes = [];
      window._absGains = [];
      window._absStartCtx = actx.currentTime - _bufOff;
      songStartTime = actx.currentTime - _bufOff;
      const _audioDest = (gameMode === 'nano' && nanoFilter) ? nanoFilter : actx.destination;
      if (gameMode === 'nano' && nanoFilter) { try { nanoFilter.connect(actx.destination); } catch(e){} }
      for (let i = 0; i < allStemAudios.length; i++) {
        if (stemAudioBuffers[i]) {
          const gain = actx.createGain();
          const _isAlways = ALWAYS_AUDIBLE_STEMS.includes(i);
          gain.gain.value = (_isAlways ? STEM_VOL_VOCAL : STEM_VOL_NORMAL) * volBgm;
          gain.connect(_isAlways ? actx.destination : _audioDest);
          const src = actx.createBufferSource();
          src.buffer = stemAudioBuffers[i];
          src.connect(gain);
          src.start(0, _bufOff);
          window._absNodes.push(src);
          window._absGains.push(gain);
        } else {
          window._absNodes.push(null);
          window._absGains.push(null);
        }
        // HTML Audio 는 뮤트 상태로 position 참조용만 — HTML 은 buffer 기준이므로 동일 offset
        if (allStemAudios[i]) { allStemAudios[i].volume = 0; allStemAudios[i].currentTime = _bufOff; allStemAudios[i].play().catch(()=>{}); }
      }
    } else if (usingStemMode) {
      // ABS 불가 (buffer 없음) — HTML Audio fallback. 동일하게 _startDelay 보정.
      const _sdH = (curSong && curSong._startDelay) || 0;
      const _bufOffH = Math.max(0, targetTime - _sdH);
      if (actx) songStartTime = actx.currentTime - _bufOffH;
      for (let i = 0; i < allStemAudios.length; i++) {
        if (allStemAudios[i]) {
          const isAlways = ALWAYS_AUDIBLE_STEMS.includes(i);
          allStemAudios[i].volume = (isAlways ? STEM_VOL_VOCAL : STEM_VOL_NORMAL) * volBgm;
          allStemAudios[i].currentTime = _bufOffH;
          allStemAudios[i].play().catch(()=>{});
        }
      }
      for (let i = 0; i < pulseStemAudios.length; i++) {
        if (pulseStemAudios[i]) { pulseStemAudios[i].currentTime = _bufOffH + PULSE_LEAD; pulseStemAudios[i].play().catch(()=>{}); }
      }
    } else if (songAudio) {
      const _sdS = (curSong && curSong._startDelay) || 0;
      const _bufOffS = Math.max(0, targetTime - _sdS);
      if (actx) songStartTime = actx.currentTime - _bufOffS;
      songAudio.currentTime = _bufOffS;
      songAudio.play().catch(()=>{});
    }
  }
}

// ===== LOOP =====
let lastTime = 0;

// 실제 치수가 바뀌면 resize 이벤트를 놓치지 않도록 loop에서 직접 체크.

  }
}

  lastTime = time;

    else update(dt);

  else updateFade(dt);

    const _inPlay = (state === 'playing' && !gamePaused && countdownTime <= 0 && !songLoading);
    if (_inPlay) {
      const _am = window._dbg.autoMissCount || 0;
      const _sm = window._dbg.suspiciousMissCount || 0;
      const _cm = window._dbg.confirmedMissCount || 0;  // window 내 탭인데 miss = 진짜 씹힘
      const _sf = window._dbg.frameGapLog ? window._dbg.frameGapLog.length : 0;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = _cm > 0 ? 'rgba(255,51,102,0.95)' : (_sm > 0 ? 'rgba(180,120,40,0.85)' : 'rgba(40,40,40,0.75)');
      ctx.fillRect(4, 4, 210, 20);

    // 확인 버튼

  // 해상도 디버깅: 콘솔에서 `window._dimDebug = true` 로 켜고 `false` 로 끔.
  // - 4개 dim 소스(client/vviewp/inner/probe) + canvas 테두리 + 시작버튼 Y 가이드
  // - 해상도 버그 재발/다른 디바이스 테스트 시 바로 재활용 (feedback_viewport_measurement.md 참조)

}
function renderDimDebug() {
  const de = document.documentElement;
  const vv = window.visualViewport;
  const cW = de ? de.clientWidth  : innerWidth;
  const cH = de ? de.clientHeight : innerHeight;
  const vW = vv ? Math.round(vv.width)  : -1;
  const vH = vv ? Math.round(vv.height) : -1;
  const probe = readViewport();
  const dpr = window.devicePixelRatio || 1;

  if (state === 'select') {
    const _visH = H + safeTop + safeBottom;
    _btnH2 = Math.min(Math.round(44 * UI), _visH * 0.058);
    _btnY2 = H + safeBottom - _btnH2 - Math.round(40 * UI);
    _btnDbg = 'btn=' + _btnY2.toFixed(0) + '..' + (_btnY2 + _btnH2).toFixed(0);
  }
  const lines = [
    'W×H=' + W + '×' + H,
    'canvas=' + canvas.width + '×' + canvas.height,
    'client=' + cW + '×' + cH,
    'vviewp=' + vW + '×' + vH,
    'inner =' + innerWidth + '×' + innerHeight,
    'probe =' + probe.w + '×' + probe.h,
    'dpr=' + dpr + ' UI=' + UI.toFixed(2),
    'isMobile=' + isMobile + ' Portrait=' + isPortrait,
    'isTablet=' + isTablet + ' iframe=' + inIframe,
    'safe T/B/L/R=' + safeTop + '/' + safeBottom + '/' + safeLeft + '/' + safeRight,
    'state=' + state + ' ' + _btnDbg,
  ];
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  const padX = 8, padY = 6, lineH = 15;
  const boxW = 260, boxH = lines.length * lineH + padY * 2;
  const boxX = Math.round((cW - boxW) / 2);
  const boxY = Math.round((cH - boxH) / 2);
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
  ctx.strokeRect(boxX + 0.5, boxY + 0.5, boxW, boxH);
  ctx.fillStyle = '#0ff';
  lines.forEach((s, i) => ctx.fillText(s, boxX + padX, boxY + padY + i * lineH));
  // 시작 버튼 예상 위치에 녹색 가이드 라인
  if (_btnY2 >= 0) {
    const _cy1 = _btnY2 + safeTop;
    const _cy2 = _btnY2 + _btnH2 + safeTop;
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, _cy1); ctx.lineTo(cW, _cy1);
    ctx.moveTo(0, _cy2); ctx.lineTo(cW, _cy2);

    ctx.fillText('↑ startBtn top (' + _cy1.toFixed(0) + ')', 10, _cy1 - 16);
    ctx.fillText('↓ startBtn bottom (' + _cy2.toFixed(0) + ')', 10, _cy2 + 4);

// ★ 페이지 로드 직후 prewarmup — 업데이트 직후 첫 곡 stutter 방지.
//   핵심: sakura_fx sprite 분기는 _hitFxData() 가 null 이면 JIT 안 됨 → 이미지 로드 완료 후에

(() => {
  const doWarmup = () => {
    if (window._prewarmDone) return true;
    try {
      if (typeof renderBursts !== 'function' || typeof renderParticles !== 'function') return false;
      const fx = (typeof _hitFxData === 'function') ? _hitFxData() : null;

        color: 'rgba(255,255,255,0.9)', size: 5,

        _mk({ sprite: true, spriteKey: 'drift',   rot: 0, rotVel: 1 }),
        _mk({ sprite: true, spriteKey: 'petal1',  rot: 0, rotVel: 1 }),
        _mk({ sprite: true, spriteKey: 'petal2',  rot: 0, rotVel: 1 }),
        _mk({ sprite: true, spriteKey: 'sparkle', rot: 0, rotVel: 1 }),
        _mk({})  // fallback fillRect

        rings: 3, sparks: 14, size: 1.8, color1: '#ffd700', color2: '#fff', color3: '#f80' });
      holdGlows.push({ x: -500, y: -500, time: 0.01, maxTime: 0.35,

      for (let _i = 0; _i < 200; _i++) { renderParticles(); renderBursts(); renderHoldGlows(); }
      ctx.restore();
      particles.length = 0; bursts.length = 0; holdGlows.length = 0;
      // spawnBurst + spawnParticles 도 각각 여러 번 반복 — Turbofan 트리거
      try {
        if (typeof spawnBurst === 'function') {
          for (let _i = 0; _i < 70; _i++) { spawnBurst(-500, -500, 'perfect'); spawnBurst(-500, -500, 'great'); spawnBurst(-500, -500, 'good'); }
        }
        if (typeof spawnParticles === 'function') {
          for (let _i = 0; _i < 120; _i++) spawnParticles(-500, -500, '#fff', 3);
        }
      } catch(e) {}
      particles.length = 0; bursts.length = 0; holdGlows.length = 0;

      if (typeof renderNotes === 'function' && typeof nodes !== 'undefined' && nodes.length === 0) {
        try {
          nodes.push(
            { type: 'tap',  lane: 0, time: 999, hit: false, missed: false },
            { type: 'hold', lane: 0, time: 999, endTime: 999.5, hit: false, missed: false, holding: false }

          ctx.restore();
        } catch(e) {}

      if (typeof handleLanePress === 'function' && typeof nodes !== 'undefined' && nodes.length === 0) {

          if (!curDiff) curDiff = { hpGain: 0.01, hpDrain: 0.01, name: 'warm' };
          const _tap = gameTime || 0;

          for (let _i = 0; _i < 100; _i++) {
            nodes.push({ type: 'tap', lane: _i % 4, time: _tap + _i * 0.001, hit: false, missed: false });
          }
          for (let _i = 0; _i < 100; _i++) handleLanePress(_i % 4, 'warmup');
          // 홀드 start 분기도 다수 호출
          nodes.length = 0;
          for (let _i = 0; _i < 40; _i++) {
            nodes.push({ type: 'hold', lane: _i % 4, time: _tap + _i * 0.001, endTime: _tap + 0.5 + _i * 0.001,
                         hit: false, missed: false, holding: false });
          }
          for (let _i = 0; _i < 40; _i++) handleLanePress(_i % 4, 'warmup');
          // 빈 press (no match) 도 반복
          nodes.length = 0;
          for (let _i = 0; _i < 50; _i++) handleLanePress(0, 'warmup');

        nodes.length = 0;
        particles.length = 0; bursts.length = 0; holdGlows.length = 0;
        curDiff = _savedDiff;
