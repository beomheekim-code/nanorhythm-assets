// Select screen layout helper
let selectParticles = [];
function updateSelectParticles() {
  // Spawn
  const spawnCount = selectParticles.length < 50 ? 2 : 0;
  for (let s = 0; s < spawnCount; s++) {
    const sc = songs[selectedSong] ? songs[selectedSong].color : '#fff';
    selectParticles.push({
      x: Math.random() * W, y: H + 5 + Math.random()*20,
      vx: (Math.random()-0.5)*0.5, vy: -(0.3+Math.random()*0.8),
      size: 2.5+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
      color: sc
    });
  }
  for (let i = selectParticles.length-1; i >= 0; i--) {
    const p = selectParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vx += (Math.random()-0.5)*0.03;
    if (p.life <= 0 || p.y < -10) selectParticles.splice(i,1);
  }
}

function getSelectLayout() {
  // CD нҒ¬кё°лҠ” нҷ”л©ҙм—җ л§һкІҢ, лӮҳлЁём§Җ к°„кІ©мқҖ л№„мңЁлЎң
  const cdSize = Math.min(sz(220), H*0.32, W*0.38);
  const cardW = cdSize, cardH = cdSize, gap = 20;
  const songTotalW = songs.length * (cardW + gap) - gap;
  const optW = sz(420);
  const optH = Math.min(44, H*0.06);
  const optGap = Math.max(16, H*0.025);
  const sectionGap = Math.max(14, H*0.02);
  const subBtnH = 34;
  const subBtnGap = Math.max(14, H*0.02);
  const searchBarH = 30;
  const titleH = 26;
  const titleGap = Math.max(6, H*0.008);
  const searchGap = Math.max(6, H*0.008);
  const btnH = Math.min(44, H*0.06);
  const cdTextH = sz(50);
  const labelH = 18;
  const totalH = titleH + titleGap + searchBarH + searchGap + cardH + cdTextH + subBtnGap + subBtnH
    + sectionGap + labelH + optH + optGap + labelH + optH + sectionGap + btnH + 24;
  const topY = Math.max(4, (H - totalH) / 2);
  const songRowY = topY + titleH + titleGap + searchBarH + searchGap;
  return { cardW, cardH, gap, songRowY, optW, optH, optGap, sectionGap, songTotalW, subBtnH, subBtnGap, searchBarH, btnH, cdTextH };
}
let snapAnimStart = 0, snapAnimFrom = 0, snapAnimTo = 0, snapAnimDur = 0;
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function scrollToSong(idx) {
  const lay = getSelectLayout();
  const target = _dPos(idx) * (lay.cardW + lay.gap);
  snapAnimFrom = selectScrollX;
  snapAnimTo = target;
  snapAnimDur = Math.min(0.4, Math.max(0.15, Math.abs(target - selectScrollX) / 800));
  snapAnimStart = performance.now() / 1000;
  selectTargetScrollX = target;
  selectScrollVel = 0;
}
function updateSelectScroll(dt) {
  if (state !== 'select') return;
  const lay = getSelectLayout();
  const step = lay.cardW + lay.gap;
  let minScroll = 0;
  let maxScroll = (_dLen() - 1) * step;

  // Animated snap to target (easeOut)
  if (selectTargetScrollX !== null) {
    const elapsed = performance.now() / 1000 - snapAnimStart;
    const t = Math.min(1, elapsed / snapAnimDur);
    selectScrollX = snapAnimFrom + (snapAnimTo - snapAnimFrom) * easeOutCubic(t);
    if (t >= 1) { selectScrollX = snapAnimTo; selectTargetScrollX = null; }
    selectScrollVel = 0;
  } else if (selectDragX < 0) {
    // кҙҖм„ұ мҠӨнҒ¬лЎӨ вҖ” л¶Җл“ңлҹҪкІҢ к°җмҮ н•ҳл©ҙпҝҪпҝҪ мӨ‘к°„ кіЎмқ„ мҠӨміҗм§ҖлӮҳк°җ
    selectScrollX += selectScrollVel * dt * 60;
    selectScrollVel *= Math.pow(0.96, dt * 60);
    if (Math.abs(selectScrollVel) < 0.03) selectScrollVel = 0;

    // кІҪкі„: н•ҳл“ңмҠӨнҶұ (нҠ•к№Җ м—ҶмқҢ)
    if (selectScrollX < minScroll) { selectScrollX = minScroll; selectScrollVel = 0; }
    if (selectScrollX > maxScroll) { selectScrollX = maxScroll; selectScrollVel = 0; }

    // мҠӨнҒ¬лЎӨ мӨ‘ к°ҖмһҘ к°Җк№Ңмҡҙ кіЎмңјлЎң selectedSong мӢӨмӢңк°„ к°ұмӢ  (н”„лҰ¬л·° нҠёлҰ¬кұ°)
    const _nearSong = _dSong(Math.max(0, Math.min(Math.round(selectScrollX / step), _dLen() - 1)));
    if (_nearSong !== selectedSong) { selectedSong = _nearSong; loadSongDiffSpeed(selectedSong); }

    // кҙҖм„ұмқҙ м¶©л¶„нһҲ мӨ„м–ҙл“  нӣ„м—җл§Ң мҠӨлғ…
    if (Math.abs(selectScrollVel) < 0.3) {
      const nearest = Math.max(0, Math.min(Math.round(selectScrollX / step), _dLen() - 1));
      const clamped = _dSong(nearest);
      const target = nearest * step;
      if (Math.abs(target - selectScrollX) > 0.5) {
        snapAnimFrom = selectScrollX;
        snapAnimTo = target;
        snapAnimDur = Math.min(0.3, Math.max(0.08, Math.abs(target - selectScrollX) / 600));
        snapAnimStart = performance.now() / 1000;
        selectTargetScrollX = target;
        selectScrollVel = 0;
        selectedSong = clamped;
      } else {
        selectScrollX = target;
        selectedSong = clamped;
      }
    }
  }

  // л“ңлһҳк·ё мӨ‘ кІҪкі„ н•ҳл“ңмҠӨнҶұ
  if (selectDragX >= 0) {
    if (selectScrollX < minScroll) selectScrollX = minScroll;
    if (selectScrollX > maxScroll) selectScrollX = maxScroll;
  }

  // л§Ө н”„л Ҳмһ„ selectedSongмқ„ мҠӨнҒ¬лЎӨ мң„м№ҳм—җ лҸҷкё°нҷ” (мҠӨлғ… м• лӢҲл©”мқҙм…ҳ мӨ‘м—җлҠ” мҠӨнӮө)
  const curSongByScroll = Math.round(Math.max(0, Math.min(maxScroll, selectScrollX)) / step);
  if (selectTargetScrollX === null) {
    const clampedSong = Math.max(0, Math.min(curSongByScroll, songs.length - 1));
    if (clampedSong !== selectedSong) {
      // мҰҗкІЁм°ҫкё° лӘЁл“ң: л№„мҰҗкІЁм°ҫкё° кіЎмқҖ м„ нғқ м•Ҳ н•Ё (мҠӨлғ…м—җм„ң мІҳлҰ¬)
      if (!favFilterActive || isFavorite(clampedSong)) {
        selectedSong = clampedSong;
        loadSongDiffSpeed(selectedSong);
      }
    }
  }

  // мҠӨнҒ¬лЎӨ нӢұ мӮ¬мҡҙл“ң: м„ нғқкіЎмқҙ л°”лҖ” л•Ңл§ҲлӢӨ
  if (curSongByScroll !== lastScrollSong && curSongByScroll >= 0 && curSongByScroll < songs.length) {
    lastScrollSong = curSongByScroll;
    playScrollSound();
  }
}

function renderSelect() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.25; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  // Particles (shadowBlur м ңкұ° вҖ” мҠӨнҒ¬лЎӨ лҒҠк№Җ л°©м§Җ)
  updateSelectParticles();
  for (const p of selectParticles) {
    ctx.globalAlpha = p.life * 0.6;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  const lay = getSelectLayout();
  const { cardW, cardH, gap, songRowY, optW, optH, optGap, sectionGap, songTotalW, subBtnH, subBtnGap, searchBarH, btnH, cdTextH } = lay;
  const cxBase = (W - optW) / 2;

  // Title + мҰҗкІЁм°ҫкё° лІ„нҠј
  const titleY = songRowY - searchBarH - sz(50);
  ctx.font=`bold ${sz(22)}px sans-serif`;
  ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillStyle='#fff';
  ctx.fillText(favFilterActive ? 'мҰҗкІЁм°ҫкё°' : 'кіЎ м„ нғқ', cxBase + sz(4), titleY);
  // мҰҗкІЁм°ҫкё° нҶ кёҖ лІ„нҠј (мҡ°мёЎ)
  const favBtnW = sz(80), favBtnH = sz(26);
  const favBtnX = cxBase + optW - favBtnW, favBtnY = titleY - favBtnH/2;
  ctx.fillStyle = favFilterActive ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)';
  rrFill(favBtnX, favBtnY, favBtnW, favBtnH, sz(6));
  ctx.strokeStyle = favFilterActive ? '#ffd70066' : 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1; rrStroke(favBtnX, favBtnY, favBtnW, favBtnH, sz(6));
  ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = favFilterActive ? '#ffd700' : 'rgba(255,255,255,0.4)';
  ctx.fillText(favFilterActive ? 'вҳ… м „мІҙліҙкё°' : 'вҳ… мҰҗкІЁм°ҫкё°', favBtnX + favBtnW/2, favBtnY + favBtnH/2);
  ctx.textBaseline='alphabetic';

  // Search bar
  const searchBarY = songRowY - searchBarH - sz(16);
  ctx.fillStyle = searchActive ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)';
  rrFill(cxBase, searchBarY, optW, searchBarH, 8);
  ctx.strokeStyle = searchActive ? '#ffd700' : 'rgba(255,255,255,0.12)';
  ctx.lineWidth = searchActive ? 1.5 : 1;
  rrStroke(cxBase, searchBarY, optW, searchBarH, 8);
  ctx.textAlign = 'left'; ctx.font = `${sz(13)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('рҹ”Қ', cxBase + sz(10), searchBarY + searchBarH/2 + sz(5));
  if (searchText) {
    ctx.fillStyle = '#fff'; ctx.font = `${sz(13)}px sans-serif`;
    ctx.fillText(searchText + (searchActive ? '|' : ''), cxBase + sz(30), searchBarY + searchBarH/2 + sz(5));
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = `${sz(12)}px sans-serif`;
    ctx.fillText(searchActive ? 'кІҖмғүм–ҙ мһ…л Ҙ...' : 'FнӮӨлЎң кІҖмғү', cxBase + sz(30), searchBarY + searchBarH/2 + sz(4));
  }
  // Search close button
  if (searchActive) {
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(14)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('вң•', cxBase + optW - sz(16), searchBarY + searchBarH/2 + sz(5));
  }

  // Song cards (horizontal scroll)
  const centerX = W / 2;
  const step = cardW + gap;
  // мҰҗкІЁм°ҫкё° лӘЁл“ң: н‘ңмӢңн•  кіЎ лӘ©лЎқ + м—°мҶҚ мқёлҚұмҠӨ
  const _displayList = favFilterActive ? getFavorites().sort((a,b)=>a-b) : songs.map((_,i)=>i);
  const _displayPos = {}; // songIdx вҶ’ м—°мҶҚ н‘ңмӢң мң„м№ҳ
  _displayList.forEach((si, pos) => { _displayPos[si] = pos; });
  // нҷ”л©ҙ мӨ‘м•ҷ кё°мӨҖ нҳ„мһ¬ н‘ңмӢң мң„м№ҳ
  const _scrollDisplayPos = Math.round(selectScrollX / step);
  // Draw non-selected cards first, then selected on top
  const cardOrder = _displayList.slice().sort((a,b) => (a === selectedSong ? 1 : 0) - (b === selectedSong ? 1 : 0));

  for (const i of cardOrder) {
    const s = songs[i];
    const dp = _displayPos[i] != null ? _displayPos[i] : 0;
    const cardCenterX = centerX + (dp * step - selectScrollX);
    const cdCx = cardCenterX;
    const cdCy = songRowY + cardH/2;
    const r = cardW / 2;
    if (cdCx + r < -50 || cdCx - r > W + 50) continue;
    if (Math.abs(dp - _scrollDisplayPos) > 3) continue; // мҠӨнҒ¬лЎӨ мң„м№ҳ кё°мӨҖ Вұ3
    const sel = i === selectedSong;
    const dist = Math.abs(cardCenterX - centerX);
    const scale = sel ? 1.08 : Math.max(0.82, 1 - dist / (W * 1.0));
    const alpha = sel ? 1 : Math.max(0.3, 1 - dist / (W * 0.45));
    // м„ нғқлҗң CDлҠ” мІңмІңнһҲ нҡҢм „
    const rot = sel ? (Date.now() * 0.001 * 0.5) : 0;

    ctx.save();
    ctx.translate(cdCx, cdCy);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;

    // === м»ӨлІ„ мқҙлҜём§Җ (нҡҢм „ м•Ҳ н•Ё вҖ” н•ӯмғҒ м •л°©н–Ҙ) ===
    if (coverImages[i] && coverImages[i].complete && coverImages[i].naturalWidth > 0) {
      ctx.save();
      ctx.beginPath(); ctx.arc(0, 0, r*0.92, 0, Math.PI*2); ctx.clip();
      const imgSize = r * 1.84;
      ctx.drawImage(coverImages[i], -imgSize/2, -imgSize/2, imgSize, imgSize);
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#000'; ctx.fill();
      ctx.restore();
    }

    // === CD л””мҠӨнҒ¬ мҳӨлІ„л Ҳмқҙ (нҡҢм „) ===
    ctx.save();
    ctx.rotate(rot);

    // мҷёкіҪ мӣҗ (л””мҠӨнҒ¬)
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    const discGrad = ctx.createRadialGradient(0, 0, r*0.25, 0, 0, r);
    discGrad.addColorStop(0, s.color + '22');
    discGrad.addColorStop(0.5, s.color + '08');
    discGrad.addColorStop(1, sel ? s.color + '22' : 'rgba(30,30,30,0.5)');
    ctx.fillStyle = discGrad; ctx.fill();

    // CD кҙ‘нғқ л§Ғ
    for (let ri = 3; ri <= 7; ri++) {
      ctx.beginPath(); ctx.arc(0, 0, r * (ri/8), 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,' + (sel ? 0.06 : 0.03) + ')';
      ctx.lineWidth = 0.5; ctx.stroke();
    }

    // CD л¬ҙм§Җк°ң л°ҳмӮ¬ (м„ нғқ мӢң)
    if (sel) {
      const refAngle = Date.now() * 0.002;
      const refGrad = ctx.createConicGradient(refAngle, 0, 0);
      refGrad.addColorStop(0, 'rgba(255,100,100,0.06)');
      refGrad.addColorStop(0.25, 'rgba(100,255,100,0.06)');
      refGrad.addColorStop(0.5, 'rgba(100,100,255,0.06)');
      refGrad.addColorStop(0.75, 'rgba(255,255,100,0.06)');
      refGrad.addColorStop(1, 'rgba(255,100,100,0.06)');
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
      ctx.fillStyle = refGrad; ctx.fill();
    }

    // мӨ‘м•ҷ нҷҖ (CD кө¬л©Қ)
    ctx.beginPath(); ctx.arc(0, 0, r*0.12, 0, Math.PI*2);
    ctx.fillStyle = '#111'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.stroke();

    // мӨ‘м•ҷ л§Ғ
    ctx.beginPath(); ctx.arc(0, 0, r*0.22, 0, Math.PI*2);
    ctx.strokeStyle = s.color + (sel ? '66' : '22'); ctx.lineWidth = 1.5; ctx.stroke();

    // м„ нғқлҗң CD + н”„лҰ¬л·° лЎңл”© мӨ‘мқҙл©ҙ мҠӨн”јл„Ҳ
    if (sel && previewLoading) {
      const spinAngle = Date.now() * 0.005;
      ctx.strokeStyle = s.color + 'aa'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, r*0.17, spinAngle, spinAngle + Math.PI*1.2); ctx.stroke();
    }

    ctx.restore(); // нҡҢм „ ліөмӣҗ

    // === мҷёкіҪ н…Ңл‘җлҰ¬ ===
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.strokeStyle = sel ? s.color : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = sel ? 2.5 : 1;
    if (sel) { ctx.shadowColor = s.color; ctx.shadowBlur = 18; }
    ctx.stroke(); ctx.shadowBlur = 0;

    // === н…ҚмҠӨнҠё (CD м•„лһҳ) ===
    ctx.rotate(0); // н…ҚмҠӨнҠёлҠ” нҡҢм „ м•Ҳ н•Ё
    const textY = r + sz(16);
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(14)}px sans-serif`;
    ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.3)';
    ctx.fillText(s.name, 0, textY);

    // л ҲлІЁ л°°м§Җ (м„ нғқ мӢң)
    if (sel) {
      const lv = calcLevel(i, selectedDiff);
      const lvText = 'Lv.' + lv;
      const lvFont = sz(11);
      ctx.font = `bold ${lvFont}px sans-serif`;
      const lvColor = DIFFICULTIES[selectedDiff].color;
      const lvW = ctx.measureText(lvText).width + 10;
      const lvH = lvFont + 6;
      const lvX = -lvW/2, lvY = textY + sz(8);
      ctx.fillStyle = lvColor + '30'; rrFill(lvX, lvY, lvW, lvH, 5);
      ctx.strokeStyle = lvColor + '88'; ctx.lineWidth = 1; rrStroke(lvX, lvY, lvW, lvH, 5);
      ctx.fillStyle = lvColor;
      ctx.fillText(lvText, 0, lvY + lvH/2 + lvFont*0.35);
      // н”„лҰ¬л·° лЎңл”© н‘ңмӢң
      if (previewLoading) {
        ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.35)';
        const dots = '.'.repeat(Math.floor(Date.now() / 350) % 4);
        ctx.fillText('loading' + dots, 0, lvY + lvH + sz(12));
      }
    }

    // л№„м„ нғқ л””л°Қ
    if (!sel) {
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
    }

    // мҰҗкІЁм°ҫкё° лі„н‘ң (CD мҡ°мғҒлӢЁ, кІҖм • л°°кІҪ + н…Ңл‘җлҰ¬)
    if (sel) {
      const starX = r * 0.6, starY = -r * 0.6;
      const fav = isFavorite(i);
      ctx.beginPath(); ctx.arc(starX, starY, sz(14), 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fill();
      ctx.strokeStyle = fav ? '#ffd700' : 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.font = `${sz(14)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = fav ? '#ffd700' : 'rgba(255,255,255,0.5)';
      ctx.fillText(fav ? 'вҳ…' : 'вҳҶ', starX, starY);
      favStarArea = { cx: starX, cy: starY, r: sz(14), songIdx: i };
    }

    // мһ кёҲ мҳӨлІ„л Ҳмқҙ
    if (isSongLocked(i)) {
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fill();
      ctx.font = `${sz(28)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('рҹ”’', 0, 0);
    }

    ctx.restore();
  }

  // Left/right arrows (м№ҙл“ң мң„м—җ к·ёлҰ¬кё°)
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(28)}px sans-serif`;
  const arrowOffX = cardW/2 + sz(32);
  const _curScrollPos = Math.round(selectScrollX / step);
  if (_curScrollPos > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 6;
    ctx.fillText('в—Җ', centerX - arrowOffX, songRowY + cardH/2 + 4);
    ctx.shadowBlur = 0;
  }
  if (_curScrollPos < _dLen() - 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 6;
    ctx.fillText('в–¶', centerX + arrowOffX, songRowY + cardH/2 + 4);
    ctx.shadowBlur = 0;
  }

  // Achievement + Ranking buttons (below song cards, for selected song only)
  const subBtnY = songRowY + cardH + cdTextH + subBtnGap;
  const subBtnW = Math.min(120, optW * 0.28);
  const subBtnGapX = 14;
  const subBtnTotalW = subBtnW * 2 + subBtnGapX;
  const subBtnX = (W - subBtnTotalW) / 2;
  ctx.fillStyle = '#ffd70015'; rrFill(subBtnX, subBtnY, subBtnW, subBtnH, 8);
  ctx.strokeStyle = '#ffd70044'; ctx.lineWidth = 1; rrStroke(subBtnX, subBtnY, subBtnW, subBtnH, 8);
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(13)}px sans-serif`;
  ctx.fillStyle = '#ffd700bb';
  ctx.fillText('м—…м Ғ', subBtnX + subBtnW/2, subBtnY + subBtnH/2 + 5);
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; rrFill(subBtnX + subBtnW + subBtnGapX, subBtnY, subBtnW, subBtnH, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; rrStroke(subBtnX + subBtnW + subBtnGapX, subBtnY, subBtnW, subBtnH, 8);
  ctx.font = `bold ${sz(13)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('лһӯнӮ№', subBtnX + subBtnW + subBtnGapX + subBtnW/2, subBtnY + subBtnH/2 + 5);

  // Difficulty selector
  const labelH = 18; // лқјлІЁ н…ҚмҠӨнҠё кіөк°„
  const optY1 = subBtnY + subBtnH + sectionGap + labelH;
  const cx = (W - optW) / 2;
  ctx.textAlign='left'; ctx.font=`bold ${sz(14)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText('лӮңмқҙлҸ„',cx+4,optY1-6);

  const diffBtnW = (optW - (DIFFICULTIES.length-1)*8) / DIFFICULTIES.length;
  DIFFICULTIES.forEach((d, i) => {
    const bx = cx + i * (diffBtnW + 8), sel = i === selectedDiff;
    ctx.fillStyle = sel ? d.color+'33' : 'rgba(255,255,255,0.03)';
    rrFill(bx, optY1, diffBtnW, optH, 8);
    ctx.strokeStyle = sel ? d.color : 'rgba(255,255,255,0.08)'; ctx.lineWidth = sel ? 2 : 1;
    if (sel) { ctx.shadowColor = d.color; ctx.shadowBlur = 8; }
    rrStroke(bx, optY1, diffBtnW, optH, 8); ctx.shadowBlur = 0;
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(15)}px sans-serif`;
    ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.4)';
    ctx.fillText(d.name, bx + diffBtnW/2, optY1 + optH*0.43);
    ctx.font = `${sz(10)}px sans-serif`;
    ctx.fillStyle = sel ? d.color+'aa' : 'rgba(255,255,255,0.2)';
    ctx.fillText(d.sub, bx + diffBtnW/2, optY1 + optH*0.76);
  });

  // Speed selector
  const optY2 = optY1 + optH + optGap + labelH;
  ctx.textAlign='left'; ctx.font=`bold ${sz(14)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText('л°°мҶҚ',cx+4,optY2-6);

  // вҲ’ [slider] + л°°мҶҚ UI
  const spdBtnW = Math.min(40, optW * 0.15);
  const spdMidW = optW - spdBtnW * 2 - 12;
  const spdMinusX = cx, spdValX = cx + spdBtnW + 6, spdPlusX = cx + optW - spdBtnW;
  const isFocusSpd = selectFocus === 2;
  // вҲ’ лІ„нҠј
  ctx.fillStyle = selectedSpeed > SPEED_MIN ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.02)';
  rrFill(spdMinusX, optY2, spdBtnW, optH, 8);
  ctx.strokeStyle = isFocusSpd ? '#ffd70066' : 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  rrStroke(spdMinusX, optY2, spdBtnW, optH, 8);
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(20)}px sans-serif`;
  ctx.fillStyle = selectedSpeed > SPEED_MIN ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.15)';
  ctx.fillText('вҲ’', spdMinusX + spdBtnW/2, optY2 + optH*0.6);
  // к°’ н‘ңмӢң (мӨ‘м•ҷ) вҖ” мһ…л Ҙ лӘЁл“ң л¶„кё°
  if (speedInputActive) {
    ctx.fillStyle = '#ffd70030'; rrFill(spdValX, optY2, spdMidW, optH, 8);
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
    rrStroke(spdValX, optY2, spdMidW, optH, 8); ctx.shadowBlur = 0;
    ctx.font = `bold ${sz(18)}px sans-serif`;
    ctx.fillStyle = '#fff';

      // кіЎ мқҙлҰ„
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';

      ctx.fillStyle = isSel ? '#fff' : 'rgba(255,255,255,0.65)';

      ctx.fillText(nameText, cpX + sz(42), iy + itemH/2 - sz(6));

      // н”Ңл Ҳмқҙ мҲҳ
      ctx.font = `${Math.min(sz(9), chartPanelW * 0.045)}px sans-serif`;
      ctx.fillStyle = s.color + (isSel ? 'cc' : '77');

      // HOT нғӯмқҙл©ҙ мӢӨмӢңк°„ л¶ҲкҪғ мқҙнҺҷнҠё (1мң„)
      if (chartTab === 0 && ci === 0 && item.count > 0) {

    }
    ctx.restore();

    // "CHART" лқјлІЁ
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = 'rgba(160,140,255,0.5)';

  }

  renderBottomBar();

  // мҰҗкІЁм°ҫкё° л№„м–ҙмһҲмқҢ л©”мӢңм§Җ
  if (favEmptyMsg > 0) {
    const elapsed = (performance.now() - favEmptyMsg) / 1000;
    if (elapsed < 1.5) {
      const alpha = elapsed < 1.0 ? 1 : 1 - (elapsed - 1.0) / 0.5;

      ctx.fillText('мҰҗкІЁм°ҫкё°н•ң кіЎмқҙ м—ҶмҠөлӢҲлӢӨ', W/2, H*0.45 + msgH/2);
      ctx.globalAlpha = 1;

  }

  // Search filter dropdown (drawn last for z-order)
  if (searchActive && searchText) {
    const filterItemH = 38;
    const dropY = searchBarY + searchBarH + 4;
    if (searchFiltered.length > 0) {

      searchFiltered.forEach((songIdx, fi) => {
        const iy = dropY + 4 + fi * filterItemH;
        const isHl = fi === searchHighlight;
        if (isHl) {

        ctx.textAlign = 'left';

}

// ===== LOGIN SHOOTING STARS =====
let shootingStars = [];
function spawnShootingStar() {
  const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2; // лҢҖк°Ғм„  н•ҳк°• (мҡ°н•ҳлӢЁ л°©н–Ҙ)
  const speed = 200 + Math.random() * 350;
  const startX = Math.random() * W * 1.2 - W * 0.1;
  const startY = -10 - Math.random() * H * 0.3;
  const hue = Math.random() > 0.6 ? 45 + Math.random() * 20 : 200 + Math.random() * 60; // кёҲмғү or нҢҢлһҖмғү
  const brightness = 0.7 + Math.random() * 0.3;
  const tailLen = 8 + Math.floor(Math.random() * 12);
  shootingStars.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.2 + Math.random() * 1.5,
    maxLife: 1.2 + Math.random() * 1.5,
    size: 1.5 + Math.random() * 2,
    hue, brightness, tailLen,
    trail: [] // мһ”мғҒ мўҢн‘ң м ҖмһҘ
  });
}
function updateShootingStars(dt) {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.trail.unshift({ x: ss.x, y: ss.y });
    if (ss.trail.length > ss.tailLen) ss.trail.pop();
    ss.x += ss.vx * dt;
    ss.y += ss.vy * dt;
    ss.life -= dt;
    if (ss.life <= 0 || ss.x > W + 50 || ss.y > H + 50) {
      shootingStars.splice(i, 1);
    }
  }
}
function renderShootingStars() {
  for (const ss of shootingStars) {
    const fade = Math.min(1, ss.life / (ss.maxLife * 0.3)); // л§Ҳм§Җл§ү 30%м—җм„ң нҺҳмқҙл“ңм•„мӣғ
    // кј¬лҰ¬ (мһ”мғҒ)
    for (let t = 0; t < ss.trail.length; t++) {
      const p = ss.trail[t];
      const alpha = (1 - t / ss.trail.length) * fade * ss.brightness * 0.6;
      const sz2 = ss.size * (1 - t / ss.trail.length * 0.7);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${ss.hue},80%,${70 + t * 2}%)`;
      ctx.fillRect(p.x - sz2/2, p.y - sz2/2, sz2, sz2);
    }
    // лЁёлҰ¬ (л°қмқҖ м җ)
    ctx.globalAlpha = fade * ss.brightness;
    ctx.shadowColor = `hsl(${ss.hue},90%,80%)`;
    ctx.shadowBlur = 6 + ss.size * 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ss.x, ss.y, ss.size * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawGoogleIcon(cx, cy, r) {
  const lw = r * 0.45;
  ctx.lineCap = 'butt';
  ctx.lineWidth = lw;
  // Blue (left-top)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.65, Math.PI * 1.35); ctx.strokeStyle = '#4285F4'; ctx.stroke();
  // Green (bottom-left)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.35, Math.PI * 0.65); ctx.strokeStyle = '#34A853'; ctx.stroke();
  // Yellow (bottom-right)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.05, Math.PI * 0.35); ctx.strokeStyle = '#FBBC05'; ctx.stroke();
  // Red (top-right)
  ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI * 0.35, Math.PI * 0.05); ctx.strokeStyle = '#EA4335'; ctx.stroke();
  // Blue horizontal bar
  ctx.fillStyle = '#4285F4';
  ctx.fillRect(cx - r * 0.1, cy - lw / 2, r * 1.2, lw);
}
function drawFacebookIcon(cx, cy, r) {
  ctx.beginPath(); ctx.arc(cx, cy, r * 1.3, 0, Math.PI * 2);
  ctx.fillStyle = '#1877F2'; ctx.fill();
  ctx.font = `bold ${r * 2.2}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff'; ctx.fillText('f', cx + r * 0.1, cy + r * 0.15);
}
function drawAppleIcon(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy); ctx.scale(r / 10, r / 10);
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.bezierCurveTo(-3, -11, -8, -10, -9, -6);
  ctx.bezierCurveTo(-10, -2, -9, 3, -7, 6); ctx.bezierCurveTo(-5, 9, -3, 11, 0, 11);
  ctx.bezierCurveTo(3, 11, 5, 9, 7, 6); ctx.bezierCurveTo(9, 3, 10, -2, 9, -6);
  ctx.bezierCurveTo(8, -10, 3, -11, 0, -8); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  // Leaf
  ctx.beginPath(); ctx.moveTo(0, -8);
  ctx.bezierCurveTo(1, -12, 4, -14, 5, -13);
  ctx.bezierCurveTo(5, -11, 3, -9, 0, -8); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
}
function drawGuestIcon(cx, cy, r) {
  // Head
  ctx.beginPath(); ctx.arc(cx, cy - r * 0.5, r * 0.55, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  // Body
  ctx.beginPath(); ctx.arc(cx, cy + r * 1.1, r * 0.9, Math.PI, 0);
  ctx.fillStyle = '#fff'; ctx.fill();
}

  });

  // лЎңл”© н‘ңмӢң

  }

  // кІҢмҠӨнҠё кІҪкі  нҢқм—…

    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255,180,0,0.5)'; ctx.lineWidth = 2; rrStroke(popX, popY, popW, popH, sz(14));

    // кІҪкі  м•„мқҙмҪҳ
    ctx.font = `${sz(32)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText('\u26A0\uFE0F', W / 2, popY + sz(45));

    // кІҪкі  н…ҚмҠӨнҠё
    ctx.font = `bold ${sz(14)}px sans-serif`; ctx.fillStyle = '#ffd700';
    ctx.fillText('\uAC8C\uC2A4\uD2B8 \uB85C\uADF8\uC778 \uC8FC\uC758', W / 2, popY + sz(75));
    ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('\uD574\uB2F9 \uAE30\uAE30\uC5D0\uC11C\uB9CC \uC811\uC18D \uAC00\uB2A5\uD569\uB2C8\uB2E4.', W / 2, popY + sz(98));
    ctx.fillText('\uB2E4\uB978 \uAE30\uAE30\uC5D0\uC11C\uB294 \uB370\uC774\uD130\uC5D0 \uC811\uADFC\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.', W / 2, popY + sz(115));

    // нҷ•мқё/м·ЁмҶҢ лІ„нҠј
    const cbW = sz(100), cbH = sz(36), cbGap = sz(16);
    const cancelX = W / 2 - cbW - cbGap / 2, confirmX = W / 2 + cbGap / 2;
    const cbY = popY + popH - sz(52);

    // м·ЁмҶҢ
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(cancelX, cbY, cbW, cbH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; rrStroke(cancelX, cbY, cbW, cbH, sz(8));
    ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('\uCDE8\uC18C', cancelX + cbW / 2, cbY + cbH * 0.62);

    // нҷ•мқё
    ctx.fillStyle = '#ffd70022'; rrFill(confirmX, cbY, cbW, cbH, sz(8));
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 6;
    rrStroke(confirmX, cbY, cbW, cbH, sz(8)); ctx.shadowBlur = 0;
    ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillStyle = '#ffd700';
    ctx.fillText('\uD655\uC778', confirmX + cbW / 2, cbY + cbH * 0.62);

    // нҢқм—… лІ„нҠј нһҲнҠё мҳҒм—ӯ м ҖмһҘ
    loginBtnAreas.push({ x: cancelX, y: cbY, w: cbW, h: cbH, type: 'guestCancel' });
    loginBtnAreas.push({ x: confirmX, y: cbY, w: cbW, h: cbH, type: 'guestConfirm' });
  }
}

function renderAchievement() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;

  // Back button
  const bbW = 70, bbH = 38, bbX = 12, bbY = H - bbH - 10;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, 8);
  ctx.textAlign='center'; ctx.font=`bold ${sz(13)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('вҶҗ л’ӨлЎң', bbX+bbW/2, bbY+bbH*0.65);

  // Title + coin
  ctx.font=`bold ${sz(24)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  const achTitle = achievementSongFilter >= 0 ? songs[achievementSongFilter].name + ' м—…м Ғ' : 'м—…м Ғ';
  ctx.fillText(achTitle,W/2,H*0.06+10); ctx.shadowBlur=0;

  // Type tabs
  const tabW = sz(300);
  const tabBtnW = tabW / ACH_TABS.length;
  const tabX = (W - tabW) / 2, tabY = H*0.12;
  ACH_TABS.forEach((tab, i) => {
    const bx = tabX + i * tabBtnW, sel = i === achievementTab;
    ctx.fillStyle = sel ? '#ffd70033' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(bx, tabY, tabBtnW, 28);
    if (sel) { ctx.fillStyle='#ffd700'; ctx.fillRect(bx, tabY+25, tabBtnW, 3); }
    ctx.textAlign='center';
    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? '#ffd700' : 'rgba(255,255,255,0.4)';
    ctx.fillText(tab.icon+' '+tab.label, bx+tabBtnW/2, tabY+18);
  });

  // Filter and progress
  const curType = ACH_TABS[achievementTab].key;
  const unlocked = getUnlocked();
  const filtered = ALL_ACHIEVEMENTS.filter(a => a.type === curType && (achievementSongFilter < 0 || a.songIdx === achievementSongFilter));
  const unlockedCount = filtered.filter(a => unlocked[a.id]).length;

  // Progress bar
  const progW = sz(200), progH = 4;
  const progX = (W-progW)/2, progY = tabY + 36;
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(progX, progY, progW, progH);
  ctx.fillStyle='#ffd700'; ctx.fillRect(progX, progY, progW*(unlockedCount/Math.max(1,filtered.length)), progH);
  ctx.font=`${sz(10)}px sans-serif`; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText(unlockedCount+' / '+filtered.length+' лӢ¬м„ұ', W/2, progY+16);

  // Grouped rows
  const listY = progY + 26, rowH = 34;
  const listW = sz(340);
  const listX = (W - listW) / 2;
  const rows = getAchRows();

  const maxVisible = Math.floor((H - listY - 30) / rowH);
  const maxScroll = Math.max(0, rows.length - maxVisible);
  if (achievementScroll > maxScroll) achievementScroll = maxScroll;
  const end = Math.min(rows.length, achievementScroll + maxVisible);

  for (let i = achievementScroll; i < end; i++) {
    const row = rows[i];
    const ry = listY + (i - achievementScroll) * rowH;

    if (row.type === 'header') {
      // Song header row
      ctx.fillStyle = row.song.color + '18';
      rrFill(listX, ry, listW, rowH - 3, 6);
      ctx.fillStyle = row.song.color + '44'; ctx.fillRect(listX+3, ry+4, 4, rowH-11);
      ctx.textAlign='left';
      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = row.song.color;
      ctx.fillText(row.song.name, listX+14, ry+rowH*0.55);
      ctx.textAlign='right';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(row.songDone+'/'+row.songTotal, listX+listW-10, ry+rowH*0.55);
    } else {
      const a = row.ach, done = row.done;
      // Achievement row
      ctx.fillStyle = done ? '#ffd70008' : 'rgba(255,255,255,0.015)';
      rrFill(listX+8, ry, listW-16, rowH - 3, 5);
      if (done) {
        ctx.strokeStyle='#ffd70022'; ctx.lineWidth=1; rrStroke(listX+8, ry, listW-16, rowH-3, 5);
      }

      // Check / lock
      ctx.textAlign='center';
      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = done ? '#44dd66' : 'rgba(255,255,255,0.15)';
      ctx.fillText(done ? 'вң“' : 'в—Ӣ', listX+24, ry+rowH*0.55);

      // Label (without song name, since it's under the header)
      ctx.textAlign='left';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = done ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      // Strip song name from label for cleaner display
      const shortLabel = a.label.replace(/^.+? вҖ” /, '');
      ctx.fillText(shortLabel, listX+40, ry+rowH*0.55);

      // Claim button / coins
      ctx.textAlign='right';
      ctx.font=`bold ${sz(11)}px sans-serif`;
      if (done && !row.claimed) {
        // Claimable - draw button
        const claimText = '+'+a.coins+'вҷӘ л°ӣкё°';
        ctx.font=`bold ${sz(10)}px sans-serif`;
        const cbW = Math.max(sz(56), ctx.measureText(claimText).width + sz(12));
        const cbH = sz(20), cbX = listX+listW-sz(16)-cbW, cbY = ry + (rowH-3-cbH)/2;
        ctx.fillStyle = '#ffd70033'; rrFill(cbX, cbY, cbW, cbH, 5);
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1; rrStroke(cbX, cbY, cbW, cbH, 5);
        ctx.textAlign='center';
        ctx.fillStyle = '#ffd700';
        ctx.fillText(claimText, cbX+cbW/2, cbY+cbH*0.65);
      } else if (done && row.claimed) {
        ctx.fillStyle = '#44dd6688';
        ctx.fillText('мҲҳл №мҷ„лЈҢ', listX+listW-16, ry+rowH*0.55);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillText('+'+a.coins, listX+listW-16, ry+rowH*0.55);
      }
    }
  }

  if (rows.length === 0) {
    ctx.font=`${sz(14)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('м—…м Ғмқҙ м—ҶмҠөлӢҲлӢӨ', W/2, listY+40);
  }

  renderBottomBar();
}

function renderRanking() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song = songs[selectedSong];

  // Back button
  const bbW = 70, bbH = 38, bbX = 12, bbY = H - bbH - 10;
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, 8);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; rrStroke(bbX, bbY, bbW, bbH, 8);
  ctx.textAlign='center'; ctx.font=`bold ${sz(13)}px sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('вҶҗ л’ӨлЎң', bbX+bbW/2, bbY+bbH*0.65);

  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;

  // Song name
  ctx.font=`${sz(15)}px sans-serif`;
  ctx.fillStyle=song.color;
  ctx.fillText(song.name,W/2,H*0.13);

  // Difficulty tabs
  const tabW = sz(280);
  const tabBtnW = tabW / DIFFICULTIES.length;
  const tabX = (W - tabW) / 2, tabY = H*0.17;
  DIFFICULTIES.forEach((d, i) => {
    const bx = tabX + i * tabBtnW, sel = i === selectedDiff;

    ctx.fillRect(bx, tabY, tabBtnW, 28);

    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? d.color : 'rgba(255,255,255,0.4)';
    ctx.fillText(d.name, bx + tabBtnW/2, tabY + 18);

  const listX = (W - listW) / 2;
  const maxVisible = Math.floor((H*0.6) / rowH);

  if (rankings.length === 0) {
    ctx.font=`${sz(14)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ',W/2,listY + 40);
  } else {
    const end = Math.min(rankings.length, rankingScroll + maxVisible);
    for (let i = rankingScroll; i < end; i++) {
      const r = rankings[i];
      const ry = listY + (i - rankingScroll) * rowH;
      const isMe = r.name === currentUser;

      // Row bg
      ctx.fillStyle = isMe ? song.color+'15' : 'rgba(255,255,255,0.03)';
      rrFill(listX, ry, listW, rowH - 4, 6);
      if (isMe) {
        ctx.strokeStyle = song.color+'44'; ctx.lineWidth = 1;
        rrStroke(listX, ry, listW, rowH - 4, 6);
      }

      // Rank number
      ctx.textAlign='center';
      ctx.font=`bold ${sz(16)}px sans-serif`;
      const rankColors = ['#ffd700','#c0c0c0','#cd7f32'];
      ctx.fillStyle = i < 3 ? rankColors[i] : 'rgba(255,255,255,0.4)';
      ctx.fillText(''+(i+1), listX + 22, ry + rowH*0.55);

      // Name
      ctx.textAlign='left';
      ctx.font=`${isMe?'bold ':''}${sz(14)}px sans-serif`;
      ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.7)';
      ctx.fillText(r.name, listX + 45, ry + rowH*0.55);

      // Score
      ctx.textAlign='right';
      ctx.font=`bold ${sz(14)}px sans-serif`;
      ctx.fillStyle = isMe ? song.color : 'rgba(255,255,255,0.6)';
      ctx.fillText(r.score.toLocaleString(), listX + listW - 10, ry + rowH*0.55);
    }
  }

  renderBottomBar();
}

// ===== RESULT =====
function renderResult() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song=curSong;
  ctx.font=`bold ${sz(34)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillText('RESULT',W/2,H*0.1+12); ctx.shadowBlur=0;
  ctx.font=`${sz(15)}px sans-serif`; ctx.fillStyle=song.color;
  const diffLabel = curDiff ? curDiff.name : '';
  const spdLabel = selectedSpeed.toFixed(1)+'x';
  ctx.fillText(song.name+'  В·  '+diffLabel+'  В·  '+spdLabel,W/2,H*0.17);

  const pct=totalNodes>0?collected/totalNodes:0;
  const cleared = gauge > 0; // нҒҙлҰ¬м–ҙ м—¬л¶Җ (кІҢмқҙм§Җ мӮ¬л§қ = лҜёнҒҙлҰ¬м–ҙ)
  // м •к·ңнҷ” м җмҲҳ: л§Ңм җ 100л§Ң кё°мӨҖ
  const TARGET_MAX = 1000000;
  const rawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
  const normalizedScore = Math.round(score / rawMax * TARGET_MAX);
  // л“ұкёү: м •нҷ•лҸ„ кё°л°ҳ + лҜёнҒҙлҰ¬м–ҙ мӢң мөңлҢҖ Cл“ұкёү
  let grade;
  if (!cleared) {
    grade = 'D'; // лҜёнҒҙлҰ¬м–ҙ = л¬ҙмЎ°кұҙ D
  } else if (missed === 0) {
    grade = 'P';
  } else {
    grade = pct >= 0.98 ? 'S' : pct >= 0.90 ? 'A' : pct >= 0.80 ? 'B' : 'C';
  }
  const gc={P:'#ff44ff',S:'#ffd700',A:'#00ff88',B:'#00d4ff',C:'#ff9500',D:'#ff3333'};

  const gradeR = sz(44);
  if (grade === 'P') {
    // Pл“ұкёү: л¬ҙм§Җк°ң л§Ғ + к°•н•ң кёҖлЎңмҡ°
    const t = Date.now() * 0.003;
    ctx.beginPath(); ctx.arc(W/2,H*0.33,gradeR,0,Math.PI*2);
    const rGrad = ctx.createConicGradient(t, W/2, H*0.33);
    rGrad.addColorStop(0,'#ff44ff'); rGrad.addColorStop(0.25,'#44ddff');
    rGrad.addColorStop(0.5,'#ffdd44'); rGrad.addColorStop(0.75,'#44ff88');
    rGrad.addColorStop(1,'#ff44ff');
    ctx.strokeStyle=rGrad; ctx.lineWidth=4; ctx.stroke();
    ctx.font=`bold ${sz(60)}px sans-serif`;
    ctx.fillStyle='#ff44ff'; ctx.shadowColor='#ff44ff'; ctx.shadowBlur=40;
    ctx.textBaseline='middle'; ctx.fillText('P',W/2,H*0.33);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  } else {
    ctx.beginPath(); ctx.arc(W/2,H*0.33,gradeR,0,Math.PI*2);
    ctx.strokeStyle=gc[grade]+'44'; ctx.lineWidth=3; ctx.stroke();
    ctx.font=`bold ${sz(60)}px sans-serif`;
    ctx.fillStyle=gc[grade]; ctx.shadowColor=gc[grade]; ctx.shadowBlur=20;
    ctx.textBaseline='middle'; ctx.fillText(grade,W/2,H*0.33);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  }

  const stats=[['SCORE',normalizedScore.toLocaleString()],['MAX COMBO',maxCombo+'x'],['HIT',collected+' / '+totalNodes],['MISS',''+missed],['ACCURACY',(pct*100).toFixed(1)+'%']];
  ctx.font=`${sz(13)}px sans-serif`;
  const sy0=H*0.48;
  stats.forEach((s,i)=>{
    const sy=sy0+i*26;
    ctx.fillStyle='rgba(255,255,255,0.03)';
    const bw=sz(250);
    rrFill((W-bw)/2,sy-10,bw,20,5);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText(s[0],W/2-10,sy+4);
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(s[1],W/2+10,sy+4);
  });

  const msgs={P:'ALL PERFECT!!',S:'EXCELLENT!',A:'GREAT!',B:'GOOD!',C:'CLEAR',D:'TRY AGAIN'};
  ctx.font=`bold ${sz(17)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle=gc[grade]; ctx.fillText(msgs[grade],W/2,H*0.76);

  // Best score / new record
  const myBest = getMyBest(curSongIdx, selectedDiff);
  if (myBest > 0) {
    ctx.font=`bold ${sz(14)}px sans-serif`;
    if (score >= myBest) {
      ctx.fillStyle='#ffd700';
      ctx.fillText('NEW RECORD!  ' + myBest.toLocaleString(), W/2, H*0.81);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('BEST: ' + myBest.toLocaleString(), W/2, H*0.81);
    }
  }

  // Newly unlocked achievements
  if (newlyUnlocked.length > 0) {
    const achY = H*0.84;
    const achW = sz(280);
    const achX = (W-achW)/2;
    const show = Math.min(newlyUnlocked.length, 3);
    let totalCoins = 0;
    for (const a of newlyUnlocked) totalCoins += a.coins;

    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='#ffd700';
    ctx.fillText('м—…м Ғ лӢ¬м„ұ! +'+totalCoins.toLocaleString()+' вҷӘмқҢн‘ң', W/2, achY);

    for (let i = 0; i < show; i++) {
      const a = newlyUnlocked[i];
      const ry = achY + 10 + i * 22;
      ctx.fillStyle='#ffd70015'; rrFill(achX, ry, achW, 18, 4);
      ctx.strokeStyle='#ffd70044'; ctx.lineWidth=1; rrStroke(achX, ry, achW, 18, 4);
      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fillText(a.label, achX+8, ry+13);
      ctx.textAlign='right'; ctx.fillStyle='#ffd700';
      ctx.fillText('+'+a.coins, achX+achW-8, ry+13);
    }
    if (newlyUnlocked.length > 3) {
      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('+'+(newlyUnlocked.length-3)+'к°ң лҚ”...', W/2, achY+10+show*22+12);
    }
  }

  ctx.font=`${sz(13)}px sans-serif`;
  ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(Date.now()*0.004)*0.2})`;
  ctx.fillText('\uD0ED\uD558\uC5EC \uB3CC\uC544\uAC00\uAE30',W/2,H*0.94);
}

  if (document.hidden) {
    // лӘЁл“  мҳӨл””мҳӨ мқјмӢңм •м§Җ (л°ұк·ёлқјмҡҙл“ң/мөңмҶҢнҷ”)
    bgAudioState = { titleBgm: titleBgmPlaying, rankingBgm: rankingBgmPlaying, shopBgm: shopBgmPlaying, preview: !!songPreviewAudio && !songPreviewAudio.paused };
    if (titleBgmPlaying) titleBgm.pause();
    if (rankingBgmPlaying) rankingBgm.pause();
    if (shopBgmPlaying) shopBgm.pause();
    if (songPreviewAudio && !songPreviewAudio.paused) songPreviewAudio.pause();
    // мқёкІҢмһ„ мҳӨл””мҳӨ
    if (state === 'playing') {
      pauseGame();
    }
  } else if (bgAudioState) {
    // ліөк·Җ мӢң dt мҠӨнҢҢмқҙнҒ¬ л°©м§Җ
    lastTime = 0;
    // ліөк·Җ мӢң: мқёкІҢмһ„мқҙ м•„лӢҢ мҳӨл””мҳӨл§Ң мһҗлҸҷ ліөмӣҗ (мқёкІҢмһ„мқҖ resumeGameмңјлЎң мІҳлҰ¬)
    if (bgAudioState.titleBgm && state !== 'playing') { titleBgm.play().catch(()=>{}); }
    if (bgAudioState.rankingBgm && state === 'ranking') { rankingBgm.play().catch(()=>{}); }
    if (bgAudioState.shopBgm && state === 'shop') { shopBgm.play().catch(()=>{}); }
    if (bgAudioState.preview && state === 'select' && songPreviewAudio) { songPreviewAudio.play().catch(()=>{}); }
    bgAudioState = null;
  }
});

let pausedAtTime = 0; // л©Ҳм¶Ө мӢңм җмқҳ gameTime
function pauseGame() {
  if (state !== 'playing' || gamePaused) return;
  gamePaused = true;
  pausedAtTime = gameTime;
  // ABS лӘЁл“ң: source м •м§Җ
  if (window._absNodes) {
    window._absPausedAt = actx ? actx.currentTime - window._absStartCtx : gameTime;
    for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} }
    window._absNodes = null;
  }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) allStemAudios[i].pause();
  }
  for (const a of pulseStemAudios) { if (a) a.pause(); }
  if (songAudio) songAudio.pause();
}

function resumeGame() {
  if (!gamePaused) return;
  gamePaused = false;
  lastTime = 0; // dt мҠӨнҢҢмқҙнҒ¬ л°©м§Җ: лӢӨмқҢ н”„л Ҳмһ„мқ„ мІ« н”„л Ҳмһ„мІҳлҹј мІҳлҰ¬
  resumeSyncCounter = 15; // мһ¬к°ң нӣ„ 15н”„л Ҳмһ„к°„ мҳӨл””мҳӨм—җ к°•м ң лҸҷкё°нҷ”
  // мҳӨл””мҳӨ мң„м№ҳлҘј gameTime кё°мӨҖмңјлЎң мһ¬лҸҷкё°нҷ”
  if (countdownTime <= 0) {
    const targetTime = pausedAtTime;
    gameTime = targetTime;
    if (actx) songStartTime = actx.currentTime - targetTime;
    if (usingStemMode) {
      // ABS лӘЁл“ң: мғҲ source мғқм„ұн•ҳм—¬ мһ¬к°ң
      if (window._absPausedAt != null && stemAudioBuffers && actx) {
        window._absNodes = [];
        window._absGains = window._absGains || [];
        window._absStartCtx = actx.currentTime - window._absPausedAt;
        for (let i = 0; i < allStemAudios.length; i++) {
          if (stemAudioBuffers[i]) {
            if (!window._absGains[i]) {
              const g = actx.createGain(); g.connect(actx.destination); window._absGains[i] = g;
            }
            const src = actx.createBufferSource();
            src.buffer = stemAudioBuffers[i];
            src.connect(window._absGains[i]);
            src.start(0, window._absPausedAt);
            window._absNodes.push(src);
          } else { window._absNodes.push(null); }
        }
        window._absPausedAt = null;
      } else {
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) { allStemAudios[i].currentTime = targetTime; }
        }
        for (let i = 0; i < allStemAudios.length; i++) {
          if (allStemAudios[i]) allStemAudios[i].play().catch(()=>{});
        }
      }
      // нҺ„мҠӨ мҳӨл””мҳӨ лҸҷкё°нҷ”
      for (let i = 0; i < pulseStemAudios.length; i++) {
        if (pulseStemAudios[i]) {
          pulseStemAudios[i].currentTime = targetTime + PULSE_LEAD;
          pulseStemAudios[i].play().catch(()=>{});
        }
      }
    } else if (songAudio) {
      songAudio.currentTime = targetTime;
      songAudio.play().catch(()=>{});
    }
  }
}

// ===== LOOP =====
let lastTime = 0;
function loop(time) {
  if (lastTime === 0) lastTime = time; // мІ« н”„л Ҳмһ„ dt мҠӨнҢҢмқҙнҒ¬ л°©м§Җ
  const dt = Math.min((time-lastTime)/1000, 0.033); // мөңлҢҖ dt 33ms (30fps н•ҳн•ң)
  lastTime = time;
  updateAd(dt);
  if (!gamePaused) { update(dt); }
  updateFade(dt);
  render();
  // мқјмӢңм •м§Җ мҳӨлІ„л Ҳмқҙ
  if (gamePaused && state === 'playing') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(36)}px sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText('PAUSED', W/2, H/2 - sz(30));
    // мһ¬к°ң лІ„нҠј
    const rbW = sz(160), rbH = sz(40);
    const rbX = (W-rbW)/2, rbY = H/2;
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(rbX, rbY, rbW, rbH, sz(10));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
    rrStroke(rbX, rbY, rbW, rbH, sz(10));
    ctx.font = `bold ${sz(18)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('в–¶ кі„мҶҚн•ҳкё°', W/2, rbY + rbH*0.6);
  }
  renderAd();
  renderFade();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
