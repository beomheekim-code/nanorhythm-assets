function resize() {

// ===== BufferPlayer: iOS м „мҡ© HTMLAudioElement нҳёнҷҳ лһҳнҚј =====
// AudioBufferSourceNode кё°л°ҳ вҶ’ play() л Ҳмқҙн„ҙмӢң кұ°мқҳ 0
class BufferPlayer {
  constructor(audioBuffer, audioCtx) {
    this.buffer = audioBuffer;
    this.actx = audioCtx;
    this.source = null;
    this.gainNode = audioCtx.createGain();
    this.gainNode.connect(audioCtx.destination);
    this._volume = 1;
    this._savedTime = 0; // pause/seek мӢң м ҖмһҘлҗң мһ¬мғқ мң„м№ҳ
    this._startCtxTime = 0; // play() нҳём¶ң мӢңм җмқҳ actx.currentTime
    this._paused = true;
    this._ended = false;
    this.src = ''; // HTMLAudio нҳёнҷҳмҡ© (л””лІ„к·ё)
  }
  get currentTime() {
    if (this._paused || !this.buffer) return this._savedTime;
    const t = this._savedTime + (this.actx.currentTime - this._startCtxTime);
    return Math.min(this.buffer.duration, t);
  }
  set currentTime(t) {
    const wasPlaying = !this._paused;
    if (wasPlaying) this._stopSource();
    this._savedTime = Math.max(0, Math.min(this.buffer ? this.buffer.duration : 0, t));
    this._ended = false;
    if (wasPlaying) this._startSource();
  }
  get volume() { return this._volume; }
  set volume(v) { this._volume = v; this.gainNode.gain.value = v; }
  get paused() { return this._paused; }
  get ended() { return this._ended; }
  get duration() { return this.buffer ? this.buffer.duration : 0; }
  play() {
    if (!this._paused || !this.buffer) return Promise.resolve();
    this._startSource();
    return Promise.resolve();
  }
  pause() {
    if (this._paused) return;
    this._savedTime = this.currentTime;
    this._stopSource();
  }
  _startSource() {
    this._stopSource();
    if (!this.buffer) return;
    const src = this.actx.createBufferSource();
    src.buffer = this.buffer;
    src.connect(this.gainNode);
    src.onended = () => {
      if (this.source === src) {
        // мһҗм—° мў…лЈҢ (pauseлЎң stopлҗң кІғкіј кө¬л¶„)
        if (!this._paused) { this._ended = true; this._paused = true; }
      }
    };
    this._startCtxTime = this.actx.currentTime;
    try { src.start(0, this._savedTime); } catch(e) {}
    this.source = src;
    this._paused = false;
    this._ended = false;
  }
  _stopSource() {
    if (this.source) {
      try { this.source.onended = null; this.source.stop(); } catch(e) {}
      this.source = null;
    }
    this._paused = true;
  }
  addEventListener() {} // нҳёнҷҳмҡ© noop
  removeEventListener() {}
}

function initAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain.connect(actx.destination);

  const sr = actx.sampleRate;

}
// HTMLAudioлҘј Web Audio к·ёлһҳн”„м—җ м—°кІ° (iOS л¬ҙмқҢ м ңм–ҙмҡ©)
function routeAudioThroughGain(audioEl, gainValue) {
  if (!actx || !audioEl) return null;
  try {
    const src = actx.createMediaElementSource(audioEl);
    const gain = actx.createGain();
    gain.gain.value = gainValue;
    src.connect(gain);
    gain.connect(actx.destination);
    return gain;
  } catch(e) { return null; } // мқҙлҜё м—°кІ°лҗң кІҪмҡ° м—җлҹ¬
}

function resumeAudio() {
  if (!actx) initAudio();
  if (actx.state === 'suspended') actx.resume();
  // iOS: л¬ҙмқҢ лІ„нҚј мһ¬мғқмңјлЎң AudioContext + HTML Audio лҸҷмӢң unlock
  if (!resumeAudio._unlocked && actx) {
    const silentBuf = actx.createBuffer(1, 1, actx.sampleRate);
    const src = actx.createBufferSource();
    src.buffer = silentBuf;
    src.connect(actx.destination);
    src.start(0);
    resumeAudio._unlocked = true;
  }
  applyBgmVol();
}

const PREVIEW_FADE_OUT = 3; // last 3 seconds fade out
const PREVIEW_FADE_IN = 1.5; // first 1.5 seconds fade in
const PREVIEW_GAP = 0.5; // 0.5s silence between loops

function getPreviewMaxVol() { return 0.55 * volBgm; }

let previewLoading = false;

  stopSongPreview();

}
function stopPreview() {
  previewActive = false;
  previewSongIdx = -1;

}
function schedulePreview() {
  if (!previewActive || !songPreviewAudio || previewLoading) return;
  const elapsed = (performance.now() - previewCycleStart) / 1000;
  if (elapsed < PREVIEW_FADE_IN) {
    // нҺҳмқҙл“ңмқё
    songPreviewAudio.volume = getPreviewMaxVol() * (elapsed / PREVIEW_FADE_IN);
  } else if (elapsed < PREVIEW_DURATION - PREVIEW_FADE_OUT) {
    // м •мғҒ мһ¬мғқ
    songPreviewAudio.volume = getPreviewMaxVol();
  } else if (elapsed < PREVIEW_DURATION) {
    // нҺҳмқҙл“ңм•„мӣғ
    const remain = PREVIEW_DURATION - elapsed;
    songPreviewAudio.volume = getPreviewMaxVol() * (remain / PREVIEW_FADE_OUT);
  } else if (elapsed < PREVIEW_DURATION + PREVIEW_GAP) {
    // к°ӯ (л¬ҙмқҢ)
    songPreviewAudio.volume = 0;
  } else {
    // лӢӨмӢң мІҳмқҢл¶Җн„°
    songPreviewAudio.currentTime = 0;
    songPreviewAudio.play().catch(()=>{});
    previewCycleStart = performance.now();
  }
}

let nanoFilter = null;       // BiquadFilterNode

function updateStemVolumes(dt) {

    const baseVol = (countdownTime > 0 || songEnded) ? 0 : volBgm;
    const useAbs = window._absGains && window._absGains.length > 0;
    for (let i = 0; i < allStemAudios.length; i++) {
      const isAlways = ALWAYS_AUDIBLE_STEMS.includes(i);
      const vol = isAlways ? STEM_VOL_VOCAL : STEM_VOL_NORMAL;
      const targetVol = baseVol * vol;
      if (useAbs && window._absGains[i]) {
        const g = window._absGains[i].gain;
        if (Math.abs(g.value - targetVol) > 0.001) g.value = targetVol;
      }
      if (allStemAudios[i]) { const nv = useAbs ? 0 : targetVol; if (Math.abs(allStemAudios[i].volume - nv) > 0.001) allStemAudios[i].volume = nv; }
    }
  } else if (songAudio) {
    const nv = 0.7 * volBgm; if (Math.abs(songAudio.volume - nv) > 0.001) songAudio.volume = nv;
  }
}

// ===== н—Ҳкіө мһ…л Ҙ =====
// BGM мһ¬мғқ мӨ‘: н•ҙлӢ№ л Ҳмқё мҠӨн…ңмқ„ мҲңк°„ нҺ„мҠӨ (ліјлҘЁ мҰүмӢң мҳ¬лҰ¬кі  lerpк°Җ л№ лҘҙкІҢ лӮҙлҰј)
// BGM мһ¬мғқ м „: м§§мқҖ нғӯ нҸҙл°ұмқҢ
const EMPTY_TAP_FREQS = [200, 300, 400, 500, 600, 700, 800, 900];

function playEmptyPressSfx(lane) {
  if (!actx) return;
  resumeAudio(); // AudioContext resume ліҙмһҘ
  // BGM мў…лЈҢ нӣ„: л¬ҙмқҢ
  if (songDuration > 0 && gameTime >= songDuration - 1) return;
  const now = performance.now();
  const peakVol = countdownTime > 0 ? STEM_VOL_NORMAL * volBgm : Math.min(1.0, STEM_VOL_NORMAL * volBgm * 1.4);
  if (usingStemMode) {
    // onset лӘЁл“ң: н•ҙлӢ№ л Ҳмқёмқҳ лӢӨмқҢ л…ёнҠё stem + onset мӢңк°„мңјлЎң мһ¬мғқ
    let targetStems = [];
    let targetOffset = 0;
    if (curSong && curSong._onsetMode && nodes.length > 0) {
      const delay = curSong._startDelay || 0;
      for (const n of nodes) {
        if (n.hit || n.missed) continue;
        if (n.lane === lane && n.stem != null) {
          targetStems = [n.stem];
          targetOffset = Math.max(0, n.time - delay); // л…ёнҠёмқҳ мӢӨм ң мҳӨл””мҳӨ мң„м№ҳ
          break;
        }
      }
      if (targetStems.length === 0) {
        for (const n of nodes) {
          if (!n.hit && !n.missed && n.stem != null) {
            targetStems = [n.stem];
            targetOffset = Math.max(0, n.time - delay);
            break;
          }
        }
      }
    }
    if (targetStems.length === 0) {
      // fallback: л Ҳмқё л§Өн•‘ мӮ¬мҡ©
      const ls = getLaneStems();
      if (ls && ls[lane]) targetStems = ls[lane].filter(si => !ALWAYS_AUDIBLE_STEMS.includes(si));
    }
    targetStems.forEach(si => {
      const stemEnded = allStemAudios[si] ? allStemAudios[si].ended : true;
      if (countdownTime > 0 || stemEnded) {
        if (stemAudioBuffers[si] && actx) {
          const src = actx.createBufferSource();
          const gain = actx.createGain();
          src.buffer = stemAudioBuffers[si];
          gain.gain.setValueAtTime(peakVol, actx.currentTime);
          gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.5);
          src.connect(gain); gain.connect(actx.destination);
          const offset = targetOffset > 0 ? targetOffset : (stemFirstSoundTime[si] || 0);
          src.start(0, offset, 0.5);
        }
      } else {
        stemPulses[si] = { start: now, peak: peakVol, dur: 500 };
        if (allStemAudios[si]) allStemAudios[si].volume = peakVol;
      }
    });
  } else {
    const freq = EMPTY_TAP_FREQS[lane % EMPTY_TAP_FREQS.length];
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(peakVol * 0.25, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.12);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + 0.12);
  }
}

// ===== SONG LOCK / SHOP SYSTEM =====
const FREE_SONG_COUNT = 10; // кё°ліё л¬ҙлЈҢ кіЎ мҲҳ
const UNLOCK_POINT_COST = 100; // нҸ¬мқёнҠёлЎң 1нҡҢ н•ҙкёҲ л№„мҡ©
const PASS_DURATION_MS = 28 * 24 * 60 * 60 * 1000; // 28мқј

function isSongLocked(idx) {
  if (idx < FREE_SONG_COUNT) return false;
  if (hasActivePass()) return false;
  if (getSongFreePlayCount(idx) > 0) return false;
  return true;
}
function hasActivePass() {
  const ts = parseInt(safeGetItem('rhythm_pass_' + (currentUser||'guest')) || '0');
  return ts > 0 && Date.now() < ts;
}
function hasEverPurchasedPass() {
  return safeGetItem('rhythm_passBought_' + (currentUser||'guest')) === '1';
}
function activatePass() {
  const expiry = Date.now() + PASS_DURATION_MS;

function stopSongAudio() {
  // ABS м •лҰ¬
  if (window._absNodes) { for (const s of window._absNodes) { if (s) try { s.stop(); } catch(e){} } window._absNodes = null; }
  if (window._absGains) { for (const g of window._absGains) { if (g) try { g.disconnect(); } catch(e){} } window._absGains = null; }
  window._absStartCtx = null; window._absPausedAt = null;
  if (songAudio) { songAudio.pause(); songAudio.currentTime = 0; songAudio = null; }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) { allStemAudios[i].pause(); allStemAudios[i].currentTime = 0; }
  }
  allStemAudios = [];
  for (const a of pulseStemAudios) { if (a) { a.pause(); a.src = ''; } }
  pulseStemAudios = [];
  // iOS Blob URL н•ҙм ң (л©”лӘЁлҰ¬ лҲ„мҲҳ л°©м§Җ)
  for (const k in stemBlobUrls) {
    try { URL.revokeObjectURL(stemBlobUrls[k]); } catch(e) {}
    delete stemBlobUrls[k];
  }
  usingStemMode = false;
  gamePaused = false;
}
function fadeOutSongAudio(duration) {
  const step = 0.05;
  const interval = (duration * 1000) / (1 / step);
  const targets = [];
  // нҳ„мһ¬ ліјлҘЁ м ҖмһҘ
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) targets.push(allStemAudios[i]);
  }
  if (songAudio) targets.push(songAudio);
  if (targets.length === 0) return;
  const fadeStep = () => {
    let allDone = true;
    for (const a of targets) {
      if (a.volume > 0.01) { a.volume = Math.max(0, a.volume - step); allDone = false; }
      else a.volume = 0;
    }
    if (!allDone) setTimeout(fadeStep, interval);
    else stopSongAudio();
  };
  fadeStep();
}

function codeToLabel(code) {
  if (code === 'Space') return 'SPACE';
  if (code === 'Semicolon') return ';';
  if (code === 'Quote') return "'";
  if (code === 'BracketLeft') return '[';
  if (code === 'BracketRight') return ']';
  if (code === 'Backslash') return '\\';
  if (code === 'Comma') return ',';
  if (code === 'Period') return '.';
  if (code === 'Slash') return '/';
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  if (code.startsWith('Arrow')) return 'вҶҗвҶ‘вҶ’вҶ“'[['Left','Up','Right','Down'].indexOf(code.slice(5))] || code;
  return code.replace('Shift','вҮ§').replace('Control','Ctrl').replace('Alt','Alt');
}

// ===== LEVEL RATING =====
// кіЎ+лӮңмқҙлҸ„лі„ л ҲлІЁ(1~15) кі„мӮ°: л…ёнҠё л°ҖлҸ„, BPM, нҷҖл“ң, нҠёлһ© кі л Ө
function calcLevel(songIdx, diffIdx) {
  const song = songs[songIdx];
  const diff = DIFFICULTIES[diffIdx];
  const pat = song.pattern;
  const patHits = pat.filter(v => v).length; // 16л№„нҠё мӨ‘ л…ёнҠё мһҲлҠ” мҲҳ
  const patDensity = patHits / 16; // 0~1
  // кё°ліё мҡ”мҶҢл“Ө
  const bpmScore = song.bpm / 60;              // л№ лҘјмҲҳлЎқ лҶ’мқҢ (1.5~2.7)
  const densityScore = patDensity * 5;          // нҢЁн„ҙ л°ҖлҸ„ (0~5)
  const diffMul = diff.noteDensity;             // лӮңмқҙлҸ„ л°ҖлҸ„ л°°мңЁ
  const holdScore = diff.holdEvery > 0 ? (15 / diff.holdEvery) : 0;  // нҷҖл“ң л№ҲлҸ„
  const drainScore = diff.hpDrain * 12;         // HP к°җмҶҢ
  // мў…н•© м җмҲҳ (нӮӨ мҲҳ л§Һмқ„мҲҳлЎқ лӮңмқҙлҸ„ мғҒмҠ№)
  const laneBonus = Math.max(0, (laneCount - 4) * 0.4);
  const raw = (bpmScore + densityScore) * diffMul + holdScore + drainScore + laneBonus;
  // 1~15 лІ”мң„лЎң л§Өн•‘ (н•ҳн–Ҙ мҠӨмјҖмқј)
  return Math.max(1, Math.min(15, Math.round(raw * 0.85)));
}

function getDeviceFingerprint() {

    (navigator.hardwareConcurrency||''), (screen.colorDepth||'')].join('|');

function handleAuthSuccess(uid, method) {

  let nickResolved = false;

const SCORE_THRESHOLDS = [200000, 400000, 600000, 800000];
const GRADE_ORDER = ['C','B','A','S','P'];
const GRADE_COINS = { C: 25, B: 50, A: 100, S: 200, P: 500 };
const SCORE_COINS = { 200000: 50, 400000: 100, 600000: 200, 800000: 500 };
const DIFF_COINS = [25, 50, 100, 200];
const SPEED_COINS = [10, 20, 40, 60, 100, 150, 200, 300];

function generateAchievements() {
  const achs = [];
  songs.forEach((s, si) => {
    // Grade achievements
    GRADE_ORDER.forEach(g => {
      const minPct = g==='S'?0.98:g==='A'?0.90:g==='B'?0.80:0.60;
      const glabel = g==='P' ? `${s.name} вҖ” PERFECT нҒҙлҰ¬м–ҙ` : `${s.name} вҖ” ${g}л“ұкёү мқҙмғҒ нҒҙлҰ¬м–ҙ`;
      achs.push({ id:`s${si}_grade_${g}`, songIdx:si, type:'grade',
        label: glabel, coins: GRADE_COINS[g],
        check: d => d.songIdx===si && d.gauge>0 && (g==='P' ? d.missed===0 : d.pct>=minPct) });
    });
    // Score achievements
    SCORE_THRESHOLDS.forEach(t => {
      achs.push({ id:`s${si}_score_${t}`, songIdx:si, type:'score',
        label:`${s.name} вҖ” ${t.toLocaleString()}м җ мқҙмғҒ`, coins: SCORE_COINS[t],
        check: d => d.songIdx===si && d.score>=t });
    });
    // Difficulty achievements
    DIFFICULTIES.forEach((d, di) => {
      achs.push({ id:`s${si}_diff_${di}`, songIdx:si, type:'diff',
        label:`${s.name} вҖ” ${d.name} нҒҙлҰ¬м–ҙ`, coins: DIFF_COINS[di],
        check: dd => dd.songIdx===si && dd.diffIdx===di && dd.gauge>0 });
    });
    // Speed achievements
    SPEED_OPTIONS.forEach((sp, spi) => {
      achs.push({ id:`s${si}_speed_${spi}`, songIdx:si, type:'speed',
        label:`${s.name} вҖ” ${sp.toFixed(1)}x нҒҙлҰ¬м–ҙ`, coins: SPEED_COINS[spi] || 100,
        check: d => d.songIdx===si && d.speedIdx===spi && d.gauge>0 });
    });
  });
  return achs;
}

function flushLocalPlaysToFb() {
  const local = getLocalPlays();
  const pending = Object.keys(local);
  if (pending.length === 0) return;
  for (const key of pending) {
    const entry = local[key];
    if (!entry.logs || entry.logs.length === 0) continue;
    for (const ts of entry.logs) {
      fbDb.ref('plays/' + key + '/logs').push(ts);
    }
    fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + (entry.total || 0));
  }
  // лҸҷкё°нҷ” мҷ„лЈҢ нӣ„ лЎңм»¬ ліҙлҘҳ нҒҗ мҙҲкё°нҷ”

let lastLogCleanup = 0;
function cleanupOldLogs() {
  const now = Date.now();
  if (now - lastLogCleanup < 60*60*1000) return; // 1мӢңк°„л§ҲлӢӨ
  lastLogCleanup = now;
  const weekAgo = now - 7*24*60*60*1000;
  for (const key in fbPlayData) {
    const entry = fbPlayData[key];
    if (!entry.logs) continue;
    for (const pushId in entry.logs) {

}

  if (fbConnected) {

    };
  }
  // Firebase лҜём—°кІ° мӢң: мәҗмӢңлҗң Firebase лҚ°мқҙн„°л§Ң мӮ¬мҡ© (лЎңм»¬ лЎңк·ё concat кёҲм§Җ вҖ” мӨ‘ліө л°©м§Җ)
  return {

  };

function getChartData(type) {
  const now = Date.now();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const weekStart = new Date(todayStart); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const hourAgo = now - 60*60*1000;

  const list = [];
  for (let i = 0; i < songs.length; i++) {
    const entry = getMergedPlayData(i);
    const total = entry.total || 0;
    const logs = Array.isArray(entry.logs) ? entry.logs : (entry.logs ? Object.values(entry.logs) : []);
    let count = 0;
    if (type === 'top') count = total;
    else if (type === 'daily') count = logs.filter(t => t >= todayStart.getTime()).length;
    else if (type === 'weekly') count = logs.filter(t => t >= weekStart.getTime()).length;
    else if (type === 'hot') count = logs.filter(t => t >= hourAgo).length;
    list.push({ idx: i, count });
  }
  // count=0мқё кіЎ м ңмҷё (DAILY/WEEKLY/HOTм—җм„ң кё°лЎқ м—ҶлҠ” кіЎ мҲЁк№Җ), TOPмқҖ м „л¶Җ н‘ңмӢң
  const filtered = type === 'top' ? list : list.filter(item => item.count > 0);
  filtered.sort((a, b) => b.count - a.count || a.idx - b.idx);
  return filtered;
}

let fadeAlpha = 0;        // 0=нҲ¬лӘ…, 1=кІҖм •
let fadeDir = 0;          // 1=нҺҳмқҙл“ңм•„мӣғ(м–ҙл‘җмӣҢм§җ), -1=нҺҳмқҙл“ңмқё(л°қм•„м§җ), 0=м—ҶмқҢ
let fadeSpeed = 3.5;      // мҙҲлӢ№ м•ҢнҢҢ ліҖнҷ”лҹү
let fadePendingState = null;
let fadePendingCallback = null;

function transitionTo(newState, callback) {
  if (fadeDir !== 0) return; // мқҙлҜё м „нҷҳ мӨ‘
  fadePendingState = newState;
  fadePendingCallback = callback || null;
  fadeDir = 1; // нҺҳмқҙл“ңм•„мӣғ мӢңмһ‘
}

function updateFade(dt) {
  if (fadeDir === 0) return;
  fadeAlpha += fadeDir * fadeSpeed * dt;
  if (fadeDir === 1 && fadeAlpha >= 1) {
    fadeAlpha = 1;
    // нҷ”л©ҙмқҙ мҷ„м „нһҲ м–ҙл‘җмӣҢм§җ вҶ’ мғҒнғң м „нҷҳ

      // н”„лҰ¬л·° мІ« лЎңл“ң м§Җм—°: нҷ”л©ҙ м „нҷҳ мҷ„лЈҢ нӣ„ мӢңмһ‘ (мІ« мҠӨнҒ¬лЎӨ лҒҠк№Җ л°©м§Җ)
      previewSongIdx = selectedSong;
      if (_previewDebounce) clearTimeout(_previewDebounce);
      _previewDebounce = setTimeout(() => { startPreview(selectedSong); }, 800);
    }
    if (fadePendingState) { state = fadePendingState; fadePendingState = null; }
    if (fadePendingCallback) { fadePendingCallback(); fadePendingCallback = null; }
    fadeDir = -1; // нҺҳмқҙл“ңмқё мӢңмһ‘
  } else if (fadeDir === -1 && fadeAlpha <= 0) {
    fadeAlpha = 0;
    fadeDir = 0; // м „нҷҳ мҷ„лЈҢ
  }
}

function renderFade() {

  ctx.globalAlpha = fadeAlpha;

}

// ===== SEEDED RNG =====
function seededRng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// ===== NODE GENERATION =====
let songEnergyMap = null; // 0.5мҙҲ лӢЁмң„ м—җл„Ҳм§Җ (0~1), л“ңлҹј кё°мӨҖ

function generateNodes(song, diff, energyMap) {
  nodes = [];
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);

  const sixteenthDur = 15 / song.bpm;
  const eighthDur = sixteenthDur * 2;
  const totalSixteenths = song.bars * 16;
  // лӮҷн•ҳ мӢңк°„ = нһҲнҠёлқјмқёк№Ңм§Җ кұ°лҰ¬ / л…ёнҠё мҶҚлҸ„ вҶ’ м№ҙмҡҙнҠёлӢӨмҡҙ лҒқлӮҳл©ҙ мғҒлӢЁм—җм„ң л“ұмһҘ
  const fallTime = getHitY() / calcNoteSpeed(song.bpm, selectedSpeed || 1);
  const startDelay = fallTime;
  let noteIdx = 0;
  const baseDensity = diff.noteDensity;
  const densityMul = 1 + Math.max(0, laneCount - 4) * 0.09;
  const density = Math.min(baseDensity * densityMul, 1.8);
  const chordChance = laneCount >= 6 ? (baseDensity >= 1.3 ? 0.45 : baseDensity >= 1.0 ? 0.35 : baseDensity >= 0.75 ? 0.25 : 0.15) : 0;
  const pat = song.pattern;

  // кіЎлі„ кі мң  л Ҳмқё мӢңнҖҖмҠӨ мғқм„ұ (мӢңл“ң кё°л°ҳ вҶ’ л§ӨлІҲ лҸҷмқј, кіЎл§ҲлӢӨ лӢӨлҰ„)
  const songLaneSeq = [];
  const seqLen = Math.max(LANE_SEQ.length * 2, 32);
  for (let si = 0; si < seqLen; si++) {
    // м—°мҶҚ к°ҷмқҖ л Ҳмқё л°©м§Җ: мқҙм „ л Ҳмқёкіј лӢӨлҘё л Ҳмқё м„ нғқ
    let nl = Math.floor(rng() * laneCount);
    if (si > 0 && nl === songLaneSeq[si - 1]) nl = (nl + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
    songLaneSeq.push(nl);
  }

  // Generate notes from rhythm pattern
  for (let i = 0; i < totalSixteenths; i++) {
    const pos = i % 16;
    if (!pat[pos]) continue;
    // м—җл„Ҳм§Җ кё°л°ҳ л°ҖлҸ„ мЎ°м Ҳ: мЎ°мҡ©н•ң кө¬к°„м—җм„ңлҠ” л°ҖлҸ„лҘј лӮ®м¶Ө
    const noteTime = i * sixteenthDur + startDelay;
    let localDensity = density;
    if (energyMap && energyMap.length > 0) {
      const eIdx = Math.min(Math.floor(noteTime / 0.5), energyMap.length - 1);
      const energy = eIdx >= 0 ? energyMap[eIdx] : 1;
      // л¬ҙмқҢ кө¬к°„ м ңкұ°
      if (energy < 0.02) continue;
      // мЎ°мҡ©н•ң кө¬к°„: л°ҖлҸ„ м¶•мҶҢ
      if (energy < 0.15) localDensity = density * (energy / 0.15);
    }
    // Density filtering
    if (localDensity < 1 && rng() > localDensity) continue;
    // For hell mode, sometimes add extra notes on off-beats (м—җл„Ҳм§Җ кё°л°ҳ л°ҖлҸ„ м Ғмҡ©)
    if (localDensity > 1 && pos % 2 === 1 && rng() < (localDensity - 1) * 0.5) {
      const eLane = Math.floor(rng() * laneCount);
      const eFreq = 440;
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: eLane, freq: eFreq, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
    }
    const lane = songLaneSeq[noteIdx % songLaneSeq.length];
    const freq = 440;
    const nd = {
      time: i * sixteenthDur + startDelay,
      lane, freq, type: 'note',
      hit: false, missed: false,
      holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    // Hold notes based on difficulty
    const holdEvery7 = laneCount >= 6 ? Math.max(4, Math.floor((diff.holdEvery || 999) * 0.7)) : diff.holdEvery;
    if (holdEvery7 > 0 && noteIdx > 0 && noteIdx % holdEvery7 === 0 && i + 6 < totalSixteenths) {
      const holdLen = 2 + Math.floor(rng() * 2);
      nd.type = 'hold';
      nd.endTime = nd.time + holdLen * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // 7нӮӨ лҸҷмӢңл…ёнҠё: к°ҷмқҖ нғҖмқҙл°Қм—җ лӢӨлҘё л Ҳмқём—җ м¶”к°Җ л…ёнҠё
    if (chordChance > 0 && rng() < chordChance) {
      const usedLanes = [lane];
      let chordLane = Math.floor(rng() * laneCount);
      if (chordLane === lane) chordLane = (chordLane + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
      usedLanes.push(chordLane);
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: chordLane, freq: 440, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
      // м§ҖмҳҘ: 15% нҷ•лҘ лЎң нҠёлҰ¬н”Ң л…ёнҠё
      if (baseDensity >= 1.3 && rng() < 0.15) {
        let triLane;
        do { triLane = Math.floor(rng() * laneCount); } while (usedLanes.includes(triLane));
        nodes.push({
          time: i * sixteenthDur + startDelay,
          lane: triLane, freq: 440, type: 'note',
          hit: false, missed: false,
          holding: false, holdComplete: false,
          endTime: 0, _ho1: null, _ho2: null, _hg: null
        });
        noteIdx++;
      }
    }
  }

  // Remove notes that overlap with hold durations in same lane
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  // Traps based on difficulty (7нӮӨ: нҠёлһ© л№ҲлҸ„ мҰқк°Җ)
  const trapInt = laneCount >= 6 && diff.trapInterval > 0 ? Math.max(3, diff.trapInterval - 1) : diff.trapInterval;
  if (trapInt > 0) {
    for (let i = 20; i < totalSixteenths; i += trapInt * 2 + Math.floor(rng() * Math.max(1, trapInt * 2))) {
      const t = i * sixteenthDur + startDelay;
      const lane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) {
        if (n.lane !== lane) continue;
        if (n.type === 'hold' && t >= n.time - eighthDur*0.5 && t <= n.endTime + eighthDur*0.5) { conflict = true; break; }
        if (Math.abs(n.time - t) < sixteenthDur * 0.8) { conflict = true; break; }
      }
      if (!conflict) nodes.push({ time: t, lane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // л…ёнҠё кё°л°ҳ мөңмҶҢ кёёмқҙ (мӢӨм ң мҳӨл””мҳӨ кёёмқҙлЎң лӮҳмӨ‘м—җ к°ұмӢ лҗЁ)
  songDuration = totalSixteenths * sixteenthDur + startDelay + 2;
}

// мҳӨл””мҳӨ лЎңл“ң нӣ„ мӢӨм ң кёёмқҙлЎң songDuration к°ұмӢ  + л…ёл“ң мһ¬мғқм„ұ
function updateSongDurationFromAudio() {
  let audioDur = 0;
  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && allStemAudios[0].duration) {
    audioDur = allStemAudios[0].duration;
  } else if (songAudio && songAudio.duration) {
    audioDur = songAudio.duration;
  }
  if (audioDur > 0 && isFinite(audioDur)) {
    // мҳӨл””мҳӨ кёёмқҙм—җ л§һм¶° barsмҷҖ л…ёнҠё мһ¬мғқм„ұ (л§Ҳм§Җл§ү 5мҙҲлҠ” м•„мӣғнҠёлЎң)
    if (curSong) {
      const sixteenthDur = 15 / curSong.bpm;
      curSong._audioBars = Math.max(1, Math.floor((audioDur - 1) / (sixteenthDur * 16)));
    }
    // songDuration = мҳӨл””мҳӨ кёёмқҙ + 2мҙҲ м—¬мҡҙ
    songDuration = audioDur + 2;
  }
}

addEventListener('keydown', e => {
  if (e.repeat) return;
  // нғҖмқҙнӢҖ нҷ”л©ҙ: м•„л¬ҙ нӮӨлӮҳ лҲҢлҹ¬лҸ„ BGM мӢңмһ‘
  if (state === 'title' && !titleBgmUnlocked) { resumeAudio(); startTitleBgm(); titleBgmUnlocked = true; }
  // лӢүл„Өмһ„ мһ…л Ҙ мӨ‘
  if (nicknameOverlay) {
    if (e.code === 'Enter' || e.code === 'NumpadEnter') { confirmNickname(); e.preventDefault(); }
    return;
  }
  // лЎңк·ёмқё нҷ”л©ҙ: мҶҢм…ң лЎңк·ёмқё лІ„нҠјл§Ң мӮ¬мҡ©
  if (state === 'login') {
    if (!titleBgmUnlocked) { startTitleBgm(); titleBgmUnlocked = true; }
    if (e.code === 'Escape' && guestWarningOpen) { guestWarningOpen = false; }
    return;
  }
  if (gamePaused) { resumeGame(); return; }
  const li = LANE_CODES.indexOf(e.code);
  if (li >= 0) {
    keyHeld[li] = true; keyFlash[li] = 0.3;
    if (state === 'playing' && !songLoading && (countdownTime <= 0 || (curSong && curSong._onsetMode && countdownTime < 0.5))) handleLanePress(li);
    else if (state === 'playing' && !songLoading && countdownTime > 0) playEmptyPressSfx(li);
    e.preventDefault();
  }
  // м„Өм • нҷ”л©ҙ нӮӨ л°”мқёл”©
  if (settingsOpen) {
    if (settingsBindingLane >= 0) {
      LANE_CODES[settingsBindingLane] = e.code;
      saveKeymap();
      settingsBindingLane = -1;
      e.preventDefault(); return;
    }
    if (e.code === 'Escape') { settingsOpen = false; e.preventDefault(); return; }
    e.preventDefault(); return;
  }
  if (state === 'select' && searchActive) {
    // Search input is handled by hidden input element (for IME/н•ңкёҖ support)
    return;
  }
  if (state === 'select' && speedInputActive) {
    if (e.code === 'Enter' || e.code === 'NumpadEnter') {
      const val = parseFloat(speedInputText);
      if (!isNaN(val) && val >= SPEED_MIN && val <= SPEED_MAX) {
        selectedSpeed = parseFloat(val.toFixed(1)); saveDiffSpeed();
      }
      speedInputActive = false; speedInputText = '';
      speedInputElHidden.blur();
      e.preventDefault(); return;
    }
    if (e.code === 'Escape') { speedInputActive = false; speedInputText = ''; speedInputElHidden.blur(); e.preventDefault(); return; }
    if (e.code === 'Backspace') { speedInputText = speedInputText.slice(0, -1); e.preventDefault(); return; }
    if ((e.key >= '0' && e.key <= '9') || e.key === '.') {
      if (speedInputText.length < 4) speedInputText += e.key;
      e.preventDefault(); return;
    }
    e.preventDefault(); return;
  }
  if (e.code === 'Enter') inputQueue.push('confirm');
  if (e.code === 'ArrowUp' || e.code === 'KeyW') inputQueue.push('up');
  if (e.code === 'ArrowDown') inputQueue.push('down');
  if (e.code === 'ArrowLeft') inputQueue.push('left');
  if (e.code === 'ArrowRight') inputQueue.push('right');
  if (e.code === 'Escape') inputQueue.push('back');
  if (e.code === 'Tab') { e.preventDefault(); inputQueue.push('tab'); }
  if (e.code === 'KeyR' && state === 'select' && !searchActive) inputQueue.push('ranking');
  if (e.code === 'KeyT' && state === 'select' && !searchActive) inputQueue.push('achievement');
  if (e.code === 'KeyF' && state === 'select' && !searchActive) { searchActive = true; searchText = ''; searchInputEl.value = ''; searchInputEl.focus(); e.preventDefault(); return; }
  if (state === 'playing' && (e.code === 'BracketLeft' || e.code === 'Minus')) {
    speedDown(); noteSpeed = calcNoteSpeed(curSong.bpm, selectedSpeed);
  }
  if (state === 'playing' && (e.code === 'BracketRight' || e.code === 'Equal')) {
    speedUp(); noteSpeed = calcNoteSpeed(curSong.bpm, selectedSpeed);
  }
});
addEventListener('keyup', e => { const li = LANE_CODES.indexOf(e.code); if (li >= 0) keyHeld[li] = false; });

function hitTest(x, y, bx, by, bw, bh) { return x>=bx && x<=bx+bw && y>=by && y<=by+bh; }

// кіөнҶө н–„лІ„кұ° л©”лүҙ нҒҙлҰӯ мІҳлҰ¬ (мғҒм җ/м—…м Ғ/лһӯнӮ№/м„ кіЎ кіөмҡ©)
function handleHamburgerClick(mx, my) {
  if (hamburgerAreas.btn && hitTest(mx, my, hamburgerAreas.btn.x, hamburgerAreas.btn.y, hamburgerAreas.btn.w, hamburgerAreas.btn.h)) {
    playScrollTick(); hamburgerOpen = !hamburgerOpen; return true;
  }
  if (hamburgerOpen && hamburgerAreas.menu) {
    const m = hamburgerAreas.menu;
    if (hitTest(mx, my, m.x, m.y, m.w, m.h)) {
      const idx = Math.floor((my - m.y) / m.itemH);
      playScrollTick(); hamburgerOpen = false;
      if (idx === 0) { shopScroll = 0; stopPreview(); startShopBgm(); transitionTo('shop'); }
      else if (idx === 1) { settingsOpen = true; settingsBindingLane = -1; }
      return true;
    }
    hamburgerOpen = false; return true;
  }
  return false;
}

// ===== ONSET DETECTION =====
function detectOnsets(audioBuffer) {
  if (!audioBuffer) return [];
  const data = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const winSamples = Math.floor(sr * 0.015); // 15ms мңҲлҸ„мҡ°
  const minGapSamples = Math.floor(sr * 0.03); // 30ms мөңмҶҢ к°„кІ© (н”јм•„л…ё л“ұ л¶Җл“ңлҹ¬мҡҙ м•…кё° к°җм§Җ к°ңм„ )
  const onsets = [];
  let smoothed = 0;
  let lastOnset = -minGapSamples * 2;
  for (let i = 0; i < data.length; i += winSamples) {
    let sum = 0, cnt = 0;
    const end = Math.min(i + winSamples, data.length);
    for (let k = i; k < end; k += 8) { sum += data[k] * data[k]; cnt++; } // k+=8лЎң 2л°° л№ лҘҙкІҢ
    const energy = cnt > 0 ? Math.sqrt(sum / cnt) : 0;
    // л¬ён„ұ мҷ„нҷ”: м ҲлҢҖк°’ 0.003, мҠӨнҢҢмқҙнҒ¬ 1.1л°° вҖ” н”јм•„л…ё/нҳ„м•…кё°мІҳлҹј soft attackлҸ„ к°җм§Җ
    if (energy > 0.003 && energy > smoothed * 1.1 && i - lastOnset > minGapSamples) {
      onsets.push(i / sr);
      lastOnset = i;
    }
    smoothed = energy * 0.2 + smoothed * 0.8;
  }
  return onsets;
}

function generateNodesFromOnsets(song, diff, onsetsByStem, energyMap) {
  nodes = [];
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);
  const bgmDelay = 3.5;
  song._startDelay = bgmDelay;
  song._onsetMode = true;
  const sixteenth = 15 / song.bpm;

  // лӘЁл“  stem onsetмқ„ н•ҳлӮҳлЎң н•©м№ҳлҗҳ stem м •ліҙ мң м§Җ (vocals м ңмҷё)
  let allOnsets = [];
  for (const si in onsetsByStem) {
    if (ALWAYS_AUDIBLE_STEMS.includes(Number(si))) continue;
    for (const t of onsetsByStem[si]) {
      allOnsets.push({ time: t + bgmDelay, stem: Number(si) });
    }
  }
  allOnsets.sort((a, b) => a.time - b.time);

  // BPM к·ёлҰ¬л“ңм—җ нҖҖнғҖмқҙмҰҲ (16л¶„мқҢн‘ң)
  for (const o of allOnsets) {
    const rel = o.time - bgmDelay;
    o.time = Math.round(rel / sixteenth) * sixteenth + bgmDelay;
  }

  // м—җл„Ҳм§Җ л¶Җм—¬
  if (energyMap && energyMap.length > 0) {
    for (const o of allOnsets) {
      const eIdx = Math.min(Math.floor((o.time - bgmDelay) / 0.5), energyMap.length - 1);
      o.energy = eIdx >= 0 ? energyMap[eIdx] : 1;
    }
  } else {
    for (const o of allOnsets) o.energy = 1;
  }

  // л„Ҳл¬ҙ к°Җк№Ңмҡҙ onset лі‘н•© (лҸҷмӢңл…ёнҠё нӣ„ліҙ)
  const merged = [];
  for (const o of allOnsets) {
    if (merged.length > 0 && Math.abs(o.time - merged[merged.length - 1].time) < 0.03) {
      if (!merged[merged.length - 1].extra) merged[merged.length - 1].extra = [];
      merged[merged.length - 1].extra.push(o);
      continue;
    }
    merged.push(o);
  }

  // л¬ҙмқҢ м ңкұ°
  const nonSilent = merged.filter(o => o.energy >= 0.005);

  // лӮңмқҙлҸ„ н•„н„°л§Ғ (к· л“ұ л¶„л°° + мөңмҶҢ к°„кІ©)
  const density = diff.noteDensity;
  const isHell = diff.sub === 'HELL';
  let filtered = [];
  if (isHell) {
    // м§ҖмҳҘ: н•„н„° м—Ҷмқҙ лӘЁл“  nonSilent onsetмқ„ л…ёнҠёлЎң мӮ¬мҡ© (лӘЁл“  л№„нҠё м „л¶Җ)
    filtered = nonSilent;
  } else {
    const minGap = density <= 0.5 ? sixteenth * 4    // мү¬мӣҖ: 4л¶„мқҢн‘ң
                 : density <= 0.8 ? sixteenth * 2    // ліҙнҶө: 8л¶„мқҢн‘ң
                 : sixteenth * 1.5;                  // м–ҙл ӨмӣҖ: м җ8л¶„мқҢн‘ң
    if (nonSilent.length > 0) {
      // кіЎ м „мІҙлҘј minGap к°„кІ© кө¬к°„мңјлЎң лӮҳлҲ„кі , к°Ғ кө¬к°„м—җм„ң м—җл„Ҳм§Җ мөңлҢҖ onset 1к°ң м„ нғқ
      const songStart = nonSilent[0].time;
      const songEnd = nonSilent[nonSilent.length - 1].time;
      let slotStart = songStart;
      let nsIdx = 0; // nonSilent нғҗмғү мқёлҚұмҠӨ
      while (slotStart < songEnd + minGap) {
        const slotEnd = slotStart + minGap;
        let best = null, bestEnergy = -1;
        while (nsIdx < nonSilent.length && nonSilent[nsIdx].time < slotEnd) {
          if (nonSilent[nsIdx].time >= slotStart && nonSilent[nsIdx].energy > bestEnergy) {
            best = nonSilent[nsIdx]; bestEnergy = nonSilent[nsIdx].energy;
          }
          nsIdx++;
        }
        if (best) filtered.push(best);
        slotStart = slotEnd;
      }
    }
  }

  // ===== stem кё°л°ҳ л Ҳмқё л°°л¶„ (мқҢм•… кө¬мЎ° л°ҳмҳҒ) =====
  const lc = laneCount;
  const holdEvery = diff.holdEvery || 999;
  const eighthDur = sixteenth * 2;

  // stem вҶ’ л Ҳмқё л§Өн•‘ (м „ л Ҳмқём—җ кі лҘҙкІҢ л¶„мӮ°)
  const stemList = [...new Set(filtered.map(x => x.stem))].sort((a, b) => a - b);
  const stemBase = {};
  const songOff = songIdx % lc; // кіЎл§ҲлӢӨ мӢңмһ‘ л Ҳмқё лӢӨлҘҙкІҢ
  stemList.forEach((s, i) => { stemBase[s] = (Math.floor(i * lc / Math.max(stemList.length, 1)) + songOff) % lc; });

  // stemлі„ лӮҙл¶Җ м№ҙмҡҙн„° (к°ҷмқҖ stem лӮҙм—җм„ң л Ҳмқё мҲңнҷҳ)
  const stemCnt = {};
  let noteIdx = 0;
  let prevLane = -1;

  for (const o of filtered) {
    if (!stemCnt[o.stem]) stemCnt[o.stem] = 0;
    const ci = stemCnt[o.stem]++;
    const base = stemBase[o.stem] || 0;

    // stem мӢңмһ‘ л Ҳмқё + лӮҙл¶Җ мҲңнҷҳ (м „мІҙ л Ҳмқё нҷңмҡ©)
    let lane = (base + ci) % lc;

    // мқҙм „ л…ёнҠёмҷҖ к°ҷмқҖ л Ҳмқёмқҙл©ҙ н•ң м№ё мқҙлҸҷ (лӢЁ, 50лІҲм§ёл§ҲлӢӨ м—°нғҖ н—Ҳмҡ©)
    if (lane === prevLane && lc > 1 && ci % 50 !== 49) {
      lane = (lane + 1) % lc;
    }

    prevLane = lane;
    const nd = {
      time: o.time, lane, freq: 440, type: 'note', stem: o.stem,
      hit: false, missed: false, holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    if (holdEvery > 0 && noteIdx > 0 && noteIdx % holdEvery === 0) {
      nd.type = 'hold';
      nd.endTime = nd.time + (2 + Math.floor(rng() * 2)) * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;
  }

  // нҠёлһ© м¶”к°Җ
  const trapInt = diff.trapInterval || 0;
  if (trapInt > 0 && nodes.length > 0) {
    const songEnd = nodes[nodes.length - 1].time;
    for (let t = bgmDelay + 5; t < songEnd - 2; t += (trapInt * 2 + rng() * trapInt * 2) * sixteenth) {
      const tLane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) { if (Math.abs(n.time - t) < sixteenth * 2) { conflict = true; break; } }
      if (!conflict) nodes.push({ time: t, lane: tLane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // нҷҖл“ң л…ёнҠё кө¬к°„ лӮҙ к°ҷмқҖ л Ҳмқё мқјл°ҳ л…ёнҠё м ңкұ°
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;
  // songDuration from actual audio, not notes
  let maxDur = 0;
  for (const si in stemAudioBuffers) { if (stemAudioBuffers[si]) maxDur = Math.max(maxDur, stemAudioBuffers[si].duration); }

}

  function onAllLoaded() {
    if (_stemsReady) return;

    if (usingStemMode) {

  if (curSong.stemDir && stemCount > 0 && isIOS && actx) {

      fetch(path).then(r => r.arrayBuffer()).then(buf => {
        actx.decodeAudioData(buf, buffer => {
          // BufferPlayerм—җ лІ„нҚј н• лӢ№
          allStemAudios[_si].buffer = buffer;
          stemAudioBuffers[_si] = buffer; // л№Ҳл…ёнҠё/кіЎлҒқмҡ© мһ¬мӮ¬мҡ©
          // мІ« мҶҢлҰ¬ мң„м№ҳ + м—җл„Ҳм§Җл§ө л¶„м„қ (кё°мЎҙ лЎңм§Ғ лҸҷмқј)
          const data = buffer.getChannelData(0);
          const sr = buffer.sampleRate;
          const bigChunk = Math.floor(sr * 0.1);
          for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {
            let peak = 0;
            const end = Math.min(j + bigChunk, data.length);
            for (let k = j; k < end; k += 4) { const v = Math.abs(data[k]); if (v > peak) peak = v; }
            if (peak > 0.01) { stemFirstSoundTime[_si] = j / sr; break; }

          if (!ALWAYS_AUDIBLE_STEMS.includes(_si)) {
            const winSize = Math.floor(sr * 0.5);
            const mapLen = Math.ceil(data.length / winSize);

            }
            for (let w = 0; w < mapLen; w++) {

              let maxVal = 0;
              for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }

    setTimeout(() => { if (songLoading) { songLoadProgress = songLoadTotal; _energyReady = true; onAllLoaded(); } }, 15000);
  } else if (curSong.stemDir && stemCount > 0) {

      if (actx) {

              const data = buffer.getChannelData(0);
              const sr = buffer.sampleRate;

                if (peak > 0.01) { stemFirstSoundTime[_si] = j / sr; break; }
              }

              for (let w = 0; w < mapLen; w++) {
                let sum = 0;

                for (let k = s0; k < s1; k += 8) sum += data[k] * data[k];
                songEnergyMap[w] += Math.sqrt(sum / ((s1 - s0) / 8));
              }
              _energyStemsDone++;
              if (_energyStemsDone >= _energyStemsTotal) {
                let maxVal = 0;
                for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }
                if (maxVal > 0) for (let j = 0; j < songEnergyMap.length; j++) songEnergyMap[j] /= maxVal;
                _energyReady = true;

      }

    setTimeout(() => { if (songLoading) { songLoadProgress = songLoadTotal; _energyReady = true; onAllLoaded(); } }, 10000);

    _energyReady = true; // л№„мҠӨн…ңкіЎ: м—җл„Ҳм§Җ л¶„м„қ м—ҶмқҢ
    songAudio = new Audio(assetUrl(curSong.file));
    songAudio.volume = 0;
    songAudio.preload = 'auto';
