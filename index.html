      const col = LANE_COLORS[n.lane];
      const hw = (getLaneW() - 8) / 2;
      // Big upward flame columns
      for (let i = 0; i < laneCount; i++) {
        const ox = (Math.random() - 0.5) * hw * 2;
        const spd = -150 - Math.random() * 300;
        particles.push({ x: hx + ox, y: hy, vx: (Math.random()-0.5)*60, vy: spd,
          life: 0.4 + Math.random()*0.4, maxLife: 0.8, color: col, size: 6 + Math.random()*10 });
      }
      // Hot white/yellow core sparks
      for (let i = 0; i < 2; i++) {
        const coreCol = Math.random() > 0.5 ? '#fff' : '#ffd700';
        particles.push({ x: hx + (Math.random()-0.5)*hw*0.8, y: hy, vx: (Math.random()-0.5)*30, vy: -100 - Math.random()*250,
          life: 0.25 + Math.random()*0.25, maxLife: 0.5, color: coreCol, size: 4 + Math.random()*7 });
      }
      // Side fountain sparks
      for (let i = 0; i < 2; i++) {
        const dir = Math.random() > 0.5 ? 1 : -1;
        particles.push({ x: hx + dir*hw, y: hy, vx: dir*(80+Math.random()*160), vy: -60 - Math.random()*120,
          life: 0.25 + Math.random()*0.3, maxLife: 0.55, color: '#ffd700', size: 3 + Math.random()*5 });
      }
      // Rising embers (slow, long-lived)
      if (Math.random() < 0.4) {
        particles.push({ x: hx + (Math.random()-0.5)*hw*2, y: hy - Math.random()*30,
          vx: (Math.random()-0.5)*15, vy: -30 - Math.random()*60,
          life: 0.6 + Math.random()*0.5, maxLife: 1.1, color: '#ff8800', size: 2 + Math.random()*3 });
      }
    }
    // Glow burst at hit line
    if (!n._glowTimer) n._glowTimer = 0;
    n._glowTimer += dt;
    if (n._glowTimer >= 0.08) {
      n._glowTimer = 0;
      holdGlows.push({ x: getLaneX(n.lane), y: getHitY(), time: 0, maxTime: 0.35,
        color: LANE_COLORS[n.lane], w: getLaneW() - 8 });
    }
    // 홀드 중 키음 스템 볼륨 유지 (DJMAX식: 홀드하는 동안 소리 지속)
    if (usingStemMode) stemBoost(n.lane, 'perfect');
    if (gameMode === 'nano') nanoHit();
    // Combo ticks while holding
    if (!n._comboTimer) n._comboTimer = 0;
    n._comboTimer += dt;
    if (n._comboTimer >= 0.25) {
      n._comboTimer = 0;
      combo++; if (combo > maxCombo) maxCombo = combo;
      checkFeverActivate();
      const fm = fever ? 2 : 1;
      score += Math.floor(10 * fm * getKeyBonus());
      gauge = Math.min(1, gauge + curDiff.hpGain * 0.3 * fm);
    }
    // Key released — judge based on timing to endTime
    if (!keyHeld[n.lane]) {
      n.holding = false;
      n.holdComplete = true;
      stopHoldSound(n);
      const endDist = Math.abs(gameTime - n.endTime) * noteSpeed;
      const fm = fever ? 2 : 1;
      const hs = getHeightScale();
      if (endDist < 28 * hs) {
        score += Math.floor(200 * fm * getKeyBonus()); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + curDiff.hpGain * 1.3 * fm);
        judgmentText = 'PERFECT HOLD!'; judgmentTimer = 0.6; judgmentColor = '#ffd700'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'perfect');
        spawnParticles(getLaneX(n.lane), getHitY(), LANE_COLORS[n.lane], fever ? 10 : 6);
        playerAnim = 0.3;
      } else if (endDist < 52 * hs) {
        score += Math.floor(150 * fm * getKeyBonus()); combo++; if (combo > maxCombo) maxCombo = combo;
        checkFeverActivate(); gauge = Math.min(1, gauge + curDiff.hpGain * fm);
        judgmentText = 'GREAT HOLD!'; judgmentTimer = 0.5; judgmentColor = '#00d4ff'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'great');
        playerAnim = 0.2;
      } else if (endDist < getHitWindow()) {
        score += Math.floor(80 * fm * getKeyBonus());
        judgmentText = 'OK'; judgmentTimer = 0.3; judgmentColor = '#44dd66'; judgmentPriority = 0;
        spawnBurst(getLaneX(n.lane), getHitY(), 'good');
      } else {
        nanoMiss();
        collected--; missed++; combo = 0; fever = false; feverTimer = 0;
        judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
      }
    }
    // Still holding when note ended — miss (홀드 유지 실패)
    if (n.holding && gameTime >= n.endTime + getHitWindow() / noteSpeed) {
      n.holding = false;
      n.holdComplete = true;
      n.missed = true;
      stopHoldSound(n);
      nanoMiss();
      collected--; missed++; combo = 0; fever = false; feverTimer = 0;
      judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1;
    }
  }

  // Miss detection — 활성 윈도우만 스캔 (nodeScanStart ~ 미래 컷오프)
  // nodes는 시간순 정렬. 시작점은 hit/missed가 전부인 앞쪽 prefix를 건너뜀.
  // 끝은 gameTime보다 많이 미래인 노트에서 break.
  const hitY = getHitY();
  const missCut = (getHitWindow() + 40 * getHeightScale()) / noteSpeed; // 초 단위 miss 컷오프
  const missTimeThresh = gameTime - missCut; // n.time < missTimeThresh 이면 MISS
  const futureCut = gameTime + 0.5; // 0.5초 이후 미래 노트는 스캔 불필요
  // 앞쪽 dead prefix 자동 advance
  while (nodeScanStart < nodes.length && (nodes[nodeScanStart].hit || nodes[nodeScanStart].missed)) {
    nodeScanStart++;
  }
  for (let i = nodeScanStart; i < nodes.length; i++) {
    const n = nodes[i];
    if (n.time > futureCut) break; // 미래 노트 — 이후 전부 미래
    if (n.hit || n.missed) continue;
    if (n.time < missTimeThresh) {
      n.missed = true;
      if (n.type === 'note' || n.type === 'hold') {
        nanoMiss();
        combo = 0; missed++; fever = false; feverTimer = 0;
        if (!devInvincible && playMode === 'normal') gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain : 0.04));
        shakeX = (Math.random()-0.5)*8; shakeY = (Math.random()-0.5)*6;
        if (judgmentPriority < 2) { judgmentText = 'MISS'; judgmentTimer = 0.4; judgmentColor = '#ff6666'; judgmentPriority = 1; }
      }
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 250*dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Bursts
  for (let i = bursts.length-1; i >= 0; i--) {
    bursts[i].time += dt;
    if (bursts[i].time >= bursts[i].maxTime) bursts.splice(i, 1);
  }
  // Hold glows
  for (let i = holdGlows.length-1; i >= 0; i--) {
    holdGlows[i].time += dt;
    if (holdGlows[i].time >= holdGlows[i].maxTime) holdGlows.splice(i, 1);
  }

  // 프리스타일: HP 게임오버 없음. 곡 종료로만 result 전환
  const gameoverByHP = playMode === 'normal' && gauge <= 0;
  if ((gameoverByHP || gameTime >= songDuration) && state === 'playing' && fadeDir === 0) {
    state = 'ending';
    fadeOutSongAudio(1.0);
    // 점수 정규화: 만점 100만점 기준
    const _rawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
    const _normalizedScore = Math.round(score / _rawMax * 1000000);
    if (playMode === 'normal') {
      saveScore(curSongIdx, selectedDiff, _normalizedScore);
      checkAndAwardAchievements();
    }
    transitionTo('result');
  }
}

// ===== RENDER =====
function render() {
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, safeTop * dpr);
  ctx.save();
  ctx.translate(shakeX, shakeY);
  const song = curSong || songs[0];

  // BG — 안전 영역까지 확장 (Kplay iframe 위/아래 빈 공간 제거)
  const totalH = H + safeTop + safeBottom;
  const grad = ctx.createLinearGradient(0, -safeTop, 0, H + safeBottom);
  grad.addColorStop(0, song.bg1); grad.addColorStop(1, song.bg2);
  ctx.fillStyle = grad; ctx.fillRect(-20, -safeTop - 20, W+40, totalH + 40);

  if (state==='login') { renderLogin(); ctx.restore(); return; }
  if (state==='title') { ctx.fillStyle='#020208'; ctx.fillRect(0, -safeTop, W, totalH); renderTitle(); if (settingsOpen) renderSettingsOverlay(); if (guestWarningOpen && !currentUser) renderGuestWarningPopup(); if (nicknameOverlay) renderNicknameOverlay(); ctx.restore(); return; }
  if (state==='select') { renderSelect(); if (unlockPopupOpen) renderUnlockPopup(); if (settingsOpen) renderSettingsOverlay(); ctx.restore(); return; }
  if (state==='shop') { renderShop(); ctx.restore(); return; }
  if (state==='ranking') { renderRanking(); if (settingsOpen) renderSettingsOverlay(); ctx.restore(); return; }
  if (state==='achievement') { renderAchievement(); if (settingsOpen) renderSettingsOverlay(); ctx.restore(); return; }
  if (state==='result') { renderResult(); ctx.restore(); return; }

  // 로딩 화면
  if (songLoading) {
    const _s = curSong || songs[0];
    const _sc = _s.color || '#fff';
    // 배경: 곡 그라데이션
    const _bg = ctx.createLinearGradient(0, 0, 0, H);
    _bg.addColorStop(0, _s.bg1 || '#000'); _bg.addColorStop(1, _s.bg2 || '#111');
    ctx.fillStyle = _bg; ctx.fillRect(0, 0, W, H);
    // 어두운 오버레이
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
    // 커버 이미지 (반투명 배경)
    const _ci = coverImages[curSongIdx];
    if (_ci && _ci.complete && _ci.naturalWidth > 0) {
      const _cr = Math.min(sz(90), W * 0.2);
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.arc(W/2, H*0.36, _cr, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(_ci, W/2-_cr, H*0.36-_cr, _cr*2, _cr*2);
      ctx.restore();
      // 커버 테두리
      ctx.beginPath(); ctx.arc(W/2, H*0.36, _cr, 0, Math.PI*2);
      ctx.strokeStyle = _sc + '66'; ctx.lineWidth = 2; ctx.stroke();
    }
    // 곡 제목
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${sz(20)}px sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText(_s.name, W/2, H*0.56);
    // 난이도 + 속도
    const _diff = DIFFICULTIES[selectedDiff];
    ctx.font = `${sz(12)}px sans-serif`;
    ctx.fillStyle = _diff.color;
    ctx.fillText(_diff.name + ' | ' + selectedSpeed.toFixed(1) + 'x', W/2, H*0.56 + sz(22));
    // 프로그레스 바
    const _bw = sz(180), _bh = sz(4);
    const _bx = (W - _bw) / 2, _by = H * 0.68;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rrFill(_bx, _by, _bw, _bh, _bh/2);
    const _prog = Math.min(1, songLoadProgress / songLoadTotal);
    if (_prog > 0) {
      ctx.fillStyle = _sc;
      rrFill(_bx, _by, _bw * _prog, _bh, _bh/2);
    }
    // 퍼센트
    ctx.font = `${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(Math.round(_prog * 100) + '%', W/2, _by + sz(18));
    ctx.restore(); return;
  }

  // === 프레임 캐시 (매 프레임 1회만 계산) ===
  const _fNow = Date.now();
  const _fLaneW = getLaneW();
  const _fLaneStartX = getLaneStartX();
  const _fTotalLW = _fLaneW * laneCount;
  const _fHitY = getHitY();
  const _fHS = getHeightScale();

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.b * (0.3 + Math.sin(_fNow*0.002+s.x)*0.2);
    ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.s, s.s);
  }
  ctx.globalAlpha = 1;

  // In-game ambient particles
  const lsx = _fLaneStartX, totalLW = _fTotalLW;
  const songCol = curSong ? curSong.color : '#fff';
  // Spawn various types
  if (gameParticles.length < 25) {
    const type = Math.random();
    if (type < 0.5) {
      // Side streaks - shoot up from edges
      const side = Math.random() > 0.5;
      gameParticles.push({
        x: side ? lsx - 15 - Math.random()*30 : lsx + totalLW + 15 + Math.random()*30,
        y: H * (0.5 + Math.random()*0.5),
        vx: (side ? 0.3 : -0.3) * Math.random(), vy: -(1.5 + Math.random()*2.5),
        size: 1.5+Math.random()*2.5, life: 1, decay: 0.008+Math.random()*0.006,
        color: songCol, kind: 'streak'
      });
    } else if (type < 0.8) {
      // Floating orbs - slow drift
      gameParticles.push({
        x: Math.random()*W, y: H+10,
        vx: (Math.random()-0.5)*0.3, vy: -(0.15+Math.random()*0.35),
        size: 3+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
        color: songCol, kind: 'orb'
      });
    } else {
      // Sparkle - tiny fast twinklers
      gameParticles.push({
        x: lsx + Math.random()*totalLW, y: Math.random()*H,
        vx: 0, vy: 0,
        size: 1+Math.random()*1.5, life: 1, decay: 0.02+Math.random()*0.02,
        color: '#fff', kind: 'sparkle'
      });
    }
  }
  for (let i = gameParticles.length-1; i >= 0; i--) {
    const gp = gameParticles[i];
    gp.x += gp.vx; gp.y += gp.vy; gp.life -= gp.decay;
    if (gp.kind === 'orb') gp.vx += (Math.random()-0.5)*0.02;
    if (gp.kind === 'streak') gp.vy *= 0.995;
    if (gp.life <= 0 || gp.y < -20) { gameParticles.splice(i,1); continue; }
    if (gp.kind === 'sparkle') {
      const flicker = Math.sin(_fNow*0.02+i*7)*0.5+0.5;
      ctx.globalAlpha = gp.life * flicker * 0.7;
      ctx.fillStyle = gp.color;
      ctx.fillRect(gp.x-0.5, gp.y-0.5, gp.size, gp.size);
    } else {
      ctx.globalAlpha = gp.life * (gp.kind === 'streak' ? 0.5 : 0.3);
      ctx.shadowColor = gp.color; ctx.shadowBlur = gp.kind === 'streak' ? 12 : 6;
      ctx.fillStyle = gp.color;
      ctx.beginPath(); ctx.arc(gp.x, gp.y, gp.size*gp.life, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;

  renderLanes();
  renderNotes();
  renderHitLine();
  renderButtons();
  renderCharacter();
  renderParticles();
  renderBursts();
  renderHoldGlows();
  renderJudgment();
  renderUI();

  // Fever overlay
  if (fever) {
    const t = _fNow;
    const lw = _fLaneW, lsx = _fLaneStartX, tw = _fTotalLW;

    // Smooth golden aura along lane edges
    ctx.globalAlpha = 0.15;
    const leftGrd = ctx.createLinearGradient(lsx - 40, 0, lsx + 20, 0);
    leftGrd.addColorStop(0, 'transparent');
    leftGrd.addColorStop(0.5, `hsl(${(t*0.1)%360},100%,60%)`);
    leftGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = leftGrd; ctx.fillRect(lsx - 40, 0, 60, H);
    const rightGrd = ctx.createLinearGradient(lsx + tw - 20, 0, lsx + tw + 40, 0);
    rightGrd.addColorStop(0, 'transparent');
    rightGrd.addColorStop(0.5, `hsl(${(t*0.1+180)%360},100%,60%)`);
    rightGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = rightGrd; ctx.fillRect(lsx + tw - 20, 0, 60, H);
    ctx.globalAlpha = 1;

    // Smooth color-shifting lane tint
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = `hsl(${(t*0.08)%360},100%,55%)`;
    ctx.fillRect(lsx, 0, tw, H);
    ctx.globalAlpha = 1;

    // Rising light streaks inside lanes
    for (let i = 0; i < laneCount; i++) {
      const phase = (t * 0.001 + i * 1.3) % 1;
      const sy = H * (1 - phase);
      const sx = lsx + i * lw + lw / 2;
      const streakAlpha = Math.sin(phase * Math.PI) * 0.12;
      ctx.globalAlpha = streakAlpha;
      const sg = ctx.createLinearGradient(0, sy - 40, 0, sy + 40);
      sg.addColorStop(0, 'transparent');
      sg.addColorStop(0.5, LANE_COLORS[i]);
      sg.addColorStop(1, 'transparent');
      ctx.fillStyle = sg;
      ctx.fillRect(sx - lw * 0.3, sy - 40, lw * 0.6, 80);
    }
    ctx.globalAlpha = 1;

    // Fever side fire particles
    for (const p of feverParticles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife) * 0.7;
      ctx.fillStyle = p.color;
      const s = p.size * (p.life / p.maxLife);
      ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
    }
    ctx.globalAlpha = 1;

    // FEVER text - smooth gradient, no flash
    ctx.save();
    const fs = sz(44);
    const bop = Math.sin(t*0.004) * 3;
    const feverCY = _fHitY * 0.5;
    ctx.translate(lsx + tw/2, feverCY + bop);
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 4;
    ctx.strokeText('FEVER!', 0, 0);
    // Smooth shifting gradient fill
    const txtGrd = ctx.createLinearGradient(-60, 0, 60, 0);
    const hue = (t * 0.06) % 360;
    txtGrd.addColorStop(0, `hsl(${hue},100%,65%)`);
    txtGrd.addColorStop(0.5, `hsl(${(hue+60)%360},100%,70%)`);
    txtGrd.addColorStop(1, `hsl(${(hue+120)%360},100%,65%)`);
    ctx.fillStyle = txtGrd;
    ctx.shadowColor = `hsl(${hue},80%,40%)`; ctx.shadowBlur = 6;
    ctx.fillText('FEVER!', 0, 0);
    ctx.shadowBlur = 0;
    // x2 badge
    ctx.font = `bold ${Math.floor(fs*0.4)}px sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.globalAlpha = 0.9;
    ctx.fillText('x2 SCORE', 0, fs + 2);
    ctx.restore();

    ctx.restore();
  }

  // Low gauge danger vignette
  if (gauge < 0.35 && playMode === 'normal') {
    const intensity = (0.35 - gauge) / 0.35;
    const pulse = 0.5 + Math.sin(_fNow * 0.006) * 0.5;
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.8);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, `rgba(255,0,0,${intensity * 0.25 * pulse})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // Countdown (onset 모드에서는 숨김 — 레일 선으로 대체)
  if (countdownTime > 0 && !(curSong && curSong._onsetMode)) {
    const num = Math.ceil(countdownTime);
    if (num <= 3) {
      const frac = countdownTime % 1, scale = 1+frac*0.4;
      ctx.save(); ctx.translate(W/2, H*0.4); ctx.scale(scale,scale);
      ctx.globalAlpha = Math.min(1,frac*2);
      ctx.font = `bold ${sz(90)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; ctx.shadowColor=song.color; ctx.shadowBlur=10;
      ctx.fillText(''+num, 0, 0);
      ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }
  }
  ctx.restore();
}

function renderLanes() {
  const lw = getLaneW(), lsx = getLaneStartX(), hitY = getHitY();

  // Lane backgrounds
  for (let i = 0; i < laneCount; i++) {
    const x = lsx + i * lw;
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.025)' : 'rgba(0,0,0,0.08)';
    ctx.fillRect(x, 0, lw, hitY + 10);

    // Vertical lane dividers
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, hitY+10); ctx.stroke();

    // Flash on press
    if (keyFlash[i] > 0) {
      ctx.fillStyle = LANE_COLORS[i] + '15';
      ctx.fillRect(x, 0, lw, hitY+10);
    }
  }
  // Right border
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(lsx + lw*laneCount, 0); ctx.lineTo(lsx + lw*laneCount, hitY+10); ctx.stroke();

  // 레일 가로선 (노트 속도에 맞춰 흘러내림 — 일시정지 시 gameTime과 함께 멈춤)
  if (state === 'playing' && noteSpeed > 0) {
    const railGap = noteSpeed * (60 / (curSong ? curSong.bpm : 120)); // 1박 간격
    const tw = lw * laneCount;
    const offset = (gameTime * noteSpeed) % railGap; // gameTime 기반 (일시정지 시 정지)
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    for (let y = -railGap + offset; y < hitY + railGap; y += railGap) {
      ctx.beginPath();
      ctx.moveTo(lsx, y);
      ctx.lineTo(lsx + tw, y);
      ctx.stroke();
    }
  }
}

function renderHitLine() {
  const lw = getLaneW(), lsx = getLaneStartX(), tw = lw * laneCount, hitY = getHitY();

  // Glow line
  ctx.shadowColor = curSong.color; ctx.shadowBlur = 6;
  ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lsx-5, hitY); ctx.lineTo(lsx+tw+5, hitY); ctx.stroke();
  ctx.shadowBlur = 0;
  // Secondary color glow underneath
  ctx.strokeStyle = curSong.color + '44'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(lsx-5, hitY); ctx.lineTo(lsx+tw+5, hitY); ctx.stroke();

  // Subtle gradient above hit line
  const grad = ctx.createLinearGradient(0, hitY-60, 0, hitY);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(255,255,255,0.06)');
  ctx.fillStyle = grad;
  ctx.fillRect(lsx, hitY-60, tw, 60);

  // Receptors
  for (let i = 0; i < laneCount; i++) {
    const cx = lsx + i * lw + lw / 2;
    const held = keyHeld[i], flash = keyFlash[i] > 0;

    const rw = lw - 8, rh = 20;
    if (held || flash) {
      ctx.fillStyle = LANE_COLORS[i] + '66';
      ctx.shadowColor = LANE_COLORS[i]; ctx.shadowBlur = 6;
      ctx.fillRect(cx-rw/2, hitY-rh/2, rw, rh); ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = 'rgba(20,20,40,0.7)'; ctx.fillRect(cx-rw/2, hitY-rh/2, rw, rh);
    }
    ctx.strokeStyle = LANE_COLORS[i] + (held ? 'ee' : '55'); ctx.lineWidth = 2.5; ctx.strokeRect(cx-rw/2, hitY-rh/2, rw, rh);
  }
}

function renderNotes() {
  const hitY = getHitY();
  const _now = Date.now();
  const pulse = Math.sin(_now*0.006)*0.2+0.8;
  // 피버 flicker는 프레임 단위 한 번만 계산 (노트마다 반복 X)
  const _feverFlickerBase = fever ? (Math.sin(_now * 0.015) * 0.3 + 0.7) : 0.7;
  // 프레임 단위 캐시 (sz, lane 관련 반복 호출 제거)
  const _laneW = getLaneW();
  const _sz2 = sz(2), _sz6 = sz(6), _sz8 = sz(8), _sz9 = sz(9), _sz11 = sz(11);
  // 화면 상단 위쪽(미래 노트)은 iteration 조기 종료를 위해 기준값 계산
  // 정렬된 노트에서 sy < -30이면 그 이후는 모두 미래, break 가능 (홀드 제외)
  const _topCutoff = (hitY + 30) / noteSpeed + gameTime; // n.time > _topCutoff 이면 sy < -30

  // 카운트다운 중에는 노드 안 그림
  if (countdownTime > 0 && !(curSong && curSong._onsetMode)) { /* skip node rendering */ }
  else for (const n of nodes) {
    // 너무 먼 미래 노트: 정렬돼 있으니 break
    // 단, 홀드 노트는 tail이 이미 화면 안에 있을 수 있으니 skip만
    if (n.time > _topCutoff) {
      if (n.type === 'hold') continue;
      break;
    }
    const sx = getLaneX(n.lane);

    // Draw hold bar (even while holding/complete)
    if (n.type === 'hold' && !n.missed) {
      const headY = hitY - (n.time - gameTime) * noteSpeed;
      const tailY = hitY - (n.endTime - gameTime) * noteSpeed;
      const col = LANE_COLORS[n.lane];
      const barTop = Math.max(-40, tailY);
      const barBot = Math.min(hitY + 80, headY);

      if (barTop < barBot + 10) {
        // Bar body
        const bw = _laneW - 8;
        if (n.holding) {
          // Active hold - bright bar with glow (shadowBlur 제거 → 경량 글로우)
          ctx.fillStyle = col + '40';
          rrFill(sx - bw/2 - 4, barTop - 2, bw + 8, Math.max(0, barBot - barTop) + 4, 9);
          ctx.fillStyle = col + 'bb';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
          // Pulsing particles along bar (빈도 감소: 30% → 10%)
          if (Math.random() < 0.1 && particles.length < 80) {
            const py = barTop + Math.random() * (hitY - barTop);
            spawnParticles(sx + (Math.random()-0.5)*10, py, col, 1);
          }
        } else if (n.holdComplete) {
          // Completed - fading
          ctx.fillStyle = col + '33';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
        } else if (!n.hit) {
          // Not yet hit - normal bar
          ctx.fillStyle = col + '55';
          rrFill(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
          // Border
          ctx.strokeStyle = col + '88'; ctx.lineWidth = 1.5;
          rrStroke(sx - bw/2, barTop, bw, Math.max(0, barBot - barTop), 7);
        }

        // Tail end cap
        if (tailY > -30 && tailY < hitY + 60 && !n.holdComplete) {
          const tw = _laneW - 6;
          ctx.fillStyle = n.holding ? col : col + 'cc';
          rrFill(sx-tw/2, tailY-7, tw, 14, 4);
          ctx.strokeStyle = col; ctx.lineWidth = 2;
          rrStroke(sx-tw/2, tailY-7, tw, 14, 4);
          if (n.holding) {
            ctx.strokeStyle = col + '66'; ctx.lineWidth = 4;
            rrStroke(sx-tw/2-2, tailY-9, tw+4, 18, 6);
          }
        }
      }

      // Head circle (skip if already hit or missed)
      if (!n.hit && !n.missed) {
        const sy = headY;
        if (sy > -30 && sy < hitY + 60) {
          const hw = (_laneW - 8) / 2, hh = 10;
          ctx.fillStyle = col + '30';
          ctx.fillRect(sx-hw-3, sy-hh-3, (hw+3)*2, (hh+3)*2);
          ctx.fillStyle = col;
          ctx.fillRect(sx-hw, sy-hh, hw*2, hh*2);
          ctx.fillStyle='#fff'; ctx.globalAlpha=0.5;
          ctx.fillRect(sx-hw+_sz2, sy-hh+_sz2, _sz8, _sz6);
          ctx.globalAlpha=1;
          ctx.fillStyle='#fff'; ctx.font=`bold ${_sz9}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('HOLD', sx, sy+1);
        }
      }
      continue;
    }

    if (n.hit || n.missed) continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < -30 || sy > hitY + 60) continue;

    if (n.type === 'trap') {
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(Math.PI/4);
      ctx.fillStyle = 'rgba(255,30,60,0.7)';
      const _ts=sz(11); ctx.fillRect(-_ts,-_ts,_ts*2,_ts*2); ctx.restore();
      // 가벼운 글로우 (shadowBlur 대신 확대 반투명 사각)
      ctx.fillStyle = 'rgba(255,0,0,0.15)'; ctx.fillRect(sx-_ts-4,sy-_ts-4,(_ts+4)*2,(_ts+4)*2);
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
      const _tc=sz(5); ctx.beginPath(); ctx.moveTo(sx-_tc,sy-_tc); ctx.lineTo(sx+_tc,sy+_tc); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+_tc,sy-_tc); ctx.lineTo(sx-_tc,sy+_tc); ctx.stroke();
    } else {
      const col = LANE_COLORS[n.lane];
      const nw = (_laneW - 8) / 2, nh = 10;
      if (fever) {
        // 피버: 불타는 이펙트 (flicker 프레임 단위 + 노트별 오프셋)
        const flicker = _feverFlickerBase + Math.sin(n.time * 50) * 0.1;
        // 외곽 화염 글로우
        ctx.fillStyle = `rgba(255,${80+Math.floor(flicker*80)},0,${0.25*flicker})`;
        ctx.fillRect(sx-nw-5, sy-nh-6, (nw+5)*2, (nh+6)*2);
        ctx.fillStyle = `rgba(255,${150+Math.floor(flicker*60)},30,${0.15*flicker})`;
        ctx.fillRect(sx-nw-8, sy-nh-9, (nw+8)*2, (nh+9)*2);
        // 메인 노트 (밝은 색)
        ctx.fillStyle = col;
        ctx.fillRect(sx-nw, sy-nh, nw*2, nh*2);
        // 상단 하이라이트
        ctx.fillStyle = `rgba(255,255,200,${0.4*flicker})`;
        ctx.fillRect(sx-nw+2, sy-nh+1, nw*2-4, nh*0.7);
      } else {
        // 일반: 기존 글로우
        ctx.fillStyle = col + '30';
        ctx.fillRect(sx-nw-3, sy-nh-3, (nw+3)*2, (nh+3)*2);
        ctx.fillStyle=col;
        ctx.fillRect(sx-nw, sy-nh, nw*2, nh*2);
      }
      ctx.fillStyle='#fff'; ctx.globalAlpha=0.5;
      ctx.fillRect(sx-nw+_sz2, sy-nh+_sz2, _sz8, _sz6);
      ctx.globalAlpha=1;
      ctx.fillStyle='#fff'; ctx.font=`bold ${_sz11}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('\u266A', sx, sy+1);
    }
  }

  // Missed flash
  for (const n of nodes) {
    if (!n.missed || n.type==='trap') continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    if (sy < hitY || sy > hitY + 80) continue;
    const sx = getLaneX(n.lane);
    const fade = 1 - (sy - hitY) / 80;
    if (fade > 0) {
      ctx.globalAlpha = fade*0.6; ctx.fillStyle='#ff4444';
      ctx.font=`bold ${sz(12)}px sans-serif`; ctx.textAlign='center';
      ctx.fillText('MISS', sx, sy-sz(15)); ctx.globalAlpha=1;
    }
  }
}

function renderButtons() {
  const lw = getLaneW(), lsx = getLaneStartX(), by = getBtnY(), bh = getBtnH();

  for (let i = 0; i < laneCount; i++) {
    const bx = lsx + i * lw;
    const held = keyHeld[i];

    // Button bg
    ctx.fillStyle = held ? LANE_COLORS[i]+'44' : 'rgba(255,255,255,0.04)';
    rrFill(bx+3, by+3, lw-6, bh-6, 8);

    // Border
    ctx.strokeStyle = LANE_COLORS[i] + (held ? 'cc' : '33'); ctx.lineWidth = held ? 2.5 : 1.5;
    rrStroke(bx+3, by+3, lw-6, bh-6, 8);
    if (held) { ctx.shadowColor=LANE_COLORS[i]; ctx.shadowBlur=8; rrStroke(bx+3,by+3,lw-6,bh-6,8); ctx.shadowBlur=0; }

    // Label
    ctx.font = `bold ${sz(18)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = LANE_COLORS[i] + (held ? 'ff' : '99');
    ctx.fillText(getLaneLabel(i), bx + lw/2, by + bh/2);
  }
}

function rrFill(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function rrStroke(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function renderCharacter() {}

function renderParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
    ctx.fillStyle = p.color;
    const s = p.size * (p.life/p.maxLife);
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

function renderBursts() {
  for (const b of bursts) {
    const t = b.time / b.maxTime;
    const alpha = 1 - t;
    ctx.save();
    ctx.translate(b.x, b.y);

    // Expanding rings with thickness
    for (let r = 0; r < b.rings; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, (b.time - delay) / (b.maxTime - delay));
      if (rt <= 0 || rt >= 1) continue;
      const radius = (25 + r * 25) * rt * b.size;
      const ringAlpha = (1 - rt) * 0.85;
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = r % 2 === 0 ? b.color1 : b.color2;
      ctx.lineWidth = (5 - r * 0.6) * (1 - rt) * b.size;
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
    }

    // Big center flash / shockwave
    if (t < 0.4) {
      const ft = t / 0.4;
      const flashR = 50 * b.size * ft;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, flashR);
      grd.addColorStop(0, '#ffffff');
      grd.addColorStop(0.3, b.color2);
      grd.addColorStop(1, b.color1 + '00');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0, 0, flashR, 0, Math.PI * 2); ctx.fill();
    }

    // Streaking rays
    const rayCount = Math.floor(b.sparks * 0.5);
    for (let i = 0; i < rayCount; i++) {
      const a = Math.PI * 2 * i / rayCount;
      const dist = (30 + 100 * t) * b.size;
      const len = (15 + 20 * (1 - t)) * b.size;
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = b.color2;
      ctx.lineWidth = 2 * (1 - t) * b.size;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * (dist - len), Math.sin(a) * (dist - len));
      ctx.lineTo(Math.cos(a) * dist, Math.sin(a) * dist);
      ctx.stroke();
    }

    // Diamond sparks radiating outward
    const sparkCount = Math.floor(b.sparks * 0.7);
    for (let i = 0; i < sparkCount; i++) {
      const a = Math.PI * 2 * i / sparkCount + t * 0.5;
      const dist = (20 + 90 * t) * b.size;
      const sx = Math.cos(a) * dist;
      const sy = Math.sin(a) * dist;
      const ss = (4 + Math.random() * 3) * (1 - t) * b.size;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = i % 2 === 0 ? b.color2 : b.color1;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a + t * 3);
      ctx.fillRect(-ss/2, -ss/2, ss, ss);
      ctx.restore();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderHoldGlows() {
  for (const g of holdGlows) {
    const t = g.time / g.maxTime;
    const alpha = (1 - t);
    const hw = g.w / 2;
    ctx.save();
    ctx.translate(g.x, g.y);

    // Large fire glow expanding upward
    const glowH = 90 * (0.4 + t * 0.6);
    ctx.globalAlpha = alpha * 0.7;
    const grd = ctx.createRadialGradient(0, -glowH*0.2, 0, 0, -glowH*0.3, hw * (1.2 + t));
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.2, g.color);
    grd.addColorStop(0.6, g.color + '88');
    grd.addColorStop(1, g.color + '00');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -glowH * 0.25, hw * (1.3 + t * 0.8), glowH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core
    ctx.globalAlpha = alpha * 0.9;
    const coreGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 0.6);
    coreGrd.addColorStop(0, '#ffffff');
    coreGrd.addColorStop(1, '#ffffff00');
    ctx.fillStyle = coreGrd;
    ctx.beginPath();
    ctx.ellipse(0, -5, hw * 0.6, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Horizontal shockwave line
    const lineW = hw * (1.5 + t * 1.5);
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(-lineW, 0);
    ctx.lineTo(lineW, 0);
    ctx.stroke();

    // Side flare streaks
    ctx.globalAlpha = alpha * 0.5;
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2 * (1 - t);
    for (let s = -1; s <= 1; s += 2) {
      ctx.beginPath();
      ctx.moveTo(s * hw * 0.5, 0);
      ctx.lineTo(s * lineW * 1.2, -20 - 30 * t);
      ctx.stroke();
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function renderJudgment() {
  if (judgmentTimer <= 0) return;
  const scale = Math.max(0.8, 1 + (0.5 - judgmentTimer)*0.3);
  ctx.save();
  ctx.translate(W/2, getHitY() - 40);
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, judgmentTimer*3);
  ctx.font = `bold ${sz(22)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle = judgmentColor;
  ctx.shadowColor=judgmentColor; ctx.shadowBlur=10;
  ctx.fillText(judgmentText, 0, 0);
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
}

function renderUI() {
  const song = curSong;
  // HP 바 / 속도 컨트롤 기준 좌표 (프리스타일에서도 속도 컨트롤 사용)
  const gx = getLaneStartX() - sz(34), gy = sz(44), gw = sz(18), gh = getHitY() - sz(120);
  // Gauge bar (left side, vertical, thick) — 프리스타일 모드에서는 숨김
  if (playMode === 'normal') {
    // BG
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    rrFill(gx-1, gy-1, gw+2, gh+2, 6);
    // Fill (bottom-up)
    const fillH = gh * gauge;
    const gCol = gauge > 0.5 ? '#00ff88' : gauge > 0.25 ? '#ffaa00' : '#ff3333';
    const gGrad = ctx.createLinearGradient(0, gy+gh-fillH, 0, gy+gh);
    gGrad.addColorStop(0, gCol); gGrad.addColorStop(1, gCol+'66');
    ctx.fillStyle = gGrad;
    rrFill(gx, gy + gh - fillH, gw, fillH, 5);
    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rrFill(gx+1, gy + gh - fillH, gw/3, fillH, 3);
    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
    rrStroke(gx-1, gy-1, gw+2, gh+2, 6);
    // Glow when low
    if (gauge < 0.3) {
      ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 10 + Math.sin(Date.now()*0.008)*5;
      rrStroke(gx-1, gy-1, gw+2, gh+2, 6);
      ctx.shadowBlur = 0;
    }
    // Label
    ctx.save();
    ctx.translate(gx + gw/2, gy - sz(10));
    ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = gCol;
    ctx.fillText('HP', 0, 0);
    ctx.restore();
    // Percentage text on gauge
    ctx.save();
    ctx.font = `bold ${sz(9)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(Math.round(gauge*100)+'%', gx+gw/2, gy+gh+sz(14));
    ctx.restore();
  }

  // Score top-left (safeTop 반영)
  ctx.textAlign='left';
  ctx.font = `bold ${sz(24)}px sans-serif`; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('SCORE', 12, sz(28));
  ctx.font = `bold ${sz(60)}px sans-serif`; ctx.fillStyle='#fff';
  if (!window._hudRawMax) window._hudRawMax = totalNodes > 0 ? totalNodes * 200 * 3.0 * getKeyBonus() : 1;
  const _hudScore = Math.round(score / window._hudRawMax * 1000000);
  if (_hudScore !== window._hudScorePrev) { window._hudScorePrev = _hudScore; window._hudScoreStr = _hudScore.toLocaleString(); }
  ctx.fillText(window._hudScoreStr || '0', 12, sz(72));

  // Combo display — 노트 영역 상단
  if (combo > 0) {
    const lsx = getLaneStartX(), tw = getLaneW()*laneCount;
    const cx = lsx + tw/2, cy = 55;
    const t = Date.now();

    ctx.save();
    ctx.translate(cx, cy);

    // 콤보 수에 따라 스케일 펄스
    const hitPulse = Math.max(0, playerAnim) * 0.4;
    ctx.scale(1 + hitPulse, 1 + hitPulse);

    // 콤보 숫자
    const numSize = 100 * UI;
    ctx.font = `bold ${numSize}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    // 콤보 색상
    let col;
    if (combo >= 100) col = `hsl(${(t * 0.15) % 360},100%,70%)`;
    else if (combo >= 50) col = '#ffd700';
    else if (combo >= 20) col = '#00d4ff';
    else if (combo >= 10) col = song.color;
    else col = 'rgba(255,255,255,0.7)';

    // 글로우
    if (combo >= 10) {
      ctx.shadowColor = col; ctx.shadowBlur = 12 + Math.sin(t * 0.005) * 6;
    }
    ctx.fillStyle = col;
    ctx.fillText(combo.toString(), 0, 0);
    ctx.shadowBlur = 0;

    // COMBO 라벨
    ctx.font = `bold ${sz(20)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('COMBO', 0, numSize * 0.55);

    ctx.restore();
  }

  // Song name + progress
  if (songDuration > 0 && gameTime > 0) {
    const prog = Math.min(1, gameTime/songDuration);
    const pw = sz(200), ppx = (W-pw)/2;
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(ppx, 8, pw, 3);
    ctx.fillStyle = song.color+'aa'; ctx.fillRect(ppx, 8, pw*prog, 3);
    ctx.font=`${sz(9)}px sans-serif`; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.fillText(song.name, W/2, sz(22));
  }


  // Speed control (below HP bar, vertical stack)
  const spCx = gx + gw/2;
  const spBtn = sz(30);
  const spGap = sz(5);
  const spTotalH = spBtn + spGap + spBtn + spGap + spBtn;
  const spBaseY = gy + gh + sz(24);
  // Container
  const spPad = sz(4);
  const spContW = spBtn + spPad*2, spContH = spTotalH + spPad*2;
  const spContX = spCx - spContW/2, spContY = spBaseY - spPad;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  rrFill(spContX, spContY, spContW, spContH, sz(7));
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  rrStroke(spContX, spContY, spContW, spContH, sz(7));
  // Minus button
  const spMinusX = spCx - spBtn/2, spMinusY = spBaseY;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rrFill(spMinusX, spMinusY, spBtn, spBtn, sz(5));
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
  rrStroke(spMinusX, spMinusY, spBtn, spBtn, sz(5));
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(14)}px sans-serif`;
  ctx.fillStyle = selectedSpeed > SPEED_MIN ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
  ctx.textBaseline = 'middle';
  ctx.fillText('−', spCx, spMinusY + spBtn/2);
  ctx.textBaseline = 'alphabetic';
  // Speed label (same size as buttons, centered)
  const spLabelY = spMinusY + spBtn + spGap;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  rrFill(spMinusX, spLabelY, spBtn, spBtn, sz(5));
  ctx.font = `bold ${sz(11)}px sans-serif`; ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 4;
  ctx.textBaseline = 'middle';
  ctx.fillText(selectedSpeed.toFixed(1)+'x', spCx, spLabelY + spBtn/2 - 1);
  ctx.textBaseline = 'alphabetic';
  ctx.shadowBlur = 0;
  // Plus button
  const spPlusY = spLabelY + spBtn + spGap;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rrFill(spMinusX, spPlusY, spBtn, spBtn, sz(5));
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
  rrStroke(spMinusX, spPlusY, spBtn, spBtn, sz(5));
  ctx.font = `bold ${sz(14)}px sans-serif`;
  ctx.fillStyle = selectedSpeed < SPEED_MAX ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
  ctx.textBaseline = 'middle';
  ctx.fillText('+', spCx, spPlusY + spBtn/2);
  ctx.textBaseline = 'alphabetic';
  // Keyboard hint
  ctx.font = `${sz(8)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('[ ]', spCx, spContY + spContH + sz(8));

  // Pause button (기존 Exit 위치 = 우하단 코너)
  const pbW = sz(36), pbH = sz(26);
  const pbX = W - pbW - sz(8), pbY = H - pbH - sz(8);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  rrFill(pbX, pbY, pbW, pbH, sz(6));
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  rrStroke(pbX, pbY, pbW, pbH, sz(6));
  ctx.font = `bold ${sz(13)}px sans-serif`; ctx.textAlign = 'center';
  ctx.textBaseline = 'middle'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('⏸', pbX + pbW/2, pbY + pbH/2);
  ctx.textBaseline = 'alphabetic';

  // [DEV] HP 무적 토글 (로컬호스트 전용) — Pause 버튼 왼쪽
  if (isLocalhost) {
    const ivW = sz(44), ivH = sz(26);
    const ivX = pbX - sz(6) - ivW, ivY = H - ivH - sz(8);
    ctx.fillStyle = devInvincible ? 'rgba(255,215,0,0.25)' : 'rgba(255,255,255,0.06)';
    rrFill(ivX, ivY, ivW, ivH, sz(6));
    ctx.strokeStyle = devInvincible ? '#ffd700' : 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
    rrStroke(ivX, ivY, ivW, ivH, sz(6));
    ctx.font = `bold ${sz(9)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = devInvincible ? '#ffd700' : 'rgba(255,255,255,0.6)';
    ctx.fillText(devInvincible ? '무적ON' : '무적OFF', ivX + ivW/2, ivY + ivH/2);
    ctx.textBaseline = 'alphabetic';
  }
}

// ===== SETTINGS OVERLAY (팝업) =====
function renderSettingsOverlay() {
  // 반투명 배경
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  // 팝업 패널 (반응형)
  const popW = Math.min(sz(340), W*0.92), popH = Math.min(H*0.94, sz(620));
  const popX = (W - popW) / 2, popY = (H - popH) / 2;
  ctx.fillStyle = 'rgba(15,12,30,0.95)'; rrFill(popX, popY, popW, popH, sz(14));
  ctx.strokeStyle = 'rgba(160,130,255,0.3)'; ctx.lineWidth = 1; rrStroke(popX, popY, popW, popH, sz(14));

  // 닫기 버튼 (우상단) — 완전 불투명
  const bbW = sz(30), bbH = sz(24), bbX = popX + popW - bbW - sz(6), bbY = popY + sz(6);
  ctx.save();
  ctx.globalAlpha = 1;
  // 어두운 배경을 먼저 깔아서 아래 레이어 완전 차단
  ctx.fillStyle='#000'; rrFill(bbX, bbY, bbW, bbH, sz(6));
  ctx.fillStyle='#3a2d5c'; rrFill(bbX, bbY, bbW, bbH, sz(6));
  ctx.strokeStyle='#a88cff'; ctx.lineWidth=1.5; rrStroke(bbX, bbY, bbW, bbH, sz(6));
  ctx.textAlign='center'; ctx.font=`bold ${sz(14)}px sans-serif`;
  ctx.fillStyle='#fff';
  ctx.textBaseline='middle';
  ctx.fillText('✕', bbX+bbW/2, bbY+bbH/2);
  ctx.restore();

  // 스크롤 컨텍스트 저장: 팝업 내부 영역 클립 + translate
  // 닫기 버튼은 이미 그려진 후이므로 클립이 전체 팝업을 덮어도 무방
  const _scrollClipY = popY + sz(4);
  const _scrollClipH = popH - sz(8);
  ctx.save();
  ctx.beginPath();
  ctx.rect(popX, _scrollClipY, popW, _scrollClipH);
  ctx.clip();
  ctx.translate(0, -settingsScrollY);

  // 타이틀 + 닉네임
  ctx.font=`bold ${sz(20)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowColor='#fff'; ctx.shadowBlur=8;
  ctx.fillText('\uC124\uC815',W/2,popY+sz(30)); ctx.shadowBlur=0;

  const _mobileSettings = isMobile;
  if (!_mobileSettings) {
    // PC 전용 안내
    ctx.font=`${sz(10)}px sans-serif`;
    ctx.fillStyle='rgba(255,180,0,0.7)';
    ctx.fillText('⌨ PC 전용 — 키보드 조작키 설정',W/2,popY+sz(48));
  }

  // 4~8키 모드 토글
  const panelW = Math.min(popW - sz(20), sz(300));
  const panelX = (W - panelW) / 2;
  const modeY = popY + sz(58);
  const modeKeys = [4, 5, 6, 7, 8];
  const modeBtnW = sz(40), modeBtnH = sz(26), modeGap = sz(6);
  const modeTotalW = modeBtnW * modeKeys.length + modeGap * (modeKeys.length - 1);
  const modeX = (W - modeTotalW) / 2;
  modeKeys.forEach((m, mi) => {
    const bx = modeX + mi * (modeBtnW + modeGap);
    const sel = laneCount === m;
    ctx.fillStyle = sel ? '#cc44ff22' : 'rgba(255,255,255,0.03)';
    rrFill(bx, modeY, modeBtnW, modeBtnH, sz(6));
    ctx.strokeStyle = sel ? '#cc44ff' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = sel ? 2 : 1;
    if (sel) { ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 8; }
    rrStroke(bx, modeY, modeBtnW, modeBtnH, sz(6)); ctx.shadowBlur = 0;
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = sel ? '#cc44ff' : 'rgba(255,255,255,0.4)';
    ctx.textBaseline = 'middle';
    ctx.fillText(m + 'K', bx + modeBtnW/2, modeY + modeBtnH/2);
  });

  // 키 바인딩 UI (반응형 행 높이)
  const rowH = sz(laneCount >= 7 ? 32 : laneCount >= 6 ? 36 : 42);
  const startY = modeY + modeBtnH + sz(12);
  const laneNames = Array.from({length: laneCount}, (_, i) => '레인 ' + (i+1));

  if (!_mobileSettings) for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const isBinding = settingsBindingLane === i;

    // 행 배경
    ctx.fillStyle = isBinding ? LANE_COLORS[i] + '18' : 'rgba(255,255,255,0.03)';
    rrFill(panelX, ry, panelW, rowH - sz(4), sz(6));
    if (isBinding) {
      ctx.strokeStyle = LANE_COLORS[i]; ctx.lineWidth = 2;
      rrStroke(panelX, ry, panelW, rowH - sz(4), sz(6));
    }

    // 레인 색상 바
    ctx.fillStyle = LANE_COLORS[i] + (isBinding ? 'cc' : '66');
    rrFill(panelX + sz(5), ry + sz(5), sz(3), rowH - sz(14), 2);

    // 레인 이름
    ctx.textAlign = 'left';
    ctx.font = `bold ${sz(13)}px sans-serif`;
    ctx.fillStyle = isBinding ? '#fff' : 'rgba(255,255,255,0.7)';
    ctx.textBaseline = 'middle';
    ctx.fillText(laneNames[i], panelX + sz(16), ry + (rowH - sz(4))/2);

    // 중복키 경고 (2초 유지)
    if (settingsDupWarnLane === i && (performance.now() - settingsDupWarnTime) < 2000) {
      const _laneW = ctx.measureText(laneNames[i]).width;
      ctx.font = `bold ${sz(11)}px sans-serif`;
      ctx.fillStyle = '#ff6666';
      ctx.fillText('중복키입니다', panelX + sz(16) + _laneW + sz(8), ry + (rowH - sz(4))/2);
    }

    // 키 버튼
    const kbW = Math.min(sz(90), panelW * 0.3), kbH = sz(28);
    const kbX = panelX + panelW - kbW - sz(8), kbY = ry + (rowH - sz(4) - kbH) / 2;
    ctx.fillStyle = isBinding ? LANE_COLORS[i] + '33' : 'rgba(255,255,255,0.06)';
    rrFill(kbX, kbY, kbW, kbH, sz(6));
    ctx.strokeStyle = isBinding ? LANE_COLORS[i] : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isBinding ? 2 : 1;
    rrStroke(kbX, kbY, kbW, kbH, sz(6));
    ctx.textAlign = 'center';
    ctx.font = `bold ${sz(13)}px sans-serif`;
    if (isBinding) {
      const blink = Math.floor(Date.now()/400)%2===0;
      ctx.fillStyle = blink ? '#fff' : LANE_COLORS[i];
      ctx.textBaseline = 'middle';
      ctx.fillText('키 입력...', kbX + kbW/2, kbY + kbH/2);
    } else {
      ctx.fillStyle = LANE_COLORS[i]; ctx.textBaseline = 'middle';
      ctx.fillText(getLaneLabel(i), kbX + kbW/2, kbY + kbH/2);
    }
  }

  // 초기화 버튼
  const resetY = startY + laneCount * rowH + sz(10);
  const resetW = Math.min(sz(120), panelW * 0.4), resetH = sz(30);
  const resetX = (W - resetW) / 2;
  if (!_mobileSettings) {
    ctx.fillStyle = 'rgba(255,100,100,0.08)'; rrFill(resetX, resetY, resetW, resetH, sz(6));
    ctx.strokeStyle = 'rgba(255,100,100,0.4)'; ctx.lineWidth = 1; rrStroke(resetX, resetY, resetW, resetH, sz(6));
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(12)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,100,100,0.8)';
    ctx.textBaseline = 'middle';
    ctx.fillText('기본값 복원', W/2, resetY + resetH/2);
  }

  // ===== 볼륨 설정 =====
  const volY = _mobileSettings ? (modeY + modeBtnH + sz(14)) : (resetY + resetH + sz(14));
  const sliderW = Math.min(panelW - sz(16), sz(240));
  const sliderX = (W - sliderW) / 2;
  const sliderH = sz(5), knobR = sz(8), volRowH = sz(38);

  // BGM 볼륨
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(12)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('음악 재생', sliderX, volY + sz(10));
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volBgm * 100) + '%', sliderX + sliderW, volY + sz(10));
  const bgmTrackY = volY + sz(20);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, bgmTrackY, sliderW, sliderH, sz(2));
  const bgmFill = sliderW * volBgm;
  ctx.fillStyle = '#cc44ff44'; rrFill(sliderX, bgmTrackY, bgmFill, sliderH, sz(2));
  const bgmKnobX = sliderX + bgmFill;
  ctx.beginPath(); ctx.arc(bgmKnobX, bgmTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#cc44ff'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // SFX 볼륨
  const sfxY = volY + volRowH;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left'; ctx.font = `bold ${sz(12)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('효과음', sliderX, sfxY + sz(10));
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(Math.round(volSfx * 100) + '%', sliderX + sliderW, sfxY + sz(10));
  const sfxTrackY = sfxY + sz(20);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(sliderX, sfxTrackY, sliderW, sliderH, sz(2));
  const sfxFill = sliderW * volSfx;
  ctx.fillStyle = '#44dd6644'; rrFill(sliderX, sfxTrackY, sfxFill, sliderH, sz(2));
  const sfxKnobX = sliderX + sfxFill;
  ctx.beginPath(); ctx.arc(sfxKnobX, sfxTrackY + sliderH/2, knobR, 0, Math.PI*2);
  ctx.fillStyle = '#44dd66'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // ===== 게임 모드 선택 =====
  const gameModeY = sfxY + volRowH + sz(8);
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('조작 모드', sliderX, gameModeY);
  const gmBtnW = (sliderW - sz(8)) / 2, gmBtnH = sz(28);
  const gmBtnY = gameModeY + sz(14);
  // 리듬모드 버튼
  const rSel = gameMode === 'rhythm';
  ctx.fillStyle = rSel ? '#00d4ff22' : 'rgba(255,255,255,0.04)';
  rrFill(sliderX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.strokeStyle = rSel ? '#00d4ff' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = rSel ? 2 : 1;
  rrStroke(sliderX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.textAlign = 'center'; ctx.font = `bold ${sz(11)}px sans-serif`;
  ctx.fillStyle = rSel ? '#00d4ff' : 'rgba(255,255,255,0.4)';
  ctx.fillText('리듬모드', sliderX + gmBtnW/2, gmBtnY + gmBtnH/2);
  // 나노모드 버튼
  const nSel = gameMode === 'nano';
  const nBtnX = sliderX + gmBtnW + sz(8);
  ctx.fillStyle = nSel ? '#ffd70022' : 'rgba(255,255,255,0.04)';
  rrFill(nBtnX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.strokeStyle = nSel ? '#ffd700' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = nSel ? 2 : 1;
  rrStroke(nBtnX, gmBtnY, gmBtnW, gmBtnH, sz(6));
  ctx.fillStyle = nSel ? '#ffd700' : 'rgba(255,255,255,0.4)';
  ctx.fillText('나노모드', nBtnX + gmBtnW/2, gmBtnY + gmBtnH/2);
  // 설명
  ctx.font = `${sz(9)}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText(gameMode === 'nano' ? '보다 정교한 연주를 즐기실 분들에게 추천드립니다' : '음악의 순수한 리듬을 즐기실 수 있습니다', W/2, gmBtnY + gmBtnH + sz(8));
  // 클릭 영역 저장
  window._modeBtnRhythm = { x: sliderX, y: gmBtnY, w: gmBtnW, h: gmBtnH };
  window._modeBtnNano = { x: nBtnX, y: gmBtnY, w: gmBtnW, h: gmBtnH };

  // ===== 계정 정보 =====
  const acctY = gmBtnY + gmBtnH + sz(24);
  const acctBoxW = panelW, acctBoxH = sz(50);
  const acctBoxX = (W - acctBoxW) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.03)'; rrFill(acctBoxX, acctY, acctBoxW, acctBoxH, sz(8));
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; rrStroke(acctBoxX, acctY, acctBoxW, acctBoxH, sz(8));
  // 닉네임 (크게)
  ctx.font = `bold ${sz(16)}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(currentUser || '', W / 2, acctY + sz(22));
  // 로그인 방식 태그
  const isGuest = authMethod === 'guest';
  const tagLabel = isGuest ? '\uAC8C\uC2A4\uD2B8' : 'Google';
  const tagColor = isGuest ? 'rgba(255,255,255,0.3)' : '#4285F4';
  ctx.font = `bold ${sz(10)}px sans-serif`;
  ctx.fillStyle = tagColor;
  ctx.fillText(tagLabel, W / 2, acctY + sz(40));

  // 로그아웃 + 계정 삭제 버튼
  const actY = acctY + acctBoxH + sz(8);
  const actBtnW = Math.min(sz(110), panelW * 0.35), actBtnH = sz(30), actGap = sz(10);

  if (isGuest) {
    // 게스트: Google 연동 + 계정 삭제
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    // Google 연동
    ctx.fillStyle = 'rgba(66,133,244,0.1)'; rrFill(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(66,133,244,0.6)'; ctx.lineWidth = 1; rrStroke(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.font = `bold ${sz(10)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = '#4285F4';
    ctx.fillText('Google \uC5F0\uB3D9', actStartX + actBtnW / 2, actY + actBtnH / 2);
    // 계정 삭제
    const delX = actStartX + actBtnW + actGap;
    ctx.fillStyle = 'rgba(255,50,50,0.08)'; rrFill(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(255,50,50,0.5)'; ctx.lineWidth = 1; rrStroke(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.font = `bold ${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.fillText('\uACC4\uC815 \uC0AD\uC81C', delX + actBtnW / 2, actY + actBtnH / 2);
  } else {
    // Google: 로그아웃 + 계정 삭제 가로 배치
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    // 로그아웃
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; rrStroke(actStartX, actY, actBtnW, actBtnH, sz(8));
    ctx.textAlign = 'center'; ctx.font = `bold ${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('\uB85C\uADF8\uC544\uC6C3', actStartX + actBtnW / 2, actY + actBtnH / 2);
    // 계정 삭제
    const delX = actStartX + actBtnW + actGap;
    ctx.fillStyle = 'rgba(255,50,50,0.08)'; rrFill(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.strokeStyle = 'rgba(255,50,50,0.5)'; ctx.lineWidth = 1; rrStroke(delX, actY, actBtnW, actBtnH, sz(8));
    ctx.font = `bold ${sz(11)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.fillText('\uACC4\uC815 \uC0AD\uC81C', delX + actBtnW / 2, actY + actBtnH / 2);
  }

  // 타이틀 화면으로 돌아가기 버튼 (모드 변경용)
  const ttY = actY + actBtnH + sz(10);
  const ttW = Math.min(sz(240), panelW * 0.8), ttH = sz(32);
  const ttX = (W - ttW) / 2;
  ctx.fillStyle = 'rgba(140,100,255,0.12)'; rrFill(ttX, ttY, ttW, ttH, sz(8));
  ctx.strokeStyle = 'rgba(160,120,255,0.5)'; ctx.lineWidth = 1; rrStroke(ttX, ttY, ttW, ttH, sz(8));
  ctx.font = `bold ${sz(12)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(200,180,255,0.9)';

function handleSettingsClick(mx, my) {
  // Google 연동 팝업 최우선 처리
  if (googleLinkPopup) {
    const gpW = Math.min(sz(310), W * 0.88), gpH = sz(200);
    const gpX = (W - gpW) / 2, gpY = (H - gpH) / 2;
    const gbW = sz(90), gbH = sz(34), gbGap = sz(14);
    const gcX = W / 2 - gbW - gbGap / 2, goX = W / 2 + gbGap / 2;
    const gbY = gpY + gpH - sz(50);
    if (hitTest(mx, my, gcX, gbY, gbW, gbH)) { googleLinkPopup = false; googleLinkExisting = ''; return; }
    if (hitTest(mx, my, goX, gbY, gbW, gbH)) { confirmGoogleLinkOverwrite(); return; }
    return;
  }
  // 계정 삭제 팝업이 열려있으면 최우선 처리
  if (deleteAccountPopup) {
    const dpW = Math.min(sz(300), W * 0.85), dpH = sz(180);
    const dpX = (W - dpW) / 2, dpY = (H - dpH) / 2;
    const dbW = sz(90), dbH = sz(34), dbGap = sz(14);
    const dcX = W / 2 - dbW - dbGap / 2, ddX = W / 2 + dbGap / 2;
    const dbY = dpY + dpH - sz(50);
    if (hitTest(mx, my, dcX, dbY, dbW, dbH)) { deleteAccountPopup = false; return; }
    if (hitTest(mx, my, ddX, dbY, dbW, dbH)) { deleteAccount(); return; }
    return;
  }
  const popW = Math.min(sz(340), W*0.92), popH = Math.min(H*0.94, sz(620));
  const popX = (W - popW) / 2, popY = (H - popH) / 2;
  if (!hitTest(mx, my, popX, popY, popW, popH)) { settingsOpen = false; settingsBindingLane = -1; googleLinkPopup = false; deleteAccountPopup = false; return; }
  // 닫기 버튼
  const bbW = sz(30), bbH = sz(24), bbX = popX + popW - bbW - sz(6), bbY = popY + sz(6);
  if (hitTest(mx, my, bbX, bbY, bbW, bbH)) { settingsOpen = false; settingsBindingLane = -1; googleLinkPopup = false; deleteAccountPopup = false; return; }

  // 스크롤 영역 내부는 my + scrollY 사용
  const mys = my + settingsScrollY;

  // 타이틀 화면으로 돌아가기 (모드 변경)
  if (window._settingsTitleBtn) {
    const tb = window._settingsTitleBtn;
    if (hitTest(mx, mys, tb.x, tb.y, tb.w, tb.h)) {
      settingsOpen = false; settingsBindingLane = -1;
      stopSongAudio(); stopPreview(); stopRankingBgm(); stopShopBgm(); stopAchievementBgm();
      transitionTo('title', () => { startTitleBgm(); });
      return;
    }
  }

  // 게임 모드 토글
  if (window._modeBtnRhythm && hitTest(mx, mys, _modeBtnRhythm.x, _modeBtnRhythm.y, _modeBtnRhythm.w, _modeBtnRhythm.h)) {
    gameMode = 'rhythm'; saveGameMode(); return;
  }
  if (window._modeBtnNano && hitTest(mx, mys, _modeBtnNano.x, _modeBtnNano.y, _modeBtnNano.w, _modeBtnNano.h)) {
    gameMode = 'nano'; saveGameMode(); return;
  }

  // 4~8키 모드 토글
  const modeY = popY + sz(58);
  const modeKeys = [4, 5, 6, 7, 8];
  const modeBtnW = sz(40), modeBtnH = sz(26), modeGap = sz(6);
  const modeTotalW = modeBtnW * modeKeys.length + modeGap * (modeKeys.length - 1);
  const modeX = (W - modeTotalW) / 2;
  for (let mi = 0; mi < modeKeys.length; mi++) {
    const bx = modeX + mi * (modeBtnW + modeGap);
    if (hitTest(mx, mys, bx, modeY, modeBtnW, modeBtnH) && laneCount !== modeKeys[mi]) {
      setLaneMode(modeKeys[mi]); settingsBindingLane = -1; return;
    }
  }

  const panelW = Math.min(popW - sz(20), sz(300));
  const panelX = (W - panelW) / 2;
  const rowH = sz(laneCount >= 7 ? 32 : laneCount >= 6 ? 36 : 42);
  const startY = modeY + modeBtnH + sz(12);

  const _mobileSettingsC = isMobile;
  // 키 버튼 클릭 (모바일에서는 숨김)
  if (!_mobileSettingsC) for (let i = 0; i < laneCount; i++) {
    const ry = startY + i * rowH;
    const kbW = Math.min(sz(90), panelW * 0.3), kbH = sz(28);
    const kbX = panelX + panelW - kbW - sz(8), kbY = ry + (rowH - sz(4) - kbH) / 2;
    if (hitTest(mx, mys, kbX, kbY, kbW, kbH)) {
      settingsBindingLane = (settingsBindingLane === i) ? -1 : i;
      return;
    }
  }

  // 초기화 버튼
  const resetY = startY + laneCount * rowH + sz(10);
  const resetW = Math.min(sz(120), panelW * 0.4), resetH = sz(30);
  const resetX = (W - resetW) / 2;
  if (!_mobileSettingsC && hitTest(mx, mys, resetX, resetY, resetW, resetH)) {
    resetKeymap(); settingsBindingLane = -1; return;
  }

  // 볼륨 슬라이더
  const sliderW = Math.min(panelW - sz(16), sz(240));
  const sliderX = (W - sliderW) / 2;
  const volY = _mobileSettingsC ? (modeY + modeBtnH + sz(14)) : (resetY + resetH + sz(14));
  const volRowH = sz(38), sliderHitH = sz(26);
  const bgmTrackY = volY + sz(20);
  const sfxTrackY = volY + volRowH + sz(20);
  if (mys >= bgmTrackY - sliderHitH/2 && mys <= bgmTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'bgm';
    volBgm = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applyBgmVol(); saveVolSettings(); return;
  }
  if (mys >= sfxTrackY - sliderHitH/2 && mys <= sfxTrackY + sliderHitH/2 && mx >= sliderX - sz(8) && mx <= sliderX + sliderW + sz(8)) {
    settingsDragging = 'sfx';
    volSfx = Math.max(0, Math.min(1, (mx - sliderX) / sliderW));
    applySfxVol(); saveVolSettings(); return;
  }

  // 계정 정보 박스 + 버튼
  const sfxBaseY = volY + volRowH;
  const acctBoxH = sz(50);
  const actY = sfxBaseY + volRowH + sz(12) + acctBoxH + sz(8);
  const actBtnW = Math.min(sz(110), panelW * 0.35), actBtnH = sz(30), actGap = sz(10);
  const isGuestClick = authMethod === 'guest';
  if (isGuestClick) {
    // 게스트: Google 연동 + 계정 삭제
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    if (hitTest(mx, mys, actStartX, actY, actBtnW, actBtnH)) { startGoogleLink(); return; }
    const delX = actStartX + actBtnW + actGap;
    if (hitTest(mx, mys, delX, actY, actBtnW, actBtnH)) { deleteAccountPopup = true; return; }
  } else {
    // Google: 로그아웃 + 계정 삭제
    const actTotalW = actBtnW * 2 + actGap;
    const actStartX = (W - actTotalW) / 2;
    if (hitTest(mx, mys, actStartX, actY, actBtnW, actBtnH)) { logoutUser(); return; }
    const delX = actStartX + actBtnW + actGap;
    if (hitTest(mx, mys, delX, actY, actBtnW, actBtnH)) { deleteAccountPopup = true; return; }
  }
}

let titleParticles = [];
function spawnTitleParticles() {
  const now = Date.now();
  // Ambient floating particles — 안전 영역 포함 전체 화면에서 발생/이동
  if (titleParticles.length < 40) {
    const hue = 240 + Math.random() * 80; // blue-purple range
    titleParticles.push({
      x: Math.random() * W, y: H + safeBottom + 10,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.3 + Math.random() * 0.8),
      size: 2 + Math.random() * 4,
      life: 1, decay: 0.002 + Math.random() * 0.003,
      hue, sat: 60 + Math.random() * 40, lit: 60 + Math.random() * 30,
      type: 'float'
    });
  }
  // Sparkle bursts from center
  if (Math.random() < 0.15) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    const hue = 260 + Math.random() * 60;
    titleParticles.push({
      x: W/2 + (Math.random()-0.5) * W * 0.3,
      y: H * 0.35 + (Math.random()-0.5) * 40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 1 + Math.random() * 2.5,
      life: 1, decay: 0.015 + Math.random() * 0.01,
      hue, sat: 80, lit: 70 + Math.random() * 20,
      type: 'spark'
    });
  }
}
function updateTitleParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.type === 'float') { p.vx += (Math.random() - 0.5) * 0.05; }
    if (p.life <= 0 || p.y < -safeTop - 20) { titleParticles.splice(i, 1); }
  }
}

  if (handleHamburgerClick(mx, my)) return;
  // localhost 구독 취소
  if (isLocalhost && shopCancelArea && hitTest(mx, my, shopCancelArea.x, shopCancelArea.y, shopCancelArea.w, shopCancelArea.h)) { cancelPass(); shopCancelArea = null; return; }
  // 뒤로가기 (업적 페이지와 동일 위치: 좌하단)
  if (hitTest(mx, my, 12, H - 48, 70, 38)) { playScrollTick(); stopShopBgm(); transitionTo('select'); return; }
  // 상품 클릭
  const cw = Math.min(sz(360), W * 0.88);
  const cx = (W - cw) / 2;
  let y = sz(68) - shopScroll;
  const items = getShopItems();
  let lastSec = '';
  for (const item of items) {
    if (item.section && item.section !== lastSec) { lastSec = item.section; y += sz(24); }
    const ih = sz(100);
    if (hitTest(mx, my, cx, y, cw, ih)) {
      playScrollTick();
      const buyable = item.canBuy ? item.canBuy() : true;
      if (buyable && item.onBuy) item.onBuy();
      return;
    }
    y += ih + sz(12);
  }
}

function renderShop() {
  // 배경
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0c0618'); bg.addColorStop(0.5, '#0a0a1a'); bg.addColorStop(1, '#06080e');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  const glow = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, W*0.6);
  glow.addColorStop(0, 'rgba(255,200,50,0.05)'); glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H*0.4);

  // 헤더
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, W, sz(52));
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${sz(17)}px sans-serif`; ctx.fillStyle = '#fff';
  ctx.fillText('상점', W/2, sz(27));
  ctx.textAlign = 'right';
  ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = '#ffd700';
  ctx.fillText('♪ ' + getCoins().toLocaleString(), W - sz(16), sz(27));
  // 뒤로가기 (좌하단 — 업적 페이지와 동일)
  ctx.fillStyle = 'rgba(255,255,255,0.06)'; rrFill(12, H-48, 70, 38, sz(8));
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; rrStroke(12, H-48, 70, 38, sz(8));
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('← 뒤로', 12+35, H-29);

  const cw = Math.min(sz(360), W * 0.88), cx = (W - cw) / 2;
  let y = sz(68) - shopScroll;
  const items = getShopItems();
  let lastSection = '';
  shopCancelArea = null;

  for (let ii = 0; ii < items.length; ii++) {
    const item = items[ii];
    // 섹션 헤더
    if (item.section && item.section !== lastSection) {
      lastSection = item.section;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillText(item.section.toUpperCase(), cx + sz(4), y + sz(10));
      y += sz(24);
    }
    const ih = sz(100);
    const status = item.getStatus ? item.getStatus() : null;
    const buyable = item.canBuy ? item.canBuy() : true;
    // 카드
    const cardGrad = ctx.createLinearGradient(cx, y, cx + cw, y + ih);
    cardGrad.addColorStop(0, item.color + '0a'); cardGrad.addColorStop(1, item.color + '03');
    ctx.fillStyle = cardGrad; rrFill(cx, y, cw, ih, sz(14));
    ctx.strokeStyle = item.color + '30'; ctx.lineWidth = 1; rrStroke(cx, y, cw, ih, sz(14));
    // 아이콘
    const iconCx = cx + sz(32), iconCy = y + ih/2;
    ctx.fillStyle = item.color + '18';
    ctx.beginPath(); ctx.arc(iconCx, iconCy, sz(22), 0, Math.PI*2); ctx.fill();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `${sz(22)}px sans-serif`;
    ctx.fillText(item.icon, iconCx, iconCy);
    // 상품명 + 배지
    ctx.textAlign = 'left';
    ctx.font = `bold ${sz(14)}px sans-serif`; ctx.fillStyle = '#fff';
    ctx.fillText(item.label, cx + sz(62), y + sz(28));
    if (item.badge && buyable) {
      const tw = ctx.measureText(item.label).width;
      const bgx = cx + sz(62) + tw + sz(6), bgy = y + sz(19);
      ctx.fillStyle = '#ff2244'; rrFill(bgx, bgy, ctx.measureText(item.badge).width + sz(10), sz(16), sz(8));
      ctx.font = `bold ${sz(8)}px sans-serif`; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      ctx.fillText(item.badge, bgx + (ctx.measureText(item.badge).width + sz(10))/2, bgy + sz(9));
      ctx.textAlign = 'left';
    }
    // 설명
    ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(item.desc, cx + sz(62), y + sz(48));
    // 상태 표시 or 가격 버튼
    const pbw = sz(86), pbh = sz(30);
    const pbx = cx + sz(62), pby = y + sz(64);
    if (buyable) {
      const btnG = ctx.createLinearGradient(pbx, pby, pbx+pbw, pby+pbh);
      btnG.addColorStop(0, item.color); btnG.addColorStop(1, item.color + 'cc');
      ctx.fillStyle = btnG; rrFill(pbx, pby, pbw, pbh, sz(8));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(12)}px sans-serif`; ctx.fillStyle = '#000';
      ctx.fillText(item.price, pbx + pbw/2, pby + pbh/2);
    } else if (status) {
      ctx.fillStyle = status.color + '18'; rrFill(pbx, pby, pbw, pbh, sz(8));
      ctx.strokeStyle = status.color + '44'; ctx.lineWidth = 1; rrStroke(pbx, pby, pbw, pbh, sz(8));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(11)}px sans-serif`; ctx.fillStyle = status.color;
      ctx.fillText(status.text, pbx + pbw/2, pby + pbh/2);
    }
    // localhost 취소 (구독 상품 + 활성 시)
    if (isLocalhost && item.type === 'pass' && status) {
      const cbx = cx + cw - sz(50) - sz(8), cby = y + sz(68);
      ctx.fillStyle = 'rgba(255,60,60,0.15)'; rrFill(cbx, cby, sz(50), sz(22), sz(5));
      ctx.strokeStyle = '#ff444444'; ctx.lineWidth = 1; rrStroke(cbx, cby, sz(50), sz(22), sz(5));
      ctx.font = `bold ${sz(9)}px sans-serif`; ctx.fillStyle = '#ff4444'; ctx.textAlign = 'center';
      ctx.fillText('취소', cbx + sz(25), cby + sz(12));
      shopCancelArea = { x: cbx, y: cby, w: sz(50), h: sz(22) };
    }
    y += ih + sz(12);
  }

  // 하단
  y += sz(16);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx+cw, y); ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.13)';
  ctx.fillText('새로운 상품이 곧 추가됩니다', W/2, y + sz(18));
  // 하단 코인 + 햄버거 (뒤로가기 우측에)
  renderBottomBar();
}

// ===== 공통 하단 바 (코인 + 햄버거 메뉴) =====
function renderBottomBar() {
  // 햄버거 버튼 (우하단) — 먼저 좌표 계산
  const _bbML = isMobile && !isPortrait;
  const _bbBottom = H + safeBottom - sz(4);
  const hbW = _bbML ? sz(46) : sz(36);
  const hbH = _bbML ? sz(34) : sz(28);
  const hbX = W - hbW - sz(8), hbY = _bbBottom - hbH;
  // 코인 (햄버거 버튼 세로 중앙과 정렬)
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${_bbML ? sz(12) : sz(10)}px sans-serif`; ctx.fillStyle = '#ffd700aa';
  ctx.fillText('♪ ' + getCoins().toLocaleString(), hbX - sz(6), hbY + hbH/2);
  // 햄버거 버튼 렌더
  ctx.fillStyle = hamburgerOpen ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
  rrFill(hbX, hbY, hbW, hbH, sz(7));
  ctx.strokeStyle = hamburgerOpen ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1; rrStroke(hbX, hbY, hbW, hbH, sz(7));
  const barBW = _bbML ? sz(18) : sz(14), barBH = 2, barBX = hbX + (hbW - barBW) / 2;
  const barGapY = _bbML ? sz(6) : sz(5);
  const barStartY = hbY + (hbH - (barGapY * 2 + barBH)) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let bi = 0; bi < 3; bi++) ctx.fillRect(barBX, barStartY + bi * barGapY, barBW, barBH);
  // 메뉴 펼침
  if (hamburgerOpen) {
    const menuW = sz(120), menuItemH = sz(36);
    const menuItems = [{label:'상점',icon:'🛒'},{label:'설정',icon:'⚙'}];
    const menuH = menuItems.length * menuItemH;
    const menuX = hbX + hbW - menuW, menuY = hbY - menuH - sz(6);
    ctx.fillStyle = '#1a1a2e'; rrFill(menuX, menuY, menuW, menuH, sz(8));
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; rrStroke(menuX, menuY, menuW, menuH, sz(8));
    for (let mi = 0; mi < menuItems.length; mi++) {
      const iy = menuY + mi * menuItemH;
      if (mi > 0) { ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(menuX+sz(8),iy); ctx.lineTo(menuX+menuW-sz(8),iy); ctx.stroke(); }
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.font=`${sz(14)}px sans-serif`; ctx.fillText(menuItems[mi].icon, menuX+sz(12), iy+menuItemH/2);
      ctx.font=`${sz(13)}px sans-serif`; ctx.fillStyle='#fff'; ctx.fillText(menuItems[mi].label, menuX+sz(34), iy+menuItemH/2);
    }
    hamburgerAreas = { btn:{x:hbX,y:hbY,w:hbW,h:hbH}, menu:{x:menuX,y:menuY,w:menuW,h:menuH,itemH:menuItemH,count:menuItems.length} };
  } else {
    hamburgerAreas = { btn:{x:hbX,y:hbY,w:hbW,h:hbH}, menu:null };
  }
}

function renderTitle() {
  // 우주 성운 글로우 배경 (안전 영역 포함)
  const t0 = Date.now();
  const _totalH = H + safeTop + safeBottom;
  const nebulaAlpha = 0.06 + Math.sin(t0 * 0.0005) * 0.02;
  const nebGrad1 = ctx.createRadialGradient(W * 0.3, H * 0.25, 0, W * 0.3, H * 0.25, W * 0.5);
  nebGrad1.addColorStop(0, `rgba(80,40,160,${nebulaAlpha})`);
  nebGrad1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad1; ctx.fillRect(0, -safeTop, W, _totalH);
  const nebGrad2 = ctx.createRadialGradient(W * 0.75, H * 0.65, 0, W * 0.75, H * 0.65, W * 0.4);
  nebGrad2.addColorStop(0, `rgba(30,60,140,${nebulaAlpha * 0.8})`);
  nebGrad2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad2; ctx.fillRect(0, -safeTop, W, _totalH);

  // 별 (반짝임 + 일부 컬러)
  for (const s of stars) {
    const twinkle = 0.3 + Math.sin(t0 * s.twinkleSpeed + s.twinkleOffset) * 0.4;
    ctx.globalAlpha = s.b * Math.max(0.1, twinkle);
    if (s.colored) {
      ctx.fillStyle = `hsl(${s.hue},70%,80%)`;
    } else {
      ctx.fillStyle = '#fff';
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // 큰 별에 글로우 (shadowBlur 제거 → 단순 반투명 원으로 대체)
    if (s.s > 2.0 && twinkle > 0.55) {
      ctx.globalAlpha = s.b * twinkle * 0.08;
      ctx.fillStyle = s.colored ? `hsl(${s.hue},60%,75%)` : '#aaccff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.s * 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // 별똥별 (간헐적)
  if (Math.random() < 0.008) spawnShootingStar();
  renderShootingStars();

  // Title particles
  spawnTitleParticles();
  updateTitleParticles();
  for (const p of titleParticles) {
    ctx.globalAlpha = p.life * (p.type === 'spark' ? 0.8 : 0.35);
    if (p.type === 'spark') {
      // shadowBlur 제거 — Edge 성능 개선
    }
    ctx.fillStyle = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // 전체 가시 영역 기준 y 헬퍼 (안전 영역 포함)
  const _visTop = -safeTop;
  const _visH = H + safeTop + safeBottom;
  const _visY = (ratio) => _visTop + _visH * ratio;

  // EQ bars
  const eqCount = 30, eqGap = 4;
  const eqTotalW = W * 0.75;
  const eqBarW = (eqTotalW - (eqCount-1)*eqGap) / eqCount;
  const eqX0 = (W - eqTotalW) / 2;
  const eqCenterY = _visY(0.46);
  for (let i=0;i<eqCount;i++) {
    const bx = eqX0 + i * (eqBarW + eqGap);
    const bh = 20 + Math.sin(Date.now()*0.004+i*0.6)*18 + Math.sin(Date.now()*0.007+i*1.1)*10;
    const alpha = 0.08 + Math.sin(Date.now()*0.003+i*0.4)*0.04;
    ctx.fillStyle = `rgba(130,90,255,${alpha})`;
    ctx.fillRect(bx, eqCenterY-bh/2, eqBarW, bh);
  }

  // Logo — 2줄 분리 + 글로우
  const t = Date.now();
  ctx.save(); ctx.translate(W/2, _visY(0.33));
  const p = 1 + Math.sin(t*0.002)*0.015; ctx.scale(p, p);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // "NANO" — 가볍고 얇은 스타일
  const nanoSize = sz(48);
  ctx.font = `200 ${nanoSize}px sans-serif`;
  ctx.letterSpacing = `${nanoSize * 0.3}px`;
  // 글로우 레이어
  ctx.shadowColor = 'rgba(100,180,255,0.4)'; ctx.shadowBlur = 12;
  ctx.fillStyle = 'rgba(180,210,255,0.9)';
  ctx.fillText('N A N O', 0, -nanoSize * 0.55);
  ctx.shadowBlur = 0;

  // 구분선 — 그라데이션 + 펄스
  const lineW = sz(280);
  const lineAlpha = 0.4 + Math.sin(t*0.003)*0.15;
  const lineGrad = ctx.createLinearGradient(-lineW/2, 0, lineW/2, 0);
  lineGrad.addColorStop(0, `rgba(100,180,255,0)`);
  lineGrad.addColorStop(0.3, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(0.5, `rgba(200,160,255,${lineAlpha + 0.2})`);
  lineGrad.addColorStop(0.7, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(1, `rgba(100,180,255,0)`);
  ctx.fillStyle = lineGrad;
  ctx.fillRect(-lineW/2, -2, lineW, 3);
  // 라인 위 작은 빛 점 이동
  const dotX = (Math.sin(t*0.002) * lineW * 0.4);
  ctx.beginPath(); ctx.arc(dotX, -0.5, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
  ctx.fill(); ctx.shadowBlur = 0;

  // "RHYTHM" — 굵고 강렬한 스타일
  const rhythmSize = sz(62);
  ctx.font = `900 ${rhythmSize}px sans-serif`;
  // 보라→파랑 그라데이션 텍스트
  const txtGrad = ctx.createLinearGradient(-rhythmSize*2, 0, rhythmSize*2, 0);
  txtGrad.addColorStop(0, '#b060ff');
  txtGrad.addColorStop(0.5, '#e0c0ff');
  txtGrad.addColorStop(1, '#60a0ff');
  ctx.fillStyle = txtGrad;
  ctx.shadowColor = 'rgba(160,100,255,0.5)'; ctx.shadowBlur = 15;
  ctx.fillText('RHYTHM', 0, rhythmSize * 0.55);
  ctx.shadowBlur = 0;

  ctx.restore();

  // 버전 표시 (Kplay 캐시 확인용) — 설정 버튼과 안 겹치게 좌측 하단
  ctx.font = `${sz(9)}px sans-serif`; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillText('v15.8', 6, H + safeBottom - 4);

  if (!currentUser) {
    // ===== 비로그인: 소셜 로그인 버튼 =====
    loginBtnAreas = [];
    const buttons = [];
    // Kplay iframe 안이면 Kplay 로그인 버튼 최상단
    if (inIframe) {
      buttons.push({ type: 'kplay', bg: '#7a4dff', border: '#9e7aff', text: '#ffffff', label: 'Kplay \uB85C\uADF8\uC778' });
    }
    buttons.push(
      { type: 'google', bg: '#ffffff', border: '#dadce0', text: '#3c4043', label: 'Google \uB85C\uADF8\uC778' },
      { type: 'guest', bg: 'rgba(255,255,255,0.06)', border: 'rgba(255,255,255,0.25)', text: '#cccccc', label: '\uAC8C\uC2A4\uD2B8 \uB85C\uADF8\uC778' }
    );
    const btnW = Math.min(sz(260), W * 0.78), btnH = sz(44), gap = sz(11);
    const totalBtnH = btnH * buttons.length + gap * (buttons.length - 1);
    const btnStartY = _visY(0.62) - totalBtnH / 2;
    const btnStartX = (W - btnW) / 2;
    const iconR = sz(8), iconPad = sz(32);

    buttons.forEach((btn, i) => {
      const by = btnStartY + i * (btnH + gap);
      loginBtnAreas.push({ x: btnStartX, y: by, w: btnW, h: btnH, type: btn.type });

      ctx.fillStyle = btn.bg; rrFill(btnStartX, by, btnW, btnH, sz(10));
      ctx.strokeStyle = btn.border; ctx.lineWidth = 1.5; rrStroke(btnStartX, by, btnW, btnH, sz(10));

      const iconCx = btnStartX + iconPad, iconCy = by + btnH / 2;
      if (btn.type === 'google') drawGoogleIcon(iconCx, iconCy, iconR);
      else if (btn.type === 'kplay') {
        // Kplay 아이콘: 간단한 'K' 텍스트 원
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(iconCx, iconCy, iconR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#7a4dff'; ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('K', iconCx, iconCy + 1); ctx.textBaseline = 'alphabetic';
      }
      else drawGuestIcon(iconCx, iconCy, iconR);

      ctx.font = `bold ${sz(14)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = btn.text;
      ctx.fillText(btn.label, btnStartX + btnW / 2 + iconPad / 4, by + btnH / 2);
      ctx.textBaseline = 'alphabetic';
    });

    // 로딩 표시
    if (loginAuthPending) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
      ctx.font = `bold ${sz(16)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      const dots = '.'.repeat(Math.floor(Date.now() / 400) % 4);
      ctx.fillText('\uB85C\uADF8\uC778 \uC911' + dots, W / 2, H / 2);
    }

    // 토스트 메시지 (최대 2줄)
    if (loginToastTimer > 0) {
      const toastAlpha = Math.min(1, loginToastTimer);
      ctx.globalAlpha = toastAlpha;
      const has2 = loginToast2.length > 0;
      const tw = Math.min(sz(320), W * 0.9), th = has2 ? sz(52) : sz(36);
      const tx = (W - tw) / 2, ty = H - th - sz(10);
      ctx.fillStyle = 'rgba(0,0,0,0.9)'; rrFill(tx, ty, tw, th, sz(8));
      ctx.strokeStyle = loginToastColor + '44'; ctx.lineWidth = 1; rrStroke(tx, ty, tw, th, sz(8));
      ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillStyle = loginToastColor;
      ctx.fillText(loginToast, W / 2, ty + (has2 ? sz(18) : th * 0.6));
      if (has2) {
        ctx.font = `${sz(9)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText(loginToast2, W / 2, ty + sz(35));
      }
      ctx.globalAlpha = 1;
    }
  } else {
    // ===== 로그인 완료: 모드 선택 + TAP TO START =====
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.font=`bold ${sz(13)}px sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.5)';

function getLocalNicknames() {

}
function saveLocalNickname(name, uid) {
  const cache = getLocalNicknames();

let nicknameChecking = false;
function confirmNickname() {
  const name = nicknameInput.trim();
  const err = validateNickname(name);
  if (err) { nicknameError = err; return; }
  if (nicknameChecking) return;

  // 로컬 캐시에서 즉시 중복 체크
  const localCache = getLocalNicknames();
  if (localCache[name] && localCache[name] !== pendingAuthUid) {
    nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.';
    return;
  }

  nicknameChecking = true;
  nicknameError = '';
  let resolved = false;
  const finish = (dup) => {
    if (resolved) return; resolved = true;
    nicknameChecking = false;
    if (dup) { nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.'; }
    else { saveLocalNickname(name, pendingAuthUid); nicknameError = ''; completeLogin(name, pendingAuthMethod); }
  };
  // 500ms 내 응답 없으면 로컬 캐시 기준으로 통과
  setTimeout(() => finish(false), 500);
  try {
    fbDb.ref('nicknames/' + name).once('value', snap => {
      const val = snap.val();
      if (val && val !== pendingAuthUid) finish(true);
      else finish(false);
    });
  } catch(e) { finish(false); }
}
