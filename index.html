// ===== KPlay API (공식 docs.kplay.games 버전) =====
class KPlayAPI {
  constructor() {
    this.user = { userId: null, name: null, credits: 0 };
    this._pending = null;
    this._onUserInfo = null;
    this._onPurchaseResult = null;
    this._onScoreSubmitted = null;
    this._reqs = new Map();
    this._reqSeq = 0;
    this._storagePrefix = 'kplay:';
    this.storage = {
      getItem: (key) => this._storageGet(key),
      setItem: (key, value) => this._storageSet(key, value),
      removeItem: (key) => this._storageRemove(key),
      keys: () => this._storageKeys(),
    };
    window.addEventListener('message', (e) => {
      const { type, ...data } = e.data ?? {};
      if (!type) return;
      switch (type) {
        case 'user-info':
          this.user = { userId: data.userId, name: data.name, credits: data.credits ?? 0 };
          this._onUserInfo?.(this.user);
          if (data.userId) this._syncStorageFromServer();
          break;
        case 'purchase-result':
          if (data.success) this.user.credits = data.balance;
          this._onPurchaseResult?.(data);
          this._pending = null;
          break;
        case 'score-submitted':
          this._onScoreSubmitted?.(data);
          break;
        case 'storage-load-result':
        case 'storage-set-result':
        case 'storage-remove-result': {
          const req = this._reqs.get(data.requestId);
          if (!req) break;
          this._reqs.delete(data.requestId);
          data.success ? req.resolve(data) : req.reject(new Error(data.error || 'storage error'));
          break;
        }
      }
    });
  }
  _request(type, payload) {
    const requestId = `r${++this._reqSeq}`;
    return new Promise((resolve, reject) => {
      this._reqs.set(requestId, { resolve, reject });
      try { window.parent.postMessage({ type, requestId, ...payload }, '*'); } catch(e) {}
      setTimeout(() => {
        if (this._reqs.has(requestId)) { this._reqs.delete(requestId); reject(new Error('timeout')); }
      }, 10000);
    });
  }
  _lsKey(key) { return this._storagePrefix + key; }
  async _storageGet(key) { try { return localStorage.getItem(this._lsKey(key)); } catch(e) { return null; } }
  async _storageSet(key, value) {
    try { localStorage.setItem(this._lsKey(key), String(value)); } catch(e) {}
    if (!this.user.userId) return;
    try { await this._request('storage-set', { key, value: String(value) }); }
    catch (e) { console.warn('[kplay] cloud save failed, kept local:', e.message); }
  }
  async _storageRemove(key) {
    try { localStorage.removeItem(this._lsKey(key)); } catch(e) {}
    if (!this.user.userId) return;
    try { await this._request('storage-remove', { key }); } catch {}
  }
  async _storageKeys() {
    const keys = []; const prefix = this._storagePrefix;
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k.slice(prefix.length));
      }
    } catch(e) {}
    return keys;
  }
  async _syncStorageFromServer() {
    try {
      const res = await this._request('storage-load', {});
      const data = res.data || {};
      for (const [k, v] of Object.entries(data)) {
        try { localStorage.setItem(this._lsKey(k), v); } catch(e) {}
      }
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith(this._storagePrefix)) continue;
        const key = k.slice(this._storagePrefix.length);
        if (!(key in data)) {
          const value = localStorage.getItem(k);
          if (value != null) this._request('storage-set', { key, value }).catch(() => {});
        }
      }
    } catch (e) { console.warn('[kplay] storage sync failed:', e.message); }
  }
  purchase(itemId, itemName, price) {
    if (this._pending) return;
    if (!this.user.userId) { this.requestLogin(); return; }
    if (this.user.credits < price) { this.openCreditShop(); return; }
    this._pending = { itemId, itemName, price };
    try { window.parent.postMessage({ type: 'purchase-item', itemId, itemName, price }, '*'); } catch(e) {}
  }
  submitScore(score) { try { window.parent.postMessage({ type: 'submit-score', score }, '*'); } catch(e) {} }
  openCreditShop() { try { window.parent.postMessage({ type: 'credit-shop' }, '*'); } catch(e) {} }
  showLeaderboard() { try { window.parent.postMessage({ type: 'show-leaderboard' }, '*'); } catch(e) {} }
  log(eventType, metadata) { try { window.parent.postMessage({ type: 'analytics-event', eventType, metadata }, '*'); } catch(e) {} }
  requestLogin() { try { window.parent.postMessage({ type: 'login-required' }, '*'); } catch(e) {} }
  on(event, callback) {
    if (event === 'userInfo') this._onUserInfo = callback;
    if (event === 'purchaseResult') this._onPurchaseResult = callback;
    if (event === 'scoreSubmitted') this._onScoreSubmitted = callback;
    return this;
  }
}

// ===== Storage wrapper (localStorage sync + kplay.storage mirror) =====
function _kpHas() { return !!(window.kplay && window.kplay.storage); }
function safeGetItem(key) {
  try { return window.localStorage.getItem(key); } catch(e) { return null; }
}
function safeSetItem(key, val) {
  try { window.localStorage.setItem(key, val); } catch(e) {}
  if (_kpHas()) { try { window.kplay.storage.setItem(key, val); } catch(e) {} }
}
function safeRemoveItem(key) {
  try { window.localStorage.removeItem(key); } catch(e) {}
  if (_kpHas()) { try { window.kplay.storage.removeItem(key); } catch(e) {} }
}

// 백그라운드 동기화: kplay.storage → localStorage (기기 전환 시 클라우드 데이터 복원)
// 주요 키들을 순차 로드. 로드 후 Storage 이벤트로 알리지 않고 다음 곡/세션에 반영됨.
async function _kpPullAll() {
  if (!_kpHas()) return;
  // 알려진 단일 키들 + 동적 prefix 기반
  const staticKeys = [
    'rhythm_volBgm', 'rhythm_volSfx',
    'rhythm_gameMode', 'rhythm_playMode',
    'rhythm_laneCount', 'rhythm_currentUser', 'rhythm_authMethod',
    'rhythm_allScores', 'rhythm_localPlays', 'rhythm_playsCache',
    'rhythm_nicknames',
  ];
  for (const k of staticKeys) {
    try {
      const v = await window.kplay.storage.getItem(k);
      if (v != null) { try { window.localStorage.setItem(k, v); } catch(e) {} }
    } catch(e) {}
  }
  // 사용자별 키 (currentUser 확보 후)
  const u = safeGetItem('rhythm_currentUser');
  if (u) {
    const userKeys = [
      'rhythm_pass_' + u, 'rhythm_passBought_' + u, 'rhythm_freeplays_' + u,
      'rhythm_coins_' + u, 'rhythm_ach_' + u, 'rhythm_claimed_' + u,
      'rhythm_guestNickname_' + u,
    ];
    for (const k of userKeys) {
      try {
        const v = await window.kplay.storage.getItem(k);
        if (v != null) { try { window.localStorage.setItem(k, v); } catch(e) {} }
      } catch(e) {}
    }
  }
}

function resize() {

let actx, drumBus, bgBus, masterGain, noiseBuffer;
// Blob URL 캐시 (iOS 전용: 메모리 상에 오디오 데이터 유지 → play 레이턴시 0)

// ===== BufferPlayer: iOS 전용 HTMLAudioElement 호환 래퍼 =====
// AudioBufferSourceNode 기반 → play() 레이턴시 거의 0
class BufferPlayer {
  constructor(audioBuffer, audioCtx) {
    this.buffer = audioBuffer;
    this.actx = audioCtx;
    this.source = null;
    this.gainNode = audioCtx.createGain();
    this.gainNode.connect(audioCtx.destination);
    this._volume = 1;
    this._savedTime = 0; // pause/seek 시 저장된 재생 위치
    this._startCtxTime = 0; // play() 호출 시점의 actx.currentTime
    this._paused = true;
    this._ended = false;
    this.src = ''; // HTMLAudio 호환용 (디버그)
  }
  get currentTime() {
    if (this._paused || !this.buffer) return this._savedTime;
    const t = this._savedTime + (this.actx.currentTime - this._startCtxTime);
    return Math.min(this.buffer.duration, t);
  }
  set currentTime(t) {
    const wasPlaying = !this._paused;
    if (wasPlaying) this._stopSource();
    this._savedTime = Math.max(0, Math.min(this.buffer ? this.buffer.duration : 0, t));
    this._ended = false;
    if (wasPlaying) this._startSource();
  }
  get volume() { return this._volume; }
  set volume(v) { this._volume = v; this.gainNode.gain.value = v; }
  get paused() { return this._paused; }
  get ended() { return this._ended; }
  get duration() { return this.buffer ? this.buffer.duration : 0; }
  play() {
    if (!this._paused || !this.buffer) return Promise.resolve();
    this._startSource();
    return Promise.resolve();
  }
  pause() {
    if (this._paused) return;
    this._savedTime = this.currentTime;
    this._stopSource();
  }
  _startSource() {
    this._stopSource();
    if (!this.buffer) return;
    const src = this.actx.createBufferSource();
    src.buffer = this.buffer;
    src.connect(this.gainNode);
    src.onended = () => {
      if (this.source === src) {
        // 자연 종료 (pause로 stop된 것과 구분)
        if (!this._paused) { this._ended = true; this._paused = true; }
      }
    };
    this._startCtxTime = this.actx.currentTime;
    try { src.start(0, this._savedTime); } catch(e) {}
    this.source = src;
    this._paused = false;
    this._ended = false;
  }
  _stopSource() {
    if (this.source) {
      try { this.source.onended = null; this.source.stop(); } catch(e) {}
      this.source = null;
    }
    this._paused = true;
  }
  addEventListener() {} // 호환용 noop
  removeEventListener() {}
}

function initAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.6;
  masterGain.connect(actx.destination);
  drumBus = actx.createGain(); drumBus.gain.value = 0.65; drumBus.connect(masterGain);
  bgBus = actx.createGain(); bgBus.gain.value = 0.5; bgBus.connect(masterGain);
  // Preview buses (lower volume)
  previewGain = actx.createGain(); previewGain.gain.value = 0.35;
  previewGain.connect(actx.destination);
  previewDrumBus = actx.createGain(); previewDrumBus.gain.value = 0.5; previewDrumBus.connect(previewGain);
  previewBgBus = actx.createGain(); previewBgBus.gain.value = 0.4; previewBgBus.connect(previewGain);
  const sr = actx.sampleRate;
  noiseBuffer = actx.createBuffer(1, sr, actx.sampleRate);
  const d = noiseBuffer.getChannelData(0);
  for (let i = 0; i < sr; i++) d[i] = Math.random() * 2 - 1;
}
// HTMLAudio를 Web Audio 그래프에 연결 (iOS 무음 제어용)
function routeAudioThroughGain(audioEl, gainValue) {
  if (!actx || !audioEl) return null;
  try {
    const src = actx.createMediaElementSource(audioEl);
    const gain = actx.createGain();
    gain.gain.value = gainValue;
    src.connect(gain);
    gain.connect(actx.destination);
    return gain;
  } catch(e) { return null; } // 이미 연결된 경우 에러
}

function resumeAudio() {
  if (!actx) initAudio();
  if (actx.state === 'suspended') actx.resume();
  // iOS: 무음 버퍼 재생으로 AudioContext + HTML Audio 동시 unlock
  if (!resumeAudio._unlocked && actx) {
    const silentBuf = actx.createBuffer(1, 1, actx.sampleRate);
    const src = actx.createBufferSource();
    src.buffer = silentBuf;
    src.connect(actx.destination);
    src.start(0);
    resumeAudio._unlocked = true;
  }
  applyBgmVol();
}

  // 로딩 완료 처리 — 여러 이벤트로 커버 (canplaythrough는 간헐적으로 안 뜸)
  const markReady = () => {
    if (songPreviewAudio !== audio || !previewLoading) return;
    previewLoading = false;
    previewCycleStart = performance.now();
  };
  audio.addEventListener('canplay', markReady, { once: true });
  audio.addEventListener('loadeddata', markReady, { once: true });
  audio.addEventListener('playing', markReady, { once: true });
  audio.play().then(markReady).catch(()=>{});
  // 타임아웃 폴백: 3초 내에 준비 못 하면 강제로 진행
  setTimeout(() => {
    if (songPreviewAudio === audio && previewLoading) {
      markReady();
      audio.play().catch(()=>{});
    }
  }, 3000);
}
function stopPreview() {
  previewActive = false;
  previewSongIdx = -1;
  stopSongPreview();
}
function schedulePreview() {
  if (!previewActive || !songPreviewAudio || previewLoading) return;
  const elapsed = (performance.now() - previewCycleStart) / 1000;
  if (elapsed < PREVIEW_FADE_IN) {
    // 페이드인
    songPreviewAudio.volume = getPreviewMaxVol() * (elapsed / PREVIEW_FADE_IN);
  } else if (elapsed < PREVIEW_DURATION - PREVIEW_FADE_OUT) {
    // 정상 재생
    songPreviewAudio.volume = getPreviewMaxVol();
  } else if (elapsed < PREVIEW_DURATION) {
    // 페이드아웃
    const remain = PREVIEW_DURATION - elapsed;
    songPreviewAudio.volume = getPreviewMaxVol() * (remain / PREVIEW_FADE_OUT);
  } else if (elapsed < PREVIEW_DURATION + PREVIEW_GAP) {
    // 갭 (무음)
    songPreviewAudio.volume = 0;
  } else {
    // 다시 처음부터
    songPreviewAudio.currentTime = 0;
    songPreviewAudio.play().catch(()=>{});
    previewCycleStart = performance.now();
  }
}

      const vol = isAlways ? STEM_VOL_VOCAL : STEM_VOL_NORMAL;
      const targetVol = baseVol * vol;
      if (useAbs && window._absGains[i]) {

// BGM 재생 중: 해당 레인 스템을 순간 펄스 (볼륨 즉시 올리고 lerp가 빠르게 내림)
// BGM 재생 전: 짧은 탭 폴백음
const EMPTY_TAP_FREQS = [200, 300, 400, 500, 600, 700, 800, 900];

function playEmptyPressSfx(lane) {
  if (!actx) return;
  resumeAudio(); // AudioContext resume 보장
  // BGM 종료 후: 무음
  if (songDuration > 0 && gameTime >= songDuration - 1) return;
  const now = performance.now();
  const peakVol = countdownTime > 0 ? STEM_VOL_NORMAL * volBgm : Math.min(1.0, STEM_VOL_NORMAL * volBgm * 1.4);
  if (usingStemMode) {
    // onset 모드: 해당 레인의 다음 노트 stem + onset 시간으로 재생
    let targetStems = [];
    let targetOffset = 0;
    if (curSong && curSong._onsetMode && nodes.length > 0) {
      const delay = curSong._startDelay || 0;
      for (const n of nodes) {
        if (n.hit || n.missed) continue;
        if (n.lane === lane && n.stem != null) {
          targetStems = [n.stem];
          targetOffset = Math.max(0, n.time - delay); // 노트의 실제 오디오 위치
          break;
        }
      }
      if (targetStems.length === 0) {
        for (const n of nodes) {
          if (!n.hit && !n.missed && n.stem != null) {
            targetStems = [n.stem];
            targetOffset = Math.max(0, n.time - delay);
            break;
          }
        }
      }
    }
    if (targetStems.length === 0) {
      // fallback: 레인 매핑 사용
      const ls = getLaneStems();
      if (ls && ls[lane]) targetStems = ls[lane].filter(si => !ALWAYS_AUDIBLE_STEMS.includes(si));
    }
    targetStems.forEach(si => {
      const stemEnded = allStemAudios[si] ? allStemAudios[si].ended : true;
      if (countdownTime > 0 || stemEnded) {
        if (stemAudioBuffers[si] && actx) {
          const src = actx.createBufferSource();
          const gain = actx.createGain();
          src.buffer = stemAudioBuffers[si];
          gain.gain.setValueAtTime(peakVol, actx.currentTime);
          gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.5);
          src.connect(gain); gain.connect(actx.destination);
          const offset = targetOffset > 0 ? targetOffset : (stemFirstSoundTime[si] || 0);
          src.start(0, offset, 0.5);
        }
      } else {
        stemPulses[si] = { start: now, peak: peakVol, dur: 500 };
        if (allStemAudios[si]) allStemAudios[si].volume = peakVol;
      }
    });
  } else {
    const freq = EMPTY_TAP_FREQS[lane % EMPTY_TAP_FREQS.length];
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(peakVol * 0.25, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.12);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + 0.12);
  }
}

// ===== SONG LOCK / SHOP SYSTEM =====
const FREE_SONG_COUNT = 10; // 기본 무료 곡 수
const UNLOCK_POINT_COST = 100; // 포인트로 1회 해금 비용
const PASS_DURATION_MS = 28 * 24 * 60 * 60 * 1000; // 28일

function isSongLocked(idx) {
  if (idx < FREE_SONG_COUNT) return false;
  if (hasActivePass()) return false;
  if (getSongFreePlayCount(idx) > 0) return false;
  return true;
}
function hasActivePass() {
  const ts = parseInt(safeGetItem('rhythm_pass_' + (currentUser||'guest')) || '0');
  return ts > 0 && Date.now() < ts;
}
function hasEverPurchasedPass() {
  return safeGetItem('rhythm_passBought_' + (currentUser||'guest')) === '1';
}
function activatePass() {
  const expiry = Date.now() + PASS_DURATION_MS;
  safeSetItem('rhythm_pass_' + (currentUser||'guest'), '' + expiry);
  safeSetItem('rhythm_passBought_' + (currentUser||'guest'), '1');
  if (currentUser && fbDb) try {
    fbDb.ref('settings/' + currentUser + '/passExpiry').set(expiry);
    fbDb.ref('settings/' + currentUser + '/passBought').set(true);
  } catch(e) {}
}
function getPassExpiry() {
  return parseInt(safeGetItem('rhythm_pass_' + (currentUser||'guest')) || '0');
}
function loadPassFromFirebase() {
  if (!currentUser || !fbDb) return;
  fbDb.ref('settings/' + currentUser + '/passExpiry').once('value', snap => {
    const v = snap.val();
    if (v && v > Date.now()) safeSetItem('rhythm_pass_' + currentUser, '' + v);
  });
  fbDb.ref('settings/' + currentUser + '/passBought').once('value', snap => {
    if (snap.val()) safeSetItem('rhythm_passBought_' + currentUser, '1');
  });
}
function getSongFreePlayCount(idx) {
  const data = JSON.parse(safeGetItem('rhythm_freeplays_' + (currentUser||'guest')) || '{}');
  return data[idx] || 0;
}
function addSongFreePlay(idx) {
  const data = JSON.parse(safeGetItem('rhythm_freeplays_' + (currentUser||'guest')) || '{}');
  data[idx] = (data[idx] || 0) + 1;
  safeSetItem('rhythm_freeplays_' + (currentUser||'guest'), JSON.stringify(data));
}
function useSongFreePlay(idx) {
  const data = JSON.parse(safeGetItem('rhythm_freeplays_' + (currentUser||'guest')) || '{}');
  if (data[idx] && data[idx] > 0) { data[idx]--; safeSetItem('rhythm_freeplays_' + (currentUser||'guest'), JSON.stringify(data)); return true; }
  return false;
}

function _dList() { return favFilterActive ? getFavorites().sort((a,b)=>a-b) : songs.map((_,i)=>i); }
function _dPos(songIdx) { const dl = _dList(); const p = dl.indexOf(songIdx); return p >= 0 ? p : 0; }
function _dSong(pos) { const dl = _dList(); return dl[Math.max(0, Math.min(pos, dl.length-1))] || 0; }
function _dLen() { return _dList().length; }

function getNextFavSong(cur) {
  const favs = getFavorites().sort((a,b)=>a-b);
  if (favs.length === 0) return (cur + 1) % songs.length;
  for (const f of favs) { if (f > cur) return f; }
  return favs[0]; // 순환
}
function getPrevFavSong(cur) {
  const favs = getFavorites().sort((a,b)=>a-b);
  if (favs.length === 0) return (cur - 1 + songs.length) % songs.length;
  for (let i = favs.length - 1; i >= 0; i--) { if (favs[i] < cur) return favs[i]; }
  return favs[favs.length - 1]; // 순환
}

let adPlaying = false, adCountdown = 0, adSongIdx = -1, adStartTime = 0;
const AD_DURATION = 5; // 테스트 광고 5초

function watchAdForSong(idx) {
  closeUnlockPopup();
  adPlaying = true;
  adSongIdx = idx;
  adCountdown = AD_DURATION;
  adStartTime = performance.now();
}
function updateAd(dt) {
  if (!adPlaying) return;
  adCountdown = Math.max(0, AD_DURATION - (performance.now() - adStartTime) / 1000);
}
function finishAd() {
  adPlaying = false;
  addSongFreePlay(adSongIdx);

function renderAd() {
  if (!adPlaying) return;
  // 풀스크린 광고 오버레이
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  // 테스트 광고 배너
  const bw = Math.min(sz(300), W * 0.8), bh = sz(180);
  const bx = (W - bw) / 2, by = H * 0.25;
  ctx.fillStyle = '#1a1a2e'; rrFill(bx, by, bw, bh, sz(12));
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; rrStroke(bx, by, bw, bh, sz(12));
  // 광고 텍스트
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${sz(18)}px sans-serif`; ctx.fillStyle = '#ffd700';
  ctx.fillText('NANO RHYTHM', W/2, by + sz(40));
  ctx.font = `${sz(13)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('테스트 광고', W/2, by + sz(65));
  ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('실제 광고 SDK 연동 시 이 화면이 교체됩니다', W/2, by + sz(90));
  // 프로그레스 바
  const pbw = bw * 0.6, pbh = sz(4);
  const pbx = (W - pbw) / 2, pby = by + sz(120);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rrFill(pbx, pby, pbw, pbh, 2);
  const prog = 1 - adCountdown / AD_DURATION;
  ctx.fillStyle = '#ffd700'; rrFill(pbx, pby, pbw * prog, pbh, 2);
  // 카운트다운 / 완료 버튼
  const btnY = H * 0.68;
  if (adCountdown > 0) {
    ctx.font = `bold ${sz(14)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(Math.ceil(adCountdown) + '초 후 닫기 가능', W/2, btnY);
  } else {
    const cbw = sz(160), cbh = sz(40);
    const cbx = (W - cbw) / 2;
    ctx.fillStyle = '#ffd700'; rrFill(cbx, btnY, cbw, cbh, sz(10));
    ctx.font = `bold ${sz(15)}px sans-serif`; ctx.fillStyle = '#000';
    ctx.fillText('1회 무료 받기', W/2, btnY + cbh/2);
    adBtnArea = { x: cbx, y: btnY, w: cbw, h: cbh };
  }
}

let songAudio = null;
let songPreviewAudio = null;
let usingStemMode = false;
let allStemAudios = [];  // 7 Audio elements for all stems
let stemSyncTime = 0;    // 스템 동기화 보정 타이머

function stopSongAudio() {
  // ABS 정리
  if (window._absNodes) { for (const s of window._absNodes) { if (s) try { s.stop(); } catch(e){} } window._absNodes = null; }
  if (window._absGains) { for (const g of window._absGains) { if (g) try { g.disconnect(); } catch(e){} } window._absGains = null; }
  window._absStartCtx = null; window._absPausedAt = null;
  if (songAudio) { songAudio.pause(); songAudio.currentTime = 0; songAudio = null; }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) { allStemAudios[i].pause(); allStemAudios[i].currentTime = 0; }
  }
  allStemAudios = [];
  for (const a of pulseStemAudios) { if (a) { a.pause(); a.src = ''; } }
  pulseStemAudios = [];
  // iOS Blob URL 해제 (메모리 누수 방지)
  for (const k in stemBlobUrls) {
    try { URL.revokeObjectURL(stemBlobUrls[k]); } catch(e) {}
    delete stemBlobUrls[k];
  }
  usingStemMode = false;
  gamePaused = false;
}
function fadeOutSongAudio(duration) {
  const step = 0.05;
  const interval = (duration * 1000) / (1 / step);
  const targets = [];
  // 현재 볼륨 저장
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) targets.push(allStemAudios[i]);
  }
  if (songAudio) targets.push(songAudio);
  if (targets.length === 0) return;
  const fadeStep = () => {
    let allDone = true;
    for (const a of targets) {
      if (a.volume > 0.01) { a.volume = Math.max(0, a.volume - step); allDone = false; }
      else a.volume = 0;
    }
    if (!allDone) setTimeout(fadeStep, interval);
    else stopSongAudio();
  };
  fadeStep();
}
function stopSongPreview() {
  if (songPreviewAudio) {
    songPreviewAudio.pause(); songPreviewAudio.currentTime = 0;
    songPreviewAudio = null;
  }
}

function codeToLabel(code) {
  if (code === 'Space') return 'SPACE';
  if (code === 'Semicolon') return ';';
  if (code === 'Quote') return "'";
  if (code === 'BracketLeft') return '[';
  if (code === 'BracketRight') return ']';
  if (code === 'Backslash') return '\\';
  if (code === 'Comma') return ',';
  if (code === 'Period') return '.';
  if (code === 'Slash') return '/';
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  if (code.startsWith('Arrow')) return '←↑→↓'[['Left','Up','Right','Down'].indexOf(code.slice(5))] || code;
  return code.replace('Shift','⇧').replace('Control','Ctrl').replace('Alt','Alt');
}

// ===== LEVEL RATING =====
// 곡+난이도별 레벨(1~15) 계산: 노트 밀도, BPM, 홀드, 트랩 고려
function calcLevel(songIdx, diffIdx) {
  const song = songs[songIdx];
  const diff = DIFFICULTIES[diffIdx];
  const pat = song.pattern;
  const patHits = pat.filter(v => v).length; // 16비트 중 노트 있는 수
  const patDensity = patHits / 16; // 0~1
  // 기본 요소들
  const bpmScore = song.bpm / 60;              // 빠를수록 높음 (1.5~2.7)
  const densityScore = patDensity * 5;          // 패턴 밀도 (0~5)
  const diffMul = diff.noteDensity;             // 난이도 밀도 배율
  const holdScore = diff.holdEvery > 0 ? (15 / diff.holdEvery) : 0;  // 홀드 빈도
  const drainScore = diff.hpDrain * 12;         // HP 감소
  // 종합 점수 (키 수 많을수록 난이도 상승)
  const laneBonus = Math.max(0, (laneCount - 4) * 0.4);
  const raw = (bpmScore + densityScore) * diffMul + holdScore + drainScore + laneBonus;
  // 1~15 범위로 매핑 (하향 스케일)
  return Math.max(1, Math.min(15, Math.round(raw * 0.85)));
}

function getDeviceFingerprint() {
  const data = [navigator.userAgent, screen.width+'x'+screen.height,
    Intl.DateTimeFormat().resolvedOptions().timeZone, navigator.language,
    (navigator.hardwareConcurrency||''), (screen.colorDepth||'')].join('|');
  let hash = 0;
  for (let i = 0; i < data.length; i++) { hash = ((hash << 5) - hash) + data.charCodeAt(i); hash |= 0; }
  return 'guest_' + Math.abs(hash).toString(36);
}

function handleAuthSuccess(uid, method) {
  pendingAuthUid = uid;
  pendingAuthMethod = method;
  loginAuthPending = false;

  // kplay: name이 이미 제공되므로 바로 completeLogin (닉네임 입력 생략)
  if (method === 'kplay' && window.kplay && window.kplay.user && window.kplay.user.name) {
    completeLogin(window.kplay.user.name, method);
    return;
  }

  // 게스트: localStorage에 저장된 닉네임이 있으면 즉시 접속
  if (method === 'guest') {
    const guestNick = safeGetItem('rhythm_guestNickname_' + uid);
    if (guestNick) { completeLogin(guestNick, method); return; }
  }

  let nickResolved = false;
  const nickTimeout = setTimeout(() => {
    if (!nickResolved) { nickResolved = true; showNicknameInput(); }
  }, 500);
  try {
    // nicknames에서 uid로 닉네임 역조회
    fbDb.ref('nicknames').once('value', snap => {
      if (nickResolved) return;
      nickResolved = true; clearTimeout(nickTimeout);
      const all = snap.val() || {};
      let found = '';
      for (const nick in all) { if (all[nick] === uid) { found = nick; break; } }
      if (found) {
        if (method === 'guest') safeSetItem('rhythm_guestNickname_' + uid, found);
        completeLogin(found, method);
      } else {
        showNicknameInput();
      }
    });
  } catch(e) {
    if (!nickResolved) { nickResolved = true; clearTimeout(nickTimeout); showNicknameInput(); }
  }
}

function socialSignIn(provider, method) {
  if (loginAuthPending) return;
  if (!fbAuth || !provider) {
    showLoginToast(method + ' \uB85C\uADF8\uC778\uC744 \uC0AC\uC6A9\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.', '#ff6666');
    return;
  }
  loginAuthPending = true;
  const useMobile = isMobile || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (useMobile) {
    safeSetItem('rhythm_pendingAuthMethod', method);
    fbAuth.signInWithRedirect(provider).catch(e => {
      loginAuthPending = false;
      showLoginToast(method + ' \uB85C\uADF8\uC778 \uC2E4\uD328', '#ff6666');
    });
  } else {
    fbAuth.signInWithPopup(provider).then(r => {
      handleAuthSuccess(r.user.uid, method);
    }).catch(e => {
      loginAuthPending = false;
      if (e.code === 'auth/popup-closed-by-user') {
        // 팝업 닫힘 → 조용히 해제
      } else if (e.code === 'auth/unauthorized-domain') {
        showLoginToast('\uB3C4\uBA54\uC778 \uBBF8\uB4F1\uB85D: ' + location.hostname, '#ff6666',
          'Firebase Console \u2192 Auth \u2192 Settings \u2192 \uC2B9\uC778\uB41C \uB3C4\uBA54\uC778\uC5D0 \uCD94\uAC00');
      } else if (e.code === 'auth/operation-not-allowed') {
        showLoginToast(method + ' \uB85C\uADF8\uC778 \uBBF8\uD65C\uC131\uD654', '#ff6666',
          'Firebase Console \u2192 Auth \u2192 Sign-in method\uC5D0\uC11C \uD65C\uC131\uD654');
      } else {
        showLoginToast(method + ' \uC2E4\uD328: ' + (e.code || ''), '#ff6666', e.message || '');
      }
    });
    // 팝업 닫고 돌아오면 catch가 안 탈 수 있음 → focus로 즉시 해제
    const onFocus = () => {
      setTimeout(() => { if (loginAuthPending) loginAuthPending = false; }, 100);
      window.removeEventListener('focus', onFocus);
    };
    window.addEventListener('focus', onFocus);
  }
}

// 점수 키: `{songIdx}_{diffIdx}_{laneCount}` (신형). 레거시: `{songIdx}_{diffIdx}` = 4K
function _scoreKey(songIdx, diffIdx, lc) { return songIdx + '_' + diffIdx + '_' + lc; }
function _legacyKey(songIdx, diffIdx) { return songIdx + '_' + diffIdx; }
// Firebase 글로벌 랭킹 캐시: key(songIdx_diffIdx_lc) → { user: { score, ts } | number(legacy) }
let fbRankingsCache = {};
// 로컬 점수 엔트리 해석: 숫자(레거시) 또는 { score, ts } 객체
function _scoreValue(v) { return (v != null && typeof v === 'object') ? (v.score || 0) : (v || 0); }
function _scoreTs(v) { return (v != null && typeof v === 'object') ? (v.ts || 0) : 0; }
function saveScore(songIdx, diffIdx, newScore, lc) {
  if (!currentUser) return;
  if (lc == null) lc = laneCount;
  const all = getAllScores();
  if (!all[currentUser]) all[currentUser] = {};
  const key = _scoreKey(songIdx, diffIdx, lc);
  const prevEntry = all[currentUser][key];
  const prev = _scoreValue(prevEntry);
  if (newScore > prev) {
    // 첫 기록 또는 갱신: 새 타임스탬프
    const entry = { score: newScore, ts: Date.now() };
    all[currentUser][key] = entry;
    safeSetItem('rhythm_allScores', JSON.stringify(all));

// 특정 key의 Firebase 랭킹 실시간 구독 (랭킹 화면 진입 시 호출)
const _fbRankingSubs = {};
function subscribeFbRanking(songIdx, diffIdx, lc) {
  if (!fbDb) return;
  const key = _scoreKey(songIdx, diffIdx, lc);
  if (_fbRankingSubs[key]) return;
  _fbRankingSubs[key] = true;
  fbDb.ref('scores/' + key).on('value', snap => {

}
function getMyBest(songIdx, diffIdx, lc) {
  if (!currentUser) return 0;
  if (lc == null) lc = laneCount;
  const all = getAllScores();
  if (!all[currentUser]) return 0;
  const key = _scoreKey(songIdx, diffIdx, lc);
  if (all[currentUser][key] != null) return _scoreValue(all[currentUser][key]);
  // 레거시 폴백: 4K에서만 이전 키 사용
  if (lc === 4 && all[currentUser][_legacyKey(songIdx, diffIdx)] != null) {
    return _scoreValue(all[currentUser][_legacyKey(songIdx, diffIdx)]);

}
function getRankings(songIdx, diffIdx, lc) {
  if (lc == null) lc = laneCount;
  const key = _scoreKey(songIdx, diffIdx, lc);
  const legacyKey = _legacyKey(songIdx, diffIdx);
  // Firebase 글로벌 + 로컬 병합 (최대 점수, 동률 시 더 이른 ts 우선)
  const merged = {}; // user → { score, ts }
  function _merge(user, sc, ts) {
    if (!sc || sc <= 0) return;
    const cur = merged[user];
    if (!cur || sc > cur.score) {
      merged[user] = { score: sc, ts: ts || 0 };
    } else if (sc === cur.score && ts && (!cur.ts || ts < cur.ts)) {
      merged[user] = { score: sc, ts: ts };
    }
  }
  // 1) Firebase 글로벌 랭킹
  const fbData = fbRankingsCache[key] || {};
  for (const user in fbData) {
    _merge(user, _scoreValue(fbData[user]), _scoreTs(fbData[user]));
  }
  // 2) 로컬 점수도 병합 (오프라인 기록 보장)
  const all = getAllScores();
  for (const user in all) {
    let v = all[user][key];
    if (v == null && lc === 4) v = all[user][legacyKey];
    _merge(user, _scoreValue(v), _scoreTs(v));
  }
  const list = [];
  for (const user in merged) list.push({ name: user, score: merged[user].score, ts: merged[user].ts });
  // 점수 내림차순 → 동률 시 먼저 등록(ts 작은 순)이 상위
  list.sort((a, b) => b.score - a.score || (a.ts || 0) - (b.ts || 0));

  return list.slice(0, 100);
}

const SCORE_THRESHOLDS = [200000, 400000, 600000, 800000];
const GRADE_ORDER = ['C','B','A','S','P'];
const GRADE_COINS = { C: 25, B: 50, A: 100, S: 200, P: 500 };
const SCORE_COINS = { 200000: 50, 400000: 100, 600000: 200, 800000: 500 };
const DIFF_COINS = [25, 50, 100, 200];

function generateAchievements() {
  const achs = [];
  songs.forEach((s, si) => {
    // Grade achievements
    GRADE_ORDER.forEach(g => {
      const minPct = g==='S'?0.98:g==='A'?0.90:g==='B'?0.80:0.60;
      const glabel = g==='P' ? `${s.name} — PERFECT 클리어` : `${s.name} — ${g}등급 이상 클리어`;
      achs.push({ id:`s${si}_grade_${g}`, songIdx:si, type:'grade',
        label: glabel, coins: GRADE_COINS[g],
        check: d => d.songIdx===si && d.gauge>0 && (g==='P' ? d.missed===0 : d.pct>=minPct) });
    });
    // Score achievements
    SCORE_THRESHOLDS.forEach(t => {
      achs.push({ id:`s${si}_score_${t}`, songIdx:si, type:'score',
        label:`${s.name} — ${t.toLocaleString()}점 이상`, coins: SCORE_COINS[t],
        check: d => d.songIdx===si && d.score>=t });
    });
    // Difficulty achievements
    DIFFICULTIES.forEach((d, di) => {
      achs.push({ id:`s${si}_diff_${di}`, songIdx:si, type:'diff',
        label:`${s.name} — ${d.name} 클리어`, coins: DIFF_COINS[di],
        check: dd => dd.songIdx===si && dd.diffIdx===di && dd.gauge>0 });
    });
    // Speed achievements
    SPEED_OPTIONS.forEach((sp, spi) => {
      achs.push({ id:`s${si}_speed_${spi}`, songIdx:si, type:'speed',
        label:`${s.name} — ${sp.toFixed(1)}x 클리어`, coins: SPEED_COINS[spi] || 100,
        check: d => d.songIdx===si && d.speedIdx===spi && d.gauge>0 });
    });
  });

}

function flushLocalPlaysToFb() {
  const local = getLocalPlays();
  const pending = Object.keys(local);
  if (pending.length === 0) return;
  for (const key of pending) {
    const entry = local[key];
    if (!entry.logs || entry.logs.length === 0) continue;
    for (const ts of entry.logs) {
      fbDb.ref('plays/' + key + '/logs').push(ts);
    }
    fbDb.ref('plays/' + key + '/total').transaction(cur => (cur || 0) + (entry.total || 0));
  }
  // 동기화 완료 후 로컬 보류 큐 초기화
  safeRemoveItem('rhythm_localPlays');

let lastLogCleanup = 0;
function cleanupOldLogs() {
  const now = Date.now();
  if (now - lastLogCleanup < 60*60*1000) return; // 1시간마다
  lastLogCleanup = now;
  const weekAgo = now - 7*24*60*60*1000;
  for (const key in fbPlayData) {
    const entry = fbPlayData[key];
    if (!entry.logs) continue;
    for (const pushId in entry.logs) {
      if (entry.logs[pushId] < weekAgo) {
        fbDb.ref('plays/' + key + '/logs/' + pushId).remove();
      }
    }
  }
}

  const kstDow = kstNow.getUTCDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const todayStartMs = Date.UTC(kstY, kstM, kstD) - KST_OFFSET; // KST 오늘 00:00 → UTC ms
  const daysFromMon = (kstDow + 6) % 7; // Mon=0, Sun=6
  const weekStartMs = todayStartMs - daysFromMon * 24 * 60 * 60 * 1000; // KST 이번 주 월요일 00:00

  const list = [];
  for (let i = 0; i < songs.length; i++) {
    const entry = getMergedPlayData(i);
    const total = entry.total || 0;
    const logs = Array.isArray(entry.logs) ? entry.logs : (entry.logs ? Object.values(entry.logs) : []);
    let count = 0;
    let firstTs = Infinity; // 해당 기간 내 가장 이른 플레이 시각
    if (type === 'top') {
      count = total;
      for (const t of logs) if (t < firstTs) firstTs = t;
    }
    else if (type === 'daily') {
      for (const t of logs) {
        if (t >= todayStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    else if (type === 'weekly') {
      for (const t of logs) {
        if (t >= weekStartMs) { count++; if (t < firstTs) firstTs = t; }
      }
    }
    list.push({ idx: i, count, firstTs });
  }
  // count=0인 곡 제외 (DAILY/WEEKLY에서 기록 없는 곡 숨김), TOP은 전부 표시
  const filtered = type === 'top' ? list : list.filter(item => item.count > 0);
  // 정렬: count 내림차순 → 동률 시 먼저 플레이된 곡(firstTs 오름차순) → 그래도 동률이면 songIdx
  filtered.sort((a, b) => b.count - a.count || (a.firstTs - b.firstTs) || (a.idx - b.idx));
  return filtered;
}

// ===== SEEDED RNG =====
function seededRng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// ===== NODE GENERATION =====
let songEnergyMap = null; // 0.5초 단위 에너지 (0~1), 드럼 기준

function generateNodes(song, diff, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);

  const sixteenthDur = 15 / song.bpm;
  const eighthDur = sixteenthDur * 2;
  const totalSixteenths = song.bars * 16;
  // 낙하 시간 = 히트라인까지 거리 / 노트 속도 → 카운트다운 끝나면 상단에서 등장
  const fallTime = getHitY() / calcNoteSpeed(song.bpm, selectedSpeed || 1);
  const startDelay = fallTime;
  let noteIdx = 0;
  const baseDensity = diff.noteDensity;
  const densityMul = 1 + Math.max(0, laneCount - 4) * 0.09;
  const density = Math.min(baseDensity * densityMul, 1.8);
  const chordChance = laneCount >= 6 ? (baseDensity >= 1.3 ? 0.45 : baseDensity >= 1.0 ? 0.35 : baseDensity >= 0.75 ? 0.25 : 0.15) : 0;
  const pat = song.pattern;

  // 곡별 고유 레인 시퀀스 생성 (시드 기반 → 매번 동일, 곡마다 다름)
  const songLaneSeq = [];
  const seqLen = Math.max(LANE_SEQ.length * 2, 32);
  for (let si = 0; si < seqLen; si++) {
    // 연속 같은 레인 방지: 이전 레인과 다른 레인 선택
    let nl = Math.floor(rng() * laneCount);
    if (si > 0 && nl === songLaneSeq[si - 1]) nl = (nl + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
    songLaneSeq.push(nl);
  }

  // Generate notes from rhythm pattern
  for (let i = 0; i < totalSixteenths; i++) {
    const pos = i % 16;
    if (!pat[pos]) continue;
    // 에너지 기반 밀도 조절: 조용한 구간에서는 밀도를 낮춤
    const noteTime = i * sixteenthDur + startDelay;
    let localDensity = density;
    if (energyMap && energyMap.length > 0) {
      const eIdx = Math.min(Math.floor(noteTime / 0.5), energyMap.length - 1);
      const energy = eIdx >= 0 ? energyMap[eIdx] : 1;
      // 무음 구간 제거
      if (energy < 0.02) continue;
      // 조용한 구간: 밀도 축소
      if (energy < 0.15) localDensity = density * (energy / 0.15);
    }
    // Density filtering
    if (localDensity < 1 && rng() > localDensity) continue;
    // For hell mode, sometimes add extra notes on off-beats (에너지 기반 밀도 적용)
    if (localDensity > 1 && pos % 2 === 1 && rng() < (localDensity - 1) * 0.5) {
      const eLane = Math.floor(rng() * laneCount);
      const eFreq = 440;
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: eLane, freq: eFreq, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
    }
    const lane = songLaneSeq[noteIdx % songLaneSeq.length];
    const freq = 440;
    const nd = {
      time: i * sixteenthDur + startDelay,
      lane, freq, type: 'note',
      hit: false, missed: false,
      holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    // Hold notes based on difficulty
    const holdEvery7 = laneCount >= 6 ? Math.max(4, Math.floor((diff.holdEvery || 999) * 0.7)) : diff.holdEvery;
    if (holdEvery7 > 0 && noteIdx > 0 && noteIdx % holdEvery7 === 0 && i + 6 < totalSixteenths) {
      const holdLen = 2 + Math.floor(rng() * 2);
      nd.type = 'hold';
      nd.endTime = nd.time + holdLen * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;

    // 7키 동시노트: 같은 타이밍에 다른 레인에 추가 노트
    if (chordChance > 0 && rng() < chordChance) {
      const usedLanes = [lane];
      let chordLane = Math.floor(rng() * laneCount);
      if (chordLane === lane) chordLane = (chordLane + 1 + Math.floor(rng() * (laneCount - 1))) % laneCount;
      usedLanes.push(chordLane);
      nodes.push({
        time: i * sixteenthDur + startDelay,
        lane: chordLane, freq: 440, type: 'note',
        hit: false, missed: false,
        holding: false, holdComplete: false,
        endTime: 0, _ho1: null, _ho2: null, _hg: null
      });
      noteIdx++;
      // 지옥: 15% 확률로 트리플 노트
      if (baseDensity >= 1.3 && rng() < 0.15) {
        let triLane;
        do { triLane = Math.floor(rng() * laneCount); } while (usedLanes.includes(triLane));
        nodes.push({
          time: i * sixteenthDur + startDelay,
          lane: triLane, freq: 440, type: 'note',
          hit: false, missed: false,
          holding: false, holdComplete: false,
          endTime: 0, _ho1: null, _ho2: null, _hg: null
        });
        noteIdx++;
      }
    }
  }

  // Remove notes that overlap with hold durations in same lane
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;

  // Traps based on difficulty (7키: 트랩 빈도 증가)
  const trapInt = laneCount >= 6 && diff.trapInterval > 0 ? Math.max(3, diff.trapInterval - 1) : diff.trapInterval;
  if (trapInt > 0) {
    for (let i = 20; i < totalSixteenths; i += trapInt * 2 + Math.floor(rng() * Math.max(1, trapInt * 2))) {
      const t = i * sixteenthDur + startDelay;
      const lane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) {
        if (n.lane !== lane) continue;
        if (n.type === 'hold' && t >= n.time - eighthDur*0.5 && t <= n.endTime + eighthDur*0.5) { conflict = true; break; }
        if (Math.abs(n.time - t) < sixteenthDur * 0.8) { conflict = true; break; }
      }
      if (!conflict) nodes.push({ time: t, lane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // 노트 기반 최소 길이 (실제 오디오 길이로 나중에 갱신됨)
  songDuration = totalSixteenths * sixteenthDur + startDelay + 2;
}

// 오디오 로드 후 실제 길이로 songDuration 갱신 + 노드 재생성
function updateSongDurationFromAudio() {

  if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && allStemAudios[0].duration) {
    audioDur = allStemAudios[0].duration;
  } else if (songAudio && songAudio.duration) {
    audioDur = songAudio.duration;
  }
  if (audioDur > 0 && isFinite(audioDur)) {
    // 오디오 길이에 맞춰 bars와 노트 재생성 (마지막 5초는 아웃트로)
    if (curSong) {
      const sixteenthDur = 15 / curSong.bpm;
      curSong._audioBars = Math.max(1, Math.floor((audioDur - 1) / (sixteenthDur * 16)));
    }
    // songDuration = 오디오 길이 + 2초 여운
    songDuration = audioDur + 2;
  }
}

  selectDragX = -1;
}, { passive: false });

// ===== HIT DETECTION =====
function handleLanePress(lane) {
  const hitY = getHitY();
  let closest = null, closestDist = Infinity;

  for (const n of nodes) {
    if (n.hit || n.missed) continue;
    if (n.lane !== lane) continue;
    const sy = hitY - (n.time - gameTime) * noteSpeed;
    const dist = Math.abs(sy - hitY);
    if (dist < getHitWindow() && dist < closestDist) { closest = n; closestDist = dist; }
  }
  if (!closest) { playEmptyPressSfx(lane); return; }
  closest.hit = true;

  if (closest.type === 'trap') {
    nanoMiss();
    playDissonance(); combo = 0; fever = false; feverTimer = 0;
    if (!devInvincible && playMode === 'normal') gauge = Math.max(0, gauge - (curDiff ? curDiff.hpDrain * 2 : 0.08));
    judgmentText = 'TRAP!'; judgmentTimer = 0.7; judgmentColor = '#ff3333'; judgmentPriority = 2;
    shakeX = (Math.random()-0.5)*18; shakeY = (Math.random()-0.5)*12;
    playerAnim = -0.3;
    spawnParticles(getLaneX(lane), hitY, '#ff3333', 8);
  } else if (closest.type === 'hold') {
    // Start hold — 거리 기반 판정
    let holdGrade;
    const _hs = getHeightScale();
    if (closestDist < 22 * _hs) holdGrade = 'perfect';
    else if (closestDist < 42 * _hs) holdGrade = 'great';
    else holdGrade = 'good';
    if (closest.stem != null) nanoHit();
    playHoldStartSfx();
    startHoldSound(closest);
    closest.holding = true;
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + curDiff.hpGain * fm);
    let pts, txt, col;
    const _hsH = getHeightScale();
    if (closestDist < 22 * _hsH) { pts=100; txt='HOLD!'; col='#ffd700'; }
    else if (closestDist < 42 * _hsH) { pts=75; txt='HOLD!'; col='#00d4ff'; }
    else { pts=40; txt='HOLD'; col='#44dd66'; }
    score += Math.floor(pts * fm * Math.min(1 + combo * 0.01, 2.0) * getKeyBonus());
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.2;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], 6);
  } else {
    let pts, txt, col;
    let grade;
    const _hs2 = getHeightScale();
    if (closestDist < 28 * _hs2) { pts=200; txt='PERFECT'; col='#ffd700'; grade='perfect'; }
    else if (closestDist < 52 * _hs2) { pts=150; txt='GREAT'; col='#00d4ff'; grade='great'; }
    else { pts=80; txt='GOOD'; col='#44dd66'; grade='good'; }
    if (closest.stem != null) nanoHit();
    combo++; if (combo > maxCombo) maxCombo = combo;
    checkFeverActivate();
    const fm = fever ? 2 : 1;
    gauge = Math.min(1, gauge + curDiff.hpGain * fm);
    score += Math.floor(pts * fm * Math.min(1 + combo * 0.01, 2.0) * getKeyBonus());
    collected++;
    if (judgmentPriority < 2) { judgmentText = txt; judgmentTimer = 0.5; judgmentColor = col; judgmentPriority = 0; }
    playerAnim = 0.3;
    spawnParticles(getLaneX(lane), hitY, LANE_COLORS[lane], fever ? 8 : 5);
    spawnBurst(getLaneX(lane), hitY, grade);
  }
}

function spawnParticles(x, y, color, count) {
  if (particles.length > 150) return; // 상한선 축소: 메모리/GC 스파이크 방지
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, sp = 60+Math.random()*180;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-60,
      life: 0.4+Math.random()*0.3, maxLife: 0.7, color, size: 3+Math.random()*5 });
  }
}

function spawnBurst(x, y, grade) {
  const conf = {
    perfect: { color1: '#ffd700', color2: '#fff7aa', color3: '#ff8800', rings: 3, sparks: 14, size: 1.8 },
    great:   { color1: '#00d4ff', color2: '#aaeeff', color3: '#0088ff', rings: 2, sparks: 10, size: 1.3 },
    good:    { color1: '#44dd66', color2: '#aaffbb', color3: '#22aa44', rings: 1, sparks: 6, size: 1.0 },
  }[grade];
  bursts.push({ x, y, time: 0, maxTime: 0.6, ...conf });
  // Big spark particles
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.PI * 2 * i / conf.sparks + (Math.random() - 0.5) * 0.4;
    const sp = (180 + Math.random() * 280) * conf.size;
    const col = Math.random() > 0.5 ? conf.color2 : conf.color1;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 120,
      life: 0.5 + Math.random()*0.4, maxLife: 0.9, color: col, size: 4 + Math.random()*7 });
  }
  // Extra scattered debris
  for (let i = 0; i < conf.sparks; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (60 + Math.random() * 350) * conf.size;
    particles.push({ x: x + (Math.random()-0.5)*20, y: y + (Math.random()-0.5)*10,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 150,
      life: 0.3 + Math.random()*0.5, maxLife: 0.8, color: conf.color3, size: 2 + Math.random()*5 });
  }
}

// ===== ONSET DETECTION =====
function detectOnsets(audioBuffer) {
  if (!audioBuffer) return [];
  const data = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const winSamples = Math.floor(sr * 0.015); // 15ms 윈도우
  const minGapSamples = Math.floor(sr * 0.03); // 30ms 최소 간격
  const onsets = [];
  let smoothed = 0;
  let lastOnset = -minGapSamples * 2;
  for (let i = 0; i < data.length; i += winSamples) {
    let sum = 0, cnt = 0;
    const end = Math.min(i + winSamples, data.length);
    for (let k = i; k < end; k += 8) { sum += data[k] * data[k]; cnt++; }
    const energy = cnt > 0 ? Math.sqrt(sum / cnt) : 0;
    if (energy > 0.003 && energy > smoothed * 1.1 && i - lastOnset > minGapSamples) {
      onsets.push(i / sr);
      lastOnset = i;
    }
    smoothed = energy * 0.2 + smoothed * 0.8;
  }
  return onsets;
}

function generateNodesFromOnsets(song, diff, onsetsByStem, energyMap) {
  nodes = [];
  nodeScanStart = 0;
  const songIdx = songs.indexOf(song);
  const diffIdx = DIFFICULTIES.indexOf(diff);
  const seed = (songIdx + 1) * 10000 + (diffIdx + 1) * 100 + song.bpm;
  const rng = seededRng(seed);
  const bgmDelay = 3.5;
  song._startDelay = bgmDelay;
  song._onsetMode = true;
  const sixteenth = 15 / song.bpm;

  // 모든 stem onset을 하나로 합치되 stem 정보 유지 (vocals 제외)
  let allOnsets = [];
  for (const si in onsetsByStem) {
    if (ALWAYS_AUDIBLE_STEMS.includes(Number(si))) continue;
    for (const t of onsetsByStem[si]) {
      allOnsets.push({ time: t + bgmDelay, stem: Number(si) });
    }
  }
  // 곡별 스템 완전 제외 (excludeStems: [stemIdx, ...])
  // 스템 인덱스: 0=drums, 1=bass, 2=vocals, 3=instrum, 4=piano, 5=guitar, 6=other
  const exStems = song.excludeStems || [];
  if (exStems.length > 0) {
    allOnsets = allOnsets.filter(o => !exStems.includes(o.stem));
  }

  // ===== 자동 ambient/조용한 구간 필터 =====
  // MUSICAL_STEMS 중 하나라도 절대 RMS > 0.003 인 버킷만 "음악적"으로 판정
  // 조용한 구간(intro, outro, 새소리 등)은 onset 자동 drop
  if (typeof stemAudioBuffers === 'object' && stemAudioBuffers) {
    const MUSICAL_STEMS = [0, 1, 3, 4, 5]; // drums, bass, instrum, piano, guitar
    const BUCKET_SEC = 0.5;
    const ABS_FLOOR = 0.02; // 사람이 들리는 수준
    const stemBucketRms = {};
    let maxBuckets = 0;
    for (const si of MUSICAL_STEMS) {
      const buf = stemAudioBuffers[si];
      if (!buf) continue;
      const d = buf.getChannelData(0);
      const sr_ = buf.sampleRate;
      const bs = Math.floor(sr_ * BUCKET_SEC);
      const nb = Math.ceil(d.length / bs);
      maxBuckets = Math.max(maxBuckets, nb);
      const arr = new Float32Array(nb);
      for (let b = 0; b < nb; b++) {
        let s0 = b * bs, s1 = Math.min(s0 + bs, d.length), sum = 0, c = 0;
        for (let k = s0; k < s1; k += 32) { sum += d[k] * d[k]; c++; }
        arr[b] = c > 0 ? Math.sqrt(sum / c) : 0;
      }
      stemBucketRms[si] = arr;
    }
    const isMusical = [];
    for (let b = 0; b < maxBuckets; b++) {
      let musical = false;
      for (const si of MUSICAL_STEMS) {
        const arr = stemBucketRms[si];
        if (arr && (arr[b] || 0) > ABS_FLOOR) { musical = true; break; }
      }
      isMusical.push(musical);
    }
    // 앞뒤 1버킷 padding (갑작스런 끊김 방지)
    const paddedMusical = isMusical.slice();
    for (let b = 0; b < isMusical.length; b++) {
      if (isMusical[b]) {
        if (b > 0) paddedMusical[b - 1] = true;
        if (b < isMusical.length - 1) paddedMusical[b + 1] = true;
      }
    }
    const before = allOnsets.length;
    allOnsets = allOnsets.filter(o => {
      const relT = o.time - bgmDelay;
      const bi = Math.floor(relT / BUCKET_SEC);
      if (bi < 0 || bi >= paddedMusical.length) return true;
      return paddedMusical[bi];
    });
    if (before !== allOnsets.length) {
      console.log('ambient filter: ' + (before - allOnsets.length) + ' onsets dropped');
    }

  }

  allOnsets.sort((a, b) => a.time - b.time);

  // BPM 그리드에 퀀타이즈 (16분음표)
  for (const o of allOnsets) {
    const rel = o.time - bgmDelay;
    o.time = Math.round(rel / sixteenth) * sixteenth + bgmDelay;
  }

  // 에너지 부여
  if (energyMap && energyMap.length > 0) {
    for (const o of allOnsets) {
      const eIdx = Math.min(Math.floor((o.time - bgmDelay) / 0.5), energyMap.length - 1);
      o.energy = eIdx >= 0 ? energyMap[eIdx] : 1;
    }
  } else {
    for (const o of allOnsets) o.energy = 1;
  }

  // 너무 가까운 onset 병합 (동시노트 후보)
  const merged = [];
  for (const o of allOnsets) {
    if (merged.length > 0 && Math.abs(o.time - merged[merged.length - 1].time) < 0.03) {
      if (!merged[merged.length - 1].extra) merged[merged.length - 1].extra = [];
      merged[merged.length - 1].extra.push(o);
      continue;
    }
    merged.push(o);
  }

  // 하한 필터 제거: quiet 구간(피아노 인트로 등) 노트 드랍 방지
  const nonSilent = merged;

  // 난이도 필터링 (815d64e 원본: 음악 분음표 기준)
  const density = diff.noteDensity;
  const minGap = density <= 0.5 ? sixteenth * 4    // 쉬움: 4분음표
               : density <= 0.8 ? sixteenth * 2    // 보통: 8분음표
               : density <= 1.2 ? sixteenth * 1.5  // 어려움: 점8분음표
               : sixteenth;                        // 지옥: 16분음표
  const filtered = [];
  if (nonSilent.length > 0) {
    const songStart = nonSilent[0].time;
    const songEnd = nonSilent[nonSilent.length - 1].time;
    let slotStart = songStart;
    let nsIdx = 0;
    while (slotStart < songEnd + minGap) {
      const slotEnd = slotStart + minGap;
      let best = null, bestEnergy = -1;
      while (nsIdx < nonSilent.length && nonSilent[nsIdx].time < slotEnd) {
        if (nonSilent[nsIdx].time >= slotStart && nonSilent[nsIdx].energy > bestEnergy) {
          best = nonSilent[nsIdx]; bestEnergy = nonSilent[nsIdx].energy;
        }
        nsIdx++;
      }
      if (best) filtered.push(best);
      slotStart = slotEnd;
    }
  }

  // ===== "따단" 패턴 복구 (매우 엄격) =====
  // 버려진 onset 중 선택된 노트와 90~120ms + 에너지 100%+ (즉 전혀 약하지 않은 것)
  // 복구 상한: filtered 전체의 5% 이하
  {
    const PAIR_MIN = 0.09;
    const PAIR_MAX = 0.12;
    const ENERGY_RATIO = 1.2;
    const MAX_RESCUE_RATIO = 0.01;
    const maxRescue = Math.floor(filtered.length * MAX_RESCUE_RATIO);
    const filteredSet = new Set(filtered);
    const rescued = [];
    for (const f of filtered) {
      if (rescued.length >= maxRescue) break;
      for (const o of nonSilent) {
        if (filteredSet.has(o)) continue;
        const dt = o.time - f.time;
        if (dt < PAIR_MIN || dt > PAIR_MAX) continue;
        if (o.energy < f.energy * ENERGY_RATIO) continue;
        if (rescued.includes(o)) continue;
        rescued.push(o);
        break;
      }
    }
    filtered.push(...rescued);
    filtered.sort((a, b) => a.time - b.time);
  }

  // ===== stem 기반 레인 배분 (음악 구조 반영) =====
  const lc = laneCount;
  const holdEvery = diff.holdEvery || 999;
  const eighthDur = sixteenth * 2;

  // stem → 레인 매핑 (전 레인에 고르게 분산)
  const stemList = [...new Set(filtered.map(x => x.stem))].sort((a, b) => a - b);
  const stemBase = {};
  const songOff = songIdx % lc; // 곡마다 시작 레인 다르게
  stemList.forEach((s, i) => { stemBase[s] = (Math.floor(i * lc / Math.max(stemList.length, 1)) + songOff) % lc; });

  // stem별 내부 카운터 (같은 stem 내에서 레인 순환)
  const stemCnt = {};
  let noteIdx = 0;
  let prevLane = -1;
  let prevTime = -1;
  const SAME_LANE_MIN_GAP = 0.3; // 같은 레인 연속 허용 최소 간격 (초, 시각 overlap 방지)

  for (const o of filtered) {
    if (!stemCnt[o.stem]) stemCnt[o.stem] = 0;
    const ci = stemCnt[o.stem]++;
    const base = stemBase[o.stem] || 0;

    // stem 기반 + 시드 RNG 오프셋 (815d64e 원본 방식. seeded라 결정론.)
    let lane = (base + Math.floor(rng() * lc)) % lc;

    // 같은 레인 + 0.3s 미만 = 시각적 overlap → 시프트
    // 0.3s 이상 떨어졌으면 그대로 (연타 허용)
    if (lane === prevLane && lc > 1 && (o.time - prevTime) < SAME_LANE_MIN_GAP) {
      lane = (lane + 1) % lc;
    }

    prevLane = lane;
    prevTime = o.time;
    const nd = {
      time: o.time, lane, freq: 440, type: 'note', stem: o.stem,
      hit: false, missed: false, holding: false, holdComplete: false,
      endTime: 0, _ho1: null, _ho2: null, _hg: null
    };
    if (holdEvery > 0 && noteIdx > 0 && noteIdx % holdEvery === 0) {
      nd.type = 'hold';
      nd.endTime = nd.time + (2 + Math.floor(rng() * 2)) * eighthDur;
    }
    nodes.push(nd);
    noteIdx++;
  }

  // 트랩 추가
  const trapInt = diff.trapInterval || 0;
  if (trapInt > 0 && nodes.length > 0) {
    const songEnd = nodes[nodes.length - 1].time;
    for (let t = bgmDelay + 5; t < songEnd - 2; t += (trapInt * 2 + rng() * trapInt * 2) * sixteenth) {
      const tLane = Math.floor(rng() * laneCount);
      let conflict = false;
      for (const n of nodes) { if (Math.abs(n.time - t) < sixteenth * 2) { conflict = true; break; } }
      if (!conflict) nodes.push({ time: t, lane: tLane, freq: 0, type: 'trap', hit: false, missed: false });
    }
  }

  nodes.sort((a, b) => a.time - b.time);
  // 홀드 노트 구간 내 같은 레인 일반 노트 제거
  for (let a = 0; a < nodes.length; a++) {
    if (nodes[a].type !== 'hold') continue;
    for (let b = nodes.length - 1; b > a; b--) {
      if (nodes[b].lane === nodes[a].lane && nodes[b].time > nodes[a].time && nodes[b].time < nodes[a].endTime) {
        nodes.splice(b, 1);
      }
    }
  }
  totalNodes = nodes.filter(n => n.type !== 'trap').length;
  // songDuration from actual audio, not notes
  let maxDur = 0;
  for (const si in stemAudioBuffers) { if (stemAudioBuffers[si]) maxDur = Math.max(maxDur, stemAudioBuffers[si].duration); }
  songDuration = maxDur > 0 ? maxDur + bgmDelay + 2 : (nodes.length > 0 ? nodes[nodes.length - 1].time + 5 : 30);
}

// ===== START SONG =====
let songLoading = false, songLoadProgress = 0, songLoadTotal = 1;
let stemFirstSoundTime = {}; // 스템별 첫 소리 위치 (초)
let stemAudioBuffers = {};   // 스템별 디코딩된 AudioBuffer (곡 끝 빈노트용)
let stemOnsetCache = {};     // 스템별 onset 결과 캐시

function startSong(idx) {
  stopTitleBgm(); stopPreview(); stopSongPreview(); stopSongAudio(); resumeAudio();
  recordPlay(idx);
  curSongIdx = idx; curSong = songs[idx];
  curDiff = DIFFICULTIES[selectedDiff];
  const speedMul = selectedSpeed;
  noteSpeed = calcNoteSpeed(curSong.bpm, speedMul);
  generateNodes(curSong, curDiff);
  stemFirstSoundTime = {};
  stemAudioBuffers = {};
  stemOnsetCache = {};
  score=0; combo=0; maxCombo=0; collected=0; missed=0; window._hudRawMax=0;
  keyHeld=Array(laneCount).fill(false); keyFlash=Array(laneCount).fill(0);
  particles=[]; bursts=[]; holdGlows=[]; gameParticles=[]; countdownTime=0; gameTime=0;
  nextSixteenth=0; songStartTime=0; lastTime=0;
  judgmentText=''; judgmentTimer=0; judgmentPriority=0; playerAnim=0; gauge=1; fever=false; feverTimer=0; feverFlash=0; feverParticles=[];
  usingStemMode = false;
  stemSyncTime = 0;
  nanoFilterTarget = NANO_FILTER_CLEAR;
  nanoFilterCurrent = NANO_FILTER_CLEAR;
  if (nanoFilter) nanoFilter.frequency.value = NANO_FILTER_CLEAR;
  initStemTargets();
  allStemAudios = [];
  // 로딩 상태 시작
  songLoading = true;
  songLoadProgress = 0;
  const songLoadStart = performance.now();
  const LOAD_MIN_MS = 800; // 최소 로딩 화면 표시 시간
  const stemNames = curSong.stemNames || [];
  const stemCount = stemNames.length;
  songLoadTotal = (curSong.stemDir && stemCount > 0) ? stemCount : 1;
  let _stemsReady = false, _energyReady = false;
  let _energyStemsDone = 0, _energyStemsTotal = stemNames.filter((_,i) => !ALWAYS_AUDIBLE_STEMS.includes(i)).length;

  function finishLoading() {
    songLoading = false;
    // onset 모드: 카운트다운 없이 바로 시작 (레일 선 연출로 대체)
    countdownTime = 3.5; // onset 모드도 동일 (레일 연출 시간)
    lastTime = 0;
  }

  function tryFinalize() {
    // 스템 + 에너지 맵 모두 완료 시 최종 노트 생성 후 시작
    if (!_stemsReady || !_energyReady) return;
    // 오디오 길이 기반 bars 보정 + 에너지 맵 반영 최종 노트 생성 (1회만)
    const origBars = curSong.bars;
    if (curSong._audioBars) curSong.bars = curSong._audioBars;
    // onset 기반 노트 생성
    try {
      const onsetsByStem = {};
      for (let i = 0; i < stemNames.length; i++) {
        if (stemAudioBuffers[i]) {
          onsetsByStem[i] = detectOnsets(stemAudioBuffers[i]);
          console.log('Stem', i, stemNames[i], ':', onsetsByStem[i].length, 'onsets, first:', onsetsByStem[i][0]?.toFixed(2) + 's');
        } else {
          console.log('Stem', i, stemNames[i], ': NO BUFFER');
        }
      }
      if (Object.keys(onsetsByStem).length > 0) {
        generateNodesFromOnsets(curSong, curDiff, onsetsByStem, songEnergyMap);
        console.log('Onset notes:', nodes.length, '| First note time:', nodes[0]?.time.toFixed(2) + 's');
      } else {
        console.log('No onset buffers — fallback to pattern');
        generateNodes(curSong, curDiff, songEnergyMap);
      }
    } catch(e) {
      console.warn('onset failed, fallback:', e);
      generateNodes(curSong, curDiff, songEnergyMap);
    }
    curSong.bars = origBars;
    // 최소 표시 시간 보장
    const elapsed = performance.now() - songLoadStart;
    if (elapsed >= LOAD_MIN_MS) { finishLoading(); }
    else { setTimeout(finishLoading, LOAD_MIN_MS - elapsed); }
  }

  function onAllLoaded() {
    if (_stemsReady) return;
    _stemsReady = true;
    songLoadProgress = songLoadTotal;
    // 스템: currentTime 리셋만 (play는 생성 시 사용자 제스처에서 이미 호출됨)
    if (usingStemMode) {
      for (let k = 0; k < allStemAudios.length; k++) {
        if (allStemAudios[k]) {
          // 로딩 중 미리 seek+play+pause → 브라우저가 오디오 버퍼링 완료
          // 카운트다운 끝에서 play()만 하면 끊김 없음
          allStemAudios[k].currentTime = 0;

          allStemAudios[_si].buffer = buffer;

          // 첫 소리 위치 + 에너지맵 분석 (기존 로직 동일)
          const data = buffer.getChannelData(0);
          const sr = buffer.sampleRate;
          const bigChunk = Math.floor(sr * 0.1);
          for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {
            let peak = 0;
            const end = Math.min(j + bigChunk, data.length);

              if (maxVal > 0) for (let j = 0; j < songEnergyMap.length; j++) songEnergyMap[j] /= maxVal;

          if (_iosLoaded === stemCount) {

      }).catch(()=>{});
    }
    // 타임아웃 (iOS는 네트워크 느릴 수 있으니 15초)
    setTimeout(() => { if (songLoading) { songLoadProgress = songLoadTotal; _energyReady = true; onAllLoaded(); } }, 15000);
  } else if (curSong.stemDir && stemCount > 0) {

      allStemAudios.push(a);

      if (actx) {

        const _isEnergyStem = !ALWAYS_AUDIBLE_STEMS.includes(i);
        fetch(path).then(r => r.arrayBuffer()).then(buf => {

            stemAudioBuffers[_si] = buffer;
            if (_isEnergyStem) {
              if (!ALWAYS_AUDIBLE_STEMS.includes(_si)) stemOnsetCache[_si] = detectOnsets(buffer);
              const data = buffer.getChannelData(0);
              const sr = buffer.sampleRate;
              const bigChunk = Math.floor(sr * 0.1);
              for (let j = 0; j < Math.min(data.length, sr * 30); j += bigChunk) {
                let peak = 0;
                const end = Math.min(j + bigChunk, data.length);
                for (let k = j; k < end; k += 4) { const v = Math.abs(data[k]); if (v > peak) peak = v; }
                if (peak > 0.01) { stemFirstSoundTime[_si] = j / sr; break; }
              }
              const winSize = Math.floor(sr * 0.5);
              const mapLen = Math.ceil(data.length / winSize);
              if (!songEnergyMap || songEnergyMap.length < mapLen) songEnergyMap = new Float32Array(mapLen);
              for (let w = 0; w < mapLen; w++) {
                let sum = 0;
                const s0 = w * winSize, s1 = Math.min(s0 + winSize, data.length);
                for (let k = s0; k < s1; k += 8) sum += data[k] * data[k];
                songEnergyMap[w] += Math.sqrt(sum / ((s1 - s0) / 8));
              }
              _energyStemsDone++;
              if (_energyStemsDone >= _energyStemsTotal) {
                let maxVal = 0;
                for (let j = 0; j < songEnergyMap.length; j++) { if (songEnergyMap[j] > maxVal) maxVal = songEnergyMap[j]; }
                if (maxVal > 0) for (let j = 0; j < songEnergyMap.length; j++) songEnergyMap[j] /= maxVal;
                _energyReady = true;

          });

      }
      const _onStemReady = () => {

// ===== UPDATE =====
function update(dt) {
  if (state === 'login' || state === 'title') updateShootingStars(dt);
  updateSelectScroll(dt);
  // Preview: start/switch when song selection changes in select state (디바운스)

  } else if (previewActive) {

  }

  for (let i=0;i<laneCount;i++) keyFlash[i] = Math.max(0, keyFlash[i]-dt*2);
  if (judgmentTimer > 0) { judgmentTimer -= dt; if (judgmentTimer <= 0) judgmentPriority = 0; }
  if (fever && feverParticles.length < 40) {

    for (let i = 0; i < 2; i++) {
      const side = Math.random() > 0.5 ? 0 : W;
      const col = `hsl(${Math.random()*60+20},100%,${55+Math.random()*35}%)`;
      feverParticles.push({ x: side + (Math.random()-0.5)*30, y: H * (0.3 + Math.random()*0.6),
        vx: (side === 0 ? 1 : -1) * (20+Math.random()*40), vy: -40-Math.random()*80,
        life: 0.5+Math.random()*0.5, maxLife: 1.0, color: col, size: 4+Math.random()*8 });
    }
  }
  if (feverFlash > 0) feverFlash -= dt * 1.5;
  // Update fever particles
  for (let i = feverParticles.length-1; i >= 0; i--) {
    const p = feverParticles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 60*dt; p.life -= dt;
    if (p.life <= 0) feverParticles.splice(i, 1);
  }
  if (playerAnim > 0) playerAnim = Math.max(0, playerAnim - dt);
  else if (playerAnim < 0) playerAnim = Math.min(0, playerAnim + dt);

  if (state === 'login') {
    // 소셜 로그인은 버튼 클릭 핸들러에서 처리 — 여기서는 inputQueue만 비움
    loginInputEl.style.top = '-200px';

    if (!currentUser) { inputQueue=[]; return; } // 비로그인: 버튼 클릭 핸들러에서 처리
    for (const inp of inputQueue) {

      if (inp==='left') { selectedDiff = Math.max(0, selectedDiff-1); saveDiffSpeed(); }

      if (inp==='right') { achievementTab = Math.min(ACH_TABS.length - 1, achievementTab + 1); achievementScroll = 0; }
    }
    inputQueue=[]; return;
  }
  if (state === 'select') {
    if (inputQueue.length > 0)    for (const inp of inputQueue) {
      if (inp === 'tab') { selectFocus = (selectFocus + 1) % 3; }
      if (inp === 'ranking') { rankingScroll = 0; rankingKeyCount = laneCount; subscribeFbRanking(selectedSong, selectedDiff, rankingKeyCount); stopPreview(); startRankingBgm(); transitionTo('ranking'); searchActive = false; searchText = ''; searchScroll = 0; searchInputEl.value = ''; searchInputEl.style.top = '-100px'; searchInputEl.blur(); }
      if (inp === 'achievement') { achievementScroll = 0; achievementSongFilter = selectedSong; stopPreview(); startAchievementBgm(); transitionTo('achievement'); searchActive = false; searchText = ''; searchScroll = 0; searchInputEl.value = ''; searchInputEl.style.top = '-100px'; searchInputEl.blur(); }
      if (selectFocus === 0) {
        if (inp==='left') { const p = _dPos(selectedSong); selectedSong = _dSong(p > 0 ? p - 1 : _dLen() - 1); loadSongDiffSpeed(selectedSong); scrollToSong(selectedSong); }
        if (inp==='right') { const p = _dPos(selectedSong); selectedSong = _dSong(p < _dLen() - 1 ? p + 1 : 0); loadSongDiffSpeed(selectedSong); scrollToSong(selectedSong); }
        if (inp==='down') selectFocus = 1;
        if (inp==='up') selectFocus = 2;
      } else if (selectFocus === 1) {
        if (inp==='left') { selectedDiff = Math.max(0, selectedDiff-1); saveDiffSpeed(); }
        if (inp==='right') { selectedDiff = Math.min(DIFFICULTIES.length-1, selectedDiff+1); saveDiffSpeed(); }
        if (inp==='up') selectFocus = 0;
        if (inp==='down') selectFocus = 2;
      } else if (selectFocus === 2 && !speedInputActive) {
        if (inp==='left') speedDown();
        if (inp==='right') speedUp();
        if (inp==='up') selectFocus = 1;
        if (inp==='down') selectFocus = 0;
      }
      if (inp==='confirm') {

        }

    }

  }
  if (state === 'result') {
    for (const inp of inputQueue) { if (inp==='confirm') { transitionTo('select'); } }
    inputQueue=[]; return;
  }
  if (state !== 'playing') { inputQueue=[]; return; }

  if (songLoading) {

      if (!(curSong && curSong._onsetMode)) gameTime = 0;
      resumeSyncCounter = (curSong && curSong._onsetMode) ? 0 : 30;
      window._bgmDelayStarted = false;
      if (usingStemMode) {
        songStartTime = actx.currentTime; countdownTime = 0;
        // AudioBufferSourceNode로 즉시 재생 (HTML Audio의 play() 끊김 제거)
        window._absNodes = [];
        window._absGains = [];
        window._absStartCtx = actx.currentTime;

          nanoFilterTarget = NANO_FILTER_CLEAR;
          nanoFilterCurrent = NANO_FILTER_CLEAR;
          if (nanoFilter) nanoFilter.frequency.value = NANO_FILTER_CLEAR;
        }
        const _audioDest = (gameMode === 'nano' && nanoFilter) ? nanoFilter : actx.destination;
        if (gameMode === 'nano' && nanoFilter) nanoFilter.connect(actx.destination);
        for (let i = 0; i < allStemAudios.length; i++) {
          if (stemAudioBuffers[i] && actx) {

            const _isAlways = ALWAYS_AUDIBLE_STEMS.includes(i);
            gain.gain.value = (_isAlways ? STEM_VOL_VOCAL : STEM_VOL_NORMAL) * volBgm;

  // 오디오 기준 미세 보정 (dt 기반으로 부드럽게, 오디오로 정확하게)
  // AudioBufferSourceNode 모드: actx.currentTime 기준으로 position 계산
  let audioRef = null;
  if (window._absStartCtx != null && window._absNodes && window._absNodes.length > 0) {

  } else if (usingStemMode && allStemAudios.length > 0 && allStemAudios[0] && !allStemAudios[0].paused) {
