    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('ВЃЂВаљВЌљВёю ЖхгвДцьЋ┤в│┤ВёИВџћ', W/2, contentTop + sz(82));
  } else {
    // ЖиИвдгвЊю Рђћ В╣┤вЊю ьўЋьЃю
    const cardW = Math.min(sz(360), W * 0.92), cardX = (W - cardW) / 2;
    let yCur = contentTop + sz(8) - inventoryScroll;
    const cardH = sz(96);
    const equippedId = getEquippedSkin(inventoryTab);
    // ВєїВюа Віцьѓе В╣┤вЊювЊц (ьЋ┤Ваю = ВъљвЈЎВю╝вАю ЖИ░в│И Віцьѓе)
    for (const skinId of owned) {
      const s = SKINS[skinId];
      const col = (s && s.palette && s.palette[0]) || '#9f7fff';
      const equipped = equippedId === skinId;
      ctx.fillStyle = 'rgba(18,12,32,0.92)'; rrFill(cardX, yCur, cardW, cardH, sz(14));
      const cg = ctx.createLinearGradient(cardX, yCur, cardX + cardW, yCur + cardH);
      cg.addColorStop(0, col + '18'); cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg; rrFill(cardX, yCur, cardW, cardH, sz(14));
      ctx.strokeStyle = equipped ? (col + 'cc') : (col + '44');
      ctx.lineWidth = equipped ? 1.8 : 1;
      rrStroke(cardX, yCur, cardW, cardH, sz(14));
      // ВбїВИА ВЋАВё╝ьіИ
      ctx.fillStyle = col; rrFill(cardX, yCur + sz(8), sz(4), cardH - sz(16), sz(2));
      // ВЋёВЮ┤Вйў Рђћ Віцьѓе ьћёвдгви░ ВЮ┤в»ИВДђ (ьѕгвфЁ в░░Ж▓й, halo ВЌєВЮї)
      const iconCx = cardX + sz(38), iconCy = yCur + cardH/2, iconR = sz(28);
      const preview = _getSkinPreview(skinId);
      const img = preview ? loadSkinImage(preview.path) : null;
      if (img && img.complete && img.naturalWidth) {
        const dSize = iconR * 1.7;
        if (preview.src) {
          const [sx, sy, sw, sh] = preview.src;
          ctx.drawImage(img, sx, sy, sw, sh, iconCx - dSize/2, iconCy - dSize/2, dSize, dSize);
        } else {
          ctx.drawImage(img, iconCx - dSize/2, iconCy - dSize/2, dSize, dSize);
        }
      } else {
        ctx.fillStyle = '#fff'; ctx.font = `${sz(18)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('РўЁ', iconCx, iconCy);
      }
      // вЮ╝в▓е
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${sz(14)}px sans-serif`; ctx.fillStyle = '#fff';
      ctx.fillText(_getSkinDisplayName(skinId), cardX + sz(74), yCur + cardH/2 - sz(10));
      ctx.font = `${sz(11)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillText(SKIN_CATEGORY_LABELS[inventoryTab] + ' Віцьѓе', cardX + sz(74), yCur + cardH/2 + sz(10));
      // в▓ёьі╝ (ВъЦВ░Е or ьЋ┤Ваю)
      const bbw = sz(76), bbh = sz(32);
      const bbx = cardX + cardW - bbw - sz(12), bby = yCur + (cardH - bbh)/2;
      if (equipped) {
        ctx.fillStyle = col + '22'; rrFill(bbx, bby, bbw, bbh, sz(8));
        ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 1; rrStroke(bbx, bby, bbw, bbh, sz(8));
        ctx.fillStyle = col;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `bold ${sz(12)}px sans-serif`;
        ctx.fillText('ьЋ┤Ваю', bbx + bbw/2, bby + bbh/2);
        _invBtnAreas.push({ type:'unequip', cat: inventoryTab, x:bbx, y:bby, w:bbw, h:bbh });
      } else {
        const btnG = ctx.createLinearGradient(bbx, bby, bbx, bby + bbh);
        btnG.addColorStop(0, col); btnG.addColorStop(1, col + 'aa');
        ctx.fillStyle = btnG; rrFill(bbx, bby, bbw, bbh, sz(8));
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; rrStroke(bbx, bby, bbw, bbh, sz(8));
        ctx.fillStyle = '#1a0d2e';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font = `bold ${sz(12)}px sans-serif`;
        ctx.fillText('ВъЦВ░Е', bbx + bbw/2, bby + bbh/2);
        _invBtnAreas.push({ type:'equip', cat: inventoryTab, id: skinId, x:bbx, y:bby, w:bbw, h:bbh });
      }
      yCur += cardH + sz(10);
    }
    // ВіцьЂгвАц ВхювїђЖ░њ ВађВъЦ
    const bottomAbs = yCur + inventoryScroll + sz(40);
    window._inventoryMaxScroll = Math.max(0, bottomAbs - contentBottom);
  }
  ctx.restore();

  // вњцвАюЖ░ђЖИ░ (shop Ж│╝ вЈЎВЮ╝ ВіцьЃђВЮ╝)
  const _mpBack = isMobile;
  const _mpLand = isMobile && !isPortrait && !isTablet && H < 500;
  const bbW = _mpBack ? (_mpLand ? sz(46) : sz(36)) : 70;
  const bbH = _mpBack ? (_mpLand ? sz(34) : sz(28)) : 38;
  const bbX = _mpBack ? sz(8) : 12;
  const bbY = _mpBack ? (H + safeBottom - sz(4) - bbH) : (H - bbH - 10);
  window._inventoryBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; rrFill(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; rrStroke(bbX, bbY, bbW, bbH, _mpBack ? sz(7) : 8);
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textBaseline = 'middle';
  if (_mpBack) { ctx.font = `bold ${_mpLand ? sz(18) : sz(16)}px sans-serif`; ctx.fillText('Рєљ', bbX + bbW/2, bbY + bbH/2); }
  else { ctx.font = `bold ${sz(13)}px sans-serif`; ctx.fillText('Рєљ вњцвАю', bbX + bbW/2, bbY + bbH/2); }
  ctx.textBaseline = 'alphabetic';
  renderBottomBar();
}

function handleInventoryClick(mx, my) {
  if (handleHamburgerClick(mx, my)) return;
  const _ibb = window._inventoryBackBtn;
  if (_ibb && hitTest(mx, my, _ibb.x, _ibb.y, _ibb.w, _ibb.h)) {
    playScrollTick(); stopInventoryBgm(); transitionTo('select'); return;
  }
  for (const b of _invBtnAreas) {
    if (hitTest(mx, my, b.x, b.y, b.w, b.h)) {
      if (b.type === 'tab') { playScrollTick(); inventoryTab = b.cat; inventoryScroll = 0; return; }
      if (b.type === 'equip') {
        playScrollTick();
        setEquippedSkin(b.cat, b.id);
        showLoginToast(_getSkinDisplayName(b.id) + ' ВъЦВ░Е ВЎёвБї', '#44dd66');
        return;
      }
      if (b.type === 'unequip') {
        playScrollTick();
        setEquippedSkin(b.cat, null);
        showLoginToast(SKIN_CATEGORY_LABELS[b.cat] + ' ьЋ┤Ваю (ЖИ░в│И Віцьѓе)', '#88aaff');
        return;
      }
    }
  }
}

function renderTitle() {
  // Вџ░ВБ╝ Вё▒Вџ┤ ЖИђвАюВџ░ в░░Ж▓й (ВЋѕВаё ВўЂВЌГ ьЈгьЋе)
  const t0 = Date.now();
  const _totalH = H + safeTop + safeBottom;
  const nebulaAlpha = 0.06 + Math.sin(t0 * 0.0005) * 0.02;
  const nebGrad1 = ctx.createRadialGradient(W * 0.3, H * 0.25, 0, W * 0.3, H * 0.25, W * 0.5);
  nebGrad1.addColorStop(0, `rgba(80,40,160,${nebulaAlpha})`);
  nebGrad1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad1; ctx.fillRect(0, -safeTop, W, _totalH);
  const nebGrad2 = ctx.createRadialGradient(W * 0.75, H * 0.65, 0, W * 0.75, H * 0.65, W * 0.4);
  nebGrad2.addColorStop(0, `rgba(30,60,140,${nebulaAlpha * 0.8})`);
  nebGrad2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebGrad2; ctx.fillRect(0, -safeTop, W, _totalH);

  // в│ё (в░ўВДЮВъё + ВЮ╝вХђ В╗гвЪг)
  for (const s of stars) {
    const twinkle = 0.3 + Math.sin(t0 * s.twinkleSpeed + s.twinkleOffset) * 0.4;
    ctx.globalAlpha = s.b * Math.max(0.1, twinkle);
    if (s.colored) {
      ctx.fillStyle = `hsl(${s.hue},70%,80%)`;
    } else {
      ctx.fillStyle = '#fff';
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // ьЂ░ в│ёВЌљ ЖИђвАюВџ░ (shadowBlur ВаюЖ▒░ Рєњ вІеВѕю в░ўьѕгвфЁ ВЏљВю╝вАю вїђВ▓┤)
    if (s.s > 2.0 && twinkle > 0.55) {
      ctx.globalAlpha = s.b * twinkle * 0.08;
      ctx.fillStyle = s.colored ? `hsl(${s.hue},60%,75%)` : '#aaccff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.s * 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // в│ёвўЦв│ё (Ж░ёьЌљВаЂ)
  if (Math.random() < 0.008) spawnShootingStar();
  renderShootingStars();

  // Title particles
  spawnTitleParticles();
  updateTitleParticles();
  for (const p of titleParticles) {
    ctx.globalAlpha = p.life * (p.type === 'spark' ? 0.8 : 0.35);
    if (p.type === 'spark') {
      // shadowBlur ВаюЖ▒░ Рђћ Edge Вё▒віЦ Ж░юВёа
    }
    ctx.fillStyle = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // ВаёВ▓┤ Ж░ђВІю ВўЂВЌГ ЖИ░Вцђ y ьЌгьЇ╝ (ВЋѕВаё ВўЂВЌГ ьЈгьЋе)
  const _visTop = -safeTop;
  const _visH = H + safeTop + safeBottom;
  const _visY = (ratio) => _visTop + _visH * ratio;

  // EQ bars
  const eqCount = 30, eqGap = 4;
  const eqTotalW = W * 0.75;
  const eqBarW = (eqTotalW - (eqCount-1)*eqGap) / eqCount;
  const eqX0 = (W - eqTotalW) / 2;
  const eqCenterY = _visY(0.46);
  for (let i=0;i<eqCount;i++) {
    const bx = eqX0 + i * (eqBarW + eqGap);
    const bh = 20 + Math.sin(Date.now()*0.004+i*0.6)*18 + Math.sin(Date.now()*0.007+i*1.1)*10;
    const alpha = 0.08 + Math.sin(Date.now()*0.003+i*0.4)*0.04;
    ctx.fillStyle = `rgba(130,90,255,${alpha})`;
    ctx.fillRect(bx, eqCenterY-bh/2, eqBarW, bh);
  }

  // Logo Рђћ 2Вцё вХёвдг + ЖИђвАюВџ░
  const t = Date.now();
  ctx.save(); ctx.translate(W/2, _visY(0.33));
  const p = 1 + Math.sin(t*0.002)*0.015; ctx.scale(p, p);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // "NANO" Рђћ Ж░ђв│ЇЖ│а ВќЄВЮђ ВіцьЃђВЮ╝
  const nanoSize = sz(48);
  ctx.font = `200 ${nanoSize}px sans-serif`;
  ctx.letterSpacing = `${nanoSize * 0.3}px`;
  // ЖИђвАюВџ░ ваѕВЮ┤Вќ┤
  ctx.shadowColor = 'rgba(100,180,255,0.4)'; ctx.shadowBlur = 12;
  ctx.fillStyle = 'rgba(180,210,255,0.9)';
  ctx.fillText('N A N O', 0, -nanoSize * 0.55);
  ctx.shadowBlur = 0;

  // ЖхгвХёВёа Рђћ ЖиИвЮ╝вЇ░ВЮ┤ВЁў + ьјёВіц
  const lineW = sz(280);
  const lineAlpha = 0.4 + Math.sin(t*0.003)*0.15;
  const lineGrad = ctx.createLinearGradient(-lineW/2, 0, lineW/2, 0);
  lineGrad.addColorStop(0, `rgba(100,180,255,0)`);
  lineGrad.addColorStop(0.3, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(0.5, `rgba(200,160,255,${lineAlpha + 0.2})`);
  lineGrad.addColorStop(0.7, `rgba(140,120,255,${lineAlpha})`);
  lineGrad.addColorStop(1, `rgba(100,180,255,0)`);
  ctx.fillStyle = lineGrad;
  ctx.fillRect(-lineW/2, -2, lineW, 3);
  // вЮ╝ВЮИ Вюё ВъЉВЮђ в╣Џ Ваљ ВЮ┤вЈЎ
  const dotX = (Math.sin(t*0.002) * lineW * 0.4);
  ctx.beginPath(); ctx.arc(dotX, -0.5, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
  ctx.fill(); ctx.shadowBlur = 0;

  // "RHYTHM" Рђћ ЖххЖ│а Ж░ЋвагьЋю ВіцьЃђВЮ╝
  const rhythmSize = sz(62);
  ctx.font = `900 ${rhythmSize}px sans-serif`;
  // в│┤вЮ╝РєњьїївъЉ ЖиИвЮ╝вЇ░ВЮ┤ВЁў ьЁЇВіцьіИ
  const txtGrad = ctx.createLinearGradient(-rhythmSize*2, 0, rhythmSize*2, 0);
  txtGrad.addColorStop(0, '#b060ff');
  txtGrad.addColorStop(0.5, '#e0c0ff');
  txtGrad.addColorStop(1, '#60a0ff');
  ctx.fillStyle = txtGrad;
  ctx.shadowColor = 'rgba(160,100,255,0.5)'; ctx.shadowBlur = 15;
  ctx.fillText('RHYTHM', 0, rhythmSize * 0.55);
  ctx.shadowBlur = 0;

  ctx.restore();

  // в▓ёВаё ьЉюВІю (Kplay В║љВІю ьЎЋВЮИВџЕ) Рђћ ВёцВаЋ в▓ёьі╝Ж│╝ ВЋѕ Ж▓╣В╣ўЖ▓ї ВбїВИА ьЋўвІе
  // РўЁ ВЌЁвЇ░ВЮ┤ьіИ Ж░љВДђ ВДёвІе ВаЋв│┤ ьЈгьЋе Рђћ __BUILD_TS вЂЮВъљвдг 6 + В▓┤ьЂг ВЃЂьЃю
  //   ВаЋВЃЂ: 'v15.8 ┬и 360000 РюЊ360000' (Вёюв▓ё TS Ж░љВДђвље)
  //   ВЌљвЪг: 'v15.8 ┬и 360000 !HTTP_404' (fetch ВІцьїе ВЏљВЮИ)
  //   opacity 0.15 Рєњ ВЮ╝в░ў ВюаВађвіћ version string Вю╝вАю ВЮИВІЮьЋўЖ│а ьїеВіц
  ctx.font = `${sz(9)}px sans-serif`; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  let _vLabel = 'v15.8 ┬и ' + String(window.__BUILD_TS || 0).slice(-6);
  if (window.__lastUpdateCheckErr) {
    _vLabel += ' !' + String(window.__lastUpdateCheckErr).slice(0, 16);
  } else if (window.__lastUpdateCheck) {
    _vLabel += ' РюЊ' + String(window.__lastUpdateCheck.srv).slice(-6);
  }
  ctx.fillText(_vLabel, 6, H + safeBottom - 4);

  // ===== ьћёвдгвАювЊю ьћёвАюЖиИваѕВіцв░ћ =====
  if (!_preloadDone && _preloadTotal > 0) {
    const pct = _preloadTotal > 0 ? (_preloadLoaded + _preloadFailed) / _preloadTotal : 0;
    const barW = Math.min(sz(260), W * 0.65), barH = sz(8);
    const barX = (W - barW) / 2, barY = _visY(0.62);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    rrFill(barX, barY, barW, barH, sz(4));
    ctx.fillStyle = '#9e7aff';
    rrFill(barX, barY, barW * pct, barH, sz(4));
    ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`ьїеВ╣ў ВцЉ... ${Math.round(pct * 100)}%`, W / 2, barY - sz(8));
    return;
  }

  if (!currentUser) {
    // ===== в╣ёвАюЖиИВЮИ: Kplay вАюЖиИВЮИ в▓ёьі╝ =====
    loginBtnAreas = [];
    const btnW = Math.min(sz(260), W * 0.78), btnH = sz(44);
    const by = _visY(0.62) - btnH / 2;
    const btnStartX = (W - btnW) / 2;
    const iconR = sz(8), iconPad = sz(32);

    loginBtnAreas.push({ x: btnStartX, y: by, w: btnW, h: btnH, type: 'kplay' });

    ctx.fillStyle = '#7a4dff'; rrFill(btnStartX, by, btnW, btnH, sz(10));
    ctx.strokeStyle = '#9e7aff'; ctx.lineWidth = 1.5; rrStroke(btnStartX, by, btnW, btnH, sz(10));

    const iconCx = btnStartX + iconPad, iconCy = by + btnH / 2;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(iconCx, iconCy, iconR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7a4dff'; ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('K', iconCx, iconCy + 1);

    ctx.font = `bold ${sz(14)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Kplay \uB85C\uADF8\uC778', btnStartX + btnW / 2 + iconPad / 4, by + btnH / 2);
    ctx.textBaseline = 'alphabetic';

    // ьЁїВіцьіИ ьЎўЖ▓й ВаёВџЕ: Ж▓їВіцьіИ вАюЖиИВЮИ в▓ёьі╝ (localhost/githack/github.io/LAN)
    if (isTestEnv) {
      const gY = by + btnH + sz(10);
      loginBtnAreas.push({ x: btnStartX, y: gY, w: btnW, h: btnH, type: 'guest' });
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      rrFill(btnStartX, gY, btnW, btnH, sz(10));
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5;
      rrStroke(btnStartX, gY, btnW, btnH, sz(10));
      ctx.font = `bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\uAC8C\uC2A4\uD2B8 \uB85C\uADF8\uC778 (\uB85C\uCEEC \uD14C\uC2A4\uD2B8)', btnStartX + btnW / 2, gY + btnH / 2);
      ctx.textBaseline = 'alphabetic';
    }

    // вАювћЕ ьЉюВІю
    if (loginAuthPending) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
      ctx.font = `bold ${sz(16)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      const dots = '.'.repeat(Math.floor(Date.now() / 400) % 4);
      ctx.fillText('\uB85C\uADF8\uC778 \uC911' + dots, W / 2, H / 2);
    }

    // ьєаВіцьіИ вЕћВІюВДђ (Вхювїђ 2Вцё)
    if (loginToastTimer > 0) {
      const toastAlpha = Math.min(1, loginToastTimer);
      ctx.globalAlpha = toastAlpha;
      const has2 = loginToast2.length > 0;
      const tw = Math.min(sz(320), W * 0.9), th = has2 ? sz(52) : sz(36);
      const tx = (W - tw) / 2, ty = H - th - sz(10);
      ctx.fillStyle = 'rgba(0,0,0,0.9)'; rrFill(tx, ty, tw, th, sz(8));
      ctx.strokeStyle = loginToastColor + '44'; ctx.lineWidth = 1; rrStroke(tx, ty, tw, th, sz(8));
      ctx.font = `bold ${sz(11)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillStyle = loginToastColor;
      ctx.fillText(loginToast, W / 2, ty + (has2 ? sz(18) : th * 0.6));
      if (has2) {
        ctx.font = `${sz(9)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText(loginToast2, W / 2, ty + sz(35));
      }
      ctx.globalAlpha = 1;
    }
  } else {
    // ===== вАюЖиИВЮИ ВЎёвБї: вфевЊю ВёаьЃЮ + TAP TO START =====
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.font=`bold ${sz(13)}px sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('ьћїваѕВЮ┤ вфевЊю ВёаьЃЮ', W/2, _visY(0.55));

    // ВёИ вфевЊю в▓ёьі╝
    const pmBtnW = Math.min(sz(120), W*0.30), pmBtnH = sz(56), pmGap = sz(10);
    const pmTotalW = pmBtnW * 3 + pmGap * 2;
    const pmStartX = (W - pmTotalW) / 2, pmY = _visY(0.58);
    loginModeBtnAreas = [];
    const modes = [
      { key: 'normal', label: 'ьЂ┤въўВІЮ', desc: 'ЖИ░в│ИВаЂВЮИ ьћїваѕВЮ┤ вфевЊюВъЁвІѕвІц', color: '#00d4ff' },
      { key: 'freestyle', label: 'ьћёвдгВіцьЃђВЮ╝', desc: 'HP ВЋЋв░ЋВЌєВЮ┤ Ж│АВЮё ВўеВаёьъѕ ВЌ░ВБ╝ ьЋўВІц Вѕў ВъѕВіхвІѕвІц', color: '#ffd700' },
      { key: 'versus', label: 'ВўевЮ╝ВЮИ', desc: 'Вцђв╣ё ВцЉВъЁвІѕвІц', color: '#ff6b6b' },
    ];
    let selectedModeDesc = '', selectedModeColor = '';
    modes.forEach((m, i) => {
      const bx = pmStartX + i * (pmBtnW + pmGap);
      const sel = playMode === m.key;
      ctx.fillStyle = sel ? m.color + '22' : 'rgba(255,255,255,0.04)';
      rrFill(bx, pmY, pmBtnW, pmBtnH, sz(10));
      ctx.strokeStyle = sel ? m.color : 'rgba(255,255,255,0.15)';
      ctx.lineWidth = sel ? 2 : 1;
      rrStroke(bx, pmY, pmBtnW, pmBtnH, sz(10));
      ctx.fillStyle = sel ? m.color : 'rgba(255,255,255,0.75)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (m.key === 'versus') {
        // вЮ╝в▓е 2Вцё
        ctx.font = `bold ${sz(13)}px sans-serif`;
        ctx.fillText('ВўевЮ╝ВЮИ', bx + pmBtnW/2, pmY + pmBtnH/2 - sz(8));
        ctx.font = `${sz(10)}px sans-serif`;
        ctx.fillText('(Вцђв╣ё ВцЉ)', bx + pmBtnW/2, pmY + pmBtnH/2 + sz(8));
      } else {
        ctx.font = `bold ${sz(13)}px sans-serif`;
        ctx.fillText(m.label, bx + pmBtnW/2, pmY + pmBtnH/2);
      }
      ctx.textBaseline = 'alphabetic';
      if (sel) { selectedModeDesc = m.desc; selectedModeColor = m.color; }
      loginModeBtnAreas.push({ x: bx, y: pmY, w: pmBtnW, h: pmBtnH, key: m.key });
    });

    // ВёаьЃЮвљю вфевЊю ВёцвфЁ (в▓ёьі╝ ВЋёвъў, Ж░ђвАю ЖйЅ В░еЖ▓ї Вцёв░ћЖ┐ѕ В▓ўвдг)
    if (selectedModeDesc) {
      ctx.font = `${sz(11)}px sans-serif`;

let nicknameChecking = false;
function confirmNickname() {
  const name = nicknameInput.trim();
  const err = validateNickname(name);
  if (err) { nicknameError = err; return; }
  if (nicknameChecking) return;

  // вАюВ╗г В║љВІюВЌљВёю ВдЅВІю ВцЉв│х В▓┤ьЂг
  const localCache = getLocalNicknames();
  if (localCache[name] && localCache[name] !== pendingAuthUid) {
    nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.';
    return;
  }

  nicknameChecking = true;
  nicknameError = '';
  let resolved = false;
  const finish = (dup) => {
    if (resolved) return; resolved = true;
    nicknameChecking = false;
    if (dup) { nicknameError = '\uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC778 \uB2C9\uB124\uC784\uC785\uB2C8\uB2E4.'; }
    else { saveLocalNickname(name, pendingAuthUid); nicknameError = ''; completeLogin(name, pendingAuthMethod); }
  };
  // 500ms вѓ┤ ВЮЉвІх ВЌєВю╝вЕ┤ вАюВ╗г В║љВІю ЖИ░ВцђВю╝вАю ьєхЖ│╝
  setTimeout(() => finish(false), 500);
  try {
    fbDb.ref('nicknames/' + name).once('value', snap => {
      const val = snap.val();
      if (val && val !== pendingAuthUid) finish(true);
      else finish(false);
    });
  } catch(e) { finish(false); }
}

// Select screen layout helper
let selectParticles = [];
function updateSelectParticles() {
  // Spawn
  const spawnCount = selectParticles.length < 50 ? 2 : 0;
  for (let s = 0; s < spawnCount; s++) {
    const sc = songs[selectedSong] ? songs[selectedSong].color : '#fff';
    selectParticles.push({
      x: Math.random() * W, y: H + 5 + Math.random()*20,
      vx: (Math.random()-0.5)*0.5, vy: -(0.3+Math.random()*0.8),
      size: 2.5+Math.random()*5, life: 1, decay: 0.002+Math.random()*0.002,
      color: sc

  }
  for (let i = selectParticles.length-1; i >= 0; i--) {
    const p = selectParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vx += (Math.random()-0.5)*0.03;
    if (p.life <= 0 || p.y < -10) selectParticles.splice(i,1);
  }
}

function getSelectLayout() {
  // ВаёВ▓┤ Ж░ђВІю ВўЂВЌГ (ВЋѕВаё ВўЂВЌГ ьЈгьЋе)

  // вфев░ћВЮ╝ Ж░ђвАю ьћївъўЖиИ (ве╝Вађ ВёаВќИ)
  const _mobileLandscape = isMobile && !isPortrait && !isTablet && H < 500;
  // Ж░ђвАю вДѕВДё Ж│авац: optWЖ░ђ ьЎћвЕ┤ВЮё вёўВДђ ВЋівЈёвАЮ ВаюьЋю
  const optW = Math.min(sz(420), W - sz(16));
  // CD ьЂгЖИ░: вфев░ћВЮ╝ Ж░ђвАювіћ visH в╣ёВюеВЮё ВаЂвІ╣ьъѕ ьѓцВЏђ
  const cdSize = _mobileLandscape ?
      Math.min(sz(160), visH * 0.34, W * 0.3)
    : Math.min(sz(200), visH * 0.26, W * 0.4);
  const cardW = cdSize, cardH = cdSize, gap = sz(20);
  const songTotalW = songs.length * (cardW + gap) - gap;
  // вфевЊа spacingВЮђ sz() Рђћ UI ВіцВ╝ђВЮ╝ВЌљ в╣ёвАђ
  const optH = _mobileLandscape ? Math.min(sz(30), visH * 0.075) : Math.min(sz(42), visH * 0.055);
  const optGap = Math.max(sz(10), visH * 0.018);
  const sectionGap = Math.max(sz(10), visH * 0.016);
  const subBtnH = Math.min(sz(34), visH * 0.042);
  const subBtnGap = Math.max(sz(10), visH * 0.014);
  // В╗┤ьїЕьіИ Ж░ђвАю: ьЁЇВіцьіИ ьЈ░ьіИ sz(14)/sz(10)ВЌљ вДъВХ░ Въљвдг sz()вАю вХђВЌг + ВХЕвХёьЋю ВЌгВюа
  const searchBarH = _mobileLandscape ? sz(20) : sz(30);
  const titleH = _mobileLandscape ? sz(22) : sz(28);
  const titleToSearchGap = _mobileLandscape ? sz(4) : sz(12);
  const searchToSongGap = _mobileLandscape ? sz(8) : sz(14);
  const btnH = Math.min(sz(44), visH * 0.058);
  const cdTextH = _mobileLandscape ? sz(28) : sz(52); // CD ВЮ┤вдё + Lv в░░ВДђ Ж│хЖ░ё
  const labelH = sz(18);
  // ВІюВъЉ в▓ёьі╝ВЮђ ьЎћвЕ┤ ВхюьЋўвІеВЌљ в│ёвЈё Ж│аВаЋВЮ┤в»ђвАю flowВЌљВёю ВаюВЎИ
  const totalH =
      titleH + titleToSearchGap
    + searchBarH + searchToSongGap
    + cardH + cdTextH
    + subBtnGap + subBtnH
    + sectionGap + labelH + optH
    + optGap + labelH + optH;
  // ьЋўвІе в░ћ ВўЂВЌГ(ВІюВъЉ в▓ёьі╝ + В░еьіИ/ьќёв▓ёЖ▒░ вЊ▒)ВЮё ВаюВЎИьЋю ВЃЂвІе Ж│хЖ░ёВЌљВёю flow ВцЉВЋЎ ВаЋваг
  const bottomReserve = btnH + sz(50); // ВІюВъЉ в▓ёьі╝ + ьЋўвІе в░ћ
  const topY = -safeTop + Math.max(4, (visH - bottomReserve - totalH) / 2);
  const titleY = topY + titleH / 2; // textBaseline='middle' ЖИ░Вцђ
  const searchBarY = topY + titleH + titleToSearchGap; // search bar ВЃЂвІе
  const songRowY = searchBarY + searchBarH + searchToSongGap;
  return { cardW, cardH, gap, topY, titleY, searchBarY, songRowY, optW, optH, optGap, sectionGap, songTotalW, subBtnH, subBtnGap, searchBarH, btnH, cdTextH };
}
let snapAnimStart = 0, snapAnimFrom = 0, snapAnimTo = 0, snapAnimDur = 0;
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
// === Ж│А ВёаьЃЮ ьЎћВѓ┤ьЉю hold-to-scroll (Ж░ђВєЇ) ===
let _selectArrowHoldDir = 0;     // -1: Вбї, 1: Вџ░, 0: в»ИВѓгВџЕ
let _selectArrowHoldStart = 0;
let _selectArrowLastFire = 0;
function _fireSelectArrowAdvance() {
  const p = _dPos(selectedSong);
  const next = p + _selectArrowHoldDir;
  if (next < 0 || next >= _dLen()) { _selectArrowHoldDir = 0; return; }
  selectedSong = _dSong(next);
  loadSongDiffSpeed(selectedSong);
  scrollToSong(selectedSong);
  playScrollSound();
}
function startSelectArrowHold(dir) {
  if (_selectArrowHoldDir === dir) return;
  _selectArrowHoldDir = dir;
  _selectArrowHoldStart = performance.now();
  // В▓Ф в░юВѓгвіћ ьЂ┤вдГ ьЋИвЊцвЪгЖ░ђ ВЮ┤в»И ьЋюв▓ѕ В▓ўвдгьќѕВю╝в»ђвАю, hold ВІюВъЉ ьЏё 350ms вїђЖИ░
  _selectArrowLastFire = _selectArrowHoldStart;
}
function stopSelectArrowHold() { _selectArrowHoldDir = 0; }
function updateSelectArrowHold() {
  if (!_selectArrowHoldDir) return;
  if (state !== 'select') { _selectArrowHoldDir = 0; return; }
  const now = performance.now();
  const elapsed = now - _selectArrowHoldStart;
  // В▓Ф hold 200ms вїђЖИ░ ьЏё, 150ms Рєњ 45ms вАю Ж░ђВєЇ (700msВЌљ Ж▒ИВ│љ)
  let interval;
  if (elapsed < 200) interval = 200;
  else {
    const t = Math.min(1, (elapsed - 200) / 700);
    interval = 150 - (150 - 45) * t;
  }
  if (now - _selectArrowLastFire >= interval) {
    _fireSelectArrowAdvance();
    _selectArrowLastFire = now;
  }
}
function scrollToSong(idx) {
  const lay = getSelectLayout();
  const target = _dPos(idx) * (lay.cardW + lay.gap);
  snapAnimFrom = selectScrollX;
  snapAnimTo = target;
  snapAnimDur = Math.min(0.4, Math.max(0.15, Math.abs(target - selectScrollX) / 800));
  snapAnimStart = performance.now() / 1000;
  selectTargetScrollX = target;
  selectScrollVel = 0;
}
function updateSelectScroll(dt) {
  if (state !== 'select') return;
  const lay = getSelectLayout();
  const step = lay.cardW + lay.gap;
  let minScroll = 0;
  let maxScroll = (_dLen() - 1) * step;

  // Animated snap to target (easeOut)
  if (selectTargetScrollX !== null) {
    const elapsed = performance.now() / 1000 - snapAnimStart;
    const t = Math.min(1, elapsed / snapAnimDur);
    selectScrollX = snapAnimFrom + (snapAnimTo - snapAnimFrom) * easeOutCubic(t);
    if (t >= 1) { selectScrollX = snapAnimTo; selectTargetScrollX = null; }
    selectScrollVel = 0;
  } else if (selectDragX < 0) {
    // Ж┤ђВё▒ ВіцьЂгвАц Рђћ вХђвЊювЪйЖ▓ї Ж░љВЄаьЋўвЕ┤№┐й№┐й ВцЉЖ░ё Ж│АВЮё ВіцВ│љВДђвѓўЖ░љ
    selectScrollX += selectScrollVel * dt * 60;
    selectScrollVel *= Math.pow(0.96, dt * 60);
    if (Math.abs(selectScrollVel) < 0.03) selectScrollVel = 0;

    // Ж▓йЖ│ё: ьЋўвЊюВіцьє▒ (ьіЋЖ╣ђ ВЌєВЮї)
    if (selectScrollX < minScroll) { selectScrollX = minScroll; selectScrollVel = 0; }
    if (selectScrollX > maxScroll) { selectScrollX = maxScroll; selectScrollVel = 0; }

    // ВіцьЂгвАц ВцЉ Ж░ђВъЦ Ж░ђЖ╣їВџ┤ Ж│АВю╝вАю selectedSong ВІцВІюЖ░ё Ж░▒ВІа (ьћёвдгви░ ьіИвдгЖ▒░)
    const _nearSong = _dSong(Math.max(0, Math.min(Math.round(selectScrollX / step), _dLen() - 1)));
    if (_nearSong !== selectedSong) { selectedSong = _nearSong; loadSongDiffSpeed(selectedSong); }

    // Ж┤ђВё▒ВЮ┤ ВХЕвХёьъѕ ВцёВќ┤вЊа ьЏёВЌљвДї ВіцвЃЁ
    if (Math.abs(selectScrollVel) < 0.3) {
      const nearest = Math.max(0, Math.min(Math.round(selectScrollX / step), _dLen() - 1));
      const clamped = _dSong(nearest);
      const target = nearest * step;
      if (Math.abs(target - selectScrollX) > 0.5) {
        snapAnimFrom = selectScrollX;
        snapAnimTo = target;
        snapAnimDur = Math.min(0.3, Math.max(0.08, Math.abs(target - selectScrollX) / 600));
        snapAnimStart = performance.now() / 1000;
        selectTargetScrollX = target;
        selectScrollVel = 0;
        selectedSong = clamped;
      } else {
        selectScrollX = target;
        selectedSong = clamped;
      }
    }
  }

  // вЊювъўЖиИ ВцЉ Ж▓йЖ│ё ьЋўвЊюВіцьє▒
  if (selectDragX >= 0) {
    if (selectScrollX < minScroll) selectScrollX = minScroll;
    if (selectScrollX > maxScroll) selectScrollX = maxScroll;
  }

  // вДц ьћёваѕВъё selectedSongВЮё ВіцьЂгвАц ВюёВ╣ўВЌљ вЈЎЖИ░ьЎћ (ВіцвЃЁ ВЋавІѕвЕћВЮ┤ВЁў ВцЉВЌљвіћ Віцьѓх)
  // ВдљЖ▓еВ░ЙЖИ░ вфевЊю: ВіцьЂгвАц ВюёВ╣ў Рєњ ьЉюВІю вдгВіцьіИ ВЮИвЇ▒Віц Рєњ ВІцВаю songIdx
  const _scrollDl = favFilterActive ? getFavorites().sort((a,b)=>a-b) : null;
  const _scrollListLen = _scrollDl ? _scrollDl.length : songs.length;
  const curPosByScroll = Math.round(Math.max(0, Math.min(maxScroll, selectScrollX)) / step);
  const clampedPos = Math.max(0, Math.min(curPosByScroll, _scrollListLen - 1));
  const curSongByScroll = _scrollDl ? (_scrollDl[clampedPos] != null ? _scrollDl[clampedPos] : selectedSong) : clampedPos;
  if (selectTargetScrollX === null) {
    if (curSongByScroll !== selectedSong && curSongByScroll >= 0 && curSongByScroll < songs.length) {
      selectedSong = curSongByScroll;
      loadSongDiffSpeed(selectedSong);
    }

// ===== LOGIN =====
// ===== LOGIN SHOOTING STARS =====
let shootingStars = [];
function spawnShootingStar() {
  const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2; // вїђЖ░ЂВёа ьЋўЖ░Ћ (Вџ░ьЋўвІе в░ЕьќЦ)
  const speed = 200 + Math.random() * 350;
  const startX = Math.random() * W * 1.2 - W * 0.1;
  const startY = -10 - Math.random() * H * 0.3;
  const hue = Math.random() > 0.6 ? 45 + Math.random() * 20 : 200 + Math.random() * 60; // ЖИѕВЃЅ or ьїївъђВЃЅ
  const brightness = 0.7 + Math.random() * 0.3;
  const tailLen = 8 + Math.floor(Math.random() * 12);
  shootingStars.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.2 + Math.random() * 1.5,
    maxLife: 1.2 + Math.random() * 1.5,
    size: 1.5 + Math.random() * 2,
    hue, brightness, tailLen,
    trail: [] // ВъћВЃЂ ВбїьЉю ВађВъЦ
  });
}
function updateShootingStars(dt) {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.trail.unshift({ x: ss.x, y: ss.y });
    if (ss.trail.length > ss.tailLen) ss.trail.pop();
    ss.x += ss.vx * dt;
    ss.y += ss.vy * dt;
    ss.life -= dt;
    if (ss.life <= 0 || ss.x > W + 50 || ss.y > H + 50) {
      shootingStars.splice(i, 1);
    }
  }
}
function renderShootingStars() {
  for (const ss of shootingStars) {
    const fade = Math.min(1, ss.life / (ss.maxLife * 0.3)); // вДѕВДђвДЅ 30%ВЌљВёю ьјўВЮ┤вЊюВЋёВЏЃ
    // Ж╝гвдг (ВъћВЃЂ)
    for (let t = 0; t < ss.trail.length; t++) {
      const p = ss.trail[t];
      const alpha = (1 - t / ss.trail.length) * fade * ss.brightness * 0.6;
      const sz2 = ss.size * (1 - t / ss.trail.length * 0.7);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${ss.hue},80%,${70 + t * 2}%)`;
      ctx.fillRect(p.x - sz2/2, p.y - sz2/2, sz2, sz2);
    }
    // веИвдг (в░ЮВЮђ Ваљ)
    ctx.globalAlpha = fade * ss.brightness;
    ctx.shadowColor = `hsl(${ss.hue},90%,80%)`;
    ctx.shadowBlur = 6 + ss.size * 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ss.x, ss.y, ss.size * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawGoogleIcon(cx, cy, r) {
  const lw = r * 0.45;
  ctx.lineCap = 'butt';
  ctx.lineWidth = lw;
  // Blue (left-top)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.65, Math.PI * 1.35); ctx.strokeStyle = '#4285F4'; ctx.stroke();
  // Green (bottom-left)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.35, Math.PI * 0.65); ctx.strokeStyle = '#34A853'; ctx.stroke();
  // Yellow (bottom-right)
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * 0.05, Math.PI * 0.35); ctx.strokeStyle = '#FBBC05'; ctx.stroke();
  // Red (top-right)
  ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI * 0.35, Math.PI * 0.05); ctx.strokeStyle = '#EA4335'; ctx.stroke();
  // Blue horizontal bar
  ctx.fillStyle = '#4285F4';
  ctx.fillRect(cx - r * 0.1, cy - lw / 2, r * 1.2, lw);
}

  ctx.fillStyle = '#fff'; ctx.fillText('f', cx + r * 0.1, cy + r * 0.15);
}
function drawAppleIcon(cx, cy, r) {
  ctx.save(); ctx.translate(cx, cy); ctx.scale(r / 10, r / 10);
  ctx.beginPath();

  ctx.bezierCurveTo(-10, -2, -9, 3, -7, 6); ctx.bezierCurveTo(-5, 9, -3, 11, 0, 11);
  ctx.bezierCurveTo(3, 11, 5, 9, 7, 6); ctx.bezierCurveTo(9, 3, 10, -2, 9, -6);
  ctx.bezierCurveTo(8, -10, 3, -11, 0, -8); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  // Leaf
  ctx.beginPath(); ctx.moveTo(0, -8);
  ctx.bezierCurveTo(1, -12, 4, -14, 5, -13);
  ctx.bezierCurveTo(5, -11, 3, -9, 0, -8); ctx.closePath();

  ctx.restore();
}

  // Type tabs

  });

  // Filter and progress
  const curType = ACH_TABS[achievementTab].key;
  const unlocked = getUnlocked();
  const filtered = ALL_ACHIEVEMENTS.filter(a => a.type === curType && (achievementSongFilter < 0 || a.songIdx === achievementSongFilter));

  // Progress bar

  const end = Math.min(rows.length, achievementScroll + maxVisible);

  for (let i = achievementScroll; i < end; i++) {
    const row = rows[i];
    const ry = listY + (i - achievementScroll) * rowH;

    if (row.type === 'header') {

      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = row.song.color;
      ctx.fillText(row.song.name, listX+14, ry+rowH*0.55);
      ctx.textAlign='right';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(row.songDone+'/'+row.songTotal, listX+listW-10, ry+rowH*0.55);
    } else {
      const a = row.ach, done = row.done;
      // Achievement row
      ctx.fillStyle = done ? '#ffd70008' : 'rgba(255,255,255,0.015)';
      rrFill(listX+8, ry, listW-16, rowH - 3, 5);
      if (done) {

      }

      // Check / lock
      ctx.textAlign='center';
      ctx.font=`bold ${sz(13)}px sans-serif`;
      ctx.fillStyle = done ? '#44dd66' : 'rgba(255,255,255,0.15)';
      ctx.fillText(done ? 'РюЊ' : 'РЌІ', listX+24, ry+rowH*0.55);

      // Label (without song name, since it's under the header)
      ctx.textAlign='left';
      ctx.font=`${sz(11)}px sans-serif`;
      ctx.fillStyle = done ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      // Strip song name from label for cleaner display
      const shortLabel = a.label.replace(/^.+? Рђћ /, '');
      ctx.fillText(shortLabel, listX+40, ry+rowH*0.55);

      // Claim button / coins
      ctx.textAlign='right';
      ctx.font=`bold ${sz(11)}px sans-serif`;
      if (done && !row.claimed) {
        // Claimable - draw button
        const claimText = '+'+formatCoins(a.coins)+'РЎф в░ЏЖИ░';
        ctx.font=`bold ${sz(10)}px sans-serif`;
        const cbW = Math.max(sz(56), ctx.measureText(claimText).width + sz(12));

        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1; rrStroke(cbX, cbY, cbW, cbH, 5);
        ctx.textAlign='center';
        ctx.fillStyle = '#ffd700';
        ctx.fillText(claimText, cbX+cbW/2, cbY+cbH*0.65);
      } else if (done && row.claimed) {
        ctx.fillStyle = '#44dd6688';
        ctx.fillText('Вѕўва╣ВЎёвБї', listX+listW-16, ry+rowH*0.55);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillText('+'+formatCoins(a.coins)+'РЎф', listX+listW-16, ry+rowH*0.55);
      }

  }

  if (rows.length === 0) {
    ctx.font=`${sz(14)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('ВЌЁВаЂВЮ┤ ВЌєВіхвІѕвІц', W/2, listY+40);

  renderBottomBar();
}

        rrFill(rwX, rwY, rwW, rwH, sz(4));
        ctx.strokeStyle = 'rgba(255,215,0,0.5)'; ctx.lineWidth = 1;
        rrStroke(rwX, rwY, rwW, rwH, sz(4));
        ctx.fillStyle = '#ffd700';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(rwTxt, rwX + rwW/2, rowCenterY);
        scoreRightX = rwX - sz(8);
      }

      // Score
      ctx.textAlign='right';
      ctx.font=`bold ${sz(14)}px sans-serif`;
      ctx.fillStyle = isMe ? song.color : 'rgba(255,255,255,0.6)';
      ctx.fillText(r.score.toLocaleString(), scoreRightX, ry + (rowH-4)/2);
    }
    ctx.textBaseline='alphabetic';
  }

  // ьЋўвІе ВЋѕвѓ┤: вњцвАюЖ░ђЖИ░ в▓ёьі╝Ж│╝ вЈЎВЮ╝ ВёаВЃЂ (ВцЉВЋЎ)
  {
    const now = Date.now();
    const nextReset = getWeekStartKST(now) + 7 * 24 * 60 * 60 * 1000;
    const left = nextReset - now;
    const days = Math.floor(left / (24*60*60*1000));
    const hrs = Math.floor((left % (24*60*60*1000)) / (60*60*1000));
    const mins = Math.floor((left % (60*60*1000)) / (60*1000));
    let leftStr;
    if (days > 0) leftStr = days + 'ВЮ╝ ' + hrs + 'ВІюЖ░ё';
    else if (hrs > 0) leftStr = hrs + 'ВІюЖ░ё ' + mins + 'вХё';
    else leftStr = mins + 'вХё';
    const cy = _bbTop_rk + _bbH_rk / 2; // вњцвАюЖ░ђЖИ░ в▓ёьі╝ ВёИвАю ВцЉВІг
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // 1Вцё: В┤ѕЖИ░ьЎћ В╣┤Вџ┤ьіИвІцВџ┤ (Вюё)
    ctx.font = `${sz(10)}px sans-serif`; ctx.fillStyle = 'rgba(255,200,120,0.75)';
    ctx.fillText('В┤ѕЖИ░ьЎћЖ╣їВДђ ' + leftStr, W/2, cy - sz(7));
    // 2Вцё: Вџ░ьјИьЋе ВДђЖИЅ ВЋѕвѓ┤ (ВЋёвъў)
    ctx.font = `${sz(9)}px sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('въГьѓ╣ в│┤ВЃЂВЮђ вДцВБ╝ Вџ░ьјИьЋеВю╝вАю ВДђЖИЅ', W/2, cy + sz(7));
    ctx.textBaseline = 'alphabetic';
  }

  renderBottomBar();
}

function renderResult() {
  for (const s of stars) { ctx.globalAlpha=s.b*0.2; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s); }
  ctx.globalAlpha=1;
  const song=curSong;
  const _rTop = -safeTop + sz(10);

  const diffLabel = curDiff ? curDiff.name : '';
  const spdLabel = selectedSpeed.toFixed(1)+'x';
  ctx.fillText(song.name+'  ┬и  '+diffLabel+'  ┬и  '+spdLabel,W/2, _rTop + _rH * 0.14);

  const pct=totalNodes>0?collected/totalNodes:0;

  const TARGET_MAX = 1000000;

    const rGrad = ctx.createConicGradient(t, W/2, _gradeY);

    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  } else {
    ctx.beginPath(); ctx.arc(W/2, _gradeY, gradeR, 0, Math.PI*2);
    ctx.strokeStyle=gc[grade]+'44'; ctx.lineWidth=3; ctx.stroke();
    ctx.font=`bold ${sz(50)}px sans-serif`;
    ctx.fillStyle=gc[grade];
    if (!isMobile) { ctx.shadowColor=gc[grade]; ctx.shadowBlur=20; }
    ctx.textBaseline='middle'; ctx.fillText(grade,W/2, _gradeY);
    ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
  }

  const stats=[['SCORE',normalizedScore.toLocaleString()],['MAX COMBO',maxCombo+'x'],['HIT',collected+' / '+totalNodes],['MISS',''+missed],['ACCURACY',(pct*100).toFixed(1)+'%']];

  const _statRowH = sz(22);

    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(s[1],W/2+sz(8),sy+2);

  const msgs={P:'ALL PERFECT!!',S:'EXCELLENT!',A:'GREAT!',B:'GOOD!',C:'CLEAR',D:'TRY AGAIN'};
  ctx.font=`bold ${sz(15)}px sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle=gc[grade]; ctx.fillText(msgs[grade],W/2, _rTop + _rH * 0.74);

  const myBest = getMyBest(curSongIdx, selectedDiff);
  if (myBest > 0) {

      ctx.fillStyle='#ffd700';
      ctx.fillText('NEW RECORD!  ' + myBest.toLocaleString(), W/2, _rTop + _rH * 0.79);

  if (newlyUnlocked.length > 0) {

    const achW = sz(280);
    const achX = (W-achW)/2;

    ctx.font=`bold ${sz(12)}px sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle='#ffd700';
    ctx.fillText('ВЌЁВаЂ вІгВё▒! +'+formatCoins(totalCoins)+' РЎфВЮїьЉю', W/2, achY);

    for (let i = 0; i < show; i++) {

      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.8)';

    }
    if (newlyUnlocked.length > 3) {
      ctx.font=`${sz(10)}px sans-serif`;
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText('+'+(newlyUnlocked.length-3)+'Ж░ю вЇћ...', W/2, achY+10+show*22+12);

  }

  ctx.font=`${sz(13)}px sans-serif`;
  ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(Date.now()*0.004)*0.2})`;
  ctx.fillText('\uD0ED\uD558\uC5EC \uB3CC\uC544\uAC00\uAE30',W/2,H*0.94);
}

// ===== PAUSE ON TAB HIDDEN =====
let gamePaused = false;
let bgAudioState = null; // в░▒ЖиИвЮ╝Вџ┤вЊю ВДёВъЁ Ваё ВўцвћћВўц ВЃЂьЃю ВађВъЦ

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // вфевЊа ВўцвћћВўц ВЮ╝ВІюВаЋВДђ (в░▒ЖиИвЮ╝Вџ┤вЊю/ВхюВєїьЎћ)
    bgAudioState = { titleBgm: titleBgmPlaying, rankingBgm: rankingBgmPlaying, shopBgm: shopBgmPlaying, achievementBgm: achievementBgmPlaying, inventoryBgm: inventoryBgmPlaying, preview: !!songPreviewAudio && !songPreviewAudio.paused };
    if (titleBgmPlaying) titleBgm.pause();

    if (inventoryBgmPlaying && inventoryBgm) inventoryBgm.pause();
    if (songPreviewAudio && !songPreviewAudio.paused) songPreviewAudio.pause();
    // ВЮИЖ▓їВъё ВўцвћћВўц
    if (state === 'playing') {
      pauseGame();
    }
  } else if (bgAudioState) {
    // в│хЖиђ ВІю dt ВіцьїїВЮ┤ьЂг в░ЕВДђ
    lastTime = 0;
    // в│хЖиђ ВІю: ВЮИЖ▓їВъёВЮ┤ ВЋёвІї ВўцвћћВўцвДї ВъљвЈЎ в│хВЏљ (ВЮИЖ▓їВъёВЮђ resumeGameВю╝вАю В▓ўвдг)
    if (bgAudioState.titleBgm && state !== 'playing') { titleBgm.play().catch(()=>{}); }
    if (bgAudioState.rankingBgm && state === 'ranking' && rankingBgm) { rankingBgm.play().catch(()=>{}); }
    if (bgAudioState.shopBgm && state === 'shop' && shopBgm) { shopBgm.play().catch(()=>{}); }
    if (bgAudioState.achievementBgm && state === 'achievement' && achievementBgm) { achievementBgm.play().catch(()=>{}); }
    if (bgAudioState.inventoryBgm && state === 'inventory' && inventoryBgm) { inventoryBgm.play().catch(()=>{}); }
    if (bgAudioState.preview && state === 'select' && songPreviewAudio) {
      // Preview в│хЖиђ ВІю ВѓгВЮ┤ьЂ┤ ВЎёВаё вдгВЁІ Рђћ в░▒ЖиИвЮ╝Вџ┤вЊю ВцЉ Вќ┤ЖИІвѓю ьЃђВЮ┤в░Ї ВаЋВаЋ
      try {
        songPreviewAudio.currentTime = 0;
        previewCycleStart = performance.now();
        songPreviewAudio.play().catch(()=>{});
      } catch(e) {}

    bgAudioState = null;
  }
});

// ВўцвћћВўц вћћв░ћВЮ┤Віц в│ђЖ▓й (ВЮ┤Вќ┤ьЈ░ вХёвдг/ВЌ░Ж▓░) Рђћ actx.state в│ђьЎћВЎђ вг┤Ж┤ђьЋўЖ▓ї Ж░љВДђ
try {
  if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
    navigator.mediaDevices.addEventListener('devicechange', () => {
      if (state === 'playing' && !gamePaused) {
        pauseGame();
      }
    });
  }
} catch(e) {}

let pausedAtTime = 0; // вЕѕВХц ВІюВаљВЮў gameTime
function pauseGame() {
  if (state !== 'playing' || gamePaused) return;
  gamePaused = true;
  pausedAtTime = gameTime;
  // ABS вфевЊю: source ВаЋВДђ
  if (window._absNodes) {
    window._absPausedAt = actx ? actx.currentTime - window._absStartCtx : gameTime;
    for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} }
    window._absNodes = null;
  }
  for (let i = 0; i < allStemAudios.length; i++) {
    if (allStemAudios[i]) allStemAudios[i].pause();
  }
  for (const a of pulseStemAudios) { if (a) a.pause(); }
  if (songAudio) songAudio.pause();
}

let _prevActxState = ''; // actx ВЃЂьЃю ВаёьЎў Ж░љВДђВџЕ
let _bgmNeedsResume = false;
let _audioInterrupted = false;
let _suspendPauseTimer = null; // transient suspended blip вг┤ВІюВџЕ вћћв░ћВџ┤Віц
let _suspendStartAt = 0; // update() вѓ┤ actx suspend вћћв░ћВџ┤ВіцВџЕ Рђћ 500ms вёўВю╝вЕ┤ pause
// iOS ВўцвћћВўц ВЮИьё░вЪйьіИ в│хЖхг (ВЋївъї/ВаёьЎћ ьЏё)
// РўЁ iOS ВўцвћћВўц В╗еьЁЇВіцьіИвіћ вЁИвЊю ВЃЮВё▒/SFX ВъгВЃЮ вЊ▒Вю╝вАю ВДДЖ▓ї suspended вљљвІцЖ░ђ ВдЅВІю running в│хЖиђьЋўвіћ Ж▓йВџ░ ВъѕВЮї.
//   ВЮ┤Ж▒И ВдЅВІю pauseGame ьЋўвЕ┤ MISS/вћ░вІЦ ВІю flash ВЌєВЮ┤ Ж▓їВъёВЮ┤ ВЮ╝ВІю ВаЋВДђ Рєњ вІцВЮї ьЃГВю╝вАю ВъљвЈЎ resume вљўвіћ
//   silent drop ВдЮВЃЂ Вюав░ю. 'suspended' віћ 500ms вћћв░ћВџ┤Віц, 'interrupted' вДї ВдЅВІю pause.
function _onActxStateChange() {
  if (!actx) return;
  // РўЁ ВЮИЖ▓їВъё ВцЉ actx ВЃЂьЃю в│ђЖ▓й ВЮ┤в▓цьіИ Ж▓їВЮ┤ьїЁ Рђћ SFX ВЃЮВё▒Вю╝вАю ВЮИьЋю ВъдВЮђ state change Ж░ђ
  //   clearTimeout/setTimeout вѕёВаЂ Вюав░ю Рєњ вЕћВЮИ ВіцваѕвЊю Вўцв▓ёьЌцвЊю. Ж▓їВъё ВцЉВЌћ вг┤ВІю.
  if (state === 'playing') return;
  if (actx.state === 'running') {
    _bgmNeedsResume = true;
    if (_suspendPauseTimer) { clearTimeout(_suspendPauseTimer); _suspendPauseTimer = null; }
  } else if (actx.state === 'interrupted' || actx.state === 'suspended') {
    // РўЁ 'interrupted'/'suspended' вЉў вІц 500ms вћћв░ћВџ┤Віц. iOS віћ rapid SFX ВцЉ ВѕюЖ░ё interrupted
    //   ВЃЂьЃювАю ВДёВъЁьќѕвІц ВдЅВІю running в│хЖиђьЋўвіћ Ж▓йВџ░Ж░ђ ВъѕвіћвЇ░, ВдЅВІю pauseGame ьЋўвЕ┤ ЖиИ В░░вѓўВЮў
    //   ьЃГВЮ┤ gamePaused early return Вю╝вАю В░евІевљўВќ┤ Вћ╣ьъў в░юВЃЮ. ВДёВДю ВаёьЎћ/ВЋївъї Ж░ЎВЮђ ВъЦЖИ░ ВЮИьё░вЪйьіИвіћ
    //   500ms ВЋѕВЌљ в│хЖиђ ВЋѕ ьЋўвІѕЖ╣ї ЖиИвїђвАю pause В▓ўвдгвље.
    if (_suspendPauseTimer) clearTimeout(_suspendPauseTimer);
    _suspendPauseTimer = setTimeout(() => {
      _suspendPauseTimer = null;
      if (actx && (actx.state === 'suspended' || actx.state === 'interrupted')) {
        _audioInterrupted = true;
        if (state === 'playing' && !gamePaused) pauseGame();
      }
    }, 500);
  }
}
if (actx) {
  try { actx.addEventListener('statechange', _onActxStateChange); } catch(e) {}
  actx.onstatechange = _onActxStateChange;
}
// actx Ж░ђ suspendedРєњrunning в│хЖхг ВІю ABS ВєїВіц ВъгВЃЮВё▒ (ВЮ┤Вќ┤ьЈ░ ВъгВЌ░Ж▓░ вЊ▒)
function _restartAudioAfterContextResume() {
  if (!actx || actx.state !== 'running' || countdownTime > 0) return;
  try {
    const targetTime = gameTime - (curSong && curSong._startDelay || 0);
    if (targetTime < 0) return;
    if (stemAudioBuffers && Object.keys(stemAudioBuffers).length > 0) {
      // ABS вфевЊю: ЖИ░ВА┤ ВєїВіц ВаЋвдг ьЏё ВъгВЃЮВё▒
      if (window._absNodes) {
        for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} }
      }
      window._absNodes = [];
      window._absGains = [];
      window._absStartCtx = actx.currentTime - targetTime;
      for (let i = 0; i < allStemAudios.length; i++) {
        if (stemAudioBuffers[i]) {
          const g = actx.createGain(); g.connect(actx.destination); window._absGains[i] = g;
          const src = actx.createBufferSource();
          src.buffer = stemAudioBuffers[i];
          src.connect(window._absGains[i]);
          src.start(0, Math.max(0, targetTime));
          window._absNodes.push(src);
        } else { window._absNodes.push(null); }
      }
    } else if (songAudio) {
      songAudio.currentTime = targetTime;
      songAudio.play().catch(()=>{});
    }
  } catch(e) { console.warn('[audio] restart failed:', e); }
}
function resumeGame() {
  if (!gamePaused) return;
  gamePaused = false;
  lastTime = 0; // dt ВіцьїїВЮ┤ьЂг в░ЕВДђ: вІцВЮї ьћёваѕВъёВЮё В▓Ф ьћёваѕВъёВ▓ўвЪ╝ В▓ўвдг
  resumeSyncCounter = 15; // ВъгЖ░ю ьЏё 15ьћёваѕВъёЖ░ё ВўцвћћВўцВЌљ Ж░ЋВаю вЈЎЖИ░ьЎћ
  _prevActxState = ''; // ВаёьЎў Ж░љВДђ вдгВЁІ Рђћ resume ВДЂьЏё Въгpause в░ЕВДђ
  resumeAudio();
  if (countdownTime <= 0) {
    const targetTime = pausedAtTime;
    gameTime = targetTime;
    if (actx && actx.state !== 'running') actx.resume().catch(()=>{});
    // ЖИ░ВА┤ ABS ВєїВіц ВаЋвдг
    if (window._absNodes) { for (const src of window._absNodes) { if (src) try { src.stop(); } catch(e){} } }
    window._absNodes = null;
    window._absGains = null;
    window._absStartCtx = null;
    window._absPausedAt = null;
    _audioInterrupted = false;
    // 1ВѕюВюё: ABS ВъгВЃЮВё▒ (actx.currentTime ВЃўьћї ВаЋьЎЋвЈё Рђћ HTML Audio seek ВДђВЌ░ 100~500ms ьџїьћ╝)
    const _canAbs = actx && usingStemMode && stemAudioBuffers && Object.keys(stemAudioBuffers).length > 0;
    if (_canAbs) {
      // РўЁ onset вфевЊюВЮў _startDelay(3.5s) вДїьЂ╝ buffer offset в╣╝ВЋ╝ ьЋе.
      //   вХѕв│ђВІЮ: audioRef = (actx.currentTime - _absStartCtx) + _startDelay = gameTime
      //   вћ░вЮ╝Вёю buffer_pos = targetTime - _startDelay, _absStartCtx вЈё ЖиИВЌљ вДъВХ░.
      const _sd = (curSong && curSong._startDelay) || 0;
      const _bufOff = Math.max(0, targetTime - _sd);
      window._absNodes = [];
      window._absGains = [];
      window._absStartCtx = actx.currentTime - _bufOff;
      songStartTime = actx.currentTime - _bufOff;
      const _audioDest = (gameMode === 'nano' && nanoFilter) ? nanoFilter : actx.destination;
      if (gameMode === 'nano' && nanoFilter) { try { nanoFilter.connect(actx.destination); } catch(e){} }
      for (let i = 0; i < allStemAudios.length; i++) {
        if (stemAudioBuffers[i]) {
          const gain = actx.createGain();
          const _isAlways = ALWAYS_AUDIBLE_STEMS.includes(i);

          nodes.push(
            { type: 'tap',  lane: 0, time: 999, hit: false, missed: false },
            { type: 'hold', lane: 0, time: 999, endTime: 999.5, hit: false, missed: false, holding: false }
          );
          ctx.save(); ctx.globalAlpha = 0;
          renderNotes(); renderNotes();
          ctx.restore();
        } catch(e) {}
        nodes.length = 0;
      }
      // РўЁ handleLanePress ВІцВаю judge Ж▓йвАю warm Рђћ ьЃГ ВѕюЖ░ё hit вХёЖИ░(perfect/great/good),
      //   hold вХёЖИ░, spawnBurst, spawnParticles, combo/score update Ж╣їВДђ pre-JIT.
      //   вХђВъЉВџЕ: combo/score ВЮ╝ВІю ВдЮЖ░ђ Рєњ startSong ВЌљВёю В┤ѕЖИ░ьЎћвљўв»ђвАю ВЋѕВаё.
      if (typeof handleLanePress === 'function' && typeof nodes !== 'undefined' && nodes.length === 0) {
        const _savedDiff = curDiff;
        try {
          // curDiff null ВЮ┤вЕ┤ hit вХёЖИ░ throw Рєњ ьЋёВѕў ьЋёвЊювДї ВъёВІю ВёИьїЁ (IIFE вѓ┤ let ВъгьЋавІ╣ OK)
          if (!curDiff) curDiff = { hpGain: 0.01, hpDrain: 0.01, name: 'warm' };
          const _tap = gameTime || 0;
          nodes.push(
            { type: 'tap',  lane: 0, time: _tap, hit: false, missed: false },
            { type: 'tap',  lane: 1, time: _tap, hit: false, missed: false },
            { type: 'hold', lane: 2, time: _tap, endTime: _tap + 0.5, hit: false, missed: false, holding: false }
          );
          handleLanePress(0, 'warmup');
          handleLanePress(1, 'warmup');
          handleLanePress(2, 'warmup');
          // в╣ѕ press (no match) Ж▓йвАювЈё
          handleLanePress(3, 'warmup');
        } catch(e) { console.warn('[prewarm tap] failed', e); }
        // ВаЋвдг
        nodes.length = 0;
        particles.length = 0; bursts.length = 0; holdGlows.length = 0;
        curDiff = _savedDiff;
        // combo/score віћ startSong ВЮ┤ В┤ѕЖИ░ьЎћьЋе. ВЌгЖИ░Вёа ВЋѕ Ж▒┤вЊювд╝.
      }
      // GPU ьЁЇВіцВ▓ў ВЌЁвАювЊю Рђћ вАювЊювљю Віцьѓе PNG ВаёвХђ
      if (typeof skinImages === 'object' && skinImages) {
        ctx.save(); ctx.globalAlpha = 0;
        for (const path in skinImages) {
          const im = skinImages[path];
          if (im && im.complete && im.naturalWidth > 0) {
            try {
              ctx.drawImage(im, -300, -300, 100, 100);
              ctx.drawImage(im, -500, -500, 200, 200);
            } catch(e) {}
          }
        }
        ctx.restore();
      }
      return true;
    } catch(e) { console.warn('[prewarm] failed', e); return false; }
  };
  const retry = () => {
    if (doWarmup()) return;
    setTimeout(retry, 250);
  };
  setTimeout(retry, 200);
})();
requestAnimationFrame(loop);
</script>
</body>
