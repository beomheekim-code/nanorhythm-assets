<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="50%" stop-color="#2d1558"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b060ff"/>
      <stop offset="50%" stop-color="#e0c0ff"/>
      <stop offset="100%" stop-color="#60a0ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- 배경 라운드 사각형 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 별 장식 -->
  <circle cx="80" cy="90" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="430" cy="110" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="420" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="400" cy="440" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="260" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="460" cy="280" r="2" fill="#fff" opacity="0.7"/>

  <!-- EQ 바 (왼쪽) -->
  <g opacity="0.35">
    <rect x="90"  y="220" width="14" height="72"  rx="3" fill="#a080ff"/>
    <rect x="112" y="190" width="14" height="132" rx="3" fill="#b060ff"/>
    <rect x="134" y="240" width="14" height="32"  rx="3" fill="#a080ff"/>
  </g>

  <!-- EQ 바 (오른쪽) -->
  <g opacity="0.35">
    <rect x="364" y="200" width="14" height="112" rx="3" fill="#60a0ff"/>
    <rect x="386" y="230" width="14" height="52"  rx="3" fill="#80c0ff"/>
    <rect x="408" y="180" width="14" height="152" rx="3" fill="#60a0ff"/>
  </g>

  <!-- 중앙 판정선 -->
  <line x1="96" y1="340" x2="416" y2="340" stroke="url(#note)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- 음표 (중앙, 글로우) -->
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="220" cy="300" r="42" fill="url(#note)"/>
  </g>
  <g transform="translate(180,150)">
    <!-- note stem -->
    <rect x="68" y="0" width="8" height="150" fill="url(#note)" rx="2"/>
    <!-- note head -->
    <ellipse cx="42" cy="150" rx="34" ry="24" fill="url(#note)" transform="rotate(-20,42,150)"/>
    <!-- flag -->
    <path d="M76,0 Q120,30 100,80 Q130,40 76,20 Z" fill="url(#note)"/>
  </g>

  <!-- NANO 텍스트 -->
  <text x="256" y="428" font-family="Arial, sans-serif" font-weight="200" font-size="42" fill="#c0d0ff" text-anchor="middle" letter-spacing="10">NANO</text>
  <!-- RHYTHM 텍스트 -->
  <text x="256" y="472" font-family="Arial, sans-serif" font-weight="900" font-size="32" fill="url(#note)" text-anchor="middle" letter-spacing="3">RHYTHM</text>
</svg>
